<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ПРОФИЛЬ | R-GAME</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,600;0,800;1,800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #070b12;
            --container-bg: #111822;
            --panel-bg: rgba(26, 35, 50, 0.6);
            --accent-blue: #1882ff;
            --accent-green: #1bd15d;
            --accent-red: #f03043;
            --accent-orange: #ff9800;
            --text-main: #e2e8f0;
            --text-muted: #8c9eb5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            padding: 16px 16px 100px;
            color: var(--text-main);
            background: var(--bg-dark);
            background-image: radial-gradient(circle at 20% 0%, rgba(24,130,255,0.12), transparent 50%);
        }

        .profile-container {
            max-width: 500px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            background: rgba(17, 24, 34, 0.65);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 12px 16px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 16px 40px rgba(0,0,0,0.5);
        }
        .back-btn {
            background: var(--accent-blue);
            border: none;
            color: #fff;
            font-size: 24px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(24,130,255,0.3);
        }
        .back-btn:active { transform: scale(0.9); }

        .brand {
            font-family: 'Montserrat', sans-serif;
            font-size: 22px;
            font-weight: 800;
            font-style: italic;
            background: linear-gradient(135deg, #ffffff, #a0c4ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            flex: 1;
        }

        .profile-edit {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .avatar-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            overflow: hidden;
            background: linear-gradient(135deg, var(--accent-blue), #0056b3);
            border: 3px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 30px rgba(24,130,255,0.4);
            cursor: pointer;
        }
        .avatar-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .avatar-wrapper .default-avatar {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 800;
            color: #fff;
        }
        .avatar-wrapper input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .nickname-edit {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .nickname-edit input {
            background: var(--panel-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 10px 16px;
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            width: 200px;
            text-align: center;
            font-family: 'Montserrat', sans-serif;
        }
        .nickname-edit input:focus {
            outline: none;
            border-color: var(--accent-blue);
        }
        .nickname-edit button {
            background: var(--accent-blue);
            border: none;
            border-radius: 12px;
            padding: 10px 18px;
            color: #fff;
            font-weight: 800;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(24,130,255,0.3);
        }
        .nickname-edit button:active {
            transform: scale(0.95);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 14px;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            text-align: center;
        }
        .stat-label {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            font-weight: 700;
        }
        .stat-value {
            font-family: 'Montserrat', sans-serif;
            font-size: 22px;
            font-weight: 800;
            margin-top: 4px;
        }
        .stat-value.green { color: var(--accent-green); }
        .stat-value.red { color: var(--accent-red); }
        .stat-value.blue { color: var(--accent-blue); }
        .stat-value.orange { color: var(--accent-orange); }
        .stat-value.white { color: #fff; }

        .balance-row {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .balance-card {
            flex: 1;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 14px;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            text-align: center;
        }
        .balance-card .label {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 700;
        }
        .balance-card .amount {
            font-family: 'Montserrat', sans-serif;
            font-size: 20px;
            font-weight: 800;
            margin-top: 2px;
        }
        .balance-card .amount.main { color: var(--accent-green); }
        .balance-card .amount.casino { color: var(--accent-blue); }

        .winrate-bar {
            background: var(--panel-bg);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .winrate-bar .label {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 6px;
        }
        .winrate-track {
            height: 8px;
            background: #1e293b;
            border-radius: 4px;
            overflow: hidden;
        }
        .winrate-fill {
            height: 100%;
            border-radius: 4px;
            background: linear-gradient(90deg, var(--accent-red), var(--accent-orange), var(--accent-green));
            width: 0%;
            transition: width 0.6s ease;
        }

        .btn-menu {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            background: var(--accent-blue);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            box-shadow: 0 6px 0 #0f5bb8;
            transition: all 0.1s;
            margin-top: 8px;
        }
        .btn-menu:active { transform: translateY(4px); box-shadow: 0 2px 0 #0f5bb8; }

        .loading {
            text-align: center;
            padding: 40px 0;
            color: var(--text-muted);
            font-size: 18px;
        }

        @media (max-width: 480px) {
            .stat-value { font-size: 18px; }
            .balance-card .amount { font-size: 16px; }
            .avatar-wrapper { width: 80px; height: 80px; }
            .nickname-edit input { width: 150px; font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="profile-container" id="profileContainer">
        <div class="loading">⏳ Загрузка...</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        if (tg.HapticFeedback) tg.enableClosingConfirmation();

        const container = document.getElementById('profileContainer');

        // ===== РАБОТА С LOCALSTORAGE =====
        function getProfile() {
            return {
                nickname: localStorage.getItem('profile_nickname') || 'Игрок',
                avatar: localStorage.getItem('profile_avatar') || null,
                games_played: parseInt(localStorage.getItem('profile_games_played')) || 0,
                wins: parseInt(localStorage.getItem('profile_wins')) || 0,
                losses: parseInt(localStorage.getItem('profile_losses')) || 0,
                total_bet: parseInt(localStorage.getItem('profile_total_bet')) || 0,
                total_win: parseInt(localStorage.getItem('profile_total_win')) || 0,
            };
        }

        function saveProfile(data) {
            if (data.nickname) localStorage.setItem('profile_nickname', data.nickname);
            if (data.avatar !== undefined) localStorage.setItem('profile_avatar', data.avatar);
            if (data.games_played !== undefined) localStorage.setItem('profile_games_played', String(data.games_played));
            if (data.wins !== undefined) localStorage.setItem('profile_wins', String(data.wins));
            if (data.losses !== undefined) localStorage.setItem('profile_losses', String(data.losses));
            if (data.total_bet !== undefined) localStorage.setItem('profile_total_bet', String(data.total_bet));
            if (data.total_win !== undefined) localStorage.setItem('profile_total_win', String(data.total_win));
        }

        // ===== ОТРИСОВКА =====
        function renderProfile() {
            const profile = getProfile();
            const casinoBalance = parseInt(localStorage.getItem('casinoBalance')) || 0;
            const mainBalance = parseInt(localStorage.getItem('mainBalance')) || 0; // если храните отдельно

            const games = profile.games_played;
            const wins = profile.wins;
            const losses = profile.losses;
            const total_bet = profile.total_bet;
            const total_win = profile.total_win;
            const net_profit = total_win - total_bet;
            const winrate = games > 0 ? Math.round((wins / games) * 100) : 0;

            const initial = profile.nickname.charAt(0).toUpperCase();

            container.innerHTML = `
                <div class="header">
                    <button class="back-btn" onclick="goBack()">←</button>
                    <div class="brand">R-<span style="color:#1882ff;">GAME</span></div>
                </div>

                <div class="profile-edit">
                    <div class="avatar-wrapper" id="avatarWrapper">
                        ${profile.avatar ? `<img src="${profile.avatar}" alt="avatar">` : `<div class="default-avatar">${initial}</div>`}
                        <input type="file" id="avatarInput" accept="image/*">
                    </div>

                    <div class="nickname-edit">
                        <input type="text" id="nicknameInput" value="${profile.nickname}" maxlength="20">
                        <button id="saveNicknameBtn">Сохранить</button>
                    </div>
                </div>

                <div class="balance-row">
                    <div class="balance-card">
                        <div class="label">Основной баланс</div>
                        <div class="amount main">${mainBalance.toLocaleString()} ₽</div>
                    </div>
                    <div class="balance-card">
                        <div class="label">Баланс казино</div>
                        <div class="amount casino">${casinoBalance.toLocaleString()} ₽</div>
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">Всего игр</div>
                        <div class="stat-value white">${games}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Победы</div>
                        <div class="stat-value green">${wins}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Поражения</div>
                        <div class="stat-value red">${losses}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Процент побед</div>
                        <div class="stat-value orange">${winrate}%</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Всего ставок</div>
                        <div class="stat-value blue">${total_bet.toLocaleString()} ₽</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Всего выигрышей</div>
                        <div class="stat-value green">${total_win.toLocaleString()} ₽</div>
                    </div>
                </div>

                <div class="winrate-bar">
                    <div class="label">Чистая прибыль: <span style="color:${net_profit >= 0 ? 'var(--accent-green)' : 'var(--accent-red)'}">${net_profit >= 0 ? '+' : ''}${net_profit.toLocaleString()} ₽</span></div>
                    <div class="winrate-track">
                        <div class="winrate-fill" style="width: ${winrate}%;"></div>
                    </div>
                </div>

                <button class="btn-menu" onclick="goBack()">🔙 В КАЗИНО</button>
            `;

            // ===== ОБРАБОТЧИКИ =====
            // Смена аватара
            document.getElementById('avatarInput').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(ev) {
                    const base64 = ev.target.result;
                    saveProfile({ avatar: base64 });
                    renderProfile(); // перерисовка
                };
                reader.readAsDataURL(file);
            });

            // Смена никнейма
            document.getElementById('saveNicknameBtn').addEventListener('click', function() {
                const input = document.getElementById('nicknameInput');
                const newNick = input.value.trim().slice(0, 20);
                if (newNick.length < 2) {
                    alert('Минимум 2 символа');
                    return;
                }
                saveProfile({ nickname: newNick });
                renderProfile();
            });
        }

        function goBack() {
            window.location.href = 'casino.html?userId=' + (new URLSearchParams(window.location.search).get('userId') || '');
        }

        // ===== ИНИЦИАЛИЗАЦИЯ =====
        renderProfile();
    </script>
</body>
</html>
