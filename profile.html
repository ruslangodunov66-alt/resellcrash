<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ПРОФИЛЬ | R-GAME</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,600;0,800;1,800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #070b12;
            --container-bg: #111822;
            --panel-bg: rgba(26, 35, 50, 0.6);
            --accent-blue: #1882ff;
            --accent-green: #1bd15d;
            --accent-red: #f03043;
            --accent-orange: #ff9800;
            --text-main: #e2e8f0;
            --text-muted: #8c9eb5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            padding: 16px 16px 100px;
            color: var(--text-main);
            background: var(--bg-dark);
            background-image: radial-gradient(circle at 20% 0%, rgba(24,130,255,0.12), transparent 50%);
        }

        .profile-container {
            max-width: 500px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            background: rgba(17, 24, 34, 0.65);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 12px 16px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 16px 40px rgba(0,0,0,0.5);
        }
        .back-btn {
            background: var(--accent-blue);
            border: none;
            color: #fff;
            font-size: 24px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(24,130,255,0.3);
        }
        .back-btn:active { transform: scale(0.9); }

        .brand {
            font-family: 'Montserrat', sans-serif;
            font-size: 22px;
            font-weight: 800;
            font-style: italic;
            background: linear-gradient(135deg, #ffffff, #a0c4ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            flex: 1;
        }

        .avatar-section {
            text-align: center;
            margin-bottom: 24px;
        }
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-blue), #0056b3);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: 800;
            color: #fff;
            box-shadow: 0 8px 30px rgba(24,130,255,0.4);
            border: 3px solid rgba(255,255,255,0.2);
        }
        .nickname {
            font-family: 'Montserrat', sans-serif;
            font-size: 24px;
            font-weight: 800;
            margin-top: 8px;
            color: #fff;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 14px;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            text-align: center;
        }
        .stat-label {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            font-weight: 700;
        }
        .stat-value {
            font-family: 'Montserrat', sans-serif;
            font-size: 22px;
            font-weight: 800;
            margin-top: 4px;
        }
        .stat-value.green { color: var(--accent-green); }
        .stat-value.red { color: var(--accent-red); }
        .stat-value.blue { color: var(--accent-blue); }
        .stat-value.orange { color: var(--accent-orange); }
        .stat-value.white { color: #fff; }

        .balance-row {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .balance-card {
            flex: 1;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 14px;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            text-align: center;
        }
        .balance-card .label {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 700;
        }
        .balance-card .amount {
            font-family: 'Montserrat', sans-serif;
            font-size: 20px;
            font-weight: 800;
            margin-top: 2px;
        }
        .balance-card .amount.main { color: var(--accent-green); }
        .balance-card .amount.casino { color: var(--accent-blue); }

        .winrate-bar {
            background: var(--panel-bg);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .winrate-bar .label {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 6px;
        }
        .winrate-track {
            height: 8px;
            background: #1e293b;
            border-radius: 4px;
            overflow: hidden;
        }
        .winrate-fill {
            height: 100%;
            border-radius: 4px;
            background: linear-gradient(90deg, var(--accent-red), var(--accent-orange), var(--accent-green));
            width: 0%;
            transition: width 0.6s ease;
        }

        .btn-menu {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            background: var(--accent-blue);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            box-shadow: 0 6px 0 #0f5bb8;
            transition: all 0.1s;
            margin-top: 8px;
        }
        .btn-menu:active { transform: translateY(4px); box-shadow: 0 2px 0 #0f5bb8; }

        .loading {
            text-align: center;
            padding: 40px 0;
            color: var(--text-muted);
            font-size: 18px;
        }

        @media (max-width: 480px) {
            .stat-value { font-size: 18px; }
            .balance-card .amount { font-size: 16px; }
            .avatar { width: 60px; height: 60px; font-size: 30px; }
            .nickname { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="profile-container" id="profileContainer">
        <div class="loading">⏳ Загрузка профиля...</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        if (tg.HapticFeedback) tg.enableClosingConfirmation();

        let userId = null;
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('userId')) userId = urlParams.get('userId');
        else if (tg.initDataUnsafe?.user?.id) userId = tg.initDataUnsafe.user.id;

        const container = document.getElementById('profileContainer');

        function renderProfile(data) {
            const {
                nickname = 'Игрок',
                balance = 0,
                casino_balance = 0,
                total_earned = 0,
                games_played = 0,
                wins = 0,
                losses = 0,
                total_bet = 0,
                total_win = 0,
                net_profit = 0,
                winrate = 0
            } = data;

            const initial = nickname.charAt(0).toUpperCase();

            container.innerHTML = `
                <div class="header">
                    <button class="back-btn" onclick="goBack()">←</button>
                    <div class="brand">R-<span style="color:#1882ff;">GAME</span></div>
                </div>

                <div class="avatar-section">
                    <div class="avatar">${initial}</div>
                    <div class="nickname">${nickname}</div>
                </div>

                <div class="balance-row">
                    <div class="balance-card">
                        <div class="label">Основной баланс</div>
                        <div class="amount main">${balance.toLocaleString()} ₽</div>
                    </div>
                    <div class="balance-card">
                        <div class="label">Баланс казино</div>
                        <div class="amount casino">${casino_balance.toLocaleString()} ₽</div>
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">Всего игр</div>
                        <div class="stat-value white">${games_played}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Победы</div>
                        <div class="stat-value green">${wins}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Поражения</div>
                        <div class="stat-value red">${losses}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Процент побед</div>
                        <div class="stat-value orange">${winrate}%</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Всего ставок</div>
                        <div class="stat-value blue">${total_bet.toLocaleString()} ₽</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Всего выигрышей</div>
                        <div class="stat-value green">${total_win.toLocaleString()} ₽</div>
                    </div>
                </div>

                <div class="winrate-bar">
                    <div class="label">Чистая прибыль: <span style="color:${net_profit >= 0 ? 'var(--accent-green)' : 'var(--accent-red)'}">${net_profit >= 0 ? '+' : ''}${net_profit.toLocaleString()} ₽</span></div>
                    <div class="winrate-track">
                        <div class="winrate-fill" style="width: ${winrate}%;"></div>
                    </div>
                </div>

                <button class="btn-menu" onclick="goBack()">🔙 В КАЗИНО</button>
            `;
        }

        function goBack() {
            window.location.href = 'casino.html?userId=' + (userId || '');
        }

        // === Запрос профиля через fetch (HTTP) ===
        if (userId) {
            // Определяем базовый URL для API (замените на ваш домен или используйте относительный)
            const apiBase = window.location.origin; // или укажите полный URL, если сервер на другом порту
            fetch(`${apiBase}/profile/${userId}`)
                .then(res => {
                    if (!res.ok) throw new Error('Ошибка загрузки профиля');
                    return res.json();
                })
                .then(data => renderProfile(data))
                .catch(err => {
                    console.error(err);
                    container.innerHTML = `<div class="loading">❌ Ошибка загрузки профиля</div>`;
                });
        } else {
            container.innerHTML = '<div class="loading">❌ Ошибка: userId не найден</div>';
        }
    </script>
</body>
</html>
