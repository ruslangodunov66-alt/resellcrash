<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Друзья | Resell Tycoon</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: radial-gradient(circle at 30% 10%, #0c1120, #020408); color: #ddd; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .glass-card { background: rgba(20,30,45,0.7); backdrop-filter: blur(12px); border-radius: 48px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(0,255,255,0.3); }
        h2 { font-size: 28px; background: linear-gradient(135deg, #ffcc44, #ff6644); background-clip: text; -webkit-background-clip: text; color: transparent; margin-bottom: 15px; }
        .friend-item { background: rgba(0,0,0,0.6); border-radius: 32px; padding: 12px 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .add-form { display: flex; gap: 10px; margin-top: 15px; }
        .add-input { flex: 1; padding: 10px; border-radius: 40px; border: none; background: #1e2a3a; color: white; }
        button { background: #2ecc71; border: none; padding: 8px 18px; border-radius: 40px; font-weight: bold; cursor: pointer; }
        .remove-btn { background: #e74c3c; }
        .back-btn { background: #555; width: 100%; margin-top: 15px; }
    </style>
</head>
<body>
<div class="container">
    <div class="glass-card">
        <h2>👥 ДРУЗЬЯ</h2>
        <div class="add-form">
            <input type="text" id="friendName" class="add-input" placeholder="Никнейм друга">
            <button onclick="addFriend()">➕ Добавить</button>
        </div>
    </div>
    <div class="glass-card" id="friendsList">Загрузка...</div>
    <button class="back-btn" onclick="window.location.href='index.html'">🔙 На главную</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    const API_BASE = "https://nl12.bothost.ru";
    const USE_REAL_API = false;
    const userId = tg.initDataUnsafe?.user?.id || 1475910449;

    let friends = [];

    const mockFriends = [
        { id: 2, nickname: "Барыга2" },
        { id: 3, nickname: "Торгаш777" }
    ];

    async function fetchAPI(endpoint) {
        if (!USE_REAL_API) return null;
        try {
            const resp = await fetch(`${API_BASE}${endpoint}&tg_id=${userId}`);
            if (!resp.ok) throw new Error();
            return await resp.json();
        } catch(e) { return null; }
    }

    async function loadFriends() {
        if (!USE_REAL_API) { friends = mockFriends; renderFriends(); return; }
        const data = await fetchAPI(`/api/friends`);
        friends = data?.friends || [];
        renderFriends();
    }

    async function addFriend() {
        const name = document.getElementById('friendName').value.trim();
        if (!name) { tg.showAlert("Введите никнейм"); return; }
        if (!USE_REAL_API) {
            friends.push({ id: Date.now(), nickname: name });
            renderFriends();
            document.getElementById('friendName').value = '';
            tg.showAlert(`✅ (МОК) ${name} добавлен в друзья`);
            return;
        }
        const res = await fetch(`${API_BASE}/api/friends/add?tg_id=${userId}&friend_name=${name}`, { method: 'POST' });
        const data = await res.json();
        if (data.message) { tg.showAlert(data.message); await loadFriends(); }
        else tg.showAlert(`❌ ${data.message}`);
    }

    async function removeFriend(friendId) {
        if (!USE_REAL_API) {
            friends = friends.filter(f => f.id !== friendId);
            renderFriends();
            tg.showAlert(`✅ (МОК) Друг удалён`);
            return;
        }
        const res = await fetch(`${API_BASE}/api/friends/remove?tg_id=${userId}&friend_id=${friendId}`, { method: 'POST' });
        const data = await res.json();
        if (data.message) { tg.showAlert(data.message); await loadFriends(); }
        else tg.showAlert(`❌ ${data.message}`);
    }

    function renderFriends() {
        const container = document.getElementById('friendsList');
        if (!friends.length) { container.innerHTML = `<div>👥 У вас пока нет друзей</div>`; return; }
        let html = '';
        for (let f of friends) {
            html += `
                <div class="friend-item">
                    <span>👤 ${f.nickname || `ID:${f.id}`}</span>
                    <button class="remove-btn" onclick="removeFriend(${f.id})">🗑 Удалить</button>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    loadFriends();
</script>
</body>
</html>
