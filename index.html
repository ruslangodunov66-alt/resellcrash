<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>🚀 CRASH | R-Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03050a);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Montserrat', system-ui, sans-serif;
            padding: 16px;
        }

        /* НЕОНОВЫЙ КОНТЕЙНЕР */
        .crash-container {
            background: rgba(10, 20, 35, 0.75);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 24px 20px 32px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 2px solid rgba(0, 255, 255, 0.4);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2), inset 0 0 15px rgba(0, 255, 255, 0.1);
            transition: all 0.2s ease;
        }

        .crash-container.crashing {
            border-color: #ff3366;
            box-shadow: 0 0 40px rgba(255, 51, 102, 0.5);
        }

        .crash-container.winning {
            border-color: #ffcc00;
            box-shadow: 0 0 40px rgba(255, 204, 0, 0.5);
        }

        /* ШАПКА */
        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .rocket-icon {
            font-size: 48px;
            animation: float 1s infinite alternate ease-in-out;
            filter: drop-shadow(0 0 8px #ff6600);
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-10px); }
        }

        .title {
            font-size: 34px;
            font-weight: 900;
            background: linear-gradient(135deg, #ff3366, #ffcc00, #00ffff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0,255,255,0.5);
        }

        /* ИНФО О СТАВКЕ */
        .bet-card {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 50px;
            padding: 12px 20px;
            margin-bottom: 24px;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        .bet-label {
            font-size: 14px;
            color: #88aaff;
            letter-spacing: 1px;
        }

        .bet-value {
            font-size: 32px;
            font-weight: 800;
            color: #ffcc00;
            text-shadow: 0 0 8px #ff9900;
        }

        /* МНОЖИТЕЛЬ - ГЛАВНОЕ */
        .multiplier-box {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 70px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid rgba(0, 255, 255, 0.5);
        }

        .multiplier {
            font-size: 5.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #00ffcc, #00aaff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            transition: 0.02s linear;
            text-shadow: 0 0 20px #00ffff;
        }

        .crashing .multiplier {
            background: linear-gradient(135deg, #ff3366, #ff6633);
            animation: shake 0.15s infinite;
        }

        .winning .multiplier {
            background: linear-gradient(135deg, #ffcc00, #ff9900);
            animation: pulse 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        @keyframes pulse {
            0% { transform: scale(1); text-shadow: 0 0 0px gold; }
            50% { transform: scale(1.1); text-shadow: 0 0 30px gold; }
            100% { transform: scale(1); text-shadow: 0 0 10px gold; }
        }

        /* КНОПКИ */
        button {
            border: none;
            padding: 14px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            width: 100%;
            margin: 8px 0;
            transition: transform 0.1s, opacity 0.2s;
            font-family: inherit;
        }

        button:active {
            transform: scale(0.97);
        }

        button:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }

        .btn-cashout {
            background: linear-gradient(135deg, #00cc66, #009944);
            box-shadow: 0 5px 0 #006633;
            font-size: 1.3rem;
        }

        .btn-repeat {
            background: linear-gradient(135deg, #ffaa00, #ff7700);
            box-shadow: 0 5px 0 #cc5500;
        }

        .btn-change {
            background: linear-gradient(135deg, #3399ff, #2266cc);
            box-shadow: 0 5px 0 #114499;
        }

        .status {
            margin-top: 20px;
            font-size: 1rem;
            font-weight: 600;
            min-height: 55px;
            background: rgba(0,0,0,0.4);
            border-radius: 40px;
            padding: 10px;
        }

        .hidden {
            display: none;
        }

        .flex-col {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        footer {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 20px;
            color: #88aaff;
        }
    </style>
</head>
<body>
<div class="crash-container" id="crashContainer">
    <div class="header">
        <div class="rocket-icon">🚀</div>
        <div class="title">CRASH</div>
    </div>

    <div class="bet-card">
        <div class="bet-label">💎 СТАВКА</div>
        <div class="bet-value" id="betDisplay">0 ₽</div>
    </div>

    <div class="multiplier-box">
        <div class="multiplier" id="multiplier">x1.00</div>
    </div>

    <div class="flex-col" id="buttonsGroup">
        <button id="cashoutBtn" class="btn-cashout">💰 ЗАБРАТЬ ВЫИГРЫШ</button>
        <button id="repeatBtn" class="btn-repeat hidden">🔄 ИГРАТЬ СНОВА</button>
        <button id="changeBetBtn" class="btn-change hidden">✏️ СМЕНИТЬ СТАВКУ</button>
    </div>

    <div class="status" id="statusMsg">⚡ Множитель растёт...</div>
    <footer>🎲 Успей забрать до краха!</footer>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    tg.MainButton.hide();
    tg.BackButton.hide();

    // ========== ПОЛУЧАЕМ ПАРАМЕТРЫ ИЗ URL ==========
    const urlParams = new URLSearchParams(window.location.search);
    const currentBet = parseInt(urlParams.get('bet')) || 0;
    const crashPoint = parseFloat(urlParams.get('crash')) || 1.01;
    const userBalance = parseInt(urlParams.get('balance')) || 0;

    // DOM элементы
    const container = document.getElementById('crashContainer');
    const betDisplay = document.getElementById('betDisplay');
    const multiplierEl = document.getElementById('multiplier');
    const cashoutBtn = document.getElementById('cashoutBtn');
    const repeatBtn = document.getElementById('repeatBtn');
    const changeBetBtn = document.getElementById('changeBetBtn');
    const statusMsg = document.getElementById('statusMsg');

    if (!currentBet) {
        statusMsg.innerHTML = '❌ Ошибка: нет данных о ставке. Вернитесь в бота.';
        cashoutBtn.disabled = true;
    }

    betDisplay.innerText = currentBet.toLocaleString() + ' ₽';

    let currentMultiplier = 1.0;
    let gameActive = true;
    let intervalId = null;
    let isPending = false;

    // ========== ФУНКЦИЯ ОБНОВЛЕНИЯ МНОЖИТЕЛЯ ==========
    function updateMultiplierDisplay() {
        multiplierEl.innerHTML = `x${currentMultiplier.toFixed(2)}`;
    }

    // ========== ЗАПУСК РОСТА МНОЖИТЕЛЯ ==========
    function startCrashGame() {
        intervalId = setInterval(() => {
            if (!gameActive) return;
            currentMultiplier += 0.02;
            updateMultiplierDisplay();

            // Проверка краша
            if (currentMultiplier >= crashPoint) {
                clearInterval(intervalId);
                intervalId = null;
                gameActive = false;
                container.classList.add('crashing');
                multiplierEl.innerHTML = `💥 x${crashPoint.toFixed(2)}`;
                cashoutBtn.disabled = true;
                repeatBtn.classList.remove('hidden');
                changeBetBtn.classList.remove('hidden');
                statusMsg.innerHTML = `💔 КРАШ! Вы проиграли ${currentBet.toLocaleString()}₽`;
                tg.sendData(JSON.stringify({ action: 'crash', bet: currentBet }));
            }
        }, 80); // плавный рост
    }

    // ========== ЗАБРАТЬ ВЫИГРЫШ ==========
    cashoutBtn.onclick = () => {
        if (!gameActive || isPending) return;
        isPending = true;
        clearInterval(intervalId);
        intervalId = null;
        gameActive = false;
        cashoutBtn.disabled = true;
        
        statusMsg.innerHTML = '⏳ Обработка выигрыша...';
        
        tg.sendData(JSON.stringify({
            action: 'cashout',
            bet: currentBet,
            multiplier: currentMultiplier
        }));
    };

    // ========== ИГРАТЬ СНОВА ==========
    repeatBtn.onclick = () => {
        if (isPending) return;
        repeatBtn.disabled = true;
        changeBetBtn.disabled = true;
        statusMsg.innerHTML = '🔄 Запускаем новый раунд...';
        tg.sendData(JSON.stringify({ action: 'repeat', bet: currentBet }));
    };

    // ========== СМЕНИТЬ СТАВКУ ==========
    changeBetBtn.onclick = () => {
        tg.sendData(JSON.stringify({ action: 'change_bet' }));
        tg.close(); // закрываем Web App
    };

    // ========== ОБРАБОТКА ОТВЕТОВ ОТ БОТА ==========
    tg.onEvent('web_app_data', (event) => {
        try {
            const response = JSON.parse(event.data);
            console.log('Ответ от бота:', response);

            if (response.status === 'error') {
                statusMsg.innerHTML = `❌ ${response.message}`;
                repeatBtn.classList.remove('hidden');
                changeBetBtn.classList.remove('hidden');
                isPending = false;
                return;
            }

            if (response.action === 'cashout_ok') {
                const winAmount = response.win;
                container.classList.add('winning');
                multiplierEl.innerHTML = `✨ x${currentMultiplier.toFixed(2)} → +${winAmount.toLocaleString()}₽ ✨`;
                repeatBtn.classList.remove('hidden');
                changeBetBtn.classList.remove('hidden');
                statusMsg.innerHTML = `🎉 ПОБЕДА! Вы выиграли ${winAmount.toLocaleString()}₽ 🎉`;
                isPending = false;
            }
            else if (response.action === 'repeat_ready') {
                // Обновляем параметры для новой игры
                const newCrashPoint = response.crash_point;
                const newBalance = response.balance;
                currentMultiplier = 1.0;
                gameActive = true;
                isPending = false;
                container.classList.remove('crashing', 'winning');
                updateMultiplierDisplay();
                cashoutBtn.disabled = false;
                repeatBtn.classList.add('hidden');
                changeBetBtn.classList.add('hidden');
                statusMsg.innerHTML = '🚀 РАКЕТА ВЗЛЕТАЕТ! Множитель растёт...';
                
                // Перезапускаем игру с новой точкой
                if (intervalId) clearInterval(intervalId);
                // Заменяем crashPoint в замыкании (простой способ)
                window._crashPoint = newCrashPoint;
                startCrashGameWithPoint(newCrashPoint);
            }
            else if (response.action === 'change_bet_ok') {
                // Web App закроется
            }
            else if (response.action === 'crash_ok') {
                // Уже обработано
            }
        } catch(e) {
            console.error('Ошибка обработки ответа:', e);
            statusMsg.innerHTML = '❌ Ошибка связи с сервером';
            repeatBtn.classList.remove('hidden');
            changeBetBtn.classList.remove('hidden');
            isPending = false;
        }
    });

    // Функция для повторного запуска с новой точкой
    function startCrashGameWithPoint(point) {
        let mult = 1.0;
        const interval = setInterval(() => {
            if (!gameActive) return;
            mult += 0.02;
            multiplierEl.innerHTML = `x${mult.toFixed(2)}`;
            if (mult >= point) {
                clearInterval(interval);
                gameActive = false;
                container.classList.add('crashing');
                multiplierEl.innerHTML = `💥 x${point.toFixed(2)}`;
                cashoutBtn.disabled = true;
                repeatBtn.classList.remove('hidden');
                changeBetBtn.classList.remove('hidden');
                statusMsg.innerHTML = `💔 КРАШ! Вы проиграли ${currentBet.toLocaleString()}₽`;
                tg.sendData(JSON.stringify({ action: 'crash', bet: currentBet }));
            }
        }, 80);
        intervalId = interval;
    }

    // СТАРТУЕМ ИГРУ!
    startCrashGame();
</script>
</body>
</html>
