<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Resell Tycoon</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0f1a;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            color: white;
        }

        /* 3D Canvas фон */
        #canvas-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            display: block;
        }

        /* Контейнер с вертикальной прокруткой (профиль + горизонтальное меню) */
        .game-container {
            position: relative;
            z-index: 1;
            max-width: 100%;
            margin: 0 auto;
            padding: 20px 0 40px 0;
            height: 100vh;
            overflow-y: auto;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        /* Профиль – прилипает сверху */
        .profile-card {
            background: rgba(20, 30, 45, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 24px 20px;
            margin: 20px 16px 30px 16px;
            text-align: center;
            border: 1px solid rgba(0, 255, 255, 0.4);
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
            scroll-snap-align: start;
        }
        .profile-card:hover {
            transform: translateY(-5px);
        }

        .avatar {
            width: 100px;
            height: 100px;
            margin: 0 auto 16px;
            background: linear-gradient(145deg, #2a3a55, #101826);
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5), 0 0 0 3px rgba(0,255,255,0.6);
            transition: transform 0.3s;
        }
        .avatar:hover {
            transform: rotateY(8deg) scale(1.02);
        }
        .avatar .emoji {
            font-size: 60px;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 60px;
        }

        .player-name {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, #FFD966, #FFA559);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .player-stats {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .stat {
            background: rgba(0,0,0,0.5);
            border-radius: 40px;
            padding: 6px 14px;
            font-weight: bold;
            font-size: 14px;
            backdrop-filter: blur(4px);
        }
        .stat span:first-child {
            color: #ffcc66;
            margin-right: 6px;
        }

        /* ГОРИЗОНТАЛЬНОЕ МЕНЮ (свайп влево/вправо) */
        .menu-wrapper {
            margin: 10px 0 30px 0;
            scroll-snap-align: start;
        }
        .menu-title {
            font-size: 20px;
            margin: 0 16px 12px 16px;
            color: #ffdd99;
            letter-spacing: 1px;
        }
        .horizontal-menu {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            gap: 16px;
            padding: 8px 16px 20px 16px;
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
        }
        .horizontal-menu::-webkit-scrollbar {
            height: 4px;
        }
        .horizontal-menu::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
        }
        .horizontal-menu::-webkit-scrollbar-thumb {
            background: #ffaa44;
            border-radius: 10px;
        }

        /* Карточка функции (кнопка) в горизонтальном меню */
        .game-btn {
            flex: 0 0 auto;
            width: 100px;
            background: rgba(25, 35, 55, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 255, 255, 0.4);
            border-radius: 32px;
            padding: 16px 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            scroll-snap-align: start;
            transform: scale(1);
        }
        .game-btn:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: #ffaa88;
            box-shadow: 0 15px 20px -8px rgba(0,0,0,0.4);
        }
        .btn-emoji {
            font-size: 40px;
            filter: drop-shadow(0 2px 4px black);
        }
        .btn-label {
            font-size: 12px;
            font-weight: 600;
            color: #eef5ff;
            text-align: center;
        }
        .casino-btn {
            background: linear-gradient(145deg, #2a1e2a, #1a1022);
            border-color: #ffaa66;
        }
        .casino-btn .btn-label {
            color: #ffdd99;
        }

        .footer {
            text-align: center;
            font-size: 11px;
            color: #5f7f9f;
            margin: 20px 0 40px;
            scroll-snap-align: end;
        }
    </style>
</head>
<body>

<canvas id="canvas-bg"></canvas>

<div class="game-container">
    <div class="profile-card">
        <div class="avatar" id="avatarContainer">
            <div class="emoji" id="avatarEmoji">👔</div>
            <img id="avatarImg" style="display: none;" alt="skin">
        </div>
        <div class="player-name" id="playerName">Загрузка...</div>
        <div class="player-stats">
            <div class="stat"><span>💰</span> <span id="balance">0</span> ₽</div>
            <div class="stat"><span>📦</span> <span id="salesCount">0</span> продаж</div>
            <div class="stat"><span>⭐</span> <span id="rating">Новичок</span></div>
        </div>
    </div>

    <div class="menu-wrapper">
        <div class="menu-title">⚡ ОСНОВНЫЕ ФУНКЦИИ</div>
        <div class="horizontal-menu" id="gameGrid"></div>
    </div>

    <div class="footer">⚡ Resell Tycoon · твой бизнес с нуля</div>
</div>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js';

    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    // ---------- НАСТРОЙКИ ----------
    const API_BASE = "https://nl12.bothost.ru";
    const USE_REAL_API = false;
    const userId = tg.initDataUnsafe?.user?.id || 1475910449;

    // ---------- МОК-ДАННЫЕ ----------
    let mockBalance = 50000;
    let mockNickname = "Барыга";
    let mockSales = 0;
    let mockSkinId = "default";
    const skinMap = {
        'default': { emoji: '👶', url: null },
        'hustler': { emoji: '😎', url: null },
        'boss': { emoji: '🕴️', url: null },
        'coffee': { emoji: '💻', url: null },
        'cyber': { emoji: '🤖', url: null },
        'legend': { emoji: '👑', url: null },
        'creator': { emoji: '💎', url: null }
    };

    // Все пункты меню (кроме казино, потом добавим отдельно)
    const menuSections = [
        { emoji: "🏭", label: "ЗАКУП", link: "suppliers.html" },
        { emoji: "📦", label: "ИНВЕНТАРЬ", link: "inventory.html" },
        { emoji: "🚗", label: "АВТО", link: "cars.html" },
        { emoji: "🏠", label: "ДОМА", link: "realestate.html" },
        { emoji: "🏪", label: "МАГАЗИНЫ", link: "shops.html" },
        { emoji: "🚕", label: "ТАКСОПАРК", link: "taxopark.html" },
        { emoji: "📈", label: "ТРЕЙДИНГ", link: "trading.html" },
        { emoji: "🏎️", label: "ГОНКИ", link: "racing.html" },
        { emoji: "🔨", label: "АУКЦИОН", link: "auction.html" },
        { emoji: "👥", label: "ДРУЗЬЯ", link: "friends.html" },
        { emoji: "🔗", label: "РЕФЕРАЛЫ", link: "referral.html" },
        { emoji: "🏆", label: "ЛИДЕРЫ", link: "leaderboard.html" },
        { emoji: "🎯", label: "ДОСТИЖЕНИЯ", link: "achievements.html" }
    ];
    const casinoItem = { emoji: "🎰", label: "КАЗИНО", link: "casino.html", extraClass: "casino-btn" };

    function renderMenu() {
        const container = document.getElementById('gameGrid');
        if (!container) return;
        container.innerHTML = '';
        // Основные пункты
        [...menuSections, casinoItem].forEach((item) => {
            const btn = document.createElement('button');
            btn.className = 'game-btn' + (item.extraClass ? ' ' + item.extraClass : '');
            btn.innerHTML = `<div class="btn-emoji">${item.emoji}</div><div class="btn-label">${item.label}</div>`;
            btn.onclick = () => {
                if (item.link) window.location.href = item.link;
                else tg.showAlert(`Раздел "${item.label}" в разработке`);
            };
            container.appendChild(btn);
        });
    }

    async function loadProfile() {
        // Мок-данные (или реальный API после отладки)
        document.getElementById('balance').innerText = mockBalance.toLocaleString();
        document.getElementById('playerName').innerText = mockNickname;
        document.getElementById('salesCount').innerText = mockSales;
        document.getElementById('rating').innerText = 'Новичок';
        const skin = skinMap[mockSkinId] || { emoji: '👔', url: null };
        document.getElementById('avatarEmoji').innerText = skin.emoji;
        document.getElementById('avatarEmoji').style.display = 'flex';
        document.getElementById('avatarImg').style.display = 'none';
    }

    renderMenu();
    loadProfile();

    // ========= 3D ФОН С ДЕНЬГАМИ =========
    const canvas = document.getElementById('canvas-bg');
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);

    const scene = new THREE.Scene();
    scene.background = null;

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 18);
    camera.lookAt(0, 0, 0);

    // Группа для вращения
    const moneyGroup = new THREE.Group();
    scene.add(moneyGroup);

    // Текстурa для монет (золотой круг с символом $)
    const createCoinTexture = () => {
        const canvasTex = document.createElement('canvas');
        canvasTex.width = 512;
        canvasTex.height = 512;
        const ctx = canvasTex.getContext('2d');
        ctx.fillStyle = '#FFD700';
        ctx.arc(256, 256, 240, 0, 2 * Math.PI);
        ctx.fill();
        ctx.strokeStyle = '#B8860B';
        ctx.lineWidth = 20;
        ctx.arc(256, 256, 220, 0, 2 * Math.PI);
        ctx.stroke();
        ctx.fillStyle = '#B8860B';
        ctx.font = 'Bold 280px "Segoe UI"';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('$', 256, 280);
        return new THREE.CanvasTexture(canvasTex);
    };

    const coinTexture = createCoinTexture();
    const coinMaterial = new THREE.MeshStandardMaterial({ map: coinTexture, metalness: 0.85, roughness: 0.3 });
    const billMaterial = new THREE.MeshStandardMaterial({ color: 0x55aa55, metalness: 0.1, roughness: 0.5 });

    // Монеты
    for (let i = 0; i < 200; i++) {
        const geometry = new THREE.CylinderGeometry(0.35, 0.35, 0.08, 32);
        const coin = new THREE.Mesh(geometry, coinMaterial);
        coin.position.x = (Math.random() - 0.5) * 30;
        coin.position.y = (Math.random() - 0.5) * 20;
        coin.position.z = (Math.random() - 0.5) * 15 - 5;
        coin.rotation.x = Math.random() * Math.PI;
        coin.rotation.z = Math.random() * Math.PI;
        moneyGroup.add(coin);
    }

    // Купюры (тонкие параллелепипеды с зелёным цветом)
    for (let i = 0; i < 80; i++) {
        const geometry = new THREE.BoxGeometry(0.6, 0.05, 0.9);
        const bill = new THREE.Mesh(geometry, billMaterial);
        bill.position.x = (Math.random() - 0.5) * 28;
        bill.position.y = (Math.random() - 0.5) * 18;
        bill.position.z = (Math.random() - 0.5) * 12 - 5;
        bill.rotation.x = Math.random() * Math.PI;
        bill.rotation.y = Math.random() * Math.PI;
        moneyGroup.add(bill);
    }

    // Освещение
    const ambient = new THREE.AmbientLight(0x404060);
    scene.add(ambient);
    const mainLight = new THREE.DirectionalLight(0xffcc88, 1.2);
    mainLight.position.set(2, 5, 3);
    scene.add(mainLight);
    const fillLight = new THREE.PointLight(0x4488ff, 0.5);
    fillLight.position.set(-2, 1, 4);
    scene.add(fillLight);
    const backLight = new THREE.PointLight(0xffaa66, 0.4);
    backLight.position.set(0, 0, -5);
    scene.add(backLight);

    let time = 0;
    function animateMoney() {
        requestAnimationFrame(animateMoney);
        time += 0.008;
        moneyGroup.rotation.y = time * 0.15;
        moneyGroup.rotation.x = Math.sin(time * 0.2) * 0.1;
        moneyGroup.rotation.z = Math.cos(time * 0.18) * 0.05;
        renderer.render(scene, camera);
    }
    animateMoney();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
