<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Resell Tycoon — Главная</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at 30% 10%, #0c1120, #020408);
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* основной контейнер */
        .game-container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* карточка профиля (центр) */
        .profile-card {
            background: rgba(12, 20, 35, 0.75);
            backdrop-filter: blur(16px);
            border-radius: 64px;
            padding: 24px 20px 28px;
            text-align: center;
            border: 1px solid rgba(0, 255, 255, 0.35);
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(0, 255, 255, 0.1) inset;
            transition: transform 0.2s ease;
        }

        /* аватар / скин */
        .avatar {
            width: 110px;
            height: 110px;
            margin: 0 auto 16px;
            background: linear-gradient(145deg, #2a3a55, #101826);
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 68px;
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.5), 0 0 0 3px rgba(0, 255, 255, 0.6);
            transition: 0.2s;
        }

        .player-name {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #FFD966, #FFA559);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .player-stats {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .stat {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 40px;
            padding: 6px 16px;
            font-weight: bold;
            font-size: 15px;
            color: #c0e0ff;
        }

        .stat span {
            color: #ffcc66;
            font-size: 18px;
            margin-right: 6px;
        }

        /* сетка кнопок (игровое меню) */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(105px, 1fr));
            gap: 14px;
            background: rgba(8, 14, 22, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 56px;
            padding: 24px 20px;
            border: 1px solid rgba(0, 255, 255, 0.25);
        }

        .game-btn {
            background: linear-gradient(145deg, #1e2a3a, #0f1722);
            border: none;
            border-radius: 40px;
            padding: 12px 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.12s linear;
            box-shadow: 0 5px 8px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        .game-btn:active {
            transform: scale(0.96);
            background: linear-gradient(145deg, #2a3e52, #18212f);
            border-color: #ffaa44;
        }

        .btn-emoji {
            font-size: 34px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        .btn-label {
            font-size: 13px;
            font-weight: 600;
            color: #eef5ff;
            letter-spacing: 0.3px;
        }

        /* казино выделим другим цветом */
        .casino-btn {
            background: linear-gradient(145deg, #2a1e2a, #1a1022);
            border-color: #ffaa66;
        }
        .casino-btn .btn-label {
            color: #ffdd99;
        }

        /* нижняя информация */
        .footer-info {
            text-align: center;
            font-size: 11px;
            color: #5f7f9f;
            padding: 10px;
        }

        /* лоадер */
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #ffcc66;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="game-container">
    <!-- Центральный профиль -->
    <div class="profile-card">
        <div class="avatar" id="avatarEmoji">👔</div>
        <div class="player-name" id="playerName">Загрузка...</div>
        <div class="player-stats">
            <div class="stat"><span>💰</span> <span id="balance">0</span> ₽</div>
            <div class="stat"><span>📦</span> <span id="salesCount">0</span> продаж</div>
            <div class="stat"><span>⭐</span> <span id="rating">Новичок</span></div>
        </div>
    </div>

    <!-- Игровое меню (плитка) -->
    <div class="menu-grid" id="gameGrid">
        <!-- кнопки будут сгенерированы через js, но можно и статикой, но лучше динамически -->
    </div>
    <div class="footer-info">
        ⚡ Resell Tycoon · твой бизнес с нуля
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    // ------------------- НАСТРОЙКИ --------------------
    // Адрес API (новый домен, но пока ещё может не работать, добавим fallback)
    const API_BASE = "https://api.resgame.ru";
    const FALLBACK_API = "https://nl12.bothost.ru";   // старый адрес, но там нужен токен
    const USE_FALLBACK = false;   // если true, то запросы пойдут на fallback с токеном (пока false)

    // Токен для fallback (если потребуется) – возьмём из переменной бота (но мы его не знаем, можно использовать тот, что давали ранее)
    // Поскольку мы ждём настройку домена, то пока просто покажем ошибку, но не будем ломать интерфейс.
    // Лучше получить данные через прямое API с новым доменом (как только заработает).
    // Для красоты отобразим заглушку, но запрос всё равно сделаем.

    const userId = tg.initDataUnsafe?.user?.id || 1475910449; // fallback id, если не из webapp

    // Список разделов (иконки, названия, ссылки)
    const menuSections = [
        { emoji: "🏭", label: "ЗАКУП", link: "suppliers.html" },
        { emoji: "📦", label: "ИНВЕНТАРЬ", link: "inventory.html" },
        { emoji: "🚗", label: "АВТО", link: "cars.html" },
        { emoji: "🏠", label: "ДОМА", link: "realestate.html" },
        { emoji: "🏪", label: "МАГАЗИНЫ", link: "shops.html" },
        { emoji: "🚕", label: "ТАКСОПАРК", link: "taxopark.html" },
        { emoji: "📈", label: "ТРЕЙДИНГ", link: "trading.html" },
        { emoji: "🏎️", label: "ГОНКИ", link: "races.html" },
        { emoji: "🔨", label: "АУКЦИОН", link: "auction.html" },
        { emoji: "👥", label: "ДРУЗЬЯ", link: "friends.html" },
        { emoji: "🔗", label: "РЕФЕРАЛЫ", link: "referral.html" },
        { emoji: "🏆", label: "ЛИДЕРЫ", link: "leaderboard.html" },
        { emoji: "🎯", label: "ДОСТИЖЕНИЯ", link: "achievements.html" }
    ];

    // Казино добавим отдельно внизу или внутри, но для удобства сделаем отдельную кнопку в конце
    const casinoItem = { emoji: "🎰", label: "КАЗИНО", link: "casino/index.html", extraClass: "casino-btn" };

    // Рендер сетки
    function renderMenu() {
        const grid = document.getElementById('gameGrid');
        if (!grid) return;
        grid.innerHTML = '';
        // Добавляем обычные разделы
        menuSections.forEach(section => {
            const btn = document.createElement('button');
            btn.className = 'game-btn';
            btn.innerHTML = `<div class="btn-emoji">${section.emoji}</div><div class="btn-label">${section.label}</div>`;
            btn.onclick = () => {
                // если страницы нет, можно показать уведомление, но временно просто переход (потом создадим)
                if (section.link) {
                    window.location.href = section.link;
                } else {
                    tg.showAlert(`Раздел "${section.label}" в разработке`);
                }
            };
            grid.appendChild(btn);
        });
        // Добавляем казино (стилизовано)
        const casinoBtn = document.createElement('button');
        casinoBtn.className = 'game-btn casino-btn';
        casinoBtn.innerHTML = `<div class="btn-emoji">${casinoItem.emoji}</div><div class="btn-label">${casinoItem.label}</div>`;
        casinoBtn.onclick = () => {
            window.location.href = casinoItem.link;
        };
        grid.appendChild(casinoBtn);
    }

    // Функция запроса к API (универсальная, с поддержкой fallback и токена)
    async function fetchAPI(endpoint, retries = 1) {
        const url = `${API_BASE}${endpoint}&tg_id=${userId}`;
        // Пробуем запрос без токена (новый домен)
        try {
            const resp = await fetch(url, {
                headers: { 'Content-Type': 'application/json' }
            });
            if (resp.ok) {
                const data = await resp.json();
                return { ok: true, data };
            }
            // Если 401 или 404, возможно домен ещё не привязан – пробуем fallback
            if (resp.status === 401 || resp.status === 404) {
                throw new Error("Unauthorized or not found");
            }
            const errText = await resp.text();
            throw new Error(errText);
        } catch (err) {
            if (retries > 0 && USE_FALLBACK) {
                // Пробуем fallback с токеном (если известен)
                const fallbackUrl = `${FALLBACK_API}${endpoint}&tg_id=${userId}`;
                // токен возьмём из того, что ранее пробовали (возможно, bota)
                // Но мы не знаем точный токен, поэтому лучше просто вернуть заглушку
                console.warn("Fallback attempt", err);
                // Временно возвращаем заглушку, чтобы интерфейс не ломался
                return { ok: false, data: null, error: "API временно недоступно" };
            }
            return { ok: false, data: null, error: err.message };
        }
    }

    // Загрузка профиля
    async function loadProfile() {
        // Покажем лоадер в балансе
        const balanceSpan = document.getElementById('balance');
        const nameSpan = document.getElementById('playerName');
        const salesSpan = document.getElementById('salesCount');
        const ratingSpan = document.getElementById('rating');
        const avatarDiv = document.getElementById('avatarEmoji');
        
        balanceSpan.innerText = '?';
        nameSpan.innerText = 'Загрузка...';
        
        // Запрос к /api/me
        const result = await fetchAPI('/api/me');
        if (result.ok && result.data) {
            const data = result.data;
            balanceSpan.innerText = (data.balance || 0).toLocaleString();
            nameSpan.innerText = data.nickname || 'Торгаш';
            salesSpan.innerText = data.items_sold || data.total_sales || 0;
            // рейтинг (на основе продаж)
            let ratingText = 'Новичок';
            const sales = data.items_sold || data.total_sales || 0;
            if (sales >= 100) ratingText = '💎 Легенда';
            else if (sales >= 50) ratingText = '👑 Профи';
            else if (sales >= 15) ratingText = '⭐ Опытный';
            else if (sales >= 5) ratingText = '🔰 Торговец';
            ratingSpan.innerText = ratingText;
            // скин эмодзи (из данных скина)
            let skinEmoji = '👔';
            if (data.skin) {
                // Заглушка: можно подобрать по id скина (позже доработаем)
                const skinMap = {
                    'default': '👶',
                    'hustler': '😎',
                    'boss': '🕴️',
                    'coffee': '💻',
                    'cyber': '🤖',
                    'legend': '👑',
                    'creator': '💎'
                };
                skinEmoji = skinMap[data.skin] || '👔';
            }
            avatarDiv.innerText = skinEmoji;
        } else {
            // Если API не работает, покажем демо-данные (чтобы интерфейс не был пустым)
            balanceSpan.innerText = '5 000';
            nameSpan.innerText = 'Барыга';
            salesSpan.innerText = '0';
            ratingSpan.innerText = 'Новичок';
            avatarDiv.innerText = '👔';
            tg.showAlert('⚠️ API временно недоступно, отображаются демо-данные. Мы работаем над подключением домена.');
        }
    }

    // Дополнительно можно подгрузить репутацию, но пока хватит.
    renderMenu();
    loadProfile();
</script>
</body>
</html>
