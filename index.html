<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>R-Game CASINO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
            font-family: 'Segoe UI', 'Poppins', system-ui, 'Apple Color Emoji', sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 36px;
            background: linear-gradient(135deg, #ffcc44, #ff6644);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .stats {
            background: rgba(0,0,0,0.5);
            border-radius: 30px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-around;
            backdrop-filter: blur(10px);
        }
        .stat {
            text-align: center;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #ffcc44;
        }
        .stat-label {
            font-size: 12px;
            color: #aaa;
        }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .game-card {
            background: linear-gradient(145deg, rgba(30,40,60,0.9), rgba(15,25,40,0.95));
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(0,255,255,0.3);
            transition: all 0.2s;
            cursor: pointer;
        }
        .game-card:active {
            transform: scale(0.96);
        }
        .game-emoji {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .game-name {
            font-size: 18px;
            font-weight: bold;
            color: white;
            margin-bottom: 5px;
        }
        .game-desc {
            font-size: 11px;
            color: #88aaff;
        }
        .balance {
            background: rgba(0,0,0,0.6);
            border-radius: 50px;
            padding: 12px 20px;
            margin-top: 20px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            color: #ffcc44;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 11px;
            color: #666;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🎰 R-Game CASINO</h1>
    </div>
    
    <div class="stats" id="stats">
        <div class="stat">
            <div class="stat-value" id="gamesPlayed">0</div>
            <div class="stat-label">Игр сыграно</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="totalBet">0</div>
            <div class="stat-label">Ставок (₽)</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="totalWin">0</div>
            <div class="stat-label">Выигрыш (₽)</div>
        </div>
    </div>
    
    <div class="games-grid">
        <div class="game-card" onclick="openGame('crash')">
            <div class="game-emoji">💥</div>
            <div class="game-name">КРАШ</div>
            <div class="game-desc">Множитель до x10</div>
        </div>
        <div class="game-card" onclick="openGame('slots')">
            <div class="game-emoji">🎰</div>
            <div class="game-name">СЛОТЫ</div>
            <div class="game-desc">Джекпот x20</div>
        </div>
        <div class="game-card" onclick="openGame('roulette')">
            <div class="game-emoji">🎡</div>
            <div class="game-name">РУЛЕТКА</div>
            <div class="game-desc">x35 на число</div>
        </div>
        <div class="game-card" onclick="openGame('blackjack')">
            <div class="game-emoji">🃏</div>
            <div class="game-name">БЛЭКДЖЕК</div>
            <div class="game-desc">21 очко</div>
        </div>
        <div class="game-card" onclick="openGame('mines')">
            <div class="game-emoji">💣</div>
            <div class="game-name">МАЙНЁР</div>
            <div class="game-desc">5x5, найди мины</div>
        </div>
    </div>
    
    <div class="balance" id="balance">💰 ЗАГРУЗКА...</div>
    <div class="footer">⚡ Выбери игру и испытай удачу!</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    
    const BASE_URL = window.location.origin;
    
    function openGame(game) {
        tg.sendData(JSON.stringify({ action: 'open_game', game: game }));
    }
    
    // Получаем данные пользователя через бота
    tg.sendData(JSON.stringify({ action: 'get_stats' }));
    
    tg.onEvent('web_app_data', (event) => {
        try {
            const data = JSON.parse(event.data);
            if (data.action === 'stats') {
                document.getElementById('gamesPlayed').innerText = data.games_played || 0;
                document.getElementById('totalBet').innerText = (data.total_bet || 0).toLocaleString();
                document.getElementById('totalWin').innerText = (data.total_win || 0).toLocaleString();
                document.getElementById('balance').innerHTML = `💰 БАЛАНС: ${(data.balance || 0).toLocaleString()} ₽`;
            }
            else if (data.action === 'open_game') {
                window.location.href = `${BASE_URL}/${data.game}.html?bet=${data.bet || 0}`;
            }
        } catch(e) {
            console.error(e);
        }
    });
</script>
</body>
</html>
