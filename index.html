<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Resell Tycoon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s ease, color 0.2s ease, transform 0.2s ease;
        }

        /* === ТЁМНАЯ ТЕМА (по умолчанию) === */
        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0a0a1a;
            color: #f0f0f0;
            padding: 20px;
            min-height: 100vh;
        }

        /* === СВЕТЛАЯ ТЕМА (активируется классом .light) === */
        body.light {
            background: #f5f7fa;
            color: #1e1e2a;
        }
        body.light .card {
            background: #ffffff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        body.light button {
            background: linear-gradient(135deg, #6b47dc, #3b82f6);
            color: white;
        }
        body.light .toggle-theme {
            background: #e0e0e0;
            color: #1e1e2a;
        }

        /* === ПЕРЕКЛЮЧАТЕЛЬ ТЕМЫ === */
        .toggle-theme {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #2a2a3a;
            border: none;
            border-radius: 40px;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
        }
        .toggle-theme:active {
            transform: scale(0.96);
        }

        /* === КАРТОЧКИ ТОВАРОВ === */
        .card {
            background: #1e1e2e;
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            animation: fadeInUp 0.4s ease;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 28px rgba(0,0,0,0.5);
        }
        .card h3 {
            font-size: 18px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card .price {
            font-size: 22px;
            font-weight: bold;
            color: #f5b042;
            margin: 8px 0;
        }
        .card .cat {
            font-size: 13px;
            opacity: 0.7;
            margin-bottom: 12px;
        }

        /* === ГРАДИЕНТНЫЕ КНОПКИ === */
        button, .btn {
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            border: none;
            border-radius: 40px;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        button:active {
            transform: scale(0.97);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .btn-secondary {
            background: linear-gradient(135deg, #4a5568, #2d3748);
        }

        /* === АНИМАЦИИ === */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .loader {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* === КОНТЕЙНЕРЫ === */
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .balance {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
            background: rgba(0,0,0,0.2);
            padding: 12px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }
    </style>
</head>
<body>
    <button class="toggle-theme" id="themeToggle">🌙 Тёмная тема</button>
    <div class="container">
        <div class="balance" id="balance">💰 Загрузка...</div>
        <div id="inventory">
            <h2>📦 Ваши товары</h2>
            <div id="itemsList" class="grid">Загрузка...</div>
        </div>
    </div>

    <script>
        // Получаем tg_id из URL
        const urlParams = new URLSearchParams(window.location.search);
        const tg_id = urlParams.get('user_id') || (window.Telegram?.WebApp?.initDataUnsafe?.user?.id);

        if (!tg_id) {
            document.body.innerHTML = '<div style="padding:20px">❌ Ошибка: не удалось определить пользователя</div>';
        }

        // === Управление темой ===
        const themeToggle = document.getElementById('themeToggle');
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            document.body.classList.add('light');
            themeToggle.innerHTML = '☀️ Светлая тема';
        } else {
            document.body.classList.remove('light');
            themeToggle.innerHTML = '🌙 Тёмная тема';
        }
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light');
            const isLight = document.body.classList.contains('light');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            themeToggle.innerHTML = isLight ? '☀️ Светлая тема' : '🌙 Тёмная тема';
        });

        // === Анимация загрузки ===
        function showLoader(elementId) {
            const el = document.getElementById(elementId);
            if (el) el.innerHTML = '<div class="loader" style="margin:20px auto; display:block;"></div>';
        }

        // === Загрузка баланса и инвентаря ===
        async function loadData() {
            // 1. Баланс
            try {
                const meRes = await fetch(`/api/me?tg_id=${tg_id}`);
                if (!meRes.ok) throw new Error('API /me error');
                const me = await meRes.json();
                document.getElementById('balance').innerHTML = `💰 ${me.balance?.toLocaleString()}₽ &nbsp;|&nbsp; 👤 ${me.nickname || 'Игрок'}`;
            } catch (e) {
                document.getElementById('balance').innerHTML = '⚠️ Ошибка загрузки баланса';
                console.error(e);
            }

            // 2. Инвентарь
            showLoader('itemsList');
            try {
                const invRes = await fetch(`/api/inventory?tg_id=${tg_id}`);
                if (!invRes.ok) throw new Error('API inventory error');
                const inv = await invRes.json();
                const items = inv.inventory || [];
                if (items.length === 0) {
                    document.getElementById('itemsList').innerHTML = '<div class="card">📭 Инвентарь пуст. Купите товары у поставщика!</div>';
                } else {
                    let html = '';
                    items.forEach((item, idx) => {
                        html += `
                            <div class="card">
                                <h3>${item.name}</h3>
                                <div class="price">${item.market_price?.toLocaleString()}₽</div>
                                <div class="cat">${item.cat || 'Категория'}</div>
                                <button class="btn" onclick="sellItem(${idx})">Продать</button>
                            </div>
                        `;
                    });
                    document.getElementById('itemsList').innerHTML = html;
                }
            } catch (e) {
                document.getElementById('itemsList').innerHTML = '<div class="card">❌ Ошибка загрузки инвентаря</div>';
                console.error(e);
            }
        }

        // === Продажа товара ===
        window.sellItem = async (itemIndex) => {
            try {
                const res = await fetch(`/api/sell?tg_id=${tg_id}&item_index=${itemIndex}`, { method: 'POST' });
                const data = await res.json();
                if (res.ok) {
                    alert(`✅ Продано! +${data.profit}₽`);
                    loadData(); // обновить баланс и инвентарь
                } else {
                    alert(`❌ Ошибка: ${data.detail || 'неизвестная'}`);
                }
            } catch (e) {
                alert('Ошибка сети');
            }
        };

        loadData();
    </script>
</body>
</html>
