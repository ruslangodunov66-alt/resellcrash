<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Resell Tycoon — Главная</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at 30% 10%, #0c1120, #020408);
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* основной контейнер */
        .game-container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* карточка профиля (центр) */
        .profile-card {
            background: rgba(12, 20, 35, 0.75);
            backdrop-filter: blur(16px);
            border-radius: 64px;
            padding: 24px 20px 28px;
            text-align: center;
            border: 1px solid rgba(0, 255, 255, 0.35);
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(0, 255, 255, 0.1) inset;
            transition: transform 0.2s ease;
        }

        /* аватар / скин */
        .avatar {
            width: 110px;
            height: 110px;
            margin: 0 auto 16px;
            background: linear-gradient(145deg, #2a3a55, #101826);
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0;
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.5), 0 0 0 3px rgba(0, 255, 255, 0.6);
            overflow: hidden;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .avatar .emoji {
            font-size: 68px;
        }

        .player-name {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #FFD966, #FFA559);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .player-stats {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .stat {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 40px;
            padding: 6px 16px;
            font-weight: bold;
            font-size: 15px;
            color: #c0e0ff;
        }

        .stat span {
            color: #ffcc66;
            font-size: 18px;
            margin-right: 6px;
        }

        /* сетка кнопок (игровое меню) */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(105px, 1fr));
            gap: 14px;
            background: rgba(8, 14, 22, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 56px;
            padding: 24px 20px;
            border: 1px solid rgba(0, 255, 255, 0.25);
        }

        .game-btn {
            background: linear-gradient(145deg, #1e2a3a, #0f1722);
            border: none;
            border-radius: 40px;
            padding: 12px 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.12s linear;
            box-shadow: 0 5px 8px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        .game-btn:active {
            transform: scale(0.96);
            background: linear-gradient(145deg, #2a3e52, #18212f);
            border-color: #ffaa44;
        }

        .btn-emoji {
            font-size: 34px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        .btn-label {
            font-size: 13px;
            font-weight: 600;
            color: #eef5ff;
            letter-spacing: 0.3px;
        }

        /* казино выделим другим цветом */
        .casino-btn {
            background: linear-gradient(145deg, #2a1e2a, #1a1022);
            border-color: #ffaa66;
        }
        .casino-btn .btn-label {
            color: #ffdd99;
        }

        /* нижняя информация */
        .footer-info {
            text-align: center;
            font-size: 11px;
            color: #5f7f9f;
            padding: 10px;
        }

        /* лоадер */
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #ffcc66;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="game-container">
    <div class="profile-card">
        <div class="avatar" id="avatarContainer">
            <div class="emoji" id="avatarEmoji">👔</div>
            <img id="avatarImg" style="display: none;" alt="skin">
        </div>
        <div class="player-name" id="playerName">Загрузка...</div>
        <div class="player-stats">
            <div class="stat"><span>💰</span> <span id="balance">0</span> ₽</div>
            <div class="stat"><span>📦</span> <span id="salesCount">0</span> продаж</div>
            <div class="stat"><span>⭐</span> <span id="rating">Новичок</span></div>
        </div>
    </div>

    <div class="menu-grid" id="gameGrid">
        <!-- кнопки будут сгенерированы через js -->
    </div>
    <div class="footer-info">
        ⚡ Resell Tycoon · твой бизнес с нуля
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    // ------------------- НАСТРОЙКИ --------------------
    // Адрес API (новый домен, пока может не работать)
    const API_BASE = "https://api.resgame.ru";
    // Если API не доступен, используем мок-данные для отображения
    const USE_MOCK = true;   // пока true, чтобы интерфейс был красивым
    // ------------------- КОНЕЦ НАСТРОЕК --------------

    const userId = tg.initDataUnsafe?.user?.id || 1475910449;

    // Список разделов (иконки, названия, ссылки)
    const menuSections = [
        { emoji: "🏭", label: "ЗАКУП", link: "suppliers.html" },
        { emoji: "📦", label: "ИНВЕНТАРЬ", link: "inventory.html" },
        { emoji: "🚗", label: "АВТО", link: "cars.html" },
        { emoji: "🏠", label: "ДОМА", link: "realestate.html" },
        { emoji: "🏪", label: "МАГАЗИНЫ", link: "shops.html" },
        { emoji: "🚕", label: "ТАКСОПАРК", link: "taxopark.html" },
        { emoji: "📈", label: "ТРЕЙДИНГ", link: "trading.html" },
        { emoji: "🏎️", label: "ГОНКИ", link: "races.html" },
        { emoji: "🔨", label: "АУКЦИОН", link: "auction.html" },
        { emoji: "👥", label: "ДРУЗЬЯ", link: "friends.html" },
        { emoji: "🔗", label: "РЕФЕРАЛЫ", link: "referral.html" },
        { emoji: "🏆", label: "ЛИДЕРЫ", link: "leaderboard.html" },
        { emoji: "🎯", label: "ДОСТИЖЕНИЯ", link: "achievements.html" }
    ];

    const casinoItem = { emoji: "🎰", label: "КАЗИНО", link: "casino/index.html", extraClass: "casino-btn" };

    function renderMenu() {
        const grid = document.getElementById('gameGrid');
        if (!grid) return;
        grid.innerHTML = '';
        menuSections.forEach(section => {
            const btn = document.createElement('button');
            btn.className = 'game-btn';
            btn.innerHTML = `<div class="btn-emoji">${section.emoji}</div><div class="btn-label">${section.label}</div>`;
            btn.onclick = () => {
                if (section.link) {
                    window.location.href = section.link;
                } else {
                    tg.showAlert(`Раздел "${section.label}" в разработке`);
                }
            };
            grid.appendChild(btn);
        });
        const casinoBtn = document.createElement('button');
        casinoBtn.className = 'game-btn casino-btn';
        casinoBtn.innerHTML = `<div class="btn-emoji">${casinoItem.emoji}</div><div class="btn-label">${casinoItem.label}</div>`;
        casinoBtn.onclick = () => {
            window.location.href = casinoItem.link;
        };
        grid.appendChild(casinoBtn);
    }

    // Функция запроса к API (универсальная)
    async function fetchAPI(endpoint) {
        if (USE_MOCK) return null;
        const url = `${API_BASE}${endpoint}&tg_id=${userId}`;
        try {
            const resp = await fetch(url);
            if (!resp.ok) throw new Error(await resp.text());
            return await resp.json();
        } catch (err) {
            console.warn("API не доступно, используем мок-данные", err);
            return null;
        }
    }

    async function loadProfile() {
        // Сначала пытаемся получить реальные данные
        let data = null;
        if (!USE_MOCK) data = await fetchAPI(`/api/me`);

        // Мок-данные, если API не ответил или USE_MOCK true
        if (!data) {
            data = {
                balance: 5000,
                nickname: "Барыга",
                total_sales: 0,
                skin: "default",
                skin_url: null
            };
        }

        const balanceSpan = document.getElementById('balance');
        const nameSpan = document.getElementById('playerName');
        const salesSpan = document.getElementById('salesCount');
        const ratingSpan = document.getElementById('rating');
        const avatarEmoji = document.getElementById('avatarEmoji');
        const avatarImg = document.getElementById('avatarImg');

        balanceSpan.innerText = (data.balance || 0).toLocaleString();
        nameSpan.innerText = data.nickname || 'Торгаш';
        salesSpan.innerText = data.total_sales || 0;

        let ratingText = 'Новичок';
        const sales = data.total_sales || 0;
        if (sales >= 100) ratingText = '💎 Легенда';
        else if (sales >= 50) ratingText = '👑 Профи';
        else if (sales >= 15) ratingText = '⭐ Опытный';
        else if (sales >= 5) ratingText = '🔰 Торговец';
        ratingSpan.innerText = ratingText;

        // Отображение аватара (скина)
        const skinId = data.skin || 'default';
        // Найдём скин в глобальном списке SKINS (который мы не передаём, поэтому используем карту)
        const skinMap = {
            'default': { emoji: '👶', url: null },
            'hustler': { emoji: '😎', url: null },
            'boss': { emoji: '🕴️', url: null },
            'coffee': { emoji: '💻', url: null },
            'cyber': { emoji: '🤖', url: null },
            'legend': { emoji: '👑', url: null },
            'creator': { emoji: '💎', url: null }
        };
        let skin = skinMap[skinId] || { emoji: '👔', url: null };
        // Если в реальных данных есть image_url и API_BASE работает, можно показать картинку
        if (data.image_url && !USE_MOCK) {
            avatarImg.src = `${API_BASE}/api/image/${data.image_url}`;
            avatarImg.style.display = 'block';
            avatarEmoji.style.display = 'none';
        } else {
            avatarEmoji.innerText = skin.emoji;
            avatarEmoji.style.display = 'flex';
            avatarImg.style.display = 'none';
        }
    }

    renderMenu();
    loadProfile();
</script>
</body>
</html>
