<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>КРАШ | R-Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0b1a2a 0%, #07121c 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            padding: 20px;
        }
        .game-card {
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(16px);
            border-radius: 48px;
            padding: 28px 20px 32px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            border: 1px solid rgba(46, 204, 113, 0.4);
            transition: all 0.2s ease;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
        }
        .crash-active .game-card {
            border-color: #e74c3c;
            box-shadow: 0 0 25px rgba(231,76,60,0.6);
        }
        .win-active .game-card {
            border-color: #f1c40f;
            box-shadow: 0 0 25px rgba(241,196,15,0.6);
        }
        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .rocket {
            font-size: 44px;
            animation: float 1.2s infinite alternate ease-in-out;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-8px); }
        }
        .title {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff9800, #ff5722);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }
        .bet-info {
            background: rgba(255,255,255,0.12);
            display: inline-block;
            padding: 8px 24px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 20px;
            backdrop-filter: blur(4px);
        }
        .multiplier {
            font-size: 5.2rem;
            font-weight: 800;
            margin: 20px 0;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            transition: 0.03s linear;
            text-shadow: 0 0 8px rgba(46,204,113,0.3);
        }
        .crash-active .multiplier {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            animation: shake 0.2s ease-in-out 0s 2;
        }
        .win-active .multiplier {
            background: linear-gradient(135deg, #f1c40f, #e67e22);
            animation: pulse 0.4s ease;
        }
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
            100% { transform: translateX(0); }
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); text-shadow: 0 0 20px gold; }
            100% { transform: scale(1); }
        }
        .input-group {
            margin: 12px 0;
        }
        .input-group input {
            width: 85%;
            padding: 14px;
            font-size: 1.2rem;
            border-radius: 60px;
            border: none;
            text-align: center;
            background: rgba(255,255,255,0.15);
            color: white;
            font-weight: 500;
            outline: none;
            transition: 0.2s;
        }
        .input-group input:focus {
            background: rgba(255,255,255,0.25);
        }
        button {
            border: none;
            padding: 14px 24px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            width: 85%;
            margin: 8px auto;
            transition: transform 0.1s, opacity 0.2s;
        }
        button:active {
            transform: scale(0.96);
        }
        button:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }
        .btn-start {
            background: #9b59b6;
            box-shadow: 0 5px 0 #6c3483;
        }
        .btn-cashout {
            background: #2ecc71;
            box-shadow: 0 5px 0 #27ae60;
        }
        .btn-repeat {
            background: #f39c12;
            box-shadow: 0 5px 0 #e67e22;
        }
        .btn-change {
            background: #3498db;
            box-shadow: 0 5px 0 #2980b9;
        }
        .status {
            margin-top: 20px;
            font-size: 0.95rem;
            min-height: 50px;
            font-weight: 500;
        }
        .hidden {
            display: none;
        }
        .flex-col {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        footer {
            font-size: 11px;
            opacity: 0.6;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="game-card" id="gameCard">
    <div class="header">
        <div class="rocket">🚀</div>
        <div class="title">R-Game CRASH</div>
    </div>
    <div class="bet-info">💰 СТАВКА: <span id="betDisplay">0</span> ₽</div>
    <div class="multiplier" id="counter">x1.00</div>
    <div class="flex-col">
        <div id="startGroup" class="input-group">
            <input type="number" id="betInput" placeholder="Сумма ставки (100–50000)" min="100" max="50000" step="100">
            <button id="startBtn" class="btn-start">🚀 НАЧАТЬ ИГРУ</button>
        </div>
        <div id="gameGroup" class="hidden">
            <button id="cashoutBtn" class="btn-cashout">💰 ЗАБРАТЬ</button>
            <button id="repeatBtn" class="btn-repeat hidden">🔄 ИГРАТЬ СНОВА</button>
            <button id="changeBetBtn" class="btn-change hidden">✏️ СМЕНИТЬ СТАВКУ</button>
        </div>
    </div>
    <div class="status" id="status"></div>
    <footer>⚡ множитель растёт | забери до краха</footer>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    tg.MainButton.hide();
    tg.BackButton.hide();

    // DOM элементы
    const startGroup = document.getElementById('startGroup');
    const gameGroup = document.getElementById('gameGroup');
    const betInput = document.getElementById('betInput');
    const startBtn = document.getElementById('startBtn');
    const cashoutBtn = document.getElementById('cashoutBtn');
    const repeatBtn = document.getElementById('repeatBtn');
    const changeBetBtn = document.getElementById('changeBetBtn');
    const betDisplay = document.getElementById('betDisplay');
    const counterDiv = document.getElementById('counter');
    const statusDiv = document.getElementById('status');
    const gameCard = document.getElementById('gameCard');

    let currentBet = 0;
    let crashPoint = 1.0;
    let currentMultiplier = 1.0;
    let gameActive = false;
    let intervalId = null;
    let pendingCashout = false;
    let timeoutId = null;

    function showError(msg) {
        statusDiv.innerHTML = `<span style="color:#ff6b6b;">❌ ${msg}</span>`;
        startBtn.disabled = false;
        if (timeoutId) clearTimeout(timeoutId);
    }
    function showSuccess(msg) {
        statusDiv.innerHTML = `<span style="color:#2ecc71;">✅ ${msg}</span>`;
    }
    function clearEffects() {
        gameCard.classList.remove('crash-active', 'win-active');
    }
    function startGameUI(bet, point) {
        if (intervalId) clearInterval(intervalId);
        currentBet = bet;
        crashPoint = point;
        currentMultiplier = 1.0;
        gameActive = true;
        pendingCashout = false;
        betDisplay.innerText = currentBet;
        updateCounterDisplay();
        startGroup.classList.add('hidden');
        gameGroup.classList.remove('hidden');
        cashoutBtn.disabled = false;
        repeatBtn.classList.add('hidden');
        changeBetBtn.classList.add('hidden');
        statusDiv.innerHTML = '';
        clearEffects();
        // Запуск роста множителя
        intervalId = setInterval(() => {
            if (!gameActive) return;
            currentMultiplier += 0.02;
            updateCounterDisplay();
            if (currentMultiplier >= crashPoint) {
                // КРАШ!
                clearInterval(intervalId);
                intervalId = null;
                gameActive = false;
                gameCard.classList.add('crash-active');
                counterDiv.innerHTML = `💥 x${crashPoint.toFixed(2)}`;
                cashoutBtn.disabled = true;
                repeatBtn.classList.remove('hidden');
                changeBetBtn.classList.remove('hidden');
                statusDiv.innerHTML = `<span style="color:#ff6b6b;">💔 КРАШ! Вы проиграли ${currentBet}₽</span>`;
                // Уведомляем бота о проигрыше (для статистики)
                tg.sendData(JSON.stringify({ action: 'crash', bet: currentBet }));
            }
        }, 100);
    }

    function updateCounterDisplay() {
        counterDiv.innerHTML = `x${currentMultiplier.toFixed(2)}`;
    }

    // Начало игры – отправка ставки боту
    startBtn.onclick = () => {
        if (startBtn.disabled) return;
        let bet = parseInt(betInput.value);
        if (isNaN(bet)) bet = 100;
        if (bet < 100) bet = 100;
        if (bet > 50000) bet = 50000;
        currentBet = bet;

        statusDiv.innerHTML = '⏳ Обработка ставки...';
        startBtn.disabled = true;

        timeoutId = setTimeout(() => {
            if (startBtn.disabled) {
                showError('Сервер не отвечает. Попробуйте позже.');
                startBtn.disabled = false;
            }
            timeoutId = null;
        }, 8000);

        tg.sendData(JSON.stringify({ action: 'start', bet: currentBet }));
    };

    // Забрать выигрыш
    cashoutBtn.onclick = () => {
        if (!gameActive || pendingCashout) return;
        pendingCashout = true;
        clearInterval(intervalId);
        intervalId = null;
        gameActive = false;
        cashoutBtn.disabled = true;
        tg.sendData(JSON.stringify({
            action: 'cashout',
            bet: currentBet,
            multiplier: currentMultiplier
        }));
        statusDiv.innerHTML = '⏳ Ожидание подтверждения...';
    };

    // Играть снова (та же ставка)
    repeatBtn.onclick = () => {
        if (pendingCashout) return;
        repeatBtn.disabled = true;
        changeBetBtn.disabled = true;
        statusDiv.innerHTML = '⏳ Запускаем новый раунд...';
        tg.sendData(JSON.stringify({ action: 'repeat', bet: currentBet }));
    };

    // Сменить ставку
    changeBetBtn.onclick = () => {
        tg.sendData(JSON.stringify({ action: 'change_bet' }));
        startGroup.classList.remove('hidden');
        gameGroup.classList.add('hidden');
        betInput.value = '';
        statusDiv.innerHTML = '💰 Введите новую сумму и нажмите НАЧАТЬ ИГРУ';
        if (intervalId) clearInterval(intervalId);
        intervalId = null;
        gameActive = false;
        pendingCashout = false;
        clearEffects();
    };

    // Обработка ответов от бота
    tg.onEvent('web_app_data', (event) => {
        try {
            const response = JSON.parse(event.data);
            if (timeoutId) {
                clearTimeout(timeoutId);
                timeoutId = null;
            }
            if (response.action === 'start_ready') {
                startBtn.disabled = false;
                startGameUI(response.bet, response.crash_point);
                showSuccess(`Ставка ${response.bet}₽ принята!`);
            }
            else if (response.action === 'repeat_ready') {
                repeatBtn.disabled = false;
                changeBetBtn.disabled = false;
                startGameUI(response.bet, response.crash_point);
                showSuccess(`Новый раунд! Ставка ${response.bet}₽`);
            }
            else if (response.action === 'cashout_ok') {
                const winAmount = response.win || Math.floor(currentBet * currentMultiplier);
                gameCard.classList.add('win-active');
                counterDiv.innerHTML = `✅ x${currentMultiplier.toFixed(2)} → ${winAmount}₽`;
                repeatBtn.classList.remove('hidden');
                changeBetBtn.classList.remove('hidden');
                statusDiv.innerHTML = `<span style="color:#2ecc71;">🎉 ВЫИГРЫШ! +${winAmount}₽</span>`;
                pendingCashout = false;
            }
            else if (response.action === 'crash_ok') {
                repeatBtn.classList.remove('hidden');
                changeBetBtn.classList.remove('hidden');
                pendingCashout = false;
            }
            else if (response.action === 'error') {
                showError(response.message);
                if (repeatBtn.classList.contains('hidden') && !gameActive) {
                    startBtn.disabled = false;
                } else {
                    repeatBtn.disabled = false;
                    changeBetBtn.disabled = false;
                }
                pendingCashout = false;
                if (!gameActive) {
                    startGroup.classList.remove('hidden');
                    gameGroup.classList.add('hidden');
                }
            }
        } catch(e) {
            console.error(e);
            showError('Ошибка связи с сервером');
            startBtn.disabled = false;
            if (timeoutId) clearTimeout(timeoutId);
        }
    });
</script>
</body>
</html>
