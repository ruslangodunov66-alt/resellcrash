<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Resell Tycoon - Главное меню</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at 30% 20%, #0a0e1a, #010101);
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* Верхняя плашка с балансом и профилем */
        .top-bar {
            background: linear-gradient(145deg, rgba(20,28,40,0.95), rgba(10,15,25,0.98));
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 15px 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(0,255,255,0.4);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .balance {
            font-size: 20px;
            font-weight: bold;
            background: rgba(0,0,0,0.6);
            padding: 8px 18px;
            border-radius: 40px;
            color: #ffcc44;
        }

        .nickname {
            font-size: 14px;
            color: #aac8ff;
        }

        /* Сетка карточек */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .card {
            background: linear-gradient(145deg, rgba(25,40,60,0.9), rgba(10,20,35,0.95));
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 20px 12px;
            text-align: center;
            border: 1px solid rgba(0,255,255,0.4);
            cursor: pointer;
            transition: 0.1s;
        }

        .card:active {
            transform: scale(0.96);
            border-color: #ffaa44;
        }

        .card-emoji {
            font-size: 48px;
            margin-bottom: 12px;
            filter: drop-shadow(0 0 6px #ffaa44);
        }

        .card-title {
            font-size: 16px;
            font-weight: bold;
            color: #fff;
        }

        hr {
            border-color: rgba(0,255,255,0.2);
            margin: 20px 0;
        }

        .footer {
            text-align: center;
            font-size: 11px;
            color: #5a6e8a;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="top-bar">
        <div class="nickname" id="nickname">Загрузка...</div>
        <div class="balance" id="balance">💰 --₽</div>
    </div>

    <div class="grid">
        <!-- Основные игровые разделы -->
        <div class="card" onclick="location.href='inventory.html'">
            <div class="card-emoji">📦</div>
            <div class="card-title">ИНВЕНТАРЬ</div>
        </div>
        <div class="card" onclick="location.href='suppliers.html'">
            <div class="card-emoji">🏭</div>
            <div class="card-title">ЗАКУП</div>
        </div>
        <div class="card" onclick="location.href='cars.html'">
            <div class="card-emoji">🚗</div>
            <div class="card-title">АВТОМОБИЛИ</div>
        </div>
        <div class="card" onclick="location.href='realestate.html'">
            <div class="card-emoji">🏠</div>
            <div class="card-title">НЕДВИЖИМОСТЬ</div>
        </div>
        <div class="card" onclick="location.href='shops.html'">
            <div class="card-emoji">🏪</div>
            <div class="card-title">МАГАЗИНЫ</div>
        </div>
        <div class="card" onclick="location.href='taxopark.html'">
            <div class="card-emoji">🚕</div>
            <div class="card-title">ТАКСОПАРК</div>
        </div>
        <div class="card" onclick="location.href='trading.html'">
            <div class="card-emoji">📈</div>
            <div class="card-title">ТРЕЙДИНГ</div>
        </div>
        <div class="card" onclick="location.href='races.html'">
            <div class="card-emoji">🏎</div>
            <div class="card-title">ГОНКИ</div>
        </div>
        <div class="card" onclick="location.href='auction.html'">
            <div class="card-emoji">🔨</div>
            <div class="card-title">АУКЦИОН</div>
        </div>
        <div class="card" onclick="location.href='friends.html'">
            <div class="card-emoji">👥</div>
            <div class="card-title">ДРУЗЬЯ</div>
        </div>
        <div class="card" onclick="location.href='referral.html'">
            <div class="card-emoji">🔗</div>
            <div class="card-title">РЕФЕРАЛЫ</div>
        </div>
        <div class="card" onclick="location.href='leaderboard.html'">
            <div class="card-emoji">🏆</div>
            <div class="card-title">ЛИДЕРЫ</div>
        </div>
        <div class="card" onclick="location.href='achievements.html'">
            <div class="card-emoji">🎯</div>
            <div class="card-title">ДОСТИЖЕНИЯ</div>
        </div>
    </div>

    <hr>

    <div class="grid">
        <!-- Казино -->
        <div class="card" onclick="location.href='casino/index.html'">
            <div class="card-emoji">🎰</div>
            <div class="card-title">КАЗИНО</div>
        </div>
    </div>

    <div class="footer">
        ⚡ Resell Tycoon — играй и зарабатывай
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    // Укажите адрес вашего API (Bothost)
    const API_BASE = "https://nl12.bothost.ru";
    // Токен пока неизвестен – оставьте пустым, позже вставите
    const API_TOKEN = "";   // замените на правильный токен, когда поддержка даст

    const userId = tg.initDataUnsafe.user.id;

    async function fetchAPI(endpoint) {
        const url = `${API_BASE}${endpoint}&tg_id=${userId}`;
        const headers = { 'Content-Type': 'application/json' };
        if (API_TOKEN) {
            // Пробуем Bearer, потом X-API-Key (можно автоматизировать)
            headers['Authorization'] = `Bearer ${API_TOKEN}`;
        }
        const resp = await fetch(url, { headers });
        if (!resp.ok) throw new Error(await resp.text());
        return resp.json();
    }

    async function loadUserInfo() {
        try {
            const data = await fetchAPI(`/api/me`);
            document.getElementById('balance').innerHTML = `💰 ${data.balance.toLocaleString()}₽`;
            document.getElementById('nickname').innerHTML = data.nickname || "Торгаш";
        } catch (e) {
            console.error(e);
            document.getElementById('balance').innerHTML = `❌ Ошибка`;
            document.getElementById('nickname').innerHTML = "Не авторизован";
            // Можно показать уведомление через tg
            tg.showAlert(`Не удалось загрузить данные: ${e.message}`);
        }
    }

    loadUserInfo();
</script>
</body>
</html>
