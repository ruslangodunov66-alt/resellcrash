<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Resell Tycoon</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Подключаем Three.js для 3D фона -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0f1a;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            color: #fff;
        }

        /* 3D Canvas фон (Three.js) */
        #canvas-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            display: block;
        }

        /* Основной контейнер с прокруткой */
        .game-container {
            position: relative;
            z-index: 1;
            max-width: 550px;
            margin: 20px auto;
            padding: 0 16px;
            height: calc(100vh - 40px);
            overflow-y: auto;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        /* Стилизация скроллбара */
        .game-container::-webkit-scrollbar {
            width: 5px;
        }
        .game-container::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
        }
        .game-container::-webkit-scrollbar-thumb {
            background: #ffaa44;
            border-radius: 10px;
        }

        /* Стеклянная карточка профиля с 3D hover */
        .profile-card {
            background: rgba(20, 30, 45, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 24px 20px;
            text-align: center;
            border: 1px solid rgba(0, 255, 255, 0.4);
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.5), 0 0 0 1px rgba(0, 255, 255, 0.2) inset;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            margin-bottom: 30px;
            scroll-snap-align: start;
        }
        .profile-card:hover {
            transform: translateY(-5px) rotateX(3deg);
            box-shadow: 0 30px 40px -15px rgba(0,0,0,0.6);
        }

        .avatar {
            width: 110px;
            height: 110px;
            margin: 0 auto 16px;
            background: linear-gradient(145deg, #2a3a55, #101826);
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0;
            box-shadow: 0 12px 25px rgba(0,0,0,0.5), 0 0 0 3px rgba(0,255,255,0.6);
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            transform-style: preserve-3d;
        }
        .avatar:hover {
            transform: rotateY(10deg) rotateX(5deg) scale(1.02);
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 60px;
        }
        .avatar .emoji {
            font-size: 68px;
        }

        .player-name {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #FFD966, #FFA559);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .player-stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 12px;
        }
        .stat {
            background: rgba(0,0,0,0.5);
            border-radius: 40px;
            padding: 6px 16px;
            font-weight: bold;
            font-size: 15px;
            color: #c0e0ff;
            backdrop-filter: blur(4px);
        }
        .stat span {
            color: #ffcc66;
            font-size: 18px;
            margin-right: 6px;
        }

        /* Сетка меню с 3D карточками */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 18px;
            margin-top: 20px;
            padding-bottom: 30px;
            scroll-snap-align: start;
        }
        .game-btn {
            background: rgba(25, 35, 55, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 32px;
            padding: 18px 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            transform-style: preserve-3d;
            transform: translateY(0) rotateX(0);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            will-change: transform;
        }
        .game-btn:hover {
            transform: translateY(-8px) rotateX(6deg);
            border-color: #ffaa88;
            box-shadow: 0 20px 25px -10px rgba(0,0,0,0.4), 0 0 15px rgba(0,255,255,0.3);
        }
        .btn-emoji {
            font-size: 42px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
            transition: transform 0.2s;
        }
        .game-btn:hover .btn-emoji {
            transform: scale(1.1);
        }
        .btn-label {
            font-size: 13px;
            font-weight: 600;
            color: #eef5ff;
            letter-spacing: 0.5px;
        }

        .casino-btn {
            background: linear-gradient(145deg, #2a1e2a, #1a1022);
            border-color: #ffaa66;
        }
        .casino-btn .btn-label {
            color: #ffdd99;
        }

        .footer {
            text-align: center;
            font-size: 11px;
            color: #5f7f9f;
            margin: 20px 0 40px;
            scroll-snap-align: end;
        }

        /* Анимация появления карточек */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .game-btn {
            animation: fadeInUp 0.4s ease backwards;
        }
        /* Задержки для карточек (динамически через JS или вручную) */
    </style>
</head>
<body>

<canvas id="canvas-bg"></canvas>

<div class="game-container">
    <div class="profile-card">
        <div class="avatar" id="avatarContainer">
            <div class="emoji" id="avatarEmoji">👔</div>
            <img id="avatarImg" style="display: none;" alt="skin">
        </div>
        <div class="player-name" id="playerName">Загрузка...</div>
        <div class="player-stats">
            <div class="stat"><span>💰</span> <span id="balance">0</span> ₽</div>
            <div class="stat"><span>📦</span> <span id="salesCount">0</span> продаж</div>
            <div class="stat"><span>⭐</span> <span id="rating">Новичок</span></div>
        </div>
    </div>

    <div class="menu-grid" id="gameGrid"></div>
    <div class="footer">⚡ Resell Tycoon · твой бизнес с нуля</div>
</div>

<script type="module">
    import * as THREE from 'three';

    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    // ---------- НАСТРОЙКИ ----------
    const API_BASE = "https://nl12.bothost.ru";
    const USE_REAL_API = false;
    const userId = tg.initDataUnsafe?.user?.id || 1475910449;

    // ---------- МОК-ДАННЫЕ ----------
    let mockBalance = 50000;
    let mockNickname = "Барыга";
    let mockSales = 0;
    let mockSkinId = "default";
    const skinMap = {
        'default': { emoji: '👶', url: null },
        'hustler': { emoji: '😎', url: null },
        'boss': { emoji: '🕴️', url: null },
        'coffee': { emoji: '💻', url: null },
        'cyber': { emoji: '🤖', url: null },
        'legend': { emoji: '👑', url: null },
        'creator': { emoji: '💎', url: null }
    };

    const menuSections = [
        { emoji: "🏭", label: "ЗАКУП", link: "suppliers.html" },
        { emoji: "📦", label: "ИНВЕНТАРЬ", link: "inventory.html" },
        { emoji: "🚗", label: "АВТО", link: "cars.html" },
        { emoji: "🏠", label: "ДОМА", link: "realestate.html" },
        { emoji: "🏪", label: "МАГАЗИНЫ", link: "shops.html" },
        { emoji: "🚕", label: "ТАКСОПАРК", link: "taxopark.html" },
        { emoji: "📈", label: "ТРЕЙДИНГ", link: "trading.html" },
        { emoji: "🏎️", label: "ГОНКИ", link: "racing.html" },
        { emoji: "🔨", label: "АУКЦИОН", link: "auction.html" },
        { emoji: "👥", label: "ДРУЗЬЯ", link: "friends.html" },
        { emoji: "🔗", label: "РЕФЕРАЛЫ", link: "referral.html" },
        { emoji: "🏆", label: "ЛИДЕРЫ", link: "leaderboard.html" },
        { emoji: "🎯", label: "ДОСТИЖЕНИЯ", link: "achievements.html" }
    ];
    const casinoItem = { emoji: "🎰", label: "КАЗИНО", link: "casino/index.html", extraClass: "casino-btn" };

    function renderMenu() {
        const grid = document.getElementById('gameGrid');
        if (!grid) return;
        grid.innerHTML = '';
        [...menuSections, casinoItem].forEach((section, idx) => {
            const btn = document.createElement('button');
            btn.className = 'game-btn' + (section.extraClass ? ' ' + section.extraClass : '');
            btn.style.animationDelay = `${idx * 0.03}s`;
            btn.innerHTML = `<div class="btn-emoji">${section.emoji}</div><div class="btn-label">${section.label}</div>`;
            btn.onclick = () => {
                if (section.link) window.location.href = section.link;
                else tg.showAlert(`Раздел "${section.label}" в разработке`);
            };
            grid.appendChild(btn);
        });
    }

    async function loadProfile() {
        // ... существующий код без изменений (мок или API)
        // Для краткости оставлю мок
        document.getElementById('balance').innerText = mockBalance.toLocaleString();
        document.getElementById('playerName').innerText = mockNickname;
        document.getElementById('salesCount').innerText = mockSales;
        document.getElementById('rating').innerText = 'Новичок';
        const skin = skinMap[mockSkinId] || { emoji: '👔', url: null };
        document.getElementById('avatarEmoji').innerText = skin.emoji;
        document.getElementById('avatarEmoji').style.display = 'flex';
        document.getElementById('avatarImg').style.display = 'none';
    }

    renderMenu();
    loadProfile();

    // ========= 3D ФОН С ПОМОЩЬЮ Three.js =========
    const canvasEl = document.getElementById('canvas-bg');
    const renderer = new THREE.WebGLRenderer({ canvas: canvasEl, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);

    const scene = new THREE.Scene();
    scene.background = null; // прозрачный, т.к. в body уже градиент

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 15);
    camera.lookAt(0, 0, 0);

    // Группа вращающихся объектов
    const group = new THREE.Group();
    scene.add(group);

    // Создаём множество маленьких кубиков и сфер
    const geometries = [
        new THREE.BoxGeometry(0.4, 0.4, 0.4),
        new THREE.SphereGeometry(0.25, 16, 16),
        new THREE.IcosahedronGeometry(0.3, 0)
    ];
    const colors = [0x44aaff, 0xffaa44, 0xff66cc, 0x66ff66, 0xff6666];
    for (let i = 0; i < 300; i++) {
        const geom = geometries[Math.floor(Math.random() * geometries.length)];
        const material = new THREE.MeshStandardMaterial({
            color: colors[Math.floor(Math.random() * colors.length)],
            emissive: 0x112233,
            roughness: 0.3,
            metalness: 0.7
        });
        const mesh = new THREE.Mesh(geom, material);
        mesh.position.x = (Math.random() - 0.5) * 30;
        mesh.position.y = (Math.random() - 0.5) * 20;
        mesh.position.z = (Math.random() - 0.5) * 15 - 5;
        mesh.rotation.x = Math.random() * Math.PI * 2;
        mesh.rotation.y = Math.random() * Math.PI * 2;
        group.add(mesh);
    }

    // Добавляем освещение
    const ambientLight = new THREE.AmbientLight(0x404060);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 1);
    dirLight.position.set(1, 2, 1);
    scene.add(dirLight);
    const backLight = new THREE.PointLight(0x4488ff, 0.5);
    backLight.position.set(0, 0, -3);
    scene.add(backLight);
    const fillLight = new THREE.PointLight(0xffaa66, 0.4);
    fillLight.position.set(2, 1, 2);
    scene.add(fillLight);

    // Анимация вращения группы
    let time = 0;
    function animate() {
        requestAnimationFrame(animate);
        time += 0.005;
        group.rotation.y = time * 0.2;
        group.rotation.x = Math.sin(time * 0.1) * 0.1;
        group.rotation.z = Math.cos(time * 0.15) * 0.05;
        renderer.render(scene, camera);
    }
    animate();

    // Адаптация под размер окна
    window.addEventListener('resize', onWindowResize, false);
    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }
</script>
</body>
</html>
