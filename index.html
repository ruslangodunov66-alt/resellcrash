<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>CRASH | R-Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 20%, #0a0e1a, #020408);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, 'Apple Color Emoji', 'Segoe UI Emoji', sans-serif;
            padding: 16px;
        }
        .game-container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }
        .game-card {
            background: linear-gradient(145deg, rgba(20, 28, 40, 0.95), rgba(10, 15, 25, 0.98));
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 28px 20px 32px;
            text-align: center;
            border: 2px solid rgba(0, 255, 255, 0.4);
            box-shadow: 0 25px 45px rgba(0,0,0,0.6), 0 0 30px rgba(0,255,255,0.15);
            transition: all 0.2s;
        }
        .crash-active .game-card {
            border-color: #ff3366;
            box-shadow: 0 0 40px rgba(255,51,102,0.5);
        }
        .win-active .game-card {
            border-color: #ffcc00;
            box-shadow: 0 0 40px rgba(255,204,0,0.5);
        }
        .rocket {
            font-size: 70px;
            display: inline-block;
            animation: float 1s infinite ease-in-out;
            filter: drop-shadow(0 0 12px cyan);
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-10px); }
        }
        .title {
            font-size: 36px;
            font-weight: 900;
            background: linear-gradient(135deg, #ffcc44, #ff6644);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 2px;
            margin: 8px 0;
        }
        .bet-info {
            background: rgba(0,0,0,0.6);
            display: inline-block;
            padding: 10px 28px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 700;
            margin: 12px 0;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(0,255,255,0.3);
            color: #ffffff;
        }
        .bet-info span {
            color: #ffcc44;
            font-size: 1.3rem;
        }
        .multiplier {
            font-size: 6rem;
            font-weight: 900;
            margin: 20px 0;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            transition: 0.02s linear;
            text-shadow: 0 0 20px rgba(46,204,113,0.5);
            letter-spacing: 5px;
        }
        .crash-active .multiplier {
            background: linear-gradient(135deg, #ff3366, #c0392b);
            animation: shake 0.2s ease-in-out 0s 2;
        }
        .win-active .multiplier {
            background: linear-gradient(135deg, #ffcc44, #ff8844);
            animation: pulse 0.4s ease;
        }
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
            100% { transform: translateX(0); }
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); text-shadow: 0 0 30px gold; }
            100% { transform: scale(1); }
        }
        button {
            border: none;
            padding: 15px 28px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            width: 85%;
            margin: 10px auto;
            transition: transform 0.1s, opacity 0.2s;
        }
        button:active {
            transform: scale(0.96);
        }
        button:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }
        .btn-cashout {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            box-shadow: 0 6px 0 #1e8449;
        }
        .btn-repeat {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            box-shadow: 0 6px 0 #b45f1b;
        }
        .btn-change {
            background: linear-gradient(135deg, #3498db, #2980b9);
            box-shadow: 0 6px 0 #1f618d;
        }
        .auto-input {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
            background: rgba(0,0,0,0.4);
            padding: 8px 16px;
            border-radius: 60px;
            width: 85%;
            margin-left: auto;
            margin-right: auto;
        }
        .auto-input input {
            width: 100px;
            padding: 8px;
            text-align: center;
            background: rgba(0,0,0,0.7);
            border: 1px solid #ffcc44;
            color: #ffcc44;
            border-radius: 40px;
            font-weight: bold;
        }
        .auto-input label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #ccddff;
        }
        .status {
            margin-top: 20px;
            font-size: 1rem;
            min-height: 55px;
            font-weight: 600;
            background: rgba(0,0,0,0.5);
            border-radius: 40px;
            padding: 10px;
            color: #ffffff;
        }
        .hidden {
            display: none;
        }
        .flex-col {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        footer {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 20px;
            color: #aaaacc;
        }
        .history {
            margin-top: 20px;
            font-size: 13px;
            font-weight: 600;
            background: rgba(0,0,0,0.5);
            border-radius: 30px;
            padding: 10px;
            color: #ffdd99;
            text-shadow: 0 0 2px black;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-card" id="gameCard">
        <div class="rocket">🚀</div>
        <div class="title">R-Game CRASH</div>
        <div class="bet-info">💰 СТАВКА: <span id="betDisplay">0</span> ₽</div>
        <div class="multiplier" id="counter">x1.00</div>
        
        <div class="flex-col">
            <div id="gameGroup">
                <button id="cashoutBtn" class="btn-cashout">💰 ЗАБРАТЬ</button>
                <div class="auto-input">
                    <label>🎯 АВТО-ЗАБОР при x</label>
                    <input type="number" id="autoMultiplier" placeholder="2.0" step="0.1" min="1.1" max="10" value="2.0">
                </div>
                <button id="repeatBtn" class="btn-repeat hidden">🔄 ИГРАТЬ СНОВА</button>
                <button id="changeBetBtn" class="btn-change hidden">✏️ СМЕНИТЬ СТАВКУ</button>
            </div>
        </div>
        
        <div class="status" id="status">💎 Загрузка...</div>
        <div class="history" id="historyPanel">📜 ПОСЛЕДНИЕ ВЫИГРЫШИ: —</div>
        <footer>⚡ множитель растёт | забери до краха | авто-забор включи заранее</footer>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    tg.MainButton.hide();
    tg.BackButton.hide();

    // Читаем параметры из URL (ставка и точка краша от бота)
    const urlParams = new URLSearchParams(window.location.search);
    let currentBet = parseInt(urlParams.get('bet')) || 0;
    let crashPoint = parseFloat(urlParams.get('crash')) || 1.10;
    
    // DOM элементы
    const cashoutBtn = document.getElementById('cashoutBtn');
    const repeatBtn = document.getElementById('repeatBtn');
    const changeBetBtn = document.getElementById('changeBetBtn');
    const betDisplay = document.getElementById('betDisplay');
    const counterDiv = document.getElementById('counter');
    const statusDiv = document.getElementById('status');
    const gameCard = document.getElementById('gameCard');
    const autoMultiplierInput = document.getElementById('autoMultiplier');
    const historyPanel = document.getElementById('historyPanel');

    let currentMultiplier = 1.0;
    let gameActive = false;
    let intervalId = null;
    let pendingCashout = false;
    let autoTarget = 2.0;
    let lastWins = [];

    function updateHistory(winAmount) {
        lastWins.unshift(winAmount);
        if (lastWins.length > 3) lastWins.pop();
        historyPanel.innerHTML = `📜 ПОСЛЕДНИЕ ВЫИГРЫШИ: ${lastWins.map(w => w + '₽').join(' | ') || '—'}`;
    }

    function showError(msg) {
        statusDiv.innerHTML = `<span style="color:#ff8888;">❌ ${msg}</span>`;
        cashoutBtn.disabled = true;
    }
    
    function showSuccess(msg) {
        statusDiv.innerHTML = `<span style="color:#88ff88;">✅ ${msg}</span>`;
    }
    
    function clearEffects() {
        gameCard.classList.remove('crash-active', 'win-active');
    }

    function startGameUI() {
        if (intervalId) clearInterval(intervalId);
        if (!currentBet || currentBet <= 0) {
            statusDiv.innerHTML = '❌ Ошибка: ставка не задана';
            return;
        }
        currentMultiplier = 1.0;
        gameActive = true;
        pendingCashout = false;
        betDisplay.innerText = currentBet;
        updateCounterDisplay();
        cashoutBtn.disabled = false;
        repeatBtn.classList.add('hidden');
        changeBetBtn.classList.add('hidden');
        statusDiv.innerHTML = '⏳ СТАРТ ЧЕРЕЗ 0.4 СЕК...';
        clearEffects();
        
        setTimeout(() => {
            if (!gameActive) return;
            statusDiv.innerHTML = '📈 МНОЖИТЕЛЬ РАСТЁТ!';
            intervalId = setInterval(() => {
                if (!gameActive) return;
                currentMultiplier += 0.025;
                updateCounterDisplay();
                
                if (autoTarget && currentMultiplier >= autoTarget && !pendingCashout) {
                    cashout();
                }
                
                if (currentMultiplier >= crashPoint) {
                    clearInterval(intervalId);
                    intervalId = null;
                    gameActive = false;
                    gameCard.classList.add('crash-active');
                    counterDiv.innerHTML = `💥 x${crashPoint.toFixed(2)}`;
                    cashoutBtn.disabled = true;
                    repeatBtn.classList.remove('hidden');
                    changeBetBtn.classList.remove('hidden');
                    statusDiv.innerHTML = `<span style="color:#ff8888;">💔 КРАШ! ВЫ ПРОИГРАЛИ ${currentBet}₽</span>`;
                    tg.sendData(JSON.stringify({ action: 'crash', bet: currentBet }));
                }
            }, 95);
        }, 400);
    }

    function updateCounterDisplay() {
        counterDiv.innerHTML = `x${currentMultiplier.toFixed(2)}`;
    }

    async function cashout() {
        if (!gameActive || pendingCashout) return;
        pendingCashout = true;
        clearInterval(intervalId);
        intervalId = null;
        gameActive = false;
        cashoutBtn.disabled = true;
        const winAmount = Math.floor(currentBet * currentMultiplier);
        tg.sendData(JSON.stringify({
            action: 'cashout',
            bet: currentBet,
            multiplier: currentMultiplier
        }));
        statusDiv.innerHTML = '⏳ ОЖИДАНИЕ ПОДТВЕРЖДЕНИЯ...';
    }

    cashoutBtn.onclick = () => {
        cashout();
    };

    repeatBtn.onclick = () => {
        if (pendingCashout) return;
        repeatBtn.disabled = true;
        changeBetBtn.disabled = true;
        statusDiv.innerHTML = '⏳ ЗАПУСКАЕМ НОВЫЙ РАУНД...';
        tg.sendData(JSON.stringify({ action: 'repeat', bet: currentBet }));
    };

    changeBetBtn.onclick = () => {
        tg.sendData(JSON.stringify({ action: 'change_bet' }));
        tg.close();
    };

    autoMultiplierInput.addEventListener('change', () => {
        let val = parseFloat(autoMultiplierInput.value);
        if (!isNaN(val) && val >= 1.1 && val <= 10) {
            autoTarget = val;
            statusDiv.innerHTML = `🎯 АВТО-ЗАБОР УСТАНОВЛЕН НА x${val.toFixed(2)}`;
        } else {
            autoTarget = null;
            statusDiv.innerHTML = '🎯 АВТО-ЗАБОР ОТКЛЮЧЁН';
        }
    });
    autoTarget = parseFloat(autoMultiplierInput.value) || 2.0;

    // Обработка ответов от бота
    tg.onEvent('web_app_data', (event) => {
        try {
            const response = JSON.parse(event.data);
            if (response.action === 'start_ready') {
                // Это уже не нужно — игра стартует сразу
            }
            else if (response.action === 'repeat_ready') {
                currentBet = response.bet;
                crashPoint = response.crash_point;
                repeatBtn.disabled = false;
                changeBetBtn.disabled = false;
                startGameUI();
                showSuccess(`НОВЫЙ РАУНД! СТАВКА ${currentBet}₽`);
            }
            else if (response.action === 'cashout_ok') {
                const winAmount = response.win || Math.floor(currentBet * currentMultiplier);
                gameCard.classList.add('win-active');
                counterDiv.innerHTML = `✅ x${currentMultiplier.toFixed(2)} → ${winAmount}₽`;
                repeatBtn.classList.remove('hidden');
                changeBetBtn.classList.remove('hidden');
                statusDiv.innerHTML = `<span style="color:#88ff88;">🎉 ВЫИГРЫШ! +${winAmount}₽</span>`;
                pendingCashout = false;
                updateHistory(winAmount);
            }
            else if (response.action === 'crash_ok') {
                repeatBtn.classList.remove('hidden');
                changeBetBtn.classList.remove('hidden');
                pendingCashout = false;
            }
            else if (response.action === 'change_bet_ok') {
                tg.close();
            }
            else if (response.status === 'error') {
                showError(response.message);
                repeatBtn.disabled = false;
                changeBetBtn.disabled = false;
                pendingCashout = false;
            }
        } catch(e) {
            console.error(e);
            showError('ОШИБКА СВЯЗИ С СЕРВЕРОМ');
        }
    });

    // Запускаем игру сразу, если ставка передана
    if (currentBet > 0 && crashPoint >= 1.0) {
        startGameUI();
    } else {
        statusDiv.innerHTML = '❌ Ошибка: не удалось получить данные ставки. Закройте и откройте игру заново.';
    }
</script>
</body>
</html>
