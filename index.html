<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>КРАШ | R-Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0b1a2a 0%, #07121c 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui;
            padding: 20px;
        }
        .game-card {
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(16px);
            border-radius: 48px;
            padding: 28px 20px 32px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            border: 1px solid rgba(46,204,113,0.4);
        }
        .crash-active .game-card { border-color: #e74c3c; }
        .win-active .game-card { border-color: #f1c40f; }
        .multiplier {
            font-size: 5.2rem;
            font-weight: 800;
            margin: 20px 0;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        button {
            border: none;
            padding: 14px 24px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 60px;
            width: 85%;
            margin: 8px auto;
            cursor: pointer;
        }
        .btn-cashout { background: #2ecc71; box-shadow: 0 5px 0 #27ae60; color: white; }
        .btn-repeat { background: #f39c12; box-shadow: 0 5px 0 #e67e22; color: white; }
        .btn-change { background: #3498db; box-shadow: 0 5px 0 #2980b9; color: white; }
        .hidden { display: none; }
        .status { margin-top: 20px; font-size: 0.95rem; min-height: 50px; }
        .bet-info { background: rgba(255,255,255,0.12); display: inline-block; padding: 8px 24px; border-radius: 60px; margin-bottom: 20px; }
        footer { font-size: 11px; opacity: 0.6; margin-top: 20px; }
    </style>
</head>
<body>
<div class="game-card" id="gameCard">
    <div class="bet-info">💰 СТАВКА: <span id="betDisplay">0</span> ₽</div>
    <div class="multiplier" id="counter">x1.00</div>
    <div>
        <button id="cashoutBtn" class="btn-cashout hidden">💰 ЗАБРАТЬ</button>
        <button id="repeatBtn" class="btn-repeat hidden">🔄 ИГРАТЬ СНОВА</button>
        <button id="changeBetBtn" class="btn-change hidden">✏️ СМЕНИТЬ СТАВКУ</button>
    </div>
    <div class="status" id="status"></div>
    <footer>⚡ множитель растёт | забери до краха</footer>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    tg.MainButton.hide();
    tg.BackButton.hide();

    let currentBet = 0;
    let crashPoint = 1.0;
    let currentMultiplier = 1.0;
    let gameActive = false;
    let intervalId = null;
    let pendingCashout = false;

    const cashoutBtn = document.getElementById('cashoutBtn');
    const repeatBtn = document.getElementById('repeatBtn');
    const changeBetBtn = document.getElementById('changeBetBtn');
    const betDisplay = document.getElementById('betDisplay');
    const counterDiv = document.getElementById('counter');
    const statusDiv = document.getElementById('status');
    const gameCard = document.getElementById('gameCard');

    function startGameUI(bet, point) {
        if (intervalId) clearInterval(intervalId);
        currentBet = bet;
        crashPoint = point;
        currentMultiplier = 1.0;
        gameActive = true;
        pendingCashout = false;
        betDisplay.innerText = currentBet;
        updateCounterDisplay();
        cashoutBtn.classList.remove('hidden');
        repeatBtn.classList.add('hidden');
        changeBetBtn.classList.add('hidden');
        statusDiv.innerHTML = '';
        gameCard.classList.remove('crash-active', 'win-active');
        intervalId = setInterval(() => {
            if (!gameActive) return;
            currentMultiplier += 0.02;
            updateCounterDisplay();
            if (currentMultiplier >= crashPoint) {
                clearInterval(intervalId);
                intervalId = null;
                gameActive = false;
                gameCard.classList.add('crash-active');
                counterDiv.innerHTML = `💥 x${crashPoint.toFixed(2)}`;
                cashoutBtn.classList.add('hidden');
                repeatBtn.classList.remove('hidden');
                changeBetBtn.classList.remove('hidden');
                statusDiv.innerHTML = `<span style="color:#ff6b6b;">💔 КРАШ! Вы проиграли ${currentBet}₽</span>`;
                tg.sendData(JSON.stringify({ action: 'crash', bet: currentBet }));
            }
        }, 100);
    }

    function updateCounterDisplay() {
        counterDiv.innerHTML = `x${currentMultiplier.toFixed(2)}`;
    }

    cashoutBtn.onclick = () => {
        if (!gameActive || pendingCashout) return;
        pendingCashout = true;
        clearInterval(intervalId);
        intervalId = null;
        gameActive = false;
        cashoutBtn.disabled = true;
        tg.sendData(JSON.stringify({
            action: 'cashout',
            bet: currentBet,
            multiplier: currentMultiplier
        }));
        statusDiv.innerHTML = '⏳ Ожидание подтверждения...';
    };

    repeatBtn.onclick = () => {
        repeatBtn.disabled = true;
        changeBetBtn.disabled = true;
        statusDiv.innerHTML = '⏳ Запускаем новый раунд...';
        tg.sendData(JSON.stringify({ action: 'repeat', bet: currentBet }));
    };

    changeBetBtn.onclick = () => {
        tg.sendData(JSON.stringify({ action: 'change_bet' }));
        // Закрываем Web App – бот сам откроет диалог для ввода ставки
        tg.close();
    };

    tg.onEvent('web_app_data', (event) => {
        try {
            const response = JSON.parse(event.data);
            if (response.action === 'start_ready') {
                startGameUI(response.bet, response.crash_point);
                statusDiv.innerHTML = `✅ Ставка ${response.bet}₽ принята!`;
            } else if (response.action === 'repeat_ready') {
                startGameUI(response.bet, response.crash_point);
                statusDiv.innerHTML = `🔄 Новый раунд! Ставка ${response.bet}₽`;
                repeatBtn.disabled = false;
                changeBetBtn.disabled = false;
            } else if (response.action === 'cashout_ok') {
                const winAmount = response.win;
                gameCard.classList.add('win-active');
                counterDiv.innerHTML = `✅ x${currentMultiplier.toFixed(2)} → ${winAmount}₽`;
                repeatBtn.classList.remove('hidden');
                changeBetBtn.classList.remove('hidden');
                statusDiv.innerHTML = `<span style="color:#2ecc71;">🎉 ВЫИГРЫШ! +${winAmount}₽</span>`;
                cashoutBtn.classList.add('hidden');
                pendingCashout = false;
            } else if (response.action === 'error') {
                statusDiv.innerHTML = `<span style="color:#ff6b6b;">❌ ${response.message}</span>`;
                if (repeatBtn.classList.contains('hidden')) {
                    // Не начали игру – покажем кнопки для повторной попытки?
                    changeBetBtn.classList.remove('hidden');
                }
                pendingCashout = false;
            }
        } catch(e) {
            console.error(e);
            statusDiv.innerHTML = '❌ Ошибка связи с сервером';
        }
    });
</script>
</body>
</html>
