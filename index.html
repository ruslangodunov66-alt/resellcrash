<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Resell Tycoon</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0f1a;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 3D Canvas фон */
        #canvas-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .game-container {
            position: relative;
            z-index: 1;
            max-width: 550px;
            margin: 20px auto;
            padding: 0 16px;
        }

        /* стеклянная карточка профиля */
        .profile-card {
            background: rgba(20, 30, 45, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 24px 20px;
            text-align: center;
            border: 1px solid rgba(0, 255, 255, 0.4);
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.5), 0 0 0 1px rgba(0, 255, 255, 0.2) inset;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .profile-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 40px -15px rgba(0,0,0,0.6);
        }

        /* аватар с 3D-вращением при наведении */
        .avatar {
            width: 110px;
            height: 110px;
            margin: 0 auto 16px;
            background: linear-gradient(145deg, #2a3a55, #101826);
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0;
            box-shadow: 0 12px 25px rgba(0,0,0,0.5), 0 0 0 3px rgba(0,255,255,0.6);
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            transform-style: preserve-3d;
        }
        .avatar:hover {
            transform: rotateY(10deg) rotateX(5deg) scale(1.02);
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 60px;
        }
        .avatar .emoji {
            font-size: 68px;
        }

        .player-name {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #FFD966, #FFA559);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .player-stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 12px;
        }
        .stat {
            background: rgba(0,0,0,0.5);
            border-radius: 40px;
            padding: 6px 16px;
            font-weight: bold;
            font-size: 15px;
            color: #c0e0ff;
            backdrop-filter: blur(4px);
        }
        .stat span {
            color: #ffcc66;
            font-size: 18px;
            margin-right: 6px;
        }

        /* сетка меню */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 16px;
            margin-top: 24px;
        }
        .game-btn {
            background: rgba(25, 35, 55, 0.75);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 32px;
            padding: 16px 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            transform-style: preserve-3d;
        }
        .game-btn:active {
            transform: scale(0.96);
            border-color: #ffaa44;
        }
        .game-btn:hover {
            transform: translateY(-5px) rotateX(3deg);
            border-color: #ffaa88;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .btn-emoji {
            font-size: 38px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }
        .btn-label {
            font-size: 13px;
            font-weight: 600;
            color: #eef5ff;
        }

        .casino-btn {
            background: linear-gradient(145deg, #2a1e2a, #1a1022);
            border-color: #ffaa66;
        }
        .casino-btn .btn-label {
            color: #ffdd99;
        }

        .footer {
            text-align: center;
            font-size: 11px;
            color: #5f7f9f;
            margin-top: 30px;
            padding: 16px;
        }
    </style>
</head>
<body>

<canvas id="canvas-bg"></canvas>

<div class="game-container">
    <div class="profile-card">
        <div class="avatar" id="avatarContainer">
            <div class="emoji" id="avatarEmoji">👔</div>
            <img id="avatarImg" style="display: none;" alt="skin">
        </div>
        <div class="player-name" id="playerName">Загрузка...</div>
        <div class="player-stats">
            <div class="stat"><span>💰</span> <span id="balance">0</span> ₽</div>
            <div class="stat"><span>📦</span> <span id="salesCount">0</span> продаж</div>
            <div class="stat"><span>⭐</span> <span id="rating">Новичок</span></div>
        </div>
    </div>

    <div class="menu-grid" id="gameGrid"></div>
    <div class="footer">⚡ Resell Tycoon · твой бизнес с нуля</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    // ---------- НАСТРОЙКИ ----------
    const API_BASE = "https://nl12.bothost.ru";   // пока старый, после привязки домена сменить на https://api.resgame.ru
    const USE_REAL_API = false;                   // пока false, используем мок
    const userId = tg.initDataUnsafe?.user?.id || 1475910449;

    // ---------- МОК-ДАННЫЕ ----------
    let mockBalance = 50000;
    let mockNickname = "Барыга";
    let mockSales = 0;
    let mockSkinId = "default";
    const skinMap = {
        'default': { emoji: '👶', url: null },
        'hustler': { emoji: '😎', url: null },
        'boss': { emoji: '🕴️', url: null },
        'coffee': { emoji: '💻', url: null },
        'cyber': { emoji: '🤖', url: null },
        'legend': { emoji: '👑', url: null },
        'creator': { emoji: '💎', url: null }
    };

    const menuSections = [
        { emoji: "🏭", label: "ЗАКУП", link: "suppliers.html" },
        { emoji: "📦", label: "ИНВЕНТАРЬ", link: "inventory.html" },
        { emoji: "🚗", label: "АВТО", link: "cars.html" },
        { emoji: "🏠", label: "ДОМА", link: "realestate.html" },
        { emoji: "🏪", label: "МАГАЗИНЫ", link: "shops.html" },
        { emoji: "🚕", label: "ТАКСОПАРК", link: "taxopark.html" },
        { emoji: "📈", label: "ТРЕЙДИНГ", link: "trading.html" },
        { emoji: "🏎️", label: "ГОНКИ", link: "races.html" },
        { emoji: "🔨", label: "АУКЦИОН", link: "auction.html" },
        { emoji: "👥", label: "ДРУЗЬЯ", link: "friends.html" },
        { emoji: "🔗", label: "РЕФЕРАЛЫ", link: "referral.html" },
        { emoji: "🏆", label: "ЛИДЕРЫ", link: "leaderboard.html" },
        { emoji: "🎯", label: "ДОСТИЖЕНИЯ", link: "achievements.html" }
    ];
    const casinoItem = { emoji: "🎰", label: "КАЗИНО", link: "casino/index.html", extraClass: "casino-btn" };

    function renderMenu() {
        const grid = document.getElementById('gameGrid');
        if (!grid) return;
        grid.innerHTML = '';
        menuSections.forEach(section => {
            const btn = document.createElement('button');
            btn.className = 'game-btn';
            btn.innerHTML = `<div class="btn-emoji">${section.emoji}</div><div class="btn-label">${section.label}</div>`;
            btn.onclick = () => {
                if (section.link) window.location.href = section.link;
                else tg.showAlert(`Раздел "${section.label}" в разработке`);
            };
            grid.appendChild(btn);
        });
        const casinoBtn = document.createElement('button');
        casinoBtn.className = 'game-btn casino-btn';
        casinoBtn.innerHTML = `<div class="btn-emoji">${casinoItem.emoji}</div><div class="btn-label">${casinoItem.label}</div>`;
        casinoBtn.onclick = () => window.location.href = casinoItem.link;
        grid.appendChild(casinoBtn);
    }

    async function loadProfile() {
        if (USE_REAL_API) {
            try {
                const resp = await fetch(`${API_BASE}/api/me?tg_id=${userId}`);
                if (resp.ok) {
                    const data = await resp.json();
                    document.getElementById('balance').innerText = (data.balance || 0).toLocaleString();
                    document.getElementById('playerName').innerText = data.nickname || 'Торгаш';
                    document.getElementById('salesCount').innerText = data.total_sales || 0;
                    let rating = 'Новичок';
                    const sales = data.total_sales || 0;
                    if (sales >= 100) rating = '💎 Легенда';
                    else if (sales >= 50) rating = '👑 Профи';
                    else if (sales >= 15) rating = '⭐ Опытный';
                    else if (sales >= 5) rating = '🔰 Торговец';
                    document.getElementById('rating').innerText = rating;

                    const skinId = data.skin || 'default';
                    const skin = skinMap[skinId] || { emoji: '👔', url: null };
                    if (data.skin_url && data.skin_url !== 'null') {
                        document.getElementById('avatarImg').src = `${API_BASE}/api/image/${data.skin_url}`;
                        document.getElementById('avatarImg').style.display = 'block';
                        document.getElementById('avatarEmoji').style.display = 'none';
                    } else {
                        document.getElementById('avatarEmoji').innerText = skin.emoji;
                        document.getElementById('avatarEmoji').style.display = 'flex';
                        document.getElementById('avatarImg').style.display = 'none';
                    }
                    return;
                }
            } catch(e) { console.warn(e); }
        }
        // мок-данные
        document.getElementById('balance').innerText = mockBalance.toLocaleString();
        document.getElementById('playerName').innerText = mockNickname;
        document.getElementById('salesCount').innerText = mockSales;
        document.getElementById('rating').innerText = 'Новичок';
        const skin = skinMap[mockSkinId] || { emoji: '👔', url: null };
        document.getElementById('avatarEmoji').innerText = skin.emoji;
        document.getElementById('avatarEmoji').style.display = 'flex';
        document.getElementById('avatarImg').style.display = 'none';
    }

    renderMenu();
    loadProfile();

    // ========= 3D ФОН С ЧАСТИЦАМИ (Canvas) =========
    const canvas = document.getElementById('canvas-bg');
    const ctx = canvas.getContext('2d');
    let width, height;
    let particles = [];

    function resizeCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
    }

    function initParticles() {
        particles = [];
        const count = Math.min(120, Math.floor(width * height / 8000));
        for (let i = 0; i < count; i++) {
            particles.push({
                x: Math.random() * width,
                y: Math.random() * height,
                radius: Math.random() * 2 + 1,
                alpha: Math.random() * 0.5 + 0.2,
                speedX: (Math.random() - 0.5) * 0.6,
                speedY: (Math.random() - 0.5) * 0.6,
                color: `hsl(${Math.random() * 60 + 180}, 80%, 60%)`
            });
        }
    }

    function drawParticles() {
        if (!ctx) return;
        ctx.clearRect(0, 0, width, height);
        for (let p of particles) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.alpha;
            ctx.fill();
            // движение
            p.x += p.speedX;
            p.y += p.speedY;
            if (p.x < -10) p.x = width + 10;
            if (p.x > width + 10) p.x = -10;
            if (p.y < -10) p.y = height + 10;
            if (p.y > height + 10) p.y = -10;
        }
        requestAnimationFrame(drawParticles);
    }

    function initBackground() {
        resizeCanvas();
        initParticles();
        drawParticles();
        window.addEventListener('resize', () => {
            resizeCanvas();
            initParticles();
        });
    }
    initBackground();
</script>
</body>
</html>
