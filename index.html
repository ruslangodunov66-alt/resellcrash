<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>CRASH | R-Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, 'Apple Color Emoji', 'Segoe UI Emoji', sans-serif;
            padding: 16px;
        }
        .game-container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
        }
        .game-card {
            background: rgba(12, 20, 30, 0.75);
            backdrop-filter: blur(20px);
            border-radius: 56px;
            padding: 24px 20px 32px;
            text-align: center;
            border: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 20px rgba(0,255,255,0.2);
            transition: all 0.2s;
        }
        .crash-active .game-card {
            border-color: #ff3366;
            box-shadow: 0 0 30px rgba(255,51,102,0.6);
        }
        .win-active .game-card {
            border-color: #ffcc00;
            box-shadow: 0 0 30px rgba(255,204,0,0.6);
        }
        .rocket-area {
            position: relative;
            margin-bottom: 10px;
        }
        .rocket {
            font-size: 60px;
            display: inline-block;
            animation: float 1.2s infinite ease-in-out;
            filter: drop-shadow(0 0 8px cyan);
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-12px); }
        }
        .title {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffaa33, #ff5533);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }
        .bet-info {
            background: rgba(0,0,0,0.5);
            display: inline-block;
            padding: 8px 24px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 600;
            margin: 12px 0;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .multiplier {
            font-size: 5.8rem;
            font-weight: 800;
            margin: 20px 0;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            transition: 0.02s linear;
            text-shadow: 0 0 15px rgba(46,204,113,0.5);
            letter-spacing: 4px;
        }
        .crash-active .multiplier {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            animation: shake 0.2s ease-in-out 0s 2;
        }
        .win-active .multiplier {
            background: linear-gradient(135deg, #f1c40f, #e67e22);
            animation: pulse 0.4s ease;
        }
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
            100% { transform: translateX(0); }
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); text-shadow: 0 0 25px gold; }
            100% { transform: scale(1); }
        }
        .input-group {
            margin: 12px 0;
        }
        .input-group input {
            width: 85%;
            padding: 14px;
            font-size: 1.2rem;
            border-radius: 60px;
            border: none;
            text-align: center;
            background: rgba(255,255,255,0.15);
            color: white;
            font-weight: 600;
            outline: none;
            transition: 0.2s;
        }
        .input-group input:focus {
            background: rgba(255,255,255,0.25);
            box-shadow: 0 0 8px cyan;
        }
        button {
            border: none;
            padding: 14px 24px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            width: 85%;
            margin: 8px auto;
            transition: transform 0.1s, opacity 0.2s;
        }
        button:active {
            transform: scale(0.96);
        }
        button:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }
        .btn-start {
            background: #9b59b6;
            box-shadow: 0 5px 0 #6c3483;
        }
        .btn-cashout {
            background: #2ecc71;
            box-shadow: 0 5px 0 #27ae60;
        }
        .btn-repeat {
            background: #f39c12;
            box-shadow: 0 5px 0 #e67e22;
        }
        .btn-change {
            background: #3498db;
            box-shadow: 0 5px 0 #2980b9;
        }
        .auto-input {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
        }
        .auto-input input {
            width: 100px;
            padding: 8px;
            text-align: center;
            background: rgba(0,0,0,0.6);
            border: 1px solid cyan;
            color: white;
            border-radius: 40px;
        }
        .auto-input label {
            font-size: 0.85rem;
            opacity: 0.8;
        }
        .status {
            margin-top: 20px;
            font-size: 0.95rem;
            min-height: 50px;
            font-weight: 500;
            background: rgba(0,0,0,0.4);
            border-radius: 40px;
            padding: 8px;
        }
        .hidden {
            display: none;
        }
        .flex-col {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        footer {
            font-size: 11px;
            opacity: 0.6;
            margin-top: 20px;
        }
        .history {
            margin-top: 20px;
            font-size: 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 8px;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-card" id="gameCard">
        <div class="rocket-area">
            <div class="rocket">🚀</div>
        </div>
        <div class="title">R-Game CRASH</div>
        <div class="bet-info">💰 СТАВКА: <span id="betDisplay">0</span> ₽</div>
        <div class="multiplier" id="counter">x1.00</div>
        <div class="flex-col">
            <div id="startGroup" class="input-group">
                <input type="number" id="betInput" placeholder="Сумма (100–50000)" min="100" max="50000" step="100" value="1000">
                <button id="startBtn" class="btn-start">🚀 НАЧАТЬ ИГРУ</button>
            </div>
            <div id="gameGroup" class="hidden">
                <button id="cashoutBtn" class="btn-cashout">💰 ЗАБРАТЬ</button>
                <div class="auto-input">
                    <label>🎯 Авто-забор при x</label>
                    <input type="number" id="autoMultiplier" placeholder="2.0" step="0.1" min="1.1" max="10">
                </div>
                <button id="repeatBtn" class="btn-repeat hidden">🔄 ИГРАТЬ СНОВА</button>
                <button id="changeBetBtn" class="btn-change hidden">✏️ СМЕНИТЬ СТАВКУ</button>
            </div>
        </div>
        <div class="status" id="status"></div>
        <div class="history" id="historyPanel">📜 Последние выигрыши: —</div>
        <footer>⚡ множитель растёт | забери до краха | авто-забор включи заранее</footer>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    tg.MainButton.hide();
    tg.BackButton.hide();

    // DOM
    const startGroup = document.getElementById('startGroup');
    const gameGroup = document.getElementById('gameGroup');
    const betInput = document.getElementById('betInput');
    const startBtn = document.getElementById('startBtn');
    const cashoutBtn = document.getElementById('cashoutBtn');
    const repeatBtn = document.getElementById('repeatBtn');
    const changeBetBtn = document.getElementById('changeBetBtn');
    const betDisplay = document.getElementById('betDisplay');
    const counterDiv = document.getElementById('counter');
    const statusDiv = document.getElementById('status');
    const gameCard = document.getElementById('gameCard');
    const autoMultiplierInput = document.getElementById('autoMultiplier');
    const historyPanel = document.getElementById('historyPanel');

    let currentBet = 0;
    let crashPoint = 1.0;
    let currentMultiplier = 1.0;
    let gameActive = false;
    let intervalId = null;
    let pendingCashout = false;
    let timeoutId = null;
    let autoTarget = null;
    let lastWins = []; // храним последние 3 выигрыша

    function updateHistory(winAmount) {
        lastWins.unshift(winAmount);
        if (lastWins.length > 3) lastWins.pop();
        historyPanel.innerHTML = `📜 Последние выигрыши: ${lastWins.map(w => w + '₽').join(' | ') || '—'}`;
    }

    function showError(msg) {
        statusDiv.innerHTML = `<span style="color:#ff6b6b;">❌ ${msg}</span>`;
        startBtn.disabled = false;
        if (timeoutId) clearTimeout(timeoutId);
    }
    function showSuccess(msg) {
        statusDiv.innerHTML = `<span style="color:#2ecc71;">✅ ${msg}</span>`;
    }
    function clearEffects() {
        gameCard.classList.remove('crash-active', 'win-active');
    }

    // Задержка перед стартом роста (300 мс), чтобы пользователь успел увидеть кнопку
    function startGameUI(bet, point) {
        if (intervalId) clearInterval(intervalId);
        currentBet = bet;
        crashPoint = point;
        currentMultiplier = 1.0;
        gameActive = true;
        pendingCashout = false;
        betDisplay.innerText = currentBet;
        updateCounterDisplay();
        startGroup.classList.add('hidden');
        gameGroup.classList.remove('hidden');
        cashoutBtn.disabled = false;
        repeatBtn.classList.add('hidden');
        changeBetBtn.classList.add('hidden');
        statusDiv.innerHTML = '⏳ Старт через 0.3 сек...';
        clearEffects();
        
        // Пауза перед началом роста
        setTimeout(() => {
            if (!gameActive) return;
            statusDiv.innerHTML = '📈 Множитель растёт!';
            // Запуск роста множителя
            intervalId = setInterval(() => {
                if (!gameActive) return;
                currentMultiplier += 0.02;
                updateCounterDisplay();
                
                // Проверка авто-забора
                if (autoTarget && currentMultiplier >= autoTarget && !pendingCashout) {
                    cashout();
                }
                
                if (currentMultiplier >= crashPoint) {
                    // КРАШ!
                    clearInterval(intervalId);
                    intervalId = null;
                    gameActive = false;
                    gameCard.classList.add('crash-active');
                    counterDiv.innerHTML = `💥 x${crashPoint.toFixed(2)}`;
                    cashoutBtn.disabled = true;
                    repeatBtn.classList.remove('hidden');
                    changeBetBtn.classList.remove('hidden');
                    statusDiv.innerHTML = `<span style="color:#ff6b6b;">💔 КРАШ! Вы проиграли ${currentBet}₽</span>`;
                    tg.sendData(JSON.stringify({ action: 'crash', bet: currentBet }));
                }
            }, 100);
        }, 300);
    }

    function updateCounterDisplay() {
        counterDiv.innerHTML = `x${currentMultiplier.toFixed(2)}`;
    }

    // Функция забора
    async function cashout() {
        if (!gameActive || pendingCashout) return;
        pendingCashout = true;
        clearInterval(intervalId);
        intervalId = null;
        gameActive = false;
        cashoutBtn.disabled = true;
        const winAmount = Math.floor(currentBet * currentMultiplier);
        tg.sendData(JSON.stringify({
            action: 'cashout',
            bet: currentBet,
            multiplier: currentMultiplier
        }));
        statusDiv.innerHTML = '⏳ Ожидание подтверждения...';
        // Не будем обновлять баланс здесь, дождёмся ответа бота
    }

    startBtn.onclick = () => {
        if (startBtn.disabled) return;
        let bet = parseInt(betInput.value);
        if (isNaN(bet)) bet = 1000;
        if (bet < 100) bet = 100;
        if (bet > 50000) bet = 50000;
        currentBet = bet;

        statusDiv.innerHTML = '⏳ Обработка ставки...';
        startBtn.disabled = true;

        if (timeoutId) clearTimeout(timeoutId);
        timeoutId = setTimeout(() => {
            if (startBtn.disabled) {
                showError('Сервер не отвечает. Попробуйте позже.');
                startBtn.disabled = false;
            }
            timeoutId = null;
        }, 10000);

        tg.sendData(JSON.stringify({ action: 'start', bet: currentBet }));
    };

    cashoutBtn.onclick = () => {
        cashout();
    };

    repeatBtn.onclick = () => {
        if (pendingCashout) return;
        repeatBtn.disabled = true;
        changeBetBtn.disabled = true;
        statusDiv.innerHTML = '⏳ Запускаем новый раунд...';
        tg.sendData(JSON.stringify({ action: 'repeat', bet: currentBet }));
    };

    changeBetBtn.onclick = () => {
        tg.sendData(JSON.stringify({ action: 'change_bet' }));
        startGroup.classList.remove('hidden');
        gameGroup.classList.add('hidden');
        betInput.value = currentBet;
        statusDiv.innerHTML = '💰 Введите новую сумму и нажмите НАЧАТЬ ИГРУ';
        if (intervalId) clearInterval(intervalId);
        intervalId = null;
        gameActive = false;
        pendingCashout = false;
        clearEffects();
        autoTarget = null;
        autoMultiplierInput.value = '';
    };

    // Авто-забор: сохраняем целевой множитель
    autoMultiplierInput.addEventListener('change', () => {
        let val = parseFloat(autoMultiplierInput.value);
        if (!isNaN(val) && val >= 1.1 && val <= 10) {
            autoTarget = val;
            statusDiv.innerHTML = `🎯 Авто-забор установлен на x${val.toFixed(2)}`;
        } else {
            autoTarget = null;
            statusDiv.innerHTML = '🎯 Авто-забор отключён';
        }
    });

    // Обработка ответов от бота
    tg.onEvent('web_app_data', (event) => {
        try {
            const response = JSON.parse(event.data);
            if (timeoutId) {
                clearTimeout(timeoutId);
                timeoutId = null;
            }
            if (response.action === 'start_ready') {
                startBtn.disabled = false;
                startGameUI(response.bet, response.crash_point);
                showSuccess(`Ставка ${response.bet}₽ принята!`);
            }
            else if (response.action === 'repeat_ready') {
                repeatBtn.disabled = false;
                changeBetBtn.disabled = false;
                startGameUI(response.bet, response.crash_point);
                showSuccess(`Новый раунд! Ставка ${response.bet}₽`);
            }
            else if (response.action === 'cashout_ok') {
                const winAmount = response.win || Math.floor(currentBet * currentMultiplier);
                gameCard.classList.add('win-active');
                counterDiv.innerHTML = `✅ x${currentMultiplier.toFixed(2)} → ${winAmount}₽`;
                repeatBtn.classList.remove('hidden');
                changeBetBtn.classList.remove('hidden');
                statusDiv.innerHTML = `<span style="color:#2ecc71;">🎉 ВЫИГРЫШ! +${winAmount}₽</span>`;
                pendingCashout = false;
                updateHistory(winAmount);
            }
            else if (response.action === 'crash_ok') {
                repeatBtn.classList.remove('hidden');
                changeBetBtn.classList.remove('hidden');
                pendingCashout = false;
            }
            else if (response.action === 'error') {
                showError(response.message);
                if (repeatBtn.classList.contains('hidden') && !gameActive) {
                    startBtn.disabled = false;
                } else {
                    repeatBtn.disabled = false;
                    changeBetBtn.disabled = false;
                }
                pendingCashout = false;
                if (!gameActive) {
                    startGroup.classList.remove('hidden');
                    gameGroup.classList.add('hidden');
                }
            }
        } catch(e) {
            console.error(e);
            showError('Ошибка связи с сервером');
            startBtn.disabled = false;
            if (timeoutId) clearTimeout(timeoutId);
        }
    });
</script>
</body>
</html>
