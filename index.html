<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>R-Game CASINO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f1a, #010101);
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Apple Color Emoji', sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 550px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeInDown 0.8s ease;
        }
        .header h1 {
            font-size: 42px;
            background: linear-gradient(135deg, #ffd89b, #ff7e5e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px rgba(255,126,94,0.3);
            letter-spacing: 2px;
        }
        .stats {
            background: rgba(10, 20, 30, 0.7);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            padding: 18px 15px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-around;
            border: 1px solid rgba(0, 255, 255, 0.2);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .stat {
            text-align: center;
        }
        .stat-value {
            font-size: 26px;
            font-weight: bold;
            background: linear-gradient(135deg, #ffd966, #ffaa33);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .stat-label {
            font-size: 12px;
            color: #bbccff;
            letter-spacing: 0.5px;
        }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 10px;
        }
        .game-card {
            background: linear-gradient(145deg, rgba(25, 40, 60, 0.9), rgba(10, 20, 35, 0.95));
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 20px 12px;
            text-align: center;
            border: 1px solid rgba(0, 255, 255, 0.3);
            transition: all 0.25s ease;
            cursor: pointer;
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.5);
        }
        .game-card:active {
            transform: scale(0.96);
            border-color: #ffaa44;
        }
        .game-emoji {
            font-size: 56px;
            margin-bottom: 12px;
            filter: drop-shadow(0 0 6px rgba(255,200,100,0.5));
        }
        .game-name {
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 6px;
        }
        .game-desc {
            font-size: 11px;
            color: #8aadff;
        }
        .balance {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 14px 20px;
            margin-top: 30px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: #ffdd77;
            border: 1px solid rgba(255,200,100,0.4);
            letter-spacing: 1px;
        }
        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 11px;
            color: #5a6e8a;
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0% { opacity: 0.8; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.02); }
        }
        .game-card:hover {
            animation: pulse 0.3s ease forwards;
        }
        @media (max-width: 450px) {
            .games-grid { gap: 15px; }
            .game-name { font-size: 18px; }
            .stat-value { font-size: 20px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🎰 R-GAME CASINO</h1>
    </div>
    
    <div class="stats" id="stats">
        <div class="stat">
            <div class="stat-value" id="gamesPlayed">0</div>
            <div class="stat-label">Игр сыграно</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="totalBet">0</div>
            <div class="stat-label">Ставок (₽)</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="totalWin">0</div>
            <div class="stat-label">Выигрыш (₽)</div>
        </div>
    </div>
    
    <div class="games-grid">
        <div class="game-card" onclick="openGame('crash')">
            <div class="game-emoji">💥</div>
            <div class="game-name">КРАШ</div>
            <div class="game-desc">Множитель до x10</div>
        </div>
        <div class="game-card" onclick="openGame('slots')">
            <div class="game-emoji">🎰</div>
            <div class="game-name">СЛОТЫ</div>
            <div class="game-desc">Джекпот x20</div>
        </div>
        <div class="game-card" onclick="openGame('roulette')">
            <div class="game-emoji">🎡</div>
            <div class="game-name">РУЛЕТКА</div>
            <div class="game-desc">x35 на число</div>
        </div>
        <div class="game-card" onclick="openGame('blackjack')">
            <div class="game-emoji">🃏</div>
            <div class="game-name">БЛЭКДЖЕК</div>
            <div class="game-desc">21 очко</div>
        </div>
        <div class="game-card" onclick="openGame('mines')">
            <div class="game-emoji">💣</div>
            <div class="game-name">МАЙНЁР</div>
            <div class="game-desc">5x5, найди мины</div>
        </div>
    </div>
    
    <div class="balance" id="balance">💰 ЗАГРУЗКА...</div>
    <div class="footer">⚡ В каждой игре введи свою ставку и испытай удачу!</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    
    // ✅ ИСПРАВЛЕНИЕ: используем относительный путь
    function openGame(game) {
        // Просто переходим на файл игры в той же папке
        window.location.href = game + '.html';
        // Альтернативный вариант для надёжности:
        // window.location.replace(game + '.html');
    }
    
    // Запрашиваем статистику у бота
    tg.sendData(JSON.stringify({ action: 'get_stats' }));
    
    tg.onEvent('web_app_data', (event) => {
        try {
            const data = JSON.parse(event.data);
            if (data.action === 'stats') {
                document.getElementById('gamesPlayed').innerText = data.games_played || 0;
                document.getElementById('totalBet').innerText = (data.total_bet || 0).toLocaleString();
                document.getElementById('totalWin').innerText = (data.total_win || 0).toLocaleString();
                document.getElementById('balance').innerHTML = `💰 БАЛАНС: ${(data.balance || 0).toLocaleString()} ₽`;
            }
        } catch(e) {
            console.error(e);
        }
    });
</script>
</body>
</html>
