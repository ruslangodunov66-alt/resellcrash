<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Трейдинг | Resell Tycoon</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: radial-gradient(circle at 30% 10%, #0c1120, #020408); color: #ddd; padding: 20px; min-height: 100vh; }
        .container { max-width: 700px; margin: 0 auto; }
        .glass-card { background: rgba(20,30,45,0.7); backdrop-filter: blur(12px); border-radius: 48px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(0,255,255,0.3); }
        h2 { font-size: 28px; background: linear-gradient(135deg, #ffcc44, #ff6644); background-clip: text; -webkit-background-clip: text; color: transparent; margin-bottom: 15px; }
        .balance { font-size: 18px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 40px; text-align: center; margin-bottom: 20px; }
        .asset-selector { display: flex; gap: 12px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
        .asset-btn { background: #1e2a3a; border: none; padding: 8px 20px; border-radius: 40px; color: #c0e0ff; cursor: pointer; transition: 0.2s; }
        .asset-btn.active { background: #ffaa44; color: #0a0f1a; font-weight: bold; }
        .chart-container { margin: 20px 0; height: 300px; position: relative; }
        .price-info { text-align: center; font-size: 28px; font-weight: bold; margin: 10px 0; color: #ffcc44; }
        .change { font-size: 16px; margin-left: 10px; }
        .positive { color: #2ecc71; }
        .negative { color: #e74c3c; }
        .bet-area { display: flex; gap: 10px; justify-content: center; align-items: center; flex-wrap: wrap; margin: 20px 0; }
        .bet-input { padding: 12px 16px; border-radius: 40px; border: none; background: #1e2a3a; color: white; width: 160px; text-align: center; font-size: 16px; }
        button { border: none; padding: 10px 24px; border-radius: 40px; font-weight: bold; cursor: pointer; transition: 0.1s; }
        button:active { transform: scale(0.96); }
        .btn-up { background: #2ecc71; color: white; box-shadow: 0 0 8px #2ecc71; }
        .btn-down { background: #e74c3c; color: white; box-shadow: 0 0 8px #e74c3c; }
        .history { margin-top: 25px; max-height: 250px; overflow-y: auto; }
        .history-item { padding: 8px; border-bottom: 1px solid #2a3e55; font-size: 13px; }
        .win { color: #2ecc71; }
        .loss { color: #e74c3c; }
        .back-btn { background: #555; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="glass-card">
        <h2>📈 КРИПТО ТРЕЙДИНГ</h2>
        <div class="balance" id="balance">💰 Баланс: загрузка...</div>
        <div class="asset-selector" id="assetSelector"></div>
        <div class="price-info">
            <span id="currentPrice">0.00</span> $
            <span id="changePercent" class="change"></span>
        </div>
        <div class="chart-container">
            <canvas id="priceChart"></canvas>
        </div>
        <div class="bet-area">
            <input type="number" id="betAmount" class="bet-input" placeholder="Сумма ₽" min="5" max="10000" step="5" value="100">
            <button class="btn-up" id="btnUp">🔺 ВВЕРХ</button>
            <button class="btn-down" id="btnDown">🔻 ВНИЗ</button>
        </div>
        <div class="history">
            <h3>📋 История сделок</h3>
            <div id="historyList">Нет сделок</div>
        </div>
    </div>
    <button class="back-btn" onclick="window.location.href='index.html'">🔙 На главную</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    // НАСТРОЙКИ
    const API_BASE = "https://nl12.bothost.ru";
    const USE_REAL_API = false;
    const userId = tg.initDataUnsafe?.user?.id || 1475910449;

    // Активы
    const assets = {
        BTC: { name: "Bitcoin", color: "#f7931a", minBet: 100, maxBet: 10000, volatility: 0.05, basePrice: 51200 },
        ETH: { name: "Ethereum", color: "#627eea", minBet: 50, maxBet: 5000, volatility: 0.06, basePrice: 3100 },
        SOL: { name: "Solana", color: "#14f195", minBet: 10, maxBet: 2000, volatility: 0.08, basePrice: 145 },
        DOGE: { name: "Dogecoin", color: "#c2a633", minBet: 5, maxBet: 1000, volatility: 0.10, basePrice: 0.18 }
    };
    let currentAsset = "BTC";
    let balance = 0;
    let priceHistory = [];   // массив цен для графика (последние 30)
    let chart = null;
    let currentPrice = 0;
    let priceTrend = 0;
    let history = [];

    // Загрузка баланса
    async function loadBalance() {
        if (!USE_REAL_API) { balance = 150000; updateBalanceUI(); return; }
        try {
            const resp = await fetch(`${API_BASE}/api/me?tg_id=${userId}`);
            const data = await resp.json();
            balance = data.balance || 0;
            updateBalanceUI();
        } catch(e) { console.warn(e); balance = 150000; updateBalanceUI(); }
    }
    function updateBalanceUI() {
        document.getElementById('balance').innerHTML = `💰 Баланс: ${balance.toLocaleString()}₽`;
    }

    // Генерация новой цены (симуляция)
    function generateNewPrice(asset, oldPrice) {
        const volatility = assets[asset].volatility;
        let change = (Math.random() - 0.5) * 2 * volatility;
        change += priceTrend * 0.01;
        let newPrice = oldPrice * (1 + change);
        if (newPrice > oldPrice * 1.1) newPrice = oldPrice * 1.09;
        if (newPrice < oldPrice * 0.9) newPrice = oldPrice * 0.91;
        if (newPrice <= 0) newPrice = oldPrice * 0.95;
        priceTrend = priceTrend * 0.9 + change * 0.1;
        return newPrice;
    }

    // Инициализация цен для выбранного актива
    function initPrices(asset) {
        currentPrice = assets[asset].basePrice;
        priceHistory = [];
        let price = currentPrice;
        for (let i = 0; i < 30; i++) {
            priceHistory.push(price);
            price = generateNewPrice(asset, price);
        }
        currentPrice = priceHistory[priceHistory.length-1];
        updateChart();
        updatePriceDisplay();
    }

    function updatePriceDisplay() {
        const priceElem = document.getElementById('currentPrice');
        const changeElem = document.getElementById('changePercent');
        if (priceHistory.length < 2) return;
        const lastPrice = priceHistory[priceHistory.length-1];
        const prevPrice = priceHistory[priceHistory.length-2];
        const change = ((lastPrice - prevPrice) / prevPrice * 100).toFixed(2);
        priceElem.innerText = lastPrice.toFixed(2);
        changeElem.innerText = `${change > 0 ? '+' : ''}${change}%`;
        changeElem.className = `change ${change >= 0 ? 'positive' : 'negative'}`;
    }

    // График
    function initChart() {
        const ctx = document.getElementById('priceChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array.from({length: 30}, (_,i) => i+1),
                datasets: [{
                    label: 'Цена USD',
                    data: [],
                    borderColor: '#ffcc44',
                    backgroundColor: 'rgba(255, 204, 68, 0.1)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.2,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: { legend: { display: false }, tooltip: { mode: 'index' } },
                scales: { x: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { display: false } }, y: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#ccc' } } }
            }
        });
    }
    function updateChart() {
        if (!chart) return;
        chart.data.datasets[0].data = priceHistory;
        chart.update();
        updatePriceDisplay();
    }

    // Обновление цены каждые 3 секунды
    function startPriceSimulation() {
        setInterval(() => {
            const newPrice = generateNewPrice(currentAsset, currentPrice);
            currentPrice = newPrice;
            priceHistory.push(newPrice);
            if (priceHistory.length > 60) priceHistory.shift();
            updateChart();
        }, 3000);
    }

    // Переключение актива
    function switchAsset(asset) {
        currentAsset = asset;
        const minBet = assets[asset].minBet, maxBet = assets[asset].maxBet;
        const betInput = document.getElementById('betAmount');
        betInput.min = minBet; betInput.max = maxBet;
        betInput.value = Math.min(Math.max(betInput.value, minBet), maxBet);
        initPrices(asset);
        document.querySelectorAll('.asset-btn').forEach(btn => {
            if (btn.dataset.asset === asset) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }

    // Ставка
    async function makeBet(direction) {
        let amount = parseInt(document.getElementById('betAmount').value);
        const minBet = assets[currentAsset].minBet, maxBet = assets[currentAsset].maxBet;
        if (isNaN(amount) || amount < minBet || amount > maxBet) {
            tg.showAlert(`❌ Ставка от ${minBet} до ${maxBet}₽`);
            return;
        }
        if (balance < amount) { tg.showAlert("❌ Недостаточно средств"); return; }
        if (!USE_REAL_API) {
            const winChance = 0.5;
            const win = Math.random() < winChance;
            const profit = win ? amount * (Math.random() * 1.2 + 1.5) : -amount;
            balance += profit;
            updateBalanceUI();
            const resultText = win ? `✅ ВЫИГРЫШ! +${profit}₽` : `❌ ПРОИГРЫШ -${amount}₽`;
            tg.showAlert(resultText);
            history.unshift({ asset: currentAsset, direction: direction==='up'?'ВВЕРХ':'ВНИЗ', amount, profit: profit, win, time: new Date().toLocaleTimeString() });
            if (history.length > 10) history.pop();
            renderHistory();
            return;
        }
        // реальный API – заглушка
        tg.showAlert("Демо-режим, реальный API будет после настройки сервера");
    }

    function renderHistory() {
        const container = document.getElementById('historyList');
        if (!history.length) { container.innerHTML = '<div>Нет сделок</div>'; return; }
        let html = '';
        for (let h of history) {
            const sign = h.win ? '✅' : '❌';
            html += `<div class="history-item">${sign} ${h.asset} ${h.direction} | ${Math.abs(h.profit)}₽ (${h.profit>=0?'+':''}${h.profit}₽) | ${h.time}</div>`;
        }
        container.innerHTML = html;
    }

    function initAssetSelector() {
        const container = document.getElementById('assetSelector');
        container.innerHTML = '';
        for (let [symbol, info] of Object.entries(assets)) {
            const btn = document.createElement('button');
            btn.className = 'asset-btn';
            if (symbol === currentAsset) btn.classList.add('active');
            btn.dataset.asset = symbol;
            btn.innerText = symbol;
            btn.onclick = () => switchAsset(symbol);
            container.appendChild(btn);
        }
    }

    document.getElementById('btnUp').onclick = () => makeBet('up');
    document.getElementById('btnDown').onclick = () => makeBet('down');

    async function init() {
        initAssetSelector();
        initChart();
        await loadBalance();
        initPrices(currentAsset);
        startPriceSimulation();
    }
    init();
</script>
</body>
</html>
