<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#04070e">
    <title>R-TRADE PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,600;0,700;0,800;0,900;1,800&family=Nunito:wght@500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root {
            --bg-dark: #04070e;
            --bg-deep: #090f1a;
            --container-bg: rgba(13, 22, 38, 0.7);
            --panel-bg: rgba(22, 35, 56, 0.55);
            --panel-bg-hover: rgba(30, 48, 77, 0.8);
            --glass-border: rgba(255, 255, 255, 0.08);
            
            --accent-blue: #2f88ff;
            --accent-blue-glow: rgba(47, 136, 255, 0.4);
            --accent-green: #00e676; /* Bybit Green */
            --accent-green-glow: rgba(0, 230, 118, 0.35);
            --accent-red: #ff3b69; /* Bybit Red */
            --accent-red-glow: rgba(255, 59, 105, 0.35);
            --accent-gold: #ffd700;
            --accent-gold-gradient: linear-gradient(135deg, #ffe259 0%, #ffa751 100%);
            
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
        }

        html { background-color: var(--bg-dark); height: 100%; -webkit-font-smoothing: antialiased; }
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Nunito', system-ui, sans-serif;
            min-height: 100vh;
            color: var(--text-main);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            background: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(47, 136, 255, 0.12), transparent 45%),
                radial-gradient(circle at 100% 50%, rgba(255, 59, 105, 0.08), transparent 50%),
                radial-gradient(circle at 50% 100%, rgba(0, 230, 118, 0.06), transparent 40%);
            background-attachment: fixed;
            padding-bottom: 90px; /* For bottom nav */
        }

        /* --- BACKGROUND WATERMARKS --- */
        .bg-watermarks {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
            pointer-events: none; overflow: hidden; display: flex; flex-direction: column;
            justify-content: center; align-items: center; gap: 180px;
        }
        .bg-text {
            font-family: 'Montserrat', sans-serif; font-size: 110px; font-weight: 900; font-style: italic;
            white-space: nowrap;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.02) 0%, rgba(255, 255, 255, 0) 100%);
            -webkit-background-clip: text; color: transparent;
            transform: rotate(-10deg); animation: floatText 20s ease-in-out infinite alternate;
        }
        .bg-text span {
            background: linear-gradient(180deg, rgba(47, 136, 255, 0.05) 0%, rgba(47, 136, 255, 0) 100%);
            -webkit-background-clip: text; color: transparent;
        }
        .bg-text:nth-child(2) { margin-left: 100px; animation-delay: -5s; }
        @keyframes floatText {
            0% { transform: rotate(-10deg) translate(0, 0); }
            100% { transform: rotate(-10deg) translate(20px, -10px); }
        }

        .content { position: relative; z-index: 2; display: flex; flex-direction: column; height: 100%; padding: 12px; max-width: 600px; margin: 0 auto; width: 100%; }

        /* --- HEADER --- */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(13, 22, 38, 0.6); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border-radius: 20px; padding: 12px 16px; margin-bottom: 12px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 1px 2px rgba(255, 255, 255, 0.1);
        }
        .brand {
            font-family: 'Montserrat', sans-serif; font-size: 20px; font-weight: 900; font-style: italic;
            background: linear-gradient(135deg, #ffffff 30%, #cbd5e1 100%); -webkit-background-clip: text;
            color: transparent; letter-spacing: 1px;
        }
        .brand span { color: var(--accent-blue); -webkit-text-fill-color: var(--accent-blue); text-shadow: 0 0 15px var(--accent-blue-glow); }
        
        .balance-block {
            display: flex; align-items: center; gap: 10px; background: rgba(4, 7, 14, 0.45);
            padding: 4px 4px 4px 14px; border-radius: 100px; border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.8);
        }
        .balance-info { display: flex; flex-direction: column; align-items: flex-end; }
        .balance-label { font-family: 'Montserrat', sans-serif; font-size: 8px; font-weight: 900; color: var(--text-muted); letter-spacing: 1px; }
        .balance-value { font-family: 'Montserrat', sans-serif; font-size: 15px; font-weight: 900; color: var(--accent-green); text-shadow: 0 0 15px var(--accent-green-glow); }
        .action-btn {
            border: none; border-radius: 100px; padding: 0 16px; height: 36px;
            font-family: 'Montserrat', sans-serif; font-weight: 900; color: #04070e; cursor: pointer;
            font-size: 11px; letter-spacing: 0.5px; position: relative; overflow: hidden;
            background: var(--accent-gold-gradient);
            box-shadow: 0 4px 15px rgba(255, 167, 81, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.4);
            transition: transform 0.1s;
        }
        .action-btn:active { transform: scale(0.95); }

        /* --- TOOLBAR (Pairs & Timeframes) --- */
        .toolbar {
            display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px;
        }
        .scroll-row {
            display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px;
            -webkit-overflow-scrolling: touch;
        }
        .scroll-row::-webkit-scrollbar { display: none; }
        .pill-btn {
            background: var(--panel-bg); border: 1px solid var(--glass-border);
            color: var(--text-muted); font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 13px;
            padding: 6px 14px; border-radius: 12px; white-space: nowrap; cursor: pointer;
            backdrop-filter: blur(10px); transition: all 0.2s;
        }
        .pill-btn.active {
            background: rgba(47, 136, 255, 0.15); color: #fff; border-color: var(--accent-blue);
            box-shadow: 0 0 15px rgba(47, 136, 255, 0.2);
        }

        /* --- CHART AREA --- */
        .chart-wrapper {
            background: rgba(13, 22, 38, 0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 20px; border: 1px solid var(--glass-border);
            padding: 2px; margin-bottom: 12px; flex-shrink: 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4); position: relative;
            height: 320px;
        }
        #tvchart { width: 100%; height: 100%; border-radius: 18px; overflow: hidden; }
        .current-price-badge {
            position: absolute; top: 12px; left: 16px; z-index: 5;
            font-family: 'Montserrat', sans-serif; font-size: 22px; font-weight: 900;
            color: var(--accent-green); text-shadow: 0 0 20px var(--accent-green-glow);
            pointer-events: none;
        }

        /* --- TRADING PANELS (Orderbook + Form) --- */
        .trading-section {
            display: flex; gap: 12px; flex: 1; min-height: 200px;
        }
        
        .orderbook {
            flex: 1; background: var(--panel-bg); border-radius: 16px; border: 1px solid var(--glass-border);
            padding: 10px; display: flex; flex-direction: column; font-family: 'Nunito', sans-serif;
            backdrop-filter: blur(10px);
        }
        .ob-header { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-muted); margin-bottom: 8px; font-weight: 700; text-transform: uppercase; }
        .ob-list { flex: 1; display: flex; flex-direction: column; gap: 4px; overflow-y: hidden; }
        .ob-row { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; position: relative; z-index: 1; }
        .ob-row.ask { color: var(--accent-red); }
        .ob-row.bid { color: var(--accent-green); }
        .ob-row .size { color: var(--text-main); }
        .ob-bg { position: absolute; top: 0; right: 0; height: 100%; opacity: 0.15; z-index: -1; border-radius: 2px; }
        .ob-row.ask .ob-bg { background: var(--accent-red); }
        .ob-row.bid .ob-bg { background: var(--accent-green); }
        .ob-divider { height: 1px; background: rgba(255,255,255,0.05); margin: 6px 0; }

        .order-form {
            flex: 1.2; background: var(--panel-bg); border-radius: 16px; border: 1px solid var(--glass-border);
            padding: 12px; display: flex; flex-direction: column; justify-content: space-between;
            backdrop-filter: blur(10px);
        }
        .input-group { margin-bottom: 10px; }
        .input-group label { display: block; font-size: 10px; color: var(--text-muted); margin-bottom: 4px; font-weight: 700; text-transform: uppercase; }
        .input-box {
            display: flex; align-items: center; background: rgba(4,7,14,0.6);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 6px 10px;
        }
        .input-box input {
            background: none; border: none; color: #fff; font-family: 'Montserrat', sans-serif; font-weight: 700;
            font-size: 16px; width: 100%; outline: none;
        }
        .input-box span { color: var(--text-muted); font-size: 12px; font-weight: 700; }
        
        .trade-btns { display: flex; gap: 8px; }
        .btn-trade {
            flex: 1; border: none; border-radius: 12px; padding: 12px 0;
            font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 14px;
            color: #fff; cursor: pointer; transition: transform 0.1s;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .btn-trade.long {
            background: linear-gradient(180deg, #00e676 0%, #00b35c 100%);
            box-shadow: 0 4px 15px var(--accent-green-glow), inset 0 1px 1px rgba(255,255,255,0.4);
        }
        .btn-trade.short {
            background: linear-gradient(180deg, #ff3b69 0%, #d82b53 100%);
            box-shadow: 0 4px 15px var(--accent-red-glow), inset 0 1px 1px rgba(255,255,255,0.4);
        }
        .btn-trade:active { transform: scale(0.94); }

        /* --- BOTTOM NAV --- */
        .bottom-nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: calc(100% - 24px); max-width: 440px;
            background: rgba(13, 22, 38, 0.85); backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
            display: flex; justify-content: space-around; padding: 8px 10px;
            border-radius: 100px; border: 1px solid var(--glass-border); z-index: 100;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7), inset 0 1px 1px rgba(255, 255, 255, 0.1);
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            font-size: 11px; font-family: 'Montserrat', sans-serif; font-weight: 700;
            color: var(--text-muted); cursor: pointer; padding: 8px 16px; border-radius: 100px;
            transition: all 0.3s;
        }
        .nav-item.active { color: #fff; background: rgba(255, 255, 255, 0.08); box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.05); }
        .nav-item .icon { font-size: 18px; margin-bottom: 2px; }

        /* --- MODALS (DEPOSIT/WITHDRAW) --- */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            display: flex; justify-content: center; align-items: center; z-index: 200;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .modal-content {
            background: rgba(13, 22, 38, 0.9); border: 1px solid var(--glass-border);
            border-radius: 24px; padding: 24px; width: 90%; max-width: 360px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 1px 1px rgba(255,255,255,0.1);
            transform: translateY(20px); transition: transform 0.3s ease; text-align: center;
        }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        .modal-title { font-family: 'Montserrat', sans-serif; font-size: 20px; font-weight: 900; margin-bottom: 16px; color: #fff; }
        
        .modal-tabs { display: flex; background: rgba(0,0,0,0.4); border-radius: 12px; padding: 4px; margin-bottom: 20px; }
        .modal-tab { flex: 1; padding: 10px; font-weight: 700; font-size: 13px; color: var(--text-muted); border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .modal-tab.active { background: var(--panel-bg); color: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        .modal-input {
            width: 100%; background: rgba(4,7,14,0.8); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px; padding: 14px; font-size: 20px; font-family: 'Montserrat', sans-serif;
            font-weight: 800; color: #fff; text-align: center; margin-bottom: 20px; outline: none;
        }
        .modal-input:focus { border-color: var(--accent-blue); box-shadow: 0 0 15px var(--accent-blue-glow); }
        
        .modal-btn {
            width: 100%; border: none; border-radius: 14px; padding: 14px; font-family: 'Montserrat', sans-serif;
            font-weight: 900; font-size: 15px; color: #04070e; cursor: pointer; background: var(--accent-gold-gradient);
            box-shadow: 0 6px 20px rgba(255, 167, 81, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.4);
            text-transform: uppercase; transition: 0.1s; margin-bottom: 10px;
        }
        .modal-btn:active { transform: scale(0.96); }
        .modal-close { background: none; border: none; color: var(--text-muted); font-weight: 700; font-size: 14px; cursor: pointer; padding: 10px; width: 100%; }

        @media (max-width: 380px) {
            .chart-wrapper { height: 260px; }
            .btn-trade { font-size: 12px; padding: 10px 0; }
            .ob-row { font-size: 10px; }
        }
    </style>
</head>
<body>

    <!-- Водяные знаки на фоне -->
    <div class="bg-watermarks">
        <div class="bg-text">R-<span>TRADE</span></div>
        <div class="bg-text">R-<span>TRADE</span></div>
    </div>

    <div class="content">
        <!-- Шапка -->
        <div class="header">
            <div class="brand">R-<span>TRADE</span></div>
            <div class="balance-block">
                <div class="balance-info">
                    <span class="balance-label">БАЛАНС</span>
                    <span class="balance-value" id="balanceDisplay">50,000 ₽</span>
                </div>
                <button class="action-btn deposit" id="headerDepositBtn">КАССА</button>
            </div>
        </div>

        <!-- Выбор пары и ТФ -->
        <div class="toolbar">
            <div class="scroll-row" id="pairSelector">
                <div class="pill-btn active" data-pair="BTC">BTC/USDT</div>
                <div class="pill-btn" data-pair="ETH">ETH/USDT</div>
                <div class="pill-btn" data-pair="SOL">SOL/USDT</div>
                <div class="pill-btn" data-pair="TON">TON/USDT</div>
            </div>
            <div class="scroll-row" id="tfSelector">
                <div class="pill-btn" data-tf="1m">1m</div>
                <div class="pill-btn" data-tf="5m">5m</div>
                <div class="pill-btn active" data-tf="15m">15m</div>
                <div class="pill-btn" data-tf="1h">1H</div>
                <div class="pill-btn" data-tf="4h">4H</div>
            </div>
        </div>

        <!-- График -->
        <div class="chart-wrapper">
            <div class="current-price-badge" id="chartPrice">64,230.50</div>
            <div id="tvchart"></div>
        </div>

        <!-- Торговая панель (Стакан + Ввод ордера) -->
        <div class="trading-section">
            <!-- Стакан (Orderbook) -->
            <div class="orderbook">
                <div class="ob-header"><span>Цена</span><span>Кол-во</span></div>
                <div class="ob-list" id="obAsks">
                    <div class="ob-row ask"><span>64,235.10</span><span class="size">0.45</span><div class="ob-bg" style="width: 40%"></div></div>
                    <div class="ob-row ask"><span>64,234.50</span><span class="size">1.20</span><div class="ob-bg" style="width: 70%"></div></div>
                    <div class="ob-row ask"><span>64,232.00</span><span class="size">0.15</span><div class="ob-bg" style="width: 20%"></div></div>
                </div>
                <div class="ob-divider"></div>
                <div class="ob-list" id="obBids">
                    <div class="ob-row bid"><span>64,228.50</span><span class="size">0.80</span><div class="ob-bg" style="width: 50%"></div></div>
                    <div class="ob-row bid"><span>64,227.10</span><span class="size">2.50</span><div class="ob-bg" style="width: 90%"></div></div>
                    <div class="ob-row bid"><span>64,225.00</span><span class="size">0.30</span><div class="ob-bg" style="width: 30%"></div></div>
                </div>
            </div>

            <!-- Форма заявки -->
            <div class="order-form">
                <div>
                    <div class="input-group">
                        <label>Сумма сделки</label>
                        <div class="input-box">
                            <input type="number" id="orderAmount" value="1000" min="100">
                            <span>₽</span>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Кредитное плечо</label>
                        <div class="input-box">
                            <input type="number" value="10" min="1" max="100" style="text-align: right; margin-right: 5px;">
                            <span>x</span>
                        </div>
                    </div>
                </div>
                <div class="trade-btns">
                    <button class="btn-trade long" id="btnLong">LONG</button>
                    <button class="btn-trade short" id="btnShort">SHORT</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Нижняя навигация -->
    <div class="bottom-nav">
        <div class="nav-item">
            <div class="icon">🏠</div>
            <span>Главная</span>
        </div>
        <div class="nav-item active">
            <div class="icon">📈</div>
            <span>Торговля</span>
        </div>
        <div class="nav-item" id="navWallet">
            <div class="icon">💼</div>
            <span>Кошелек</span>
        </div>
        <div class="nav-item">
            <div class="icon">👤</div>
            <span>Профиль</span>
        </div>
    </div>

    <!-- Модальное окно Кассы (Пополнение / Вывод) -->
    <div class="modal-overlay" id="cashierModal">
        <div class="modal-content">
            <div class="modal-title">КАССА R-TRADE</div>
            <div class="modal-tabs">
                <div class="modal-tab active" id="tabDeposit">Пополнить</div>
                <div class="modal-tab" id="tabWithdraw">Вывести</div>
            </div>
            
            <input type="number" class="modal-input" id="cashierAmount" placeholder="Сумма в ₽" value="5000">
            
            <button class="modal-btn" id="btnConfirmCashier">ПЕРЕЙТИ К ОПЛАТЕ</button>
            <button class="modal-close" id="btnCloseCashier">Отмена</button>
        </div>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand();

        function vibrate(type = 'medium') {
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred(type);
            }
        }

        // --- УПРАВЛЕНИЕ UI ---
        
        // Переключение пар и таймфреймов
        document.querySelectorAll('.pill-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                vibrate('light');
                const parent = this.parentElement;
                parent.querySelectorAll('.pill-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                if (this.hasAttribute('data-pair')) {
                    document.getElementById('chartPrice').innerText = '...'; // Имитация загрузки
                    setTimeout(() => generateMockData(), 300);
                }
            });
        });

        // Торговые кнопки
        document.getElementById('btnLong').addEventListener('click', () => processTrade('LONG'));
        document.getElementById('btnShort').addEventListener('click', () => processTrade('SHORT'));

        function processTrade(side) {
            vibrate('heavy');
            const amount = document.getElementById('orderAmount').value;
            tg.showAlert(`✅ Ордер ${side} на ${amount} ₽ успешно размещен!`);
        }

        // --- МОДАЛЬНОЕ ОКНО КАССЫ ---
        const cashierModal = document.getElementById('cashierModal');
        let cashierMode = 'deposit';

        function openCashier() {
            vibrate('medium');
            cashierModal.classList.add('active');
        }

        document.getElementById('headerDepositBtn').addEventListener('click', openCashier);
        document.getElementById('navWallet').addEventListener('click', openCashier);

        document.getElementById('btnCloseCashier').addEventListener('click', () => {
            cashierModal.classList.remove('active');
        });

        // Вкладки в кассе
        document.getElementById('tabDeposit').addEventListener('click', function() {
            vibrate('light');
            cashierMode = 'deposit';
            this.classList.add('active');
            document.getElementById('tabWithdraw').classList.remove('active');
            document.getElementById('btnConfirmCashier').innerText = 'ПЕРЕЙТИ К ОПЛАТЕ';
        });

        document.getElementById('tabWithdraw').addEventListener('click', function() {
            vibrate('light');
            cashierMode = 'withdraw';
            this.classList.add('active');
            document.getElementById('tabDeposit').classList.remove('active');
            document.getElementById('btnConfirmCashier').innerText = 'СОЗДАТЬ ЗАЯВКУ';
        });

        document.getElementById('btnConfirmCashier').addEventListener('click', () => {
            vibrate('heavy');
            const amt = document.getElementById('cashierAmount').value;
            if(cashierMode === 'deposit') {
                tg.showAlert(`🔄 Создан счет на пополнение: ${amt} ₽`);
            } else {
                tg.showAlert(`✅ Заявка на вывод ${amt} ₽ отправлена в обработку.`);
            }
            cashierModal.classList.remove('active');
        });

        // --- ГРАФИК (Lightweight Charts) ---
        const chartContainer = document.getElementById('tvchart');
        const chart = LightweightCharts.createChart(chartContainer, {
            layout: {
                background: { type: 'solid', color: 'transparent' },
                textColor: '#94a3b8',
            },
            grid: {
                vertLines: { color: 'rgba(255,255,255,0.03)' },
                horzLines: { color: 'rgba(255,255,255,0.03)' },
            },
            crosshair: {
                mode: LightweightCharts.CrosshairMode.Normal,
                vertLine: { color: '#2f88ff', width: 1, style: 1 },
                horzLine: { color: '#2f88ff', width: 1, style: 1 },
            },
            rightPriceScale: {
                borderVisible: false,
            },
            timeScale: {
                borderVisible: false,
                timeVisible: true,
            },
            handleScroll: { mouseWheel: true, pressedMouseMove: true },
            handleScale: { axisPressedMouseMove: true, mouseWheel: true, pinch: true },
        });

        const candleSeries = chart.addCandlestickSeries({
            upColor: '#00e676',
            downColor: '#ff3b69',
            borderVisible: false,
            wickUpColor: '#00e676',
            wickDownColor: '#ff3b69',
        });

        function generateMockData() {
            const data = [];
            let time = Math.floor(Date.now() / 1000) - 86400 * 30; // 30 дней назад
            let price = 60000 + Math.random() * 5000;
            
            for (let i = 0; i < 150; i++) {
                const open = price;
                const close = open + (Math.random() - 0.5) * 800;
                const high = Math.max(open, close) + Math.random() * 400;
                const low = Math.min(open, close) - Math.random() * 400;
                
                data.push({ time, open, high, low, close });
                price = close;
                time += 86400; // +1 день
            }
            
            candleSeries.setData(data);
            
            // Обновляем бейдж цены
            const lastClose = data[data.length - 1].close;
            const priceBadge = document.getElementById('chartPrice');
            priceBadge.innerText = lastClose.toFixed(2);
            priceBadge.style.color = (data[data.length-1].close > data[data.length-1].open) ? '#00e676' : '#ff3b69';
            priceBadge.style.textShadow = (data[data.length-1].close > data[data.length-1].open) ? '0 0 20px rgba(0, 230, 118, 0.35)' : '0 0 20px rgba(255, 59, 105, 0.35)';
        }

        generateMockData();

        // Адаптация размера графика
        window.addEventListener('resize', () => {
            chart.resize(chartContainer.clientWidth, chartContainer.clientHeight);
        });
        setTimeout(() => chart.resize(chartContainer.clientWidth, chartContainer.clientHeight), 100);

        // Имитация живого стакана (Orderbook animation)
        setInterval(() => {
            document.querySelectorAll('.ob-bg').forEach(bg => {
                const newWidth = 10 + Math.random() * 80;
                bg.style.width = `${newWidth}%`;
                bg.style.transition = 'width 0.5s ease-in-out';
            });
        }, 1500);

    </script>
</body>
</html>
