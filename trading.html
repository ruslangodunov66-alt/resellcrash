<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>R‑Trade Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background: #0b1424;
            color: #e0e6ed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        /* Хедер */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            background: linear-gradient(135deg, #0b1424 0%, #162038 100%);
            border-bottom: 1px solid #1e314a;
            flex-shrink: 0;
            z-index: 5;
        }
        .logo {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 1px;
            text-shadow: 0 0 12px rgba(59,130,246,0.3);
        }
        .logo span { color: #3b82f6; }
        .header-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .balance-display {
            background: rgba(30,49,74,0.8);
            backdrop-filter: blur(4px);
            padding: 6px 16px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 600;
            color: #8ab4f8;
            border: 1px solid #1e314a;
        }
        .deposit-btn {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            color: #fff;
            padding: 6px 16px;
            border-radius: 24px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .deposit-btn:hover { transform: scale(1.03); }
        .exit-btn {
            background: none;
            border: none;
            color: #7a8ba3;
            font-size: 22px;
            cursor: pointer;
            transition: 0.2s;
            padding: 0 4px;
        }
        .exit-btn:hover { color: #e74c3c; }

        /* Панель управления */
        .top-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px;
            background: #101b30;
            border-bottom: 1px solid #1e314a;
            flex-shrink: 0;
            gap: 6px;
        }
        .pair-selector { display: flex; gap: 4px; flex-wrap: wrap; }
        .pair-btn {
            background: transparent;
            border: none;
            color: #7a8ba3;
            font-weight: 600;
            font-size: 13px;
            padding: 4px 12px;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.15s;
        }
        .pair-btn.active { background: #1e314a; color: #fff; }
        .pair-btn:hover { color: #fff; }

        .timeframe-selector { display: flex; gap: 2px; flex-wrap: wrap; }
        .tf-btn {
            background: transparent;
            border: none;
            color: #7a8ba3;
            font-size: 11px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.15s;
        }
        .tf-btn.active { background: #1e314a; color: #fff; }
        .tf-btn:hover { color: #fff; }

        /* График */
        .chart-wrapper {
            flex: 1;
            min-height: 0;
            position: relative;
            background: #0b1424;
        }
        #chart { width: 100%; height: 100%; }

        .drawing-tools {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 4px;
            z-index: 10;
            background: rgba(11,20,36,0.8);
            padding: 6px 10px;
            border-radius: 20px;
            border: 1px solid #1e314a;
            backdrop-filter: blur(4px);
        }
        .draw-btn {
            background: #1e314a;
            border: none;
            color: #8ab4f8;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            cursor: pointer;
            transition: 0.2s;
        }
        .draw-btn.active { background: #3b82f6; color: #fff; }
        .draw-btn:hover { background: #2a4060; }

        /* Панель ставок */
        .bet-panel {
            background: #101b30;
            border-top: 1px solid #1e314a;
            padding: 10px 16px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .bet-panel input {
            background: #1e314a;
            border: none;
            color: #fff;
            padding: 8px 14px;
            border-radius: 20px;
            width: 130px;
            font-size: 15px;
            text-align: center;
        }
        .bet-panel input:focus { outline: 1px solid #3b82f6; }
        .bet-buttons { display: flex; gap: 6px; }
        .bet-btn {
            border: none;
            padding: 8px 20px;
            border-radius: 24px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: 0.15s;
        }
        .bet-btn.up { background: #2ecc71; color: #0b1424; }
        .bet-btn.down { background: #e74c3c; color: #0b1424; }
        .bet-btn:active { transform: scale(0.94); }

        /* История и стакан */
        .bottom-panel {
            display: flex;
            flex-shrink: 0;
            background: #101b30;
            border-top: 1px solid #1e314a;
            height: 100px;
            overflow: hidden;
        }
        .history-panel {
            flex: 2;
            padding: 6px 12px;
            overflow-y: auto;
            border-right: 1px solid #1e314a;
        }
        .history-panel .history-item {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            padding: 3px 0;
            border-bottom: 1px solid #1a2a3f;
        }
        .history-panel .win { color: #2ecc71; }
        .history-panel .loss { color: #e74c3c; }
        .history-empty { color: #5a6f88; text-align: center; padding: 8px 0; font-size: 13px; }

        .orderbook-panel {
            flex: 1;
            padding: 6px 12px;
            overflow-y: auto;
            background: #0d1830;
        }
        .orderbook-panel .order-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            padding: 2px 0;
        }
        .orderbook-panel .bid { color: #2ecc71; }
        .orderbook-panel .ask { color: #e74c3c; }

        /* Модальное окно пополнения */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: #162038;
            border: 1px solid #1e314a;
            border-radius: 24px;
            padding: 24px 28px;
            width: 320px;
            max-width: 90%;
        }
        .modal h3 {
            color: #fff;
            font-size: 20px;
            margin-bottom: 12px;
            text-align: center;
        }
        .modal input {
            width: 100%;
            padding: 12px;
            border-radius: 16px;
            border: 1px solid #2a4060;
            background: #0b1424;
            color: #fff;
            font-size: 18px;
            text-align: center;
            margin-bottom: 16px;
        }
        .modal .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .modal .modal-buttons button {
            padding: 10px 24px;
            border-radius: 20px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .modal .modal-buttons .confirm { background: #3b82f6; color: #fff; }
        .modal .modal-buttons .cancel { background: #2a4060; color: #fff; }
        .modal .modal-buttons button:hover { transform: scale(1.03); }

        @media (max-width: 640px) {
            .top-panel { flex-direction: column; align-items: stretch; gap: 4px; }
            .pair-selector, .timeframe-selector { justify-content: center; }
            .bet-panel { flex-direction: column; align-items: stretch; }
            .bet-panel input { width: 100%; }
            .bottom-panel { flex-direction: column; height: auto; max-height: 160px; }
            .history-panel { border-right: none; border-bottom: 1px solid #1e314a; }
        }
    </style>
</head>
<body>
    <!-- Хедер -->
    <div class="header">
        <div class="logo">R<span>-Trade</span></div>
        <div class="header-controls">
            <span class="balance-display" id="balanceDisplay">💰 0 ₽</span>
            <button class="deposit-btn" id="depositBtn">➕ Пополнить</button>
            <button class="exit-btn" id="exitBtn">✕</button>
        </div>
    </div>

    <!-- Верхняя панель -->
    <div class="top-panel">
        <div class="pair-selector" id="pairSelector">
            <button class="pair-btn active" data-pair="BTC">BTC/USDT</button>
            <button class="pair-btn" data-pair="ETH">ETH/USDT</button>
            <button class="pair-btn" data-pair="SOL">SOL/USDT</button>
            <button class="pair-btn" data-pair="DOGE">DOGE/USDT</button>
        </div>
        <div class="timeframe-selector" id="timeframeSelector">
            <button class="tf-btn active" data-tf="1m">1м</button>
            <button class="tf-btn" data-tf="5m">5м</button>
            <button class="tf-btn" data-tf="15m">15м</button>
            <button class="tf-btn" data-tf="1h">1ч</button>
            <button class="tf-btn" data-tf="4h">4ч</button>
            <button class="tf-btn" data-tf="1d">1д</button>
        </div>
    </div>

    <!-- График -->
    <div class="chart-wrapper">
        <div id="chart"></div>
        <div class="drawing-tools">
            <button class="draw-btn" id="trendLineBtn">📈 Тренд</button>
            <button class="draw-btn" id="horizontalLineBtn">➖ Уровень</button>
            <button class="draw-btn" id="clearDrawingsBtn">🗑</button>
        </div>
    </div>

    <!-- Панель ставок -->
    <div class="bet-panel">
        <input type="number" id="betAmount" placeholder="Сумма" min="5" max="10000" step="5" value="100">
        <div class="bet-buttons">
            <button class="bet-btn up" id="btnUp">⬆ ВВЕРХ</button>
            <button class="bet-btn down" id="btnDown">⬇ ВНИЗ</button>
        </div>
    </div>

    <!-- Нижняя панель: история + стакан -->
    <div class="bottom-panel">
        <div class="history-panel" id="historyPanel">
            <div style="font-weight:600; font-size:13px; margin-bottom:4px;">📋 Сделки</div>
            <div id="historyList"><div class="history-empty">Нет сделок</div></div>
        </div>
        <div class="orderbook-panel" id="orderbookPanel">
            <div style="font-weight:600; font-size:13px; margin-bottom:4px;">📊 Стакан</div>
            <div id="orderbookList">
                <div class="order-row"><span class="ask">10.0</span><span>0.5</span></div>
                <div class="order-row"><span class="ask">9.9</span><span>1.2</span></div>
                <div class="order-row"><span class="bid">9.8</span><span>2.3</span></div>
                <div class="order-row"><span class="bid">9.7</span><span>1.8</span></div>
            </div>
        </div>
    </div>

    <!-- Модальное окно пополнения -->
    <div class="modal-overlay" id="depositModal">
        <div class="modal">
            <h3>💰 Пополнение баланса</h3>
            <input type="number" id="depositAmount" placeholder="Сумма в ₽" min="10" step="10" value="500">
            <div class="modal-buttons">
                <button class="confirm" id="confirmDeposit">✅ Подтвердить</button>
                <button class="cancel" id="cancelDeposit">❌ Отмена</button>
            </div>
        </div>
    </div>

    <script>
        // ---------- ИНИЦИАЛИЗАЦИЯ TELEGRAM ----------
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const userId = tg.initDataUnsafe?.user?.id || null;
        if (!userId) {
            tg.showAlert('Ошибка: пользователь не идентифицирован');
        }

        // ---------- НАСТРОЙКИ ----------
        const assets = {
            BTC: { name: 'Bitcoin', minBet: 100, maxBet: 10000, color: '#f7931a' },
            ETH: { name: 'Ethereum', minBet: 50, maxBet: 5000, color: '#627eea' },
            SOL: { name: 'Solana', minBet: 10, maxBet: 2000, color: '#14f195' },
            DOGE: { name: 'Dogecoin', minBet: 5, maxBet: 1000, color: '#c2a633' }
        };

        let currentPair = 'BTC';
        let currentTimeframe = '1m';
        let balance = 0;
        let tradeHistory = [];

        // Состояние графика
        let chart = null;
        let candleSeries = null;
        let priceHistory = [];
        let candles = [];
        let currentPrice = 0;
        let drawings = [];
        let drawMode = null;

        // DOM
        const chartContainer = document.getElementById('chart');
        const balanceDisplay = document.getElementById('balanceDisplay');
        const historyList = document.getElementById('historyList');
        const betAmountInput = document.getElementById('betAmount');

        // ---------- ОБНОВЛЕНИЕ UI ----------
        function updateBalanceUI() {
            balanceDisplay.textContent = `💰 ${balance.toLocaleString()} ₽`;
        }

        function renderHistory() {
            if (!tradeHistory.length) {
                historyList.innerHTML = '<div class="history-empty">Нет сделок</div>';
                return;
            }
            let html = '';
            tradeHistory.slice().reverse().forEach(h => {
                const sign = h.result === 'win' ? '✅' : '❌';
                const cls = h.result === 'win' ? 'win' : 'loss';
                const profit = h.profit || 0;
                html += `<div class="history-item">
                    <span>${sign} ${h.asset} ${h.direction}</span>
                    <span>${h.bet}₽ → <span class="${cls}">${profit >= 0 ? '+' : ''}${profit}₽</span></span>
                </div>`;
            });
            historyList.innerHTML = html;
        }

        // ---------- ОТПРАВКА В БОТ ----------
        function sendToBot(action, data = {}) {
            const payload = { action, ...data, userId };
            tg.sendData(JSON.stringify(payload));
        }

        function fetchPortfolio() {
            sendToBot('get_trading_portfolio');
        }

        function fetchPrices() {
            sendToBot('get_trading_prices');
        }

        // ---------- ОБРАБОТКА ОТВЕТОВ ----------
        tg.onEvent('webAppData', (event) => {
            try {
                const response = JSON.parse(event.data);
                if (!response.success) {
                    tg.showAlert('❌ ' + (response.error || 'Ошибка'));
                    return;
                }
                if (response.portfolio) {
                    const p = response.portfolio;
                    balance = p.balance || 0;
                    updateBalanceUI();
                    if (p.history) {
                        tradeHistory = p.history.slice(-10);
                        renderHistory();
                    }
                }
                if (response.prices) {
                    updatePrices(response.prices);
                }
                if (response.bet_id) {
                    tg.showAlert('✅ Ставка принята! Результат придёт в чат.');
                    setTimeout(fetchPortfolio, 500);
                }
                if (response.message) {
                    tg.showAlert(response.message);
                }
            } catch (e) {
                console.error('Ошибка обработки ответа:', e);
            }
        });

        // ---------- ОБНОВЛЕНИЕ ЦЕН И СВЕЧЕЙ ----------
        function updatePrices(prices) {
            const assetData = prices[currentPair];
            if (!assetData) return;
            const price = assetData.price;
            currentPrice = price;

            const now = Math.floor(Date.now() / 1000);
            priceHistory.push({ time: now, price: price });
            if (priceHistory.length > 3000) priceHistory.shift();

            aggregateCandles(now);
            if (candleSeries) {
                candleSeries.setData(candles);
            }
        }

        function aggregateCandles(now) {
            const interval = getIntervalSeconds(currentTimeframe);
            const candleTime = Math.floor(now / interval) * interval;

            if (candles.length === 0 || candles[candles.length-1].time !== candleTime) {
                if (candles.length > 0) {
                    const last = candles[candles.length-1];
                    const ticksInBar = priceHistory.filter(t => t.time >= last.time && t.time < candleTime);
                    if (ticksInBar.length > 0) last.close = ticksInBar[ticksInBar.length-1].price;
                }
                candles.push({
                    time: candleTime,
                    open: currentPrice,
                    high: currentPrice,
                    low: currentPrice,
                    close: currentPrice
                });
                if (candles.length > 500) candles.shift();
            } else {
                const cur = candles[candles.length-1];
                cur.high = Math.max(cur.high, currentPrice);
                cur.low = Math.min(cur.low, currentPrice);
                cur.close = currentPrice;
            }
        }

        function getIntervalSeconds(tf) {
            const map = { '1m':60, '5m':300, '15m':900, '1h':3600, '4h':14400, '1d':86400 };
            return map[tf] || 60;
        }

        // ---------- ГРАФИК ----------
        function initChart() {
            chart = LightweightCharts.createChart(chartContainer, {
                layout: { background: { color: '#0b1424' }, textColor: '#8ab4f8' },
                grid: { vertLines: { color: '#1a2a3f' }, horzLines: { color: '#1a2a3f' } },
                crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
                rightPriceScale: { borderColor: '#1e314a' },
                timeScale: { borderColor: '#1e314a', timeVisible: true, secondsVisible: false },
                width: chartContainer.clientWidth,
                height: chartContainer.clientHeight,
            });
            candleSeries = chart.addCandlestickSeries({
                upColor: '#2ecc71', downColor: '#e74c3c',
                borderUpColor: '#2ecc71', borderDownColor: '#e74c3c',
                wickUpColor: '#2ecc71', wickDownColor: '#e74c3c',
            });
            window.addEventListener('resize', () => {
                chart.resize(chartContainer.clientWidth, chartContainer.clientHeight);
            });
            setupDrawingTools();
        }

        // ---------- РИСОВАНИЕ ----------
        function setupDrawingTools() {
            document.getElementById('trendLineBtn').addEventListener('click', () => {
                if (drawMode === 'trend') { drawMode = null; document.getElementById('trendLineBtn').classList.remove('active'); return; }
                drawMode = 'trend';
                document.getElementById('trendLineBtn').classList.add('active');
                document.getElementById('horizontalLineBtn').classList.remove('active');
                tg.showAlert('Режим: тренд. Кликните на график для первой точки, затем второй.');
            });
            document.getElementById('horizontalLineBtn').addEventListener('click', () => {
                if (drawMode === 'horizontal') { drawMode = null; document.getElementById('horizontalLineBtn').classList.remove('active'); return; }
                drawMode = 'horizontal';
                document.getElementById('horizontalLineBtn').classList.add('active');
                document.getElementById('trendLineBtn').classList.remove('active');
                tg.showAlert('Режим: уровень. Кликните на график для размещения линии.');
            });
            document.getElementById('clearDrawingsBtn').addEventListener('click', () => {
                drawings.forEach(d => chart.removeSeries(d));
                drawings = [];
                tg.showAlert('Все рисунки удалены.');
            });
            chart.subscribeClick((param) => {
                if (!drawMode) return;
                if (!param.time) return;
                const price = param.price;
                const time = param.time;

                if (drawMode === 'trend') {
                    if (!window._trendStart) {
                        window._trendStart = { time, price };
                        tg.showAlert('Первая точка установлена. Кликните для второй.');
                    } else {
                        const start = window._trendStart;
                        const end = { time, price };
                        const lineData = [
                            { time: start.time, value: start.price },
                            { time: end.time, value: end.price }
                        ];
                        const lineSeries = chart.addLineSeries({ color: '#3b82f6', lineWidth: 2, priceLineVisible: false });
                        lineSeries.setData(lineData);
                        drawings.push(lineSeries);
                        window._trendStart = null;
                        drawMode = null;
                        document.getElementById('trendLineBtn').classList.remove('active');
                        tg.showAlert('Трендовая линия добавлена.');
                    }
                } else if (drawMode === 'horizontal') {
                    const lineData = [
                        { time: candles[0]?.time || Math.floor(Date.now()/1000) - 3600, value: price },
                        { time: candles[candles.length-1]?.time || Math.floor(Date.now()/1000), value: price }
                    ];
                    const lineSeries = chart.addLineSeries({ color: '#e67e22', lineWidth: 2, priceLineVisible: false });
                    lineSeries.setData(lineData);
                    drawings.push(lineSeries);
                    drawMode = null;
                    document.getElementById('horizontalLineBtn').classList.remove('active');
                    tg.showAlert('Горизонтальная линия добавлена.');
                }
            });
        }

        // ---------- СТАВКА ----------
        function makeBet(direction) {
            let amount = parseInt(betAmountInput.value);
            const info = assets[currentPair];
            if (isNaN(amount) || amount < info.minBet || amount > info.maxBet) {
                tg.showAlert(`❌ Ставка от ${info.minBet} до ${info.maxBet}₽`);
                return;
            }
            if (balance < amount) {
                tg.showAlert('❌ Недостаточно средств!');
                return;
            }
            sendToBot('trade_bet', { asset: currentPair, direction, amount });
            document.getElementById('btnUp').disabled = true;
            document.getElementById('btnDown').disabled = true;
            setTimeout(() => {
                document.getElementById('btnUp').disabled = false;
                document.getElementById('btnDown').disabled = false;
            }, 2000);
        }

        // ---------- ПЕРЕКЛЮЧЕНИЕ ПАРЫ ----------
        function switchPair(pair) {
            currentPair = pair;
            document.querySelectorAll('.pair-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.pair === pair);
            });
            const info = assets[pair];
            betAmountInput.min = info.minBet;
            betAmountInput.max = info.maxBet;
            betAmountInput.placeholder = `${info.minBet} – ${info.maxBet}₽`;
            priceHistory = []; candles = [];
            if (candleSeries) candleSeries.setData([]);
            fetchPrices();
        }

        function switchTimeframe(tf) {
            currentTimeframe = tf;
            document.querySelectorAll('.tf-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.tf === tf);
            });
            priceHistory = []; candles = [];
            if (candleSeries) candleSeries.setData([]);
            fetchPrices();
        }

        // ---------- ПОПОЛНЕНИЕ (МОДАЛЬНОЕ ОКНО) ----------
        const depositModal = document.getElementById('depositModal');
        const depositAmountInput = document.getElementById('depositAmount');

        document.getElementById('depositBtn').addEventListener('click', () => {
            depositModal.classList.add('show');
            depositAmountInput.value = 500;
            depositAmountInput.focus();
        });

        document.getElementById('cancelDeposit').addEventListener('click', () => {
            depositModal.classList.remove('show');
        });

        document.getElementById('confirmDeposit').addEventListener('click', () => {
            const amount = parseInt(depositAmountInput.value);
            if (isNaN(amount) || amount <= 0) {
                tg.showAlert('❌ Введите корректную сумму');
                return;
            }
            sendToBot('deposit_to_casino', { amount });
            depositModal.classList.remove('show');
            tg.showAlert(`⏳ Запрос на пополнение ${amount}₽ отправлен. Баланс обновится автоматически.`);
            setTimeout(fetchPortfolio, 1000);
        });

        // ---------- ВЫХОД ----------
        document.getElementById('exitBtn').addEventListener('click', () => {
            tg.close();
        });

        // ---------- ИНИЦИАЛИЗАЦИЯ ----------
        function init() {
            document.getElementById('btnUp').addEventListener('click', () => makeBet('up'));
            document.getElementById('btnDown').addEventListener('click', () => makeBet('down'));

            document.querySelectorAll('.pair-btn').forEach(btn => {
                btn.addEventListener('click', () => switchPair(btn.dataset.pair));
            });
            document.querySelectorAll('.tf-btn').forEach(btn => {
                btn.addEventListener('click', () => switchTimeframe(btn.dataset.tf));
            });

            initChart();
            fetchPortfolio();
            fetchPrices();

            setInterval(fetchPrices, 3000);
            setInterval(fetchPortfolio, 15000);
        }

        init();
    </script>
</body>
</html>
