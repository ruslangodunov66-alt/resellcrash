<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Трейдинг | Resell Tycoon</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: radial-gradient(circle at 30% 10%, #0c1120, #020408); color: #ddd; padding: 20px; min-height: 100vh; }
        .container { max-width: 700px; margin: 0 auto; }
        .glass-card { background: rgba(20,30,45,0.7); backdrop-filter: blur(12px); border-radius: 48px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(0,255,255,0.3); }
        h2 { font-size: 28px; background: linear-gradient(135deg, #ffcc44, #ff6644); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 15px; }
        .balance { font-size: 18px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 40px; text-align: center; margin-bottom: 20px; }
        .asset-selector { display: flex; gap: 12px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
        .asset-btn { background: #1e2a3a; border: none; padding: 8px 20px; border-radius: 40px; color: #c0e0ff; cursor: pointer; transition: 0.2s; }
        .asset-btn.active { background: #ffaa44; color: #0a0f1a; font-weight: bold; }
        .chart-container { margin: 20px 0; height: 300px; position: relative; }
        .price-info { text-align: center; font-size: 28px; font-weight: bold; margin: 10px 0; color: #ffcc44; }
        .change { font-size: 16px; margin-left: 10px; }
        .positive { color: #2ecc71; }
        .negative { color: #e74c3c; }
        .bet-area { display: flex; gap: 10px; justify-content: center; align-items: center; flex-wrap: wrap; margin: 20px 0; }
        .bet-input { padding: 12px 16px; border-radius: 40px; border: none; background: #1e2a3a; color: white; width: 160px; text-align: center; font-size: 16px; }
        button { border: none; padding: 10px 24px; border-radius: 40px; font-weight: bold; cursor: pointer; transition: 0.1s; }
        button:active { transform: scale(0.96); }
        .btn-up { background: #2ecc71; color: white; box-shadow: 0 0 8px #2ecc71; }
        .btn-down { background: #e74c3c; color: white; box-shadow: 0 0 8px #e74c3c; }
        .history { margin-top: 25px; max-height: 250px; overflow-y: auto; }
        .history-item { padding: 8px; border-bottom: 1px solid #2a3e55; font-size: 13px; }
        .win { color: #2ecc71; }
        .loss { color: #e74c3c; }
        .back-btn { background: #555; width: 100%; margin-top: 20px; color: white; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; padding: 8px 20px; border-radius: 30px; font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>
<div class="container">
    <div class="glass-card">
        <h2>📈 КРИПТО ТРЕЙДИНГ</h2>
        <div class="balance" id="balance">💰 Баланс: загрузка...</div>
        <div class="asset-selector" id="assetSelector"></div>
        <div class="price-info">
            <span id="currentPrice">0.00</span> $
            <span id="changePercent" class="change"></span>
        </div>
        <div class="chart-container">
            <canvas id="priceChart"></canvas>
        </div>
        <div class="bet-area">
            <input type="number" id="betAmount" class="bet-input" placeholder="Сумма ₽" min="5" max="10000" step="5" value="100">
            <button class="btn-up" id="btnUp">🔺 ВВЕРХ</button>
            <button class="btn-down" id="btnDown">🔻 ВНИЗ</button>
        </div>
        <div class="history">
            <h3>📋 Последние сделки</h3>
            <div id="historyList">Нет сделок</div>
        </div>
    </div>
    <button class="back-btn" onclick="window.location.href='index.html'">🔙 На главную</button>
</div>
<div class="toast" id="toast"></div>

<script>
    // ---------- ИНИЦИАЛИЗАЦИЯ TELEGRAM ----------
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    // Получаем userId (из URL-параметра или из данных пользователя)
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('userId') || tg.initDataUnsafe?.user?.id;
    if (!userId) {
        tg.showAlert('❌ Не удалось определить пользователя. Перезапустите игру.');
    }

    // ---------- НАСТРОЙКИ ----------
    const assets = {
        BTC: { name: "Bitcoin", color: "#f7931a", minBet: 100, maxBet: 10000, basePrice: 51200 },
        ETH: { name: "Ethereum", color: "#627eea", minBet: 50,  maxBet: 5000,  basePrice: 3100 },
        SOL: { name: "Solana",   color: "#14f195", minBet: 10,  maxBet: 2000,  basePrice: 145 },
        DOGE:{ name: "Dogecoin", color: "#c2a633", minBet: 5,   maxBet: 1000,  basePrice: 0.18 }
    };

    let currentAsset = 'BTC';
    let balance = 0;
    let priceHistory = [];      // массив цен для графика (последние 60)
    let chart = null;
    let currentPrice = 0;
    let tradeHistory = [];      // последние 10 сделок

    // ---------- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ----------
    function showToast(msg) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.add('show');
        clearTimeout(el._timeout);
        el._timeout = setTimeout(() => el.classList.remove('show'), 3000);
    }

    // ---------- ОТПРАВКА ДАННЫХ В БОТ ----------
    function sendToBot(action, data = {}) {
        const payload = { action, ...data, userId };
        tg.sendData(JSON.stringify(payload));
    }

    // ---------- ЗАПРОС ЦЕН ----------
    function fetchPrices() {
        sendToBot('get_trading_prices');
    }

    // ---------- ЗАПРОС ПОРТФЕЛЯ ----------
    function fetchPortfolio() {
        sendToBot('get_trading_portfolio');
    }

    // ---------- ОБРАБОТКА ОТВЕТОВ ОТ БОТА ----------
    tg.onEvent('webAppData', (event) => {
        try {
            const response = JSON.parse(event.data);
            if (!response.success) {
                showToast('❌ ' + (response.error || 'Ошибка'));
                return;
            }

            // Ответ от get_trading_prices
            if (response.prices) {
                updatePrices(response.prices);
            }

            // Ответ от get_trading_portfolio
            if (response.portfolio) {
                updatePortfolio(response.portfolio);
            }

            // Ответ от trade_bet (подтверждение ставки)
            if (response.bet_id) {
                showToast('✅ Ставка принята! Результат придёт в чат.');
                // Сразу обновим портфель, чтобы увидеть списание
                setTimeout(fetchPortfolio, 500);
            }

            // Общее сообщение
            if (response.message) {
                showToast(response.message);
            }
        } catch (e) {
            console.error('Ошибка обработки ответа бота:', e);
        }
    });

    // ---------- ОБНОВЛЕНИЕ ЦЕН ----------
    function updatePrices(prices) {
        const assetData = prices[currentAsset];
        if (!assetData) return;
        const price = assetData.price;
        const trend = assetData.trend || 0;
        const history = assetData.history || [];

        currentPrice = price;

        // Обновляем график
        priceHistory = history.slice(-60);
        if (priceHistory.length < 2) {
            // Если истории нет, заполним текущей ценой
            while (priceHistory.length < 2) priceHistory.push(price);
        }
        updateChart();

        // Обновляем отображение цены
        document.getElementById('currentPrice').textContent = price.toFixed(2);
        const changePct = ((price - (priceHistory[priceHistory.length-2] || price)) / (priceHistory[priceHistory.length-2] || price) * 100).toFixed(2);
        const changeElem = document.getElementById('changePercent');
        changeElem.textContent = (changePct >= 0 ? '+' : '') + changePct + '%';
        changeElem.className = 'change ' + (changePct >= 0 ? 'positive' : 'negative');
    }

    // ---------- ОБНОВЛЕНИЕ ПОРТФЕЛЯ ----------
    function updatePortfolio(portfolio) {
        balance = portfolio.balance || 0;
        document.getElementById('balance').innerHTML = `💰 Баланс: ${balance.toLocaleString()}₽`;

        // История ставок
        const history = portfolio.history || [];
        tradeHistory = history.slice(-10);
        renderHistory();
    }

    function renderHistory() {
        const container = document.getElementById('historyList');
        if (!tradeHistory.length) {
            container.innerHTML = '<div>Нет сделок</div>';
            return;
        }
        let html = '';
        for (let h of tradeHistory.slice().reverse()) {
            const sign = h.result === 'win' ? '✅' : '❌';
            const profit = h.profit || 0;
            const direction = h.direction === 'up' ? 'ВВЕРХ' : 'ВНИЗ';
            html += `<div class="history-item">
                ${sign} ${h.asset} ${direction} | ${h.bet}₽ → ${profit >= 0 ? '+' : ''}${profit}₽
                <span style="float:right;color:#888;">${new Date(h.time).toLocaleTimeString()}</span>
            </div>`;
        }
        container.innerHTML = html;
    }

    // ---------- ГРАФИК ----------
    function initChart() {
        const ctx = document.getElementById('priceChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array.from({length: 60}, (_,i) => i+1),
                datasets: [{
                    label: 'Цена USD',
                    data: [],
                    borderColor: '#ffcc44',
                    backgroundColor: 'rgba(255, 204, 68, 0.1)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.2,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: { legend: { display: false }, tooltip: { mode: 'index' } },
                scales: {
                    x: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { display: false } },
                    y: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#ccc' } }
                }
            }
        });
    }

    function updateChart() {
        if (!chart) return;
        chart.data.datasets[0].data = priceHistory.slice(-60);
        chart.update();
    }

    // ---------- ПЕРЕКЛЮЧЕНИЕ АКТИВА ----------
    function switchAsset(asset) {
        currentAsset = asset;
        const info = assets[asset];
        const betInput = document.getElementById('betAmount');
        betInput.min = info.minBet;
        betInput.max = info.maxBet;
        betInput.value = Math.min(Math.max(betInput.value, info.minBet), info.maxBet);

        // Сброс графика и цен (запросим новые)
        priceHistory = [];
        fetchPrices();

        // Подсветка кнопок
        document.querySelectorAll('.asset-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.asset === asset);
        });
    }

    // ---------- СТАВКА ----------
    function makeBet(direction) {
        let amount = parseInt(document.getElementById('betAmount').value);
        const info = assets[currentAsset];
        if (isNaN(amount) || amount < info.minBet || amount > info.maxBet) {
            tg.showAlert(`❌ Ставка должна быть от ${info.minBet} до ${info.maxBet}₽`);
            return;
        }
        if (balance < amount) {
            tg.showAlert('❌ Недостаточно средств!');
            return;
        }
        sendToBot('trade_bet', {
            asset: currentAsset,
            direction: direction,
            amount: amount
        });
        // Блокируем кнопки на 3 секунды, чтобы избежать спама
        document.getElementById('btnUp').disabled = true;
        document.getElementById('btnDown').disabled = true;
        setTimeout(() => {
            document.getElementById('btnUp').disabled = false;
            document.getElementById('btnDown').disabled = false;
        }, 3000);
    }

    // ---------- ИНИЦИАЛИЗАЦИЯ UI ----------
    function initAssetSelector() {
        const container = document.getElementById('assetSelector');
        container.innerHTML = '';
        for (let [symbol, info] of Object.entries(assets)) {
            const btn = document.createElement('button');
            btn.className = 'asset-btn' + (symbol === currentAsset ? ' active' : '');
            btn.dataset.asset = symbol;
            btn.textContent = symbol;
            btn.onclick = () => switchAsset(symbol);
            container.appendChild(btn);
        }
    }

    // ---------- ЗАПУСК ----------
    async function init() {
        initAssetSelector();
        initChart();

        // Загружаем портфель и цены
        fetchPortfolio();
        fetchPrices();

        // Периодическое обновление цен
        setInterval(fetchPrices, 3000);
        // Обновление портфеля каждые 15 секунд (чтобы видеть изменения баланса)
        setInterval(fetchPortfolio, 15000);

        // Обработчики кнопок ставок
        document.getElementById('btnUp').onclick = () => makeBet('up');
        document.getElementById('btnDown').onclick = () => makeBet('down');
    }

    init();
</script>
</body>
</html>
