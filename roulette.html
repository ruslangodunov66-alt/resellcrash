<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🎡 VIP РУЛЕТКА | R-GAME</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,600;0,800;1,800&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #070a0e;
            --container-bg: #0d131a;
            --panel-bg: #141c26;
            --accent-gold: #ffb703;
            --accent-gold-rgb: 255, 183, 3;
            --accent-blue: #1882ff;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-black: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(255, 183, 3, 0.12), transparent 50%),
                radial-gradient(circle at 50% 100%, rgba(24, 130, 255, 0.05), transparent 50%);
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            color: var(--text-main);
            overflow-x: hidden;
        }

        .game-container {
            max-width: 480px;
            width: 100%;
            background: var(--container-bg);
            border-radius: 36px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.8), inset 0 1px 2px rgba(255,255,255,0.05);
            padding: 16px;
            border: 1px solid rgba(255,255,255,0.03);
            position: relative;
        }

        /* HEADER & BALANCE */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding: 0 4px;
        }

        .brand {
            font-family: 'Montserrat', sans-serif;
            font-size: 22px;
            font-weight: 800;
            font-style: italic;
            background: linear-gradient(135deg, #ffffff, var(--accent-gold));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .brand span {
            color: var(--accent-gold);
            -webkit-text-fill-color: var(--accent-gold);
        }

        .info-card {
            background: var(--panel-bg);
            border-radius: 16px;
            padding: 10px 16px;
            font-weight: 800;
            font-size: 13px;
            color: var(--text-muted);
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .info-card span {
            color: var(--accent-gold);
            font-size: 17px;
            font-weight: 800;
            margin-left: 6px;
            text-shadow: 0 0 10px rgba(255,183,3,0.3);
        }

        /* HISTORY & STATS BOARD */
        .history-row {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 14px;
            padding: 8px 12px;
            margin-bottom: 12px;
            overflow-x: auto;
            scrollbar-width: none;
            border: 1px solid rgba(255,255,255,0.02);
        }
        .history-row::-webkit-scrollbar { display: none; }
        .history-title {
            font-size: 10px;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            white-space: nowrap;
        }
        .history-list {
            display: flex;
            gap: 6px;
        }
        .history-badge {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 800;
            color: #fff;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            flex-shrink: 0;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { transform: scale(0) translateX(-10px); opacity: 0; }
            to { transform: scale(1) translateX(0); opacity: 1; }
        }

        /* CANVAS DISPLAY BOX */
        .roulette-canvas-wrapper {
            background: radial-gradient(circle at 50% 50%, #151d2a, #070b10);
            border-radius: 28px;
            padding: 10px;
            margin-bottom: 12px;
            border: 2px solid var(--panel-bg);
            box-shadow: inset 0 10px 40px rgba(0,0,0,0.9), 0 0 25px rgba(255, 183, 3, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        canvas {
            display: block;
            max-width: 100%;
            aspect-ratio: 1;
            transform: translateZ(0); /* Аппаратное ускорение */
        }

        .status-panel {
            margin-top: 10px;
            font-size: 14px;
            font-weight: 800;
            color: var(--text-muted);
            text-align: center;
            min-height: 44px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            line-height: 1.3;
        }

        .win-glow {
            color: var(--accent-gold) !important;
            font-family: 'Montserrat', sans-serif;
            font-size: 18px;
            text-shadow: 0 0 15px rgba(255,183,3,0.5);
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); } to { transform: scale(1.02); }
        }

        /* STATS (HOT / COLD) */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
        }
        .stat-box {
            background: rgba(20, 28, 38, 0.5);
            border-radius: 12px;
            padding: 8px 12px;
            border: 1px solid rgba(255,255,255,0.02);
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stat-label {
            color: var(--text-muted);
            font-weight: 800;
            text-transform: uppercase;
        }
        .stat-values {
            display: flex;
            gap: 4px;
        }
        .stat-num {
            font-weight: 800;
            padding: 2px 5px;
            border-radius: 4px;
            color: #fff;
        }

        /* CONTROLS */
        .controls-card {
            background: var(--panel-bg);
            border-radius: 28px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.03);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .input-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .input-label {
            font-size: 11px;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* CHIPS SELECTOR */
        .chips-container {
            display: flex;
            justify-content: space-between;
            gap: 6px;
            margin-bottom: 12px;
        }
        .chip {
            flex: 1;
            height: 38px;
            border-radius: 50%;
            aspect-ratio: 1;
            background: radial-gradient(circle, #2e3b4e 60%, #1e293b 100%);
            border: 2px dashed rgba(255,255,255,0.2);
            color: #fff;
            font-size: 11px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            transition: all 0.15s ease;
        }
        .chip.active {
            border-color: var(--accent-gold);
            transform: scale(1.1) translateY(-3px);
            box-shadow: 0 6px 12px rgba(255, 183, 3, 0.4);
            background: radial-gradient(circle, var(--accent-gold) 20%, #b27a00 100%);
            color: #000;
        }

        .bet-input-wrapper {
            position: relative;
            margin-bottom: 12px;
        }

        .bet-input-wrapper::before {
            content: '₽';
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-weight: 800;
            font-size: 18px;
        }

        input[type="number"] {
            width: 100%;
            height: 46px;
            background: #090e14;
            border: 2px solid #1f2937;
            border-radius: 14px;
            padding: 0 16px 0 36px;
            color: #fff;
            font-weight: 800;
            font-size: 16px;
            font-family: 'Nunito', sans-serif;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-gold);
            box-shadow: 0 0 10px rgba(255, 183, 3, 0.15);
        }

        .color-buttons-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
        }

        button {
            border: none;
            border-radius: 14px;
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            font-size: 13px;
            color: white;
            cursor: pointer;
            transition: all 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            text-transform: uppercase;
        }

        button:active:not(:disabled) {
            transform: scale(0.96);
        }

        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .btn-bet {
            height: 44px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .btn-red { background: linear-gradient(135deg, #ff3b50, var(--accent-red)); text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
        .btn-black { background: linear-gradient(135deg, #475569, #1e293b); border: 1px solid rgba(255,255,255,0.05); text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
        .btn-green { background: linear-gradient(135deg, #10b981, #059669); grid-column: span 2; height: 40px; }

        .number-bet-row {
            display: flex;
            gap: 8px;
            align-items: center;
            border-top: 1px solid rgba(255,255,255,0.04);
            padding-top: 12px;
            margin-top: 12px;
        }

        .num-input-wrapper {
            width: 90px;
        }

        .num-input-wrapper input {
            padding: 0;
            text-align: center;
        }

        .btn-number {
            flex: 1;
            height: 46px;
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        }

        .footer {
            display: flex;
            gap: 10px;
            margin-top: 6px;
        }

        .btn-menu {
            flex: 1;
            background: var(--accent-blue);
            padding: 12px;
            box-shadow: 0 4px 0 #0f5bb8;
            border-radius: 14px;
            font-size: 13px;
        }
        .btn-menu:active { box-shadow: 0 1px 0 #0f5bb8; transform: translateY(3px); }

        .btn-exit {
            flex: 1;
            background: #1e2530;
            padding: 12px;
            box-shadow: 0 4px 0 #090e14;
            border-radius: 14px;
            font-size: 13px;
        }
        .btn-exit:active { box-shadow: 0 1px 0 #090e14; transform: translateY(3px); }

        /* UTIL CLASSES */
        .bg-red { background-color: var(--accent-red) !important; }
        .bg-black { background-color: var(--accent-black) !important; }
        .bg-green { background-color: var(--accent-green) !important; }
    </style>
</head>
<body>
<div class="game-container">
    <div class="header">
        <div class="brand">R-<span>ROULETTE</span></div>
        <div class="info-card">Баланс: <span id="balanceDisplay">0₽</span></div>
    </div>

    <!-- Spin History -->
    <div class="history-row">
        <div class="history-title">История:</div>
        <div class="history-list" id="historyList">
            <!-- Сюда вставляются последние числа -->
        </div>
    </div>

    <!-- 2D Canvas & Status Panel -->
    <div class="roulette-canvas-wrapper">
        <canvas id="rouletteCanvas" width="340" height="340"></canvas>
        <div class="status-panel" id="statusPanel">Делайте ваши ставки, господа!</div>
    </div>

    <!-- Hot/Cold Stats -->
    <div class="stats-grid">
        <div class="stat-box">
            <span class="stat-label">🔥 Горячие:</span>
            <div class="stat-values" id="hotNumbers">
                <span class="stat-num bg-red">7</span>
                <span class="stat-num bg-black">20</span>
                <span class="stat-num bg-red">32</span>
            </div>
        </div>
        <div class="stat-box">
            <span class="stat-label">❄️ Холодные:</span>
            <div class="stat-values" id="coldNumbers">
                <span class="stat-num bg-black">2</span>
                <span class="stat-num bg-green">0</span>
                <span class="stat-num bg-red">15</span>
            </div>
        </div>
    </div>

    <!-- Controls Panel -->
    <div class="controls-card">
        <div class="input-header-row">
            <div class="input-label">Выбор фишки:</div>
        </div>
        <div class="chips-container" id="chipsContainer">
            <div class="chip" data-val="100">100</div>
            <div class="chip active" data-val="500">500</div>
            <div class="chip" data-val="1000">1k</div>
            <div class="chip" data-val="5000">5k</div>
            <div class="chip" data-val="10000">10k</div>
        </div>

        <div class="input-label" style="margin-bottom: 6px;">Сумма ставки (₽):</div>
        <div class="bet-input-wrapper">
            <input type="number" id="betInput" min="100" max="100000" step="100" value="500">
        </div>

        <div class="input-label" style="margin-bottom: 6px;">Ставка на сектор:</div>
        <div class="color-buttons-grid">
            <button class="btn-bet btn-red" id="btnRed" onclick="handleBet('red')">🔴 Красное x2</button>
            <button class="btn-bet btn-black" id="btnBlack" onclick="handleBet('black')">⚫ Чёрное x2</button>
            <button class="btn-bet btn-green" id="btnGreen" onclick="handleBet('green')">🟢 Зеро x14</button>
        </div>

        <div class="number-bet-row">
            <div class="num-input-wrapper">
                <input type="number" id="numberInput" placeholder="0-36" min="0" max="36">
            </div>
            <button class="btn-number" id="btnNum" onclick="handleBet('number')">🔢 На число x35</button>
        </div>
    </div>

    <div class="footer">
        <button class="btn-menu" id="menuBtn">В МЕНЮ</button>
        <button class="btn-exit" id="exitBtn">ВЫЙТИ</button>
    </div>
</div>

<script>
    (function() {
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        if (tg.HapticFeedback) tg.enableClosingConfirmation();

        let userId = null;
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('userId')) userId = urlParams.get('userId');
        else if (tg.initDataUnsafe?.user?.id) userId = tg.initDataUnsafe.user.id;

        // Европейское колесо (классический порядок номеров)
        const wheelNumbers = [
            0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 
            24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26
        ];

        function getColorByNumber(num) {
            if (num === 0) return 'зеленый';
            // В рулетке цвета распределены по строгой схеме, а не просто четное-нечетное
            const redNumbers = [1, 3, 5, 7, 9, 12, 14, 16, 18, 19, 21, 23, 25, 27, 30, 32, 34, 36];
            return redNumbers.includes(num) ? 'красный' : 'черный';
        }

        // Локальное сохранение истории и баланса
        let casinoBalance = parseInt(localStorage.getItem('casinoBalance')) || 50000;
        let spinHistory = JSON.parse(localStorage.getItem('roulette_history')) || [0, 32, 15, 19, 4];
        
        const balanceSpan = document.getElementById('balanceDisplay');
        const historyList = document.getElementById('historyList');

        function updateBalanceDisplay(newBalance) {
            casinoBalance = newBalance;
            localStorage.setItem('casinoBalance', String(casinoBalance));
            balanceSpan.innerText = casinoBalance.toLocaleString() + ' ₽';
        }
        updateBalanceDisplay(casinoBalance);

        function updateHistoryUI() {
            historyList.innerHTML = '';
            spinHistory.slice(-10).reverse().forEach(num => {
                const badge = document.createElement('div');
                badge.className = 'history-badge';
                const col = getColorByNumber(num);
                if (col === 'красный') badge.classList.add('bg-red');
                else if (col === 'черный') badge.classList.add('bg-black');
                else badge.classList.add('bg-green');
                badge.innerText = num;
                historyList.appendChild(badge);
            });
            // Обновляем горячие/холодные
            calculateStats();
        }

        function calculateStats() {
            const counts = {};
            for (let i = 0; i <= 36; i++) counts[i] = 0;
            spinHistory.forEach(n => counts[n] = (counts[n] || 0) + 1);

            const sorted = Object.keys(counts).map(Number).sort((a,b) => counts[b] - counts[a]);
            
            // Горячие
            const hotDiv = document.getElementById('hotNumbers');
            hotDiv.innerHTML = '';
            sorted.slice(0, 3).forEach(num => {
                const span = document.createElement('span');
                span.className = `stat-num ${getColorClass(getColorByNumber(num))}`;
                span.innerText = num;
                hotDiv.appendChild(span);
            });

            // Холодные
            const coldDiv = document.getElementById('coldNumbers');
            coldDiv.innerHTML = '';
            sorted.slice(-3).reverse().forEach(num => {
                const span = document.createElement('span');
                span.className = `stat-num ${getColorClass(getColorByNumber(num))}`;
                span.innerText = num;
                coldDiv.appendChild(span);
            });
        }

        function getColorClass(colorStr) {
            if (colorStr === 'красный') return 'bg-red';
            if (colorStr === 'черный') return 'bg-black';
            return 'bg-green';
        }

        updateHistoryUI();

        // Canvas Рулетка
        const canvas = document.getElementById('rouletteCanvas');
        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr);

        const centerX = rect.width / 2;
        const centerY = rect.height / 2;
        const wheelRadius = rect.width / 2 - 10;

        let wheelAngle = 0; 
        let wheelSpeed = 0.05; // Постоянная скорость вращения на холостом ходу
        
        // Переменные симуляции физики шарика
        let ball = {
            angle: 0,
            radius: wheelRadius - 22,
            speed: 0,
            active: false,
            targetAngle: 0,
            phase: 0, // 0 - ожидание, 1 - запуск (внешний круг), 2 - падение/шпильки, 3 - в ячейке
            bounces: 0
        };

        let isSpinning = false;
        let isAudioPlaying = false;
        let currentBet = 500;

        // Фишки
        const chips = document.querySelectorAll('.chip');
        const betInput = document.getElementById('betInput');
        const numberInput = document.getElementById('numberInput');
        const statusPanel = document.getElementById('statusPanel');

        chips.forEach(chip => {
            chip.addEventListener('click', () => {
                if (isSpinning) return;
                triggerHaptic('light');
                chips.forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                const val = parseInt(chip.getAttribute('data-val'));
                betInput.value = val;
                currentBet = val;
            });
        });

        betInput.addEventListener('change', () => {
            let v = parseInt(betInput.value);
            if (isNaN(v) || v < 100) v = 100;
            if (v > 100000) v = 100000;
            currentBet = v;
            betInput.value = currentBet;
        });

        // Продвинутый звуковой движок
        // Твой кастомный MP3 файл:
        const rouletteAudio = new Audio('roulette-wheel-throw-2.mp3');
        rouletteAudio.volume = 1.0;

        let audioCtx = null;
        function initAudio() {
            if (!audioCtx && window.AudioContext) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const resume = () => audioCtx?.resume();
                document.body.addEventListener('touchstart', resume, { once: true });
                document.body.addEventListener('click', resume, { once: true });
            }
        }

        // Процедурные звуки (синхронизируются со шпильками и падениями)
        function playSynthesizedTick(freq = 900, duration = 0.03, vol = 0.1) {
            if (!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch(e){}
        }

        function playSynthesizedBounce() {
            playSynthesizedTick(750, 0.05, 0.12);
            setTimeout(() => playSynthesizedTick(500, 0.03, 0.08), 20);
        }

        function playSynthesizedStop() {
            playSynthesizedTick(320, 0.15, 0.15);
        }

        function playTone(freq, duration, vol = 0.08, type = 'sine') {
            if (!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        function soundClick() { playTone(600, 0.05, 0.08); }
        function soundWin() {
            playTone(523, 0.08, 0.12);
            setTimeout(() => playTone(659, 0.08, 0.12), 80);
            setTimeout(() => playTone(783, 0.08, 0.12), 160);
            setTimeout(() => playTone(1046, 0.3, 0.2), 240);
        }
        function soundLose() { playTone(180, 0.4, 0.15, 'sawtooth'); }

        function triggerHaptic(style = 'light') {
            if (!tg.HapticFeedback) return;
            if (style === 'light') tg.HapticFeedback.impactOccurred('light');
            else if (style === 'medium') tg.HapticFeedback.impactOccurred('medium');
            else if (style === 'success') tg.HapticFeedback.notificationOccurred('success');
            else if (style === 'error') tg.HapticFeedback.notificationOccurred('error');
        }

        // РИСОВАНИЕ РУЛЕТКИ НА CANVAS
        function drawWheel() {
            ctx.clearRect(0, 0, rect.width, rect.height);

            // 1. Внешнее латунное/золотое кольцо (Обод)
            ctx.save();
            ctx.shadowColor = "rgba(0, 0, 0, 0.6)";
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(centerX, centerY, wheelRadius, 0, Math.PI * 2);
            const brassGrad = ctx.createRadialGradient(centerX, centerY, wheelRadius - 15, centerX, centerY, wheelRadius);
            brassGrad.addColorStop(0, '#85581A');
            brassGrad.addColorStop(0.3, '#E5A93C');
            brassGrad.addColorStop(0.5, '#FFF2A3');
            brassGrad.addColorStop(0.7, '#C59131');
            brassGrad.addColorStop(1, '#68400B');
            ctx.fillStyle = brassGrad;
            ctx.fill();
            ctx.restore();

            // 2. Деревянное кольцо
            ctx.beginPath();
            ctx.arc(centerX, centerY, wheelRadius - 10, 0, Math.PI * 2);
            const woodGrad = ctx.createRadialGradient(centerX, centerY, wheelRadius - 30, centerX, centerY, wheelRadius - 10);
            woodGrad.addColorStop(0, '#301802');
            woodGrad.addColorStop(0.5, '#4a2503');
            woodGrad.addColorStop(1, '#1b0d01');
            ctx.fillStyle = woodGrad;
            ctx.fill();

            // 3. Золотой внутренний кант колеса
            ctx.beginPath();
            ctx.arc(centerX, centerY, wheelRadius - 30, 0, Math.PI * 2);
            ctx.strokeStyle = '#D4AF37';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Смещаем систему координат под крутящееся колесо
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(wheelAngle);

            const segmentsCount = wheelNumbers.length;
            const arcSize = (Math.PI * 2) / segmentsCount;

            // 4. Отрисовка секторов с числами
            for (let i = 0; i < segmentsCount; i++) {
                const angle = i * arcSize;
                
                // Сектор
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, wheelRadius - 32, angle, angle + arcSize);
                ctx.closePath();

                const num = wheelNumbers[i];
                const col = getColorByNumber(num);
                if (col === 'зеленый') ctx.fillStyle = '#059669';
                else if (col === 'красный') ctx.fillStyle = '#dc2626';
                else ctx.fillStyle = '#111827';
                ctx.fill();

                // Разделители ячеек (золотые грани)
                ctx.strokeStyle = 'rgba(212, 175, 55, 0.4)';
                ctx.lineWidth = 1;
                ctx.stroke();

                // Текст (Номера)
                ctx.save();
                ctx.rotate(angle + arcSize / 2);
                ctx.fillStyle = '#FFFFFF';
                ctx.font = 'bold 11px Montserrat';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                // Небольшой поворот цифр, чтобы стояли радиально
                ctx.translate(0, -(wheelRadius - 48));
                ctx.rotate(Math.PI); 
                ctx.fillText(num, 0, 0);
                ctx.restore();
            }

            // 5. Конус в центре (турель)
            const turretRadius = wheelRadius - 100;
            ctx.beginPath();
            ctx.arc(0, 0, turretRadius, 0, Math.PI * 2);
            const goldGrad = ctx.createRadialGradient(-10, -10, 5, 0, 0, turretRadius);
            goldGrad.addColorStop(0, '#FFF3A8');
            goldGrad.addColorStop(0.4, '#D4AF37');
            goldGrad.addColorStop(0.8, '#AA7C11');
            goldGrad.addColorStop(1, '#5C3E00');
            ctx.fillStyle = goldGrad;
            ctx.fill();

            // Рукоятки турели (крестовина)
            ctx.lineWidth = 6;
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.lineCap = 'round';
            for (let j = 0; j < 4; j++) {
                ctx.rotate(Math.PI / 2);
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(0, turretRadius - 15);
                ctx.stroke();
                // Наконечник ручки
                ctx.beginPath();
                ctx.arc(0, turretRadius - 12, 5, 0, Math.PI * 2);
                ctx.fillStyle = '#FFF';
                ctx.fill();
            }

            ctx.restore(); // Возвращаем обычную систему координат

            // 6. Отрисовка неподвижных металлических шпилек (дефлекторов) на дорожке
            ctx.save();
            ctx.translate(centerX, centerY);
            const pinsCount = 8;
            for (let p = 0; p < pinsCount; p++) {
                const pAngle = (p * (Math.PI * 2)) / pinsCount;
                const pinX = Math.cos(pAngle) * (wheelRadius - 26);
                const pinY = Math.sin(pAngle) * (wheelRadius - 26);

                ctx.beginPath();
                ctx.arc(pinX, pinY, 3, 0, Math.PI * 2);
                const pinGrad = ctx.createRadialGradient(pinX - 1, pinY - 1, 0, pinX, pinY, 3);
                pinGrad.addColorStop(0, '#ffffff');
                pinGrad.addColorStop(1, '#7e8a9b');
                ctx.fillStyle = pinGrad;
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 2;
                ctx.fill();
            }
            ctx.restore();

            // 7. Отрисовка шарика
            if (ball.active) {
                const bX = centerX + Math.cos(ball.angle) * ball.radius;
                const bY = centerY + Math.sin(ball.angle) * ball.radius;

                ctx.save();
                // Тень от шарика
                ctx.shadowColor = 'rgba(0,0,0,0.8)';
                ctx.shadowBlur = 8;
                ctx.shadowOffsetX = 3;
                ctx.shadowOffsetY = 5;

                ctx.beginPath();
                ctx.arc(bX, bY, 7, 0, Math.PI * 2);
                const ballGrad = ctx.createRadialGradient(bX - 2, bY - 2, 1, bX, bY, 7);
                ballGrad.addColorStop(0, '#ffffff');
                ballGrad.addColorStop(0.7, '#e2e8f0');
                ballGrad.addColorStop(1, '#94a3b8');
                ctx.fillStyle = ballGrad;
                ctx.fill();
                ctx.restore();
            }
        }

        // Физический апдейтер 60 FPS
        let startTime = null;
        let finalNum = 0;
        let finalColor = 'зеленый';
        let winCallback = null;

        function updatePhysics(timestamp) {
            if (!startTime) startTime = timestamp;
            const elapsed = timestamp - startTime;

            // Вращение колеса
            if (isSpinning) {
                // Плавное замедление колеса от быстрого к медленному
                if (elapsed < 9000) {
                    wheelSpeed = 0.08 - (elapsed / 9000) * 0.03;
                } else {
                    wheelSpeed = 0.05 - ((elapsed - 9000) / 3000) * 0.025;
                }
            } else {
                // Холостой ход колеса
                wheelSpeed = 0.005;
            }
            wheelAngle += wheelSpeed;

            if (ball.active) {
                // Физические стадии движения шарика (синхронизировано с аудио на 12 сек)
                if (elapsed < 9000) {
                    // ФАЗА 1: Быстрое движение шарика по внешнему желобу в противоположную сторону колеса
                    ball.phase = 1;
                    ball.radius = wheelRadius - 16; 
                    ball.angle -= 0.15 - (elapsed / 9000) * 0.10; // Шарик замедляется
                    
                    // Легкий процедурный стук качения по треку
                    if (Math.random() < 0.15) {
                        playSynthesizedTick(1200, 0.01, 0.02);
                    }
                } else if (elapsed >= 9000 && elapsed < 11200) {
                    // ФАЗА 2: Шарик сваливается внутрь, бьется об шпильки (дефлекторы)
                    if (ball.phase === 1) {
                        ball.phase = 2;
                        triggerHaptic('medium');
                    }
                    
                    // Шарик сближается с центром колеса
                    const progress = (elapsed - 9000) / 2200;
                    ball.radius = (wheelRadius - 16) - progress * (wheelRadius - 16 - (wheelRadius - 40));
                    
                    // Хаотичные отскоки
                    ball.angle -= 0.04 * (1 - progress);
                    
                    // Симуляция столкновения со шпильками (каждые ~300мс)
                    if (Math.floor(elapsed / 250) % 2 === 0 && Math.random() < 0.4) {
                        ball.angle += (Math.random() - 0.5) * 0.2; // Толчок влево/вправо
                        playSynthesizedBounce();
                        triggerHaptic('light');
                    }
                } else if (elapsed >= 11200 && elapsed < 12000) {
                    // ФАЗА 3: Падение в целевую ячейку и амортизация (затухающий маятник)
                    ball.phase = 3;
                    
                    // Находим сектор целевой ячейки
                    const targetCellIndex = wheelNumbers.indexOf(finalNum);
                    const cellArc = (Math.PI * 2) / 37;
                    // Рассчитываем точный абсолютный угол ячейки на крутящемся колесе
                    const cellAbsoluteAngle = wheelAngle + targetCellIndex * cellArc + cellArc / 2;

                    // Плавное притяжение шарика к центру ячейки
                    const captureProgress = (elapsed - 11200) / 800;
                    ball.radius = (wheelRadius - 40) - Math.sin(captureProgress * Math.PI * 3.5) * 4 * (1 - captureProgress);
                    
                    // Плавный докат до угла ячейки
                    ball.angle = cellAbsoluteAngle + Math.sin(captureProgress * Math.PI * 4) * 0.1 * (1 - captureProgress);

                    if (Math.random() < 0.1) {
                        playSynthesizedTick(400, 0.05, 0.05);
                        triggerHaptic('light');
                    }
                } else {
                    // Конец симуляции
                    ball.active = false;
                    isSpinning = false;
                    playSynthesizedStop();
                    triggerHaptic('success');
                    winCallback();
                }
            }

            drawWheel();
            requestAnimationFrame(updatePhysics);
        }

        // Запуск бесконечного цикла рендеринга колеса
        requestAnimationFrame(updatePhysics);


        // КЛИК ПО СТАВКЕ
        window.handleBet = async function(type) {
            if (isSpinning) return;
            initAudio();
            soundClick();

            let v = parseInt(betInput.value);
            if (isNaN(v) || v < 100) {
                statusPanel.innerHTML = '<span style="color:var(--accent-red)">❌ Мин. ставка — 100₽</span>';
                return;
            }
            currentBet = Math.min(100000, Math.max(100, v));
            betInput.value = currentBet;

            if (casinoBalance < currentBet) {
                statusPanel.innerHTML = `<span style="color:var(--accent-red)">❌ Недостаточно средств!<br>Баланс: ${casinoBalance.toLocaleString()}₽</span>`;
                triggerHaptic('error');
                return;
            }

            let targetNumberValue = null;
            if (type === 'number') {
                targetNumberValue = parseInt(numberInput.value);
                if (isNaN(targetNumberValue) || targetNumberValue < 0 || targetNumberValue > 36) {
                    statusPanel.innerHTML = '<span style="color:var(--accent-red)">❌ Укажите число от 0 до 36</span>';
                    return;
                }
            }

            // СПИСЫВАЕМ СТАВКУ
            updateBalanceDisplay(casinoBalance - currentBet);

            isSpinning = true;
            statusPanel.innerHTML = '🔮 Крупье запускает шарик...<br><span style="font-size:11px;color:var(--accent-gold)">Ставки приняты, ставок больше нет!</span>';

            // Блокируем кнопки во время крутки
            document.querySelectorAll('button, input').forEach(el => el.disabled = true);

            // ОПРЕДЕЛЯЕМ ПОБЕДИТЕЛЯ ЗАРАНЕЕ
            finalNum = Math.floor(Math.random() * 37);
            finalColor = getColorByNumber(finalNum);

            // Воспроизводим звук
            try {
                rouletteAudio.currentTime = 0;
                rouletteAudio.play();
                isAudioPlaying = true;
            } catch(e) {
                console.log("Audio play blocked, fallback to synth activated.");
            }

            // Запускаем физику шарика
            startTime = performance.now();
            ball.active = true;
            ball.angle = Math.random() * Math.PI * 2; // Рандомная начальная позиция шарика
            ball.radius = wheelRadius - 16;
            ball.phase = 1;

            // Коллбек окончания игры
            winCallback = () => {
                // Разблокируем кнопки
                document.querySelectorAll('button, input').forEach(el => el.disabled = false);
                
                let isWin = false;
                let multiplier = 0;

                if (type === 'red' && finalColor === 'красный') { isWin = true; multiplier = 2; }
                else if (type === 'black' && finalColor === 'черный') { isWin = true; multiplier = 2; }
                else if (type === 'green' && finalColor === 'зеленый') { isWin = true; multiplier = 14; }
                else if (type === 'number' && targetNumberValue === finalNum) { isWin = true; multiplier = 35; }

                // Запись в историю
                spinHistory.push(finalNum);
                localStorage.setItem('roulette_history', JSON.stringify(spinHistory));
                updateHistoryUI();

                let games = parseInt(localStorage.getItem('profile_games_played')) || 0;
                let wins = parseInt(localStorage.getItem('profile_wins')) || 0;
                let losses = parseInt(localStorage.getItem('profile_losses')) || 0;
                let total_bet = parseInt(localStorage.getItem('profile_total_bet')) || 0;
                let total_win = parseInt(localStorage.getItem('profile_total_win')) || 0;

                games += 1;
                total_bet += currentBet;

                if (isWin) {
                    const winAmount = currentBet * multiplier;
                    updateBalanceDisplay(casinoBalance + winAmount);
                    
                    wins += 1;
                    total_win += winAmount;

                    statusPanel.innerHTML = `<span class="win-glow">🎉 ПОБЕДА! +${winAmount.toLocaleString()}₽</span><br>Выпало: <b>${finalNum} (${finalColor.toUpperCase()})</b>`;
                    soundWin();
                    triggerHaptic('success');
                } else {
                    losses += 1;
                    statusPanel.innerHTML = `<span style="color:var(--accent-red);font-weight:800;">❌ ПРОИГРЫШ! -${currentBet.toLocaleString()}₽</span><br>Выпало: <b>${finalNum} (${finalColor.toUpperCase()})</b>`;
                    soundLose();
                    triggerHaptic('error');
                }

                localStorage.setItem('profile_games_played', String(games));
                localStorage.setItem('profile_wins', String(wins));
                localStorage.setItem('profile_losses', String(losses));
                localStorage.setItem('profile_total_bet', String(total_bet));
                localStorage.setItem('profile_total_win', String(total_win));
            };
        };

        // КНОПКИ НАВИГАЦИИ
        function exitToMenu() {
            window.location.href = 'casino.html?userId=' + (userId || '');
        }

        function exitAndCollect() {
            tg.close();
        }

        document.getElementById('menuBtn').addEventListener('click', exitToMenu);
        document.getElementById('exitBtn').addEventListener('click', exitAndCollect);
    })();
</script>
