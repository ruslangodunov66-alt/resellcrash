<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🎡 VIP ROULETTE | R-GAME</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,600;0,800;1,800&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --container-bg: #12121a;
            --panel-bg: #1c1c26;
            --accent-gold: #d4af37;
            --accent-gold-glow: rgba(212, 175, 55, 0.4);
            --accent-red: #e63946;
            --accent-black: #1d1d24;
            --accent-green: #2a9d8f;
            --text-main: #f8f9fa;
            --text-muted: #8d99ae;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg-dark);
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 10px;
            color: var(--text-main);
            overflow-x: hidden;
        }

        .game-container {
            max-width: 480px;
            width: 100%;
            background: var(--container-bg);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 1px 1px rgba(255,255,255,0.05);
            padding: 16px;
            position: relative;
        }

        /* HEADER & BALANCE */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        
        .brand {
            font-family: 'Montserrat', sans-serif;
            font-size: 20px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .brand span { color: var(--accent-gold); }

        .balance-card {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--accent-gold-glow);
            border-radius: 12px;
            padding: 8px 14px;
            text-align: right;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .balance-label { font-size: 10px; color: var(--accent-gold); text-transform: uppercase; font-weight: 800; }
        .balance-value { font-size: 16px; font-weight: 900; letter-spacing: 0.5px; }

        /* HISTORY */
        .history-row {
            display: flex; align-items: center; gap: 8px;
            background: var(--panel-bg); border-radius: 12px; padding: 10px; margin-bottom: 16px;
            overflow-x: auto; scrollbar-width: none;
        }
        .history-row::-webkit-scrollbar { display: none; }
        .history-badge {
            width: 28px; height: 28px; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 800; color: #fff; flex-shrink: 0;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .bg-red { background-color: var(--accent-red) !important; }
        .bg-black { background-color: var(--accent-black) !important; }
        .bg-green { background-color: var(--accent-green) !important; }

        /* CANVAS */
        .roulette-canvas-wrapper {
            background: radial-gradient(circle at 50% 50%, #1a1a24, #0a0a0f);
            border-radius: 50%;
            padding: 10px;
            margin: 0 auto 16px auto;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: inset 0 10px 30px rgba(0,0,0,0.8), 0 0 40px var(--accent-gold-glow);
            display: flex; flex-direction: column; align-items: center; position: relative;
            width: fit-content;
        }
        canvas { display: block; max-width: 100%; aspect-ratio: 1; transform: translateZ(0); }

        /* STATUS */
        .status-panel {
            text-align: center; font-size: 15px; font-weight: 800; color: var(--text-muted);
            min-height: 48px; display: flex; flex-direction: column; justify-content: center;
            margin-bottom: 12px; background: var(--panel-bg); border-radius: 12px; padding: 10px;
        }
        .win-glow { color: var(--accent-gold); font-size: 18px; text-shadow: 0 0 15px var(--accent-gold-glow); }
        .lose-glow { color: var(--accent-red); font-size: 18px; }

        /* BETTING TABLE (FULL LAYOUT) */
        .controls-card {
            background: var(--panel-bg);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid rgba(255,255,255,0.04);
        }

        /* CHIPS */
        .chips-container { display: flex; justify-content: space-between; gap: 6px; margin-bottom: 16px; }
        .chip {
            flex: 1; height: 40px; border-radius: 50%; aspect-ratio: 1;
            background: #2b2b36; border: 2px dashed #4a4a5a;
            color: #fff; font-size: 12px; font-weight: 800;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s ease;
        }
        .chip.active {
            border-color: #fff; border-style: solid;
            background: radial-gradient(circle, var(--accent-gold) 20%, #997a00 100%);
            box-shadow: 0 0 15px var(--accent-gold-glow); color: #000; transform: translateY(-3px) scale(1.05);
        }

        /* FAST ACTIONS */
        .fast-actions { display: flex; gap: 8px; margin-bottom: 16px; }
        .btn-action {
            flex: 1; background: #2b2b36; border: none; border-radius: 8px; color: #fff;
            padding: 8px 0; font-weight: 800; font-size: 12px; cursor: pointer; text-transform: uppercase;
        }
        .btn-action:active { transform: scale(0.95); background: #3b3b4a; }

        /* TABLE LAYOUT — как на скриншоте, без пустых ячеек */
        .bet-table {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 6px;
            margin-bottom: 12px;
        }
        .bet-table .cell {
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            padding: 12px 0;
            text-align: center;
            font-weight: 800;
            font-size: 13px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.15s ease;
            text-transform: uppercase;
            color: #fff;
        }
        .bet-table .cell:active { transform: scale(0.94); background: rgba(255,255,255,0.08); }
        .bet-table .cell.red { background: var(--accent-red); border-color: var(--accent-red); color: #fff; }
        .bet-table .cell.black { background: var(--accent-black); border-color: #333; color: #fff; }
        .bet-table .cell.green { background: var(--accent-green); border-color: var(--accent-green); color: #fff; }
        .bet-table .cell.zero { background: #2a9d8f; border-color: #2a9d8f; color: #fff; grid-column: span 2; }
        .bet-table .cell.doz { background: #1e293b; border-color: #334155; }
        .bet-table .cell.even-odd { background: #1e293b; border-color: #334155; }

        /* NUMBER INPUT ROW */
        .number-bet-row {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .num-input {
            width: 80px;
            background: #0a0a0f;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            font-weight: 900;
            text-align: center;
            padding: 8px;
        }
        .btn-number {
            flex: 1;
            background: linear-gradient(135deg, #4f46e5, #4338ca);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-weight: 900;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 4px 0 #312e81;
            transition: transform 0.1s;
        }
        .btn-number:active { transform: scale(0.96); }

        /* FOOTER */
        .footer { display: flex; justify-content: space-between; margin-top: 16px; gap: 10px; }
        .btn-menu { flex: 1; background: transparent; border: 1px solid var(--text-muted); color: var(--text-muted); padding: 12px; border-radius: 12px; font-weight: 800; font-size: 12px; cursor: pointer;}
        .btn-menu:active { background: var(--panel-bg); }
        .btn-mute { width: 44px; background: #2b2b36; border: none; border-radius: 12px; font-size: 18px; color: #fff; cursor: pointer; }
        .btn-mute:active { transform: scale(0.9); }

        /* FLOATING WIN */
        .floating-win {
            position: fixed;
            pointer-events: none;
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 24px;
            color: var(--accent-gold);
            text-shadow: 0 0 20px var(--accent-gold-glow), 0 4px 10px rgba(0,0,0,0.5);
            z-index: 999;
            animation: floatUp 1.2s ease-out forwards;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-80px) scale(1.3); }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="header">
        <div class="brand">👑 <span>VIP</span> ROULETTE</div>
        <div class="balance-card">
            <div class="balance-label">Банк</div>
            <div class="balance-value" id="balanceDisplay">0 ₽</div>
        </div>
    </div>

    <div class="history-row" id="historyList"></div>

    <div class="roulette-canvas-wrapper">
        <canvas id="rouletteCanvas" width="320" height="320"></canvas>
    </div>

    <div class="status-panel" id="statusPanel">ДЕЛАЙТЕ ВАШИ СТАВКИ</div>

    <div class="controls-card">
        <!-- Chips -->
        <div class="chips-container" id="chipsContainer">
            <div class="chip" data-val="100">100</div>
            <div class="chip active" data-val="500">500</div>
            <div class="chip" data-val="1000">1K</div>
            <div class="chip" data-val="5000">5K</div>
            <div class="chip" data-val="10000">10K</div>
        </div>

        <!-- Fast actions -->
        <div class="fast-actions">
            <button class="btn-action" onclick="adjustBet('half')">/ 2</button>
            <button class="btn-action" onclick="adjustBet('double')">X 2</button>
            <button class="btn-action" onclick="adjustBet('max')">MAX</button>
            <button class="btn-action" id="btnRebet" onclick="rebet()">REBET</button>
        </div>

        <!-- Current bet display -->
        <div style="font-size: 10px; color: var(--text-muted); margin-bottom: 6px; font-weight: 800;">СТАВКА: <span id="currentBetDisplay" style="color: #fff; font-size: 14px;">500</span> ₽</div>

        <!-- Table betting layout (как на скриншоте, без пустот) -->
        <div class="bet-table" id="betTable">
            <div class="cell zero" data-bet="green">Зеро<br><span style="font-size:10px;opacity:0.7;">x36</span></div>
            <div class="cell red" data-bet="red">Красное<br><span style="font-size:10px;opacity:0.7;">x2</span></div>
            <div class="cell black" data-bet="black">Чёрное<br><span style="font-size:10px;opacity:0.7;">x2</span></div>
            <div class="cell doz" data-bet="doz1">1-12<br><span style="font-size:10px;opacity:0.7;">x3</span></div>
            <div class="cell doz" data-bet="doz2">13-24<br><span style="font-size:10px;opacity:0.7;">x3</span></div>
            <div class="cell doz" data-bet="doz3">25-36<br><span style="font-size:10px;opacity:0.7;">x3</span></div>
            <div class="cell even-odd" data-bet="even">Чёт<br><span style="font-size:10px;opacity:0.7;">x2</span></div>
            <div class="cell even-odd" data-bet="odd">Нечет<br><span style="font-size:10px;opacity:0.7;">x2</span></div>
            <div class="cell even-odd" data-bet="small">Малые<br><span style="font-size:10px;opacity:0.7;">x2</span></div>
            <div class="cell even-odd" data-bet="big">Большие<br><span style="font-size:10px;opacity:0.7;">x2</span></div>
        </div>

        <!-- Number bet row -->
        <div class="number-bet-row">
            <input type="number" class="num-input" id="numberInput" placeholder="0-36" min="0" max="36">
            <button class="btn-number" id="btnNum" onclick="handleBet('number')">ТОЧНОЕ ЧИСЛО (x36)</button>
        </div>
    </div>

    <div class="footer">
        <button class="btn-menu" id="exitBtn">Выйти в лобби</button>
        <button class="btn-mute" id="muteBtn">🔊</button>
    </div>
</div>

<script>
    (function() {
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let casinoBalance = parseInt(localStorage.getItem('casinoBalance')) || 100000;
        let spinHistory = JSON.parse(localStorage.getItem('roulette_history')) || [0, 32, 15, 19, 4, 21, 2];
        let currentBet = 500;
        let lastBetType = null;
        let lastBetValue = null;
        let isMuted = false;
        let isSpinning = false;

        const balanceSpan = document.getElementById('balanceDisplay');
        const currentBetDisplay = document.getElementById('currentBetDisplay');
        const historyList = document.getElementById('historyList');
        const statusPanel = document.getElementById('statusPanel');
        const numberInput = document.getElementById('numberInput');

        // Классическое европейское колесо
        const wheelNumbers = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26];
        const redNumbers = [1, 3, 5, 7, 9, 12, 14, 16, 18, 19, 21, 23, 25, 27, 30, 32, 34, 36];

        function getColorByNumber(num) {
            if (num === 0) return 'зеленый';
            return redNumbers.includes(num) ? 'красный' : 'черный';
        }

        function updateBalanceDisplay(newBalance) {
            casinoBalance = newBalance;
            localStorage.setItem('casinoBalance', String(casinoBalance));
            balanceSpan.innerText = casinoBalance.toLocaleString('ru-RU') + ' ₽';
        }
        updateBalanceDisplay(casinoBalance);

        function updateHistoryUI() {
            historyList.innerHTML = '';
            spinHistory.slice(-15).reverse().forEach(num => {
                const badge = document.createElement('div');
                badge.className = 'history-badge';
                const col = getColorByNumber(num);
                if (col === 'красный') badge.classList.add('bg-red');
                else if (col === 'черный') badge.classList.add('bg-black');
                else badge.classList.add('bg-green');
                badge.innerText = num;
                historyList.appendChild(badge);
            });
        }
        updateHistoryUI();

        // Чипсы и управление ставкой
        document.querySelectorAll('.chip').forEach(chip => {
            chip.addEventListener('click', () => {
                if (isSpinning) return;
                haptic('light');
                document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                currentBet = parseInt(chip.getAttribute('data-val'));
                updateBetDisplay();
            });
        });

        function updateBetDisplay() {
            if (currentBet > casinoBalance && casinoBalance > 0) currentBet = casinoBalance;
            if (currentBet < 10) currentBet = 10;
            currentBetDisplay.innerText = currentBet.toLocaleString('ru-RU');
        }

        window.adjustBet = function(action) {
            if (isSpinning) return;
            haptic('light');
            if (action === 'half') currentBet = Math.floor(currentBet / 2);
            else if (action === 'double') currentBet = currentBet * 2;
            else if (action === 'max') currentBet = casinoBalance;
            if (currentBet < 10) currentBet = 10;
            if (currentBet > casinoBalance) currentBet = casinoBalance;
            updateBetDisplay();
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        }

        window.rebet = function() {
            if (!lastBetType || isSpinning) return;
            if (lastBetType === 'number' && (lastBetValue === null || lastBetValue === undefined)) {
                statusPanel.innerHTML = '<span style="color:var(--accent-red)">Нет предыдущей ставки на число</span>';
                return;
            }
            handleBet(lastBetType, lastBetValue, true);
        }

        // --- CANVAS LOGIC (полностью сохранена) ---
        const canvas = document.getElementById('rouletteCanvas');
        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr);

        const centerX = rect.width / 2;
        const centerY = rect.height / 2;
        const wheelRadius = rect.width / 2 - 5;

        let wheelAngle = 0; 
        let wheelSpeed = 0.05;
        let ball = { angle: 0, radius: 0, active: false };
        let startTime = null;
        let finalNum = 0;

        function drawWheel() {
            ctx.clearRect(0, 0, rect.width, rect.height);

            // Обод
            ctx.beginPath();
            ctx.arc(centerX, centerY, wheelRadius, 0, Math.PI * 2);
            ctx.fillStyle = '#111';
            ctx.fill();
            ctx.lineWidth = 6;
            ctx.strokeStyle = '#d4af37';
            ctx.stroke();

            // Крутящаяся часть
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(wheelAngle);

            const segmentsCount = wheelNumbers.length;
            const arcSize = (Math.PI * 2) / segmentsCount;

            for (let i = 0; i < segmentsCount; i++) {
                const angle = i * arcSize;
                
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, wheelRadius - 10, angle, angle + arcSize);
                
                const num = wheelNumbers[i];
                const col = getColorByNumber(num);
                ctx.fillStyle = col === 'зеленый' ? '#2a9d8f' : col === 'красный' ? '#e63946' : '#1d1d24';
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.1)';
                ctx.lineWidth = 1;
                ctx.stroke();

                // Текст по касательной
                ctx.save();
                ctx.rotate(angle + arcSize / 2);
                ctx.fillStyle = '#FFFFFF';
                ctx.font = 'bold 10px Montserrat';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.translate(0, -(wheelRadius - 22));
                ctx.rotate(Math.PI / 2);
                ctx.fillText(num, 0, 0);
                ctx.restore();
            }

            // Центр
            ctx.beginPath();
            ctx.arc(0, 0, wheelRadius - 70, 0, Math.PI * 2);
            ctx.fillStyle = '#d4af37';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(0, 0, wheelRadius - 75, 0, Math.PI * 2);
            ctx.fillStyle = '#111';
            ctx.fill();

            // Крестовина
            ctx.lineWidth = 4;
            ctx.strokeStyle = '#d4af37';
            for (let j = 0; j < 4; j++) {
                ctx.rotate(Math.PI / 2);
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(0, wheelRadius - 75);
                ctx.stroke();
            }
            ctx.restore();

            // Шарик
            if (ball.active) {
                const bX = centerX + Math.cos(ball.angle) * ball.radius;
                const bY = centerY + Math.sin(ball.angle) * ball.radius;
                ctx.beginPath();
                ctx.arc(bX, bY, 5, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.shadowColor = 'rgba(0,0,0,0.8)';
                ctx.shadowBlur = 5;
                ctx.fill();
                ctx.shadowColor = 'transparent';
            }
        }

        function updatePhysics(timestamp) {
            if (!startTime) startTime = timestamp;
            const elapsed = timestamp - startTime;

            if (isSpinning) {
                wheelSpeed = elapsed < 4000 ? 0.06 : 0.06 - ((elapsed - 4000) / 4000) * 0.055;
            } else {
                wheelSpeed = 0.005;
            }
            wheelAngle += wheelSpeed;

            if (ball.active) {
                if (elapsed < 4000) {
                    ball.radius = wheelRadius - 6;
                    ball.angle -= 0.1;
                } else if (elapsed < 7000) {
                    const progress = (elapsed - 4000) / 3000;
                    ball.radius = (wheelRadius - 6) - progress * 40;
                    ball.angle -= 0.05 * (1 - progress);
                    if (Math.random() < 0.2) playSound(600, 'tick');
                } else if (elapsed < 8000) {
                    const targetIndex = wheelNumbers.indexOf(finalNum);
                    const cellArc = (Math.PI * 2) / 37;
                    const targetAngle = wheelAngle + targetIndex * cellArc + cellArc / 2;
                    ball.angle = targetAngle;
                    ball.radius = wheelRadius - 45;
                } else {
                    ball.active = false;
                    isSpinning = false;
                    finishGame();
                }
            }

            drawWheel();
            requestAnimationFrame(updatePhysics);
        }
        requestAnimationFrame(updatePhysics);

        // --- ИГРОВАЯ ЛОГИКА (расширена для новых типов ставок) ---
        let currentBetType = '';
        let targetNum = null;

        window.handleBet = function(type, forcedValue = null, isRebet = false) {
            if (isSpinning) return;
            
            if (!isRebet) {
                lastBetType = type;
                if (type === 'number') {
                    let v = parseInt(numberInput.value);
                    if (isNaN(v) || v < 0 || v > 36) {
                        statusPanel.innerHTML = '<span style="color:var(--accent-red)">Введите число от 0 до 36</span>';
                        haptic('error');
                        return;
                    }
                    lastBetValue = v;
                } else {
                    lastBetValue = null;
                }
            }
            
            targetNum = lastBetValue;
            currentBetType = type;

            if (currentBet > casinoBalance) {
                currentBet = casinoBalance;
                updateBetDisplay();
                if (currentBet < 10) {
                    statusPanel.innerHTML = '<span style="color:var(--accent-red)">Недостаточно средств!</span>';
                    haptic('error');
                    return;
                }
            }

            if (casinoBalance < currentBet) {
                statusPanel.innerHTML = '<span style="color:var(--accent-red)">Недостаточно средств!</span>';
                haptic('error');
                return;
            }

            updateBalanceDisplay(casinoBalance - currentBet);
            isSpinning = true;
            statusPanel.innerHTML = 'КРУПЬЕ ЗАПУСКАЕТ ШАРИК...';
            document.querySelectorAll('button, input').forEach(el => el.disabled = true);

            finalNum = Math.floor(Math.random() * 37);
            startTime = performance.now();
            ball.active = true;
            ball.angle = Math.random() * Math.PI * 2;
            
            playSound(300, 'spin');
        };

        function finishGame() {
            document.querySelectorAll('button, input').forEach(el => el.disabled = false);
            const fColor = getColorByNumber(finalNum);
            
            let isWin = false;
            let multiplier = 0;

            // Определение выигрыша для всех типов ставок
            if (currentBetType === 'red' && fColor === 'красный') { isWin = true; multiplier = 2; }
            else if (currentBetType === 'black' && fColor === 'черный') { isWin = true; multiplier = 2; }
            else if (currentBetType === 'green' && fColor === 'зеленый') { isWin = true; multiplier = 36; }
            else if (currentBetType === 'number' && targetNum === finalNum) { isWin = true; multiplier = 36; }
            else if (currentBetType === 'doz1' && finalNum >= 1 && finalNum <= 12) { isWin = true; multiplier = 3; }
            else if (currentBetType === 'doz2' && finalNum >= 13 && finalNum <= 24) { isWin = true; multiplier = 3; }
            else if (currentBetType === 'doz3' && finalNum >= 25 && finalNum <= 36) { isWin = true; multiplier = 3; }
            else if (currentBetType === 'even' && finalNum !== 0 && finalNum % 2 === 0) { isWin = true; multiplier = 2; }
            else if (currentBetType === 'odd' && finalNum !== 0 && finalNum % 2 !== 0) { isWin = true; multiplier = 2; }
            else if (currentBetType === 'small' && finalNum >= 1 && finalNum <= 18) { isWin = true; multiplier = 2; }
            else if (currentBetType === 'big' && finalNum >= 19 && finalNum <= 36) { isWin = true; multiplier = 2; }

            spinHistory.push(finalNum);
            localStorage.setItem('roulette_history', JSON.stringify(spinHistory));
            updateHistoryUI();

            if (isWin) {
                const winAmount = currentBet * multiplier;
                updateBalanceDisplay(casinoBalance + winAmount);
                statusPanel.innerHTML = `<span class="win-glow">+ ${winAmount.toLocaleString('ru-RU')} ₽</span><br>Выпало: <b>${finalNum} (${fColor.toUpperCase()})</b>`;
                haptic('success');
                playSound(800, 'win');
                showFloatingWin(winAmount);
            } else {
                statusPanel.innerHTML = `<span class="lose-glow">- ${currentBet.toLocaleString('ru-RU')} ₽</span><br>Выпало: <b>${finalNum} (${fColor.toUpperCase()})</b>`;
                haptic('error');
                playSound(200, 'lose');
            }
        }

        // Всплывающий выигрыш
        function showFloatingWin(amount) {
            const el = document.createElement('div');
            el.className = 'floating-win';
            el.textContent = '+ ' + amount.toLocaleString('ru-RU') + ' ₽';
            el.style.left = (window.innerWidth / 2 - 80) + 'px';
            el.style.top = '35%';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1400);
        }

        // --- ЗВУК (Web Audio API) ---
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioCtx();

        function playSound(freq, type) {
            if (isMuted || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            if (type === 'tick') {
                osc.type = 'triangle';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.05);
            } else if (type === 'spin') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'win') {
                const freqs = [523, 659, 784];
                freqs.forEach((f, i) => {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.type = 'sine';
                    o.frequency.value = f;
                    g.gain.setValueAtTime(0.12, audioCtx.currentTime + i * 0.07);
                    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * 0.07 + 0.3);
                    o.connect(g);
                    g.connect(audioCtx.destination);
                    o.start(audioCtx.currentTime + i * 0.07);
                    o.stop(audioCtx.currentTime + i * 0.07 + 0.3);
                });
            } else if (type === 'lose') {
                osc.type = 'sawtooth';
                osc.frequency.value = 180;
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.4);
            }
        }

        function haptic(style) {
            if (tg.HapticFeedback) {
                if (style === 'success' || style === 'error') {
                    tg.HapticFeedback.notificationOccurred(style);
                } else {
                    tg.HapticFeedback.impactOccurred(style);
                }
            }
        }

        // Обработчик кликов по ячейкам стола
        document.querySelectorAll('.bet-table .cell').forEach(cell => {
            cell.addEventListener('click', function(e) {
                e.stopPropagation();
                const betType = this.dataset.bet;
                if (betType) {
                    handleBet(betType);
                }
            });
        });

        // Mute button
        document.getElementById('muteBtn').addEventListener('click', function() {
            isMuted = !isMuted;
            this.innerText = isMuted ? '🔇' : '🔊';
            haptic('light');
        });

        // Exit button
        document.getElementById('exitBtn').addEventListener('click', () => {
            tg.close();
        });

        // Sync balance
        window.addEventListener('storage', (e) => {
            if (e.key === 'casinoBalance') {
                const newBal = parseInt(e.newValue);
                if (!isNaN(newBal)) {
                    casinoBalance = newBal;
                    balanceSpan.innerText = casinoBalance.toLocaleString('ru-RU') + ' ₽';
                }
            }
        });

        updateBetDisplay();

        // Инициализация звука при первом касании
        document.addEventListener('click', () => { if (audioCtx.state === 'suspended') audioCtx.resume(); }, { once: true });
        document.addEventListener('touchstart', () => { if (audioCtx.state === 'suspended') audioCtx.resume(); }, { once: true });

    })();
</script>
</body>
</html>
