<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Недвижимость | Resell Tycoon</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: radial-gradient(circle at 30% 10%, #0c1120, #020408); color: #ddd; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .glass-card { background: rgba(20,30,45,0.7); backdrop-filter: blur(12px); border-radius: 48px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(0,255,255,0.3); }
        h2 { font-size: 28px; background: linear-gradient(135deg, #ffcc44, #ff6644); background-clip: text; -webkit-background-clip: text; color: transparent; margin-bottom: 15px; }
        .balance { font-size: 18px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 40px; text-align: center; margin-bottom: 20px; }
        .house-card { background: rgba(0,0,0,0.55); border-radius: 32px; padding: 16px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; transition: 0.2s; }
        .house-card:hover { transform: translateY(-4px); border-color: rgba(0,255,255,0.6); }
        .house-name { font-size: 18px; font-weight: bold; }
        .house-price { color: #ffaa44; }
        .house-income { font-size: 12px; color: #88ff88; }
        button { background: #2ecc71; border: none; padding: 8px 18px; border-radius: 40px; font-weight: bold; cursor: pointer; }
        .current-badge { background: #1e5631; padding: 4px 16px; border-radius: 20px; }
        .back-btn { background: #555; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="glass-card">
        <h2>🏠 Недвижимость</h2>
        <div class="balance" id="balance">💰 Баланс: загрузка...</div>
    </div>
    <div class="glass-card" id="housesList">Загрузка...</div>
    <button class="back-btn" onclick="window.location.href='index.html'">🔙 На главную</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    const API_BASE = "https://nl12.bothost.ru";
    const USE_REAL_API = false;
    const userId = tg.initDataUnsafe?.user?.id || 1475910449;

    let balance = 0;
    let currentHouseId = "room";
    const mockHouses = [
        {"id": "room", "name": "🏚 Комната в общаге", "price": 0, "income_bonus": 0},
        {"id": "flat", "name": "🏢 Квартира", "price": 10000, "income_bonus": 150},
        {"id": "house", "name": "🏠 Одноэтажный дом", "price": 35000, "income_bonus": 400},
        {"id": "villa", "name": "🏰 Богатая вилла", "price": 100000, "income_bonus": 1200},
        {"id": "yacht", "name": "🛥 Яхта", "price": 250000, "income_bonus": 3000},
        {"id": "skyscraper", "name": "🏙 Небоскрёб", "price": 3000000, "income_bonus": 20000}
    ];

    async function fetchAPI(endpoint) {
        if (!USE_REAL_API) return null;
        try {
            const resp = await fetch(`${API_BASE}${endpoint}&tg_id=${userId}`);
            if (!resp.ok) throw new Error();
            return await resp.json();
        } catch(e) { return null; }
    }

    async function loadBalance() {
        if (!USE_REAL_API) { balance = 500000; document.getElementById('balance').innerHTML = `💰 Баланс: ${balance.toLocaleString()}₽`; return; }
        const data = await fetchAPI(`/api/me`);
        balance = data?.balance || 0;
        document.getElementById('balance').innerHTML = `💰 Баланс: ${balance.toLocaleString()}₽`;
    }

    async function loadCurrentHouse() {
        if (!USE_REAL_API) { currentHouseId = "flat"; renderHouses(); return; }
        const data = await fetchAPI(`/api/current_house`);
        currentHouseId = data?.house?.id || "room";
        renderHouses();
    }

    async function buyHouse(houseId, price) {
        if (balance < price && price > 0) { tg.showAlert(`❌ Не хватает ${price.toLocaleString()}₽`); return; }
        if (!USE_REAL_API) {
            const oldHouse = mockHouses.find(h=>h.id===currentHouseId);
            let diff = price - oldHouse.price;
            if (diff > 0 && balance < diff) { tg.showAlert(`❌ Не хватает доплаты`); return; }
            balance -= diff;
            currentHouseId = houseId;
            document.getElementById('balance').innerHTML = `💰 Баланс: ${balance.toLocaleString()}₽`;
            tg.showAlert(`✅ (МОК) ${mockHouses.find(h=>h.id===houseId).name} куплен!`);
            renderHouses();
            return;
        }
        const res = await fetch(`${API_BASE}/api/buy_house?tg_id=${userId}&house_id=${houseId}`, { method: 'POST' });
        const data = await res.json();
        if (data.balance !== undefined) {
            balance = data.balance;
            document.getElementById('balance').innerHTML = `💰 Баланс: ${balance.toLocaleString()}₽`;
            tg.showAlert(data.message);
            await loadCurrentHouse();
        } else tg.showAlert(`❌ ${data.message}`);
    }

    async function sellHouse() {
        if (currentHouseId === "room") { tg.showAlert(`❌ Нечего продавать`); return; }
        if (!USE_REAL_API) {
            const house = mockHouses.find(h=>h.id===currentHouseId);
            balance += house.price;
            currentHouseId = "room";
            document.getElementById('balance').innerHTML = `💰 Баланс: ${balance.toLocaleString()}₽`;
            tg.showAlert(`✅ (МОК) Дом продан за ${house.price}₽`);
            renderHouses();
            return;
        }
        const res = await fetch(`${API_BASE}/api/sell_house?tg_id=${userId}`, { method: 'POST' });
        const data = await res.json();
        if (data.balance !== undefined) {
            balance = data.balance;
            document.getElementById('balance').innerHTML = `💰 Баланс: ${balance.toLocaleString()}₽`;
            tg.showAlert(data.message);
            await loadCurrentHouse();
        } else tg.showAlert(`❌ ${data.message}`);
    }

    function renderHouses() {
        const container = document.getElementById('housesList');
        let html = '';
        for (let house of mockHouses) {
            const isCurrent = (house.id === currentHouseId);
            html += `
                <div class="house-card">
                    <div>
                        <div class="house-name">${house.name}</div>
                        <div class="house-price">💰 ${house.price.toLocaleString()}₽</div>
                        <div class="house-income">💵 +${house.income_bonus}₽/день</div>
                    </div>
                    <div>
                        ${isCurrent ? '<span class="current-badge">✅ ТЕКУЩЕЕ</span>' : `<button onclick="buyHouse('${house.id}', ${house.price})">🛒 Купить</button>`}
                    </div>
                </div>
            `;
        }
        if (currentHouseId !== "room") {
            html += `<div style="text-align:center; margin-top:15px;"><button style="background:#e74c3c;" onclick="sellHouse()">🏠 ПРОДАТЬ ТЕКУЩИЙ ДОМ</button></div>`;
        }
        container.innerHTML = html;
    }

    loadBalance();
    loadCurrentHouse();
</script>
</body>
</html>
