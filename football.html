<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>⚽ R-GAME · Live</title>
    <script src="https://telegram.org/js/telegram-web-app.js">
    </script>
    <style>
        /* ===== СТИЛИ (ДОПОЛНЕНЫ ДЛЯ LIVE-ИНДИКАТОРОВ) ===== */
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,600;0,800;0,900;1,800&family=Inter:wght@400;600;700;800;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            width: 100%;
            min-height: 100vh;
            background: #070b12;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        body {
            background-image:
                radial-gradient(circle at 10% 0%, rgba(24, 130, 255, 0.12), transparent 50%),
                radial-gradient(circle at 90% 100%, rgba(139, 92, 246, 0.08), transparent 50%);
            background-attachment: fixed;
        }

        #app {
            max-width: 560px;
            margin: 0 auto;
            padding: 10px 12px 100px;
            position: relative;
            z-index: 2;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(17, 24, 34, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 12px 16px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255,255,255,0.1);
        }

        .brand {
            font-family: 'Montserrat', sans-serif;
            font-size: 26px;
            font-weight: 800;
            font-style: italic;
            background: linear-gradient(135deg, #ffffff, #a0c4ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .brand span {
            color: #1882ff;
            -webkit-text-fill-color: #1882ff;
        }

        .header .balance {
            background: rgba(255, 215, 0, 0.08);
            padding: 6px 18px;
            border-radius: 40px;
            border: 1px solid rgba(255, 215, 0, 0.12);
            font-weight: 800;
            font-size: 16px;
            color: #FFD54A;
            backdrop-filter: blur(4px);
            cursor: default;
        }

        /* ТОП-ПАНЕЛЬ С ОБНОВЛЕНИЕМ */
        .top-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0 14px;
            gap: 8px;
        }
        .refresh-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 30px;
            padding: 6px 16px;
            color: #FFD54A;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .refresh-btn:active {
            transform: scale(0.92);
            background: rgba(255, 215, 0, 0.1);
        }
        .refresh-btn .icon {
            font-size: 18px;
        }
        .live-indicator {
            color: var(--accent-red);
            font-weight: 800;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(240, 48, 67, 0.1);
            padding: 4px 12px;
            border-radius: 30px;
            border: 1px solid rgba(240, 48, 67, 0.3);
        }
        .live-indicator .pulse {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #f03043;
            border-radius: 50%;
            animation: pulse 1.2s ease-in-out infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(0.7); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* TABS */
        .tabs {
            display: flex;
            gap: 8px;
            margin: 0 0 14px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px 0;
            background: rgba(255, 255, 255, 0.04);
            border: none;
            border-radius: 16px;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            letter-spacing: 0.3px;
            position: relative;
        }
        .tab-btn.active {
            background: rgba(255, 215, 0, 0.10);
            color: #FFD54A;
            box-shadow: inset 0 0 0 1px rgba(255, 215, 0, 0.25), 0 4px 12px rgba(255, 215, 0, 0.05);
        }
        .tab-btn:active {
            transform: scale(0.94);
        }
        .tab-btn .badge {
            background: #FFD54A;
            color: #0b0e17;
            border-radius: 30px;
            font-size: 11px;
            padding: 0 10px;
            margin-left: 6px;
            display: inline-block;
            font-weight: 900;
        }

        /* LEAGUE FILTER */
        .league-filter {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 4px 0 16px;
            scrollbar-width: none;
            flex-wrap: nowrap;
        }
        .league-filter::-webkit-scrollbar {
            display: none;
        }
        .league-btn {
            flex-shrink: 0;
            padding: 6px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 40px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .league-btn.active {
            background: rgba(255, 215, 0, 0.10);
            border-color: #FFD54A;
            color: #FFD54A;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.05);
        }
        .league-btn:active {
            transform: scale(0.94);
        }

        /* MATCH CARDS */
        .matches-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .match-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 16px 16px 14px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(4px);
            position: relative;
        }
        .match-card.live {
            border-color: rgba(240, 48, 67, 0.4);
            box-shadow: 0 0 20px rgba(240, 48, 67, 0.05);
        }
        .match-card.finished {
            opacity: 0.6;
        }

        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.35);
            margin-bottom: 8px;
        }
        .match-header .league-name {
            font-weight: 700;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0.3px;
        }
        .match-header .status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .match-header .status.live {
            color: #f03043;
        }
        .match-header .status.live .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #f03043;
            border-radius: 50%;
            animation: pulse 1.2s ease-in-out infinite;
        }
        .match-header .status.finished {
            color: rgba(255, 255, 255, 0.2);
        }
        .match-header .time {
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .match-teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }
        .team {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 16px;
            max-width: 40%;
        }
        .team .emblem {
            font-size: 26px;
            line-height: 1;
        }
        .match-vs {
            color: rgba(255, 255, 255, 0.12);
            font-weight: 800;
            font-size: 14px;
            letter-spacing: 2px;
        }

        .match-odds-main {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            margin-bottom: 8px;
        }
        .odd-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 6px 0;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 12px;
            position: relative;
            overflow: hidden;
        }
        .odd-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, transparent 60%);
            pointer-events: none;
        }
        .odd-btn .label {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.3);
            display: block;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .odd-btn .value {
            font-weight: 800;
            font-size: 18px;
            color: #fff;
            transition: color 0.2s;
        }
        .odd-btn:active {
            transform: scale(0.92);
        }
        .odd-btn.selected {
            border-color: #FFD54A;
            background: rgba(255, 215, 0, 0.10);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.10);
        }
        .odd-btn.selected .value {
            color: #FFD54A;
        }
        .odd-btn.disabled {
            opacity: 0.3;
            pointer-events: none;
        }

        /* ДОПОЛНИТЕЛЬНЫЕ РЫНКИ (спойлер) */
        .match-extra-toggle {
            display: flex;
            justify-content: center;
            margin-top: 6px;
        }
        .extra-toggle-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.2);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 20px;
            transition: 0.2s;
        }
        .extra-toggle-btn:active {
            transform: scale(0.9);
        }
        .extra-toggle-btn.active {
            color: #FFD54A;
            background: rgba(255, 215, 0, 0.06);
        }

        .match-odds-extra {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-top: 8px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }
        .match-odds-extra.open {
            display: grid;
        }
        .odd-btn-extra {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            padding: 5px 0;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 11px;
        }
        .odd-btn-extra .label {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.3);
            display: block;
        }
        .odd-btn-extra .value {
            font-weight: 700;
            font-size: 15px;
            color: #fff;
        }
        .odd-btn-extra:active {
            transform: scale(0.92);
        }
        .odd-btn-extra.selected {
            border-color: #FFD54A;
            background: rgba(255, 215, 0, 0.08);
        }
        .odd-btn-extra.selected .value {
            color: #FFD54A;
        }
        .odd-btn-extra.disabled {
            opacity: 0.3;
            pointer-events: none;
        }

        /* COUPON (без изменений) */
        .coupon-container {
            display: none;
            flex-direction: column;
            gap: 16px;
        }
        .coupon-container.show {
            display: flex;
        }
        .coupon-empty {
            text-align: center;
            padding: 50px 0;
            color: rgba(255, 255, 255, 0.2);
            font-size: 16px;
        }
        .coupon-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .coupon-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 12px 14px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .coupon-item .info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
        }
        .coupon-item .info .teams {
            font-weight: 700;
            font-size: 14px;
            line-height: 1.2;
        }
        .coupon-item .info .detail {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
        }
        .coupon-item .info .coef {
            font-weight: 800;
            color: #FFD54A;
            font-size: 16px;
        }
        .coupon-item .remove-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.15);
            font-size: 18px;
            cursor: pointer;
            padding: 4px 8px;
            transition: 0.2s;
        }
        .coupon-item .remove-btn:active {
            transform: scale(0.8);
            color: #f03043;
        }

        .coupon-total {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 18px;
            border: 1px solid rgba(255, 215, 0, 0.10);
            display: flex;
            flex-direction: column;
            gap: 12px;
            backdrop-filter: blur(8px);
        }
        .coupon-total .row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }
        .coupon-total .row .bold {
            font-weight: 700;
            color: #fff;
        }
        .coupon-total .row .gold {
            color: #FFD54A;
        }
        .coupon-total .bet-input {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            padding: 14px 16px;
            color: #fff;
            font-size: 20px;
            font-weight: 700;
            width: 100%;
            text-align: center;
            font-family: 'Inter', sans-serif;
            transition: 0.2s;
        }
        .coupon-total .bet-input:focus {
            outline: none;
            border-color: #FFD54A;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.10);
        }
        .coupon-total .place-bet-btn {
            background: linear-gradient(135deg, #3DDC84, #1a8a4a);
            border: none;
            border-radius: 16px;
            padding: 16px;
            font-weight: 800;
            font-size: 18px;
            color: #fff;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 0 #139642, 0 8px 24px rgba(27, 209, 93, 0.2);
        }
        .coupon-total .place-bet-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #139642;
        }
        .coupon-total .place-bet-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .history-container {
            display: none;
        }
        .history-container.show {
            display: block;
        }
        .history-empty {
            text-align: center;
            padding: 50px 0;
            color: rgba(255, 255, 255, 0.15);
            font-size: 16px;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(11, 14, 23, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 14px;
            max-width: 560px;
            margin: 0 auto;
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.3);
            font-size: 10px;
            cursor: pointer;
            transition: 0.25s;
            padding: 4px 12px;
            border-radius: 12px;
        }
        .nav-item .icon {
            font-size: 24px;
            line-height: 1;
        }
        .nav-item.active {
            color: #FFD54A;
        }
        .nav-item:active {
            transform: scale(0.88);
        }
        .nav-item .badge {
            background: #FFD54A;
            color: #0b0e17;
            border-radius: 30px;
            font-size: 10px;
            padding: 0 8px;
            font-weight: 800;
            margin-left: 2px;
        }

        @media (max-width: 420px) {
            .match-odds-main { grid-template-columns: repeat(5, 1fr); gap: 4px; }
            .odd-btn .value { font-size: 16px; }
            .team { font-size: 14px; gap: 4px; }
            .team .emblem { font-size: 20px; }
            .match-odds-extra { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 360px) {
            .match-odds-main { grid-template-columns: repeat(3, 1fr); }
            .match-odds-main .odd-btn:nth-child(4),
            .match-odds-main .odd-btn:nth-child(5) { grid-column: span 1; }
            .match-odds-extra { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <div id="app">
        <div class="header">
            <div class="brand">R-<span>GAME</span></div>
            <div class="balance" id="balanceDisplay">0 ₽</div>
        </div>

        <!-- Верхняя панель: Live-индикатор + обновление -->
        <div class="top-actions">
            <div class="live-indicator">
                <span class="pulse"></span> LIVE
            </div>
            <button class="refresh-btn" id="refreshBtn">
                <span class="icon">🔄</span> Обновить
            </button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="matches">Матчи</button>
            <button class="tab-btn" data-tab="coupon">Купон <span class="badge" id="couponCount">0</span></button>
            <button class="tab-btn" data-tab="history">История</button>
        </div>

        <div class="league-filter" id="leagueFilter">
            <button class="league-btn active" data-league="all">Все</button>
            <button class="league-btn" data-league="АПЛ">🏴󠁧󠁢󠁥󠁮󠁧󠁿 АПЛ</button>
            <button class="league-btn" data-league="Ла Лига">🇪🇸 Ла Лига</button>
            <button class="league-btn" data-league="Бундеслига">🇩🇪 Бундеслига</button>
            <button class="league-btn" data-league="Серия А">🇮🇹 Серия А</button>
            <button class="league-btn" data-league="Лига 1">🇫🇷 Лига 1</button>
            <button class="league-btn" data-league="РПЛ">🇷🇺 РПЛ</button>
            <button class="league-btn" data-league="ЧМ-2026">🏆 ЧМ-2026</button>
        </div>

        <div class="matches-container" id="matchesContainer"></div>

        <div class="coupon-container" id="couponContainer">
            <div class="coupon-empty" id="couponEmpty">➕ Добавьте исходы из матчей</div>
            <div class="coupon-list" id="couponList"></div>
            <div class="coupon-total" id="couponTotal" style="display:none;">
                <div class="row"><span>Событий</span> <span class="bold" id="eventsCount">0</span></div>
                <div class="row"><span>Общий коэффициент</span> <span class="bold gold" id="totalOdds">1.00</span></div>
                <div class="row"><span>Сумма ставки</span></div>
                <input type="number" class="bet-input" id="betSumInput" value="100" min="10" step="10" />
                <div class="row"><span>Потенциальный выигрыш</span> <span class="bold gold" id="potentialWin">0 ₽</span></div>
                <button class="place-bet-btn" id="placeBetBtn">Сделать ставку</button>
            </div>
        </div>

        <div class="history-container" id="historyContainer">
            <div class="history-empty">📋 История ставок пока пуста</div>
        </div>
    </div>

    <div class="bottom-nav" id="bottomNav">
        <button class="nav-item active" data-tab="matches"><span class="icon">🏠</span> Матчи</button>
        <button class="nav-item" data-tab="coupon"><span class="icon">🧾</span> Купон <span class="badge" id="navCouponBadge">0</span></button>
        <button class="nav-item" data-tab="history"><span class="icon">📊</span> История</button>
    </div>

    <script>
        (function() {
            'use strict';

            // =============================================================
            // 1. TELEGRAM & BALANCE
            // =============================================================
            const tg = window.Telegram.WebApp;
            if (tg) { tg.expand();
                tg.enableClosingConfirmation(); }
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('userId') || (tg?.initDataUnsafe?.user?.id) || '';

            let balance = parseInt(localStorage.getItem('casinoBalance')) || 10000;
            const balanceDisplay = document.getElementById('balanceDisplay');

            function updateBalanceDisplay() {
                balanceDisplay.innerText = balance.toLocaleString() + ' ₽';
                localStorage.setItem('casinoBalance', String(balance));
            }
            updateBalanceDisplay();

            // =============================================================
            // 2. АУДИО/ВИБРАЦИЯ
            // =============================================================
            let audioCtx = null;

            function initAudio() {
                if (!audioCtx && window.AudioContext) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    document.addEventListener('click', () => audioCtx?.resume(), { once: true });
                    document.addEventListener('touchstart', () => audioCtx?.resume(), { once: true });
                }
            }

            function playClick() {
                if (!audioCtx) return;
                try {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = 600;
                    gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.05);

                    osc.start();

                        const odds = parseFloat(this.dataset.odds);
                        const teams = this.dataset.teams;
                        const added = addToCoupon(matchId, type, label, odds, teams, 'extra');
                        if (added) {
                            this.classList.add('selected');
                            vibrate('light');
                            playClick();
                            initAudio();
                        } else {
                            this.classList.remove('selected');
                            const idx = coupon.findIndex(item => item.matchId === matchId && item.type === type && item
                                .marketType === 'extra');
                            if (idx !== -1) removeFromCoupon(idx);
                            document.querySelectorAll('.odd-btn-extra').forEach(b => {
                                const mid = parseInt(b.dataset.match);
                                const t = b.dataset.type;
                                if (mid === matchId && t === type) b.classList.remove('selected');
                            });
                        }
                    });
                });

                document.querySelectorAll('.extra-toggle-btn').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const matchId = parseInt(this.dataset.match);
                        extraOpen[matchId] = !extraOpen[matchId];
                        renderMatches();
                    });
                });
            }

            function renderCoupon() {
                if (coupon.length === 0) {
                    couponEmpty.style.display = 'block';
                    couponList.innerHTML = '';
                    couponTotal.style.display = 'none';
                    couponCount.textContent = '0';
                    navCouponBadge.textContent = '0';
                    return;
                }
                couponEmpty.style.display = 'none';
                couponTotal.style.display = 'block';

                let html = '';
                for (let i = 0; i < coupon.length; i++) {
                    const item = coupon[i];
                    html += `
                        <div class="coupon-item">
                            <div class="info">
                                <div class="teams">${item.teamNames}</div>
                                <div class="detail">${item.label} <span class="coef">${item.odds}</span></div>
                            </div>
                            <button class="remove-btn" data-index="${i}">✕</button>
                        </div>
                    `;
                }
                couponList.innerHTML = html;

                document.querySelectorAll('.coupon-item .remove-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const idx = parseInt(this.dataset.index);
                        const removed = coupon[idx];
                        removeFromCoupon(idx);
                        if (removed) {
                            const selector = removed.marketType === 'extra' ? '.odd-btn-extra' : '.odd-btn';
                            document.querySelectorAll(selector).forEach(b => {
                                const mid = parseInt(b.dataset.match);
                                const t = b.dataset.type;
                                if (mid === removed.matchId && t === removed.type) {
                                    b.classList.remove('selected');
                                }
                            });
                        }
                        vibrate('light');
                        playClick();
                        initAudio();
                    });
                });

                const total = coupon.reduce((acc, item) => acc * parseFloat(item.odds), 1);
                totalOdds.textContent = total.toFixed(2);
                eventsCount.textContent = coupon.length;
                couponCount.textContent = coupon.length;
                navCouponBadge.textContent = coupon.length;

                const betSum = parseInt(betSumInput.value) || 0;
                potentialWin.textContent = (betSum * total).toFixed(0) + ' ₽';
                placeBetBtn.disabled = (coupon.length === 0 || betSum < 10 || betSum > balance);
            }

            function updateUI() {
                renderMatches();
                renderCoupon();
            }

            // =============================================================
            // 9. НАВИГАЦИЯ
            // =============================================================
            function switchTab(tab) {
                currentTab = tab;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                const activeTabBtn = document.querySelector(`.tab-btn[data-tab="${tab}"]`);
                if (activeTabBtn) activeTabBtn.classList.add('active');
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                const activeNav = document.querySelector(`.nav-item[data-tab="${tab}"]`);
                if (activeNav) activeNav.classList.add('active');
                document.querySelectorAll('.matches-container, .coupon-container, .history-container')
                    .forEach(el => el.classList.remove('show'));
                if (tab === 'matches') {
                    document.querySelector('.matches-container').classList.add('show');
                    // Если мы вернулись на вкладку матчей, можно обновить
                    loadMatches();
                } else if (tab === 'coupon') {
                    document.querySelector('.coupon-container').classList.add('show');
                } else if (tab === 'history') {
                    document.querySelector('.history-container').classList.add('show');
                }
                vibrate('light');
            }

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const tab = this.dataset.tab;
                    switchTab(tab);
                });
            });

            document.querySelectorAll('.nav-item').forEach(btn => {
                btn.addEventListener('click', function() {
                    const tab = this.dataset.tab;
                    switchTab(tab);
                });
            });

            // =============================================================
            // 10. ФИЛЬТР ЛИГ
            // =============================================================
            document.querySelectorAll('.league-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.league-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentLeague = this.dataset.league;
                    renderMatches();
                    vibrate('light');
                });
            });

            // =============================================================
            // 11. СТАВКА
            // =============================================================
            betSumInput.addEventListener('input', function() {
                let val = parseInt(this.value) || 0;
                if (val < 0) this.value = 0;
                if (val > 1000000) this.value = 1000000;
                renderCoupon();
            });

            placeBetBtn.addEventListener('click', function() {
                const total = coupon.reduce((acc, item) => acc * parseFloat(item.odds), 1);
                const betSum = parseInt(betSumInput.value) || 0;
                if (betSum < 10) {
                    alert('Минимальная ставка 10 ₽');
                    vibrate('error');
                    return;
                }
                if (betSum > balance) {
                    alert('Недостаточно средств');
                    vibrate('error');
                    return;
                }
                if (coupon.length === 0) {
                    alert('Добавьте исходы в купон');
                    return;
                }
                balance -= betSum;
                updateBalanceDisplay();
                const win = Math.floor(betSum * total);
                alert(`✅ Ставка принята!\nСумма: ${betSum} ₽\nКоэффициент: ${total.toFixed(2)}\nПотенциальный выигрыш: ${win} ₽`);
                vibrate('success');
                clearCoupon();
                updateUI();
                switchTab('matches');
            });

            // =============================================================
            // 12. ЗАПУСК
            // =============================================================
            document.querySelector('.matches-container').classList.add('show');
            // Первичная загрузка
            loadMatches().then(() => {
                // Запускаем автообновление после первой загрузки
                startAutoRefresh();
            });

            window.addEventListener('storage', (e) => {
                if (e.key === 'casinoBalance') {
                    balance = parseInt(e.newValue) || 0;
                    updateBalanceDisplay();
                    renderCoupon();
                }
            });

            initAudio();

            // Остановка автообновления при уходе со страницы (опционально)
            window.addEventListener('beforeunload', function() {
                stopAutoRefresh();
            });

        })();
    </script>

</body>
</html>
