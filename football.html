<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>R-GAME · Футбол</title>
    <script src="https://telegram.org/js/telegram-web-app.js">
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        html,
        body {
            width: 100%;
            min-height: 100vh;
            background: #0b0e17;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        #app {
            max-width: 480px;
            margin: 0 auto;
            padding: 10px 12px 90px;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        .header .logo {
            font-size: 22px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, #FFD54A);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .header .balance {
            background: rgba(255, 215, 0, 0.1);
            padding: 6px 16px;
            border-radius: 30px;
            border: 1px solid rgba(255, 215, 0, 0.15);
            font-weight: 700;
            font-size: 16px;
            color: #FFD54A;
        }

        /* TABS */
        .tabs {
            display: flex;
            gap: 8px;
            margin: 16px 0 14px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px 0;
            background: rgba(255, 255, 255, 0.04);
            border: none;
            border-radius: 14px;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: rgba(255, 215, 0, 0.12);
            color: #FFD54A;
            box-shadow: inset 0 0 0 1px rgba(255, 215, 0, 0.2);
        }
        .tab-btn:active {
            transform: scale(0.94);
        }
        .tab-btn .badge {
            background: #FFD54A;
            color: #0b0e17;
            border-radius: 30px;
            font-size: 11px;
            padding: 0 10px;
            margin-left: 6px;
            display: inline-block;
        }

        /* LEAGUE FILTER */
        .league-filter {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 4px 0 14px;
            scrollbar-width: none;
            flex-wrap: nowrap;
        }
        .league-filter::-webkit-scrollbar {
            display: none;
        }
        .league-btn {
            flex-shrink: 0;
            padding: 6px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 30px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .league-btn.active {
            background: rgba(255, 215, 0, 0.12);
            border-color: #FFD54A;
            color: #FFD54A;
        }
        .league-btn:active {
            transform: scale(0.94);
        }

        /* MATCH CARDS */
        .matches-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .match-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 14px 14px 12px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: border 0.2s;
        }
        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.3);
            margin-bottom: 6px;
        }
        .match-header .league-name {
            font-weight: 600;
            color: rgba(255, 255, 255, 0.5);
        }
        .match-teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .team {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 15px;
        }
        .team .emblem {
            font-size: 22px;
        }
        .match-vs {
            color: rgba(255, 255, 255, 0.15);
            font-weight: 800;
            font-size: 14px;
        }
        .match-odds {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
        }
        .odd-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            padding: 6px 0;
            text-align: center;
            cursor: pointer;
            transition: all 0.15s;
            font-size: 12px;
        }
        .odd-btn .label {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.3);
            display: block;
        }
        .odd-btn .value {
            font-weight: 800;
            font-size: 16px;
            color: #fff;
        }
        .odd-btn:active {
            transform: scale(0.92);
        }
        .odd-btn.selected {
            border-color: #FFD54A;
            background: rgba(255, 215, 0, 0.12);
        }
        .odd-btn.selected .value {
            color: #FFD54A;
        }

        /* COUPON */
        .coupon-container {
            display: none;
            flex-direction: column;
            gap: 16px;
        }
        .coupon-container.show {
            display: flex;
        }
        .coupon-empty {
            text-align: center;
            padding: 40px 0;
            color: rgba(255, 255, 255, 0.2);
            font-size: 16px;
        }
        .coupon-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            padding: 12px 14px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .coupon-item .info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .coupon-item .info .teams {
            font-weight: 700;
            font-size: 14px;
        }
        .coupon-item .info .detail {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
        }
        .coupon-item .info .coef {
            font-weight: 800;
            color: #FFD54A;
            font-size: 16px;
        }
        .coupon-item .remove-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.2);
            font-size: 18px;
            cursor: pointer;
            padding: 4px 8px;
        }
        .coupon-item .remove-btn:active {
            transform: scale(0.8);
        }

        .coupon-total {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid rgba(255, 215, 0, 0.1);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .coupon-total .row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }
        .coupon-total .row .bold {
            font-weight: 700;
            color: #fff;
        }
        .coupon-total .row .gold {
            color: #FFD54A;
        }
        .coupon-total .bet-input {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 12px 16px;
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            width: 100%;
            text-align: center;
        }
        .coupon-total .bet-input:focus {
            outline: none;
            border-color: #FFD54A;
        }
        .coupon-total .place-bet-btn {
            background: linear-gradient(135deg, #3DDC84, #1a8a4a);
            border: none;
            border-radius: 14px;
            padding: 14px;
            font-weight: 800;
            font-size: 18px;
            color: #fff;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
        }
        .coupon-total .place-bet-btn:active {
            transform: scale(0.94);
        }
        .coupon-total .place-bet-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* HISTORY (просто заглушка) */
        .history-container {
            display: none;
        }
        .history-container.show {
            display: block;
        }

        /* BOTTOM NAV */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(11, 14, 23, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 12px;
            max-width: 480px;
            margin: 0 auto;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.3);
            font-size: 10px;
            cursor: pointer;
            transition: 0.2s;
            padding: 4px 16px;
        }
        .nav-item .icon {
            font-size: 22px;
        }
        .nav-item.active {
            color: #FFD54A;
        }
        .nav-item:active {
            transform: scale(0.9);
        }
        .nav-item .badge {
            background: #FFD54A;
            color: #0b0e17;
            border-radius: 30px;
            font-size: 10px;
            padding: 0 8px;
            font-weight: 700;
        }

        /* RESPONSIVE */
        @media (max-width: 420px) {
            .match-odds {
                grid-template-columns: repeat(5, 1fr);
                gap: 4px;
            }
            .odd-btn .value {
                font-size: 14px;
            }
            .team {
                font-size: 13px;
            }
            .team .emblem {
                font-size: 18px;
            }
        }
        @media (max-width: 360px) {
            .match-odds {
                grid-template-columns: repeat(3, 1fr);
            }
            .match-odds .odd-btn:nth-child(4),
            .match-odds .odd-btn:nth-child(5) {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

    <div id="app">
        <!-- Header -->
        <div class="header">
            <div class="logo">⚽ R-GAME</div>
            <div class="balance" id="balanceDisplay">0 ₽</div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="matches">Матчи</button>
            <button class="tab-btn" data-tab="coupon">Купон <span class="badge" id="couponCount">0</span></button>
            <button class="tab-btn" data-tab="history">История</button>
        </div>

        <!-- League Filter -->
        <div class="league-filter" id="leagueFilter">
            <button class="league-btn active" data-league="all">Все</button>
            <button class="league-btn" data-league="АПЛ">🏴󠁧󠁢󠁥󠁮󠁧󠁿 АПЛ</button>
            <button class="league-btn" data-league="Ла Лига">🇪🇸 Ла Лига</button>
            <button class="league-btn" data-league="Бундеслига">🇩🇪 Бундеслига</button>
            <button class="league-btn" data-league="Серия А">🇮🇹 Серия А</button>
            <button class="league-btn" data-league="Лига 1">🇫🇷 Лига 1</button>
            <button class="league-btn" data-league="РПЛ">🇷🇺 РПЛ</button>
            <button class="league-btn" data-league="Лига Чемпионов">🏆 ЛЧ</button>
        </div>

        <!-- Matches -->
        <div class="matches-container" id="matchesContainer"></div>

        <!-- Coupon -->
        <div class="coupon-container" id="couponContainer">
            <div class="coupon-empty" id="couponEmpty">Добавьте исходы из матчей</div>
            <div id="couponList"></div>
            <div class="coupon-total" id="couponTotal" style="display:none;">
                <div class="row"><span>Количество событий</span> <span class="bold" id="eventsCount">0</span></div>
                <div class="row"><span>Общий коэффициент</span> <span class="bold gold" id="totalOdds">1.00</span></div>
                <div class="row"><span>Сумма ставки</span></div>
                <input type="number" class="bet-input" id="betSumInput" value="100" min="10" step="10" />
                <div class="row"><span>Потенциальный выигрыш</span> <span class="bold gold" id="potentialWin">0 ₽</span></div>
                <button class="place-bet-btn" id="placeBetBtn">Сделать ставку</button>
            </div>
        </div>

        <!-- History (заглушка) -->
        <div class="history-container" id="historyContainer">
            <div style="text-align:center;padding:40px 0;color:rgba(255,255,255,0.2);font-size:16px;">
                📋 История ставок пока пуста
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav" id="bottomNav">
        <button class="nav-item active" data-tab="matches"><span class="icon">🏠</span> Матчи</button>
        <button class="nav-item" data-tab="coupon"><span class="icon">🧾</span> Купон <span class="badge" id="navCouponBadge">0</span></button>
        <button class="nav-item" data-tab="history"><span class="icon">📊</span> История</button>
    </div>

    <script>
        (function() {
            'use strict';

            // =============================================================
            // 1. TELEGRAM & BALANCE
            // =============================================================
            const tg = window.Telegram.WebApp;
            if (tg) { tg.expand();
                tg.enableClosingConfirmation(); }
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('userId') || (tg?.initDataUnsafe?.user?.id) || '';

            let balance = parseInt(localStorage.getItem('casinoBalance')) || 10000; // стартовый баланс
            const balanceDisplay = document.getElementById('balanceDisplay');

            function updateBalanceDisplay() {
                balanceDisplay.innerText = balance.toLocaleString() + ' ₽';
                localStorage.setItem('casinoBalance', String(balance));
            }
            updateBalanceDisplay();

            // =============================================================
            // 2. ДАННЫЕ МАТЧЕЙ (реалистичные)
            // =============================================================
            const leagues = [
                { id: 'АПЛ', name: '🏴󠁧󠁢󠁥󠁮󠁧󠁿 АПЛ' },
                { id: 'Ла Лига', name: '🇪🇸 Ла Лига' },
                { id: 'Бундеслига', name: '🇩🇪 Бундеслига' },
                { id: 'Серия А', name: '🇮🇹 Серия А' },
                { id: 'Лига 1', name: '🇫🇷 Лига 1' },
                { id: 'РПЛ', name: '🇷🇺 РПЛ' },
                { id: 'Лига Чемпионов', name: '🏆 ЛЧ' }
            ];

            const teams = [
                { name: 'Манчестер Сити', emblem: '🔵' },
                { name: 'Арсенал', emblem: '🔴' },
                { name: 'Ливерпуль', emblem: '🔴' },
                { name: 'Челси', emblem: '🔵' },
                { name: 'Тоттенхэм', emblem: '⚪' },
                { name: 'Ньюкасл', emblem: '⚫' },
                { name: 'Реал Мадрид', emblem: '👑' },
                { name: 'Барселона', emblem: '🔴🔵' },
                { name: 'Атлетико', emblem: '🔴⚪' },
                { name: 'Севилья', emblem: '⚪🔴' },
                { name: 'Бавария', emblem: '🔴⚪' },
                { name: 'Боруссия Дортмунд', emblem: '🟡⚫' },
                { name: 'Лейпциг', emblem: '🔴⚪' },
                { name: 'Ювентус', emblem: '⚫⚪' },
                { name: 'Интер', emblem: '🔵⚫' },
                { name: 'Милан', emblem: '🔴⚫' },
                { name: 'Наполи', emblem: '🔵⚪' },
                { name: 'ПСЖ', emblem: '🔵🔴' },
                { name: 'Марсель', emblem: '⚪🔵' },
                { name: 'Монако', emblem: '🔴⚪' },
                { name: 'Зенит', emblem: '🔵⚪' },
                { name: 'Спартак', emblem: '🔴⚪' },
                { name: 'ЦСКА', emblem: '🔴🔵' },
                { name: 'Динамо', emblem: '⚪🔵' },
                { name: 'Реал Сосьедад', emblem: '⚪🔵' },
                { name: 'Вильярреал', emblem: '🟡' },
                { name: 'Рома', emblem: '🔴🟡' },
                { name: 'Лацио', emblem: '⚪🔵' },
                { name: 'Аталанта', emblem: '⚫🔵' },
                { name: 'Лион', emblem: '🔴🔵' },
                { name: 'Лилль', emblem: '🔴⚪' },
            ];

            function randomTeam() {
                return teams[Math.floor(Math.random() * teams.length)];
            }

            function generateMatches() {
                const matchList = [];
                const usedPairs = new Set();

                for (const league of leagues) {
                    const count = 3 + Math.floor(Math.random() * 4); // 3-6 матчей на лигу
                    for (let i = 0; i < count; i++) {
                        let home, away;
                        let attempts = 0;
                        do {
                            home = randomTeam();
                            away = randomTeam();
                            attempts++;
                        } while ((home.name === away.name || usedPairs.has(home.name + away.name)) && attempts < 30);
                        usedPairs.add(home.name + away.name);

                        const odds = {
                            win1: +(1.5 + Math.random() * 2.5).toFixed(2),
                            draw: +(2.5 + Math.random() * 2.0).toFixed(2),
                            win2: +(1.5 + Math.random() * 2.5).toFixed(2),
                            over: +(1.6 + Math.random() * 1.0).toFixed(2),
                            under: +(1.6 + Math.random() * 1.0).toFixed(2),
                        };

                        matchList.push({
                            id: matchList.length,
                            league: league.id,
                            home: home,
                            away: away,
                            odds: odds,
                            time: new Date(Date.now() + Math.random() * 86400000 * 2 + 3600000).toLocaleString('ru', {
                                day: 'numeric',
                                month: 'short',
                                hour: '2-digit',
                                minute: '2-digit'
                            })
                        });
                    }
                }
                return matchList;
            }

            let matches = generateMatches();

            // =============================================================
            // 3. СОСТОЯНИЕ КУПОНА
            // =============================================================
            let coupon = []; // массив объектов { matchId, type, label, odds, teamNames }

            function addToCoupon(matchId, type, label, odds, teamNames) {
                // Проверяем, не добавлен ли уже этот исход
                const exists = coupon.some(item => item.matchId === matchId && item.type === type);
                if (exists) return false;
                coupon.push({ matchId, type, label, odds, teamNames });
                updateUI();
                return true;
            }

            function removeFromCoupon(index) {
                coupon.splice(index, 1);
                updateUI();
            }

            function clearCoupon() {
                coupon = [];
                updateUI();
            }

            // =============================================================
            // 4. РЕНДЕРИНГ
            // =============================================================
            const matchesContainer = document.getElementById('matchesContainer');
            const couponContainer = document.getElementById('couponContainer');
            const couponList = document.getElementById('couponList');
            const couponEmpty = document.getElementById('couponEmpty');
            const couponTotal = document.getElementById('couponTotal');
            const eventsCount = document.getElementById('eventsCount');
            const totalOdds = document.getElementById('totalOdds');
            const betSumInput = document.getElementById('betSumInput');
            const potentialWin = document.getElementById('potentialWin');
            const placeBetBtn = document.getElementById('placeBetBtn');
            const couponCount = document.getElementById('couponCount');
            const navCouponBadge = document.getElementById('navCouponBadge');
            const leagueFilter = document.getElementById('leagueFilter');

            let currentLeague = 'all';
            let currentTab = 'matches';

            function renderMatches() {
                let filtered = matches;
                if (currentLeague !== 'all') {
                    filtered = filtered.filter(m => m.league === currentLeague);
                }

                if (filtered.length === 0) {
                    matchesContainer.innerHTML =
                        `<div style="text-align:center;padding:40px 0;color:rgba(255,255,255,0.2);">Нет матчей в этой лиге</div>`;
                    return;
                }

                let html = '';
                for (const m of filtered) {
                    const isSelected = (type) => coupon.some(item => item.matchId === m.id && item.type === type);
                    html += `
                        <div class="match-card" data-match-id="${m.id}">
                            <div class="match-header">
                                <span class="league-name">${m.league}</span>
                                <span>${m.time}</span>
                            </div>
                            <div class="match-teams">
                                <div class="team"><span class="emblem">${m.home.emblem}</span> ${m.home.name}</div>
                                <div class="match-vs">VS</div>
                                <div class="team"><span class="emblem">${m.away.emblem}</span> ${m.away.name}</div>
                            </div>
                            <div class="match-odds">
                                <div class="odd-btn ${isSelected('win1')?'selected':''}" data-match="${m.id}" data-type="win1" data-label="П1" data-odds="${m.odds.win1}" data-teams="${m.home.name} - ${m.away.name}">
                                    <span class="label">П1</span>
                                    <span class="value">${m.odds.win1}</span>
                                </div>
                                <div class="odd-btn ${isSelected('draw')?'selected':''}" data-match="${m.id}" data-type="draw" data-label="Х" data-odds="${m.odds.draw}" data-teams="${m.home.name} - ${m.away.name}">
                                    <span class="label">Х</span>
                                    <span class="value">${m.odds.draw}</span>
                                </div>
                                <div class="odd-btn ${isSelected('win2')?'selected':''}" data-match="${m.id}" data-type="win2" data-label="П2" data-odds="${m.odds.win2}" data-teams="${m.home.name} - ${m.away.name}">
                                    <span class="label">П2</span>
                                    <span class="value">${m.odds.win2}</span>
                                </div>
                                <div class="odd-btn ${isSelected('over')?'selected':''}" data-match="${m.id}" data-type="over" data-label="ТБ(2.5)" data-odds="${m.odds.over}" data-teams="${m.home.name} - ${m.away.name}">
                                    <span class="label">ТБ(2.5)</span>
                                    <span class="value">${m.odds.over}</span>
                                </div>
                                <div class="odd-btn ${isSelected('under')?'selected':''}" data-match="${m.id}" data-type="under" data-label="ТМ(2.5)" data-odds="${m.odds.under}" data-teams="${m.home.name} - ${m.away.name}">
                                    <span class="label">ТМ(2.5)</span>
                                    <span class="value">${m.odds.under}</span>
                                </div>
                            </div>
                        </div>
                    `;
                }
                matchesContainer.innerHTML = html;

                // Обработчики кликов на кнопки коэффициентов
                document.querySelectorAll('.odd-btn').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const matchId = parseInt(this.dataset.match);
                        const type = this.dataset.type;
                        const label = this.dataset.label;
                        const odds = parseFloat(this.dataset.odds);
                        const teams = this.dataset.teams;
                        const added = addToCoupon(matchId, type, label, odds, teams);
                        if (added) {
                            this.classList.add('selected');
                            // вибрация (если есть)
                            if (navigator.vibrate) navigator.vibrate(20);
                        } else {
                            // уже добавлено
                            this.classList.remove('selected');
                            // удаляем из купона
                            const idx = coupon.findIndex(item => item.matchId === matchId && item.type === type);
                            if (idx !== -1) removeFromCoupon(idx);
                            // снимаем выделение
                            document.querySelectorAll('.odd-btn').forEach(b => {
                                const mid = parseInt(b.dataset.match);
                                const t = b.dataset.type;
                                if (mid === matchId && t === type) b.classList.remove('selected');
                            });
                        }
                    });
                });
            }

            function renderCoupon() {
                if (coupon.length === 0) {
                    couponEmpty.style.display = 'block';
                    couponList.innerHTML = '';
                    couponTotal.style.display = 'none';
                    couponCount.textContent = '0';
                    navCouponBadge.textContent = '0';
                    return;
                }
                couponEmpty.style.display = 'none';
                couponTotal.style.display = 'block';

                let html = '';
                for (let i = 0; i < coupon.length; i++) {
                    const item = coupon[i];
                    html += `
                        <div class="coupon-item">
                            <div class="info">
                                <div class="teams">${item.teamNames}</div>
                                <div class="detail">${item.label} <span class="coef">${item.odds}</span></div>
                            </div>
                            <button class="remove-btn" data-index="${i}">✕</button>
                        </div>
                    `;
                }
                couponList.innerHTML = html;

                document.querySelectorAll('.coupon-item .remove-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const idx = parseInt(this.dataset.index);
                        removeFromCoupon(idx);
                        // также снимаем выделение на карточке
                        const removed = coupon[idx];
                        if (removed) {
                            document.querySelectorAll('.odd-btn').forEach(b => {
                                const mid = parseInt(b.dataset.match);
                                const t = b.dataset.type;
                                if (mid === removed.matchId && t === removed.type) {
                                    b.classList.remove('selected');
                                }
                            });
                        }
                    });
                });

                // Обновляем тоталы
                const total = coupon.reduce((acc, item) => acc * item.odds, 1);
                totalOdds.textContent = total.toFixed(2);
                eventsCount.textContent = coupon.length;
                couponCount.textContent = coupon.length;
                navCouponBadge.textContent = coupon.length;

                // Расчет выигрыша
                const betSum = parseInt(betSumInput.value) || 0;
                potentialWin.textContent = (betSum * total).toFixed(0) + ' ₽';

                // Активность кнопки
                placeBetBtn.disabled = (coupon.length === 0 || betSum < 10 || betSum > balance);
            }

            function updateUI() {
                renderMatches();
                renderCoupon();
                // дополнительно обновляем выделение на матчах после изменения купона
                // уже сделано в renderMatches
            }

            // =============================================================
            // 5. СОБЫТИЯ
            // =============================================================

            // Переключение вкладок
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const tab = this.dataset.tab;
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                    document.querySelector(`.nav-item[data-tab="${tab}"]`).classList.add('active');

                    currentTab = tab;
                    document.querySelectorAll('.matches-container, .coupon-container, .history-container')
                        .forEach(el => el.classList.remove('show'));
                    if (tab === 'matches') {
                        document.querySelector('.matches-container').classList.add('show');
                        document.querySelector('.coupon-container').classList.remove('show');
                        document.querySelector('.history-container').classList.remove('show');
                    } else if (tab === 'coupon') {
                        document.querySelector('.coupon-container').classList.add('show');
                        document.querySelector('.matches-container').classList.remove('show');
                        document.querySelector('.history-container').classList.remove('show');
                    } else if (tab === 'history') {
                        document.querySelector('.history-container').classList.add('show');
                        document.querySelector('.matches-container').classList.remove('show');
                        document.querySelector('.coupon-container').classList.remove('show');
                    }
                });
            });

            // Нижняя навигация
            document.querySelectorAll('.nav-item').forEach(btn => {
                btn.addEventListener('click', function() {
                    const tab = this.dataset.tab;
                    document.querySelector(`.tab-btn[data-tab="${tab}"]`).click();
                });
            });

            // Фильтр лиг
            document.querySelectorAll('.league-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.league-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentLeague = this.dataset.league;
                    renderMatches();
                });
            });

            // Изменение суммы ставки
            betSumInput.addEventListener('input', function() {
                let val = parseInt(this.value) || 0;
                if (val < 0) this.value = 0;
                if (val > 1000000) this.value = 1000000;
                renderCoupon();
            });

            // Кнопка "Сделать ставку"
            placeBetBtn.addEventListener('click', function() {
                const total = coupon.reduce((acc, item) => acc * item.odds, 1);
                const betSum = parseInt(betSumInput.value) || 0;
                if (betSum < 10) {
                    alert('Минимальная ставка 10 ₽');
                    return;
                }
                if (betSum > balance) {
                    alert('Недостаточно средств');
                    return;
                }
                if (coupon.length === 0) {
                    alert('Добавьте исходы в купон');
                    return;
                }
                // Списываем баланс
                balance -= betSum;
                updateBalanceDisplay();
                // Выигрыш (имитация)
                const win = Math.floor(betSum * total);
                // В реальности здесь был бы запрос на сервер
                alert(`✅ Ставка принята!\nСумма: ${betSum} ₽\nКоэффициент: ${total.toFixed(2)}\nПотенциальный выигрыш: ${win} ₽`);
                // Очищаем купон
                clearCoupon();
                // Обновляем UI
                updateUI();
                // переключаем на вкладку матчей
                document.querySelector('.tab-btn[data-tab="matches"]').click();
            });

            // =============================================================
            // 6. ИНИЦИАЛИЗАЦИЯ
            // =============================================================
            // Показываем матчи по умолчанию
            document.querySelector('.matches-container').classList.add('show');
            renderMatches();
            renderCoupon();

            // Обновление баланса при изменении в localStorage (для синхронизации)
            window.addEventListener('storage', (e) => {
                if (e.key === 'casinoBalance') {
                    balance = parseInt(e.newValue) || 0;
                    updateBalanceDisplay();
                }
            });

            // Кнопка "Назад" (если есть)
            document.querySelector('.btn-back')?.addEventListener('click', function() {
                window.location.href = 'casino.html?userId=' + userId;
            });

        })();
    </script>

</body>
</html>
