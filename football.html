<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>⚽ R-GAME · Ставки</title>
    <script src="https://telegram.org/js/telegram-web-app.js">
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,600;0,800;0,900;1,800&family=Inter:wght@400;600;700;800;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            width: 100%;
            min-height: 100vh;
            background: #070b12;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        body {
            background-image:
                radial-gradient(circle at 10% 0%, rgba(24, 130, 255, 0.12), transparent 50%),
                radial-gradient(circle at 90% 100%, rgba(139, 92, 246, 0.08), transparent 50%);
            background-attachment: fixed;
            position: relative;
            padding-bottom: 80px;
        }

        .bg-watermarks {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 150px;
        }
        .bg-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 140px;
            font-weight: 800;
            font-style: italic;
            white-space: nowrap;
            background: linear-gradient(135deg, #ffffff, #a0c4ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-transform: uppercase;
            opacity: 0.03;
            transform: rotate(-10deg);
            animation: floatText 15s ease-in-out infinite alternate;
        }
        .bg-text span {
            color: #1882ff;
            -webkit-text-fill-color: #1882ff;
        }
        .bg-text:nth-child(2) {
            margin-left: 200px;
            animation-delay: -5s;
        }
        .bg-text:nth-child(3) {
            margin-right: 300px;
            animation-delay: -10s;
        }
        @keyframes floatText {
            0% { transform: rotate(-10deg) translate(0, 0); }
            100% { transform: rotate(-10deg) translate(20px, -20px); }
        }

        #app {
            max-width: 560px;
            margin: 0 auto;
            padding: 10px 12px 20px;
            position: relative;
            z-index: 2;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(17, 24, 34, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 12px 16px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255,255,255,0.1);
        }

        .brand {
            font-family: 'Montserrat', sans-serif;
            font-size: 26px;
            font-weight: 800;
            font-style: italic;
            background: linear-gradient(135deg, #ffffff, #a0c4ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .brand span {
            color: #1882ff;
            -webkit-text-fill-color: #1882ff;
        }

        .header .balance {
            background: rgba(255, 215, 0, 0.08);
            padding: 6px 18px;
            border-radius: 40px;
            border: 1px solid rgba(255, 215, 0, 0.12);
            font-weight: 800;
            font-size: 16px;
            color: #FFD54A;
            backdrop-filter: blur(4px);
            cursor: default;
        }

        .top-actions {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin: 10px 0 14px;
            gap: 8px;
        }
        .refresh-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 30px;
            padding: 6px 16px;
            color: #FFD54A;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .refresh-btn:active {
            transform: scale(0.92);
            background: rgba(255, 215, 0, 0.1);
        }
        .refresh-btn .icon {
            font-size: 18px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin: 0 0 14px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px 0;
            background: rgba(255, 255, 255, 0.04);
            border: none;
            border-radius: 16px;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            letter-spacing: 0.3px;
            position: relative;
        }
        .tab-btn.active {
            background: rgba(255, 215, 0, 0.10);
            color: #FFD54A;
            box-shadow: inset 0 0 0 1px rgba(255, 215, 0, 0.25), 0 4px 12px rgba(255, 215, 0, 0.05);
        }
        .tab-btn:active {
            transform: scale(0.94);
        }
        .tab-btn .badge {
            background: #FFD54A;
            color: #0b0e17;
            border-radius: 30px;
            font-size: 11px;
            padding: 0 10px;
            margin-left: 6px;
            display: inline-block;
            font-weight: 900;
        }

        .league-filter {
            display: none;
        }

        .matches-container {
            display: none;
            flex-direction: column;
            gap: 14px;
        }
        .matches-container.show {
            display: flex;
        }

        .match-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 16px 16px 14px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(4px);
            position: relative;
        }
        .match-card.live {
            border-color: rgba(240, 48, 67, 0.4);
            box-shadow: 0 0 20px rgba(240, 48, 67, 0.05);
        }
        .match-card.finished {
            opacity: 0.6;
            display: none;
        }

        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.35);
            margin-bottom: 8px;
        }
        .match-header .league-name {
            font-weight: 700;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0.3px;
        }
        .match-header .status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .match-header .status.live {
            color: #f03043;
        }
        .match-header .status.live .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #f03043;
            border-radius: 50%;
            animation: pulse 1.2s ease-in-out infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(0.7); }
            100% { opacity: 1; transform: scale(1); }
        }
        .match-header .status.finished {
            color: rgba(255, 255, 255, 0.2);
        }
        .match-header .time {
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .match-teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            gap: 4px;
        }
        .team {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 16px;
            max-width: 40%;
        }
        .team .emblem {
            font-size: 28px;
            line-height: 1;
        }
        .team .name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .match-vs {
            color: rgba(255, 255, 255, 0.12);
            font-weight: 800;
            font-size: 14px;
            letter-spacing: 2px;
        }

        .match-odds-main {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            margin-bottom: 8px;
        }
        .odd-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 6px 0;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 12px;
            position: relative;
            overflow: hidden;
        }
        .odd-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, transparent 60%);
            pointer-events: none;
        }
        .odd-btn .label {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.3);
            display: block;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .odd-btn .value {
            font-weight: 800;
            font-size: 18px;
            color: #fff;
            transition: color 0.2s;
        }
        .odd-btn:active {
            transform: scale(0.92);
        }
        .odd-btn.selected {
            border-color: #FFD54A;
            background: rgba(255, 215, 0, 0.10);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.10);
        }
        .odd-btn.selected .value {
            color: #FFD54A;
        }
        .odd-btn.disabled {
            opacity: 0.3;
            pointer-events: none;
        }

        .match-extra-toggle {
            display: flex;
            justify-content: center;
            margin-top: 6px;
        }
        .extra-toggle-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.2);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 20px;
            transition: 0.2s;
        }
        .extra-toggle-btn:active {
            transform: scale(0.9);
        }
        .extra-toggle-btn.active {
            color: #FFD54A;
            background: rgba(255, 215, 0, 0.06);
        }

        .match-odds-extra {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-top: 8px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }
        .match-odds-extra.open {
            display: grid;
        }
        .odd-btn-extra {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            padding: 5px 0;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 11px;
        }
        .odd-btn-extra .label {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.3);
            display: block;
        }
        .odd-btn-extra .value {
            font-weight: 700;
            font-size: 15px;
            color: #fff;
        }
        .odd-btn-extra:active {
            transform: scale(0.92);
        }
        .odd-btn-extra.selected {
            border-color: #FFD54A;
            background: rgba(255, 215, 0, 0.08);
        }
        .odd-btn-extra.selected .value {
            color: #FFD54A;
        }
        .odd-btn-extra.disabled {
            opacity: 0.3;
            pointer-events: none;
        }

        /* ===== КУПОН ===== */
        .coupon-container {
            display: none;
            flex-direction: column;
            gap: 16px;
            padding-bottom: 100px;
        }
        .coupon-container.show {
            display: flex;
        }
        .coupon-empty {
            text-align: center;
            padding: 50px 0;
            color: rgba(255, 255, 255, 0.2);
            font-size: 18px;
            font-weight: 700;
        }
        .coupon-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .coupon-item {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 18px;
            padding: 16px 18px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .coupon-item .info {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
        }
        .coupon-item .info .teams {
            font-weight: 800;
            font-size: 16px;
            line-height: 1.3;
            color: #fff;
        }
        .coupon-item .info .detail {
            font-size: 13px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.5);
        }
        .coupon-item .info .coef {
            font-weight: 900;
            color: #FFD54A;
            font-size: 18px;
        }
        .coupon-item .countdown {
            font-size: 12px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 4px;
        }
        .coupon-item .countdown .time {
            color: #FFD54A;
            font-weight: 800;
        }
        .coupon-item .remove-btn {
            background: rgba(255, 255, 255, 0.06);
            border: none;
            border-radius: 30px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 20px;
            cursor: pointer;
            padding: 6px 12px;
            transition: 0.2s;
            font-weight: 700;
            flex-shrink: 0;
        }
        .coupon-item .remove-btn:active {
            transform: scale(0.85);
            color: #f03043;
            background: rgba(240, 48, 67, 0.1);
        }

        .coupon-total {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 215, 0, 0.15);
            display: flex;
            flex-direction: column;
            gap: 14px;
            backdrop-filter: blur(8px);
            margin-top: 8px;
        }
        .coupon-total .row {
            display: flex;
            justify-content: space-between;
            font-size: 16px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.6);
        }
        .coupon-total .row .bold {
            font-weight: 900;
            color: #fff;
        }
        .coupon-total .row .gold {
            color: #FFD54A;
            font-weight: 900;
        }
        .coupon-total .bet-input {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            padding: 14px 16px;
            color: #fff;
            font-size: 20px;
            font-weight: 800;
            width: 100%;
            text-align: center;
            font-family: 'Inter', sans-serif;
            transition: 0.2s;
        }
        .coupon-total .bet-input:focus {
            outline: none;
            border-color: #FFD54A;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.10);
        }
        .coupon-total .place-bet-btn {
            background: linear-gradient(135deg, #3DDC84, #1a8a4a);
            border: none;
            border-radius: 16px;
            padding: 18px;
            font-weight: 900;
            font-size: 20px;
            color: #fff;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 0 #139642, 0 8px 24px rgba(27, 209, 93, 0.2);
        }
        .coupon-total .place-bet-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #139642;
        }
        .coupon-total .place-bet-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* ===== МОИ СТАВКИ (без имитации результата) ===== */
        .bets-container {
            display: none;
            flex-direction: column;
            gap: 12px;
            padding-bottom: 100px;
        }
        .bets-container.show {
            display: flex;
        }
        .bet-history-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 14px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .bet-history-item .top {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            font-size: 14px;
        }
        .bet-history-item .top .result {
            font-weight: 800;
        }
        .bet-history-item .top .result.pending {
            color: #FFD54A;
        }
        .bet-history-item .top .result.win {
            color: #3DDC84;
        }
        .bet-history-item .top .result.lose {
            color: #f03043;
        }
        .bet-history-item .detail {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
        }
        .bet-history-item .detail .coef {
            color: #FFD54A;
        }
        .bet-history-empty {
            text-align: center;
            padding: 50px 0;
            color: rgba(255, 255, 255, 0.15);
            font-size: 16px;
        }

        /* ===== ПЛАВАЮЩАЯ ПАНЕЛЬ ===== */
        .floating-bet-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(11, 14, 23, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 215, 0, 0.15);
            padding: 12px 16px 16px;
            max-width: 560px;
            margin: 0 auto;
            z-index: 100;
            display: none;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            box-shadow: 0 -8px 30px rgba(0, 0, 0, 0.6);
            border-radius: 20px 20px 0 0;
        }
        .floating-bet-panel.show {
            display: flex;
        }
        .floating-bet-panel .info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .floating-bet-panel .info .events {
            font-size: 13px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.5);
        }
        .floating-bet-panel .info .odds-sum {
            font-size: 20px;
            font-weight: 900;
            color: #FFD54A;
        }
        .floating-bet-panel .info .odds-sum .coef {
            font-size: 16px;
        }
        .floating-bet-panel .bet-btn {
            background: linear-gradient(135deg, #3DDC84, #1a8a4a);
            border: none;
            border-radius: 16px;
            padding: 12px 24px;
            font-weight: 900;
            font-size: 18px;
            color: #fff;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 0 #139642, 0 8px 24px rgba(27, 209, 93, 0.2);
            white-space: nowrap;
        }
        .floating-bet-panel .bet-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #139642;
        }
        .floating-bet-panel .bet-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }
        .floating-bet-panel .clear-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 16px;
            cursor: pointer;
            padding: 6px 12px;
            transition: 0.2s;
            font-weight: 700;
            flex-shrink: 0;
        }
        .floating-bet-panel .clear-btn:active {
            transform: scale(0.9);
            color: #f03043;
            background: rgba(240, 48, 67, 0.1);
        }

        @media (max-width: 420px) {
            .match-odds-main { grid-template-columns: repeat(5, 1fr); gap: 4px; }
            .odd-btn .value { font-size: 16px; }
            .team { font-size: 14px; gap: 4px; }
            .team .emblem { font-size: 22px; }
            .match-odds-extra { grid-template-columns: repeat(3, 1fr); }
            .floating-bet-panel { padding: 10px 12px; flex-wrap: wrap; }
            .floating-bet-panel .info .odds-sum { font-size: 17px; }
            .floating-bet-panel .bet-btn { font-size: 15px; padding: 10px 16px; }
            .bg-text { font-size: 80px; }
        }
        @media (max-width: 360px) {
            .match-odds-main { grid-template-columns: repeat(3, 1fr); }
            .match-odds-main .odd-btn:nth-child(4),
            .match-odds-main .odd-btn:nth-child(5) { grid-column: span 1; }
            .match-odds-extra { grid-template-columns: repeat(2, 1fr); }
            .bg-text { font-size: 60px; }
        }
    </style>
</head>
<body>

    <div class="bg-watermarks">
        <div class="bg-text">R-<span>GAME</span></div>
        <div class="bg-text">R-<span>GAME</span></div>
        <div class="bg-text">R-<span>GAME</span></div>
    </div>

    <div id="app">
        <div class="header">
            <div class="brand">R-<span>GAME</span></div>
            <div class="balance" id="balanceDisplay">0 ₽</div>
        </div>

        <div class="top-actions">
            <button class="refresh-btn" id="refreshBtn"><span class="icon">🔄</span> Обновить</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="matches">Матчи</button>
            <button class="tab-btn" data-tab="coupon">Купон <span class="badge" id="couponCount">0</span></button>
            <button class="tab-btn" data-tab="bets">Мои ставки</button>
        </div>

        <div class="league-filter" id="leagueFilter">
            <button class="league-btn active" data-league="all">Все</button>
        </div>

        <div class="matches-container" id="matchesContainer"></div>

        <div class="coupon-container" id="couponContainer">
            <div class="coupon-empty" id="couponEmpty">➕ Добавьте исходы из матчей</div>
            <div class="coupon-list" id="couponList"></div>
            <div class="coupon-total" id="couponTotal" style="display:none;">
                <div class="row"><span>Событий</span> <span class="bold" id="eventsCount">0</span></div>
                <div class="row"><span>Общий коэффициент</span> <span class="bold gold" id="totalOdds">1.00</span></div>
                <div class="row"><span>Сумма ставки</span></div>
                <input type="number" class="bet-input" id="betSumInput" value="100" min="10" step="10" />
                <div class="row"><span>Потенциальный выигрыш</span> <span class="bold gold" id="potentialWin">0 ₽</span></div>
                <button class="place-bet-btn" id="placeBetBtn">Сделать ставку</button>
            </div>
        </div>

        <!-- Мои ставки -->
        <div class="bets-container" id="betsContainer">
            <div class="bet-history-empty" id="betsEmpty">📋 У вас пока нет сделанных ставок</div>
            <div id="betsList"></div>
        </div>

        <!-- Плавающая панель -->
        <div class="floating-bet-panel" id="floatingPanel">
            <div class="info">
                <div class="events" id="panelEvents">0 событий</div>
                <div class="odds-sum">Коэф. <span class="coef" id="panelOdds">1.00</span></div>
            </div>
            <button class="clear-btn" id="panelClearBtn">✕</button>
            <button class="bet-btn" id="panelBetBtn">Сделать ставку</button>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // =============================================================
            // 1. TELEGRAM & BALANCE
            // =============================================================
            const tg = window.Telegram.WebApp;
            if (tg) { tg.expand();
                tg.enableClosingConfirmation(); }
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('userId') || (tg?.initDataUnsafe?.user?.id) || '';

            let balance = parseInt(localStorage.getItem('casinoBalance')) || 10000;
            const balanceDisplay = document.getElementById('balanceDisplay');

            function updateBalanceDisplay() {
                balanceDisplay.innerText = balance.toLocaleString() + ' ₽';
                localStorage.setItem('casinoBalance', String(balance));
            }
            updateBalanceDisplay();

            // =============================================================
            // 2. АУДИО/ВИБРАЦИЯ
            // =============================================================
            let audioCtx = null;

            function initAudio() {
                if (!audioCtx && window.AudioContext) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    document.addEventListener('click', () => audioCtx?.resume(), { once: true });
                    document.addEventListener('touchstart', () => audioCtx?.resume(), { once: true });
                }
            }

            function playClick() {
                if (!audioCtx) return;
                try {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = 600;
                    gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.05);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.05);
                } catch (e) {}
            }

            function vibrate(style) {
                if (tg.HapticFeedback) {
                    if (style === 'light') tg.HapticFeedback.impactOccurred('light');
                    else if (style === 'medium') tg.HapticFeedback.impactOccurred('medium');
                    else if (style === 'heavy') tg.HapticFeedback.impactOccurred('heavy');
                    else if (style === 'success') tg.HapticFeedback.notificationOccurred('success');
                    else if (style === 'error') tg.HapticFeedback.notificationOccurred('error');
                }
            }

            // =============================================================
            // 3. API С КЕШИРОВАНИЕМ (5 минут)
            // =============================================================
            const ODDS_API_KEY = '13f0b3f2e08095c7b5142e3b48e26e4e';
            const SPORTS_IDS = [
                'soccer_fifa_world_cup',
                'soccer_epl',
                'soccer_spain_la_liga',
                'soccer_germany_bundesliga',
                'soccer_italy_serie_a',
                'soccer_france_ligue_one'
            ];
            const CACHE_KEY = 'football_matches_cache';
            const CACHE_TTL = 5 * 60 * 1000; // 5 минут

            async function fetchRealMatches() {
                const cached = localStorage.getItem(CACHE_KEY);
                if (cached) {
                    try {
                        const data = JSON.parse(cached);
                        if (Date.now() - data.timestamp < CACHE_TTL) {
                            console.log('✅ Используем кеш (5 мин)');
                            return data.matches;
                        }
                    } catch (e) { /* ignore */ }
                }

                const allMatches = [];
                const promises = SPORTS_IDS.map(async (sport) => {
                    const url =
                        `https://api.the-odds-api.com/v4/sports/${sport}/odds/?apiKey=${ODDS_API_KEY}&regions=eu&markets=h2h,totals`;
                    try {
                        const response = await fetch(url);
                        if (!response.ok) return [];
                        const data = await response.json();
                        return Array.isArray(data) ? data : [];
                    } catch (e) {
                        return [];
                    }
                });
                const results = await Promise.all(promises);
                results.forEach(data => {
                    if (data && data.length > 0) allMatches.push(...data);
                });

                localStorage.setItem(CACHE_KEY, JSON.stringify({
                    timestamp: Date.now(),
                    matches: allMatches
                }));
                console.log('✅ API загружен и закеширован');
                return allMatches;
            }

            function mapRealMatches(apiData) {
                const mapped = [];
                const leagueMap = {
                    'FIFA World Cup': 'ЧМ-2026',
                    'Premier League': 'АПЛ',
                    'La Liga': 'Ла Лига',
                    'Bundesliga': 'Бундеслига',
                    'Serie A': 'Серия А',
                    'Ligue 1': 'Лига 1'
                };
                const emblemMap = {
                    'Argentina': '🇦🇷',
                    'Brazil': '🇧🇷',
                    'France': '🇫🇷',
                    'Spain': '🇪🇸',
                    'Germany': '🇩🇪',
                    'England': '🏴󠁧󠁢󠁥󠁮󠁧󠁿',
                    'Portugal': '🇵🇹',
                    'Netherlands': '🇳🇱',
                    'Belgium': '🇧🇪',
                    'Croatia': '🇭🇷',
                    'Uruguay': '🇺🇾',
                    'USA': '🇺🇸',
                    'Mexico': '🇲🇽',
                    'Switzerland': '🇨🇭',
                    'Morocco': '🇲🇦'
                };

                for (const match of apiData) {
                    if (!match.bookmakers || match.bookmakers.length === 0) continue;
                    const bookmaker = match.bookmakers[0];
                    let h2hMarket = bookmaker.markets.find(m => m.key === 'h2h');
                    let totalsMarket = bookmaker.markets.find(m => m.key === 'totals');
                    if (!h2hMarket) continue;

                    let win1 = 1.0,
                        draw = 1.0,
                        win2 = 1.0;
                    h2hMarket.outcomes.forEach(outcome => {
                        if (outcome.name === match.home_team) win1 = outcome.price;
                        else if (outcome.name === match.away_team) win2 = outcome.price;
                        else if (outcome.name === 'Draw') draw = outcome.price;
                    });

                    let over = 1.9,
                        under = 1.9;
                    if (totalsMarket) {
                        let targetTotal = totalsMarket.outcomes.find(o => o.point === 2.5);
                        if (targetTotal) {
                            totalsMarket.outcomes.forEach(outcome => {
                                if (outcome.name === 'Over' && outcome.point === 2.5) over = outcome
                                .price;
                                if (outcome.name === 'Under' && outcome.point === 2.5) under = outcome
                                    .price;
                            });
                        }
                    }

                    const matchDate = new Date(match.commence_time);
                    const timeStr = matchDate.toLocaleString('ru', {
                        day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'
                    });

                    const homeEmblem = emblemMap[match.home_team] || '⚽';
                    const awayEmblem = emblemMap[match.away_team] || '⚽';

                    const home = { name: match.home_team, emblem: homeEmblem };
                    const away = { name: match.away_team, emblem: awayEmblem };
                    const leagueName = leagueMap[match.sport_title] || match.sport_title || 'Футбол';

                    const odds = {
                        win1: +(win1).toFixed(2),
                        draw: +(draw).toFixed(2),
                        win2: +(win2).toFixed(2),
                        over: +(over).toFixed(2),
                        under: +(under).toFixed(2),
                    };

                    const extra = {
                        'Обе забьют (Да)': +(1.7 + Math.random() * 0.5).toFixed(2),
                        'Обе забьют (Нет)': +(1.8 + Math.random() * 0.5).toFixed(2),
                        'Угловые > 9.5': +(1.9).toFixed(2),
                        'Угловые < 9.5': +(1.9).toFixed(2)
                    };

                    mapped.push({
                        id: match.id,
                        league: leagueName,
                        home, away,
                        odds, extra,
                        time: timeStr,
                        timestamp: matchDate.getTime(),
                        status: 'NS',
                        real: true,
                        source: 'the-odds-api'
                    });
                }
                return mapped;
            }

            // =============================================================
            // 4. FALLBACK
            // =============================================================
            function getFallbackMatches() {
                const now = new Date();
                const matches = [];

                function createFallbackMatch(league, homeName, homeEmblem, awayName, awayEmblem, daysOffset, hour, minute = 0) {
                    const date = new Date(now.getTime() + daysOffset * 86400000 + hour * 3600000 + minute * 60000);
                    const timeStr = date.toLocaleString('ru', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
                    const odds = {
                        win1: +(1.8 + Math.random() * 1.5).toFixed(2),
                        draw: +(2.5 + Math.random() * 1.5).toFixed(2),
                        win2: +(1.8 + Math.random() * 1.5).toFixed(2),
                        over: +(1.7 + Math.random() * 0.8).toFixed(2),
                        under: +(1.7 + Math.random() * 0.8).toFixed(2),
                    };
                    const extra = {
                        'Обе забьют (Да)': +(1.7 + Math.random() * 0.5).toFixed(2),
                        'Обе забьют (Нет)': +(1.8 + Math.random() * 0.5).toFixed(2),
                        'Угловые > 9.5': +(1.9).toFixed(2),
                        'Угловые < 9.5': +(1.9).toFixed(2)
                    };
                    return {
                        id: matches.length,
                        league: league,
                        home: { name: homeName, emblem: homeEmblem },
                        away: { name: awayName, emblem: awayEmblem },
                        odds, extra,
                        time: timeStr,
                        timestamp: date.getTime(),
                        status: 'NS',
                        real: false,
                        source: 'fallback'
                    };
                }

                // ЧМ-2026
                const wc = 'ЧМ-2026';
                matches.push(createFallbackMatch(wc, 'Франция', '🇫🇷', 'Марокко', '🇲🇦', 0, 20, 0));
                matches.push(createFallbackMatch(wc, 'Аргентина', '🇦🇷', 'Бразилия', '🇧🇷', 0, 20, 0));
                matches.push(createFallbackMatch(wc, 'Испания', '🇪🇸', 'Португалия', '🇵🇹', 1, 18, 0));
                matches.push(createFallbackMatch(wc, 'Англия', '🏴󠁧󠁢󠁥󠁮󠁧󠁿', 'Нидерланды', '🇳🇱', 1, 20, 0));
                matches.push(createFallbackMatch(wc, 'Германия', '🇩🇪', 'Уругвай', '🇺🇾', 2, 19, 0));

                // Клубы
                const clubs = [
                    { league: 'АПЛ', teams: [
                            ['Манчестер Сити', '🔵'],
                            ['Арсенал', '🔴'],
                            ['Ливерпуль', '🔴'],
                            ['Челси', '🔵'],
                            ['Тоттенхэм', '⚪']
                        ] },
                    { league: 'Ла Лига', teams: [
                            ['Реал Мадрид', '👑'],
                            ['Барселона', '🔴🔵'],
                            ['Атлетико', '🔴⚪']
                        ] },
                    { league: 'Бундеслига', teams: [
                            ['Бавария', '🔴⚪'],
                            ['Боруссия Дортмунд', '🟡⚫']
                        ] },
                    { league: 'Серия А', teams: [
                            ['Ювентус', '⚫⚪'],
                            ['Интер', '🔵⚫'],
                            ['Милан', '🔴⚫']
                        ] },
                    { league: 'Лига 1', teams: [
                            ['ПСЖ', '🔵🔴'],
                            ['Марсель', '⚪🔵']
                        ] },
                    { league: 'РПЛ', teams: [
                            ['Зенит', '🔵⚪'],
                            ['Спартак', '🔴⚪']
                        ] }
                ];
                clubs.forEach(({ league, teams }) => {
                    for (let i = 0; i < teams.length - 1; i += 2) {
                        const h = teams[i];
                        const a = teams[i + 1] || teams[0];
                        if (h && a) {
                            matches.push(createFallbackMatch(league, h[0], h[1], a[0], a[1], i + 1, 15 + i * 2, 0));
                        }
                    }
                });

                return matches;
            }

            // =============================================================
            // 5. ЗАГРУЗКА МАТЧЕЙ
            // =============================================================
            let matches = [];
            let isRefreshing = false;

            async function loadMatches(force = false) {
                if (isRefreshing) return;
                isRefreshing = true;

                const refreshBtn = document.getElementById('refreshBtn');
                const originalText = refreshBtn.innerHTML;
                refreshBtn.innerHTML = '<span class="icon">⏳</span> Загрузка...';

                try {
                    let allMapped = [];
                    let rawData = [];
                    if (!force) {
                        const cached = localStorage.getItem(CACHE_KEY);
                        if (cached) {
                            try {
                                const data = JSON.parse(cached);
                                if (Date.now() - data.timestamp < CACHE_TTL) {
                                    rawData = data.matches;
                                    console.log('✅ Используем кеш (5 мин)');
                                }
                            } catch (e) { /* ignore */ }
                        }
                    }
                    if (rawData.length === 0) {
                        rawData = await fetchRealMatches();
                    }
                    if (rawData && rawData.length > 0) {
                        allMapped = mapRealMatches(rawData);
                    }
                    if (allMapped.length === 0) {
                        console.log('⚠️ Нет доступных матчей с коэффициентами, используем fallback');
                        allMapped = getFallbackMatches();
                    } else {
                        console.log(`✅ Загружено ${allMapped.length} матчей`);
                    }
                    matches = allMapped;
                    renderMatches();
                    renderCoupon();
                    updateFloatingPanel();
                } catch (e) {
                    console.error('Ошибка загрузки:', e);
                    matches = getFallbackMatches();
                    renderMatches();
                    renderCoupon();
                    updateFloatingPanel();
                } finally {
                    isRefreshing = false;
                    refreshBtn.innerHTML = originalText;
                }
            }

            document.getElementById('refreshBtn').addEventListener('click', function() {
                vibrate('light');
                loadMatches(true);
            });

            // =============================================================
            // 6. КУПОН И СТАВКИ
            // =============================================================
            let coupon = [];

            function addToCoupon(matchId, type, label, odds, teamNames, marketType = 'main') {
                const exists = coupon.some(item => item.matchId === matchId && item.type === type);
                if (exists) return false;
                coupon.push({ matchId, type, label, odds, teamNames, marketType });
                updateUI();
                return true;
            }

            function removeFromCoupon(index) {
                coupon.splice(index, 1);
                updateUI();
            }

            function clearCoupon() {
                coupon = [];
                updateUI();
            }

            // =============================================================
            // 7. ИСТОРИЯ СТАВОК (БЕЗ ИМИТАЦИИ РЕЗУЛЬТАТА)
            // =============================================================
            function getBetHistory() {
                try {
                    return JSON.parse(localStorage.getItem('football_bets')) || [];
                } catch { return []; }
            }

            function addBetHistory(bet) {
                const history = getBetHistory();
                history.push({
                    ...bet,
                    date: new Date().toISOString()
                });
                localStorage.setItem('football_bets', JSON.stringify(history));
                renderBetHistory();
            }

            function renderBetHistory() {
                const container = document.getElementById('betsList');
                const empty = document.getElementById('betsEmpty');
                const history = getBetHistory();
                if (history.length === 0) {
                    empty.style.display = 'block';
                    container.innerHTML = '';
                    return;
                }
                empty.style.display = 'none';
                let html = '';
                for (const bet of history) {
                    const resultClass = bet.result === 'win' ? 'win' : (bet.result === 'lose' ? 'lose' : 'pending');
                    const resultText = bet.result === 'win' ? '✅ Выигрыш' : (bet.result === 'lose' ? '❌ Проигрыш' : '⏳ В процессе');
                    html += `
                        <div class="bet-history-item">
                            <div class="top">
                                <span>${bet.teams}</span>
                                <span class="result ${resultClass}">${resultText}</span>
                            </div>
                            <div class="detail">
                                Ставка: <span class="coef">${bet.label}</span> | Коэф: ${bet.odds} | Сумма: ${bet.betSum} ₽
                            </div>
                            <div class="detail" style="font-size:11px;color:rgba(255,255,255,0.2);">
                                ${new Date(bet.date).toLocaleString('ru')}
                            </div>
                        </div>
                    `;
                }
                container.innerHTML = html;
            }

            // =============================================================
            // 8. РЕНДЕРИНГ
            // =============================================================
            const matchesContainer = document.getElementById('matchesContainer');
            const couponContainer = document.getElementById('couponContainer');
            const couponList = document.getElementById('couponList');
            const couponEmpty = document.getElementById('couponEmpty');
            const couponTotal = document.getElementById('couponTotal');
            const eventsCount = document.getElementById('eventsCount');
            const totalOdds = document.getElementById('totalOdds');
            const betSumInput = document.getElementById('betSumInput');
            const potentialWin = document.getElementById('potentialWin');
            const placeBetBtn = document.getElementById('placeBetBtn');
            const couponCount = document.getElementById('couponCount');
            const floatingPanel = document.getElementById('floatingPanel');
            const panelEvents = document.getElementById('panelEvents');
            const panelOdds = document.getElementById('panelOdds');
            const panelBetBtn = document.getElementById('panelBetBtn');
            const panelClearBtn = document.getElementById('panelClearBtn');

            let currentLeague = 'all';
            let currentTab = 'matches';
            let extraOpen = {};

            function renderMatches() {
                let filtered = matches;
                if (currentLeague !== 'all') {
                    filtered = filtered.filter(m => m.league === currentLeague);
                }
                filtered.sort((a, b) => {
                    const order = { 'LIVE': 0, 'NS': 1 };
                    if (a.status !== b.status) return (order[a.status] || 1) - (order[b.status] || 1);
                    return a.timestamp - b.timestamp;
                });

                if (filtered.length === 0) {
                    matchesContainer.innerHTML =
                        `<div style="text-align:center;padding:40px 0;color:rgba(255,255,255,0.2);font-size:16px;">Нет предстоящих матчей</div>`;
                    return;
                }

                let html = '';
                for (const m of filtered) {
                    const isSelected = (type) => coupon.some(item => item.matchId === m.id && item.type === type);
                    const extraIsSelected = (type) => coupon.some(item => item.matchId === m.id && item.type === type &&
                        item.marketType === 'extra');
                    const isOpen = extraOpen[m.id] || false;
                    const isLive = m.status === 'LIVE';
                    const cardClass = isLive ? 'match-card live' : 'match-card';
                    let statusHtml = '';
                    if (isLive) {
                        statusHtml = `<span class="status live"><span class="dot"></span> LIVE</span>`;
                    } else {
                        statusHtml = `<span class="time">${m.time}</span>`;
                    }

                    html += `
                        <div class="${cardClass}" data-match-id="${m.id}">
                            <div class="match-header">
                                <span class="league-name">${m.league}</span>
                                ${statusHtml}
                            </div>
                            <div class="match-teams">
                                <div class="team"><span class="emblem">${m.home.emblem}</span> <span class="name">${m.home.name}</span></div>
                                <div class="match-vs">VS</div>
                                <div class="team"><span class="emblem">${m.away.emblem}</span> <span class="name">${m.away.name}</span></div>
                            </div>
                            <div class="match-odds-main">
                                <div class="odd-btn ${isSelected('win1')?'selected':''}" data-match="${m.id}" data-type="win1" data-label="П1" data-odds="${m.odds.win1}" data-teams="${m.home.name} - ${m.away.name}">
                                    <span class="label">П1</span>
                                    <span class="value">${m.odds.win1}</span>
                                </div>
                                <div class="odd-btn ${isSelected('draw')?'selected':''}" data-match="${m.id}" data-type="draw" data-label="Х" data-odds="${m.odds.draw}" data-teams="${m.home.name} - ${m.away.name}">
                                    <span class="label">Х</span>
                                    <span class="value">${m.odds.draw}</span>
                                </div>
                                <div class="odd-btn ${isSelected('win2')?'selected':''}" data-match="${m.id}" data-type="win2" data-label="П2" data-odds="${m.odds.win2}" data-teams="${m.home.name} - ${m.away.name}">
                                    <span class="label">П2</span>
                                    <span class="value">${m.odds.win2}</span>
                                </div>
                                <div class="odd-btn ${isSelected('over')?'selected':''}" data-match="${m.id}" data-type="over" data-label="ТБ(2.5)" data-odds="${m.odds.over}" data-teams="${m.home.name} - ${m.away.name}">
                                    <span class="label">ТБ(2.5)</span>
                                    <span class="value">${m.odds.over}</span>
                                </div>
                                <div class="odd-btn ${isSelected('under')?'selected':''}" data-match="${m.id}" data-type="under" data-label="ТМ(2.5)" data-odds="${m.odds.under}" data-teams="${m.home.name} - ${m.away.name}">
                                    <span class="label">ТМ(2.5)</span>
                                    <span class="value">${m.odds.under}</span>
                                </div>
                            </div>
                            <div class="match-extra-toggle">
                                <button class="extra-toggle-btn ${isOpen?'active':''}" data-match="${m.id}">
                                    ${isOpen ? 'Скрыть доп. рынки ▲' : 'Показать доп. рынки ▼'}
                                </button>
                            </div>
                            <div class="match-odds-extra ${isOpen?'open':''}" data-match="${m.id}">
                                ${Object.entries(m.extra).map(([label, odds]) => `
                                    <div class="odd-btn-extra ${extraIsSelected(label)?'selected':''}" data-match="${m.id}" data-type="${label}" data-label="${label}" data-odds="${odds}" data-teams="${m.home.name} - ${m.away.name}" data-market="extra">
                                        <span class="label">${label}</span>
                                        <span class="value">${odds}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }
                matchesContainer.innerHTML = html;

                document.querySelectorAll('.odd-btn').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const matchId = parseInt(this.dataset.match);
                        const type = this.dataset.type;
                        const label = this.dataset.label;
                        const odds = parseFloat(this.dataset.odds);
                        const teams = this.dataset.teams;
                        const added = addToCoupon(matchId, type, label, odds, teams, 'main');
                        if (added) {
                            this.classList.add('selected');
                            vibrate('light');
                            playClick();
                            initAudio();
                        } else {
                            this.classList.remove('selected');
                            const idx = coupon.findIndex(item => item.matchId === matchId && item.type === type && item
                                .marketType === 'main');
                            if (idx !== -1) removeFromCoupon(idx);
                            document.querySelectorAll('.odd-btn').forEach(b => {
                                const mid = parseInt(b.dataset.match);
                                const t = b.dataset.type;
                                if (mid === matchId && t === type) b.classList.remove('selected');
                            });
                        }
                    });
                });

                document.querySelectorAll('.odd-btn-extra').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const matchId = parseInt(this.dataset.match);
                        const type = this.dataset.type;
                        const label = this.dataset.label;
                        const odds = parseFloat(this.dataset.odds);
                        const teams = this.dataset.teams;
                        const added = addToCoupon(matchId, type, label, odds, teams, 'extra');
                        if (added) {
                            this.classList.add('selected');
                            vibrate('light');
                            playClick();
                            initAudio();
                        } else {
                            this.classList.remove('selected');
                            const idx = coupon.findIndex(item => item.matchId === matchId && item.type === type && item
                                .marketType === 'extra');
                            if (idx !== -1) removeFromCoupon(idx);
                            document.querySelectorAll('.odd-btn-extra').forEach(b => {
                                const mid = parseInt(b.dataset.match);
                                const t = b.dataset.type;
                                if (mid === matchId && t === type) b.classList.remove('selected');
                            });
                        }
                    });
                });

                document.querySelectorAll('.extra-toggle-btn').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const matchId = parseInt(this.dataset.match);
                        extraOpen[matchId] = !extraOpen[matchId];
                        renderMatches();
                    });
                });
            }

            function updateCountdowns() {
                const now = Date.now();
                document.querySelectorAll('.coupon-item .countdown .time').forEach(el => {
                    const timestamp = parseInt(el.dataset.timestamp);
                    if (!timestamp) return;
                    const diff = timestamp - now;
                    if (diff <= 0) {
                        el.textContent = '⏳ Скоро';
                        return;
                    }
                    const hours = Math.floor(diff / 3600000);
                    const minutes = Math.floor((diff % 3600000) / 60000);
                    el.textContent = `${hours}ч ${minutes}м`;
                });
            }

            function renderCoupon() {
                if (coupon.length === 0) {
                    couponEmpty.style.display = 'block';
                    couponList.innerHTML = '';
                    couponTotal.style.display = 'none';
                    couponCount.textContent = '0';
                    return;
                }
                couponEmpty.style.display = 'none';
                couponTotal.style.display = 'block';

                let html = '';
                for (let i = 0; i < coupon.length; i++) {
                    const item = coupon[i];
                    const match = matches.find(m => m.id === item.matchId);
                    const timestamp = match ? match.timestamp : null;
                    let countdownHtml = '';
                    if (timestamp) {
                        const diff = timestamp - Date.now();
                        if (diff > 0) {
                            const hours = Math.floor(diff / 3600000);
                            const minutes = Math.floor((diff % 3600000) / 60000);
                            countdownHtml =
                                `<div class="countdown">⏳ <span class="time" data-timestamp="${timestamp}">${hours}ч ${minutes}м</span></div>`;
                        } else {
                            countdownHtml = `<div class="countdown">⏳ <span class="time">Скоро</span></div>`;
                        }
                    }
                    html += `
                        <div class="coupon-item">
                            <div class="info">
                                <div class="teams">${item.teamNames}</div>
                                <div class="detail">${item.label} <span class="coef">${item.odds}</span></div>
                                ${countdownHtml}
                            </div>
                            <button class="remove-btn" data-index="${i}">✕</button>
                        </div>
                    `;
                }
                couponList.innerHTML = html;

                document.querySelectorAll('.coupon-item .remove-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const idx = parseInt(this.dataset.index);
                        const removed = coupon[idx];
                        removeFromCoupon(idx);
                        if (removed) {
                            const selector = removed.marketType === 'extra' ? '.odd-btn-extra' : '.odd-btn';
                            document.querySelectorAll(selector).forEach(b => {
                                const mid = parseInt(b.dataset.match);
                                const t = b.dataset.type;
                                if (mid === removed.matchId && t === removed.type) {
                                    b.classList.remove('selected');
                                }
                            });
                        }
                        vibrate('light');
                        playClick();
                        initAudio();
                    });
                });

                const total = coupon.reduce((acc, item) => acc * parseFloat(item.odds), 1);
                totalOdds.textContent = total.toFixed(2);
                eventsCount.textContent = coupon.length;
                couponCount.textContent = coupon.length;

                const betSum = parseInt(betSumInput.value) || 0;
                potentialWin.textContent = (betSum * total).toFixed(0) + ' ₽';
                placeBetBtn.disabled = (coupon.length === 0 || betSum < 10 || betSum > balance);

                setTimeout(updateCountdowns, 1000);
            }

            function updateFloatingPanel() {
                if (coupon.length === 0) {
                    floatingPanel.classList.remove('show');
                    return;
                }
                floatingPanel.classList.add('show');
                const total = coupon.reduce((acc, item) => acc * parseFloat(item.odds), 1);
                panelEvents.textContent = `${coupon.length} событий`;
                panelOdds.textContent = total.toFixed(2);
                panelBetBtn.disabled = false;
            }

            function updateUI() {
                renderMatches();
                renderCoupon();
                updateFloatingPanel();
                renderBetHistory();
            }

            panelClearBtn.addEventListener('click', function() {
                clearCoupon();
                document.querySelectorAll('.odd-btn, .odd-btn-extra').forEach(b => b.classList.remove('selected'));
                vibrate('light');
            });

            panelBetBtn.addEventListener('click', function() {
                switchTab('coupon');
                setTimeout(() => {
                    const btn = document.getElementById('placeBetBtn');
                    if (btn) btn.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 300);
            });

            // =============================================================
            // 9. НАВИГАЦИЯ
            // =============================================================
            function switchTab(tab) {
                currentTab = tab;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                const activeTabBtn = document.querySelector(`.tab-btn[data-tab="${tab}"]`);
                if (activeTabBtn) activeTabBtn.classList.add('active');
                document.querySelectorAll('.matches-container, .coupon-container, .bets-container')
                    .forEach(el => el.classList.remove('show'));
                if (tab === 'matches') {
                    document.querySelector('.matches-container').classList.add('show');
                } else if (tab === 'coupon') {
                    document.querySelector('.coupon-container').classList.add('show');
                    renderCoupon();
                } else if (tab === 'bets') {
                    document.querySelector('.bets-container').classList.add('show');
                    renderBetHistory();
                }
                vibrate('light');
            }

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const tab = this.dataset.tab;
                    switchTab(tab);
                });
            });

            // =============================================================
            // 10. СТАВКА (БЕЗ ИМИТАЦИИ РЕЗУЛЬТАТА)
            // =============================================================
            betSumInput.addEventListener('input', function() {
                let val = parseInt(this.value) || 0;
                if (val < 0) this.value = 0;
                if (val > 1000000) this.value = 1000000;
                renderCoupon();
            });

            placeBetBtn.addEventListener('click', function() {
                const total = coupon.reduce((acc, item) => acc * parseFloat(item.odds), 1);
                const betSum = parseInt(betSumInput.value) || 0;
                if (betSum < 10) {
                    alert('Минимальная ставка 10 ₽');
                    vibrate('error');
                    return;
                }
                if (betSum > balance) {
                    alert('Недостаточно средств');
                    vibrate('error');
                    return;
                }
                if (coupon.length === 0) {
                    alert('Добавьте исходы в купон');
                    return;
                }
                balance -= betSum;
                updateBalanceDisplay();
                const win = Math.floor(betSum * total);
                // Сохраняем в историю без результата (будет обновлён позже)
                const teams = coupon.map(item => item.teamNames).join(', ');
                const label = coupon.map(item => item.label).join(' + ');
                const odds = coupon.map(item => item.odds).join(' x ');
                addBetHistory({
                    teams: teams,
                    label: label,
                    odds: odds,
                    betSum: betSum,
                    result: null // ⏳ В процессе
                });
                alert(`✅ Ставка принята!\nСумма: ${betSum} ₽\nКоэффициент: ${total.toFixed(2)}\nПотенциальный выигрыш: ${win} ₽`);
                vibrate('success');
                clearCoupon();
                updateUI();
                switchTab('matches');
            });

            // =============================================================
            // 11. ЗАПУСК
            // =============================================================
            document.querySelector('.matches-container').classList.add('show');
            loadMatches();
            renderBetHistory();

            window.addEventListener('storage', (e) => {
                if (e.key === 'casinoBalance') {
                    balance = parseInt(e.newValue) || 0;
                    updateBalanceDisplay();
                    renderCoupon();
                    updateFloatingPanel();
                }
                if (e.key === 'football_bets') {
                    renderBetHistory();
                }
            });

            setInterval(updateCountdowns, 60000);

            initAudio();

        })();
    </script>

</body>
</html>
