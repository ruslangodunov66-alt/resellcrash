<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>⚽ R-GAME Ultra · Профессиональный Футбольный Беттинг</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Montserrat:ital,wght@0,800;1,800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; min-height: 100vh; background: #05080e; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
    body {
      background-image: radial-gradient(circle at 10% 0%, rgba(24, 130, 255, 0.15), transparent 50%), radial-gradient(circle at 90% 100%, rgba(139, 92, 246, 0.1), transparent 50%);
      background-attachment: fixed;
      padding-bottom: 100px;
    }
    .bg-watermarks { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 120px; }
    .bg-text { font-family: 'Montserrat', sans-serif; font-size: 160px; font-weight: 800; font-style: italic; white-space: nowrap; background: linear-gradient(135deg, rgba(255,255,255,0.02), rgba(24,130,255,0.02)); -webkit-background-clip: text; background-clip: text; color: transparent; text-transform: uppercase; transform: rotate(-12deg); }
    .bg-text span { color: rgba(24,130,255,0.04); -webkit-text-fill-color: rgba(24,130,255,0.04); }

    #app { max-width: 580px; margin: 0 auto; padding: 12px 12px 30px; position: relative; z-index: 2; }
    
    .header { display: flex; justify-content: space-between; align-items: center; background: rgba(13, 20, 34, 0.75); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border-radius: 24px; padding: 14px 20px; margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.07); box-shadow: 0 20px 50px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1); }
    .brand { font-family: 'Montserrat', sans-serif; font-size: 28px; font-weight: 800; font-style: italic; background: linear-gradient(135deg, #ffffff, #cbd5e1); -webkit-background-clip: text; background-clip: text; color: transparent; letter-spacing: 0.5px; text-transform: uppercase; }
    .brand span { color: #1882ff; -webkit-text-fill-color: #1882ff; }
    .header .back-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 50%; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #fff; cursor: pointer; transition: 0.2s; margin-right: 8px; }
    .header .back-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.1); }
    .header .left-group { display: flex; align-items: center; gap: 6px; }
    .header .balance { background: rgba(255, 213, 74, 0.07); padding: 8px 20px; border-radius: 40px; border: 1px solid rgba(255, 213, 74, 0.15); font-weight: 900; font-size: 17px; color: #FFD54A; text-shadow: 0 0 10px rgba(255,213,74,0.2); display: flex; align-items: center; gap: 10px; }
    .header .balance button { background: none; border: none; color: #FFD54A; font-size: 14px; font-weight: 900; cursor: pointer; padding: 2px 8px; border-radius: 20px; border: 1px solid rgba(255,213,74,0.2); transition: 0.2s; }
    .header .balance button:active { transform: scale(0.9); background: rgba(255,213,74,0.1); }

    .tabs { display: flex; gap: 8px; margin-bottom: 16px; background: rgba(255,255,255,0.02); padding: 4px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.04); }
    .tab-btn { flex: 1; padding: 12px 0; background: transparent; border: none; border-radius: 14px; color: rgba(255,255,255,0.4); font-weight: 700; font-size: 14px; cursor: pointer; transition: all 0.2s ease; position: relative; }
    .tab-btn.active { background: rgba(24, 130, 255, 0.15); color: #1882ff; font-weight: 800; box-shadow: inset 0 0 0 1px rgba(24, 130, 255, 0.3); }
    .tab-btn .badge { background: #1882ff; color: #fff; border-radius: 30px; font-size: 11px; padding: 1px 7px; margin-left: 5px; font-weight: 900; }

    .matches-container, .coupon-container, .bets-container { display: none; flex-direction: column; gap: 14px; }
    .matches-container.show, .coupon-container.show, .bets-container.show { display: flex; }

    .match-card { background: rgba(18, 26, 43, 0.4); border-radius: 24px; padding: 16px; border: 1px solid rgba(255,255,255,0.04); backdrop-filter: blur(10px); position: relative; transition: border 0.3s ease; }
    .match-card.live { border-color: rgba(240, 48, 67, 0.3); background: linear-gradient(180deg, rgba(18,26,43,0.4) 0%, rgba(240,48,67,0.02) 100%); }
    
    .match-meta { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 12px; font-weight: 600; }
    .match-meta .league { color: rgba(255,255,255,0.7); font-weight: 700; background: rgba(255,255,255,0.05); padding: 3px 10px; border-radius: 20px; }
    .match-meta .status { display: flex; align-items: center; gap: 5px; font-weight: 800; text-transform: uppercase; font-size: 11px; }
    .match-meta .status.live-tag { color: #f03043; background: rgba(240,48,67,0.1); padding: 3px 10px; border-radius: 20px; }
    .match-meta .status.live-tag .pulse-dot { width: 6px; height: 6px; background: #f03043; border-radius: 50%; animation: pulse 1s infinite alternate; }
    @keyframes pulse { from { opacity: 0.4; } to { opacity: 1; } }

    .teams-grid { display: grid; grid-template-columns: 1fr 50px 1fr; align-items: center; margin-bottom: 16px; }
    .team-box { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 6px; }
    .team-box .emblem { font-size: 36px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3)); }
    .team-box .name { font-size: 15px; font-weight: 700; color: #fff; max-width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .score-box { display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Montserrat', sans-serif; }
    .score-box .score { font-size: 26px; font-weight: 900; color: #fff; letter-spacing: 1px; }
    .score-box .vs { font-size: 12px; font-weight: 800; color: rgba(255,255,255,0.15); letter-spacing: 1px; }

    .live-ticker { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 6px 12px; font-size: 11px; color: rgba(255,255,255,0.5); margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.02); text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .odds-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
    .odd-item { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 14px; padding: 8px 0; text-align: center; cursor: pointer; transition: all 0.2s ease; position: relative; }
    .odd-item:hover { background: rgba(255,255,255,0.06); }
    .odd-item.selected { background: rgba(24, 130, 255, 0.15); border-color: #1882ff; }
    .odd-item.selected .val { color: #1882ff; }
    .odd-item .lbl { font-size: 10px; color: rgba(255,255,255,0.35); font-weight: 700; text-transform: uppercase; display: block; margin-bottom: 2px; }
    .odd-item .val { font-size: 15px; font-weight: 800; color: #fff; }
    .odd-item .trend { position: absolute; top: 2px; right: 4px; font-size: 8px; font-weight: 900; display: none; }
    .odd-item .trend.up { color: #3ddc84; display: block; }
    .odd-item .trend.down { color: #f03043; display: block; }

    /* Дополнительные рынки */
    .extra-toggle-btn { background: none; border: none; color: rgba(255,255,255,0.2); font-size: 12px; font-weight: 600; cursor: pointer; padding: 6px 12px; border-radius: 20px; transition: 0.2s; margin-top: 6px; display: block; width: 100%; text-align: center; }
    .extra-toggle-btn:active { transform: scale(0.9); }
    .extra-toggle-btn.active { color: #FFD54A; background: rgba(255,215,0,0.06); }
    .extra-odds-grid { display: none; grid-template-columns: repeat(2, 1fr); gap: 6px; margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.04); }
    .extra-odds-grid.open { display: grid; }
    .odd-item-extra { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04); border-radius: 10px; padding: 6px 0; text-align: center; cursor: pointer; transition: all 0.2s; font-size: 11px; }
    .odd-item-extra .lbl { font-size: 9px; color: rgba(255,255,255,0.3); display: block; }
    .odd-item-extra .val { font-weight: 700; font-size: 15px; color: #fff; }
    .odd-item-extra:active { transform: scale(0.92); }
    .odd-item-extra.selected { border-color: #FFD54A; background: rgba(255,215,0,0.08); }
    .odd-item-extra.selected .val { color: #FFD54A; }
    .odd-item-extra.disabled { opacity: 0.3; pointer-events: none; }

    .express-moment-trigger { background: linear-gradient(90deg, #ff9900, #ff5500); border: none; border-radius: 14px; width: 100%; padding: 10px; margin-top: 10px; color: #fff; font-weight: 900; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; animation: glow 2s infinite; display: flex; align-items: center; justify-content: center; gap: 6px; box-shadow: 0 4px 15px rgba(255,85,0,0.3); }
    @keyframes glow { 0%, 100% { box-shadow: 0 4px 12px rgba(255,85,0,0.3); } 50% { box-shadow: 0 4px 22px rgba(255,85,0,0.6); } }

    .coupon-empty { text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.25); font-size: 16px; font-weight: 700; }
    .coupon-card { background: rgba(255,255,255,0.02); border-radius: 18px; border: 1px solid rgba(255,255,255,0.05); padding: 14px; display: flex; flex-direction: column; gap: 8px; }
    .coupon-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px; }
    .coupon-header .title { font-weight: 800; font-size: 14px; color: rgba(255,255,255,0.8); }
    .coupon-header .remove { color: rgba(240,48,67,0.6); font-size: 18px; cursor: pointer; border: none; background: transparent; padding: 0 5px; }
    .coupon-body { display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
    .coupon-body .bet-spec { font-weight: 700; color: #1882ff; }
    .coupon-body .bet-odds { font-weight: 900; color: #FFD54A; font-size: 15px; }

    .coupon-summary { background: rgba(13,20,34,0.9); border: 1px solid rgba(24,130,255,0.2); border-radius: 20px; padding: 16px; display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }
    .summary-row { display: flex; justify-content: space-between; font-size: 14px; font-weight: 700; color: rgba(255,255,255,0.6); }
    .summary-row span:last-child { color: #fff; font-weight: 800; }
    .summary-row .gold { color: #FFD54A !important; font-weight: 900; font-size: 16px; }
    .stake-input-wrapper { display: flex; background: rgba(0,0,0,0.3); border-radius: 12px; border: 1px solid rgba(255,255,255,0.06); overflow: hidden; }
    .stake-input-wrapper input { background: transparent; border: none; padding: 12px; color: #fff; font-size: 16px; font-weight: 800; width: 100%; text-align: center; outline: none; }
    .quick-stake-btns { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .quick-stake-btn { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); color: rgba(255,255,255,0.7); font-weight: 700; font-size: 12px; padding: 8px 0; border-radius: 10px; cursor: pointer; }
    .submit-bet-btn { background: linear-gradient(135deg, #3DDC84, #1a8a4a); color: #fff; border: none; border-radius: 14px; padding: 16px; font-weight: 900; font-size: 16px; text-transform: uppercase; cursor: pointer; width: 100%; box-shadow: 0 4px 15px rgba(61,220,132,0.2); }
    .submit-bet-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .history-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04); border-radius: 16px; padding: 12px; display: flex; flex-direction: column; gap: 6px; }
    .history-top { display: flex; justify-content: space-between; font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.4); }
    .history-mid { font-size: 14px; font-weight: 800; color: #fff; }
    .history-bot { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: rgba(255,255,255,0.6); }
    .status-badge { padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 900; text-transform: uppercase; }
    .status-badge.win { background: rgba(61,220,132,0.15); color: #3DDC84; }
    .status-badge.lose { background: rgba(240,48,67,0.15); color: #f03043; }
    .status-badge.pending { background: rgba(255,213,74,0.15); color: #FFD54A; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(4,6,10,0.95); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 12px; backdrop-filter: blur(10px); }
    .modal-overlay.show { display: flex; }
    .modal-content { background: #0c121e; border: 1px solid rgba(255,153,0,0.3); width: 100%; max-width: 460px; border-radius: 28px; overflow: hidden; box-shadow: 0 25px 60px rgba(0,0,0,0.8); display: flex; flex-direction: column; }
    .modal-header { padding: 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .modal-header h3 { font-family: 'Montserrat', sans-serif; font-size: 18px; font-weight: 800; color: #ff9900; font-style: italic; }
    .modal-header .close-btn { background: transparent; border: none; color: rgba(255,255,255,0.4); font-size: 20px; cursor: pointer; }
    
    .canvas-container { position: relative; width: 100%; aspect-ratio: 16/9; background: #15321b; overflow: hidden; }
    canvas { width: 100%; height: 100%; display: block; }
    
    .moment-betting-ui { padding: 16px; display: flex; flex-direction: column; gap: 12px; background: rgba(0,0,0,0.2); }
    .moment-options { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .moment-opt-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 10px 4px; text-align: center; cursor: pointer; transition: all 0.2s ease; }
    .moment-opt-btn.selected { background: rgba(255,153,0,0.15); border-color: #ff9900; }
    .moment-opt-btn.selected .v { color: #ff9900; }
    .moment-opt-btn .l { font-size: 10px; color: rgba(255,255,255,0.4); font-weight: 700; display: block; margin-bottom: 4px; }
    .moment-opt-btn .v { font-size: 15px; font-weight: 900; color: #fff; }

    .floating-coupon-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(12,18,30,0.95); backdrop-filter: blur(20px); border-top: 1px solid rgba(24,130,255,0.2); max-width: 580px; margin: 0 auto; padding: 12px 16px; border-radius: 20px 20px 0 0; display: none; justify-content: space-between; align-items: center; z-index: 500; box-shadow: 0 -10px 30px rgba(0,0,0,0.5); }
    .floating-coupon-bar.show { display: flex; }
    .float-info { display: flex; flex-direction: column; }
    .float-info .count { font-size: 12px; color: rgba(255,255,255,0.5); font-weight: 700; }
    .float-info .odds { font-size: 18px; font-weight: 900; color: #FFD54A; }
    .float-go-btn { background: #1882ff; color: #fff; border: none; font-weight: 800; font-size: 14px; padding: 10px 20px; border-radius: 12px; cursor: pointer; text-transform: uppercase; }

    /* Модалка депозита */
    .deposit-modal .modal-content { max-width: 360px; }
    .deposit-modal .deposit-amounts { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 12px 0; }
    .deposit-modal .deposit-amounts button { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; color: #fff; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.2s; }
    .deposit-modal .deposit-amounts button:active { transform: scale(0.92); background: rgba(255,213,74,0.1); }
    .deposit-modal .deposit-custom { display: flex; gap: 8px; margin-top: 8px; }
    .deposit-modal .deposit-custom input { flex: 1; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 10px; color: #fff; font-size: 16px; font-weight: 700; text-align: center; }
    .deposit-modal .deposit-confirm { background: #1882ff; border: none; border-radius: 12px; padding: 12px; color: #fff; font-weight: 900; font-size: 16px; cursor: pointer; width: 100%; margin-top: 10px; }

    @media(max-width: 480px) {
      .team-box .name { max-width: 85px; font-size: 13px; }
      .odd-item .val { font-size: 13px; }
      .team-box .emblem { font-size: 28px; }
      .deposit-modal .deposit-amounts { grid-template-columns: repeat(2, 1fr); }
      .header .back-btn { width: 36px; height: 36px; font-size: 20px; }
      .header .balance { font-size: 15px; padding: 6px 14px; }
    }
  </style>
</head>
<body>

  <div class="bg-watermarks">
    <div class="bg-text">R-<span>GAME</span></div>
    <div class="bg-text">R-<span>WIN</span></div>
    <div class="bg-text">LIVE-<span>SIM</span></div>
  </div>

  <div id="app">
    <div class="header">
      <div class="left-group">
        <button class="back-btn" id="backBtn">←</button>
        <div class="brand">R-<span>GAME</span></div>
      </div>
      <div class="balance" id="appBalance">
        <span id="balanceDisplay">10 000 ₽</span>
        <button id="depositBtn">💰</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" id="tabMatches" onclick="switchTab('matches')">Матчи Лиг</button>
      <button class="tab-btn" id="tabCoupon" onclick="switchTab('coupon')">Купон<span class="badge" id="couponCountBadge">0</span></button>
      <button class="tab-btn" id="tabBets" onclick="switchTab('bets')">История</button>
    </div>

    <!-- Вкладка Матчей -->
    <div class="matches-container show" id="paneMatches"></div>

    <!-- Вкладка Купона -->
    <div class="coupon-container" id="paneCoupon">
      <div class="coupon-empty" id="couponEmptyState">Купон пуст. Выберите коэффициенты в матчах для формирования ставки.</div>
      <div id="couponList" style="display:flex; flex-direction:column; gap:10px;"></div>
      <div class="coupon-summary" id="couponSummaryBlock" style="display:none;">
        <div class="summary-row"><span>Тип Ставки:</span><span id="couponBetType">Ординар</span></div>
        <div class="summary-row"><span>Общий Коэффициент:</span><span class="gold" id="couponTotalOdds">1.00</span></div>
        <div class="stake-input-wrapper">
          <input type="number" id="couponStakeInput" value="500" min="50">
        </div>
        <div class="quick-stake-btns">
          <button class="quick-stake-btn" onclick="setStake(100)">100</button>
          <button class="quick-stake-btn" onclick="setStake(500)">500</button>
          <button class="quick-stake-btn" onclick="setStake(1000)">1К</button>
          <button class="quick-stake-btn" onclick="setStake(5000)">5К</button>
        </div>
        <div class="summary-row"><span>Возможный Выигрыш:</span><span class="gold" id="couponPossibleWin">0 ₽</span></div>
        <button class="submit-bet-btn" id="couponSubmitBtn" onclick="executePlacement()">Заключить Пари</button>
      </div>
    </div>

    <!-- Вкладка Истории -->
    <div class="bets-container" id="paneBets">
      <div class="coupon-empty" id="historyEmptyState">История ставок пуста.</div>
      <div id="historyList" style="display:flex; flex-direction:column; gap:10px;"></div>
    </div>
  </div>

  <!-- Плавающая нижняя панель купона -->
  <div class="floating-coupon-bar" id="floatBar">
    <div class="float-info">
      <span class="count" id="floatCount">Выбрано: 1 исход</span>
      <span class="odds" id="floatOdds">Кэф: 1.85</span>
    </div>
    <button class="float-go-btn" onclick="switchTab('coupon')">В купон</button>
  </div>

  <!-- Модалка LIVE Моментов -->
  <div class="modal-overlay" id="momentModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="momentTitle">🔥 ЭКСПРЕСС МОМЕНТ: ПЕНАЛЬТИ</h3>
        <button class="close-btn" onclick="terminateMoment()">✕</button>
      </div>
      <div class="canvas-container">
        <canvas id="momentCanvas"></canvas>
      </div>
      <div class="moment-betting-ui" id="momentBetUi">
        <div class="moment-options" id="momentOptionsGrid"></div>
        <div class="stake-input-wrapper">
          <input type="number" id="momentStakeInput" value="200" min="50">
        </div>
        <button class="submit-bet-btn" id="momentSubmitBtn" style="background:linear-gradient(135deg, #ff9900, #ff5500); box-shadow:0 4px 12px rgba(255,85,0,0.3);" onclick="placeMomentBet()">Принять Ставку</button>
      </div>
    </div>
  </div>

  <!-- Модалка депозита -->
  <div class="modal-overlay deposit-modal" id="depositModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 style="color:#1882ff;">💰 Пополнение баланса</h3>
        <button class="close-btn" onclick="document.getElementById('depositModal').classList.remove('show')">✕</button>
      </div>
      <div style="padding:16px;">
        <div class="deposit-amounts">
          <button onclick="deposit(100)">100</button>
          <button onclick="deposit(500)">500</button>
          <button onclick="deposit(1000)">1 000</button>
          <button onclick="deposit(5000)">5 000</button>
        </div>
        <div class="deposit-custom">
          <input type="number" id="customDeposit" placeholder="Своя сумма" min="10">
          <button class="deposit-confirm" onclick="depositCustom()">Пополнить</button>
        </div>
      </div>
    </div>
  </div>

  <script>

    class AudioEngine {
      constructor() { this.ctx = null; this.ambientGain = null; this.ambientSource = null; }
      init() {
        if (this.ctx) return;
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) return;
        this.ctx = new AudioContextClass();
        this.setupAmbientNoise();
      }
      setupAmbientNoise() {
        const bufferSize = 2 * this.ctx.sampleRate;
        const noiseBuffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const output = noiseBuffer.getChannelData(0);
        let lastOut = 0.0;
        for (let i = 0; i < bufferSize; i++) {
          const white = Math.random() * 2 - 1;
          output[i] = 0.02 * white + 0.98 * lastOut;
          output[i] *= 0.15;
          lastOut = output[i];
        }
        this.ambientSource = this.ctx.createBufferSource();
        this.ambientSource.buffer = noiseBuffer;
        this.ambientSource.loop = true;
        this.ambientGain = this.ctx.createGain();
        this.ambientGain.gain.setValueAtTime(0.02, this.ctx.currentTime);
        const filter = this.ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(400, this.ctx.currentTime);
        this.ambientSource.connect(filter);
        filter.connect(this.ambientGain);
        this.ambientGain.connect(this.ctx.destination);
        this.ambientSource.start();
      }
      setAmbientVolume(vol, duration = 0.5) {
        if (!this.ctx || !this.ambientGain) return;
        this.ambientGain.gain.linearRampToValueAtTime(vol, this.ctx.currentTime + duration);
      }
      playKick() {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.frequency.setValueAtTime(140, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(40, this.ctx.currentTime + 0.08);
        gain.gain.setValueAtTime(0.4, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.08);
        osc.start(); osc.stop(this.ctx.currentTime + 0.09);
      }
      playWhistle(long = false) {
        if (!this.ctx) return;
        const dur = long ? 0.6 : 0.15;
        const osc1 = this.ctx.createOscillator();
        const osc2 = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc1.type = 'square'; osc2.type = 'sine';
        osc1.frequency.setValueAtTime(950, this.ctx.currentTime);
        osc2.frequency.setValueAtTime(1050, this.ctx.currentTime);
        gain.gain.setValueAtTime(0.08, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + dur);
        osc1.connect(gain); osc2.connect(gain); gain.connect(this.ctx.destination);
        osc1.start(); osc2.start();
        osc1.stop(this.ctx.currentTime + dur); osc2.stop(this.ctx.currentTime + dur);
      }
      playPostRing() {
        if (!this.ctx) return;
        const freqs = [850, 1320, 2180];
        const gain = this.ctx.createGain();
        gain.gain.setValueAtTime(0.12, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.8);
        gain.connect(this.ctx.destination);
        freqs.forEach(f => {
          const osc = this.ctx.createOscillator();
          osc.type = 'sine'; osc.frequency.value = f;
          osc.connect(gain);
          osc.start(); osc.stop(this.ctx.currentTime + 0.8);
        });
      }
      playCrowdRoar() {
        if (!this.ctx) return;
        this.setAmbientVolume(0.15, 0.1);
        setTimeout(() => this.setAmbientVolume(0.02, 0.8), 300);
      }
      playWhistleShort() { this.playWhistle(false); }
    }

    function initMatchEngine() {
      matches = [];
      let currentId = 101;
      TOURNAMENTS.forEach(tour => {
        let pool = [...tour.pool];
        for (let i = pool.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [pool[i], pool[j]] = [pool[j], pool[i]];
        }
        const selected = pool.slice(0, Math.min(8, pool.length));
        for (let i = 0; i < selected.length; i++) {
          for (let j = i + 1; j < selected.length; j++) {
            const home = selected[i];
            const away = selected[j];
            const isLive = (Math.random() < 0.25) && (matches.length % 2 === 0);
            const initialMinute = isLive ? Math.floor(Math.random() * 40) : 0;
            let m = {
              id: currentId++,
              league: tour.name,
              home: home,
              away: away,
              homeScore: 0,
              awayScore: 0,
              minute: initialMinute,
              status: isLive ? 'LIVE' : 'NS',
              stats: { possession: 50, shots: 0, target: 0, corners: 0, fouls: 0, yellow: 0, red: 0 },
              ticker: isLive ? 'Матч в разгаре' : 'Матч готовится к началу',
              odds: {},
              lastOddsSign: {},
              expressMomentAvailable: false,
              expressMomentType: null,
              finished: false,
              extra: {}
            };
            if (isLive && initialMinute > 0) {
              for (let mnt = 0; mnt < initialMinute; mnt++) {
                if (Math.random() < 0.015) m.homeScore += (Math.random() * (home.att / 85) > 0.4 ? 1 : 0);
                if (Math.random() < 0.015) m.awayScore += (Math.random() * (away.att / 85) > 0.4 ? 1 : 0);
              }
            }
            calculateOdds(m);
            matches.push(m);
          }
        }
      });
      for (let i = matches.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [matches[i], matches[j]] = [matches[j], matches[i]];
      }
    }

    function calculateOdds(m) {
      const homePower = m.home.att * 0.6 + m.home.def * 0.4;
      const awayPower = m.away.att * 0.6 + m.away.def * 0.4;
      let baseHomeProb = homePower / (homePower + awayPower);
      let baseAwayProb = awayPower / (homePower + awayPower);
      let baseDrawProb = 0.24;
      if (m.status === 'LIVE') {
        const scoreDiff = m.homeScore - m.awayScore;
        const timeRemainingFactor = (90 - m.minute) / 90;
        baseHomeProb += scoreDiff * 0.25;
        baseAwayProb -= scoreDiff * 0.25;
        if (m.homeScore === m.awayScore) baseDrawProb += (1 - timeRemainingFactor) * 0.3;
        else baseDrawProb -= (1 - timeRemainingFactor) * 0.15;
      }
      const margin = 1.06;
      let totalProb = baseHomeProb + baseAwayProb + baseDrawProb;
      baseHomeProb /= totalProb; baseAwayProb /= totalProb; baseDrawProb /= totalProb;
      const newOdds = {
        w1: Math.max(1.02, Math.min(25, +(1 / (baseHomeProb * margin)).toFixed(2))),
        x: Math.max(1.02, Math.min(25, +(1 / (baseDrawProb * margin)).toFixed(2))),
        w2: Math.max(1.02, Math.min(25, +(1 / (baseAwayProb * margin)).toFixed(2))),
        tb: Math.max(1.05, Math.min(15, +(1.85 + (m.homeScore + m.awayScore)*0.1).toFixed(2))),
        tm: Math.max(1.05, Math.min(15, +(1.95 - (m.homeScore + m.awayScore)*0.1).toFixed(2)))
      };
      if (m.odds.w1) {
        ['w1', 'x', 'w2', 'tb', 'tm'].forEach(k => {
          if (newOdds[k] > m.odds[k]) m.lastOddsSign[k] = 'up';
          else if (newOdds[k] < m.odds[k]) m.lastOddsSign[k] = 'down';
        });
      }
      m.odds = newOdds;
      // Дополнительные рынки
      m.extra = {
        'Обе забьют (Да)': +(1.7 + Math.random() * 0.5).toFixed(2),
        'Обе забьют (Нет)': +(1.8 + Math.random() * 0.5).toFixed(2),
        'Угловые > 9.5': +(1.9).toFixed(2),
        'Угловые < 9.5': +(1.9).toFixed(2)
      };
    }

    function updateSimulation() {
      matches.forEach(m => {
        if (m.status !== 'LIVE' || m.finished) return;
        m.minute += 1;
        if (m.minute >= 90) {
          m.minute = 90;
          m.status = 'FINISHED';
          m.finished = true;
          m.ticker = 'Матч завершен. Итоговый счет ' + m.homeScore + ':' + m.awayScore;
          m.expressMomentAvailable = false;
          settleBetsForMatch(m);
          return;
        }
        const attackFactor = 0.04;
        if (Math.random() < attackFactor) {
          const isHomeAttack = Math.random() * (m.home.att + 5) > Math.random() * (m.away.att);
          const side = isHomeAttack ? 'home' : 'away';
          const attacker = isHomeAttack ? m.home : m.away;
          const defender = isHomeAttack ? m.away : m.home;
          m.stats.shots++;
          const roll = Math.random();
          if (roll < 0.25) {
            m.stats.target++;
            if (side === 'home') m.homeScore++; else m.awayScore++;
            m.ticker = `МИНУТА ${m.minute}': ГОЛ!! ${attacker.emblem} ${attacker.name} реализует шикарный момент!`;
            Sound.playWhistle();
            Sound.playKick();
            Sound.playCrowdRoar();
            calculateOdds(m);
          } else if (roll < 0.50) {
            m.stats.target++;
            m.ticker = `МИНУТА ${m.minute}': Опасный удар ${attacker.name}, вратарь спасает команду в прыжке!`;
          } else if (roll < 0.75) {
            m.stats.corners++;
            m.ticker = `МИНУТА ${m.minute}': Мяч уходит на угловой с фланга после рикошета у ворот ${defender.name}.`;
          } else {
            m.stats.fouls++;
            if (Math.random() < 0.3) {
              m.stats.yellow++;
              m.ticker = `МИНУТА ${m.minute}': Грубый подкат! Желтая карточка игроку ${defender.name}.`;
            } else {
              m.ticker = `МИНУТА ${m.minute}': Срыв атаки фолом. Судья делает устное предупреждение.`;
            }
          }
        }
        if (!m.expressMomentAvailable && Math.random() < 0.03) {
          const types = ['penalty', 'freekick', 'corner', 'tackle'];
          m.expressMomentType = types[Math.floor(Math.random() * types.length)];
          m.expressMomentAvailable = true;
          m.ticker = `⚡ ОСОБЫЙ МОМЕНТ: Быстрая ставка на ${m.expressMomentType}!`;
        }
        m.stats.possession = Math.floor(50 + (m.home.att - m.away.att)*0.1 + (Math.random()*10 - 5));
        m.stats.possession = Math.max(30, Math.min(70, m.stats.possession));
        if (m.minute % 5 === 0) calculateOdds(m);
      });
      renderMatches();
      updateSlipUi();
    }

    function toggleSelection(matchId, market) {
      Sound.init();
      const m = matches.find(x => x.id === matchId);
      if (!m || m.status === 'FINISHED') return;

      let oddsValue = m.odds[market];
      if (oddsValue === undefined) {
        oddsValue = m.extra[market];
      }
      if (oddsValue === undefined) return;

      const existingIndex = activeSlip.findIndex(x => x.matchId === matchId && x.market === market);
      if (existingIndex > -1) {
        activeSlip.splice(existingIndex, 1);
      } else {
        activeSlip = activeSlip.filter(x => x.matchId !== matchId);
        activeSlip.push({
          matchId: m.id,
          teams: `${m.home.name} — ${m.away.name}`,
          market: market,
          odds: oddsValue
        });
      }
      updateSlipUi();
      renderMatches();
    }

          if (newOdds === undefined) newOdds = m.extra[item.market];
          if (newOdds !== undefined) item.odds = newOdds;

              <div class="odd-item ${s('tb')}" onclick="toggleSelection(${m.id}, 'tb')">
                <span class="${trendClass('tb')}">${trendChar('tb')}</span>
                <span class="lbl">ТБ 2.5</span><span class="val">${m.odds.tb}</span>
              </div>
              <div class="odd-item ${s('tm')}" onclick="toggleSelection(${m.id}, 'tm')">

        } else {

              Статистика: Удары ${m.stats.shots} | В створ ${m.stats.target} | Угловые ${m.stats.corners} | Фолы ${m.stats.fouls}
            </div>
          `;
        }

        // Дополнительные рынки
        let extraHtml = '';
        if (!isFin) {
          const extraKeys = Object.keys(m.extra);

          const hasExtraSelected = activeSlip.some(x => x.matchId === m.id && extraKeys.includes(x.market));
          if (hasExtraSelected) extraOpen = true;
          extraHtml = `
            <button class="extra-toggle-btn ${extraOpen ? 'active' : ''}" data-match="${m.id}">
              ${extraOpen ? 'Скрыть доп. рынки ▲' : 'Показать доп. рынки ▼'}
            </button>
            <div class="extra-odds-grid ${extraOpen ? 'open' : ''}" data-match="${m.id}">
              ${extraKeys.map(key => {
                const s = activeSlip.some(x => x.matchId === m.id && x.market === key) ? 'selected' : '';
                return `
                  <div class="odd-item-extra ${s}" onclick="toggleSelection(${m.id}, '${key}')" data-match="${m.id}" data-type="${key}">

                    <span class="val">${m.extra[key]}</span>

                `;
              }).join('')}

        let fastActionHtml = (isLive && m.expressMomentAvailable) ? `
          <button class="express-moment-trigger" onclick="initiateExpressMoment(${m.id})">

          </button>
        ` : '';

        card.innerHTML = headerHtml + gridHtml + tickerHtml + oddsHtml + extraHtml + fastActionHtml;
        container.appendChild(card);
      });

      document.querySelectorAll('.extra-toggle-btn').forEach(btn => {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          const matchId = parseInt(this.dataset.match);
          const grid = document.querySelector(`.extra-odds-grid[data-match="${matchId}"]`);
          if (grid) {
            grid.classList.toggle('open');
            this.classList.toggle('active');
            this.textContent = grid.classList.contains('open') ? 'Скрыть доп. рынки ▲' : 'Показать доп. рынки ▼';
          }

    function renderCoupon() {
      const list = document.getElementById('couponList');
      const empty = document.getElementById('couponEmptyState');
      const summary = document.getElementById('couponSummaryBlock');
      list.innerHTML = '';
      if (activeSlip.length === 0) {
        empty.style.display = 'block';
        summary.style.display = 'none';
        return;
      }
      empty.style.display = 'none';
      summary.style.display = 'flex';
      activeSlip.forEach((item, index) => {
        let card = document.createElement('div');
        card.className = 'coupon-card';
        card.innerHTML = `
          <div class="coupon-header">
            <span class="title">${item.teams}</span>
            <button class="remove" onclick="removeCouponItem(${index})">✕</button>
          </div>
          <div class="coupon-body">
            <span>Исход: <span class="bet-spec">${item.market.toUpperCase()}</span></span>
            <span class="bet-odds">кэф ${item.odds.toFixed(2)}</span>
          </div>
        `;
        list.appendChild(card);
      });
      let totalOdds = activeSlip.reduce((acc, x) => acc * x.odds, 1);
      document.getElementById('couponBetType').innerText = activeSlip.length > 1 ? 'Экспресс' : 'Ординар';
      document.getElementById('couponTotalOdds').innerText = totalOdds.toFixed(2);
      const input = document.getElementById('couponStakeInput');
      const win = document.getElementById('couponPossibleWin');
      const calculateWin = () => {
        let val = parseInt(input.value) || 0;
        win.innerText = Math.floor(val * totalOdds).toLocaleString() + ' ₽';
        document.getElementById('couponSubmitBtn').disabled = val <= 0 || val > balance;
      };
      input.oninput = calculateWin;
      calculateWin();
    }

    function setStake(v) { document.getElementById('couponStakeInput').value = v; renderCoupon(); }
    function removeCouponItem(idx) { activeSlip.splice(idx, 1); updateSlipUi(); renderCoupon(); renderMatches(); }

    function executePlacement() {
      const stake = parseInt(document.getElementById('couponStakeInput').value) || 0;
      if (stake <= 0 || stake > balance) return;
      if (!confirm(`Подтвердить ставку на ${stake} ₽ с коэффициентом ${document.getElementById('couponTotalOdds').innerText}?`)) return;

      balance -= stake;
      let totalOdds = activeSlip.reduce((acc, x) => acc * x.odds, 1);
      let record = {
        id: Date.now().toString().slice(-6),
        type: activeSlip.length > 1 ? 'Экспресс' : 'Ординар',
        description: activeSlip.map(x => `${x.teams} (${x.market.toUpperCase()})`).join('; '),
        odds: totalOdds,
        stake: stake,
        status: 'pending',
        items: [...activeSlip]
      };
      betHistory.unshift(record);
      activeSlip = [];
      saveState();
      updateSlipUi();
      switchTab('bets');
      alert(`✅ Ставка принята!\nСумма: ${stake} ₽\nКоэффициент: ${totalOdds.toFixed(2)}`);
    }

    function renderHistory() {
      const list = document.getElementById('historyList');
      const empty = document.getElementById('historyEmptyState');
      list.innerHTML = '';
      if (betHistory.length === 0) {
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';
      betHistory.forEach(b => {
        let card = document.createElement('div');
        card.className = 'history-card';
        let statusClass = b.status === 'win' ? 'win' : (b.status === 'lose' ? 'lose' : 'pending');
        let statusText = b.status === 'win' ? 'Выигрыш' : (b.status === 'lose' ? 'Проигрыш' : 'В игре');
        card.innerHTML = `
          <div class="history-top">
            <span>ID: #${b.id} — ${b.type}</span>
            <span class="status-badge ${statusClass}">${statusText}</span>
          </div>
          <div class="history-mid">${b.description}</div>
          <div class="history-bot">
            <span>Ставка: ${b.stake} ₽</span>
            <span style="font-weight:900; color:#FFD54A;">Кэф ${b.odds.toFixed(2)}</span>
          </div>
        `;
        list.appendChild(card);
      });
    }

    function settleBetsForMatch(m) {
      let changed = false;
      betHistory.forEach(b => {
        if (b.status !== 'pending') return;
        let matchItems = b.items.filter(x => x.matchId === m.id);
        if (matchItems.length === 0) return;
        matchItems.forEach(item => {
          let win = false;
          if (item.market === 'w1' && m.homeScore > m.awayScore) win = true;
          if (item.market === 'x' && m.homeScore === m.awayScore) win = true;
          if (item.market === 'w2' && m.homeScore < m.awayScore) win = true;
          if (item.market === 'tb' && (m.homeScore + m.awayScore) > 2.5) win = true;
          if (item.market === 'tm' && (m.homeScore + m.awayScore) < 2.5) win = true;
          if (item.market === 'Обе забьют (Да)' && m.homeScore > 0 && m.awayScore > 0) win = true;
          if (item.market === 'Обе забьют (Нет)' && (m.homeScore === 0 || m.awayScore === 0)) win = true;
          if (item.market === 'Угловые > 9.5') {
            const corners = Math.floor(Math.random() * 15);
            if (corners > 9.5) win = true;
          }
          if (item.market === 'Угловые < 9.5') {
            const corners = Math.floor(Math.random() * 15);
            if (corners < 9.5) win = true;
          }
          item.settledStatus = win ? 'win' : 'lose';
        });
        let totalPending = b.items.filter(x => !x.settledStatus);
        if (totalPending.length === 0) {
          let hasLoss = b.items.some(x => x.settledStatus === 'lose');
          b.status = hasLoss ? 'lose' : 'win';
          if (!hasLoss) balance += Math.floor(b.stake * b.odds);
          changed = true;
        }
      });
      if (changed) saveState();
    }

    // =========================================================================
    // 5. ЭКСПРЕСС-МОМЕНТЫ (2D Canvas анимация) — ПОЛНАЯ ВЕРСИЯ
    // =========================================================================
    let canvasCtx = null;
    let animFrameId = null;
    let canvasWidth = 0, canvasHeight = 0;
    let ball = { x: 0, y: 0, z: 0, vx: 0, vy: 0, vz: 0, radius: 6, angle: 0, spin: 0 };
    let players = [];
    let particles = [];
    let sceneTimer = 0;
    let sceneState = 'intro';
    let activeMomentConfig = null;
    let selectedMomentOutcomeIdx = -1;
    let targetMomentMatchId = null;
    let momentResultResolved = false;

    const MOMENT_MARKETS = {
      penalty: {
        title: '🔥 ЭКСПРЕСС ПЕНАЛЬТИ',
        opts: [
          { l: 'Забьет', o: 1.45 },
          { l: 'Сейв Кипера', o: 3.20 },
          { l: 'Штанга/Мимо', o: 5.40 },
          { l: 'Гол в перекладину', o: 6.00 }
        ]
      },
      freekick: {
        title: '🔥 ОПАСНЫЙ ШТРАФНОЙ',
        opts: [
          { l: 'Прямой гол', o: 4.50 },
          { l: 'Стенка', o: 1.25 },
          { l: 'Выбьют на угловой', o: 2.10 },
          { l: 'Стенка выбивает на угловой', o: 2.30 }
        ]
      },
      corner: {
        title: '🔥 УГЛОВОЙ УДАР',
        opts: [
          { l: 'Гол головой', o: 5.50 },
          { l: 'Вынос защитой', o: 1.18 },
          { l: 'Контратака', o: 3.40 },
          { l: 'Гол после рикошета', o: 7.00 }
        ]
      },
      tackle: {
        title: '🔥 ЖЕСТКИЙ ПОДКАТ',
        opts: [
          { l: 'Фол + Карточка', o: 2.20 },
          { l: 'Чистый отбор', o: 1.60 },
          { l: 'Травма/Красная', o: 9.00 },
          { l: 'Жёлтая + пенальти', o: 4.50 }
        ]
      }
    };

    function initiateExpressMoment(matchId) {
      Sound.init();
      const m = matches.find(x => x.id === matchId);
      if (!m || !m.expressMomentAvailable) return;
      targetMomentMatchId = matchId;
      activeMomentConfig = MOMENT_MARKETS[m.expressMomentType];
      document.getElementById('momentTitle').innerText = activeMomentConfig.title;
      const grid = document.getElementById('momentOptionsGrid');
      grid.innerHTML = '';
      selectedMomentOutcomeIdx = -1;
      document.getElementById('momentSubmitBtn').disabled = false;
      document.getElementById('momentBetUi').style.display = 'flex';
      activeMomentConfig.opts.forEach((o, i) => {
        let btn = document.createElement('div');
        btn.className = 'moment-opt-btn';
        btn.innerHTML = `<span class="l">${o.l}</span><span class="v">${o.o}</span>`;
        btn.onclick = () => {
          document.querySelectorAll('.moment-opt-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          selectedMomentOutcomeIdx = i;
        };
        grid.appendChild(btn);
      });
      momentResultResolved = false;
      document.getElementById('momentModal').classList.add('show');
      Sound.setAmbientVolume(0.12, 0.2);
      const canvas = document.getElementById('momentCanvas');
      const box = canvas.parentElement.getBoundingClientRect();
      canvas.width = box.width;
      canvas.height = box.width * (9/16);
      canvasWidth = canvas.width;
      canvasHeight = canvas.height;
      canvasCtx = canvas.getContext('2d');
      resetPhysicsState(m.expressMomentType);
      if (animFrameId) cancelAnimationFrame(animFrameId);
      animFrameId = requestAnimationFrame(runCanvasPhysicsLoop);
    }

    function terminateMoment() {
      document.getElementById('momentModal').classList.remove('show');
      if (animFrameId) cancelAnimationFrame(animFrameId);
      Sound.setAmbientVolume(0.02, 0.4);
      const overlay = document.getElementById('physicsResultOverlay');
      if (overlay) overlay.remove();
    }

    function resetPhysicsState(type) {
      sceneTimer = 0;
      sceneState = 'intro';
      particles = [];
      ball.z = 0; ball.vx = 0; ball.vy = 0; ball.vz = 0; ball.spin = 0;
      if (type === 'penalty') {
        ball.x = canvasWidth * 0.5; ball.y = canvasHeight * 0.75;
        players = [
          { type: 'battering', x: canvasWidth * 0.48, y: canvasHeight * 0.84, anim: 0, color: '#1882ff' },
          { type: 'keeper', x: canvasWidth * 0.5, y: canvasHeight * 0.22, anim: 0, color: '#ffcc00', targetX: canvasWidth*0.5, targetY: canvasHeight*0.22 }
        ];
      } else if (type === 'freekick') {
        ball.x = canvasWidth * 0.35; ball.y = canvasHeight * 0.7;
        players = [
          { type: 'battering', x: canvasWidth * 0.32, y: canvasHeight * 0.76, anim: 0, color: '#1882ff' },
          { type: 'keeper', x: canvasWidth * 0.5, y: canvasHeight * 0.22, anim: 0, color: '#ffcc00', targetX: canvasWidth*0.5 },
          { type: 'wall', x: canvasWidth * 0.44, y: canvasHeight * 0.45, anim: 0, color: '#ffffff' },
          { type: 'wall', x: canvasWidth * 0.47, y: canvasHeight * 0.45, anim: 0, color: '#ffffff' },
          { type: 'wall', x: canvasWidth * 0.50, y: canvasHeight * 0.45, anim: 0, color: '#ffffff' },
          { type: 'wall', x: canvasWidth * 0.53, y: canvasHeight * 0.45, anim: 0, color: '#ffffff' }
        ];
      } else if (type === 'corner') {
        ball.x = canvasWidth * 0.08; ball.y = canvasHeight * 0.85;
        players = [
          { type: 'battering', x: canvasWidth * 0.05, y: canvasHeight * 0.88, anim: 0, color: '#1882ff' },
          { type: 'keeper', x: canvasWidth * 0.5, y: canvasHeight * 0.22, anim: 0, color: '#ffcc00' },
          { type: 'attacker_head', x: canvasWidth * 0.52, y: canvasHeight * 0.45, anim: 0, color: '#1882ff' },
          { type: 'defender_box', x: canvasWidth * 0.49, y: canvasHeight * 0.42, anim: 0, color: '#ffffff' }
        ];
      } else if (type === 'tackle') {
        ball.x = canvasWidth * 0.3; ball.y = canvasHeight * 0.5;
        players = [
          { type: 'dribbler', x: canvasWidth * 0.25, y: canvasHeight * 0.5, anim: 0, color: '#1882ff', state: 'run' },
          { type: 'tackler', x: canvasWidth * 0.6, y: canvasHeight * 0.45, anim: 0, color: '#ffffff', state: 'charge' },
          { type: 'referee', x: canvasWidth * 0.5, y: canvasHeight * 0.8, anim: 0, color: '#black' }
        ];
      }
    }

    function createDust(x, y, num = 8, color = 'rgba(255,255,255,0.4)') {
      for (let i = 0; i < num; i++) {
        particles.push({ x, y, vx: (Math.random() * 4 - 2), vy: (Math.random() * -3 - 1), alpha: 1, size: Math.random() * 3 + 1, color });
      }
    }

    function placeMomentBet() {
      if (selectedMomentOutcomeIdx === -1) return;
      const stake = parseInt(document.getElementById('momentStakeInput').value) || 0;
      if (stake <= 0 || stake > balance) return;
      balance -= stake;
      saveState();
      document.getElementById('momentBetUi').style.display = 'none';
      sceneState = 'action';
      sceneTimer = 0;
      momentResultResolved = false;
      const marketType = matches.find(x => x.id === targetMomentMatchId).expressMomentType;
      triggerPhysicsStrike(marketType, selectedMomentOutcomeIdx, stake);
    }

    function triggerPhysicsStrike(type, choiceIdx, stake) {
      Sound.playWhistleShort();
      if (type === 'penalty') {
        let batter = players.find(x => x.type === 'battering');
        let keeper = players.find(x => x.type === 'keeper');
        batter.anim = 1;
        setTimeout(() => {
          Sound.playKick();
          createDust(ball.x, ball.y);
          if (choiceIdx === 0) {
            ball.vx = (Math.random() * 4 - 2); ball.vy = -12; ball.vz = 5;
            keeper.targetX = canvasWidth * (Math.random() < 0.5 ? 0.38 : 0.62);
            keeper.targetY = canvasHeight * 0.25;
          } else if (choiceIdx === 1) {
            let targetSide = Math.random() < 0.5 ? 0.43 : 0.57;
            ball.vx = (targetSide - 0.5) * 15; ball.vy = -11; ball.vz = 3;
            keeper.targetX = canvasWidth * targetSide;
            keeper.targetY = canvasHeight * 0.23;
          } else if (choiceIdx === 2) {
            ball.vx = (Math.random() < 0.5 ? -6 : 6); ball.vy = -12; ball.vz = 6;
            keeper.targetX = canvasWidth * (ball.vx > 0 ? 0.55 : 0.45);
          } else if (choiceIdx === 3) {
            ball.vx = (Math.random() < 0.5 ? -2 : 2); ball.vy = -14; ball.vz = 4;
            keeper.targetX = canvasWidth * 0.5;
          }
        }, 600);
      } else if (type === 'freekick') {
        setTimeout(() => {
          Sound.playKick();
          createDust(ball.x, ball.y);
          players.filter(x => x.type === 'wall').forEach(p => p.anim = -20);
          if (choiceIdx === 0) {
            ball.vx = 4.2; ball.vy = -9.5; ball.vz = 8; ball.spin = -0.15;
          } else if (choiceIdx === 1) {
            ball.vx = 2.0; ball.vy = -6; ball.vz = 3;
          } else if (choiceIdx === 2) {
            ball.vx = 5.5; ball.vy = -10; ball.vz = 4;
          } else if (choiceIdx === 3) {
            ball.vx = 3.8; ball.vy = -7; ball.vz = 5;
          }
        }, 500);
      } else if (type === 'corner') {
        setTimeout(() => {
          Sound.playKick();
          ball.vx = 8; ball.vy = -8; ball.vz = 12;
        }, 400);
      } else if (type === 'tackle') {
        sceneState = 'action';
      }
    }

    function runCanvasPhysicsLoop() {
      updatePhysicsWorld();
      drawCanvasWorld();
      animFrameId = requestAnimationFrame(runCanvasPhysicsLoop);
    }

    function updatePhysicsWorld() {
      sceneTimer++;
      const m = matches.find(x => x.id === targetMomentMatchId);
      if (!m) return;
      const type = m.expressMomentType;

      particles.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        p.alpha -= 0.02;
        if (p.alpha < 0) p.alpha = 0;
      });
      particles = particles.filter(p => p.alpha > 0);

      if (sceneState === 'intro') {
        players.forEach(p => {
          if (p.type === 'keeper') p.x += Math.sin(sceneTimer*0.1)*0.5;
        });
        return;
      }

      if (sceneState === 'action' && !momentResultResolved) {
        if (type === 'penalty') {
          let batter = players.find(x => x.type === 'battering');
          let keeper = players.find(x => x.type === 'keeper');
          if (batter.anim === 1) {
            batter.x += (ball.x - batter.x) * 0.15;
            batter.y += (ball.y - 10 - batter.y) * 0.15;
          }
          if (ball.vy !== 0) {
            ball.x += ball.vx; ball.y += ball.vy;
            ball.z += ball.vz; ball.vz -= 0.25;
            if (ball.z < 0) { ball.z = 0; ball.vz *= -0.4; }
            keeper.x += (keeper.targetX - keeper.x) * 0.12;
            keeper.y += (keeper.targetY - keeper.y) * 0.12;
            if (ball.y <= canvasHeight * 0.24) {
              let distToKeeper = Math.hypot(ball.x - keeper.x, ball.y - keeper.y);
              if (distToKeeper < 25 && selectedMomentOutcomeIdx === 1) {
                ball.vx = (Math.random() * 6 - 3); ball.vy = 5; ball.vz = 2;
                Sound.playKick();
                resolveMomentMatchResult(false, 'Сейв Вратаря!', type);
              } else if (ball.x >= canvasWidth*0.38 && ball.x <= canvasWidth*0.62 && ball.z <= 40) {
                if (selectedMomentOutcomeIdx === 0 || selectedMomentOutcomeIdx === 3) {
                  Sound.playGoalAnimation();
                  resolveMomentMatchResult(true, selectedMomentOutcomeIdx === 3 ? 'ГОЛ В ПЕРЕКЛАДИНУ!' : 'ГОЛ!!!', type);
                } else if (selectedMomentOutcomeIdx === 2) {
                  ball.vx = ball.x < canvasWidth*0.5 ? -4 : 4; ball.vy = 6;
                  Sound.playPostRing();
                  resolveMomentMatchResult(false, 'ШТАНГА!', type);
                }
              } else {
                resolveMomentMatchResult(false, 'Мимо ворот!', type);
              }
            }
          }
        } else if (type === 'freekick') {
          let keeper = players.find(x => x.type === 'keeper');
          players.filter(x => x.type === 'wall').forEach(p => {
            if (p.anim < 0) p.anim += 1;
          });
          if (ball.vy !== 0) {
            ball.x += ball.vx + ball.spin * 2; ball.y += ball.vy;
            ball.z += ball.vz; ball.vz -= 0.28;
            if (ball.z < 0) { ball.z = 0; ball.vz *= -0.3; }
            ball.spin *= 0.95;
            players.filter(x => x.type === 'wall').forEach(w => {
              if (Math.hypot(ball.x - w.x, ball.y - (w.y + w.anim)) < 15 && ball.z < 25) {
                if (selectedMomentOutcomeIdx === 1 || selectedMomentOutcomeIdx === 3) {
                  ball.vx = -2; ball.vy = 4; ball.vz = 1;
                  if (selectedMomentOutcomeIdx === 3) {
                    resolveMomentMatchResult(false, 'Стенка выбивает на угловой!', type);
                  } else {
                    resolveMomentMatchResult(false, 'Мяч попал в стенку!', type);
                  }
                }
              }
            });
            if (ball.y < canvasHeight * 0.45) {
              keeper.x += (ball.x - keeper.x) * 0.08;
            }
            if (ball.y <= canvasHeight * 0.24 && !momentResultResolved) {
              if (ball.x >= canvasWidth*0.38 && ball.x <= canvasWidth*0.62 && ball.z <= 40) {
                if (selectedMomentOutcomeIdx === 0) {
                  Sound.playGoalAnimation();
                  resolveMomentMatchResult(true, 'Шедевральный Гол!', type);
                } else if (selectedMomentOutcomeIdx === 2) {
                  ball.vx = 8; ball.vy = -2;
                  resolveMomentMatchResult(false, 'Вратарь перевел на угловой!', type);
                }
              } else {
                resolveMomentMatchResult(false, 'Выше ворот!', type);
              }
            }
          }
        } else if (type === 'corner') {
          let att = players.find(x => x.type === 'attacker_head');
          let def = players.find(x => x.type === 'defender_box');
          let keeper = players.find(x => x.type === 'keeper');
          if (ball.vy !== 0) {
            ball.x += ball.vx; ball.y += ball.vy;
            ball.z += ball.vz; ball.vz -= 0.22;
            att.x += (canvasWidth*0.48 - att.x)*0.03; att.y += (canvasHeight*0.38 - att.y)*0.03;
            def.x += (canvasWidth*0.46 - def.x)*0.03; def.y += (canvasHeight*0.36 - def.y)*0.03;
            if (ball.y <= canvasHeight * 0.45 && ball.vy < 0) {
              if (selectedMomentOutcomeIdx === 0) {
                createDust(att.x, att.y, 12);
                Sound.playKick();
                ball.vx = (canvasWidth*0.5 - att.x)*0.2; ball.vy = -10; ball.vz = 4;
                selectedMomentOutcomeIdx = 99;
              } else if (selectedMomentOutcomeIdx === 1) {
                createDust(def.x, def.y, 10);
                Sound.playKick();
                ball.vx = -8; ball.vy = 8; ball.vz = 6;
                resolveMomentMatchResult(false, 'Защитник выбил мяч из штрафной!', type);
              } else if (selectedMomentOutcomeIdx === 2) {
                createDust(def.x, def.y, 5);
                ball.vx = 12; ball.vy = 9; ball.vz = 2;
                resolveMomentMatchResult(false, 'Перехват и быстрая контратака!', type);
              } else if (selectedMomentOutcomeIdx === 3) {
                createDust(def.x, def.y, 15);
                Sound.playKick();
                ball.vx = (canvasWidth*0.5 - def.x)*0.3; ball.vy = -12; ball.vz = 3;
                selectedMomentOutcomeIdx = 99;
              }
            }
          }
          if (selectedMomentOutcomeIdx === 99 && ball.y <= canvasHeight * 0.24) {
            Sound.playGoalAnimation();
            resolveMomentMatchResult(true, 'Точный удар головой! ГОЛ!', type);
          }
        } else if (type === 'tackle') {
          let dribbler = players.find(x => x.type === 'dribbler');
          let tackler = players.find(x => x.type === 'tackler');
          let ref = players.find(x => x.type === 'referee');
          dribbler.x += 1.5; ball.x = dribbler.x + 8;
          tackler.x -= 3.5;
          if (Math.hypot(dribbler.x - tackler.x, dribbler.y - tackler.y) < 30) {
            createDust(dribbler.x, dribbler.y, 15);
            if (selectedMomentOutcomeIdx === 0 || selectedMomentOutcomeIdx === 2 || selectedMomentOutcomeIdx === 3) {
              dribbler.anim = -25;
              tackler.anim = 15;
              ball.vx = 2; ball.vy = -2;
              sceneState = 'cards';
              sceneTimer = 0;
            } else {
              tackler.color = '#3ddc84';
              ball.vx = -5; ball.vy = 3;
              resolveMomentMatchResult(false, 'Чистейший отбор мяча в подкате!', type);
            }
          }
        }
      }

      if (sceneState === 'cards' && !momentResultResolved) {
        let ref = players.find(x => x.type === 'referee');
        let dribbler = players.find(x => x.type === 'dribbler');
        ref.x += (dribbler.x - ref.x) * 0.05;
        ref.y += (dribbler.y + 40 - ref.y) * 0.05;
        if (sceneTimer > 40) {
          Sound.playWhistle(true);
          const isRed = (selectedMomentOutcomeIdx === 2);
          const isYellowPenalty = (selectedMomentOutcomeIdx === 3);
          let msg = isRed ? 'ГРУБЕЙШИЙ ФОЛ! КРАСНАЯ КАРТОЧКА!' :
                    isYellowPenalty ? 'ФОЛ! ЖЕЛТАЯ КАРТОЧКА И ПЕНАЛЬТИ!' : 'ФОЛ! ЖЕЛТАЯ КАРТОЧКА!';
          if (isYellowPenalty) {
            const m2 = matches.find(x => x.id === targetMomentMatchId);
            if (m2) m2.homeScore++;
          }
          resolveMomentMatchResult(true, msg, type);
        }
      }
    }

    function resolveMomentMatchResult(isWin, textStatus, type) {
      if (momentResultResolved) return;
      momentResultResolved = true;
      sceneState = 'result';
      ball.vx = 0; ball.vy = 0; ball.vz = 0;
      const m = matches.find(x => x.id === targetMomentMatchId);
      const currentStake = parseInt(document.getElementById('momentStakeInput').value) || 0;
      
      let resText = document.createElement('div');
      resText.id = 'physicsResultOverlay';
      resText.style.cssText = `
        position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: rgba(0,0,0,0.85); font-family: 'Montserrat', sans-serif; text-align: center; z-index: 10;
      `;
      let winAmount = Math.floor(currentStake * activeMomentConfig.opts[selectedMomentOutcomeIdx].o);
      if (isWin) {
        balance += winAmount;
        resText.innerHTML = `
          <h2 style="color:#3DDC84; font-size:28px; font-weight:900; margin-bottom:10px;">✅ СТАВКА ВЫИГРАЛА</h2>
          <p style="color:#fff; font-size:14px; margin-bottom:15px;">${textStatus}</p>
          <h3 style="color:#FFD54A; font-size:22px;">+ ${winAmount.toLocaleString()} ₽</h3>
        `;
        if (textStatus.includes('ГОЛ')) {
          m.homeScore++;
        }
      } else {
        resText.innerHTML = `
          <h2 style="color:#f03043; font-size:28px; font-weight:900; margin-bottom:10px;">❌ ПРОИГРЫШ</h2>
          <p style="color:#fff; font-size:14px; margin-bottom:15px;">${textStatus}</p>
          <h3 style="color:rgba(255,255,255,0.4); font-size:18px;">-${currentStake} ₽</h3>
        `;
      }
      canvasCtx.canvas.parentElement.appendChild(resText);
      
      betHistory.unshift({
        id: Date.now().toString().slice(-6),
        type: '⚡ Момент',
        description: `Блиц-пари: ${m.home.name}-${m.away.name} [${activeMomentConfig.opts[selectedMomentOutcomeIdx].l}]`,
        odds: activeMomentConfig.opts[selectedMomentOutcomeIdx].o,
        stake: currentStake,
        status: isWin ? 'win' : 'lose',
        items: []
      });
      m.expressMomentAvailable = false;
      saveState();
      calculateOdds(m);
      renderMatches();
    }

    Sound.playGoalAnimation = function() {
      Sound.playPostRing();
      setTimeout(() => Sound.playWhistle(), 150);
      for(let i=0; i<35; i++){
        particles.push({
          x: canvasWidth*0.5 + (Math.random()*60 - 30),
          y: canvasHeight*0.22,
          vx: Math.random()*6 - 3, vy: Math.random()*-4 - 2,
          alpha: 1, size: Math.random()*4 + 2,
          color: `hsl(${Math.random()*360}, 100%, 60%)`
        });
      }
    };

    function drawCanvasWorld() {
      if (!canvasCtx) return;
      for (let i = 0; i < 10; i++) {
        canvasCtx.fillStyle = i % 2 === 0 ? '#245c31' : '#1e5128';
        canvasCtx.fillRect(0, (canvasHeight / 10) * i, canvasWidth, canvasHeight / 10);
      }
      canvasCtx.strokeStyle = 'rgba(255,255,255,0.15)';
      canvasCtx.lineWidth = 3;
      canvasCtx.strokeRect(canvasWidth*0.3, canvasHeight*0.22, canvasWidth*0.4, canvasHeight*0.3);
      canvasCtx.strokeRect(canvasWidth*0.4, canvasHeight*0.22, canvasWidth*0.2, canvasHeight*0.1);
      canvasCtx.fillStyle = 'rgba(0,0,0,0.3)';
      canvasCtx.fillRect(canvasWidth*0.38, canvasHeight*0.1, canvasWidth*0.24, canvasHeight*0.12);
      canvasCtx.strokeStyle = 'rgba(255,255,255,0.25)';
      canvasCtx.lineWidth = 1;
      for (let x = canvasWidth*0.38; x <= canvasWidth*0.62; x += 6) {
        canvasCtx.beginPath(); canvasCtx.moveTo(x, canvasHeight*0.1); canvasCtx.lineTo(x, canvasHeight*0.22); canvasCtx.stroke();
      }
      for (let y = canvasHeight*0.1; y <= canvasHeight*0.22; y += 6) {
        canvasCtx.beginPath(); canvasCtx.moveTo(canvasWidth*0.38, y); canvasCtx.lineTo(canvasWidth*0.62, y); canvasCtx.stroke();
      }
      canvasCtx.strokeStyle = '#ffffff';
      canvasCtx.lineWidth = 5;
      canvasCtx.lineCap = 'square';
      canvasCtx.beginPath();
      canvasCtx.moveTo(canvasWidth*0.38, canvasHeight*0.22);
      canvasCtx.lineTo(canvasWidth*0.38, canvasHeight*0.1);
      canvasCtx.lineTo(canvasWidth*0.62, canvasHeight*0.1);
      canvasCtx.lineTo(canvasWidth*0.62, canvasHeight*0.22);
      canvasCtx.stroke();

      canvasCtx.fillStyle = 'rgba(0, 0, 0, 0.25)';
      canvasCtx.beginPath();
      canvasCtx.arc(ball.x, ball.y, Math.max(2, ball.radius - ball.z*0.1), 0, Math.PI*2);
      canvasCtx.fill();

      players.forEach(p => {
        let pY = p.y;
        if (p.anim && p.type !== 'keeper' && p.type !== 'battering') pY += p.anim;
        canvasCtx.fillStyle = 'rgba(0, 0, 0, 0.3)';
        canvasCtx.beginPath(); canvasCtx.arc(p.x, p.y + 2, 10, 0, Math.PI*2); canvasCtx.fill();
        canvasCtx.fillStyle = p.color;
        canvasCtx.beginPath(); canvasCtx.arc(p.x, pY - 14, 7, 0, Math.PI*2); canvasCtx.fill();
        canvasCtx.fillRect(p.x - 5, pY - 8, 10, 12);
        canvasCtx.fillStyle = '#111';
        canvasCtx.fillRect(p.x - 4, pY + 4, 3, 6);
        canvasCtx.fillRect(p.x + 1, pY + 4, 3, 6);
      });

      let renderBallY = ball.y - ball.z;
      canvasCtx.fillStyle = '#ffffff';
      canvasCtx.beginPath();
      canvasCtx.arc(ball.x, renderBallY, ball.radius, 0, Math.PI*2);
      canvasCtx.fill();
      canvasCtx.strokeStyle = '#000000';
      canvasCtx.lineWidth = 1;
      canvasCtx.beginPath();
      canvasCtx.arc(ball.x, renderBallY, ball.radius, sceneTimer*0.05, Math.PI + sceneTimer*0.05);
      canvasCtx.stroke();

      particles.forEach(p => {
        canvasCtx.fillStyle = p.color;
        canvasCtx.globalAlpha = p.alpha;
        canvasCtx.beginPath();
        canvasCtx.arc(p.x, p.y, p.size, 0, Math.PI*2);
        canvasCtx.fill();
      });
      canvasCtx.globalAlpha = 1;
    }

    // =========================================================================
    // 6. ЗАПУСК
    // =========================================================================
    window.addEventListener('DOMContentLoaded', () => {
      if (window.Telegram && window.Telegram.WebApp) {
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        if(tg.setHeaderColor) tg.setHeaderColor('#0c121e');
      }
      document.addEventListener('click', () => Sound.init(), { once: true });
      document.addEventListener('touchstart', () => Sound.init(), { once: true });

      document.getElementById('momentModal').addEventListener('click', (e) => {
        if(e.target.id === 'momentModal') terminateMoment();
      });
      initMatchEngine();
      renderMatches();
      saveState();
      document.addEventListener('click', (e) => {
        if (e.target.id === 'physicsResultOverlay') {
          e.target.remove();
          terminateMoment();
        }
      });
    });
  </script>
</body>
