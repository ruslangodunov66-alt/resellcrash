<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Рефералы | Resell Tycoon</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: radial-gradient(circle at 30% 10%, #0c1120, #020408); color: #ddd; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .glass-card { background: rgba(20,30,45,0.7); backdrop-filter: blur(12px); border-radius: 48px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(0,255,255,0.3); }
        h2 { font-size: 28px; background: linear-gradient(135deg, #ffcc44, #ff6644); background-clip: text; -webkit-background-clip: text; color: transparent; margin-bottom: 15px; }
        .referral-link { background: #1e2a3a; padding: 12px; border-radius: 40px; word-break: break-all; margin: 15px 0; text-align: center; }
        .copy-btn { background: #f39c12; margin-top: 8px; }
        .invited-list { margin-top: 20px; }
        .invited-item { background: rgba(0,0,0,0.5); border-radius: 32px; padding: 8px 16px; margin-bottom: 8px; }
        button { background: #2ecc71; border: none; padding: 8px 18px; border-radius: 40px; font-weight: bold; cursor: pointer; }
        .back-btn { background: #555; width: 100%; margin-top: 15px; }
    </style>
</head>
<body>
<div class="container">
    <div class="glass-card">
        <h2>🔗 РЕФЕРАЛЫ</h2>
        <div>Ваша реферальная ссылка:</div>
        <div class="referral-link" id="refLink">Загрузка...</div>
        <button class="copy-btn" onclick="copyLink()">📋 Скопировать</button>
        <div class="invited-list">
            <h3>👥 Приглашённые друзья</h3>
            <div id="invitedList">Загрузка...</div>
        </div>
        <button onclick="claimBonus()">💰 Забрать бонус (10 000₽ за друга)</button>
    </div>
    <button class="back-btn" onclick="window.location.href='index.html'">🔙 На главную</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    const API_BASE = "https://nl12.bothost.ru";
    const USE_REAL_API = false;
    const userId = tg.initDataUnsafe?.user?.id || 1475910449;

    let invited = [];
    let refLink = `https://t.me/buygame61_bot?start=ref_${userId}`;

    const mockInvited = ["Игрок123", "Барыга2000"];

    async function fetchAPI(endpoint) {
        if (!USE_REAL_API) return null;
        try {
            const resp = await fetch(`${API_BASE}${endpoint}&tg_id=${userId}`);
            if (!resp.ok) throw new Error();
            return await resp.json();
        } catch(e) { return null; }
    }

    async function loadReferral() {
        document.getElementById('refLink').innerText = refLink;
        if (!USE_REAL_API) { invited = mockInvited; renderInvited(); return; }
        const data = await fetchAPI(`/api/referral`);
        invited = data?.invited || [];
        renderInvited();
    }

    async function claimBonus() {
        if (!USE_REAL_API) {
            tg.showAlert(`✅ (МОК) Бонус ${invited.length * 10000}₽ получен`);
            return;
        }
        const res = await fetch(`${API_BASE}/api/referral/claim?tg_id=${userId}`, { method: 'POST' });
        const data = await res.json();
        if (data.balance !== undefined) tg.showAlert(data.message);
        else tg.showAlert(`❌ ${data.message}`);
    }

    function copyLink() {
        navigator.clipboard.writeText(refLink);
        tg.showAlert("✅ Ссылка скопирована!");
    }

    function renderInvited() {
        const container = document.getElementById('invitedList');
        if (!invited.length) { container.innerHTML = "<div>Пока никого не пригласили</div>"; return; }
        let html = '';
        invited.forEach(name => {
            html += `<div class="invited-item">👤 ${name}</div>`;
        });
        container.innerHTML = html;
    }

    loadReferral();
</script>
</body>
</html>
