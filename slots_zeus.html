<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>ZEUS · PREMIUM SLOTS</title>
    <script src="https://telegram.org/js/telegram-web-app.js">
    </script>
    <style>
        /* ==============================================================
           ZEUS PREMIUM — CSS VARIABLES & DESIGN TOKENS
           ============================================================== */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800;900&family=Playfair+Display:wght@700;800;900&family=Nunito:wght@600;700;800;900&family=Montserrat:wght@700;800;900&display=swap');

        :root {
            --gold-primary: #FFD54A;
            --gold-dark: #C89B2C;
            --royal-blue: #123A73;
            --deep-navy: #07172D;
            --marble-white: #F4F0E6;
            --sky: #8FD3FF;
            --glow: #FFF1A8;
            --win-green: #3DDC84;
            --lose-red: #E85555;
            --scatter-cyan: #5CE1FF;
            --shadow-deep: rgba(0, 0, 0, 0.75);
            --gold-glow: rgba(255, 213, 74, 0.45);
            --marble-gradient: linear-gradient(145deg, #F8F4EA 0%, #E8E0D0 35%, #D4C8B0 70%, #F0EBE0 100%);
            --gold-gradient: linear-gradient(135deg, #FFF1A8 0%, #FFD54A 30%, #C89B2C 70%, #FFD54A 100%);
            --panel-glass: rgba(7, 23, 45, 0.82);
            --ease-premium: cubic-bezier(0.22, 1, 0.36, 1);
            --ease-bounce: cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --font-display: 'Cinzel', 'Playfair Display', serif;
            --font-ui: 'Nunito', 'Montserrat', sans-serif;
            --z-bg: 0;
            --z-particles: 2;
            --z-ui: 5;
            --z-overlay: 100;
            --z-bigwin: 180;
            --z-popup: 200;
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            -webkit-user-drag: none;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            background: #07172D;
            background-image: url('img/photo_2026-06-29_22-35-07.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: var(--font-ui);
            color: var(--marble-white);
            position: fixed;
            top: 0;
            left: 0;
        }

        /* ==============================================================
           APP-WRAPPER
           ============================================================== */
        #app {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: transparent;
            z-index: 3;
            overflow: hidden;
        }

        /* ==============================================================
           CANVAS ДЛЯ ЧАСТИЦ И МОЛНИЙ
           ============================================================== */
        #particleCanvas,
        #lightningCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
        }
        #particleCanvas {
            z-index: var(--z-particles);
        }
        #lightningCanvas {
            z-index: 98;
        }

        .flash-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(180deg, #fff 0%, var(--glow) 40%, var(--sky) 100%);
            opacity: 0;
            pointer-events: none;
            z-index: var(--z-overlay);
            transition: opacity 0.05s ease-out;
            mix-blend-mode: screen;
        }
        .flash-overlay.active {
            opacity: 0.55;
            transition: opacity 0.4s ease-out;
        }
        .lightning-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 99;
            opacity: 0;
            transition: opacity 0.04s;
        }
        .lightning-container.active {
            opacity: 1;
        }
        .lightning-svg {
            display: none;
        }

        /* Screen shake for big wins */
        #app.shake-light {
            animation: screenShakeLight 0.4s ease-out;
        }
        #app.shake-medium {
            animation: screenShakeMedium 0.55s ease-out;
        }
        #app.shake-heavy {
            animation: screenShakeHeavy 0.7s ease-out;
        }
        @keyframes screenShakeLight {
            0%,
            100% {
                transform: translate(0, 0);
            }
            20% {
                transform: translate(-3px, 2px);
            }
            40% {
                transform: translate(3px, -2px);
            }
            60% {
                transform: translate(-2px, -3px);
            }
            80% {
                transform: translate(2px, 3px);
            }
        }
        @keyframes screenShakeMedium {
            0%,
            100% {
                transform: translate(0, 0);
            }
            15% {
                transform: translate(-6px, 4px) rotate(-0.3deg);
            }
            30% {
                transform: translate(6px, -4px) rotate(0.3deg);
            }
            45% {
                transform: translate(-4px, -6px);
            }
            60% {
                transform: translate(5px, 3px);
            }
            75% {
                transform: translate(-3px, 5px);
            }
        }
        @keyframes screenShakeHeavy {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            10% {
                transform: translate(-10px, 6px) rotate(-0.5deg) scale(1.005);
            }
            25% {
                transform: translate(10px, -8px) rotate(0.5deg);
            }
            40% {
                transform: translate(-8px, -10px) rotate(-0.3deg);
            }
            55% {
                transform: translate(9px, 5px);
            }
            70% {
                transform: translate(-6px, 8px) rotate(0.3deg);
            }
            85% {
                transform: translate(4px, -4px);
            }
        }

        /* ==============================================================
           HEADER — LUXURY MARBLE PANEL
           ============================================================== */
        .header {
            position: relative;
            z-index: var(--z-ui);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background:
                linear-gradient(180deg, rgba(244, 240, 230, 0.08) 0%, transparent 40%),
                var(--panel-glass);
            border-bottom: 2px solid rgba(255, 213, 74, 0.35);
            box-shadow: 0 8px 40px var(--shadow-deep), inset 0 1px 0 rgba(255, 241, 168, 0.12);
            flex-shrink: 0;
            min-height: 80px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: backdrop-filter 0.3s ease, -webkit-backdrop-filter 0.3s ease;
        }
        .header::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 5%;
            right: 5%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold-primary), transparent);
            opacity: 0.6;
        }
        .btn-back {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(145deg, rgba(255, 213, 74, 0.12), rgba(7, 23, 45, 0.8));
            border: 2px solid rgba(255, 213, 74, 0.4);
            color: var(--gold-primary);
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.25s var(--ease-bounce);
            flex-shrink: 0;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 241, 168, 0.2);
        }
        .btn-back:hover {
            border-color: var(--gold-primary);
            box-shadow: 0 0 24px var(--gold-glow);
        }
        .btn-back:active {
            transform: scale(0.88);
            background: rgba(255, 213, 74, 0.2);
        }
        .brand {
            flex: 1;
            text-align: center;
            padding: 0 8px;
            min-width: 0;
        }
        .brand-title {
            font-family: var(--font-display);
            font-size: 30px;
            font-weight: 900;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 10px;
            display: inline-block;
            filter: drop-shadow(0 2px 8px rgba(255, 213, 74, 0.3));
            animation: titleShimmer 4s ease-in-out infinite;
            white-space: nowrap;
        }
        @keyframes titleShimmer {
            0%,
            100% {
                filter: drop-shadow(0 2px 8px rgba(255, 213, 74, 0.3));
            }
            50% {
                filter: drop-shadow(0 4px 20px rgba(255, 241, 168, 0.5));
            }
        }
        .brand-title::before,
        .brand-title::after {
            content: '⚡';
            font-size: 20px;
            -webkit-text-fill-color: var(--gold-primary);
            color: var(--gold-primary);
            opacity: 0.85;
            animation: boltPulse 2s ease-in-out infinite;
        }
        .brand-title::before {
            margin-right: 12px;
        }
        .brand-title::after {
            margin-left: 12px;
            animation-delay: 1s;
        }
        @keyframes boltPulse {
            0%,
            100% {
                opacity: 0.6;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.15);
                filter: drop-shadow(0 0 8px var(--glow));
            }
        }
        .brand-sub {
            font-size: 11px;
            font-weight: 800;
            color: rgba(244, 240, 230, 0.35);
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-top: 2px;
            white-space: nowrap;
        }
        .balance-box {
            background: linear-gradient(145deg, rgba(18, 58, 115, 0.6), rgba(7, 23, 45, 0.9));
            border: 2px solid rgba(255, 213, 74, 0.4);
            padding: 6px 16px;
            border-radius: 50px;
            text-align: right;
            box-shadow: inset 0 0 40px rgba(255, 213, 74, 0.06), 0 6px 30px rgba(0, 0, 0, 0.6);
            flex-shrink: 0;
            min-width: 120px;
            max-width: 160px;
            transition: all 0.35s var(--ease-bounce);
            position: relative;
            overflow: hidden;
        }
        .balance-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 241, 168, 0.15), transparent);
            animation: balanceShine 5s ease-in-out infinite;
        }
        @keyframes balanceShine {
            0%,
            100% {
                left: -100%;
            }
            50% {
                left: 150%;
            }
        }
        .balance-box.pop {
            animation: balancePop 0.55s var(--ease-bounce);
        }
        @keyframes balancePop {
            0% {
                transform: scale(1);
                box-shadow: inset 0 0 40px rgba(255, 213, 74, 0.06), 0 6px 30px rgba(0, 0, 0, 0.6);
            }
            40% {
                transform: scale(1.12);
                box-shadow: 0 0 60px var(--gold-glow), inset 0 0 50px rgba(255, 213, 74, 0.15);
                border-color: var(--gold-primary);
            }
            100% {
                transform: scale(1);
            }
        }
        .balance-label {
            font-size: 10px;
            color: var(--gold-primary);
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 3px;
            opacity: 0.55;
        }
        .balance-val {
            font-family: var(--font-display);
            font-size: clamp(20px, 4vw, 28px);
            font-weight: 900;
            color: var(--marble-white);
            transition: color 0.3s, transform 0.3s;
            letter-spacing: 1px;
            line-height: 1.15;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 150px;
        }
        .balance-val.added {
            color: var(--win-green);
            text-shadow: 0 0 30px rgba(61, 220, 132, 0.5);
            animation: balanceCountUp 0.5s var(--ease-bounce);
        }
        @keyframes balanceCountUp {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.08);
            }
            100% {
                transform: scale(1);
            }
        }

        /* ==============================================================
           STATUS BAR
           ============================================================== */
        .status-bar {
            position: relative;
            z-index: var(--z-ui);
            text-align: center;
            padding: 10px 16px;
            min-height: 48px;
            font-size: 18px;
            font-weight: 900;
            color: var(--gold-primary);
            text-shadow: 0 0 30px rgba(255, 213, 74, 0.2);
            text-transform: uppercase;
            letter-spacing: 3px;
            background: linear-gradient(180deg, rgba(18, 58, 115, 0.35), rgba(7, 23, 45, 0.5));
            border-bottom: 1px solid rgba(255, 213, 74, 0.1);
            flex-shrink: 0;
            transition: all 0.35s var(--ease-premium);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: backdrop-filter 0.3s ease, -webkit-backdrop-filter 0.3s ease;
        }
        .status-bar.bonus {
            color: var(--scatter-cyan);
            text-shadow: 0 0 40px rgba(92, 225, 255, 0.5);
            animation: bonusPulse 1s infinite alternate ease-in-out;
            background: linear-gradient(180deg, rgba(92, 225, 255, 0.08), rgba(7, 23, 45, 0.6));
        }
        @keyframes bonusPulse {
            0% {
                opacity: 0.85;
                letter-spacing: 3px;
            }
            100% {
                opacity: 1;
                letter-spacing: 6px;
            }
        }
        .status-bar.win {
            color: var(--win-green);
            text-shadow: 0 0 40px rgba(61, 220, 132, 0.4);
        }
        .status-bar.lose {
            color: var(--lose-red);
            text-shadow: 0 0 30px rgba(232, 85, 85, 0.3);
        }
        .status-bar .fs-badge {
            display: inline-block;
            background: rgba(255, 213, 74, 0.12);
            padding: 0 18px;
            border-radius: 40px;
            border: 1px solid rgba(255, 213, 74, 0.25);
            font-size: 14px;
            color: var(--gold-primary);
        }

        /* ==============================================================
           SLOT FRAME — MARBLE TEMPLE
           ============================================================== */
        .slot-wrapper {
            position: relative;
            z-index: var(--z-ui);
            flex: 1;
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px 14px;
            animation: slotFloat 8s ease-in-out infinite;
        }
        @keyframes slotFloat {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-3px);
            }
        }

        .col-left,
        .col-right {
            position: absolute;
            top: 4%;
            bottom: 4%;
            width: 36px;
            background:
                repeating-linear-gradient(180deg, #C8BCA0 0px, #C8BCA0 4px, #F4F0E6 4px, #F4F0E6 8px, #B8A888 8px, #B8A888 12px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.15), transparent 30%, transparent 70%, rgba(0, 0, 0, 0.15));
            border-radius: 6px 6px 4px 4px;
            box-shadow: 0 0 40px rgba(255, 213, 74, 0.08), inset -3px 0 12px rgba(0, 0, 0, 0.3), inset 3px 0 12px rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(200, 155, 44, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            padding: 16px 0;
            z-index: 2;
        }
        .col-left {
            left: 0;
            border-radius: 6px 2px 2px 6px;
        }
        .col-right {
            right: 0;
            border-radius: 2px 6px 6px 2px;
        }
        .col-left::after,
        .col-right::after {
            content: '';
            position: absolute;
            top: -8px;
            left: -4px;
            right: -4px;
            height: 12px;
            background: linear-gradient(180deg, #E8E0D0, #C8BCA0);
            border-radius: 4px 4px 0 0;
            border: 1px solid rgba(200, 155, 44, 0.4);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }
        .col-icon {
            font-size: 18px;
            filter: drop-shadow(0 0 8px var(--gold-glow));
            opacity: 0.7;
            animation: colIconGlow 3s ease-in-out infinite;
        }
        @keyframes colIconGlow {
            0%,
            100% {
                opacity: 0.5;
                transform: scale(1);
            }
            50% {
                opacity: 0.9;
                transform: scale(1.1);
            }
        }

        .meander-top,
        .meander-bottom {
            position: absolute;
            left: 32px;
            right: 32px;
            height: 14px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 14"><path d="M0,7 h8 v-7 h8 v7 h8 v-7 h8 v7 h8 v-7 h8 v7 h8 v-7 h8 v7" stroke="%23C89B2C" stroke-width="2" fill="none"/><path d="M0,7 h8 v7 h8 v-7 h8 v7 h8 v-7 h8 v7 h8 v-7 h8 v7 h8 v-7" stroke="%23FFD54A" stroke-width="1.5" fill="none" opacity="0.7"/></svg>');
            background-repeat: repeat-x;
            background-size: 80px 14px;
            opacity: 0.65;
            z-index: 4;
            pointer-events: none;
        }
        .meander-top {
            top: 2px;
        }
        .meander-bottom {
            bottom: 2px;
            transform: scaleY(-1);
        }

        .slot-frame {
            position: relative;
            background:
                linear-gradient(180deg, rgba(244, 240, 230, 0.06) 0%, transparent 15%),
                linear-gradient(145deg, rgba(18, 58, 115, 0.5), rgba(7, 23, 45, 0.95));
            border: 3px solid transparent;
            border-radius: 28px;
            padding: 14px;
            margin: 0 20px;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0;
            z-index: 3;
            box-shadow:
                0 0 80px rgba(255, 213, 74, 0.1),
                0 20px 60px rgba(0, 0, 0, 0.7),
                inset 0 0 60px rgba(0, 0, 0, 0.5),
                inset 0 2px 0 rgba(255, 241, 168, 0.15);
            background-clip: padding-box;
            max-width: 95vw;
            max-height: 55vh;
        }
        .slot-frame::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 30px;
            background: var(--gold-gradient);
            z-index: -1;
            opacity: 0.85;
        }
        .slot-frame::after {
            content: '';
            position: absolute;
            inset: 8px;
            border-radius: 20px;
            border: 1px solid rgba(255, 241, 168, 0.08);
            pointer-events: none;
            box-shadow: inset 0 0 30px rgba(255, 213, 74, 0.04);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 5px;
            background: rgba(7, 23, 45, 0.85);
            padding: 8px;
            border-radius: 16px;
            width: 100%;
            max-width: 100%;
            aspect-ratio: 1/1;
            max-height: 100%;
            position: relative;
            box-shadow: inset 0 4px 30px rgba(0, 0, 0, 0.8);
            flex-shrink: 0;
        }

        .cell {
            aspect-ratio: 1/1;
            background: linear-gradient(160deg, rgba(18, 58, 115, 0.4) 0%, rgba(7, 23, 45, 0.95) 100%);
            border: 2px solid rgba(200, 155, 44, 0.35);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 2px 12px rgba(0, 0, 0, 0.7), 0 2px 8px rgba(0, 0, 0, 0.4);
            transition: border-color 0.2s var(--ease-bounce), box-shadow 0.2s var(--ease-bounce);
            position: relative;
            overflow: hidden;
        }
        .cell img {
            width: 80%;
            height: 80%;
            object-fit: contain;
            display: block;
            margin: auto;
            mix-blend-mode: screen;
            transition: transform 0.25s var(--ease-bounce), filter 0.25s;
            will-change: transform;
        }
        .cell::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 10%;
            right: 10%;
            height: 30%;
            background: linear-gradient(0deg, rgba(255, 213, 74, 0.06), transparent);
            pointer-events: none;
        }
        .cell::after {
            content: '';
            position: absolute;
            inset: 4px;
            border: 1px solid rgba(255, 241, 168, 0.06);
            border-radius: 8px;
            pointer-events: none;
        }
        .cell.landing img {
            animation: symbolLand 0.45s var(--ease-bounce);
        }
        @keyframes symbolLand {
            0% {
                transform: translateY(-80%) scale(1.3);
                opacity: 0.3;
            }
            60% {
                transform: translateY(8%) scale(0.95);
            }
            100% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        .cell:not(.spinning):hover img {
            transform: scale(1.08);
            filter: drop-shadow(0 0 16px var(--gold-glow));
        }

        .cell.win-highlight {
            background: radial-gradient(circle, rgba(255, 213, 74, 0.35) 0%, rgba(7, 23, 45, 0.9) 75%);
            border-color: var(--gold-primary);
            box-shadow: inset 0 0 50px rgba(255, 213, 74, 0.2), 0 0 40px var(--gold-glow);
            animation: winGlow 0.55s infinite alternate ease-in-out;
        }
        @keyframes winGlow {
            0% {
                box-shadow: inset 0 0 30px rgba(255, 213, 74, 0.12), 0 0 25px rgba(255, 213, 74, 0.08);
            }
            100% {
                box-shadow: inset 0 0 60px rgba(255, 213, 74, 0.3), 0 0 50px var(--gold-glow);
            }
        }
        .cell.win-highlight img {
            animation: winPulse 0.55s infinite alternate var(--ease-bounce);
        }
        @keyframes winPulse {
            0% {
                transform: scale(1);
            }
            100% {
                transform: scale(1.15);
            }
        }

        .cell.scatter-highlight {
            background: radial-gradient(circle, rgba(92, 225, 255, 0.35) 0%, rgba(7, 23, 45, 0.9) 75%);
            border-color: var(--scatter-cyan);
            box-shadow: inset 0 0 50px rgba(92, 225, 255, 0.15), 0 0 40px rgba(92, 225, 255, 0.2);
        }
        .cell.scatter-highlight img {
            animation: scatterPulse 0.5s infinite alternate var(--ease-bounce);
        }
        @keyframes scatterPulse {
            0% {
                transform: scale(1) rotate(0deg);
            }
            100% {
                transform: scale(1.18) rotate(10deg);
            }
        }

        /* ==============================================================
           PERFORMANCE MODE — отключаем тяжёлые фильтры во время вращения
           ============================================================== */
        #app.performance-mode .header {
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
        }
        #app.performance-mode .status-bar {
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
        }
        #app.performance-mode .bottom-panel {
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
        }
        #app.performance-mode .cell {
            box-shadow: none !important;
            border-color: rgba(200, 155, 44, 0.15) !important;
            transition: none !important;
        }
        #app.performance-mode .cell img {
            filter: none !important;
            animation: none !important;
        }
        #app.performance-mode .cell::before,
        #app.performance-mode .cell::after {
            display: none !important;
        }
        #app.performance-mode .col-left,
        #app.performance-mode .col-right {
            box-shadow: none !important;
        }
        #app.performance-mode .col-left::after,
        #app.performance-mode .col-right::after {
            display: none !important;
        }
        #app.performance-mode .slot-frame {
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5), inset 0 0 30px rgba(0, 0, 0, 0.3) !important;
        }
        #app.performance-mode .slot-frame::after {
            display: none !important;
        }
        #app.performance-mode .balance-box {
            box-shadow: none !important;
        }
        #app.performance-mode .balance-box::before {
            animation: none !important;
            display: none !important;
        }
        #app.performance-mode .btn-spin {
            animation: none !important;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4), inset 0 -4px 0 rgba(0, 0, 0, 0.15) !important;
        }
        #app.performance-mode .btn-spin::after {
            display: none !important;
        }
        #app.performance-mode .stat-box {
            box-shadow: none !important;
        }
        #app.performance-mode .stat-box::before {
            display: none !important;
        }
        #app.performance-mode .bet-input-wrap {
            box-shadow: none !important;
        }
        #app.performance-mode .btn {
            box-shadow: none !important;
        }
        #app.performance-mode .btn::before {
            display: none !important;
        }
        #app.performance-mode .meander-top,
        #app.performance-mode .meander-bottom {
            opacity: 0.2 !important;
        }

        /* ==============================================================
           SPINNING — только transform (GPU-ускорение)
           ============================================================== */
        .cell.spinning img {
            animation: spinFast 0.04s infinite linear;
            will-change: transform;
        }
        @keyframes spinFast {
            0% {
                transform: translateY(-60%) scaleY(1.8);
                opacity: 0.2;
            }
            100% {
                transform: translateY(60%) scaleY(1.8);
                opacity: 0.2;
            }
        }

        /* ==============================================================
           WIN LINES CANVAS
           ============================================================== */
        .win-lines-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 6;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .win-lines-canvas.active {
            opacity: 1;
        }

        /* ==============================================================
           BOTTOM PANEL — PREMIUM CONTROLS
           ============================================================== */
        .bottom-panel {
            position: relative;
            z-index: var(--z-ui);
            background:
                linear-gradient(0deg, rgba(244, 240, 230, 0.05) 0%, transparent 30%),
                var(--panel-glass);
            border-top: 2px solid rgba(255, 213, 74, 0.2);
            padding: 12px 18px 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-shrink: 0;
            box-shadow: 0 -12px 50px var(--shadow-deep);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: backdrop-filter 0.3s ease, -webkit-backdrop-filter 0.3s ease;
            margin-top: 4px;
        }

        .stats {
            display: flex;
            gap: 10px;
            flex-wrap: nowrap;
        }
        .stat-box {
            flex: 1;
            min-width: 0;
            background: linear-gradient(160deg, rgba(18, 58, 115, 0.35), rgba(7, 23, 45, 0.8));
            border: 1.5px solid rgba(255, 213, 74, 0.15);
            border-radius: 14px;
            padding: 8px 6px;
            text-align: center;
            box-shadow: inset 0 2px 20px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
            transition: transform 0.2s var(--ease-bounce), border-color 0.2s;
        }
        .stat-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 45%;
            background: linear-gradient(180deg, rgba(255, 241, 168, 0.06), transparent);
            pointer-events: none;
        }
        .stat-box:hover {
            border-color: rgba(255, 213, 74, 0.3);
            transform: translateY(-1px);
        }
        .stat-title {
            font-size: 10px;
            color: var(--gold-primary);
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 2px;
            opacity: 0.5;
        }
        .stat-value {
            font-family: var(--font-display);
            font-size: clamp(18px, 3.5vw, 26px);
            font-weight: 900;
            color: var(--marble-white);
            letter-spacing: 1px;
            line-height: 1.15;
            transition: transform 0.3s var(--ease-bounce);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .stat-value.win-text {
            color: var(--win-green);
            text-shadow: 0 0 30px rgba(61, 220, 132, 0.35);
            animation: winCountPulse 0.6s var(--ease-bounce);
        }
        @keyframes winCountPulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }
        .stat-value.fs-text {
            color: var(--scatter-cyan);
            text-shadow: 0 0 25px rgba(92, 225, 255, 0.2);
        }
        .stat-value.fs-text .fs-count {
            font-size: clamp(22px, 4vw, 28px);
            color: var(--gold-primary);
            text-shadow: 0 0 30px var(--gold-glow);
        }

        .bet-presets {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .bet-preset-btn {
            background: rgba(7, 23, 45, 0.7);
            border: 2px solid rgba(255, 213, 74, 0.12);
            border-radius: 10px;
            padding: 7px 16px;
            font-family: var(--font-ui);
            font-weight: 900;
            font-size: 14px;
            color: rgba(244, 240, 230, 0.35);
            cursor: pointer;
            transition: all 0.2s var(--ease-bounce);
            min-width: 50px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }
        .bet-preset-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 0%, rgba(255, 241, 168, 0.1), transparent 70%);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .bet-preset-btn:hover::after {
            opacity: 1;
        }
        .bet-preset-btn:active {
            transform: scale(0.92);
        }
        .bet-preset-btn.active {
            background: rgba(255, 213, 74, 0.15);
            border-color: var(--gold-primary);
            color: var(--gold-primary);
            box-shadow: 0 0 25px rgba(255, 213, 74, 0.15), inset 0 0 15px rgba(255, 213, 74, 0.08);
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
            flex-wrap: nowrap;
        }
        .bet-input-wrap {
            flex: 0 1 100px;
            min-width: 70px;
            background: rgba(7, 23, 45, 0.7);
            border: 2px solid rgba(255, 213, 74, 0.15);
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            box-shadow: inset 0 2px 15px rgba(0, 0, 0, 0.4);
            transition: border-color 0.2s;
            height: 50px;
        }
        .bet-input-wrap:focus-within {
            border-color: rgba(255, 213, 74, 0.4);
        }
        .bet-input-wrap input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--marble-white);
            font-size: 22px;
            font-weight: 900;
            font-family: var(--font-display);
            text-align: center;
            outline: none;
            padding: 10px 0;
            min-width: 0;
        }
        .bet-input-wrap input::placeholder {
            color: rgba(244, 240, 230, 0.12);
        }

        .btn {
            border: none;
            border-radius: 14px;
            font-family: var(--font-ui);
            font-weight: 900;
            font-size: 16px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s var(--ease-bounce);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.45), inset 0 -4px 0 rgba(0, 0, 0, 0.15);
            padding: 10px 14px;
            min-height: 50px;
            min-width: 56px;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 45%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.12), transparent);
            pointer-events: none;
            border-radius: 14px 14px 0 0;
        }
        .btn:active {
            transform: scale(0.93);
        }
        .btn:disabled {
            opacity: 0.25;
            cursor: not-allowed;
            transform: none !important;
        }

        /* CIRCULAR SPIN BUTTON */
        .btn-spin {
            flex: 0 0 auto;
            width: 76px;
            height: 76px;
            min-width: 76px;
            min-height: 76px;
            border-radius: 50%;
            background: var(--gold-gradient);
            color: var(--deep-navy);
            font-size: 13px;
            font-weight: 900;
            font-family: var(--font-display);
            box-shadow:
                0 0 40px rgba(255, 213, 74, 0.35),
                0 12px 40px rgba(0, 0, 0, 0.5),
                inset 0 -5px 0 rgba(0, 0, 0, 0.15),
                inset 0 2px 0 rgba(255, 241, 168, 0.4);
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
            padding: 0;
            animation: spinIdlePulse 2.5s ease-in-out infinite;
            border: 3px solid rgba(255, 241, 168, 0.5);
        }
        .btn-spin::before {
            border-radius: 50%;
        }
        .btn-spin::after {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            border: 2px solid rgba(255, 213, 74, 0.25);
            animation: spinRingPulse 2.5s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes spinIdlePulse {
            0%,
            100% {
                box-shadow: 0 0 35px rgba(255, 213, 74, 0.3), 0 12px 40px rgba(0, 0, 0, 0.5), inset 0 -5px 0 rgba(0, 0, 0, 0.15);
                transform: scale(1);
            }
            50% {
                box-shadow: 0 0 55px rgba(255, 213, 74, 0.5), 0 12px 40px rgba(0, 0, 0, 0.5), inset 0 -5px 0 rgba(0, 0, 0, 0.15);
                transform: scale(1.04);
            }
        }
        @keyframes spinRingPulse {
            0%,
            100% {
                opacity: 0.4;
                transform: scale(1);
            }
            50% {
                opacity: 0.8;
                transform: scale(1.06);
            }
        }
        .btn-spin:active:not(:disabled) {
            animation: none;
            transform: scale(0.92);
            box-shadow: 0 0 25px rgba(255, 213, 74, 0.4), inset 0 2px 8px rgba(0, 0, 0, 0.2);
        }
        .btn-spin.spinning-state {
            animation: spinActiveRotate 0.8s linear infinite;
        }
        @keyframes spinActiveRotate {
            from {
                filter: hue-rotate(0deg);
            }
            to {
                filter: hue-rotate(15deg);
            }
        }
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 241, 168, 0.5);
            transform: scale(0);
            animation: rippleExpand 0.6s ease-out forwards;
            pointer-events: none;
        }
        @keyframes rippleExpand {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        .btn-auto {
            flex: 0 1 80px;
            background: linear-gradient(135deg, var(--royal-blue), #0A2A55);
            color: var(--marble-white);
            font-size: 13px;
            border: 1.5px solid rgba(143, 211, 255, 0.2);
            min-height: 50px;
            min-width: 56px;
        }
        .btn-auto.active {
            background: linear-gradient(135deg, #C0392B, #922B21);
            border-color: rgba(232, 85, 85, 0.4);
            box-shadow: 0 8px 30px rgba(192, 57, 43, 0.25);
        }
        .btn-collect {
            flex: 0 1 80px;
            background: linear-gradient(135deg, #27AE60, #1E8449);
            color: #fff;
            display: none;
            font-size: 13px;
            min-height: 50px;
            min-width: 56px;
            animation: collectPulse 1.5s ease-in-out infinite;
        }
        @keyframes collectPulse {
            0%,
            100% {
                box-shadow: 0 8px 30px rgba(39, 174, 96, 0.2);
            }
            50% {
                box-shadow: 0 0 35px rgba(61, 220, 132, 0.35);
            }
        }

        /* ==============================================================
           BIG WIN CINEMATIC OVERLAY
           ============================================================== */
        .big-win-overlay {
            position: fixed;
            inset: 0;
            z-index: var(--z-bigwin);
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(7, 23, 45, 0.75);
            pointer-events: none;
        }
        .big-win-overlay.active {
            display: flex;
            animation: bigWinFadeIn 0.4s var(--ease-premium);
        }
        @keyframes bigWinFadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        #bigWinCanvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .big-win-content {
            position: relative;
            z-index: 2;
            text-align: center;
            animation: bigWinScaleIn 0.6s var(--ease-bounce);
        }
        @keyframes bigWinScaleIn {
            0% {
                transform: scale(0.3);
                opacity: 0;
            }
            60% {
                transform: scale(1.08);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        .big-win-label {
            font-family: var(--font-display);
            font-size: clamp(28px, 8vw, 56px);
            font-weight: 900;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 8px;
            text-transform: uppercase;
            filter: drop-shadow(0 4px 20px rgba(255, 213, 74, 0.5));
            animation: bigWinLabelPulse 0.8s ease-in-out infinite alternate;
        }
        @keyframes bigWinLabelPulse {
            0% {
                filter: drop-shadow(0 4px 20px rgba(255, 213, 74, 0.4));
                transform: scale(1);
            }
            100% {
                filter: drop-shadow(0 8px 40px rgba(255, 241, 168, 0.8));
                transform: scale(1.03);
            }
        }
        .big-win-amount {
            font-family: var(--font-display);
            font-size: clamp(36px, 12vw, 72px);
            font-weight: 900;
            color: var(--marble-white);
            text-shadow: 0 0 40px var(--gold-glow), 0 4px 0 rgba(0, 0, 0, 0.3);
            margin-top: 12px;
            letter-spacing: 2px;
        }
        .big-win-tier-mega .big-win-label {
            font-size: clamp(32px, 9vw, 64px);
        }
        .big-win-tier-super .big-win-label {
            letter-spacing: 10px;
        }
        .big-win-tier-epic .big-win-label {
            background: linear-gradient(135deg, #FFF1A8, #FFD54A, #FF6B6B, #FFD54A);
            -webkit-background-clip: text;
            background-clip: text;
        }
        .big-win-tier-legendary .big-win-label {
            background: linear-gradient(135deg, #FFF1A8, #FFD54A, #5CE1FF, #FFD54A, #FF6B6B);
            -webkit-background-clip: text;
            background-clip: text;
            animation: legendaryShimmer 1.5s ease-in-out infinite;
        }
        @keyframes legendaryShimmer {
            0%,
            100% {
                filter: drop-shadow(0 4px 30px rgba(255, 213, 74, 0.6));
            }
            50% {
                filter: drop-shadow(0 8px 50px rgba(92, 225, 255, 0.6));
            }
        }

        /* FREE SPINS PORTAL */
        .fs-portal-overlay {
            position: fixed;
            inset: 0;
            z-index: 160;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s;
        }
        .fs-portal-overlay.active {
            opacity: 1;
            animation: portalZoom 1.4s var(--ease-premium) forwards;
        }
        @keyframes portalZoom {
            0% {
                opacity: 0;
                transform: scale(1.2);
            }
            30% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: scale(0.8);
            }
        }
        .fs-portal-overlay::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 213, 74, 0.6) 0%, rgba(92, 225, 255, 0.3) 40%, transparent 70%);
            transform: translate(-50%, -50%);
            animation: portalExpand 1.4s var(--ease-premium) forwards;
        }
        @keyframes portalExpand {
            0% {
                width: 0;
                height: 0;
                opacity: 1;
            }
            50% {
                width: 200vmax;
                height: 200vmax;
                opacity: 0.8;
            }
            100% {
                width: 250vmax;
                height: 250vmax;
                opacity: 0;
            }
        }

        /* ==============================================================
           BONUS POPUP — CINEMATIC
           ============================================================== */
        .bonus-popup {
            position: fixed;
            inset: 0;
            z-index: var(--z-popup);
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(7, 23, 45, 0.88);
            animation: fadePopup 0.5s var(--ease-bounce);
            pointer-events: auto;
            backdrop-filter: blur(8px);
        }
        .bonus-popup.show {
            display: flex;
        }
        @keyframes fadePopup {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }
        .bonus-popup-content {
            background: linear-gradient(160deg, rgba(18, 58, 115, 0.9), rgba(7, 23, 45, 0.98));
            border: 3px solid transparent;
            border-radius: 28px;
            padding: 40px 28px 28px;
            max-width: 420px;
            width: 92%;
            text-align: center;
            box-shadow: 0 0 120px rgba(255, 213, 74, 0.12), 0 24px 80px rgba(0, 0, 0, 0.9);
            position: relative;
            overflow: hidden;
            animation: popupSlide 0.55s var(--ease-bounce);
        }
        @keyframes popupSlide {
            0% {
                transform: scale(0.7) translateY(30px);
                opacity: 0;
            }
            100% {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }
        .bonus-popup-content::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 30px;
            background: var(--gold-gradient);
            z-index: -1;
        }
        .bonus-popup-content::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: repeating-conic-gradient(from 0deg, transparent 0deg, rgba(255, 213, 74, 0.02) 5deg, transparent 10deg);
            animation: rotateBg 20s linear infinite;
            pointer-events: none;
        }
        @keyframes rotateBg {
            to {
                transform: rotate(360deg);
            }
        }
        .bonus-popup-content .close-btn {
            position: absolute;
            top: 12px;
            right: 18px;
            font-size: 24px;
            color: rgba(244, 240, 230, 0.3);
            cursor: pointer;
            background: none;
            border: none;
            transition: color 0.2s, transform 0.2s;
            z-index: 10;
            padding: 4px 12px;
        }
        .bonus-popup-content .close-btn:hover {
            color: var(--marble-white);
            transform: scale(1.1);
        }
        .bonus-popup-content .icon-big {
            font-size: 72px;
            margin-bottom: 8px;
            display: block;
            position: relative;
            z-index: 2;
            animation: bonusIconFloat 2s ease-in-out infinite;
            filter: drop-shadow(0 0 30px var(--gold-glow));
        }
        @keyframes bonusIconFloat {
            0%,
            100% {
                transform: translateY(0) scale(1);
            }
            50% {
                transform: translateY(-8px) scale(1.08);
            }
        }
        .bonus-popup-content .title {
            font-family: var(--font-display);
            font-size: 28px;
            font-weight: 900;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
            margin-bottom: 6px;
            position: relative;
            z-index: 2;
            letter-spacing: 5px;
        }
        .bonus-popup-content .sub {
            font-size: 17px;
            color: rgba(244, 240, 230, 0.5);
            font-weight: 700;
            position: relative;
            z-index: 2;
        }
        .bonus-popup-content .highlight {
            color: var(--win-green);
            font-size: 20px;
            font-weight: 900;
        }
        .bonus-popup-content .col-deco {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 20px;
            background: repeating-linear-gradient(180deg, transparent, transparent 16px, rgba(255, 213, 74, 0.05) 16px, rgba(255, 213, 74, 0.05) 17px);
            border-left: 1px solid rgba(255, 213, 74, 0.1);
            border-right: 1px solid rgba(255, 213, 74, 0.1);
        }
        .bonus-popup-content .col-deco.left {
            left: 0;
        }
        .bonus-popup-content .col-deco.right {
            right: 0;
        }

        .coin-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 150;
        }
        .coin {
            position: absolute;
            font-size: 32px;
            font-weight: 900;
            color: var(--gold-primary);
            text-shadow: 0 0 30px rgba(255, 213, 74, 0.9);
            animation: coinFly 0.9s var(--ease-bounce) forwards;
            will-change: transform, opacity;
        }
        @keyframes coinFly {
            0% {
                transform: translate(0, 0) scale(1) rotate(0deg);
                opacity: 1;

                    if (p.x > pW) p.x = 0;
                    if (p.y < 0) p.y = pH;
                    if (p.y > pH) p.y = 0;
                    const alpha = p.a * (0.4 + 0.6 * Math.sin(time * 0.5 + p.phase));
                    pCtx.beginPath();
                    pCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    if (p.type === 'magic') {
                        pCtx.fillStyle = `rgba(92,225,255,${alpha * 0.6})`;
                    } else {
                        pCtx.fillStyle = `rgba(255,213,74,${alpha})`;
                    }
                    pCtx.shadowColor = p.type === 'magic' ? `rgba(92,225,255,${alpha * 0.5})` :
                        `rgba(255,213,74,${alpha * 0.5})`;
                    pCtx.shadowBlur = 8;
                    pCtx.fill();
                    pCtx.shadowBlur = 0;
                });
                burstParticles = burstParticles.filter(bp => {
                    bp.x += bp.vx;
                    bp.y += bp.vy;
                    bp.vy += 0.06;
                    bp.life -= bp.decay;
                    bp.rot += bp.rotV;
                    if (bp.life <= 0) return false;
                    pCtx.save();
                    pCtx.translate(bp.x, bp.y);
                    pCtx.rotate(bp.rot);
                    pCtx.globalAlpha = bp.life;
                    if (bp.type === 'coin') {
                        pCtx.fillStyle = '#FFD54A';
                        pCtx.beginPath();
                        pCtx.ellipse(0, 0, bp.r, bp.r * 0.6, 0, 0, Math.PI * 2);
                        pCtx.fill();
                    } else if (bp.type === 'spark') {
                        pCtx.fillStyle = '#FFF1A8';
                        pCtx.fillRect(-bp.r, -bp.r * 0.3, bp.r * 2, bp.r * 0.6);
                    } else {
                        pCtx.fillStyle = '#FFD54A';
                        pCtx.beginPath();
                        pCtx.arc(0, 0, bp.r, 0, Math.PI * 2);
                        pCtx.fill();
                    }
                    pCtx.restore();
                    return true;
                });
                particleAnimId = requestAnimationFrame(drawParticles);
            }

            /* --- Procedural Lightning Engine --- */
            let lCtx = null,
                lW = 0,
                lH = 0;
            let lightningBolts = [];

            function initLightningCanvas() {
                lW = lightningCanvas.width = window.innerWidth;
                lH = lightningCanvas.height = window.innerHeight;
                lCtx = lightningCanvas.getContext('2d');
            }

            function createBolt(startX, startY, endX, endY, depth, maxDepth) {
                if (depth > maxDepth) return [{ x1: startX, y1: startY, x2: endX, y2: endY }];
                const segments = [];
                const midX = (startX + endX) / 2 + (Math.random() - 0.5) * 80;
                const midY = (startY + endY) / 2;
                segments.push(...createBolt(startX, startY, midX, midY, depth + 1, maxDepth));
                segments.push(...createBolt(midX, midY, endX, endY, depth + 1, maxDepth));
                if (depth < 2 && Math.random() > 0.5) {
                    const branchEndX = midX + (Math.random() - 0.5) * 120;
                    const branchEndY = midY + 60 + Math.random() * 80;
                    segments.push(...createBolt(midX, midY, branchEndX, branchEndY, depth + 2, maxDepth + 1));
                }
                return segments;
            }

            function renderLightning() {
                if (!lCtx || lightningBolts.length === 0) return;
                lCtx.clearRect(0, 0, lW, lH);
                lightningBolts.forEach(bolt => {
                    bolt.life -= 0.04;
                    if (bolt.life <= 0) return;
                    const alpha = bolt.life;
                    bolt.segments.forEach(seg => {
                        lCtx.beginPath();
                        lCtx.moveTo(seg.x1, seg.y1);
                        lCtx.lineTo(seg.x2, seg.y2);
                        lCtx.strokeStyle = `rgba(255,241,168,${alpha * 0.9})`;
                        lCtx.lineWidth = 3 * alpha;
                        lCtx.shadowColor = `rgba(255,213,74,${alpha})`;
                        lCtx.shadowBlur = 20;
                        lCtx.stroke();
                        lCtx.strokeStyle = `rgba(255,255,255,${alpha * 0.6})`;
                        lCtx.lineWidth = 1.5 * alpha;
                        lCtx.stroke();
                    });
                    lCtx.shadowBlur = 0;
                });
                lightningBolts = lightningBolts.filter(b => b.life > 0);
                if (lightningBolts.length > 0) requestAnimationFrame(renderLightning);
            }

            function fireLightningBolt() {
                initLightningCanvas();
                const startX = lW * (0.3 + Math.random() * 0.4);
                const endX = startX + (Math.random() - 0.5) * 100;
                const segments = createBolt(startX, 0, endX, lH * (0.4 + Math.random() * 0.3), 0, 4);
                lightningBolts.push({ segments, life: 1 });
                renderLightning();
            }

            // =============================================================
            function drawWinLines(winningIndices) {
                const canvas = winLinesCanvas;
                const rect = canvas.parentElement.getBoundingClientRect();
                canvas.width = rect.width;
                canvas.height = rect.height;
                const ctx = canvas.getContext('2d');
                const cols = 5,
                    rows = 5;
                const pad = 4;
                const cellW = (canvas.width - pad * 2) / cols;
                const cellH = (canvas.height - pad * 2) / rows;

                function getPos(idx) {
                    const r = Math.floor(idx / 5);
                    const c = idx % 5;
                    return { x: pad + c * cellW + cellW / 2, y: pad + r * cellH + cellH / 2 };
                }

                ctx.clearRect(0, 0, canvas.width, canvas.height);
                if (!winningIndices || winningIndices.length === 0) {
                    canvas.classList.remove('active');
                    return;
                }

                const lineGroups = [];
                LINES.forEach((line, li) => {
                    const matched = line.filter(idx => winningIndices.includes(idx));
                    if (matched.length >= 3) {
                        lineGroups.push({ line, matched, li });
                    }
                });

                if (lineGroups.length === 0) {
                    canvas.classList.remove('active');
                    return;
                }

                canvas.classList.add('active');

                lineGroups.forEach((g, gi) => {
                    const pts = g.line.map(idx => getPos(idx));
                    const goldHue = 45 + gi * 8;
                    ctx.beginPath();
                    ctx.moveTo(pts[0].x, pts[0].y);
                    for (let i = 1; i < pts.length; i++) {
                        ctx.lineTo(pts[i].x, pts[i].y);
                    }
                    ctx.strokeStyle = `hsla(${goldHue},100%,65%,0.9)`;
                    ctx.lineWidth = 3.5;
                    ctx.shadowColor = `hsla(${goldHue},100%,60%,0.7)`;
                    ctx.shadowBlur = 25;
                    ctx.stroke();
                    ctx.shadowBlur = 40;
                    ctx.strokeStyle = `hsla(${goldHue},100%,85%,0.2)`;
                    ctx.lineWidth = 10;
                    ctx.stroke();

                    g.matched.forEach(idx => {
                        const p = getPos(idx);
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, 8, 0, Math.PI * 2);
                        ctx.fillStyle = `hsla(${goldHue},100%,75%,0.95)`;
                        ctx.shadowBlur = 30;
                        ctx.shadowColor = `hsla(${goldHue},100%,60%,0.8)`;
                        ctx.fill();
                        ctx.shadowBlur = 0;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
                        ctx.fillStyle = '#FFF1A8';
                        ctx.fill();
                    });
                });

                setTimeout(() => { canvas.classList.remove('active'); }, 3200);
            }

            let audioCtx = null;

            function initAudio() {
                if (!audioCtx) {
                    try {

                        const resumeFn = function() {
                            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                        };
                        document.addEventListener('click', resumeFn, { once: true });
                        document.addEventListener('touchstart', resumeFn, { once: true });
                    } catch (e) {}
                }
            }

            function playTone(freq, dur, type = 'sine', vol = 0.07, delay = 0) {
                if (!audioCtx) return;
                try {
                    setTimeout(() => {
                        if (audioCtx.state === 'suspended') audioCtx.resume();
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.type = type;
                        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                        const scaledVol = SoundManager.scale(vol);
                        gain.gain.setValueAtTime(scaledVol, audioCtx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
                        osc.connect(gain);
                        gain.connect(audioCtx.destination);
                        osc.start();
                        osc.stop(audioCtx.currentTime + dur);
                    }, delay);
                } catch (e) {}
            }
