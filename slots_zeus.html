<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZEUS · PREMIUM SLOTS</title>
    <script src="https://telegram.org/js/telegram-web-app.js">
    </script>
    <style>
        /* ===== RESET & LOCKDOWN ===== */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            -webkit-user-drag: none;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            background: #060b1a;
            font-family: 'Nunito', 'Montserrat', sans-serif;
            color: #fff;
            position: fixed;
            top: 0;
            left: 0;
        }
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Nunito:wght@700;800;900&family=Montserrat:wght@800;900&display=swap');

        /* ===== ROOT ===== */
        :root {
            --gold: #ffd700;
            --gold-dim: #b8860b;
            --gold-glow: rgba(255, 215, 0, 0.3);
            --blue-deep: #060b1a;
            --panel-bg: rgba(6, 11, 26, 0.92);
            --shadow-heavy: 0 20px 60px rgba(0, 0, 0, 0.9);
            --shadow-gold: 0 0 60px rgba(255, 215, 0, 0.06);
            --radius-lg: 24px;
            --radius-md: 14px;
            --radius-sm: 10px;
        }

        /* ===== APP WRAPPER ===== */
        #app {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: radial-gradient(ellipse at 30% 15%, #0e1a30 0%, #060b1a 65%, #030712 100%);
            z-index: 1;
            overflow: hidden;
        }

        /* ===== BG ORNAMENT ===== */
        .bg-ornament {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.05;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><path d="M20,20 L180,20 L180,180 L20,180 Z" stroke="%23ffd700" stroke-width="0.5" fill="none"/><path d="M40,40 L160,40 L160,160 L40,160 Z" stroke="%23ffd700" stroke-width="0.5" fill="none"/><path d="M60,60 L140,60 L140,140 L60,140 Z" stroke="%23ffd700" stroke-width="0.5" fill="none"/><circle cx="100" cy="100" r="45" stroke="%23ffd700" stroke-width="0.5" fill="none"/><circle cx="100" cy="100" r="65" stroke="%23ffd700" stroke-width="0.5" fill="none"/></svg>');
            background-size: 180px 180px;
            background-repeat: repeat;
        }

        /* ===== CANVAS PARTICLES ===== */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 2;
            opacity: 0.5;
        }

        /* ===== FLASH & LIGHTNING ===== */
        .flash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
            transition: opacity 0.06s ease-out;
        }
        .flash-overlay.active {
            opacity: 0.5;
            transition: opacity 0.35s ease-out;
        }
        .lightning-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 99;
            opacity: 0;
            transition: opacity 0.04s;
        }
        .lightning-container.active {
            opacity: 1;
        }
        .lightning-svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 50px rgba(255, 215, 0, 0.8));
        }

        /* ===== HEADER ===== */
        .header {
            position: relative;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px 10px 14px;
            background: var(--panel-bg);
            border-bottom: 2px solid rgba(255, 215, 0, 0.15);
            box-shadow: var(--shadow-heavy), inset 0 1px 0 rgba(255, 215, 0, 0.04);
            flex-shrink: 0;
            min-height: 64px;
        }
        .btn-back {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.04);
            border: 1.5px solid rgba(255, 215, 0, 0.15);
            color: var(--gold);
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            flex-shrink: 0;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }
        .btn-back:active {
            transform: scale(0.88);
            background: rgba(255, 215, 0, 0.12);
            border-color: var(--gold);
        }
        .brand {
            flex: 1;
            text-align: center;
            padding: 0 4px;
        }
        .brand-title {
            font-family: 'Cinzel', 'Montserrat', serif;
            font-size: 22px;
            font-weight: 900;
            background: linear-gradient(135deg, #ffd700 0%, #ffb800 45%, #ffd700 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 4px;
            display: inline-block;
            text-shadow: 0 0 40px rgba(255, 215, 0, 0.08);
        }
        .brand-title::before {
            content: '⚡';
            font-size: 14px;
            margin-right: 8px;
            -webkit-text-fill-color: initial;
            color: var(--gold);
            opacity: 0.7;
        }
        .brand-title::after {
            content: '⚡';
            font-size: 14px;
            margin-left: 8px;
            -webkit-text-fill-color: initial;
            color: var(--gold);
            opacity: 0.7;
        }
        .brand-sub {
            font-size: 8px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-top: -1px;
            font-family: 'Nunito', sans-serif;
        }
        .balance-box {
            background: rgba(0, 0, 0, 0.55);
            border: 1.5px solid rgba(255, 215, 0, 0.2);
            padding: 6px 16px 6px 18px;
            border-radius: 30px;
            text-align: right;
            box-shadow: inset 0 0 40px rgba(255, 215, 0, 0.03), 0 8px 32px rgba(0, 0, 0, 0.5);
            flex-shrink: 0;
            min-width: 90px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }
        .balance-box.pop {
            animation: balancePop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes balancePop {
            0% {
                transform: scale(1);
                background: rgba(255, 215, 0, 0.03);
            }
            45% {
                transform: scale(1.06);
                background: rgba(255, 215, 0, 0.15);
                box-shadow: 0 0 60px rgba(255, 215, 0, 0.1);
            }
            100% {
                transform: scale(1);
                background: rgba(0, 0, 0, 0.55);
            }
        }
        .balance-label {
            font-size: 8px;
            color: var(--gold);
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 1.5px;
            opacity: 0.6;
            font-family: 'Nunito', sans-serif;
        }
        .balance-val {
            font-family: 'Cinzel', 'Montserrat', serif;
            font-size: 20px;
            font-weight: 900;
            color: #fff;
            transition: color 0.3s;
            letter-spacing: 0.5px;
            line-height: 1.3;
        }
        .balance-val.added {
            color: #2ecc71;
            text-shadow: 0 0 40px rgba(46, 204, 113, 0.25);
        }

        /* ===== STATUS BAR ===== */
        .status-bar {
            position: relative;
            z-index: 5;
            text-align: center;
            padding: 6px 12px;
            min-height: 34px;
            font-size: 13px;
            font-weight: 900;
            color: var(--gold);
            text-shadow: 0 0 25px rgba(255, 215, 0, 0.12);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: 'Nunito', sans-serif;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 215, 0, 0.03);
            flex-shrink: 0;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .status-bar.bonus {
            color: #7df9ff;
            text-shadow: 0 0 40px rgba(0, 229, 255, 0.35), 0 0 80px rgba(0, 229, 255, 0.08);
            animation: bonusPulse 0.9s infinite alternate ease-in-out;
        }
        @keyframes bonusPulse {
            0% {
                opacity: 0.85;
                letter-spacing: 2px;
            }
            100% {
                opacity: 1;
                letter-spacing: 4px;
            }
        }
        .status-bar.win {
            color: #2ecc71;
            text-shadow: 0 0 40px rgba(46, 204, 113, 0.3);
        }
        .status-bar.lose {
            color: #e74c3c;
            text-shadow: 0 0 30px rgba(231, 76, 60, 0.2);
        }
        .status-bar .fs-badge {
            display: inline-block;
            background: rgba(255, 215, 0, 0.08);
            padding: 0 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.1);
            font-size: 11px;
            color: var(--gold);
        }

        /* ===== SLOT WRAPPER ===== */
        .slot-wrapper {
            position: relative;
            z-index: 5;
            flex: 1;
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6px 12px;
            margin: 0;
        }

        /* ===== COLUMNS ===== */
        .col-left,
        .col-right {
            position: absolute;
            top: 5%;
            bottom: 5%;
            width: 24px;
            background: repeating-linear-gradient(180deg,
                    #d4c9a0 0px, #d4c9a0 3px,
                    #f5eedc 3px, #f5eedc 6px,
                    #d4c9a0 6px, #d4c9a0 9px,
                    #b8a898 9px, #b8a898 12px);
            border-radius: 12px;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.08), inset 0 0 30px rgba(0, 0, 0, 0.5);
            border: 1.5px solid rgba(255, 215, 0, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            padding: 10px 0;
            background-image: repeating-linear-gradient(45deg, transparent, transparent 4px, rgba(139, 115, 85, 0.1) 4px, rgba(139, 115, 85, 0.1) 5px);
            z-index: 2;
        }
        .col-left {
            left: 0px;
        }
        .col-right {
            right: 0px;
        }
        .col-left::before,
        .col-right::before {
            content: '';
            width: 50%;
            height: 2px;
            background: var(--gold);
            box-shadow: 0 8px 0 var(--gold), 0 16px 0 var(--gold), 0 24px 0 var(--gold), 0 32px 0 var(--gold), 0 40px 0 var(--gold), 0 48px 0 var(--gold), 0 56px 0 var(--gold);
            opacity: 0.2;
        }
        .col-icon {
            font-size: 14px;
            color: var(--gold);
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
            opacity: 0.5;
        }

        /* ===== MEANDER ===== */
        .meander-top,
        .meander-bottom {
            position: absolute;
            left: 20px;
            right: 20px;
            height: 12px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 12"><path d="M0,6 h8 v-6 h8 v6 h8 v-6 h8 v6 h8 v-6 h8 v6 h8" stroke="%23b8860b" stroke-width="1.8" fill="none" opacity="0.7"/><path d="M0,6 h8 v6 h8 v-6 h8 v6 h8 v-6 h8 v6 h8 v-6 h8" stroke="%23b8860b" stroke-width="1.8" fill="none" opacity="0.7"/></svg>');
            background-repeat: repeat-x;
            background-size: 60px 12px;
            opacity: 0.4;
            z-index: 2;
            pointer-events: none;
        }
        .meander-top {
            top: 0;
        }
        .meander-bottom {
            bottom: 0;
        }

        /* ===== SLOT FRAME ===== */
        .slot-frame {
            position: relative;
            background: rgba(4, 8, 20, 0.96);
            border: 2.5px solid transparent;
            border-image: linear-gradient(135deg, var(--gold), #b8860b, var(--gold)) 1;
            border-radius: 16px;
            padding: 8px;
            box-shadow: 0 0 80px rgba(255, 215, 0, 0.05), inset 0 0 60px rgba(0, 0, 0, 0.7);
            margin: 0 14px;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0;
            z-index: 3;
        }
        .slot-frame::after {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.06);
            pointer-events: none;
            background: repeating-linear-gradient(45deg, transparent, transparent 14px, rgba(255, 215, 0, 0.015) 14px, rgba(255, 215, 0, 0.015) 15px);
        }

        /* ===== GRID 5x5 ===== */
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 4px;
            background: rgba(0, 0, 0, 0.5);
            padding: 4px;
            border-radius: 10px;
            width: 100%;
            aspect-ratio: 1/1;
            max-height: 100%;
            position: relative;
        }

        /* ===== CELLS — CRISP, NO BLUR ===== */
        .cell {
            aspect-ratio: 1/1;
            background: rgba(10, 15, 25, 0.88);
            border: 1.5px solid rgba(255, 215, 0, 0.2);
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.6), 0 2px 12px rgba(0, 0, 0, 0.3);
            transition: all 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            background-image: repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.02) 0px, rgba(255, 255, 255, 0.02) 2px, transparent 2px, transparent 6px);
        }
        .cell::after {
            content: '';
            position: absolute;
            inset: 3px;
            border: 1px solid rgba(255, 215, 0, 0.05);
            border-radius: 4px;
            pointer-events: none;
        }
        /* SYMBOLS — LARGE & CENTERED */
        .cell .sym {
            filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.6));
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 42px;
            line-height: 1;
            color: #3d2e1e;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.06);
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }
        .cell .sym[data-symbol="🔱"] {
            color: #ffd700;
            text-shadow: 0 0 20px #ffd700, 0 0 50px #b8860b;
        }
        .cell .sym[data-symbol="⚡"] {
            color: #7df9ff;
            text-shadow: 0 0 24px #00e5ff, 0 0 55px #00bcd4;
        }
        .cell .sym[data-symbol="🦅"] {
            color: #d4b48c;
            text-shadow: 0 0 16px #b8860b, 0 0 32px #8b6914;
        }
        .cell .sym[data-symbol="🏛️"] {
            color: #c0b090;
            text-shadow: 0 0 14px #a08060, 0 0 28px #806040;
        }
        .cell .sym[data-symbol="🏺"] {
            color: #b8a080;
            text-shadow: 0 0 14px #a08060;
        }
        .cell .sym[data-symbol="🌾"] {
            color: #c8b060;
            text-shadow: 0 0 14px #a08040;
        }
        .cell .sym[data-symbol="✨"] {
            color: #ffea8a;
            text-shadow: 0 0 28px #ffd700, 0 0 65px #ffaa00;
            animation: scatterGlow 2s infinite alternate ease-in-out;
        }
        @keyframes scatterGlow {
            0% {
                transform: scale(1) rotate(0deg);
                text-shadow: 0 0 28px #ffd700, 0 0 65px #ffaa00;
            }
            100% {
                transform: scale(1.06) rotate(6deg);
                text-shadow: 0 0 44px #ffd700, 0 0 85px #ff8800;
            }
        }

        /* WIN HIGHLIGHT — CRISP */
        .cell.win-highlight {
            background: radial-gradient(circle, rgba(255, 215, 0, 0.25) 0%, rgba(10, 15, 25, 0.92) 80%);
            border-color: var(--gold);
            box-shadow: inset 0 0 30px rgba(255, 215, 0, 0.15), 0 0 30px rgba(255, 215, 0, 0.08);
            animation: winGlow 0.6s infinite alternate ease-in-out;
        }
        @keyframes winGlow {
            0% {
                box-shadow: inset 0 0 20px rgba(255, 215, 0, 0.1), 0 0 20px rgba(255, 215, 0, 0.04);
            }
            100% {
                box-shadow: inset 0 0 45px rgba(255, 215, 0, 0.25), 0 0 45px rgba(255, 215, 0, 0.1);
            }
        }
        .cell.win-highlight .sym {
            animation: winPulse 0.6s infinite alternate cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes winPulse {
            0% {
                transform: scale(1);
            }
            100% {
                transform: scale(1.08);
            }
        }

        .cell.scatter-highlight {
            background: radial-gradient(circle, rgba(24, 130, 255, 0.3) 0%, rgba(10, 15, 25, 0.92) 80%);
            border-color: #1882ff;
            box-shadow: inset 0 0 30px rgba(24, 130, 255, 0.12), 0 0 40px rgba(24, 130, 255, 0.06);
        }
        .cell.scatter-highlight .sym {
            animation: scatterPulse 0.5s infinite alternate cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes scatterPulse {
            0% {
                transform: scale(1) rotate(0deg);
            }
            100% {
                transform: scale(1.1) rotate(8deg);
            }
        }

        /* SPINNING — motion blur only on symbol, not cell */
        .cell.spinning .sym {
            animation: spinBlur 0.045s infinite linear;
        }
        @keyframes spinBlur {
            0% {
                transform: translateY(-45%) scaleY(1.6);
                opacity: 0.25;
                filter: blur(3px);
            }
            100% {
                transform: translateY(45%) scaleY(1.6);
                opacity: 0.25;
                filter: blur(3px);
            }
        }

        /* ===== WIN LINES CANVAS ===== */
        .win-lines-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 6;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .win-lines-canvas.active {
            opacity: 1;
        }

        /* ===== BOTTOM PANEL ===== */
        .bottom-panel {
            position: relative;
            z-index: 5;
            background: var(--panel-bg);
            border-top: 2px solid rgba(255, 215, 0, 0.08);
            padding: 10px 14px 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-shrink: 0;
            box-shadow: var(--shadow-heavy), inset 0 1px 0 rgba(255, 215, 0, 0.02);
        }

        /* STATS — bigger, bolder */
        .stats {
            display: flex;
            gap: 8px;
        }
        .stat-box {
            flex: 1;
            background: rgba(0, 0, 0, 0.5);
            border: 1.5px solid rgba(255, 215, 0, 0.06);
            border-radius: var(--radius-sm);
            padding: 6px 4px;
            text-align: center;
            box-shadow: inset 0 4px 20px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
        }
        .stat-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 40%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent);
            pointer-events: none;
        }
        .stat-title {
            font-size: 8px;
            color: var(--gold);
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 1.5px;
            opacity: 0.5;
            font-family: 'Nunito', sans-serif;
        }
        .stat-value {
            font-family: 'Cinzel', 'Montserrat', serif;
            font-size: 22px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 0.5px;
            line-height: 1.3;
        }
        .stat-value.win-text {
            color: #2ecc71;
            text-shadow: 0 0 30px rgba(46, 204, 113, 0.15);
        }
        .stat-value.fs-text {
            color: #7df9ff;
            text-shadow: 0 0 30px rgba(0, 229, 255, 0.1);
        }
        .stat-value.fs-text .fs-count {
            font-size: 26px;
            color: var(--gold);
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.12);
        }

        /* BET PRESETS */
        .bet-presets {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .bet-preset-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1.5px solid rgba(255, 255, 255, 0.05);
            border-radius: 7px;
            padding: 4px 12px;
            font-family: 'Nunito', sans-serif;
            font-weight: 900;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            min-width: 38px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.25);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .bet-preset-btn:active {
            transform: scale(0.9);
            background: rgba(255, 215, 0, 0.1);
            border-color: var(--gold);
            color: var(--gold);
        }
        .bet-preset-btn.active {
            background: rgba(255, 215, 0, 0.08);
            border-color: var(--gold);
            color: var(--gold);
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.04);
        }

        /* CONTROLS */
        .controls {
            display: flex;
            gap: 8px;
            align-items: stretch;
        }
        .bet-input-wrap {
            flex: 0.8;
            min-width: 70px;

            // =============================================================
            // 5. PARTICLES (Canvas Engine)
            // =============================================================
            let particles = [];
            let pCtx = null;
            let pW = 0,
                pH = 0;
            let particleAnimId = null;

            function initParticles() {
                const rect = particleCanvas.getBoundingClientRect();
                pW = particleCanvas.width = window.innerWidth;
                pH = particleCanvas.height = window.innerHeight;
                pCtx = particleCanvas.getContext('2d');
                particles = [];
                for (let i = 0; i < 60; i++) {
                    particles.push({
                        x: Math.random() * pW,
                        y: Math.random() * pH,
                        vx: (Math.random() - 0.5) * 0.12,
                        vy: (Math.random() - 0.5) * 0.12 - 0.03,
                        r: 0.8 + Math.random() * 1.6,
                        a: 0.08 + Math.random() * 0.2,
                        phase: Math.random() * Math.PI * 2,
                        speed: 0.3 + Math.random() * 0.5
                    });
                }
                if (particleAnimId) cancelAnimationFrame(particleAnimId);
                drawParticles();
            }

            function drawParticles() {
                if (!pCtx) return;
                pCtx.clearRect(0, 0, pW, pH);
                const time = Date.now() * 0.0004;
                particles.forEach(p => {
                    p.x += p.vx + Math.sin(time * p.speed + p.phase) * 0.025;
                    p.y += p.vy + Math.cos(time * p.speed * 0.7 + p.phase) * 0.025;
                    if (p.x < 0) p.x = pW;
                    if (p.x > pW) p.x = 0;
                    if (p.y < 0) p.y = pH;
                    if (p.y > pH) p.y = 0;
                    pCtx.beginPath();
                    pCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    const alpha = p.a * (0.4 + 0.6 * Math.sin(time * 0.6 + p.phase));
                    pCtx.fillStyle = `rgba(255,215,0,${alpha})`;
                    pCtx.fill();
                    pCtx.shadowColor = `rgba(255,215,0,${alpha * 0.15})`;
                    pCtx.shadowBlur = 10;
                    pCtx.fill();
                    pCtx.shadowBlur = 0;
                });
                particleAnimId = requestAnimationFrame(drawParticles);
            }

            window.addEventListener('resize', () => { initParticles(); });
            initParticles();

            // =============================================================
            // 6. WIN LINES CANVAS
            // =============================================================
            function drawWinLines(winningIndices) {
                const canvas = winLinesCanvas;
                const rect = canvas.parentElement.getBoundingClientRect();
                canvas.width = rect.width;
                canvas.height = rect.height;
                const ctx = canvas.getContext('2d');
                const cols = 5,
                    rows = 5;
                const pad = 5;
                const cellW = (canvas.width - pad * 2) / cols;
                const cellH = (canvas.height - pad * 2) / rows;

                function getPos(idx) {
                    const r = Math.floor(idx / 5);
                    const c = idx % 5;
                    return { x: pad + c * cellW + cellW / 2, y: pad + r * cellH + cellH / 2 };
                }

                ctx.clearRect(0, 0, canvas.width, canvas.height);
                if (!winningIndices || winningIndices.length === 0) {
                    canvas.classList.remove('active');
                    return;
                }

                const lineGroups = [];
                LINES.forEach((line, li) => {
                    const matched = line.filter(idx => winningIndices.includes(idx));
                    if (matched.length >= 3) {
                        lineGroups.push({ line, matched, li });
                    }
                });

                if (lineGroups.length === 0) {
                    canvas.classList.remove('active');
                    return;
                }

                canvas.classList.add('active');

                lineGroups.forEach((g, gi) => {
                    const pts = g.line.map(idx => getPos(idx));
                    const hue = (gi * 45 + 25) % 360;
                    ctx.beginPath();
                    ctx.moveTo(pts[0].x, pts[0].y);
                    for (let i = 1; i < pts.length; i++) {
                        ctx.lineTo(pts[i].x, pts[i].y);
                    }
                    ctx.strokeStyle = `hsla(${hue},100%,70%,0.8)`;
                    ctx.lineWidth = 2.5;
                    ctx.shadowColor = `hsla(${hue},100%,70%,0.5)`;
                    ctx.shadowBlur = 20;
                    ctx.stroke();
                    ctx.shadowBlur = 35;
                    ctx.strokeStyle = `hsla(${hue},100%,90%,0.15)`;
                    ctx.lineWidth = 6;
                    ctx.stroke();

                    g.matched.forEach(idx => {
                        const p = getPos(idx);
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
                        ctx.fillStyle = `hsla(${hue},100%,85%,0.85)`;
                        ctx.shadowBlur = 25;
                        ctx.shadowColor = `hsla(${hue},100%,70%,0.6)`;
                        ctx.fill();
                        ctx.shadowBlur = 0;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, 2.5, 0, Math.PI * 2);
                        ctx.fillStyle = '#fff';
                        ctx.fill();
                    });
                });

                setTimeout(() => { canvas.classList.remove('active'); }, 2800);
            }

            // =============================================================
            // 7. AUDIO ENGINE (Premium)
            // =============================================================
            let audioCtx = null;

            function initAudio() {
                if (!audioCtx) {
                    try {
                        audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                        const resumeFn = function() {
                            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                        };
                        document.addEventListener('click', resumeFn, { once: true });
                        document.addEventListener('touchstart', resumeFn, { once: true });
                    } catch (e) {}
                }
            }

            function playTone(freq, dur, type = 'sine', vol = 0.07, delay = 0) {
                if (!audioCtx) return;
                try {
                    setTimeout(() => {
                        if (audioCtx.state === 'suspended') audioCtx.resume();
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.type = type;
                        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
                        osc.connect(gain);
                        gain.connect(audioCtx.destination);
                        osc.start();
                        osc.stop(audioCtx.currentTime + dur);
                    }, delay);
                } catch (e) {}
            }

            function playThud() {
                playTone(135, 0.13, 'square', 0.06);
                setTimeout(() => playTone(85, 0.09, 'sawtooth', 0.035), 55);

            // =============================================================
            // 8. UI HELPERS
            // =============================================================
            function formatNumber(num) {
                return Math.floor(num).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
            }

            function parseNumber(str) {
                return parseInt(str.replace(/\s/g, '')) || 0;
            }

            function updateBalance(amount, animate = false) {
                balance = Math.floor(amount);
                localStorage.setItem('casinoBalance', String(balance));
                balanceDisplay.innerText = formatNumber(balance) + ' ₽';
                if (animate) {
                    balanceBox.classList.remove('pop');

                    balanceBox.classList.add('pop');
                    balanceDisplay.classList.add('added');
                    setTimeout(() => balanceDisplay.classList.remove('added'), 500);

            function updateFSDisplay() {
                fsDisplay.innerHTML = `<span class="fs-count">${freeSpins}</span>`;
                fsDisplay.style.color = freeSpins > 0 ? '#7df9ff' : 'rgba(255,255,255,0.4)';
            }

            function getBet() {
                let val = parseNumber(betInput.value);
                if (isNaN(val) || val < 10) val = 10;
                if (val > 100000) val = 100000;
                if (val > balance && balance > 0) val = Math.min(balance, 100000);
                return val;
            }

            function applyBetPreset(amount) {
                if (isSpinning) return;
                let val;
                if (amount === 'max') {
                    val = Math.min(balance, 100000);
                    if (val < 10) val = 10;
                } else {
                    val = parseInt(amount);
                }
                val = Math.max(10, Math.min(val, 100000, balance));
                betInput.value = formatNumber(val);
                totalBetDisplay.innerText = formatNumber(val);
                betPresets.forEach(b => b.classList.remove('active'));
                betPresets.forEach(b => {
                    if (b.dataset.amount === String(amount) || (amount === 'max' && b.dataset.amount === 'max'))

                });
            }

                if (amount <= 0) return;
                const rect = balanceBox.getBoundingClientRect();
                const startX = window.innerWidth / 2 - 40;
                const startY = window.innerHeight / 2 - 40;
                const targetX = rect.left + rect.width / 2 - 16;
                const targetY = rect.top + 6;
                const count = Math.min(Math.floor(amount / 25) + 6, 60);

                for (let i = 0; i < count; i++) {
                    const coin = document.createElement('div');
                    coin.className = 'coin';
                    coin.textContent = '🪙';
                    const delay = Math.random() * 300;
                    const offX = (Math.random() - 0.5) * 140;
                    const offY = (Math.random() - 0.5) * 100 - 20;
                    const tx = targetX - startX + offX;
                    const ty = targetY - startY + offY;
                    coin.style.setProperty('--tx', tx + 'px');
                    coin.style.setProperty('--ty', ty + 'px');
                    coin.style.left = startX + 'px';
                    coin.style.top = startY + 'px';
                    coin.style.animationDuration = (800 + Math.random() * 200) + 'ms';

            function initGrid() {
                gridEl.innerHTML = '';
                cells = [];
                for (let i = 0; i < GRID_SIZE; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    const span = document.createElement('span');
                    span.className = 'sym';
                    const sym = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
                    span.textContent = sym;
                    span.dataset.symbol = sym;
                    cell.appendChild(span);
                    gridEl.appendChild(cell);
                    cells.push(cell);
                }
                currentGrid = cells.map(c => c.querySelector('.sym').textContent);
            }

            // =============================================================
            // 13. GAME LOGIC
            // =============================================================
            function startSpin(bet, isFreeSpin = false) {
                if (isSpinning) return;
                isSpinning = true;
                currentWin = 0;
                winDisplay.innerText = '0';
                btnSpin.disabled = true;
                btnAuto.disabled = true;
                betInput.disabled = true;
                betPresets.forEach(b => b.style.pointerEvents = 'none');
                btnCollect.style.display = 'none';
                winLinesCanvas.classList.remove('active');

                const label = isBonusActive ? `⚡ ФРИСПИН ${freeSpins} ⚡` : 'ВРАЩЕНИЕ...';
                statusBar.innerText = label;
                if (isBonusActive) statusBar.classList.add('bonus');
                else statusBar.classList.remove('bonus');

                cells.forEach(c => {
                    c.classList.remove('win-highlight', 'scatter-highlight');
                    c.querySelector('.sym').style.animation = '';
                    c.classList.add('spinning');
                });

                playThud();
                let count = 0;
                const maxCount = 12 + Math.floor(Math.random() * 10);
                const interval = setInterval(() => {
                    cells.forEach(c => {
                        const sym = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
                        const span = c.querySelector('.sym');
                        span.textContent = sym;
                        span.dataset.symbol = sym;
                    });
                    if (count % 2 === 0) playThud();
                    count++;
                    if (count > maxCount) {
                        clearInterval(interval);
                        cells.forEach(c => c.classList.remove('spinning'));
                        stopSpin(bet, isFreeSpin);
                    }
                }, 65);
            }

            function stopSpin(bet, isFreeSpin) {
                isSpinning = false;
                currentGrid = cells.map(c => c.querySelector('.sym').textContent);

                let totalMultiplier = 0;
                const winningIndices = new Set();
                let scatterCount = 0;

                for (let i = 0; i < GRID_SIZE; i++) {
                    if (currentGrid[i] === SCATTER) scatterCount++;
                }

                LINES.forEach(line => {
                    const sym = currentGrid[line[0]];
                    let matchCount = 1;
                    for (let i = 1; i < 5; i++) {
                        if (currentGrid[line[i]] === sym) matchCount++;
                        else break;
                    }
                    if (matchCount >= 3) {
                        const m = PAYTABLE[sym] && PAYTABLE[sym][matchCount];
                        if (m) {
                            totalMultiplier += m;
                            for (let i = 0; i < matchCount; i++) winningIndices.add(line[i]);
                        }
                    }
                });

                const finalMulti = isBonusActive ? totalMultiplier * bonusMultiplier : totalMultiplier;
                const betPerLine = bet / NUM_LINES;
                currentWin = Math.floor(betPerLine * finalMulti);

                if (scatterCount >= 3) {
                    const scatterWin = Math.floor(betPerLine * (scatterCount === 5 ? 4 : scatterCount === 4 ? 1.5 : 0.4));
                    currentWin += scatterWin;
                    for (let i = 0; i < GRID_SIZE; i++) {
                        if (currentGrid[i] === SCATTER) winningIndices.add(i);
                    }
                }

                if (currentWin > 0) {
                    winningIndices.forEach(idx => { cells[idx].classList.add('win-highlight'); });
                    drawWinLines([...winningIndices]);

                    if (currentWin > bet * 0.15) playWin();
                    else playCoin();

                    if (isBonusActive || isFreeSpin) {
                        bonusTotalWin += currentWin;
                        statusBar.innerText = `💰 ВЫИГРЫШ: ${formatNumber(currentWin)} ₽ (x${bonusMultiplier})`;
                        statusBar.classList.add('win');
                    } else {
                        pendingWin += currentWin;
                        statusBar.innerText =
                            `🎯 ВЫИГРЫШ: ${formatNumber(currentWin)} ₽ (накоплено: ${formatNumber(pendingWin)})`;
                        statusBar.classList.add('win');
                        btnCollect.style.display = 'flex';
                        btnSpin.style.display = 'none';
                        btnAuto.style.display = 'none';
                        triggerLightning();
                    }
                    if (currentWin > bet * 18) {
                        playBigWin();
                        triggerLightning();
                    }
                } else {
                    statusBar.innerText = '❌ ПОПРОБУЙТЕ СНОВА!';
                    statusBar.classList.remove('win');
                    statusBar.classList.add('lose');
                    playLose();
                    if (!isBonusActive && !isFreeSpin) {
                        btnSpin.disabled = false;
                        btnAuto.disabled = false;
                        betInput.disabled = false;
                        betPresets.forEach(b => b.style.pointerEvents = 'auto');
                        btnSpin.style.display = 'flex';
                        btnAuto.style.display = 'flex';
                        btnCollect.style.display = 'none';
                    }
                    setTimeout(() => statusBar.classList.remove('lose'), 800);
                }

                if (!isBonusActive && !isFreeSpin) {
                    updateProfileStats(bet, currentWin);
                }

                let bonusTriggered = false;
                if (scatterCount >= 3 && !bonusTriggered) {
                    const chance = 0.015 + (scatterCount - 3) * 0.025;
                    if (Math.random() < chance || scatterCount >= 5) {
                        const fsReward = scatterCount >= 5 ? 10 : 5;
                        for (let i = 0; i < GRID_SIZE; i++) {
                            if (currentGrid[i] === SCATTER) cells[i].classList.add('scatter-highlight');
                        }
                        setTimeout(() => {
                            triggerBonus(fsReward, `✨ ${scatterCount} скаттеров!`, '⚡',
                                'ГНЕВ ЗЕВСА!', `${fsReward} фриспинов!`,
                                'x2 множитель на все выигрыши');
                        }, 600);
                        bonusTriggered = true;
                    }
                }

                if (isBonusActive) {
                    freeSpins--;
                    updateFSDisplay();
                    if (freeSpins > 0) {
                        statusBar.innerText = `⚡ ФРИСПИН ${freeSpins} ⚡`;
                        statusBar.classList.add('bonus');
                        setTimeout(() => {
                            if (!isSpinning && !isAutoStopping) {
                                startSpin(bet, true);
                            }
                        }, 900);
                    } else {
                        setTimeout(() => endBonus(), 1400);
                    }
                } else {
                    if (!isFreeSpin && autoSpinActive && !isAutoStopping) {
                        autoSpinRemaining--;
                        updateAutoTotal();
                        if (autoSpinRemaining > 0 && balance >= getBet()) {
                            setTimeout(() => {
                                if (!isSpinning && autoSpinActive) {
                                    const nextBet = getBet();
                                    if (balance >= nextBet) {
                                        updateBalance(balance - nextBet, false);
                                        startSpin(nextBet, false);
                                    } else {
                                        stopAutoSpin('Недостаточно средств');
                                    }
                                }
                            }, 900);
                        } else {
                            stopAutoSpin('Авто-спин завершён');
                        }
                    } else if (!isFreeSpin && !autoSpinActive) {
                        btnSpin.disabled = false;
                        btnAuto.disabled = false;
                        betInput.disabled = false;
                        betPresets.forEach(b => b.style.pointerEvents = 'auto');
                        if (!isBonusActive) {
                            btnSpin.style.display = 'flex';
                            btnAuto.style.display = 'flex';
                        }
                    }
                }
            }

            // =============================================================
            // 14. BONUS
            // =============================================================
            function triggerBonus(spins, triggerText, icon, title, sub, detail) {
                if (isBonusActive && freeSpins > 0) {
                    freeSpins += spins;
                    updateFSDisplay();
                    showBonusPopup(icon, title, `+${spins} фриспинов! (всего ${freeSpins})`, detail);
                    statusBar.innerText = `⚡ БОНУС! +${spins} ФРИСПИНОВ ⚡`;
                    statusBar.classList.add('bonus');
                    return;
                }
                isBonusActive = true;
                bonusMultiplier = 2;
                freeSpins = spins;
                bonusTotalWin = 0;

                showBonusPopup(icon, title, sub, detail);
                statusBar.classList.add('bonus');
                statusBar.innerText = `⚡ ${triggerText} ⚡ ${freeSpins} ФРИСПИНОВ!`;
                updateFSDisplay();

                setTimeout(() => {
                    if (!isSpinning) {
                        const bet = getBet();
                        startSpin(bet, true);
                    }
                }, 1400);
            }

            function endBonus() {
                isBonusActive = false;
                freeSpins = 0;
                bonusMultiplier = 1;
                updateFSDisplay();
                statusBar.classList.remove('bonus', 'win');
                statusBar.innerText = `🏛️ БОНУС ЗАВЕРШЕН: +${formatNumber(bonusTotalWin)} ₽`;

                if (bonusTotalWin > 0) {
                    pendingWin += bonusTotalWin;
                    btnCollect.style.display = 'flex';
                    btnSpin.style.display = 'none';
                    btnAuto.style.display = 'none';
                    statusBar.innerText = `🎉 БОНУС ЗАВЕРШЕН! Накоплено: ${formatNumber(bonusTotalWin)} ₽`;
                } else {
                    btnSpin.disabled = false;
                    btnAuto.disabled = false;
                    betInput.disabled = false;
                    betPresets.forEach(b => b.style.pointerEvents = 'auto');
                    btnSpin.style.display = 'flex';
                    btnAuto.style.display = 'flex';
                    btnCollect.style.display = 'none';
                }

                if (autoSpinActive && !isAutoStopping) {
                    autoSpinRemaining--;
                    updateAutoTotal();
                    if (autoSpinRemaining > 0 && balance >= getBet()) {
                        setTimeout(() => {
                            if (!isSpinning && autoSpinActive) {
                                const nextBet = getBet();
                                if (balance >= nextBet) {
                                    updateBalance(balance - nextBet, false);
                                    startSpin(nextBet, false);
                                } else {
                                    stopAutoSpin('Недостаточно средств');
                                }
                            }
                        }, 1400);
                    } else {
                        stopAutoSpin('Авто-спин завершён');
                    }
                }

                if (bonusPopup.classList.contains('show')) {
                    setTimeout(() => bonusPopup.classList.remove('show'), 400);
                }
            }

            // =============================================================
            // 15. COLLECT
            // =============================================================
            btnCollect.addEventListener('click', function() {
                if (pendingWin > 0) {
                    const win = pendingWin;
                    pendingWin = 0;
                    animateCoinsToBalance(win);
                    updateBalance(balance + win, true);
                    statusBar.innerText = '💰 ЗАБРАНО ' + formatNumber(win) + ' ₽';
                    statusBar.classList.add('win');
                    btnCollect.style.display = 'none';
                    btnSpin.style.display = 'flex';
                    btnAuto.style.display = 'flex';
                    btnSpin.disabled = false;
                    btnAuto.disabled = false;
                    betInput.disabled = false;
                    betPresets.forEach(b => b.style.pointerEvents = 'auto');
                    winDisplay.innerText = '0';
                    cells.forEach(c => c.classList.remove('win-highlight', 'scatter-highlight'));
                    winLinesCanvas.classList.remove('active');
                    setTimeout(() => statusBar.classList.remove('win'), 1200);

                    if (autoSpinActive && !isAutoStopping) {
                        autoSpinRemaining--;
                        updateAutoTotal();
                        if (autoSpinRemaining > 0 && balance >= getBet()) {
                            setTimeout(() => {
                                if (!isSpinning && autoSpinActive) {
                                    const nextBet = getBet();
                                    if (balance >= nextBet) {
                                        updateBalance(balance - nextBet, false);
                                        startSpin(nextBet, false);
                                    } else {
                                        stopAutoSpin('Недостаточно средств');
                                    }
                                }
                            }, 800);
                        } else {
                            stopAutoSpin('Авто-спин завершён');
                        }
                    }
                }
            });

            // =============================================================
            // 16. AUTO SPIN
            // =============================================================
            function toggleAutoSpin() {
                if (autoSpinActive) { stopAutoSpin('Остановлено пользователем'); return; }
                if (isSpinning) return;
                const bet = getBet();
                if (balance < bet) {
                    statusBar.innerText = '❌ Недостаточно средств!';
                    statusBar.classList.add('lose');
                    setTimeout(() => statusBar.classList.remove('lose'), 1200);
                    return;
                }
                autoSpinTotal = parseInt(autoSpinsCount.value) || 10;
                autoSpinRemaining = autoSpinTotal;
                autoSpinActive = true;
                isAutoStopping = false;
                updateAutoTotal();
                btnAuto.textContent = '⏹ СТОП';
                btnAuto.classList.add('active');
                autoControls.style.display = 'flex';
                autoSpinsCount.disabled = true;
                btnSpin.disabled = true;
                betInput.disabled = true;
                betPresets.forEach(b => b.style.pointerEvents = 'none');
                statusBar.innerText = `🔁 АВТО-СПИН ${autoSpinRemaining}/${autoSpinTotal}`;
                updateBalance(balance - bet, false);
                startSpin(bet, false);
            }

            function stopAutoSpin(reason) {
                if (!autoSpinActive) return;
                autoSpinActive = false;
                isAutoStopping = false;
                btnAuto.textContent = '🔁 АВТО';
                btnAuto.classList.remove('active');
                autoControls.style.display = 'none';
                autoSpinsCount.disabled = false;
                if (!isSpinning) {
                    btnSpin.disabled = false;
                    betInput.disabled = false;
                    betPresets.forEach(b => b.style.pointerEvents = 'auto');
                    btnSpin.style.display = 'flex';
                    btnCollect.style.display = 'none';
                    btnAuto.style.display = 'flex';
                }
                if (reason) statusBar.innerText = `⏹ ${reason}`;
                autoTotalDisplay.textContent = '';
            }

            function updateAutoTotal() {
                if (autoSpinActive && autoSpinRemaining > 0) {
                    autoTotalDisplay.textContent = `Осталось: ${autoSpinRemaining}`;
                } else {
                    autoTotalDisplay.textContent = '';
                }
            }

            btnAuto.addEventListener('click', toggleAutoSpin);
            autoStopBtn.addEventListener('click', function() { stopAutoSpin('Остановлено пользователем'); });

            // =============================================================
            // 17. PROFILE STATS
            // =============================================================
            function updateProfileStats(bet, win) {
                try {
                    let played = parseInt(localStorage.getItem('profile_games_played')) || 0;
                    let totalBet = parseInt(localStorage.getItem('profile_total_bet')) || 0;
                    let totalWin = parseInt(localStorage.getItem('profile_total_win')) || 0;
                    let wins = parseInt(localStorage.getItem('profile_wins')) || 0;
                    let losses = parseInt(localStorage.getItem('profile_losses')) || 0;
                    played++;
                    totalBet += bet;
                    if (win > 0) { wins++;
                        totalWin += win; } else { losses++; }
                    localStorage.setItem('profile_games_played', String(played));
                    localStorage.setItem('profile_total_bet', String(totalBet));
                    localStorage.setItem('profile_total_win', String(totalWin));
                    localStorage.setItem('profile_wins', String(wins));
                    localStorage.setItem('profile_losses', String(losses));
                } catch (e) {}
            }

            // =============================================================
            // 18. BET PRESETS EVENTS
            // =============================================================
            betPresets.forEach(btn => {
                btn.addEventListener('click', function() {
                    playClick();
                    applyBetPreset(this.dataset.amount);
                });
            });

            betInput.addEventListener('input', function() {
                let raw = this.value.replace(/\s/g, '');
                let num = parseInt(raw) || 0;
                if (num < 0) num = 0;
                if (num > 100000) num = 100000;
                this.value = formatNumber(num);
                totalBetDisplay.innerText = formatNumber(num);
                betPresets.forEach(b => b.classList.remove('active'));
                betPresets.forEach(b => {
                    let pVal = b.dataset.amount;
                    if (pVal === 'max') return;
                    if (parseInt(pVal) === num) b.classList.add('active');
                });
            });

            betInput.addEventListener('blur', function() {
                let num = parseNumber(this.value);
                if (isNaN(num) || num < 10) num = 10;
                if (num > 100000) num = 100000;
                if (num > balance && balance > 0) num = Math.min(balance, 100000);
                this.value = formatNumber(num);
                totalBetDisplay.innerText = formatNumber(num);
            });

            // =============================================================
            // 19. SPIN BUTTON
            // =============================================================
            function btnSpinClick() {
                if (isSpinning) return;
                if (isBonusActive && freeSpins > 0) return;
                const bet = getBet();
                if (isNaN(bet) || bet < 10 || bet > 100000) {
                    statusBar.innerText = '❌ Ставка от 10 до 100 000 ₽';
                    statusBar.classList.add('lose');
                    setTimeout(() => statusBar.classList.remove('lose'), 1200);
                    return;
                }
                if (balance < bet) {
                    statusBar.innerText = '❌ Недостаточно средств! Баланс: ' + formatNumber(balance);
                    statusBar.classList.add('lose');
                    setTimeout(() => statusBar.classList.remove('lose'), 1500);
                    return;
                }
                playClick();
                if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
                updateBalance(balance - bet, false);
                startSpin(bet, false);
            }
            btnSpin.addEventListener('click', btnSpinClick);

            // =============================================================
            // 20. BACK
            // =============================================================
            btnBack.addEventListener('click', function() {
                if (autoSpinActive) stopAutoSpin('Выход в меню');
                window.location.href = 'casino.html?userId=' + userId;
            });

            // =============================================================
            // 21. KEYBOARD
            // =============================================================
            document.addEventListener('keydown', function(e) {
                if (e.code === 'Space' && !e.repeat) {
                    e.preventDefault();
                    if (!btnSpin.disabled && btnSpin.style.display !== 'none') btnSpin.click();
                    else if (!btnCollect.disabled && btnCollect.style.display !== 'none') btnCollect.click();
                }
            });

            // =============================================================
            // 22. INIT
            // =============================================================
            function init() {
                initAudio();
                initGrid();
                updateBalance(balance, false);
                const initialBet = Math.min(1000, balance);
                betInput.value = formatNumber(initialBet);
                totalBetDisplay.innerText = formatNumber(initialBet);
                updateFSDisplay();
                playMusic();
                betPresets.forEach(b => b.classList.remove('active'));
                betPresets.forEach(b => {
                    let pVal = b.dataset.amount;
                    if (pVal === 'max') return;
                    if (parseInt(pVal) === initialBet) b.classList.add('active');
                });
                setTimeout(() => {
                    if (btnSpin.disabled && !isSpinning) {
                        btnSpin.disabled = false;
                        betInput.disabled = false;
                        betPresets.forEach(b => b.style.pointerEvents = 'auto');
                    }
                }, 2000);

                document.addEventListener('visibilitychange', () => {
                    if (!document.hidden) { initParticles(); }
                });

                console.log('⚡ ZEUS PREMIUM SLOTS загружен, баланс:', balance);
            }

            init();

            window.__slots = {
                balance,
                isSpinning,
                autoSpinActive,
                freeSpins,
                isBonusActive,
                pendingWin,
                currentGrid
            };

        })();
    </script>

</body>
