<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Автомобили | Resell Tycoon</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
        body {
            background: linear-gradient(145deg, #0a0f1a 0%, #010101 100%);
            color: #ddd;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .card {
            background: rgba(20,30,50,0.8);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(0,255,255,0.3);
        }
        h2 { font-size: 28px; margin-bottom: 15px; background: linear-gradient(135deg, #ffcc44, #ff6644); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .balance { font-size: 18px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 30px; margin-bottom: 20px; text-align: center; }
        .car-item {
            background: rgba(0,0,0,0.5);
            border-radius: 24px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        .car-image img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 20px;
            border: 1px solid rgba(0,255,255,0.5);
        }
        .car-info {
            flex: 1;
        }
        .car-name { font-size: 18px; font-weight: bold; }
        .car-price { color: #ffaa44; }
        .car-income { font-size: 12px; color: #88ff88; }
        button {
            background: #2ecc71;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s;
        }
        button:active { transform: scale(0.96); }
        button.danger { background: #e74c3c; }
        button.secondary { background: #3498db; }
        .owned { background: #1e5631; color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; margin-top: 5px; }
        .current { background: #f39c12; }
        .loading { text-align: center; padding: 40px; }
        .back-btn {
            background: #555;
            margin-top: 20px;
            width: 100%;
        }
        .error { color: #ff8888; text-align: center; margin: 10px 0; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h2>🚗 Автосалон и гараж</h2>
        <div class="balance" id="balance">💰 Баланс: загрузка...</div>
    </div>
    <div class="card" id="carsList">
        <div class="loading">Загрузка автомобилей...</div>
    </div>
    <button class="back-btn" onclick="window.location.href='index.html'">🔙 На главную</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    const API_BASE = "https://api.resgame.ru";  // ваш домен API
    const userId = tg.initDataUnsafe.user.id;

    let balance = 0;
    let allCars = [];
    let myCarsIds = [];
    let currentCarId = null;

    async function fetchAPI(endpoint, method = 'GET', body = null) {
        const url = `${API_BASE}${endpoint}&tg_id=${userId}`;
        const options = { method, headers: { 'Content-Type': 'application/json' } };
        if (body) options.body = JSON.stringify(body);
        const resp = await fetch(url, options);
        if (!resp.ok) throw new Error(await resp.text());
        return resp.json();
    }

    async function loadBalance() {
        const data = await fetchAPI(`/api/me`);
        balance = data.balance;
        document.getElementById('balance').innerHTML = `💰 Баланс: ${balance.toLocaleString()}₽`;
    }

    async function loadCars() {
        // получаем список всех машин
        const carsResp = await fetch(`${API_BASE}/api/cars`);
        allCars = await carsResp.json();
        // получаем коллекцию игрока
        const collection = await fetchAPI(`/api/car_collection`);
        myCarsIds = collection.cars.map(c => c.id);
        currentCarId = collection.cars.find(c => c.is_current)?.id || null;
        renderCars();
    }

    async function buyCar(carId, price) {
        if (balance < price) {
            tg.showAlert(`❌ Не хватает денег! Нужно ${price.toLocaleString()}₽`);
            return;
        }
        const result = await fetchAPI(`/api/buy_car&car_id=${carId}`, 'POST', { car_id: carId });
        if (result.balance !== undefined) {
            tg.showAlert(`✅ Машина куплена! Баланс: ${result.balance.toLocaleString()}₽`);
            await loadBalance();
            await loadCars();
        } else {
            tg.showAlert(`❌ Ошибка: ${result.message}`);
        }
    }

    async function setCurrentCar(carId) {
        await fetchAPI(`/api/set_current_car&car_id=${carId}`, 'POST', { car_id: carId });
        tg.showAlert(`✅ Текущая машина изменена`);
        await loadCars();
    }

    function renderCars() {
        const container = document.getElementById('carsList');
        if (!allCars.length) {
            container.innerHTML = '<div class="loading">Нет данных об автомобилях</div>';
            return;
        }
        let html = '<h2>🏎 Доступные автомобили</h2>';
        for (let car of allCars) {
            const owned = myCarsIds.includes(car.id);
            const isCurrent = (currentCarId === car.id);
            const imageUrl = car.image_url ? `${API_BASE}/api/image/${car.image_url}` : '';
            html += `
                <div class="car-item">
                    <div class="car-image">
                        ${imageUrl ? `<img src="${imageUrl}" alt="${car.name}" loading="lazy">` : '<div style="width:80px;height:80px;background:#333;border-radius:20px;"></div>'}
                    </div>
                    <div class="car-info">
                        <div class="car-name">${car.name}</div>
                        <div class="car-price">💰 ${car.price.toLocaleString()}₽</div>
                        <div class="car-income">⚡ +${car.speed_bonus}% к гонкам | 💰 +${car.income_per_hour}₽/час</div>
                        ${owned ? '<span class="owned">✅ В гараже</span>' : ''}
                        ${isCurrent ? '<span class="owned current">🚗 ТЕКУЩАЯ</span>' : ''}
                    </div>
                    <div class="car-actions">
                        ${!owned ? `<button onclick="buyCar('${car.id}', ${car.price})">🛒 Купить</button>` : ''}
                        ${owned && !isCurrent ? `<button class="secondary" onclick="setCurrentCar('${car.id}')">🚗 Сделать текущей</button>` : ''}
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    (async () => {
        await loadBalance();
        await loadCars();
    })();
</script>
</body>
</html>
