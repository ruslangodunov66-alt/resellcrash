<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Казино | R-Game</title>
    <!-- Подключаем Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 20%, #0a0e1a, #010101);
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .menu-container { width: 100%; max-width: 500px; }
        .game-card {
            background: linear-gradient(145deg, rgba(20,28,40,0.95), rgba(10,15,25,0.98));
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 30px 20px;
            text-align: center;
            border: 1px solid rgba(0,255,255,0.5);
            box-shadow: 0 0 20px rgba(0,255,255,0.2);
        }
        h2 { font-size: 36px; background: linear-gradient(135deg, #ffcc44, #ff6644); background-clip: text; -webkit-background-clip: text; color: transparent; margin-bottom: 20px; }
        .games-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin: 30px 0;
        }
        .game-btn {
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(0,255,255,0.4);
            border-radius: 30px;
            padding: 18px 0;
            width: 140px;
            text-align: center;
            cursor: pointer;
            transition: 0.1s;
            font-size: 20px;
            font-weight: bold;
            color: #ffdd99;
        }
        .game-btn:active { transform: scale(0.96); background: #ffaa44; color: #0a0f1a; }
        .home-btn {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            border: none;
            border-radius: 50px;
            padding: 14px 20px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            margin-top: 20px;
            width: 80%;
        }
        .home-btn:active { transform: scale(0.96); }
    </style>
</head>
<body>
<div class="menu-container">
    <div class="game-card">
        <h2>🎰 ВЫБЕРИ ИГРУ</h2>
        <div class="games-grid">
            <div class="game-btn" data-game="slots">🎰 СЛОТЫ</div>
            <div class="game-btn" data-game="roulette">🎡 РУЛЕТКА</div>
            <div class="game-btn" data-game="blackjack">🃏 БЛЭКДЖЕК</div>
            <div class="game-btn" data-game="mines">💣 МАЙНЁР</div>
            <div class="game-btn" data-game="crash">📈 КРАШ</div>
        </div>
        <button class="home-btn" id="homeBtn">🏠 НА ГЛАВНУЮ</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();          // Разворачиваем WebApp на весь экран
    tg.ready();           // Сообщаем Telegram, что приложение готово

    // Функция для открытия выбранной игры
    function openGame(gameName) {
        // Отправляем данные боту, чтобы он зафиксировал ставку (если нужно)
        // Здесь можно отправить событие о старте игры, но обычно логика внутри самих игр
        // Теперь перенаправляем на страницу конкретной игры
        window.location.href = `${gameName}.html`;
    }

    // Обработчики кликов
    document.querySelectorAll('.game-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const game = btn.getAttribute('data-game');
            openGame(game);
        });
    });

    // Кнопка "На главную"
    document.getElementById('homeBtn').addEventListener('click', () => {
        // Перенаправляем на главное меню бота (предполагается, что оно лежит в index.html)
        window.location.href = 'index.html';
    });
</script>
</body>
</html>
