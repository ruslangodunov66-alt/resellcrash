<style>
    :root {
        --bg-main: #06090f;
        --accent-gold: #d4af37;
        --accent-glow: rgba(212, 175, 55, 0.3);
        --cell-bg: rgba(255, 255, 255, 0.03);
        --cell-border: rgba(255, 255, 255, 0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
        background: var(--bg-main);
        font-family: 'Inter', system-ui, sans-serif;
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 10px;
    }

    .game-container {
        width: 100%;
        max-width: 480px;
        background: #0d121b;
        border-radius: 32px;
        padding: 24px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    }

    .multiplier-panel {
        background: linear-gradient(180deg, #161d29 0%, #0d121b 100%);
        border: 1px solid var(--accent-gold);
        border-radius: 24px;
        padding: 20px;
        margin-bottom: 24px;
        position: relative;
        box-shadow: 0 0 30px var(--accent-glow);
    }

    .multiplier {
        font-size: 48px;
        font-weight: 800;
        letter-spacing: -2px;
        color: #fff;
        text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 12px;
        margin: 24px 0;
    }

    .cell {
        aspect-ratio: 1/1;
        background: var(--cell-bg);
        border: 1px solid var(--cell-border);
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        cursor: pointer;
    }

    .cell:hover { border-color: var(--accent-gold); }

    .cell.opened {
        background: rgba(212, 175, 55, 0.1);
        border-color: var(--accent-gold);
        transform: rotateY(180deg);
    }

    .cell.mine {
        background: #ff3344;
        box-shadow: 0 0 20px rgba(255, 51, 68, 0.4);
    }

    .bet-control, .mines-select {
        margin-bottom: 20px;
        background: rgba(255,255,255,0.02);
        padding: 10px;
        border-radius: 20px;
    }

    button {
        background: var(--accent-gold);
        color: #000;
        font-weight: 900;
        border: none;
        padding: 14px 20px;
        border-radius: 16px;
        transition: transform 0.2s, opacity 0.2s;
    }

    button:active { transform: scale(0.95); }
    
    .btn-cashout { background: #00c853; color: white; }
    
    .status {
        margin-top: 15px;
        padding: 12px;
        background: rgba(255,255,255,0.03);
        border-radius: 12px;
        font-size: 12px;
        color: #8899a6;
    }
</style>
