<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Скачки · R-GAME</title>
    <script src="https://telegram.org/js/telegram-web-app.js">
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800;900&family=Nunito:wght@600;700;800;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Nunito', sans-serif;
            background: #0a0f1a;
            color: #fff;
            position: fixed;
            top: 0;
            left: 0;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: radial-gradient(ellipse at 50% 0%, rgba(255, 213, 74, 0.06), transparent 60%);
            padding: 8px 10px 10px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 15, 26, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 8px 14px;
            border: 1px solid rgba(255, 213, 74, 0.15);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
            flex-shrink: 0;
            margin-bottom: 8px;
            min-height: 48px;
        }
        .header .left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-back {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 213, 74, 0.2);
            border-radius: 50%;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FFD54A;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
            flex-shrink: 0;
        }
        .btn-back:active {
            transform: scale(0.88);
            background: rgba(255, 213, 74, 0.1);
        }
        .brand {
            font-family: 'Cinzel', serif;
            font-size: 20px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, #FFD54A);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .brand span {
            color: #FFD54A;
            -webkit-text-fill-color: #FFD54A;
        }

        .balance-box {
            background: rgba(0, 0, 0, 0.4);
            padding: 4px 14px;
            border-radius: 30px;
            border: 1px solid rgba(255, 213, 74, 0.15);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .balance-label {
            font-size: 9px;
            text-transform: uppercase;
            color: #FFD54A;
            opacity: 0.5;
            letter-spacing: 1px;
        }
        .balance-value {
            font-family: 'Cinzel', serif;
            font-size: 17px;
            font-weight: 900;
            color: #fff;
        }

        /* ===== ТРЕК — УЛУЧШЕННЫЙ ===== */
        .race-wrapper {
            flex: 0 0 auto;
            width: 100%;
            height: 30vh;
            min-height: 220px;
            aspect-ratio: 16 / 9;
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            background: #0a0f1a;
            border: 1px solid rgba(255, 213, 74, 0.08);
            box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.7);
        }
        #raceCanvas {
            width: 100%;
            height: 100%;
            display: block;
            image-rendering: auto;
        }

        /* ===== ТАБЛО ЛИДЕРОВ (справа) — УЛУЧШЕННОЕ ===== */
        .leaderboard {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 10;
            background: rgba(15, 20, 35, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 14px;
            padding: 10px 14px;
            border: 1px solid rgba(255, 213, 74, 0.3);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
            display: none;
            flex-direction: column;
            gap: 4px;
            min-width: 120px;
            font-family: 'Nunito', sans-serif;
            transition: opacity 0.3s;
        }
        .leaderboard.show {
            display: flex;
        }
        .leaderboard .lb-header {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding-bottom: 4px;
            margin-bottom: 4px;
        }
        .leaderboard .lb-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 700;
            color: #fff;
        }
        .leaderboard .lb-item .lb-pos {
            font-size: 11px;
            font-weight: 800;
            color: #FFD54A;
            min-width: 18px;
            text-align: right;
        }
        .leaderboard .lb-item .lb-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            border: 1px solid rgba(255, 255, 255, 0.15);
            flex-shrink: 0;
        }
        .leaderboard .lb-item .lb-name {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 13px;
        }

        /* ===== ИСТОРИЯ ЗАЕЗДОВ ===== */
        .history-bar {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 0;
            flex-shrink: 0;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            margin-top: 2px;
        }
        .history-bar::-webkit-scrollbar {
            display: none;
        }
        .history-bar .h-label {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            margin-right: 4px;
            flex-shrink: 0;
        }
        .history-dot {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.08);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
            transition: transform 0.2s;
            background: rgba(0, 0, 0, 0.3);
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.5);
        }
        .history-dot.win {
            border-color: #FFD54A;
            box-shadow: 0 0 12px rgba(255, 213, 74, 0.2), inset 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        /* ===== НИЖНЯЯ ПАНЕЛЬ ===== */
        .bottom-panel {
            flex: 1;
            flex-shrink: 0;
            padding: 6px 0 4px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: linear-gradient(180deg, transparent 0%, rgba(10, 15, 26, 0.6) 100%);
            border-radius: 0 0 16px 16px;
            justify-content: flex-end;
        }

        /* ---- КНОПКИ БЫСТРЫХ СТАВОК ---- */
        .quick-bet-row {
            display: flex;
            gap: 4px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .quick-bet-btn {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 213, 74, 0.06);
            border-radius: 20px;
            padding: 2px 14px;
            font-size: 11px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.25);
            cursor: pointer;
            transition: all 0.2s;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-family: 'Nunito', sans-serif;
        }
        .quick-bet-btn:active {
            transform: scale(0.92);
            background: rgba(255, 213, 74, 0.06);
        }
        .quick-bet-btn:hover {
            border-color: rgba(255, 213, 74, 0.15);
            color: rgba(255, 255, 255, 0.5);
        }

        /* ---- ЛОШАДИ ---- */
        .horse-selector {
            display: flex;
            gap: 6px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .horse-btn {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.04) 0%, rgba(0, 0, 0, 0.4) 100%);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 18px;
            padding: 8px 12px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            min-width: 92px;
            max-width: none;
            height: 110px;
            position: relative;
            justify-content: center;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }
        .horse-btn .thumb {
            width: 58px;
            height: 58px;
            object-fit: contain;
            display: block;
            border-radius: 6px;
            filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.6));
            transition: transform 0.3s;
        }
        .horse-btn .hname {
            font-size: 13px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 4px;
            letter-spacing: 0.3px;
            white-space: nowrap;
            transition: color 0.2s;
        }
        .horse-btn .hodds {
            font-size: 11px;
            color: #FFD54A;
            font-weight: 900;
            opacity: 0.7;
            letter-spacing: 0.5px;
        }
        .horse-btn.active {
            border: 1px solid #FFD54A;
            background: linear-gradient(180deg, rgba(255, 213, 74, 0.08) 0%, rgba(255, 213, 74, 0.02) 100%);
            box-shadow: 0 0 20px rgba(255, 213, 74, 0.15), inset 0 0 20px rgba(255, 213, 74, 0.04);
            transform: translateY(-2px);
            animation: pulseActive 1.5s ease-in-out infinite;
        }
        @keyframes pulseActive {
            0% { transform: translateY(-2px) scale(1); }
            50% { transform: translateY(-4px) scale(1.02); }
            100% { transform: translateY(-2px) scale(1); }
        }
        .horse-btn.active .hname {
            color: #fff;
        }
        .horse-btn.active .hodds {
            opacity: 1;
        }
        .horse-btn:active {
            transform: scale(0.94);
            animation: none;
        }

        /* ---- УПРАВЛЕНИЕ ---- */
        .controls-row {
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }
        .bet-group {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
            min-width: 140px;
            justify-content: center;
        }
        .bet-input {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 213, 74, 0.08);
            border-radius: 22px;
            padding: 8px 14px;
            color: #fff;
            font-size: 20px;
            font-weight: 700;
            width: 120px;
            text-align: center;
            font-family: 'Nunito', sans-serif;
            height: 56px;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.5);
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .bet-input:focus {
            outline: none;
            border-color: rgba(255, 213, 74, 0.3);
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.5), 0 0 20px rgba(255, 213, 74, 0.04);
        }
        .bet-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
        }

        /* ---- ВОЗМОЖНЫЙ ВЫИГРЫШ ---- */
        .potential-win {
            font-size: 14px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.2);
            text-align: center;
            min-height: 24px;
            letter-spacing: 0.5px;
            transition: color 0.3s;
        }
        .potential-win .win-amount {
            color: #3DDC84;
            font-weight: 900;
            font-size: 18px;
            text-shadow: 0 0 30px rgba(61, 220, 132, 0.15);
        }

        /* ---- КНОПКИ ---- */
        .btn {
            border: none;
            border-radius: 22px;
            padding: 0 30px;
            font-weight: 800;
            font-size: 22px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            font-family: 'Nunito', sans-serif;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            min-width: 80px;
        }
        .btn:active {
            transform: scale(0.94);
        }
        .btn:disabled {
            opacity: 0.25;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .btn-bet {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 213, 74, 0.15);
            color: #FFD54A;
            flex: 0 1 auto;
            min-width: 80px;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        .btn-bet.active {
            background: rgba(255, 213, 74, 0.08);
            border-color: #FFD54A;
            box-shadow: 0 0 25px rgba(255, 213, 74, 0.08);
        }
        .btn-bet:active {
            background: rgba(255, 213, 74, 0.12);
        }

        .btn-start {
            background: linear-gradient(135deg, #3DDC84 0%, #1a8a4a 100%);
            color: #fff;
            flex: 1;
            min-width: 80px;
            font-size: 24px;
            box-shadow: 0 4px 20px rgba(61, 220, 132, 0.3);
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.15);
        }
        .btn-start:active:not(:disabled) {
            transform: scale(0.94);
            box-shadow: 0 2px 10px rgba(61, 220, 132, 0.2);
        }
        .btn-start:disabled {
            background: #2a2a2a;
            color: #555;
            box-shadow: none;
            text-shadow: none;
        }

        /* ---- СТАТУС ---- */
        .status-bar {
            text-align: center;
            font-size: 14px;
            font-weight: 700;
            min-height: 24px;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 0.5px;
            padding: 4px 0;
            transition: all 0.3s;
        }
        .status-bar.win {
            color: #3DDC84;
            text-shadow: 0 0 30px rgba(61, 220, 132, 0.15);
        }
        .status-bar.lose {
            color: #E85555;
            text-shadow: 0 0 30px rgba(232, 85, 85, 0.15);
        }
        .status-bar.info {
            color: #FFD54A;
            text-shadow: 0 0 30px rgba(255, 213, 74, 0.1);
        }
        .status-bar.race {
            color: #7DF9FF;
            text-shadow: 0 0 30px rgba(125, 249, 255, 0.15);
        }

        /* ---- WIN OVERLAY ---- */
        .win-overlay {
            position: absolute;
            inset: 0;
            z-index: 30;
            display: none;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            overflow: hidden;
            animation: fadeInWin 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .win-overlay.show {
            display: flex;
        }
        @keyframes fadeInWin {
            0% { opacity: 0; transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1); }
        }

        .win-overlay-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }
        .win-overlay-darken {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 1;
        }
        .win-panel {
            position: relative;
            z-index: 2;
            width: 88%;
            max-width: 420px;
            background: rgba(8, 12, 24, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 28px;
            border: 2px solid rgba(255, 213, 74, 0.2);
            padding: 28px 24px 32px;
            box-shadow: 0 0 80px rgba(255, 213, 74, 0.06), 0 20px 60px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: visible;
        }
        .win-panel::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 30px;
            background: linear-gradient(135deg, rgba(255, 213, 74, 0.1), transparent 40%, transparent 60%, rgba(255, 213, 74, 0.05));
            z-index: -1;
            pointer-events: none;
        }
        .win-text-area {
            width: 100%;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px 0;
            position: relative;
        }
        .win-horse-slot {
            position: absolute;
            right: -10px;
            top: 50%;
            transform: translateY(-50%);
            width: 35%;
            height: 70%;
            pointer-events: none;
            z-index: 3;
        }
        .win-coin-slot {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }
        .win-close-btn {
            position: absolute;
            top: 12px;
            right: 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            z-index: 10;
        }
        .win-close-btn:active {
            transform: scale(0.88);
            background: rgba(255, 255, 255, 0.06);
        }

        /* ---- RESULT OVERLAY ---- */
        .result-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 20;
            display: none;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            animation: fadeOverlay 0.4s ease;
        }
        .result-overlay.show {
            display: flex;
        }
        @keyframes fadeOverlay {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .result-card {
            background: linear-gradient(160deg, rgba(20, 30, 50, 0.95), rgba(10, 15, 26, 0.98));
            border: 2px solid rgba(255, 213, 74, 0.25);
            border-radius: 24px;
            padding: 28px 30px 24px;
            text-align: center;
            max-width: 320px;
            width: 92%;
            box-shadow: 0 0 80px rgba(255, 213, 74, 0.06), 0 20px 60px rgba(0, 0, 0, 0.8);
            animation: popResult 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }
        @keyframes popResult {
            from { transform: scale(0.7) translateY(20px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }
        .result-card .emoji-big {
            font-size: 56px;
            display: block;
            margin-bottom: 4px;
            filter: drop-shadow(0 0 30px rgba(255, 213, 74, 0.15));
        }
        .result-card .r-name {
            font-size: 22px;
            font-weight: 900;
            color: #FFD54A;
            font-family: 'Cinzel', serif;
        }
        .result-card .r-amount {
            font-size: 18px;
            margin: 6px 0 4px;
            font-weight: 800;
        }
        .result-card .r-amount.win-text {
            color: #3DDC84;
        }
        .result-card .r-amount.lose-text {
            color: #E85555;
        }
        .result-card .r-sub {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.25);
            margin-bottom: 12px;
        }
        .result-card .btn-ok {
            background: linear-gradient(135deg, #FFD54A, #b8860b);
            color: #0a0f1a;
            font-weight: 900;
            border: none;
            padding: 10px 32px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Nunito', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 20px rgba(255, 213, 74, 0.15);
        }
        .result-card .btn-ok:active {
            transform: scale(0.94);
        }

        /* ===== МЕДИА-ЗАПРОСЫ ===== */
        @media (max-width: 480px) {
            .header { padding: 6px 10px; min-height: 42px; }
            .brand { font-size: 16px; }
            .balance-value { font-size: 14px; }
            .btn-back { width: 30px; height: 30px; font-size: 15px; }
            .race-wrapper { height: 25vh; min-height: 180px; }
            .horse-btn { min-width: 70px; height: 90px; padding: 6px 8px; }
            .horse-btn .thumb { width: 44px; height: 44px; }
            .horse-btn .hname { font-size: 11px; }
            .bet-input { width: 90px; font-size: 18px; height: 48px; }
            .btn { font-size: 18px; height: 48px; padding: 0 20px; min-width: 70px; border-radius: 18px; }
            .btn-start { font-size: 20px; min-width: 70px; }
            .result-card { padding: 20px 18px 18px; }
            .result-card .emoji-big { font-size: 44px; }
            .result-card .r-name { font-size: 18px; }
            .status-bar { font-size: 12px; min-height: 20px; }
            .controls-row { gap: 6px; }
            .win-panel { padding: 20px 16px 24px; width: 92%; }
            .win-text-area { min-height: 100px; }
            .win-horse-slot { right: -4px; width: 30%; }
            .quick-bet-btn { font-size: 10px; padding: 2px 10px; height: 22px; }
            .leaderboard { padding: 8px 10px; min-width: 90px; top: 8px; right: 8px; }
            .leaderboard .lb-item { font-size: 12px; gap: 6px; }
            .leaderboard .lb-item .lb-name { font-size: 12px; }
            .leaderboard .lb-header { font-size: 8px; }

            .btn-start { font-size: 16px; min-width: 56px; }

</head>
<body>

                <div class="win-overlay-darken"></div>
                <div class="win-panel">

        <div class="bottom-panel">

            <!-- КНОПКИ БЫСТРЫХ СТАВОК -->
            <div class="quick-bet-row">
                <button class="quick-bet-btn" data-quick="min">МИН</button>
                <button class="quick-bet-btn" data-quick="half">/2</button>
                <button class="quick-bet-btn" data-quick="double">X2</button>
                <button class="quick-bet-btn" data-quick="max">MAX</button>

            <div class="controls-row">
                <div class="bet-group">
                    <input type="number" class="bet-input" id="betInput" value="100" min="10" step="10" />
                    <button class="btn btn-bet" id="betBtn">СТАВКА</button>
                </div>
                <button class="btn btn-start" id="startBtn" disabled>🏁 СТАРТ</button>
            </div>

            <!-- ВОЗМОЖНЫЙ ВЫИГРЫШ -->

                Возможный выигрыш: <span class="win-amount" id="winAmountDisplay">0 ₽</span>

    </div>

    <!-- ЗВУКИ -->
    <audio id="raceSound" loop preload="auto">
        <source src="0011299.mp3" type="audio/mpeg">
    </audio>
    <audio id="herdSound" loop preload="auto">
        <source src="horse/herd-of-horses-2.mp3" type="audio/mpeg">
    </audio>

    <script>
        (function() {
            'use strict';

            // =============================================================
            // 1. TELEGRAM
            // =============================================================
            const tg = window.Telegram.WebApp;
            if (tg) { tg.expand();
                tg.enableClosingConfirmation(); }
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('userId') || (tg?.initDataUnsafe?.user?.id) || '';

            // =============================================================
            // 2. БАЛАНС
            // =============================================================
            let balance = parseInt(localStorage.getItem('casinoBalance')) || 0;
            const balanceDisplay = document.getElementById('balanceDisplay');

            function updateBalanceDisplay() {
                balanceDisplay.innerText = balance.toLocaleString() + ' ₽';
            }
            updateBalanceDisplay();

            // =============================================================
            // 3. КОНФИГ ЛОШАДЕЙ
            // =============================================================
            const BASE_URL = 'https://raw.githubusercontent.com/ruslangodunov66-alt/resellcrash/main/horse/';

            const HORSES = [
                { id: 0, name: 'Молния', img: BASE_URL + 'IMG_0452.PNG', color: '#E74C3C', lane: 0, letter: 'М' },
                { id: 1, name: 'Вихрь', img: BASE_URL + 'IMG_0453.PNG', color: '#3498DB', lane: 1, letter: 'В' },
                { id: 2, name: 'Гром', img: BASE_URL + 'IMG_0454.PNG', color: '#2ECC71', lane: 2, letter: 'Г' },
                { id: 3, name: 'Зефир', img: BASE_URL + 'IMG_0455.PNG', color: '#F1C40F', lane: 3, letter: 'З' },
                { id: 4, name: 'Тень', img: BASE_URL + 'IMG_0456.PNG', color: '#9B59B6', lane: 4, letter: 'Т' },
                { id: 5, name: 'Сокол', img: BASE_URL + 'IMG_0457.PNG', color: '#E67E22', lane: 5, letter: 'С' }
            ];

            const TRACK_IMAGE = BASE_URL + 'VEux9kYOWxh76c7RwQzuXANIZG1ubOe0RnNv6F9hUF4X8sf87LkBB913Dok_RAxCn_noaI-gouxxGx-9rEECChGn.jpg';
            const WIN_BG_IMAGE = 'https://raw.githubusercontent.com/ruslangodunov66-alt/resellcrash/main/photo_2026-07-08_11-53-52.jpg';

            // =============================================================
            // 4. DOM
            // =============================================================
            const canvas = document.getElementById('raceCanvas');
            const ctx = canvas.getContext('2d');
            const horseSelector = document.getElementById('horseSelector');
            const betInput = document.getElementById('betInput');
            const betBtn = document.getElementById('betBtn');
            const startBtn = document.getElementById('startBtn');
            const statusMsg = document.getElementById('statusMsg');
            const resultOverlay = document.getElementById('resultOverlay');
            const rEmoji = document.getElementById('rEmoji');
            const rName = document.getElementById('rName');
            const rAmount = document.getElementById('rAmount');
            const rSub = document.getElementById('rSub');
            const resultOk = document.getElementById('resultOk');
            const backBtn = document.getElementById('backBtn');
            const raceSound = document.getElementById('raceSound');
            const herdSound = document.getElementById('herdSound');
            const winOverlay = document.getElementById('winOverlay');
            const winBgImage = document.getElementById('winBgImage');
            const winCloseBtn = document.getElementById('winCloseBtn');
            const winTextArea = document.getElementById('winTextArea');
            const winHorseSlot = document.getElementById('winHorseSlot');
            const winCoinSlot = document.getElementById('winCoinSlot');
            const leaderboard = document.getElementById('leaderboard');
            const lbContent = document.getElementById('lbContent');
            const historyBar = document.getElementById('historyBar');
            const potentialWinEl = document.getElementById('potentialWin');
            const winAmountDisplay = document.getElementById('winAmountDisplay');

            const quickBtns = document.querySelectorAll('.quick-bet-btn');

            // =============================================================
            // 5. СОСТОЯНИЕ
            // =============================================================
            let selectedHorseId = null;
            let betAmount = 100;
            let isRaceRunning = false;
            let hasBet = false;
            let raceFinished = false;
            let racePositions = [];
            let winnerId = null;
            let animationId = null;
            let horseImages = {};
            let trackImage = null;
            let winBgImg = null;
            let ready = false;

            // ---- ПЫЛЬ ----
            let dustParticles = [];

            // ---- ИСТОРИЯ ПОБЕДИТЕЛЕЙ ----
            let historyWinners = [];
            const MAX_HISTORY = 12;

            // ---- КОЭФФИЦИЕНТЫ ----
            let horseOdds = HORSES.map(() => (1.2 + Math.random() * 2.0).toFixed(1));

            // =============================================================
            // 6. ЗАГРУЗКА ИЗОБРАЖЕНИЙ
            // =============================================================
            function loadImage(src) {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.crossOrigin = 'anonymous';
                    img.src = src;
                    img.onload = () => resolve(img);
                    img.onerror = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = 80;
                        canvas.height = 60;
                        const c = canvas.getContext('2d');
                        c.fillStyle = '#555';
                        c.fillRect(0, 0, 80, 60);
                        c.fillStyle = '#fff';
                        c.font = '24px sans-serif';
                        c.textAlign = 'center';
                        c.textBaseline = 'middle';
                        c.fillText('🐎', 40, 30);
                        const fallback = new Image();
                        fallback.src = canvas.toDataURL();
                        resolve(fallback);
                    };
                });
            }

            async function loadAllImages() {
                try {
                    trackImage = await loadImage(TRACK_IMAGE);
                    winBgImg = await loadImage(WIN_BG_IMAGE);
                    for (const h of HORSES) {
                        const img = await loadImage(h.img);
                        horseImages[h.id] = img;
                    }
                    ready = true;
                    resizeCanvas();
                    resetGame();
                    initHistory();
                } catch (e) {
                    console.warn('Ошибка загрузки изображений:', e);
                    ready = true;
                    resizeCanvas();
                    resetGame();
                    initHistory();
                }
            }

            // =============================================================
            // 7. РАЗМЕР CANVAS
            // =============================================================
            function resizeCanvas() {
                const rect = canvas.parentElement.getBoundingClientRect();
                const dpr = window.devicePixelRatio || 1;
                canvas.width = rect.width * dpr;
                canvas.height = rect.height * dpr;
                canvas.style.width = rect.width + 'px';
                canvas.style.height = rect.height + 'px';
                ctx.scale(dpr, dpr);
                if (ready) render();
            }

            const resizeObserver = new ResizeObserver(() => resizeCanvas());
            resizeObserver.observe(canvas.parentElement);
            window.addEventListener('resize', resizeCanvas);

            // =============================================================
            // 8. КОНСТАНТЫ ОТРИСОВКИ
            // =============================================================
            const LANE_Y = [
                0.135, 0.275, 0.415, 0.535, 0.675, 0.815
            ];
            const START_X = 0.07;
            const FINISH_X = 0.90;
            const HORSE_HEIGHT_RATIO = 0.13;
            const HORSE_WIDTH_RATIO = 0.13 * 1.55;
            const DRAW_OFFSET_X = 0.15;
            const DRAW_OFFSET_Y = 0.40;

            // =============================================================
            // 9. ПЫЛЬ
            // =============================================================
            function spawnDust(x, y, count) {
                for (let i = 0; i < count; i++) {
                    dustParticles.push({
                        x: x + (Math.random() - 0.5) * 20,
                        y: y + (Math.random() - 0.5) * 10,
                        vx: (Math.random() - 0.5) * 0.8 - 0.3,
                        vy: -0.2 - Math.random() * 0.5,
                        life: 1,
                        decay: 0.008 + Math.random() * 0.015,
                        size: 2 + Math.random() * 5,
                        alpha: 0.4 + Math.random() * 0.3
                    });
                }
            }

            function updateDust() {
                for (let i = dustParticles.length - 1; i >= 0; i--) {
                    const p = dustParticles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.01;
                    p.life -= p.decay;
                    if (p.life <= 0) {
                        dustParticles.splice(i, 1);
                    }
                }
                if (dustParticles.length > 400) {
                    dustParticles.splice(0, dustParticles.length - 400);
                }
            }

            function drawDust(w, h) {
                for (const p of dustParticles) {
                    const alpha = p.life * p.alpha;
                    ctx.globalAlpha = alpha * 0.6;
                    ctx.fillStyle = '#c4a882';
                    ctx.shadowBlur = 0;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
            }

            // =============================================================
            // 10. РЕНДЕРИНГ — ИСПРАВЛЕННЫЙ (без обрезки, с линиями и подсветкой)
            // =============================================================
            function render() {
                const dpr = window.devicePixelRatio || 1;
                const w = canvas.width / dpr;
                const h = canvas.height / dpr;

                ctx.clearRect(0, 0, w, h);

                // ---- ФОН (трек) – простое растягивание без обрезки ----
                if (trackImage && trackImage.complete && trackImage.naturalWidth > 0) {
                    ctx.drawImage(trackImage, 0, 0, w, h);
                } else {
                    const grad = ctx.createLinearGradient(0, 0, 0, h);
                    grad.addColorStop(0, '#1a3a1a');
                    grad.addColorStop(0.5, '#2d5a2d');
                    grad.addColorStop(1, '#1a3a1a');
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, w, h);
                }

                // ---- СТАРТОВАЯ И ФИНИШНАЯ ЛИНИИ ----
                ctx.save();
                ctx.setLineDash([8, 8]);
                ctx.strokeStyle = 'rgba(255,255,255,0.25)';
                ctx.lineWidth = 2;
                // Старт
                ctx.beginPath();
                ctx.moveTo(w * START_X, 0);
                ctx.lineTo(w * START_X, h);
                ctx.stroke();
                // Финиш
                ctx.beginPath();
                ctx.moveTo(w * FINISH_X, 0);
                ctx.lineTo(w * FINISH_X, h);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.restore();

                // ---- ЛОШАДИ ----
                const trackStart = w * START_X;
                const trackEnd = w * FINISH_X;
                const trackWidth = trackEnd - trackStart;

                const horseHeight = h * HORSE_HEIGHT_RATIO;
                const horseWidth = horseHeight * 1.55;

                // Тени
                for (let i = 0; i < HORSES.length; i++) {
                    const progress = Math.min(Math.max(racePositions[i] || 0, 0), 1);
                    const x = trackStart + progress * trackWidth;
                    const y = h * LANE_Y[i] + horseHeight * 0.45;
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = 'rgba(0,0,0,0.25)';
                    ctx.beginPath();
                    ctx.ellipse(x, y, horseWidth * 0.4, horseHeight * 0.15, 0, 0, Math.PI * 2);
                    ctx.fill();
                }

                // ---- ПОДСВЕТКА ЛИДЕРА (во время забега) ----
                if (isRaceRunning) {
                    let maxProgress = -1;
                    let leaderIdx = -1;
                    for (let i = 0; i < HORSES.length; i++) {
                        const p = racePositions[i] || 0;
                        if (p > maxProgress) { maxProgress = p;
                            leaderIdx = i; }
                    }
                    if (leaderIdx !== -1) {
                        const progress = maxProgress;
                        const x = trackStart + progress * trackWidth;
                        const y = h * LANE_Y[leaderIdx];
                        ctx.save();
                        ctx.shadowColor = 'rgba(255,213,74,0.4)';
                        ctx.shadowBlur = 40;
                        ctx.beginPath();
                        ctx.arc(x, y, horseHeight * 0.9, 0, Math.PI * 2);
                        ctx.fillStyle = 'rgba(255,213,74,0.08)';
                        ctx.fill();
                        ctx.shadowBlur = 0;
                        ctx.restore();
                    }
                }

                for (let i = 0; i < HORSES.length; i++) {
                    const horse = HORSES[i];
                    const progress = Math.min(Math.max(racePositions[i] || 0, 0), 1);
                    const x = trackStart + progress * trackWidth;
                    const y = h * LANE_Y[i];

                    if (isRaceRunning && progress > 0.02 && progress < 0.99) {
                        spawnDust(x - 10, y + 2, 1);
                    }

                    const img = horseImages[horse.id];
                    const size = horseHeight;

                    ctx.shadowColor = 'rgba(0,0,0,0.4)';
                    ctx.shadowBlur = 15;
                    ctx.shadowOffsetY = 4;

                    if (img && img.complete && img.naturalWidth > 0) {
                        const drawW = horseWidth;
                        const drawH = horseHeight;
                        const px = x - drawW * DRAW_OFFSET_X;
                        const py = y - drawH * DRAW_OFFSET_Y;

                        let bob = 0;
                        if (isRaceRunning) {
                            bob = Math.sin(progress * 40 + i * 1.2) * 2;
                        }
                        ctx.save();
                        ctx.translate(px + drawW / 2, py + drawH / 2 + bob);
                        ctx.rotate(progress > 0.2 ? -0.04 : 0);
                        ctx.drawImage(img, -drawW / 2, -drawH / 2, drawW, drawH);
                        ctx.restore();

                        if (selectedHorseId === i && !isRaceRunning && !raceFinished) {
                            ctx.shadowBlur = 30;
                            ctx.shadowColor = 'rgba(255,213,74,0.3)';
                            ctx.strokeStyle = 'rgba(255,213,74,0.2)';
                            ctx.lineWidth = 2;
                            ctx.setLineDash([4, 6]);
                            ctx.beginPath();
                            ctx.ellipse(x, y, size * 0.9, size * 0.6, 0, 0, Math.PI * 2);
                            ctx.stroke();
                            ctx.setLineDash([]);
                            ctx.shadowBlur = 0;
                        }

                        ctx.shadowBlur = 0;
                        ctx.shadowOffsetY = 0;

                        if (raceFinished && winnerId === i) {
                            ctx.font = `${size * 0.5}px sans-serif`;
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'bottom';
                            ctx.fillStyle = '#FFD54A';
                            ctx.shadowColor = 'rgba(255,213,74,0.6)';
                            ctx.shadowBlur = 20;
                            ctx.fillText('👑', x, y - size * 0.8);
                            ctx.shadowBlur = 0;
                        }
                    } else {
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = 'rgba(0,0,0,0.3)';
                        ctx.beginPath();
                        ctx.arc(x, y, size * 0.5, 0, Math.PI * 2);
                        ctx.fillStyle = horse.color;
                        ctx.fill();
                        ctx.fillStyle = '#fff';
                        ctx.font = `${size * 0.5}px sans-serif`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText('🐎', x, y);
                        ctx.shadowBlur = 0;
                    }

                    ctx.shadowBlur = 0;
                    ctx.shadowOffsetY = 0;
                }

                drawDust(w, h);

                // ---- СТАТУС (плашка с текстом) ----
                if (isRaceRunning) {
                    const text = '🏇 ЗАБЕГ ИДЁТ...';
                    ctx.font = `bold ${Math.min(w, h) * 0.04}px Nunito, sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'top';
                    const metrics = ctx.measureText(text);
                    const tw = metrics.width;
                    const th = Math.min(w, h) * 0.04;
                    const pad = 16;
                    const boxX = w / 2 - tw / 2 - pad;
                    const boxY = 8;
                    const boxW = tw + pad * 2;
                    const boxH = th + 12;
                    ctx.save();
                    ctx.shadowBlur = 0;
                    ctx.shadowColor = 'rgba(0,0,0,0.5)';
                    ctx.shadowBlur = 10;
                    ctx.beginPath();
                    // roundRect с поддержкой
                    const radius = 12;
                    ctx.moveTo(boxX + radius, boxY);
                    ctx.lineTo(boxX + boxW - radius, boxY);
                    ctx.quadraticCurveTo(boxX + boxW, boxY, boxX + boxW, boxY + radius);
                    ctx.lineTo(boxX + boxW, boxY + boxH - radius);
                    ctx.quadraticCurveTo(boxX + boxW, boxY + boxH, boxX + boxW - radius, boxY + boxH);
                    ctx.lineTo(boxX + radius, boxY + boxH);
                    ctx.quadraticCurveTo(boxX, boxY + boxH, boxX, boxY + boxH - radius);
                    ctx.lineTo(boxX, boxY + radius);
                    ctx.quadraticCurveTo(boxX, boxY, boxX + radius, boxY);
                    ctx.closePath();
                    ctx.fillStyle = 'rgba(0,0,0,0.6)';
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = 'rgba(125,249,255,0.3)';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    ctx.fillStyle = '#7DF9FF';
                    ctx.shadowColor = 'rgba(125,249,255,0.3)';
                    ctx.shadowBlur = 20;
                    ctx.fillText(text, w / 2, boxY + 6);
                    ctx.shadowBlur = 0;
                    ctx.restore();
                }

                if (raceFinished && winnerId !== null) {
                    const horse = HORSES[winnerId];
                    ctx.font = `bold ${Math.min(w, h) * 0.035}px Nunito, sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'bottom';
                    ctx.fillStyle = 'rgba(0,0,0,0.4)';
                    ctx.fillRect(w / 2 - 100, h - 38, 200, 28);
                    ctx.fillStyle = '#FFD54A';
                    ctx.shadowColor = 'rgba(255,213,74,0.3)';
                    ctx.shadowBlur = 20;
                    ctx.fillText(`🏆 ${horse.name} победил!`, w / 2, h - 12);
                    ctx.shadowBlur = 0;
                }

                // ---- НОМЕРА ДОРОЖЕК ----
                for (let i = 0; i < HORSES.length; i++) {
                    const y = h * LANE_Y[i];
                    const x = w * 0.02;
                    ctx.font = `bold ${Math.min(w, h) * 0.025}px Nunito, sans-serif`;
                    ctx.textAlign = 'left';
                    ctx.textBaseline = 'middle';
                    ctx.fillStyle = 'rgba(255,255,255,0.12)';
                    ctx.fillText(`${i+1}`, x, y);
                }
            }

            // =============================================================
            // 11. СБРОС
            // =============================================================
            function resetPositions() {
                racePositions = HORSES.map(() => 0);
                winnerId = null;
                raceFinished = false;
                dustParticles = [];
            }

            function resetGame() {
                resetPositions();
                isRaceRunning = false;
                hasBet = false;
                selectedHorseId = null;
                document.querySelectorAll('.horse-btn').forEach(b => b.classList.remove('active'));
                startBtn.disabled = true;
                betBtn.disabled = false;
                betBtn.classList.remove('active');
                statusMsg.textContent = 'Выберите лошадь и сделайте ставку';
                statusMsg.className = 'status-bar';
                resultOverlay.classList.remove('show');
                winOverlay.classList.remove('show');
                leaderboard.classList.remove('show');
                if (animationId) { cancelAnimationFrame(animationId);
                    animationId = null; }
                raceSound.pause();
                raceSound.currentTime = 0;
                herdSound.pause();
                herdSound.currentTime = 0;
                render();
                updateUI();
                updateHistoryUI();
                updatePotentialWin();
            }

            // =============================================================
            // 12. UI
            // =============================================================
            function updateUI() {
                const bet = parseInt(betInput.value) || 0;
                const validBet = bet > 0 && bet <= balance;
                const hasSelection = selectedHorseId !== null;
                const canBet = !isRaceRunning && !hasBet && hasSelection && validBet && !raceFinished;
                betBtn.disabled = !canBet;
                betBtn.classList.toggle('active', canBet);

                const canStart = hasBet && !isRaceRunning && !raceFinished && balance >= 0;
                startBtn.disabled = !canStart;

                if (hasBet && !isRaceRunning && !raceFinished) {
                    statusMsg.textContent = `✅ Ставка ${betAmount} ₽ на ${HORSES[selectedHorseId].name}. Нажмите СТАРТ!`;
                    statusMsg.className = 'status-bar info';
                } else if (isRaceRunning) {
                    statusMsg.textContent = '🏇 Забег идёт...';
                    statusMsg.className = 'status-bar race';
                } else if (raceFinished) {
                    // в модалке
                } else if (hasSelection && !hasBet) {
                    statusMsg.textContent = `Выбрана ${HORSES[selectedHorseId].name}. Сделайте ставку.`;
                    statusMsg.className = 'status-bar';
                } else {
                    statusMsg.textContent = 'Выберите лошадь и сделайте ставку';
                    statusMsg.className = 'status-bar';
                }
                updatePotentialWin();
            }

            // =============================================================
            // 13. ИСТОРИЯ
            // =============================================================
            function initHistory() {
                const count = 5 + Math.floor(Math.random() * 3);
                for (let i = 0; i < count; i++) {
                    const idx = Math.floor(Math.random() * HORSES.length);
                    const horse = HORSES[idx];
                    historyWinners.push({ color: horse.color, letter: horse.letter });
                }
                if (historyWinners.length > MAX_HISTORY) historyWinners = historyWinners.slice(0, MAX_HISTORY);
                updateHistoryUI();
            }

            function addHistory(winnerId) {
                const horse = HORSES[winnerId];
                historyWinners.unshift({ color: horse.color, letter: horse.letter });
                if (historyWinners.length > MAX_HISTORY) historyWinners.pop();
                updateHistoryUI();
            }

            function updateHistoryUI() {
                historyBar.innerHTML = '<span class="h-label">📊 История</span>';
                historyWinners.forEach(item => {
                    const dot = document.createElement('span');
                    dot.className = 'history-dot win';
                    dot.style.background = item.color;
                    dot.textContent = item.letter;
                    historyBar.appendChild(dot);
                });
            }

            // =============================================================
            // 14. БЫСТРЫЕ СТАВКИ
            // =============================================================
            function applyQuickBet(action) {
                if (isRaceRunning || raceFinished) return;
                let current = parseInt(betInput.value) || 0;
                if (current < 10) current = 10;
                let newVal = current;
                switch (action) {
                    case 'min':
                        newVal = 10;
                        break;
                    case 'half':
                        newVal = Math.floor(current / 2);
                        if (newVal < 10) newVal = 10;
                        break;
                    case 'double':
                        newVal = current * 2;
                        if (newVal > balance) newVal = balance;
                        break;
                    case 'max':
                        newVal = balance;
                        break;
                    default:
                        return;
                }
                newVal = Math.max(10, Math.min(newVal, balance, 100000));
                betInput.value = newVal;
                updateUI();
            }

            quickBtns.forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    applyQuickBet(this.dataset.quick);
                });
            });

            // =============================================================
            // 15. ВЫБОР ЛОШАДИ
            // =============================================================
            function selectHorse(id) {
                if (isRaceRunning || raceFinished || hasBet) {
                    statusMsg.textContent = '⛔ Дождитесь окончания забега';
                    statusMsg.className = 'status-bar lose';
                    return;
                }
                selectedHorseId = id;
                document.querySelectorAll('.horse-btn').forEach((btn, idx) => {
                    btn.classList.toggle('active', idx === id);
                });
                updateUI();
                render();
            }

            // =============================================================
            // 16. КНОПКИ ЛОШАДЕЙ
            // =============================================================
            function buildHorseButtons() {
                horseSelector.innerHTML = '';
                HORSES.forEach((horse, idx) => {
                    const btn = document.createElement('div');
                    btn.className = 'horse-btn';
                    btn.dataset.id = horse.id;
                    const odds = horseOdds[idx] || '1.5';
                    btn.innerHTML = `
                        <img class="thumb" src="${horse.img}" alt="${horse.name}" loading="lazy" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2240%22 height=%2240%22%3E%3Ctext y=%2232%22 font-size=%2230%22%3E🐎%3C/text%3E%3C/svg%3E'" />
                        <span class="hname">${horse.name}</span>
                        <span class="hodds">x${odds}</span>
                    `;
                    btn.addEventListener('click', () => selectHorse(horse.id));
                    horseSelector.appendChild(btn);
                });
            }
            buildHorseButtons();

            // =============================================================
            // 17. СТАВКА
            // =============================================================
            function placeBet() {
                if (isRaceRunning || raceFinished) {
                    statusMsg.textContent = '⛔ Дождитесь окончания забега';
                    statusMsg.className = 'status-bar lose';
                    return;
                }
                if (selectedHorseId === null) {
                    statusMsg.textContent = '❌ Сначала выберите лошадь';
                    statusMsg.className = 'status-bar lose';
                    return;
                }
                const bet = parseInt(betInput.value) || 0;
                if (bet < 10) {
                    statusMsg.textContent = '❌ Минимальная ставка 10 ₽';
                    statusMsg.className = 'status-bar lose';
                    return;
                }
                if (bet > balance) {
                    statusMsg.textContent = `❌ Недостаточно средств. Баланс: ${balance.toLocaleString()} ₽`;
                    statusMsg.className = 'status-bar lose';
                    return;
                }

                balance -= bet;
                localStorage.setItem('casinoBalance', String(balance));
                updateBalanceDisplay();

                betAmount = bet;
                hasBet = true;
                resetPositions();
                render();
                updateUI();
                statusMsg.textContent = `✅ Ставка ${betAmount} ₽ на ${HORSES[selectedHorseId].name}. Нажмите СТАРТ!`;
                statusMsg.className = 'status-bar info';
            }

            // =============================================================
            // 18. ЛИДЕРБОРД
            // =============================================================
            function updateLeaderboard() {
                if (!isRaceRunning && !raceFinished) {
                    leaderboard.classList.remove('show');
                    return;
                }
                const sorted = HORSES.map((h, i) => ({
                    id: i,
                    name: h.name,
                    color: h.color,
                    pos: racePositions[i] || 0
                })).sort((a, b) => b.pos - a.pos);

                const top3 = sorted.slice(0, 3);
                let html = '';
                top3.forEach((item, idx) => {
                    const medal = idx === 0 ? '🥇' : idx === 1 ? '🥈' : '🥉';
                    html += `<div class="lb-item">
                                <span class="lb-pos">${medal}</span>
                                <span class="lb-dot" style="background:${item.color}"></span>
                                <span class="lb-name">${item.name}</span>
                            </div>`;
                });
                lbContent.innerHTML = html;
                leaderboard.classList.add('show');
            }

            // =============================================================
            // 19. ВОЗМОЖНЫЙ ВЫИГРЫШ
            // =============================================================
            function updatePotentialWin() {
                const bet = parseInt(betInput.value) || 0;
                let potential = 0;
                if (selectedHorseId !== null && bet > 0) {
                    const odds = parseFloat(horseOdds[selectedHorseId]) || 1.0;
                    potential = Math.floor(bet * odds);
                }
                winAmountDisplay.textContent = potential.toLocaleString() + ' ₽';
                winAmountDisplay.style.color = potential > 0 ? '#3DDC84' : 'rgba(255,255,255,0.3)';
            }

            // =============================================================
            // 20. ЗАБЕГ
            // =============================================================
            function startRace() {
                if (!hasBet || isRaceRunning || raceFinished) return;
                if (selectedHorseId === null) return;

                herdSound.currentTime = 0;
                herdSound.volume = 0.4;
                herdSound.play().catch(() => {});

                raceSound.currentTime = 0;
                raceSound.volume = 0;
                raceSound.play().catch(() => {});
                const fadeStart = performance.now();
                const fadeDuration = 500;

                function fadeIn(time) {
                    const elapsed = time - fadeStart;
                    const progress = Math.min(elapsed / fadeDuration, 1);
                    raceSound.volume = progress * 0.5;
                    if (progress < 1) requestAnimationFrame(fadeIn);
                }
                requestAnimationFrame(fadeIn);

                isRaceRunning = true;
                startBtn.disabled = true;
                betBtn.disabled = true;
                statusMsg.textContent = '🏇 Забег начался!';
                statusMsg.className = 'status-bar race';

                resetPositions();

                const weights = HORSES.map((h, i) => {
                    const base = 0.6 + Math.random() * 0.8;
                    const bonus = (i === selectedHorseId) ? 0.15 : 0;
                    return base + bonus;
                });
                const total = weights.reduce((a, b) => a + b, 0);
                let rnd = Math.random() * total;
                let winIdx = 0;
                for (let i = 0; i < weights.length; i++) {
                    rnd -= weights[i];
                    if (rnd <= 0) { winIdx = i; break; }
                }
                winnerId = winIdx;

                const finishTimes = HORSES.map((_, i) => {
                    if (i === winnerId) return 0.70 + Math.random() * 0.15;
                    else return 0.85 + Math.random() * 0.20;
                });

                const duration = 10000 + Math.random() * 2000;
                const startTime = performance.now();

                function animateRace(time) {
                    const elapsed = time - startTime;
                    const globalProgress = Math.min(elapsed / duration, 1);

                    for (let i = 0; i < HORSES.length; i++) {
                        const finishTime = finishTimes[i];
                        let horseProgress = Math.min(globalProgress / finishTime, 1);
                        if (i !== winnerId && horseProgress < 1) {
                            const jitter = 1 + (Math.sin(time * 0.002 + i * 2.3) * 0.005);
                            horseProgress = Math.min(horseProgress * jitter, 1);
                        }
                        racePositions[i] = Math.min(Math.max(horseProgress, 0), 1);
                    }

                    if (globalProgress >= 1) racePositions[winnerId] = 1;

                    updateDust();
                    render();
                    updateLeaderboard();

                    if (globalProgress < 1) {
                        animationId = requestAnimationFrame(animateRace);
                    } else {
                        for (let i = 0; i < HORSES.length; i++) racePositions[i] = 1;
                        render();
                        isRaceRunning = false;
                        raceFinished = true;
                        raceSound.pause();
                        raceSound.currentTime = 0;
                        herdSound.pause();
                        herdSound.currentTime = 0;
                        leaderboard.classList.remove('show');
                        if (animationId) {
                            cancelAnimationFrame(animationId);
                            animationId = null;
                        }
                        showResult();
                    }
                }

                animationId = requestAnimationFrame(animateRace);
            }

            // =============================================================
            // 21. РЕЗУЛЬТАТ
            // =============================================================
            function showResult() {
                const horse = HORSES[winnerId];
                const isWin = (selectedHorseId === winnerId);

                addHistory(winnerId);

                if (isWin) {
                    const multiplier = parseFloat(horseOdds[winnerId]) || 1.5;
                    const winAmount = Math.floor(betAmount * multiplier);

                    balance += winAmount;
                    localStorage.setItem('casinoBalance', String(balance));
                    updateBalanceDisplay();

                    winTextArea.innerHTML = '';
                    const titleEl = document.createElement('div');
                    titleEl.id = 'winTitle';
                    titleEl.style.cssText = `
                        font-family: 'Cinzel', serif;
                        font-size: clamp(22px, 5vw, 36px);
                        font-weight: 900;
                        text-align: center;
                        color: #FFD54A;
                        text-shadow: 0 0 30px rgba(255,213,74,0.2);
                        margin-bottom: 4px;
                        letter-spacing: 2px;
                    `;
                    titleEl.textContent = 'ПОЗДРАВЛЯЕМ!';

                    const subEl = document.createElement('div');
                    subEl.id = 'winSub';
                    subEl.style.cssText = `
                        font-family: 'Nunito', sans-serif;
                        font-size: clamp(16px, 3.5vw, 22px);
                        font-weight: 800;
                        text-align: center;
                        color: rgba(255,255,255,0.7);
                        margin-bottom: 6px;
                    `;
                    subEl.textContent = `🏆 ${horse.name} победил!`;

                    const amountEl = document.createElement('div');
                    amountEl.id = 'winAmount';
                    amountEl.style.cssText = `
                        font-family: 'Montserrat', sans-serif;
                        font-size: clamp(28px, 7vw, 48px);
                        font-weight: 900;
                        text-align: center;
                        background: linear-gradient(180deg, #FFF8CC, #FFD95A, #FFB400, #D88A00);
                        -webkit-background-clip: text;
                        background-clip: text;
                        color: transparent;
                        text-shadow: 0 2px 20px rgba(255,213,74,0.3);
                        letter-spacing: 1px;
                        line-height: 1.2;
                    `;
                    amountEl.textContent = `+${winAmount.toLocaleString()} ₽`;

                    winTextArea.appendChild(titleEl);
                    winTextArea.appendChild(subEl);
                    winTextArea.appendChild(amountEl);

                    winHorseSlot.innerHTML = '';
                    winCoinSlot.innerHTML = '';

                    winOverlay.classList.add('show');

                    statusMsg.textContent = `🏆 Победил ${horse.name}! Выигрыш ${winAmount.toLocaleString()} ₽`;
                    statusMsg.className = 'status-bar win';

                } else {
                    rEmoji.textContent = '❌';
                    rName.textContent = `Победил ${horse.name}`;
                    rAmount.textContent = `-${betAmount.toLocaleString()} ₽`;
                    rAmount.className = 'r-amount lose-text';
                    rSub.textContent = `Вы ставили на ${HORSES[selectedHorseId].name}`;
                    resultOverlay.classList.add('show');

                    statusMsg.textContent = `😔 Победил ${horse.name}. Повезет в следующий раз!`;
                    statusMsg.className = 'status-bar lose';
                }

                hasBet = false;
                updateUI();
            }

            // =============================================================
            // 22. ЗАКРЫТИЕ
            // =============================================================
            function closeResult() {
                winOverlay.classList.remove('show');
                resultOverlay.classList.remove('show');
                resetGame();
                updateBalanceDisplay();
                betBtn.disabled = false;
                startBtn.disabled = true;
                statusMsg.textContent = 'Выберите лошадь и сделайте ставку';
                statusMsg.className = 'status-bar';
                render();
            }

            resultOk.addEventListener('click', closeResult);
            winCloseBtn.addEventListener('click', closeResult);

            // =============================================================
            // 23. ОБРАБОТЧИКИ
            // =============================================================
            betBtn.addEventListener('click', placeBet);
            startBtn.addEventListener('click', startRace);

            betInput.addEventListener('input', function() {
                let val = parseInt(this.value) || 0;
                if (val < 0) this.value = 0;
                if (val > 100000) this.value = 100000;
                updateUI();
            });

            betInput.addEventListener('input', updatePotentialWin);
            document.addEventListener('click', (e) => {
                if (e.target.closest('.horse-btn')) {
                    setTimeout(updatePotentialWin, 50);
                }
            });

            backBtn.addEventListener('click', function() {
                if (animationId) cancelAnimationFrame(animationId);
                raceSound.pause();
                raceSound.currentTime = 0;
                herdSound.pause();
                herdSound.currentTime = 0;
                window.location.href = 'casino.html?userId=' + userId;
            });

            // =============================================================
            // 24. КЛАВИАТУРА
            // =============================================================
            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space' && !e.repeat) {
                    e.preventDefault();
                    if (!startBtn.disabled) startBtn.click();
                    else if (!betBtn.disabled) betBtn.click();
                }
            });

            // =============================================================
            // 25. ИНИЦИАЛИЗАЦИЯ
            // =============================================================
            resetPositions();

            loadAllImages().then(() => {
                resizeCanvas();
                resetGame();
                updateUI();
                console.log('🐎 Скачки загружены, баланс:', balance);
            }).catch(() => {
                resizeCanvas();
                resetGame();
                updateUI();
                console.log('🐎 Скачки загружены (с ошибками), баланс:', balance);
            });

            window.addEventListener('storage', (e) => {
                if (e.key === 'casinoBalance') {
                    balance = parseInt(e.newValue) || 0;
                    updateBalanceDisplay();
                    updateUI();
                }
            });

        })();
    </script>

</body>
</html>
