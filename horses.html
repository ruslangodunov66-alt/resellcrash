<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Скачки · R-GAME</title>
    <script src="https://telegram.org/js/telegram-web-app.js">
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800;900&family=Nunito:wght@600;700;800;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Nunito', sans-serif;
            background: #0a0f1a;
            color: #fff;
            position: fixed;
            top: 0;
            left: 0;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: radial-gradient(ellipse at 50% 0%, rgba(255, 213, 74, 0.06), transparent 60%);
            padding: 8px 10px 10px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 15, 26, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 8px 14px;
            border: 1px solid rgba(255, 213, 74, 0.15);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
            flex-shrink: 0;
            margin-bottom: 8px;
            min-height: 48px;
        }
        .header .left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-back {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 213, 74, 0.2);
            border-radius: 50%;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FFD54A;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
            flex-shrink: 0;
        }
        .btn-back:active {
            transform: scale(0.88);
            background: rgba(255, 213, 74, 0.1);
        }
        .brand {
            font-family: 'Cinzel', serif;
            font-size: 20px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, #FFD54A);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .brand span {
            color: #FFD54A;
            -webkit-text-fill-color: #FFD54A;
        }

        .balance-box {
            background: rgba(0, 0, 0, 0.4);
            padding: 4px 14px;
            border-radius: 30px;
            border: 1px solid rgba(255, 213, 74, 0.15);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .balance-label {
            font-size: 9px;
            text-transform: uppercase;
            color: #FFD54A;
            opacity: 0.5;
            letter-spacing: 1px;
        }
        .balance-value {
            font-family: 'Cinzel', serif;
            font-size: 17px;
            font-weight: 900;
            color: #fff;
        }

        .race-wrapper {
            flex: 1;
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            background: #0a0f1a;
            border: 1px solid rgba(255, 213, 74, 0.08);
            box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.7);
            min-height: 0;
        }
        #raceCanvas {
            width: 100%;
            height: 100%;
            display: block;
            image-rendering: auto;
        }

        .bottom-panel {
            flex-shrink: 0;
            padding: 8px 0 4px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .horse-selector {
            display: flex;
            gap: 6px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .horse-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 2px solid rgba(255, 255, 255, 0.06);
            border-radius: 18px;
            padding: 8px 12px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            min-width: 92px;
            max-width: none;
            height: 110px;
            position: relative;
            background: rgba(0, 0, 0, 0.3);
            justify-content: center;
        }
        .horse-btn .thumb {
            width: 58px;
            height: 58px;
            object-fit: contain;
            display: block;
            border-radius: 6px;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.5));
            transition: transform 0.3s;
        }
        .horse-btn .hname {
            font-size: 13px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 4px;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }
        .horse-btn .hodds {
            font-size: 10px;
            color: #FFD54A;
            opacity: 0.5;
        }
        .horse-btn.active {
            border-color: #FFD54A;
            background: rgba(255, 213, 74, 0.12);
            box-shadow: 0 0 20px rgba(255, 213, 74, 0.15);
            transform: translateY(-2px);
        }
        .horse-btn.active .hname {
            color: #fff;
        }
        .horse-btn:active {
            transform: scale(0.92);
        }

        .bet-presets {
            display: flex;
            gap: 6px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .bet-preset-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 213, 74, 0.15);
            border-radius: 30px;
            padding: 4px 14px;
            font-size: 14px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: all 0.2s;
            height: 36px;
            display: flex;
            align-items: center;
        }
        .bet-preset-btn.active {
            background: rgba(255, 213, 74, 0.15);
            border-color: #FFD54A;
            color: #fff;
        }
        .bet-preset-btn:active {
            transform: scale(0.92);
        }

        .controls-row {
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: center;
        }
        .bet-input {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 213, 74, 0.15);
            border-radius: 22px;
            padding: 8px 14px;
            color: #fff;
            font-size: 20px;
            font-weight: 700;
            width: 120px;
            text-align: center;
            font-family: 'Nunito', sans-serif;
            height: 56px;
        }
        .bet-input:focus {
            outline: none;
            border-color: #FFD54A;
        }
        .bet-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
        }

        .btn {
            border: none;
            border-radius: 22px;
            padding: 0 24px;
            font-weight: 800;
            font-size: 20px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            font-family: 'Nunito', sans-serif;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            min-width: 80px;
        }
        .btn:active {
            transform: scale(0.94);
        }
        .btn:disabled {
            opacity: 0.25;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-bet {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 213, 74, 0.25);
            color: #FFD54A;
            flex: 0 1 auto;
            min-width: 80px;
        }
        .btn-bet.active {
            background: rgba(255, 213, 74, 0.15);
            border-color: #FFD54A;
        }

        .btn-start {
            background: linear-gradient(135deg, #3DDC84, #1a8a4a);
            color: #fff;
            flex: 1;
            min-width: 80px;
            font-size: 22px;
        }
        .btn-start:disabled {
            background: #333;
            color: #666;
        }

        .status-bar {
            text-align: center;
            font-size: 14px;
            font-weight: 700;
            min-height: 24px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.5px;
            padding: 4px 0;
            transition: all 0.3s;
        }
        .status-bar.win {
            color: #3DDC84;
        }
        .status-bar.lose {
            color: #E85555;
        }
        .status-bar.info {
            color: #FFD54A;
        }
        .status-bar.race {
            color: #7DF9FF;
        }

        /* WIN OVERLAY */
        .win-overlay {
            position: absolute;
            inset: 0;
            z-index: 30;
            display: none;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            overflow: hidden;
            animation: fadeInWin 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .win-overlay.show {
            display: flex;
        }
        @keyframes fadeInWin {
            0% { opacity: 0; transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1); }
        }

        .win-overlay-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        .win-overlay-darken {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 1;
        }

        .win-panel {
            position: relative;
            z-index: 2;
            width: 88%;
            max-width: 420px;
            background: rgba(8, 12, 24, 0.75);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 28px;
            border: 2px solid rgba(255, 213, 74, 0.25);
            padding: 28px 24px 32px;
            box-shadow: 0 0 80px rgba(255, 213, 74, 0.08), 0 20px 60px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: visible;
        }
        .win-panel::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 30px;
            background: linear-gradient(135deg, rgba(255,213,74,0.15), transparent 40%, transparent 60%, rgba(255,213,74,0.1));
            z-index: -1;
            pointer-events: none;
        }

        .win-text-area {
            width: 100%;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px 0;
            position: relative;
        }

        .win-horse-slot {
            position: absolute;
            right: -10px;
            top: 50%;
            transform: translateY(-50%);
            width: 35%;
            height: 70%;
            pointer-events: none;
            z-index: 3;
        }

        .win-coin-slot {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .win-close-btn {
            position: absolute;
            top: 12px;
            right: 16px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            z-index: 10;
        }
        .win-close-btn:active {
            transform: scale(0.88);
            background: rgba(255, 255, 255, 0.1);
        }

        /* OLD RESULT OVERLAY */
        .result-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 20;
            display: none;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
        }
        .result-overlay.show {
            display: flex;
        }

        .result-card {
            background: linear-gradient(160deg, rgba(20, 30, 50, 0.95), rgba(10, 15, 26, 0.98));
            border: 2px solid rgba(255, 213, 74, 0.3);
            border-radius: 24px;
            padding: 28px 30px 24px;
            text-align: center;
            max-width: 320px;
            width: 92%;
            box-shadow: 0 0 80px rgba(255, 213, 74, 0.08), 0 20px 60px rgba(0, 0, 0, 0.8);
            animation: popResult 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }
        @keyframes popResult {
            from {
                transform: scale(0.7) translateY(20px);
                opacity: 0;
            }
            to {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }
        .result-card .emoji-big {
            font-size: 56px;
            display: block;
            margin-bottom: 4px;
            filter: drop-shadow(0 0 30px rgba(255, 213, 74, 0.2));
        }
        .result-card .r-name {
            font-size: 22px;
            font-weight: 900;
            color: #FFD54A;
            font-family: 'Cinzel', serif;
        }
        .result-card .r-amount {
            font-size: 18px;
            color: #3DDC84;
            margin: 6px 0 4px;
            font-weight: 800;
        }
        .result-card .r-sub {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.3);
            margin-bottom: 12px;
        }
        .result-card .btn-ok {
            background: linear-gradient(135deg, #FFD54A, #b8860b);
            color: #0a0f1a;
            font-weight: 900;
            border: none;
            padding: 10px 32px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Nunito', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 20px rgba(255, 213, 74, 0.2);
        }
        .result-card .btn-ok:active {
            transform: scale(0.94);
        }
        .result-card .confetti {
            position: absolute;
            font-size: 20px;
            animation: confettiFall 2s ease-in-out infinite;
        }
        @keyframes confettiFall {
            0%,
            100% {
                transform: translateY(-10px) rotate(0deg);
                opacity: 1;
            }
            50% {
                transform: translateY(10px) rotate(180deg);
                opacity: 0.7;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 6px 10px;
                min-height: 42px;
            }
            .brand {
                font-size: 16px;
            }
            .balance-value {
                font-size: 14px;
            }
            .btn-back {
                width: 30px;
                height: 30px;
                font-size: 15px;
            }
            .horse-btn {
                min-width: 70px;
                height: 90px;
                padding: 6px 8px;
            }
            .horse-btn .thumb {
                width: 44px;
                height: 44px;
            }
            .horse-btn .hname {
                font-size: 11px;
            }
            .bet-preset-btn {
                font-size: 12px;
                padding: 4px 10px;
                height: 32px;
            }
            .bet-input {
                width: 90px;
                font-size: 18px;
                height: 48px;
            }
            .btn {
                font-size: 16px;
                height: 48px;
                padding: 0 16px;
                min-width: 64px;
                border-radius: 18px;
            }
            .btn-start {
                font-size: 18px;
                min-width: 64px;
            }
            .result-card {
                padding: 20px 18px 18px;
            }
            .result-card .emoji-big {
                font-size: 44px;
            }
            .result-card .r-name {
                font-size: 18px;
            }
            .status-bar {
                font-size: 12px;
                min-height: 20px;
            }
            .controls-row {
                gap: 6px;
            }
            .win-panel {
                padding: 20px 16px 24px;
                width: 92%;
            }
            .win-text-area {
                min-height: 100px;
            }
            .win-horse-slot {
                right: -4px;
                width: 30%;
            }
        }
        @media (max-width: 370px) {
            .horse-btn {
                min-width: 56px;
                height: 74px;
                padding: 4px 4px;
            }
            .horse-btn .thumb {
                width: 34px;
                height: 34px;
            }
            .horse-btn .hname {
                font-size: 9px;
            }
            .bet-preset-btn {
                font-size: 10px;
                padding: 4px 8px;
                height: 28px;
            }
            .bet-input {
                width: 70px;
                font-size: 15px;
                height: 42px;
            }
            .btn {
                font-size: 14px;
                height: 42px;
                padding: 0 12px;
                min-width: 56px;
                border-radius: 14px;
            }
            .btn-start {
                font-size: 16px;
                min-width: 56px;
            }
            .brand {
                font-size: 13px;
            }
            .balance-value {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <div id="app">
        <div class="header">
            <div class="left">
                <button class="btn-back" id="backBtn">◁</button>
                <span class="brand">R-<span>GAME</span></span>
            </div>
            <div class="balance-box">
                <span class="balance-label">Баланс</span>
                <span class="balance-value" id="balanceDisplay">0 ₽</span>
            </div>
        </div>

        <div class="race-wrapper">
            <canvas id="raceCanvas"></canvas>

            <!-- WIN OVERLAY -->
            <div class="win-overlay" id="winOverlay">
                <img class="win-overlay-bg" id="winBgImage" src="https://raw.githubusercontent.com/ruslangodunov66-alt/resellcrash/main/photo_2026-07-08_11-53-52.jpg" alt="Win" />
                <div class="win-overlay-darken"></div>

                <div class="win-panel">
                    <button class="win-close-btn" id="winCloseBtn">✕</button>
                    <div class="win-coin-slot" id="winCoinSlot"></div>
                    <div class="win-horse-slot" id="winHorseSlot"></div>
                    <div class="win-text-area" id="winTextArea"></div>
                </div>
            </div>

            <div class="result-overlay" id="resultOverlay">
                <div class="result-card">
                    <span class="emoji-big" id="rEmoji">🐎</span>
                    <div class="r-name" id="rName">Победитель</div>
                    <div class="r-amount" id="rAmount">+0 ₽</div>
                    <div class="r-sub" id="rSub">x1.0 коэффициент</div>
                    <button class="btn-ok" id="resultOk">🏆 Отлично!</button>
                </div>
            </div>
        </div>

        <div class="bottom-panel">
            <div class="horse-selector" id="horseSelector"></div>

            <div class="bet-presets" id="betPresets">
                <button class="bet-preset-btn active" data-amount="100">100</button>
                <button class="bet-preset-btn" data-amount="500">500</button>
                <button class="bet-preset-btn" data-amount="1000">1K</button>
                <button class="bet-preset-btn" data-amount="5000">5K</button>
                <button class="bet-preset-btn" data-amount="max">MAX</button>
            </div>

            <div class="controls-row">
                <input type="number" class="bet-input" id="betInput" value="100" min="10" step="10" />
                <button class="btn btn-bet" id="betBtn">СТАВКА</button>
                <button class="btn btn-start" id="startBtn" disabled>🏁 СТАРТ</button>
            </div>

            <div class="status-bar" id="statusMsg">Выберите лошадь и сделайте ставку</div>
        </div>
    </div>

    <!-- ЗВУКИ -->
    <audio id="raceSound" loop preload="auto">
        <source src="0011299.mp3" type="audio/mpeg">
    </audio>
    <audio id="herdSound" loop preload="auto">
        <source src="horse/herd-of-horses-2.mp3" type="audio/mpeg">
    </audio>

    <script>
        (function() {
            'use strict';

            // =============================================================
            // 1. TELEGRAM
            // =============================================================
            const tg = window.Telegram.WebApp;
            if (tg) { tg.expand();
                tg.enableClosingConfirmation(); }
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('userId') || (tg?.initDataUnsafe?.user?.id) || '';

            // =============================================================
            // 2. БАЛАНС
            // =============================================================
            let balance = parseInt(localStorage.getItem('casinoBalance')) || 0;
            const balanceDisplay = document.getElementById('balanceDisplay');

            function updateBalanceDisplay() {
                balanceDisplay.innerText = balance.toLocaleString() + ' ₽';
            }
            updateBalanceDisplay();

            // =============================================================
            // 3. КОНФИГ ЛОШАДЕЙ
            // =============================================================
            const BASE_URL = 'https://raw.githubusercontent.com/ruslangodunov66-alt/resellcrash/main/horse/';

            const HORSES = [
                { id: 0, name: 'Молния', img: BASE_URL + 'IMG_0452.PNG', color: '#E74C3C' },
                { id: 1, name: 'Вихрь', img: BASE_URL + 'IMG_0453.PNG', color: '#3498DB' },
                { id: 2, name: 'Гром', img: BASE_URL + 'IMG_0454.PNG', color: '#2ECC71' },
                { id: 3, name: 'Зефир', img: BASE_URL + 'IMG_0455.PNG', color: '#F1C40F' },
                { id: 4, name: 'Тень', img: BASE_URL + 'IMG_0456.PNG', color: '#9B59B6' },
                { id: 5, name: 'Сокол', img: BASE_URL + 'IMG_0457.PNG', color: '#E67E22' }
            ];

            const TRACK_IMAGE = BASE_URL + 'VEux9kYOWxh76c7RwQzuXANIZG1ubOe0RnNv6F9hUF4X8sf87LkBB913Dok_RAxCn_noaI-gouxxGx-9rEECChGn.jpg';
            const WIN_BG_IMAGE = 'https://raw.githubusercontent.com/ruslangodunov66-alt/resellcrash/main/photo_2026-07-08_11-53-52.jpg';

            // =============================================================
            // 4. DOM
            // =============================================================
            const canvas = document.getElementById('raceCanvas');
            const ctx = canvas.getContext('2d');
            const horseSelector = document.getElementById('horseSelector');
            const betInput = document.getElementById('betInput');
            const betBtn = document.getElementById('betBtn');
            const startBtn = document.getElementById('startBtn');
            const statusMsg = document.getElementById('statusMsg');
            const resultOverlay = document.getElementById('resultOverlay');
            const rEmoji = document.getElementById('rEmoji');
            const rName = document.getElementById('rName');
            const rAmount = document.getElementById('rAmount');
            const rSub = document.getElementById('rSub');
            const resultOk = document.getElementById('resultOk');
            const backBtn = document.getElementById('backBtn');
            const raceSound = document.getElementById('raceSound');
            const herdSound = document.getElementById('herdSound');
            const betPresets = document.querySelectorAll('.bet-preset-btn');
            const winOverlay = document.getElementById('winOverlay');
            const winBgImage = document.getElementById('winBgImage');
            const winCloseBtn = document.getElementById('winCloseBtn');
            const winTextArea = document.getElementById('winTextArea');
            const winHorseSlot = document.getElementById('winHorseSlot');
            const winCoinSlot = document.getElementById('winCoinSlot');

            // =============================================================
            // 5. СОСТОЯНИЕ
            // =============================================================
            let selectedHorseId = null;
            let betAmount = 100;
            let isRaceRunning = false;
            let hasBet = false;
            let raceFinished = false;
            let racePositions = [];
            let winnerId = null;
            let animationId = null;
            let horseImages = {};
            let trackImage = null;
            let winBgImg = null;
            let ready = false;
            let camOffsetX = 0;
            let camZoom = 1;

            // ===== ЧАСТИЦЫ ПЫЛИ =====
            let dustParticles = [];

            // =============================================================
            // 6. ЗАГРУЗКА ИЗОБРАЖЕНИЙ
            // =============================================================
            function loadImage(src) {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.crossOrigin = 'anonymous';
                    img.src = src;
                    img.onload = () => resolve(img);
                    img.onerror = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = 80;
                        canvas.height = 60;
                        const c = canvas.getContext('2d');
                        c.fillStyle = '#444';
                        c.fillRect(0, 0, 80, 60);
                        const fallback = new Image();
                        fallback.src = canvas.toDataURL();
                        resolve(fallback);
                    };
                });
            }

            async function loadAllImages() {
                try {
                    trackImage = await loadImage(TRACK_IMAGE);
                    winBgImg = await loadImage(WIN_BG_IMAGE);
                    for (const h of HORSES) {
                        const img = await loadImage(h.img);
                        horseImages[h.id] = img;
                    }
                    ready = true;
                    resizeCanvas();
                    resetGame();
                } catch (e) {
                    console.warn('Ошибка загрузки изображений:', e);
                    ready = true;
                    resizeCanvas();
                    resetGame();
                }
            }

            // =============================================================
            // 7. РАЗМЕР CANVAS
            // =============================================================
            function resizeCanvas() {
                const rect = canvas.parentElement.getBoundingClientRect();
                const dpr = window.devicePixelRatio || 1;
                canvas.width = rect.width * dpr;
                canvas.height = rect.height * dpr;
                canvas.style.width = rect.width + 'px';
                canvas.style.height = rect.height + 'px';
                ctx.scale(dpr, dpr);
                if (ready) render();
            }

            const resizeObserver = new ResizeObserver(() => resizeCanvas());
            resizeObserver.observe(canvas.parentElement);
            window.addEventListener('resize', resizeCanvas);

            // =============================================================
            // 8. КОНСТАНТЫ ОТРИСОВКИ
            // =============================================================
            const LANE_Y = [0.135, 0.275, 0.415, 0.535, 0.675, 0.815];
            const START_X = 0.07;
            const FINISH_X = 0.90;
            const HORSE_HEIGHT_RATIO = 0.12;
            const HORSE_WIDTH_RATIO = 0.12 * 1.55;
            const DRAW_OFFSET_X = 0.15;
            const DRAW_OFFSET_Y = 0.40;

            // =============================================================
            // 9. ПЫЛЬ
            // =============================================================
            function spawnDust(x, y, count) {
                for (let i = 0; i < count; i++) {
                    dustParticles.push({
                        x: x + (Math.random() - 0.5) * 20,
                        y: y + (Math.random() - 0.5) * 10,
                        vx: (Math.random() - 0.5) * 0.8 - 0.3,
                        vy: -0.2 - Math.random() * 0.5,
                        life: 1,
                        decay: 0.008 + Math.random() * 0.015,
                        size: 2 + Math.random() * 5,
                        alpha: 0.4 + Math.random() * 0.3
                    });
                }
            }

            function updateDust() {
                for (let i = dustParticles.length - 1; i >= 0; i--) {
                    const p = dustParticles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.01;
                    p.life -= p.decay;
                    if (p.life <= 0) {
                        dustParticles.splice(i, 1);
                    }
                }
                if (dustParticles.length > 400) {
                    dustParticles.splice(0, dustParticles.length - 400);
                }
            }

            function drawDust(w, h) {
                for (const p of dustParticles) {
                    const alpha = p.life * p.alpha;
                    ctx.globalAlpha = alpha * 0.6;
                    ctx.fillStyle = '#c4a882';
                    ctx.shadowBlur = 0;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
            }

            // =============================================================
            // 10. РЕНДЕРИНГ
            // =============================================================
            function render() {
                const w = canvas.width / (window.devicePixelRatio || 1);
                const h = canvas.height / (window.devicePixelRatio || 1);

                ctx.clearRect(0, 0, w, h);

                // ---- ФОН (трек) ----
                if (trackImage && trackImage.complete && trackImage.naturalWidth > 0) {
                    ctx.drawImage(trackImage, 0, 0, w, h);
                } else {
                    const grad = ctx.createLinearGradient(0, 0, 0, h);
                    grad.addColorStop(0, '#1a3a1a');
                    grad.addColorStop(0.5, '#2d5a2d');
                    grad.addColorStop(1, '#1a3a1a');
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, w, h);
                }

                // ---- КАМЕРА ----
                let maxProgress = 0;
                for (let i = 0; i < racePositions.length; i++) {
                    if (racePositions[i] > maxProgress) maxProgress = racePositions[i];
                }
                const trackStart = w * START_X;
                const trackEnd = w * FINISH_X;
                const trackWidth = trackEnd - trackStart;
                const leaderX = trackStart + maxProgress * trackWidth;
                const targetCamX = leaderX - w * 0.35;
                camOffsetX += (targetCamX - camOffsetX) * 0.08;
                camOffsetX = Math.max(0, Math.min(camOffsetX, trackEnd - w * 0.6));
                const targetZoom = 1 + maxProgress * 0.06;
                camZoom += (targetZoom - camZoom) * 0.02;
                camZoom = Math.min(1.08, Math.max(0.94, camZoom));

                ctx.save();
                ctx.translate(-camOffsetX * camZoom + w * 0.5 * (1 - camZoom), 0);
                ctx.scale(camZoom, camZoom);

                // ---- ЛОШАДИ ----
                const horseHeight = h * HORSE_HEIGHT_RATIO;
                const horseWidth = horseHeight * 1.55;

                for (let i = 0; i < HORSES.length; i++) {
                    const horse = HORSES[i];
                    const progress = Math.min(Math.max(racePositions[i] || 0, 0), 1);
                    const x = trackStart + progress * trackWidth;
                    const y = h * LANE_Y[i];

                    const img = horseImages[horse.id];
                    const size = horseHeight;

                    // ---- ПЫЛЬ ----
                    if (isRaceRunning && progress > 0.05 && progress < 0.98) {
                        spawnDust(x - 10, y + 2, 1);
                    }

                    ctx.shadowColor = 'rgba(0,0,0,0.4)';
                    ctx.shadowBlur = 15;
                    ctx.shadowOffsetY = 4;

                    if (img && img.complete && img.naturalWidth > 0) {
                        const drawW = horseWidth;
                        const drawH = horseHeight;

                        let bob = 0;
                        let roll = 0;
                        if (isRaceRunning || raceFinished) {
                            const phase = progress * 40 + i * 1.5;
                            bob = Math.sin(phase) * 2.5;
                            roll = Math.sin(phase * 0.7) * 0.02;
                        }

                        const px = x - drawW * DRAW_OFFSET_X;
                        const py = y - drawH * DRAW_OFFSET_Y + bob;

                        ctx.save();
                        ctx.translate(px + drawW / 2, py + drawH / 2);
                        ctx.rotate(roll);
                        ctx.drawImage(img, -drawW / 2, -drawH / 2, drawW, drawH);
                        ctx.restore();

                        if (selectedHorseId === i && !isRaceRunning && !raceFinished) {
                            ctx.shadowBlur = 30;
                            ctx.shadowColor = 'rgba(255,213,74,0.3)';
                            ctx.strokeStyle = 'rgba(255,213,74,0.2)';
                            ctx.lineWidth = 2;
                            ctx.setLineDash([4, 6]);
                            ctx.beginPath();
                            ctx.ellipse(x, y, size * 0.9, size * 0.6, 0, 0, Math.PI * 2);
                            ctx.stroke();
                            ctx.setLineDash([]);
                            ctx.shadowBlur = 0;
                        }

                        ctx.shadowBlur = 0;
                        ctx.shadowOffsetY = 0;
                        ctx.font = `bold ${Math.max(12, size * 0.3)}px Nunito, sans-serif`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'bottom';
                        ctx.fillStyle = 'rgba(0,0,0,0.6)';
                        ctx.fillText(horse.name, x + 1, y - size * 0.6 + 1);
                        ctx.fillStyle = '#fff';
                        ctx.shadowColor = 'rgba(0,0,0,0.8)';
                        ctx.shadowBlur = 8;
                        ctx.fillText(horse.name, x, y - size * 0.6);
                        ctx.shadowBlur = 0;

                        if (raceFinished && winnerId === i) {
                            ctx.font = `${size * 0.5}px sans-serif`;
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'bottom';
                            ctx.fillStyle = '#FFD54A';
                            ctx.shadowColor = 'rgba(255,213,74,0.6)';
                            ctx.shadowBlur = 20;
                            ctx.fillText('👑', x, y - size * 0.8);
                            ctx.shadowBlur = 0;
                        }
                    } else {
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = 'rgba(0,0,0,0.3)';
                        ctx.fillStyle = horse.color;
                        ctx.fillRect(x - size * 0.4, y - size * 0.4, size * 0.8, size * 0.8);
                        ctx.shadowBlur = 0;
                        ctx.font = `bold ${Math.max(12, size * 0.3)}px Nunito, sans-serif`;
                        ctx.fillStyle = '#fff';
                        ctx.shadowColor = 'rgba(0,0,0,0.8)';
                        ctx.shadowBlur = 6;
                        ctx.fillText(horse.name, x, y - size * 0.6);
                        ctx.shadowBlur = 0;
                    }

                    ctx.shadowBlur = 0;
                    ctx.shadowOffsetY = 0;
                }

                // ---- ПЫЛЬ ----
                drawDust(w, h);

                ctx.restore();

                // ---- СТАТУС ----
                if (isRaceRunning) {
                    ctx.font = `bold ${Math.min(w, h) * 0.04}px Nunito, sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'top';
                    ctx.fillStyle = 'rgba(0,0,0,0.5)';
                    ctx.fillRect(w / 2 - 80, 8, 160, 32);
                    ctx.fillStyle = '#7DF9FF';
                    ctx.shadowColor = 'rgba(125,249,255,0.3)';
                    ctx.shadowBlur = 20;
                    ctx.fillText('🏇 ЗАБЕГ ИДЁТ...', w / 2, 12);
                    ctx.shadowBlur = 0;
                }

                if (raceFinished && winnerId !== null) {
                    const horse = HORSES[winnerId];
                    ctx.font = `bold ${Math.min(w, h) * 0.035}px Nunito, sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'bottom';
                    ctx.fillStyle = 'rgba(0,0,0,0.4)';
                    ctx.fillRect(w / 2 - 100, h - 38, 200, 28);
                    ctx.fillStyle = '#FFD54A';
                    ctx.shadowColor = 'rgba(255,213,74,0.3)';
                    ctx.shadowBlur = 20;
                    ctx.fillText(`🏆 ${horse.name} победил!`, w / 2, h - 12);
                    ctx.shadowBlur = 0;
                }
            }

            // =============================================================
            // 11. СБРОС
            // =============================================================
            function resetPositions() {
                racePositions = HORSES.map(() => 0);
                winnerId = null;
                raceFinished = false;
                camOffsetX = 0;
                camZoom = 1;
                dustParticles = [];
            }

            function resetGame() {
                resetPositions();
                isRaceRunning = false;
                hasBet = false;
                selectedHorseId = null;
                document.querySelectorAll('.horse-btn').forEach(b => b.classList.remove('active'));
                startBtn.disabled = true;
                betBtn.disabled = false;
                betBtn.classList.remove('active');
                statusMsg.textContent = 'Выберите лошадь и сделайте ставку';
                statusMsg.className = 'status-bar';
                resultOverlay.classList.remove('show');
                winOverlay.classList.remove('show');
                if (animationId) { cancelAnimationFrame(animationId);
                    animationId = null; }
                raceSound.pause();
                raceSound.currentTime = 0;
                herdSound.pause();
                herdSound.currentTime = 0;
                render();
                updateUI();
            }

            // =============================================================
            // 12. UI ОБНОВЛЕНИЕ
            // =============================================================
            function updateUI() {
                const bet = parseInt(betInput.value) || 0;
                const validBet = bet > 0 && bet <= balance;
                const hasSelection = selectedHorseId !== null;
                const canBet = !isRaceRunning && !hasBet && hasSelection && validBet && !raceFinished;
                betBtn.disabled = !canBet;
                if (canBet) betBtn.classList.add('active');
                else betBtn.classList.remove('active');

                const canStart = hasBet && !isRaceRunning && !raceFinished && balance >= 0;
                startBtn.disabled = !canStart;

                if (hasBet && !isRaceRunning && !raceFinished) {
                    statusMsg.textContent = `✅ Ставка ${betAmount} ₽ на ${HORSES[selectedHorseId].name}. Нажмите СТАРТ!`;
                    statusMsg.className = 'status-bar info';
                } else if (isRaceRunning) {
                    statusMsg.textContent = '🏇 Забег идёт...';
                    statusMsg.className = 'status-bar race';
                } else if (raceFinished) {
                    // результат в модалке
                } else if (hasSelection && !hasBet) {
                    statusMsg.textContent = `Выбрана ${HORSES[selectedHorseId].name}. Сделайте ставку.`;
                    statusMsg.className = 'status-bar';
                } else {
                    statusMsg.textContent = 'Выберите лошадь и сделайте ставку';
                    statusMsg.className = 'status-bar';
                }
            }

            // =============================================================
            // 13. ВЫБОР ЛОШАДИ
            // =============================================================
            function selectHorse(id) {
                if (isRaceRunning || raceFinished || hasBet) {
                    statusMsg.textContent = '⛔ Дождитесь окончания забега';
                    statusMsg.className = 'status-bar lose';
                    return;
                }
                selectedHorseId = id;
                document.querySelectorAll('.horse-btn').forEach((btn, idx) => {
                    btn.classList.toggle('active', idx === id);
                });
                updateUI();
                render();
            }

            // =============================================================
            // 14. ПОСТРОЕНИЕ КНОПОК
            // =============================================================
            function buildHorseButtons() {
                horseSelector.innerHTML = '';
                HORSES.forEach((horse) => {
                    const btn = document.createElement('div');
                    btn.className = 'horse-btn';
                    btn.dataset.id = horse.id;
                    const odds = (1.2 + Math.random() * 2.0).toFixed(1);
                    btn.innerHTML = `
                        <img class="thumb" src="${horse.img}" alt="${horse.name}" loading="lazy" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2240%22 height=%2240%22%3E%3Ctext y=%2232%22 font-size=%2230%22%3E🐎%3C/text%3E%3C/svg%3E'" />
                        <span class="hname">${horse.name}</span>
                        <span class="hodds">x${odds}</span>
                    `;
                    btn.addEventListener('click', () => selectHorse(horse.id));
                    horseSelector.appendChild(btn);
                });
            }
            buildHorseButtons();

            betPresets.forEach(btn => {
                btn.addEventListener('click', function() {
                    const amount = this.dataset.amount;
                    let val;
                    if (amount === 'max') {
                        val = Math.min(balance, 100000);
                    } else {
                        val = parseInt(amount);
                    }
                    val = Math.max(10, Math.min(val, 100000, balance));
                    betInput.value = val;
                    betPresets.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    updateUI();
                });
            });

            // =============================================================
            // 15. СТАВКА
            // =============================================================
            function placeBet() {
                if (isRaceRunning || raceFinished) {
                    statusMsg.textContent = '⛔ Дождитесь окончания забега';
                    statusMsg.className = 'status-bar lose';
                    return;
                }
                if (selectedHorseId === null) {
                    statusMsg.textContent = '❌ Сначала выберите лошадь';
                    statusMsg.className = 'status-bar lose';
                    return;
                }
                const bet = parseInt(betInput.value) || 0;
                if (bet < 10) {
                    statusMsg.textContent = '❌ Минимальная ставка 10 ₽';
                    statusMsg.className = 'status-bar lose';
                    return;
                }
                if (bet > balance) {
                    statusMsg.textContent = `❌ Недостаточно средств. Баланс: ${balance.toLocaleString()} ₽`;
                    statusMsg.className = 'status-bar lose';
                    return;
                }

                balance -= bet;
                localStorage.setItem('casinoBalance', String(balance));
                updateBalanceDisplay();

                betAmount = bet;
                hasBet = true;
                resetPositions();
                render();
                updateUI();
                statusMsg.textContent = `✅ Ставка ${betAmount} ₽ на ${HORSES[selectedHorseId].name}. Нажмите СТАРТ!`;
                statusMsg.className = 'status-bar info';
            }

            // =============================================================
            // 16. ЗАБЕГ — ГАРАНТИРОВАННО ВСЕ ДОБЕГАЮТ
            // =============================================================
            function startRace() {
                if (!hasBet || isRaceRunning || raceFinished) return;
                if (selectedHorseId === null) return;

                // ЗВУКИ
                herdSound.currentTime = 0;
                herdSound.volume = 0.4;
                herdSound.play().catch(e => console.warn('Звук не воспроизвелся:', e));

                raceSound.currentTime = 0.3;
                raceSound.volume = 0.3;
                setTimeout(() => {
                    raceSound.play().catch(e => console.warn('Звук не воспроизвелся:', e));
                }, 200);

                isRaceRunning = true;
                startBtn.disabled = true;
                betBtn.disabled = true;
                statusMsg.textContent = '🏇 Забег начался!';
                statusMsg.className = 'status-bar race';

                resetPositions();
                dustParticles = [];

                // Определяем победителя
                const weights = HORSES.map((h, i) => {
                    const base = 0.6 + Math.random() * 0.8;
                    const bonus = (i === selectedHorseId) ? 0.15 : 0;
                    return base + bonus;
                });
                const total = weights.reduce((a, b) => a + b, 0);
                let rnd = Math.random() * total;
                let winIdx = 0;
                for (let i = 0; i < weights.length; i++) {
                    rnd -= weights[i];
                    if (rnd <= 0) { winIdx = i; break; }
                }
                winnerId = winIdx;

                // Скорости
                const speeds = HORSES.map((h, i) => {
                    const base = 0.7 + Math.random() * 0.6;
                    const bonus = (i === winnerId) ? 0.15 : 0;
                    return Math.min(1.2, base + bonus);
                });

                const duration = 7000 + Math.random() * 2000;
                const startTime = performance.now();

                function animateRace(time) {
                    const elapsed = time - startTime;
                    const globalProgress = Math.min(elapsed / duration, 1);
                    // Плавная кривая
                    const eased = 1 - Math.pow(1 - globalProgress, 2.5);

                    for (let i = 0; i < HORSES.length; i++) {
                        let p = eased * speeds[i];
                        // Если победитель, он всегда чуть впереди
                        if (i === winnerId) {
                            p = Math.min(p * 1.03, 1);
                        } else {
                            // Остальные могут немного отставать
                            const lag = 0.92 + 0.04 * Math.sin(i + globalProgress * 6);
                            p = Math.min(p * lag, 0.99);
                        }
                        racePositions[i] = Math.min(Math.max(p, 0), 1);
                    }

                    // В конце — все на финише
                    if (globalProgress >= 1) {
                        for (let i = 0; i < HORSES.length; i++) {
                            racePositions[i] = 1;
                        }
                    }

                    updateDust();
                    render();

                    if (globalProgress < 1) {
                        animationId = requestAnimationFrame(animateRace);
                    } else {
                        // Финиш
                        for (let i = 0; i < HORSES.length; i++) {
                            racePositions[i] = 1;
                        }
                        updateDust();
                        render();
                        isRaceRunning = false;
                        raceFinished = true;
                        raceSound.pause();
                        raceSound.currentTime = 0;
                        herdSound.pause();
                        herdSound.currentTime = 0;
                        if (animationId) {
                            cancelAnimationFrame(animationId);
                            animationId = null;
                        }
                        showResult();
                    }
                }

                animationId = requestAnimationFrame(animateRace);
            }

            // =============================================================
            // 17. РЕЗУЛЬТАТ
            // =============================================================
            function showResult() {
                const horse = HORSES[winnerId];
                const multiplier = 1.5 + Math.random() * 2.0;
                const winAmount = Math.floor(betAmount * multiplier);

                balance += winAmount;
                localStorage.setItem('casinoBalance', String(balance));
                updateBalanceDisplay();

                // Старый overlay
                rEmoji.textContent = '🐎';
                rName.textContent = `🏆 ${horse.name}`;
                rAmount.textContent = `+${winAmount.toLocaleString()} ₽`;
                rSub.textContent = `коэффициент x${multiplier.toFixed(1)} · ставка ${betAmount.toLocaleString()} ₽`;
                resultOverlay.classList.add('show');

                // Новый win overlay
                winTextArea.innerHTML = '';
                const titleEl = document.createElement('div');
                titleEl.id = 'winTitle';
                titleEl.style.cssText = `
                    font-family: 'Cinzel', serif;
                    font-size: clamp(22px, 5vw, 36px);
                    font-weight: 900;
                    text-align: center;
                    color: #FFD54A;
                    text-shadow: 0 0 30px rgba(255,213,74,0.2);
                    margin-bottom: 4px;
                    letter-spacing: 2px;
                `;
                titleEl.textContent = 'ПОЗДРАВЛЯЕМ!';

                const subEl = document.createElement('div');
                subEl.id = 'winSub';
                subEl.style.cssText = `
                    font-family: 'Nunito', sans-serif;
                    font-size: clamp(16px, 3.5vw, 22px);
                    font-weight: 800;
                    text-align: center;
                    color: rgba(255,255,255,0.7);
                    margin-bottom: 6px;
                `;
                subEl.textContent = 'Вы выиграли!';

                const amountEl = document.createElement('div');
                amountEl.id = 'winAmount';
                amountEl.style.cssText = `
                    font-family: 'Montserrat', sans-serif;
                    font-size: clamp(28px, 7vw, 48px);
                    font-weight: 900;
                    text-align: center;
                    background: linear-gradient(180deg, #FFF8CC, #FFD95A, #FFB400, #D88A00);
                    -webkit-background-clip: text;
                    background-clip: text;
                    color: transparent;
                    text-shadow: 0 2px 20px rgba(255,213,74,0.3);
                    letter-spacing: 1px;
                    line-height: 1.2;
                `;
                amountEl.textContent = `${winAmount.toLocaleString()} ₽`;

                winTextArea.appendChild(titleEl);
                winTextArea.appendChild(subEl);
                winTextArea.appendChild(amountEl);

                winHorseSlot.innerHTML = '';
                winCoinSlot.innerHTML = '';

                winOverlay.classList.add('show');

                statusMsg.textContent = `🏆 Победил ${horse.name}! Выигрыш ${winAmount.toLocaleString()} ₽`;
                statusMsg.className = 'status-bar win';

                hasBet = false;
                updateUI();

                // Конфетти
                const card = document.querySelector('.result-card');
                const emojis = ['🎉', '🎊', '✨', '⭐', '🏆'];
                for (let i = 0; i < 6; i++) {
                    const span = document.createElement('span');
                    span.className = 'confetti';
                    span.textContent = emojis[i % emojis.length];
                    span.style.left = (10 + Math.random() * 80) + '%';
                    span.style.top = (5 + Math.random() * 30) + '%';
                    span.style.animationDelay = (Math.random() * 0.5) + 's';
                    span.style.fontSize = (16 + Math.random() * 16) + 'px';
                    card.appendChild(span);
                    setTimeout(() => span.remove(), 3000);
                }
            }

            // =============================================================
            // 18. ЗАКРЫТИЕ РЕЗУЛЬТАТА
            // =============================================================
            function closeResult() {
                resultOverlay.classList.remove('show');
                winOverlay.classList.remove('show');
                resetGame();
                updateBalanceDisplay();
                betBtn.disabled = false;
                startBtn.disabled = true;
                statusMsg.textContent = 'Выберите лошадь и сделайте ставку';
                statusMsg.className = 'status-bar';
                render();
            }

            resultOk.addEventListener('click', closeResult);
            winCloseBtn.addEventListener('click', closeResult);

            // =============================================================
            // 19. ОБРАБОТЧИКИ
            // =============================================================
            betBtn.addEventListener('click', placeBet);
            startBtn.addEventListener('click', startRace);

            betInput.addEventListener('input', function() {
                let val = parseInt(this.value) || 0;
                if (val < 0) this.value = 0;
                if (val > 100000) this.value = 100000;
                betPresets.forEach(b => b.classList.remove('active'));
                updateUI();
            });

            backBtn.addEventListener('click', function() {
                if (animationId) cancelAnimationFrame(animationId);
                raceSound.pause();
                raceSound.currentTime = 0;
                herdSound.pause();
                herdSound.currentTime = 0;
                window.location.href = 'casino.html?userId=' + userId;
            });

            // =============================================================
            // 20. КЛАВИАТУРА
            // =============================================================
            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space' && !e.repeat) {
                    e.preventDefault();
                    if (!startBtn.disabled) startBtn.click();
                    else if (!betBtn.disabled) betBtn.click();
                }
            });

            // =============================================================
            // 21. ИНИЦИАЛИЗАЦИЯ
            // =============================================================
            resetPositions();

            loadAllImages().then(() => {
                resizeCanvas();
                resetGame();
                updateUI();
                console.log('🐎 Скачки загружены, баланс:', balance);
            }).catch(() => {
                resizeCanvas();
                resetGame();
                updateUI();
                console.log('🐎 Скачки загружены (с ошибками), баланс:', balance);
            });

            window.addEventListener('storage', (e) => {
                if (e.key === 'casinoBalance') {
                    balance = parseInt(e.newValue) || 0;
                    updateBalanceDisplay();
                    updateUI();
                }
            });

        })();
    </script>

</body>
</html>
