<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Скачки · R-GAME</title>
    <script src="https://telegram.org/js/telegram-web-app.js">
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800;900&family=Nunito:wght@600;700;800;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Nunito', sans-serif;
            background: #0a0f1a;
            color: #fff;
            position: fixed;
            top: 0;
            left: 0;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: radial-gradient(ellipse at 50% 0%, rgba(255, 213, 74, 0.06), transparent 60%);
            padding: 8px 10px 10px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 15, 26, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 8px 14px;
            border: 1px solid rgba(255, 213, 74, 0.15);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
            flex-shrink: 0;
            margin-bottom: 8px;
            min-height: 48px;
        }
        .header .left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-back {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 213, 74, 0.2);
            border-radius: 50%;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FFD54A;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
            flex-shrink: 0;
        }
        .btn-back:active {
            transform: scale(0.88);
            background: rgba(255, 213, 74, 0.1);
        }
        .brand {
            font-family: 'Cinzel', serif;
            font-size: 20px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, #FFD54A);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .brand span {
            color: #FFD54A;
            -webkit-text-fill-color: #FFD54A;
        }

        .balance-box {
            background: rgba(0, 0, 0, 0.4);
            padding: 4px 14px;
            border-radius: 30px;
            border: 1px solid rgba(255, 213, 74, 0.15);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .balance-label {
            font-size: 9px;
            text-transform: uppercase;
            color: #FFD54A;
            opacity: 0.5;
            letter-spacing: 1px;
        }
        .balance-value {
            font-family: 'Cinzel', serif;
            font-size: 17px;
            font-weight: 900;
            color: #fff;
        }

        .race-wrapper {
            flex: 1;
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            background: #0a0f1a;
            border: 1px solid rgba(255, 213, 74, 0.08);
            box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.7);
            min-height: 0;
        }
        #raceCanvas {
            width: 100%;
            height: 100%;
            display: block;
            image-rendering: auto;
        }

        .bottom-panel {
            flex-shrink: 0;
            padding: 8px 0 4px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .horse-selector {
            display: flex;
            gap: 6px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .horse-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 2px solid rgba(255, 255, 255, 0.06);
            border-radius: 18px;
            padding: 8px 12px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            min-width: 92px;
            max-width: none;
            height: 110px;
            position: relative;
            background: rgba(0, 0, 0, 0.3);
            justify-content: center;
        }
        .horse-btn .thumb {
            width: 58px;
            height: 58px;
            object-fit: contain;
            display: block;
            border-radius: 6px;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.5));
            transition: transform 0.3s;
        }
        .horse-btn .hname {
            font-size: 13px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 4px;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }
        .horse-btn .hodds {
            font-size: 10px;
            color: #FFD54A;
            opacity: 0.5;
        }
        .horse-btn.active {
            border-color: #FFD54A;
            background: rgba(255, 213, 74, 0.12);
            box-shadow: 0 0 20px rgba(255, 213, 74, 0.15);
            transform: translateY(-2px);
        }
        .horse-btn.active .hname {
            color: #fff;
        }
        .horse-btn:active {
            transform: scale(0.92);
        }

        .controls-row {
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: center;
        }
        .bet-input {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 213, 74, 0.15);
            border-radius: 22px;
            padding: 8px 14px;
            color: #fff;
            font-size: 20px;
            font-weight: 700;
            width: 120px;
            text-align: center;
            font-family: 'Nunito', sans-serif;
            height: 70px;
        }
        .bet-input:focus {
            outline: none;
            border-color: #FFD54A;
        }
        .bet-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
        }

        .btn {
            border: none;
            border-radius: 22px;
            padding: 0 30px;
            font-weight: 800;
            font-size: 22px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            font-family: 'Nunito', sans-serif;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            min-width: 90px;
        }
        .btn:active {
            transform: scale(0.94);
        }
        .btn:disabled {
            opacity: 0.25;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-bet {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 213, 74, 0.25);
            color: #FFD54A;
            flex: 0 1 auto;
            min-width: 90px;
        }
        .btn-bet.active {
            background: rgba(255, 213, 74, 0.15);
            border-color: #FFD54A;
        }

        .btn-start {
            background: linear-gradient(135deg, #3DDC84, #1a8a4a);
            color: #fff;
            flex: 1;
            min-width: 90px;
            font-size: 24px;
        }
        .btn-start:disabled {
            background: #333;
            color: #666;
        }

        .status-bar {
            text-align: center;
            font-size: 14px;
            font-weight: 700;
            min-height: 24px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.5px;
            padding: 4px 0;
            transition: all 0.3s;
        }
        .status-bar.win {
            color: #3DDC84;
        }
        .status-bar.lose {
            color: #E85555;
        }
        .status-bar.info {
            color: #FFD54A;
        }
        .status-bar.race {
            color: #7DF9FF;
        }

        .result-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 20;
            display: none;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            animation: fadeOverlay 0.4s ease;
        }
        .result-overlay.show {
            display: flex;
        }
        @keyframes fadeOverlay {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .result-card {
            background: linear-gradient(160deg, rgba(20, 30, 50, 0.95), rgba(10, 15, 26, 0.98));
            border: 2px solid rgba(255, 213, 74, 0.3);
            border-radius: 24px;
            padding: 28px 30px 24px;
            text-align: center;
            max-width: 320px;
            width: 92%;
            box-shadow: 0 0 80px rgba(255, 213, 74, 0.08), 0 20px 60px rgba(0, 0, 0, 0.8);
            animation: popResult 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }
        @keyframes popResult {
            from {
                transform: scale(0.7) translateY(20px);
                opacity: 0;
            }
            to {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }
        .result-card .emoji-big {
            font-size: 56px;
            display: block;
            margin-bottom: 4px;
            filter: drop-shadow(0 0 30px rgba(255, 213, 74, 0.2));
        }
        .result-card .r-name {
            font-size: 22px;
            font-weight: 900;
            color: #FFD54A;
            font-family: 'Cinzel', serif;
        }
        .result-card .r-amount {
            font-size: 18px;
            color: #3DDC84;
            margin: 6px 0 4px;
            font-weight: 800;
        }
        .result-card .r-sub {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.3);
            margin-bottom: 12px;
        }
        .result-card .btn-ok {
            background: linear-gradient(135deg, #FFD54A, #b8860b);
            color: #0a0f1a;
            font-weight: 900;
            border: none;
            padding: 10px 32px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Nunito', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 20px rgba(255, 213, 74, 0.2);
        }
        .result-card .btn-ok:active {
            transform: scale(0.94);
        }
        .result-card .confetti {
            position: absolute;
            font-size: 20px;
            animation: confettiFall 2s ease-in-out infinite;
        }
        @keyframes confettiFall {
            0%,
            100% {
                transform: translateY(-10px) rotate(0deg);
                opacity: 1;
            }
            50% {
                transform: translateY(10px) rotate(180deg);
                opacity: 0.7;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 6px 10px;
                min-height: 42px;
            }
            .brand {
                font-size: 16px;
            }
            .balance-value {
                font-size: 14px;
            }
            .btn-back {
                width: 30px;
                height: 30px;
                font-size: 15px;
            }
            .horse-btn {
                min-width: 70px;
                height: 90px;
                padding: 6px 8px;
            }
            .horse-btn .thumb {
                width: 44px;
                height: 44px;
            }
            .horse-btn .hname {
                font-size: 11px;
            }
            .bet-input {
                width: 90px;
                font-size: 18px;
                height: 60px;
            }
            .btn {
                font-size: 18px;
                height: 60px;
                padding: 0 20px;
                min-width: 70px;
                border-radius: 18px;
            }
            .btn-start {
                font-size: 20px;
                min-width: 70px;
            }
            .result-card {
                padding: 20px 18px 18px;
            }
            .result-card .emoji-big {
                font-size: 44px;
            }
            .result-card .r-name {
                font-size: 18px;
            }
            .status-bar {
                font-size: 12px;
                min-height: 20px;
            }
            .controls-row {
                gap: 6px;
            }
        }
        @media (max-width: 370px) {
            .horse-btn {
                min-width: 56px;
                height: 74px;
                padding: 4px 4px;
            }
            .horse-btn .thumb {
                width: 34px;
                height: 34px;
            }
            .horse-btn .hname {
                font-size: 9px;
            }
            .bet-input {
                width: 70px;
                font-size: 15px;
                height: 50px;
            }
            .btn {
                font-size: 15px;
                height: 50px;
                padding: 0 14px;
                min-width: 56px;
                border-radius: 14px;
            }
            .btn-start {
                font-size: 16px;
                min-width: 56px;
            }
            .brand {
                font-size: 13px;
            }
            .balance-value {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <div id="app">
        <div class="header">
            <div class="left">
                <button class="btn-back" id="backBtn">◁</button>
                <span class="brand">R-<span>GAME</span></span>
            </div>
            <div class="balance-box">
                <span class="balance-label">Баланс</span>
                <span class="balance-value" id="balanceDisplay">0 ₽</span>
            </div>
        </div>

        <div class="race-wrapper">
            <canvas id="raceCanvas"></canvas>
            <div class="result-overlay" id="resultOverlay">
                <div class="result-card">
                    <span class="emoji-big" id="rEmoji">🐎</span>
                    <div class="r-name" id="rName">Победитель</div>
                    <div class="r-amount" id="rAmount">+0 ₽</div>
                    <div class="r-sub" id="rSub">x1.0 коэффициент</div>
                    <button class="btn-ok" id="resultOk">🏆 Отлично!</button>
                </div>
            </div>
        </div>

        <div class="bottom-panel">
            <div class="horse-selector" id="horseSelector"></div>

            <div class="controls-row">
                <input type="number" class="bet-input" id="betInput" value="100" min="10" step="10" />
                <button class="btn btn-bet" id="betBtn">СТАВКА</button>
                <button class="btn btn-start" id="startBtn" disabled>🏁 СТАРТ</button>
            </div>

            <div class="status-bar" id="statusMsg">Выберите лошадь и сделайте ставку</div>
        </div>
    </div>

    <audio id="raceSound" loop preload="auto">
        <source src="0011299.mp3" type="audio/mpeg">
    </audio>

    <script>
        (function() {
            'use strict';

            // =============================================================
            // 1. TELEGRAM
            // =============================================================
            const tg = window.Telegram.WebApp;
            if (tg) { tg.expand();
                tg.enableClosingConfirmation(); }
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('userId') || (tg?.initDataUnsafe?.user?.id) || '';

            // =============================================================
            // 2. БАЛАНС
            // =============================================================
            let balance = parseInt(localStorage.getItem('casinoBalance')) || 0;
            const balanceDisplay = document.getElementById('balanceDisplay');

            function updateBalanceDisplay() {
                balanceDisplay.innerText = balance.toLocaleString() + ' ₽';
            }
            updateBalanceDisplay();

            // =============================================================
            // 3. КОНФИГ ЛОШАДЕЙ
            // =============================================================
            const BASE_URL = 'https://raw.githubusercontent.com/ruslangodunov66-alt/resellcrash/main/horse/';

            const HORSES = [
                { id: 0, name: 'Молния', img: BASE_URL + 'IMG_0452.PNG', color: '#E74C3C', lane: 0 },
                { id: 1, name: 'Вихрь', img: BASE_URL + 'IMG_0453.PNG', color: '#3498DB', lane: 1 },
                { id: 2, name: 'Гром', img: BASE_URL + 'IMG_0454.PNG', color: '#2ECC71', lane: 2 },
                { id: 3, name: 'Зефир', img: BASE_URL + 'IMG_0455.PNG', color: '#F1C40F', lane: 3 },
                { id: 4, name: 'Тень', img: BASE_URL + 'IMG_0456.PNG', color: '#9B59B6', lane: 4 },
                { id: 5, name: 'Сокол', img: BASE_URL + 'IMG_0457.PNG', color: '#E67E22', lane: 5 }
            ];

            const TRACK_IMAGE = BASE_URL + 'VEux9kYOWxh76c7RwQzuXANIZG1ubOe0RnNv6F9hUF4X8sf87LkBB913Dok_RAxCn_noaI-gouxxGx-9rEECChGn.jpg';

            // =============================================================
            // 4. DOM
            // =============================================================
            const canvas = document.getElementById('raceCanvas');
            const ctx = canvas.getContext('2d');
            const horseSelector = document.getElementById('horseSelector');
            const betInput = document.getElementById('betInput');
            const betBtn = document.getElementById('betBtn');
            const startBtn = document.getElementById('startBtn');
            const statusMsg = document.getElementById('statusMsg');
            const resultOverlay = document.getElementById('resultOverlay');
            const rEmoji = document.getElementById('rEmoji');
            const rName = document.getElementById('rName');
            const rAmount = document.getElementById('rAmount');
            const rSub = document.getElementById('rSub');
            const resultOk = document.getElementById('resultOk');
            const backBtn = document.getElementById('backBtn');
            const raceSound = document.getElementById('raceSound');

            // =============================================================
            // 5. СОСТОЯНИЕ
            // =============================================================
            let selectedHorseId = null;
            let betAmount = 100;
            let isRaceRunning = false;
            let hasBet = false;
            let raceFinished = false;
            let racePositions = [];
            let winnerId = null;
            let animationId = null;
            let horseImages = {};
            let trackImage = null;
            let ready = false;

            // =============================================================
            // 6. ЗАГРУЗКА ИЗОБРАЖЕНИЙ
            // =============================================================
            function loadImage(src) {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.crossOrigin = 'anonymous';
                    img.src = src;
                    img.onload = () => resolve(img);
                    img.onerror = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = 80;
                        canvas.height = 60;
                        const c = canvas.getContext('2d');
                        c.fillStyle = '#555';
                        c.fillRect(0, 0, 80, 60);
                        c.fillStyle = '#fff';
                        c.font = '24px sans-serif';
                        c.textAlign = 'center';
                        c.textBaseline = 'middle';
                        c.fillText('🐎', 40, 30);
                        const fallback = new Image();
                        fallback.src = canvas.toDataURL();
                        resolve(fallback);
                    };
                });
            }

            async function loadAllImages() {
                try {
                    trackImage = await loadImage(TRACK_IMAGE);
                    for (const h of HORSES) {
                        const img = await loadImage(h.img);
                        horseImages[h.id] = img;
                    }
                    ready = true;
                    resizeCanvas();
                    resetGame();
                } catch (e) {
                    console.warn('Ошибка загрузки изображений:', e);
                    ready = true;
                    resizeCanvas();
                    resetGame();
                }
            }

            // =============================================================
            // 7. РАЗМЕР CANVAS
            // =============================================================
            function resizeCanvas() {
                const rect = canvas.parentElement.getBoundingClientRect();
                const dpr = window.devicePixelRatio || 1;
                canvas.width = rect.width * dpr;
                canvas.height = rect.height * dpr;
                canvas.style.width = rect.width + 'px';
                canvas.style.height = rect.height + 'px';
                ctx.scale(dpr, dpr);
                if (ready) render();
            }

            const resizeObserver = new ResizeObserver(() => resizeCanvas());
            resizeObserver.observe(canvas.parentElement);
            window.addEventListener('resize', resizeCanvas);

            // =============================================================
            // 8. ОТРИСОВКА — УВЕЛИЧЕННЫЕ ЛОШАДИ, СКОРРЕКТИРОВАННЫЕ КООРДИНАТЫ
            // =============================================================
            // Исправленные центры дорожек (первые три опущены)
            const LANE_Y = [
                0.135, // Молния (было 0.115)
                0.275, // Вихрь  (было 0.255)
                0.415, // Гром   (было 0.395)
                0.535, // Зефир
                0.675, // Тень
                0.815  // Сокол
            ];

            const START_X = 0.07;
            const FINISH_X = 0.90;

            // Увеличенный размер лошадей
            const HORSE_HEIGHT_RATIO = 0.10; // было 0.085
            const HORSE_WIDTH_RATIO = 0.10 * 1.55;

            const DRAW_OFFSET_X = 0.15;
            const DRAW_OFFSET_Y = 0.40;

            function render() {
                const w = canvas.width / (window.devicePixelRatio || 1);
                const h = canvas.height / (window.devicePixelRatio || 1);

                ctx.clearRect(0, 0, w, h);

                // ---- ФОН (трек) ----
                if (trackImage && trackImage.complete && trackImage.naturalWidth > 0) {
                    ctx.drawImage(trackImage, 0, 0, w, h);
                } else {
                    const grad = ctx.createLinearGradient(0, 0, 0, h);
                    grad.addColorStop(0, '#1a3a1a');
                    grad.addColorStop(0.5, '#2d5a2d');
                    grad.addColorStop(1, '#1a3a1a');
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, w, h);
                }

                // ---- ЛОШАДИ ----
                const trackStart = w * START_X;
                const trackEnd = w * FINISH_X;
                const trackWidth = trackEnd - trackStart;

                const horseHeight = h * HORSE_HEIGHT_RATIO;
                const horseWidth = horseHeight * 1.55;

                for (let i = 0; i < HORSES.length; i++) {
                    const horse = HORSES[i];
                    const progress = racePositions[i] || 0;
                    // Ограничиваем progress максимум 1
                    const p = Math.min(Math.max(progress, 0), 1);
                    const x = trackStart + p * trackWidth;
                    const y = h * LANE_Y[i];

                    const img = horseImages[horse.id];
                    const size = horseHeight;

                    ctx.shadowColor = 'rgba(0,0,0,0.4)';
                    ctx.shadowBlur = 15;
                    ctx.shadowOffsetY = 4;

                    if (img && img.complete && img.naturalWidth > 0) {
                        const drawW = horseWidth;
                        const drawH = horseHeight;
                        const px = x - drawW * DRAW_OFFSET_X;
                        const py = y - drawH * DRAW_OFFSET_Y;

                        let bob = 0;
                        if (isRaceRunning) {
                            bob = Math.sin(p * 40 + i * 1.2) * 2;
                        }
                        ctx.save();
                        ctx.translate(px + drawW / 2, py + drawH / 2 + bob);
                        ctx.rotate(p > 0.2 ? -0.04 : 0);
                        ctx.drawImage(img, -drawW / 2, -drawH / 2, drawW, drawH);
                        ctx.restore();

                        if (selectedHorseId === i && !isRaceRunning && !raceFinished) {
                            ctx.shadowBlur = 30;
                            ctx.shadowColor = 'rgba(255,213,74,0.3)';
                            ctx.strokeStyle = 'rgba(255,213,74,0.2)';
                            ctx.lineWidth = 2;
                            ctx.setLineDash([4, 6]);
                            ctx.beginPath();
                            ctx.ellipse(x, y, size * 0.9, size * 0.6, 0, 0, Math.PI * 2);
                            ctx.stroke();
                            ctx.setLineDash([]);
                            ctx.shadowBlur = 0;
                        }

                        ctx.shadowBlur = 0;
                        ctx.shadowOffsetY = 0;
                        ctx.font = `bold ${Math.max(12, size * 0.3)}px Nunito, sans-serif`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'bottom';
                        ctx.fillStyle = 'rgba(0,0,0,0.6)';
                        ctx.fillText(horse.name, x + 1, y - size * 0.6 + 1);
                        ctx.fillStyle = '#fff';
                        ctx.shadowColor = 'rgba(0,0,0,0.8)';
                        ctx.shadowBlur = 8;
                        ctx.fillText(horse.name, x, y - size * 0.6);
                        ctx.shadowBlur = 0;

                        if (raceFinished && winnerId === i) {
                            ctx.font = `${size * 0.5}px sans-serif`;
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'bottom';
                            ctx.fillStyle = '#FFD54A';
                            ctx.shadowColor = 'rgba(255,213,74,0.6)';
                            ctx.shadowBlur = 20;
                            ctx.fillText('👑', x, y - size * 0.8);
                            ctx.shadowBlur = 0;
                        }
                    } else {
                        // fallback
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = 'rgba(0,0,0,0.3)';
                        ctx.beginPath();
                        ctx.arc(x, y, size * 0.5, 0, Math.PI * 2);
                        ctx.fillStyle = horse.color;
                        ctx.fill();
                        ctx.fillStyle = '#fff';
                        ctx.font = `${size * 0.5}px sans-serif`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText('🐎', x, y);
                        ctx.shadowBlur = 0;
                        ctx.font = `bold ${Math.max(12, size * 0.28)}px Nunito, sans-serif`;
                        ctx.fillStyle = '#fff';
                        ctx.shadowColor = 'rgba(0,0,0,0.8)';
                        ctx.shadowBlur = 6;
                        ctx.fillText(horse.name, x, y - size * 0.6);
                        ctx.shadowBlur = 0;
                    }

                    ctx.shadowBlur = 0;
                    ctx.shadowOffsetY = 0;
                }

                // ---- СТАТУС ----
                if (isRaceRunning) {
                    ctx.font = `bold ${Math.min(w, h) * 0.04}px Nunito, sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'top';
                    ctx.fillStyle = 'rgba(0,0,0,0.5)';
                    ctx.fillRect(w / 2 - 80, 8, 160, 32);
                    ctx.fillStyle = '#7DF9FF';
                    ctx.shadowColor = 'rgba(125,249,255,0.3)';
                    ctx.shadowBlur = 20;
                    ctx.fillText('🏇 ЗАБЕГ ИДЁТ...', w / 2, 12);
                    ctx.shadowBlur = 0;
                }

                if (raceFinished && winnerId !== null) {
                    const horse = HORSES[winnerId];
                    ctx.font = `bold ${Math.min(w, h) * 0.035}px Nunito, sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'bottom';
                    ctx.fillStyle = 'rgba(0,0,0,0.4)';
                    ctx.fillRect(w / 2 - 100, h - 38, 200, 28);
                    ctx.fillStyle = '#FFD54A';
                    ctx.shadowColor = 'rgba(255,213,74,0.3)';
                    ctx.shadowBlur = 20;
                    ctx.fillText(`🏆 ${horse.name} победил!`, w / 2, h - 12);
                    ctx.shadowBlur = 0;
                }
            }

            // =============================================================
            // 9. СБРОС
            // =============================================================
            function resetPositions() {
                racePositions = HORSES.map(() => 0);
                winnerId = null;
                raceFinished = false;
            }

            function resetGame() {
                resetPositions();
                isRaceRunning = false;
                hasBet = false;
                selectedHorseId = null;
                document.querySelectorAll('.horse-btn').forEach(b => b.classList.remove('active'));
                startBtn.disabled = true;
                betBtn.disabled = false;
                betBtn.classList.remove('active');
                statusMsg.textContent = 'Выберите лошадь и сделайте ставку';
                statusMsg.className = 'status-bar';
                resultOverlay.classList.remove('show');
                if (animationId) { cancelAnimationFrame(animationId);
                    animationId = null; }
                raceSound.pause();
                raceSound.currentTime = 0;
                render();
                updateUI();
            }

            // =============================================================
            // 10. UI ОБНОВЛЕНИЕ
            // =============================================================
            function updateUI() {
                const bet = parseInt(betInput.value) || 0;
                const validBet = bet > 0 && bet <= balance;
                const hasSelection = selectedHorseId !== null;
                const canBet = !isRaceRunning && !hasBet && hasSelection && validBet && !raceFinished;
                betBtn.disabled = !canBet;
                if (canBet) betBtn.classList.add('active');
                else betBtn.classList.remove('active');

                const canStart = hasBet && !isRaceRunning && !raceFinished && balance >= 0;
                startBtn.disabled = !canStart;

                if (hasBet && !isRaceRunning && !raceFinished) {
                    statusMsg.textContent = `✅ Ставка ${betAmount} ₽ на ${HORSES[selectedHorseId].name}. Нажмите СТАРТ!`;
                    statusMsg.className = 'status-bar info';
                } else if (isRaceRunning) {
                    statusMsg.textContent = '🏇 Забег идёт...';
                    statusMsg.className = 'status-bar race';
                } else if (raceFinished) {
                    // результат в модалке
                } else if (hasSelection && !hasBet) {
                    statusMsg.textContent = `Выбрана ${HORSES[selectedHorseId].name}. Сделайте ставку.`;
                    statusMsg.className = 'status-bar';
                } else {
                    statusMsg.textContent = 'Выберите лошадь и сделайте ставку';
                    statusMsg.className = 'status-bar';
                }
            }

            // =============================================================
            // 11. ВЫБОР ЛОШАДИ
            // =============================================================
            function selectHorse(id) {
                if (isRaceRunning || raceFinished || hasBet) {
                    statusMsg.textContent = '⛔ Дождитесь окончания забега';
                    statusMsg.className = 'status-bar lose';
                    return;
                }
                selectedHorseId = id;
                document.querySelectorAll('.horse-btn').forEach((btn, idx) => {
                    btn.classList.toggle('active', idx === id);
                });
                updateUI();
                render();
            }

            // =============================================================
            // 12. ПОСТРОЕНИЕ КНОПОК ЛОШАДЕЙ
            // =============================================================
            function buildHorseButtons() {
                horseSelector.innerHTML = '';
                HORSES.forEach((horse) => {
                    const btn = document.createElement('div');
                    btn.className = 'horse-btn';
                    btn.dataset.id = horse.id;
                    const odds = (1.2 + Math.random() * 2.0).toFixed(1);
                    btn.innerHTML = `
                        <img class="thumb" src="${horse.img}" alt="${horse.name}" loading="lazy" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2240%22 height=%2240%22%3E%3Ctext y=%2232%22 font-size=%2230%22%3E🐎%3C/text%3E%3C/svg%3E'" />
                        <span class="hname">${horse.name}</span>
                        <span class="hodds">x${odds}</span>
                    `;
                    btn.addEventListener('click', () => selectHorse(horse.id));
                    horseSelector.appendChild(btn);
                });
            }
            buildHorseButtons();

            // =============================================================
            // 13. СТАВКА
            // =============================================================
            function placeBet() {
                if (isRaceRunning || raceFinished) {
                    statusMsg.textContent = '⛔ Дождитесь окончания забега';
                    statusMsg.className = 'status-bar lose';
                    return;
                }
                if (selectedHorseId === null) {
                    statusMsg.textContent = '❌ Сначала выберите лошадь';
                    statusMsg.className = 'status-bar lose';
                    return;
                }
                const bet = parseInt(betInput.value) || 0;
                if (bet < 10) {
                    statusMsg.textContent = '❌ Минимальная ставка 10 ₽';
                    statusMsg.className = 'status-bar lose';
                    return;
                }
                if (bet > balance) {
                    statusMsg.textContent = `❌ Недостаточно средств. Баланс: ${balance.toLocaleString()} ₽`;
                    statusMsg.className = 'status-bar lose';
                    return;
                }

                balance -= bet;
                localStorage.setItem('casinoBalance', String(balance));
                updateBalanceDisplay();

                betAmount = bet;
                hasBet = true;
                resetPositions();
                render();
                updateUI();
                statusMsg.textContent = `✅ Ставка ${betAmount} ₽ на ${HORSES[selectedHorseId].name}. Нажмите СТАРТ!`;
                statusMsg.className = 'status-bar info';
            }

            // =============================================================
            // 14. ЗАБЕГ — ПЛАВНАЯ АНИМАЦИЯ, УВЕЛИЧЕННАЯ ДЛИТЕЛЬНОСТЬ, БЕЗ ОТКАТА
            // =============================================================
            function startRace() {
                if (!hasBet || isRaceRunning || raceFinished) return;
                if (selectedHorseId === null) return;

                raceSound.currentTime = 0;
                raceSound.play().catch(e => console.warn('Звук не воспроизвелся:', e));

                isRaceRunning = true;
                startBtn.disabled = true;
                betBtn.disabled = true;
                statusMsg.textContent = '🏇 Забег начался!';
                statusMsg.className = 'status-bar race';

                resetPositions();

                // Определяем победителя с весами
                const weights = HORSES.map((h, i) => {
                    const base = 0.6 + Math.random() * 0.8;
                    const bonus = (i === selectedHorseId) ? 0.15 : 0;
                    return base + bonus;
                });
                const total = weights.reduce((a, b) => a + b, 0);
                let rnd = Math.random() * total;
                let winIdx = 0;
                for (let i = 0; i < weights.length; i++) {
                    rnd -= weights[i];
                    if (rnd <= 0) { winIdx = i; break; }
                }
                winnerId = winIdx;

                // Длительность забега (10–12 секунд)
                const duration = 10000 + Math.random() * 2000;
                const startTime = performance.now();

                // Скорости лошадей
                const speeds = HORSES.map((h, i) => {
                    const base = 0.7 + Math.random() * 0.3;
                    const bonus = (i === winnerId) ? 0.25 : (Math.random() * 0.05);
                    return Math.min(1, base + bonus);
                });

                function animateRace(time) {
                    const elapsed = time - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    // Плавное замедление в конце (easeOutCubic)
                    const eased = 1 - Math.pow(1 - progress, 3);

                    for (let i = 0; i < HORSES.length; i++) {
                        let p = eased * speeds[i];
                        // Победитель всегда чуть впереди
                        if (i === winnerId) {
                            p = Math.min(p * 1.08, 1);
                        } else {
                            // Остальные с плавным отставанием, без резких скачков
                            const lag = 0.90 + 0.04 * Math.sin(i + progress * 8);
                            p = Math.min(p * lag, 0.98);
                        }
                        // Фиксируем, чтобы не выходили за пределы
                        racePositions[i] = Math.min(Math.max(p, 0), 1);
                    }

                    // В самом конце гарантируем, что победитель на финише
                    if (progress > 0.97) {
                        racePositions[winnerId] = 1;
                    }

                    render();

                    if (progress < 1) {
                        animationId = requestAnimationFrame(animateRace);
                    } else {
                        // Финиш — фиксируем все позиции (без отката)
                        racePositions[winnerId] = 1;
                        // Для остальных оставляем их текущие значения (не корректируем)
                        render();
                        isRaceRunning = false;
                        raceFinished = true;
                        raceSound.pause();
                        raceSound.currentTime = 0;
                        if (animationId) {
                            cancelAnimationFrame(animationId);
                            animationId = null;
                        }
                        showResult();
                    }
                }

                animationId = requestAnimationFrame(animateRace);
            }

            // =============================================================
            // 15. РЕЗУЛЬТАТ
            // =============================================================
            function showResult() {
                const horse = HORSES[winnerId];
                const multiplier = 1.5 + Math.random() * 2.0;
                const winAmount = Math.floor(betAmount * multiplier);

                balance += winAmount;
                localStorage.setItem('casinoBalance', String(balance));
                updateBalanceDisplay();

                rEmoji.textContent = '🐎';
                rName.textContent = `🏆 ${horse.name}`;
                rAmount.textContent = `+${winAmount.toLocaleString()} ₽`;
                rSub.textContent = `коэффициент x${multiplier.toFixed(1)} · ставка ${betAmount.toLocaleString()} ₽`;

                resultOverlay.classList.add('show');

                statusMsg.textContent = `🏆 Победил ${horse.name}! Выигрыш ${winAmount.toLocaleString()} ₽`;
                statusMsg.className = 'status-bar win';

                hasBet = false;
                updateUI();

                const card = document.querySelector('.result-card');
                const emojis = ['🎉', '🎊', '✨', '⭐', '🏆'];
                for (let i = 0; i < 6; i++) {
                    const span = document.createElement('span');
                    span.className = 'confetti';
                    span.textContent = emojis[i % emojis.length];
                    span.style.left = (10 + Math.random() * 80) + '%';
                    span.style.top = (5 + Math.random() * 30) + '%';
                    span.style.animationDelay = (Math.random() * 0.5) + 's';
                    span.style.fontSize = (16 + Math.random() * 16) + 'px';
                    card.appendChild(span);
                    setTimeout(() => span.remove(), 3000);
                }
            }

            // =============================================================
            // 16. ЗАКРЫТИЕ РЕЗУЛЬТАТА
            // =============================================================
            resultOk.addEventListener('click', function() {
                resultOverlay.classList.remove('show');
                resetGame();
                updateBalanceDisplay();
                betBtn.disabled = false;
                startBtn.disabled = true;
                statusMsg.textContent = 'Выберите лошадь и сделайте ставку';
                statusMsg.className = 'status-bar';
                render();
            });

            // =============================================================
            // 17. ОБРАБОТЧИКИ
            // =============================================================
            betBtn.addEventListener('click', placeBet);
            startBtn.addEventListener('click', startRace);

            betInput.addEventListener('input', function() {
                let val = parseInt(this.value) || 0;
                if (val < 0) this.value = 0;
                if (val > 100000) this.value = 100000;
                updateUI();
            });

            backBtn.addEventListener('click', function() {
                if (animationId) cancelAnimationFrame(animationId);
                raceSound.pause();
                raceSound.currentTime = 0;
                window.location.href = 'casino.html?userId=' + userId;
            });

            // =============================================================
            // 18. КЛАВИАТУРА
            // =============================================================
            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space' && !e.repeat) {
                    e.preventDefault();
                    if (!startBtn.disabled) startBtn.click();
                    else if (!betBtn.disabled) betBtn.click();
                }
            });

            // =============================================================
            // 19. ИНИЦИАЛИЗАЦИЯ
            // =============================================================
            resetPositions();

            loadAllImages().then(() => {
                resizeCanvas();
                resetGame();
                updateUI();
                console.log('🐎 Скачки загружены, баланс:', balance);
            }).catch(() => {
                resizeCanvas();
                resetGame();
                updateUI();
                console.log('🐎 Скачки загружены (с ошибками), баланс:', balance);
            });

            window.addEventListener('storage', (e) => {
                if (e.key === 'casinoBalance') {
                    balance = parseInt(e.newValue) || 0;
                    updateBalanceDisplay();
                    updateUI();
                }
            });

        })();
    </script>

</body>
