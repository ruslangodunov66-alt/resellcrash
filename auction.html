<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Аукцион | Resell Tycoon</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: radial-gradient(circle at 30% 10%, #0c1120, #020408); color: #ddd; padding: 20px; }
        .container { max-width: 650px; margin: 0 auto; }
        .glass-card { background: rgba(20,30,45,0.7); backdrop-filter: blur(12px); border-radius: 48px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(0,255,255,0.3); }
        h2 { font-size: 28px; background: linear-gradient(135deg, #ffcc44, #ff6644); background-clip: text; -webkit-background-clip: text; color: transparent; margin-bottom: 15px; }
        .balance { font-size: 18px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 40px; text-align: center; margin-bottom: 20px; }
        .lot-card { background: rgba(0,0,0,0.6); border-radius: 32px; padding: 16px; margin-bottom: 16px; }
        .bid-input { padding: 6px; border-radius: 30px; border: none; background: #1e2a3a; color: white; width: 120px; text-align: center; margin-right: 8px; }
        button { background: #2ecc71; border: none; padding: 8px 18px; border-radius: 40px; font-weight: bold; cursor: pointer; }
        .sell-btn { background: #f39c12; margin-bottom: 15px; }
        .back-btn { background: #555; width: 100%; margin-top: 15px; }
    </style>
</head>
<body>
<div class="container">
    <div class="glass-card">
        <h2>🔨 АУКЦИОН</h2>
        <div class="balance" id="balance">💰 Баланс: загрузка...</div>
        <button class="sell-btn" onclick="sellItem()">📤 ВЫСТАВИТЬ ЛОТ</button>
    </div>
    <div class="glass-card" id="auctionList">Загрузка...</div>
    <button class="back-btn" onclick="window.location.href='index.html'">🔙 На главную</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    const API_BASE = "https://nl12.bothost.ru";
    const USE_REAL_API = false;
    const userId = tg.initDataUnsafe?.user?.id || 1475910449;

    let balance = 0;
    let auctionItems = [];

    const mockLots = [
        { id: 1, item: { name: "👖 Levi's 501 Vintage" }, current_bid: 2200, bidder_id: null, end_time: Date.now()/1000 + 3600, active: true }
    ];

    async function fetchAPI(endpoint) {
        if (!USE_REAL_API) return null;
        try {
            const resp = await fetch(`${API_BASE}${endpoint}&tg_id=${userId}`);
            if (!resp.ok) throw new Error();
            return await resp.json();
        } catch(e) { return null; }
    }

    async function loadBalance() {
        if (!USE_REAL_API) { balance = 100000; document.getElementById('balance').innerHTML = `💰 Баланс: ${balance.toLocaleString()}₽`; return; }
        const data = await fetchAPI(`/api/me`);
        balance = data?.balance || 0;
        document.getElementById('balance').innerHTML = `💰 Баланс: ${balance.toLocaleString()}₽`;
    }

    async function loadAuction() {
        if (!USE_REAL_API) { auctionItems = mockLots; renderAuction(); return; }
        const data = await fetchAPI(`/api/auction/items`);
        auctionItems = data?.auction_items || [];
        renderAuction();
    }

    async function bid(index, amount) {
        if (amount <= 0) { tg.showAlert("❌ Введите сумму"); return; }
        if (!USE_REAL_API) {
            tg.showAlert(`✅ (МОК) Ставка ${amount}₽ принята`);
            auctionItems[index].current_bid = amount;
            auctionItems[index].bidder_id = userId;
            renderAuction();
            return;
        }
        const res = await fetch(`${API_BASE}/api/auction/bid?tg_id=${userId}&item_index=${index}&bid=${amount}`, { method: 'POST' });
        const data = await res.json();
        if (data.balance !== undefined) {
            balance = data.balance;
            document.getElementById('balance').innerHTML = `💰 Баланс: ${balance.toLocaleString()}₽`;
            tg.showAlert(data.message);
            await loadAuction();
        } else tg.showAlert(`❌ ${data.message}`);
    }

    function sellItem() {
        tg.showAlert("Для выставления товара на аукцион используйте инвентарь: нажмите «НА АУКЦИОН» рядом с товаром.");
    }

    function renderAuction() {
        const container = document.getElementById('auctionList');
        if (!auctionItems.length) { container.innerHTML = `<div>🔨 Активных лотов нет</div>`; return; }
        let html = '';
        auctionItems.forEach((lot, idx) => {
            let timeLeft = Math.max(0, Math.floor(lot.end_time - Date.now()/1000));
            let mins = Math.floor(timeLeft / 60);
            let secs = timeLeft % 60;
            html += `
                <div class="lot-card">
                    <div><b>${lot.item.name}</b></div>
                    <div>💰 Текущая ставка: ${lot.current_bid}₽</div>
                    <div>⏳ Осталось: ${mins}:${secs.toString().padStart(2,'0')}</div>
                    ${lot.bidder_id ? `<div>👤 Лидер: ${lot.bidder_id}</div>` : ''}
                    <div style="margin-top:10px;">
                        <input type="number" id="bid_${idx}" class="bid-input" placeholder="Ваша ставка" min="${Math.floor(lot.current_bid*1.1)}">
                        <button onclick="bid(${idx}, parseInt(document.getElementById('bid_${idx}').value))">💰 СТАВИТЬ</button>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
        setTimeout(() => renderAuction(), 1000);
    }

    loadBalance();
    loadAuction();
</script>
</body>
</html>
