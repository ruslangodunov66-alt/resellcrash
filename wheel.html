<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🎁 CASE | R-GAME</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,600;0,800;1,800&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
    <style>
        /* ===== ОСНОВНЫЕ СТИЛИ ===== */
        :root {
            --bg-dark: #05080d;
            --container-bg: #0d121a;
            --panel-bg: #151d29;
            --accent-blue: #1882ff;
            --accent-blue-hover: #3b95ff;
            --accent-green: #1bd15d;
            --accent-red: #f03043;
            --accent-orange: #ff9800;
            --text-main: #e2e8f0;
            --text-muted: #8c9eb5;
            --gold: #FFD34E;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            display: flex; justify-content: center;
        }
        .game-container {
            width: 100%; max-width: 800px;
            min-height: 100vh;
            background-color: var(--container-bg);
            display: flex; flex-direction: column;
            padding: 10px 10px calc(20px + var(--tg-viewport-safe-area-inset-bottom, 0px)) 10px;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 5px; margin-bottom: 10px; flex-shrink: 0;
        }
        .brand {
            font-weight: 800; font-size: 22px; text-transform: uppercase;
            letter-spacing: -0.5px; font-style: italic;
        }
        .brand span { color: var(--accent-blue); }

        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .info-card {
            background: var(--panel-bg);
            padding: 8px 14px;
            border-radius: 12px;
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            font-size: 15px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .balance-value {
            font-family: 'Montserrat', sans-serif;
            font-size: 15px;
            font-weight: 800;
            color: var(--accent-green);
            text-shadow: 0 0 12px rgba(27, 209, 93, 0.2);
            cursor: pointer;
            padding: 2px 4px;
            transition: 0.2s;
        }
        .balance-value:active { transform: scale(0.93); }

        .case-icon-header {
            width: 28px; height: 28px;
            background: url('case/case.PNG') center/contain no-repeat;
            filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.3));
            display: inline-block;
            margin-left: 4px;
        }
        .case-count {
            font-weight: 700;
            color: var(--gold);
        }

        /* Кнопка назад (стрелка) */
        .back-btn {
            background: var(--panel-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 8px 12px;
            font-weight: 700;
            font-size: 18px;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .back-btn:active { transform: scale(0.95); background: var(--accent-blue); }

        /* ===== КАРТОЧКА КЕЙСА (увеличенный) ===== */
        .case-card {
            background: var(--panel-bg);
            border-radius: 16px;
            padding: 20px 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
            overflow: hidden;
        }
        .case-card:active { transform: scale(0.97); }
        .case-card .case-image-wrap {
            width: 240px;
            height: 240px;
            margin: 0 auto 12px;
            position: relative;
            animation: float 4s ease-in-out infinite;
        }
        .case-card .case-image-wrap img {
            width: 100%; height: 100%; object-fit: contain;
            filter: drop-shadow(0 0 30px rgba(78, 163, 255, 0.2));
            pointer-events: none;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        .case-title {
            font-size: 20px; font-weight: 800;
            letter-spacing: 0.5px; margin-bottom: 2px;
        }
        .case-price {
            font-size: 16px; color: var(--gold);
            font-weight: 700; margin-bottom: 4px;
        }
        .case-hint {
            font-size: 13px; color: var(--text-muted);
        }
        .case-hint span { color: var(--gold); font-weight: 700; }

        /* ===== ВОЗМОЖНЫЕ НАГРАДЫ ===== */
        .rewards-section {
            margin-bottom: 15px;
            flex-shrink: 0;
        }
        .section-title {
            font-size: 14px; font-weight: 700; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 8px; padding-left: 4px;
        }
        .reward-carousel {
            background: var(--panel-bg);
            border-radius: 16px;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.04);
            display: flex;
            align-items: center;
            gap: 16px;
            min-height: 90px;
            transition: 0.3s;
            overflow: hidden;
            position: relative;
        }
        .reward-carousel .reward-image {
            width: 72px;
            height: 72px;
            flex-shrink: 0;
            border-radius: 12px;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: 0.3s;
        }
        .reward-carousel .reward-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: opacity 0.4s ease;
        }
        .reward-carousel .reward-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .reward-carousel .reward-name {
            font-weight: 700;
            font-size: 17px;
        }
        .reward-carousel .reward-rarity {
            font-size: 13px;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .reward-carousel .reward-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
            margin-left: auto;
            box-shadow: 0 0 12px currentColor;
        }

        /* ===== ИСТОРИЯ ===== */
        .history-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 100px;
            background: var(--panel-bg);
            border-radius: 16px;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.02);
            margin-top: 4px;
        }
        .history-list-vertical {
            max-height: 180px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding-right: 4px;
        }
        .history-list-vertical::-webkit-scrollbar { width: 4px; }
        .history-list-vertical::-webkit-scrollbar-thumb { background: #263345; border-radius: 4px; }
        .history-item-vert {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.03);
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 13px;
            border-left: 4px solid transparent;
        }
        .history-item-vert .h-icon {
            width: 32px; height: 32px;
            border-radius: 50%; overflow: hidden;
            background: rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .history-item-vert .h-icon img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .history-item-vert .h-name {
            flex: 1; font-weight: 500;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .history-item-vert .h-rarity {
            font-size: 10px; text-transform: uppercase;
            opacity: 0.7; font-weight: 600;
        }
        .history-item-vert .h-date {
            font-size: 10px; color: #6a7a8e;
        }

        /* ===== ОВЕРЛЕЙ ОТКРЫТИЯ ===== */
        .overlay {
            position: fixed; inset: 0; z-index: 1000;
            background: rgba(4, 8, 16, 0.92);
            backdrop-filter: blur(24px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            width: 100%; height: 100%;
        }
        .overlay.active { display: flex; }
        .overlay-content {
            width: 100%; max-width: 540px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Анимации кейса (уменьшенный размер) */
        .case-animation-stage {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            width: 100%;
        }
        .case-animation-stage .case-image-wrap {
            width: 160px;
            height: 160px;
            margin: 0 auto 12px;
        }
        .case-animation-stage .case-image-wrap img {
            width: 100%; height: 100%; object-fit: contain;
        }
        .case-falling {
            animation: caseFall 0.8s cubic-bezier(0.22, 0.68, 0.35, 1.2) forwards;
        }
        @keyframes caseFall {
            0% { transform: translateY(-200px) scale(0.6) rotate(-10deg); opacity: 0; }
            60% { transform: translateY(15px) scale(1.05) rotate(2deg); opacity: 1; }
            80% { transform: translateY(-5px) scale(0.98); }
            100% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
        }
        .case-bounce { animation: caseBounce 0.4s ease 2; }
        @keyframes caseBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        .case-glow { animation: caseGlow 0.6s ease-in-out infinite alternate; }
        @keyframes caseGlow {
            0% { filter: drop-shadow(0 0 20px rgba(78, 163, 255, 0.2)); }
            100% { filter: drop-shadow(0 0 60px rgba(78, 163, 255, 0.7)); }
        }
        .case-open-flash { animation: flashOpen 0.3s ease forwards; }
        @keyframes flashOpen {
            0% { filter: brightness(1); transform: scale(1); }
            50% { filter: brightness(3); transform: scale(1.2); }
            100% { filter: brightness(0); transform: scale(0.8); opacity: 0; }
        }

        /* Рулетка */
        .slot-container {
            width: 100%; overflow: hidden;
            border-radius: 24px;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: inset 0 0 60px rgba(0,0,0,0.8);
            position: relative;
            height: 190px;
            margin-bottom: 20px;
        }
        .slot-track {
            display: flex;
            height: 100%;
            will-change: transform;
            transition: none;
        }
        .slot-item {
            flex: 0 0 150px;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px;
            background: rgba(16,24,40,0.3);
            border-right: 1px solid rgba(255,255,255,0.03);
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            text-align: center;
        }
        .slot-item img {
            width: 80px; height: 80px; object-fit: contain;
            border-radius: 12px; background: rgba(0,0,0,0.3);
            margin-bottom: 6px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .slot-item .item-name {
            font-size: 12px; white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis; max-width: 130px;
        }
        .slot-item .item-rarity {
            font-size: 10px; text-transform: uppercase;
            letter-spacing: 0.5px; opacity: 0.8;
        }

        /* Указатель */
        .slot-pointer {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 18px solid transparent;
            border-right: 18px solid transparent;
            border-top: 28px solid #FFD34E;
            filter: drop-shadow(0 0 16px #FFD34E);
            z-index: 10;
            pointer-events: none;
        }

        /* Результат */
        .result-display {
            width: 100%; text-align: center;
            min-height: 140px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 12px;
        }
        .result-item {
            display: flex; flex-direction: column;
            align-items: center;
            animation: resultAppear 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            transform: scale(0.6);
            opacity: 0;
        }
        .result-item img {
            width: 120px; height: 120px; object-fit: contain;
            border-radius: 16px; background: rgba(0,0,0,0.3);
            border: 2px solid rgba(255,215,0,0.3);
            box-shadow: 0 0 60px rgba(255,215,0,0.25);
            margin-bottom: 10px;
        }
        .result-item .result-name {
            font-size: 24px; font-weight: 700;
        }
        .result-item .result-rarity {
            font-size: 16px; opacity: 0.8;
            margin-bottom: 12px;
        }
        @keyframes resultAppear {
            0% { transform: scale(0.5) rotate(-8deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .btn-claim {
            background: linear-gradient(180deg, #34d399, #10b981);
            border: none; color: #fff; font-weight: 700;
            font-size: 18px; padding: 16px 50px;
            border-radius: 60px; cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 8px 30px rgba(16, 185, 129, 0.4);
            margin-top: 8px; width: 100%; max-width: 280px;
        }
        .btn-claim:active { transform: scale(0.94); }

        .btn-close-overlay {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            color: #b0c4de;
            padding: 10px 30px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 12px;
        }
        .btn-close-overlay:active { transform: scale(0.94); }

        /* Particles Canvas */
        #particleCanvas {
            position: fixed; inset: 0;
            pointer-events: none; z-index: 999;
            display: none;
        }

        /* Адаптив */
        @media (max-width: 480px) {
            .slot-container { height: 160px; }
            .slot-item { flex: 0 0 120px; }
            .slot-item img { width: 64px; height: 64px; }
            .case-card .case-image-wrap { width: 180px; height: 180px; }
            .brand { font-size: 18px; }
            .back-btn { font-size: 16px; padding: 6px 10px; }
            .header-actions { gap: 4px; }
            .info-card { padding: 6px 10px; font-size: 13px; }
            .reward-carousel .reward-image { width: 56px; height: 56px; }
            .reward-carousel .reward-name { font-size: 15px; }
            .case-animation-stage .case-image-wrap { width: 120px; height: 120px; }
        }
    </style>
</head>
<body>

<div class="game-container">

    <!-- HEADER -->
    <div class="header">
        <div class="brand">R-<span>GAME</span></div>
        <div class="header-actions">
            <div class="info-card">
                <span style="font-weight:900; margin-right:2px;">₽</span>
                <span class="balance-value" id="balanceDisplay">0</span>
                <span class="case-icon-header"></span>
                <span class="case-count" id="caseCount">0</span>
            </div>
            <button class="back-btn" id="backBtn">←</button>
        </div>
    </div>

    <!-- Карточка кейса -->
    <div class="case-card" id="caseCard">
        <div class="case-image-wrap">
            <img src="case/case.PNG" alt="Case">
        </div>
        <div class="case-title">Редкий кейс</div>
        <div class="case-price">₽ 45 000</div>
        <div class="case-hint">👆 <span>Жми на кейс</span> чтобы открыть</div>
    </div>

    <!-- Возможные награды -->
    <div class="rewards-section">
        <div class="section-title">ВОЗМОЖНЫЕ НАГРАДЫ</div>
        <div class="reward-carousel" id="rewardCarousel">
            <div class="reward-image" id="carouselImageContainer">
                <img id="carouselImage" src="case/photo_2026-07-20_19-21-45.jpg" alt="Приз" style="transition: opacity 0.4s ease;">
            </div>
            <div class="reward-info">
                <span class="reward-name" id="carouselName">Анри Жерар</span>
                <span class="reward-rarity" id="carouselRarity" style="color:#e74c3c;">мифическая</span>
            </div>
            <div class="reward-dot" style="background:#e74c3c; color:#e74c3c;"></div>
        </div>
    </div>

    <!-- История -->
    <div class="history-section">
        <div class="section-title" style="margin-bottom:6px;">ИСТОРИЯ</div>
        <div class="history-list-vertical" id="historyVertical"></div>
    </div>

</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
    <div class="overlay-content" id="animationContainer"></div>
    <button class="btn-close-overlay" id="closeOverlayBtn">✕ Закрыть</button>
</div>

<!-- Canvas для частиц -->
<canvas id="particleCanvas"></canvas>

<script>
(function() {
    'use strict';

    // ============================================================
    // 1. ДАННЫЕ КЕЙСА
    // ============================================================
    const CASE_ITEMS = [
        { id: 'skin_henri', name: 'Анри Жерар', rarity: 'мифическая', rarityColor: '#e74c3c', image: 'case/photo_2026-07-20_19-21-45.jpg', value: 0 },
        { id: 'brabus', name: 'Гелик Мансури', rarity: 'мифическая', rarityColor: '#e74c3c', image: 'case/photo_2026-07-20_19-22-03.jpg', value: 0 },
        { id: 'money_legend', name: 'Деньги (легенд.)', rarity: 'легендарная', rarityColor: '#f39c12', image: 'case/photo_2026-07-20_19-22-10.jpg', value: 0 },
        { id: 'money_rare', name: 'Деньги (редкие)', rarity: 'редкая', rarityColor: '#2980b9', image: 'case/photo_2026-07-20_19-22-14.jpg', value: 0 },
        { id: 'money_common', name: 'Деньги (обычные)', rarity: 'обычная', rarityColor: '#95a5a6', image: 'case/photo_2026-07-20_19-22-17.jpg', value: 0 }
    ];

    const itemProbabilities = {
        'skin_henri': 0.01,
        'brabus': 0.01,
        'money_legend': 0.08,
        'money_rare': 0.25,
        'money_common': 0.65
    };

    // ============================================================
    // 2. СОСТОЯНИЕ
    // ============================================================
    let balance = 0;
    let caseCount = parseInt(localStorage.getItem('case_count_free')) || 0;
    // Если при первом запуске кейсов нет – выдаём 5 бесплатных
    if (caseCount === 0 && !localStorage.getItem('case_free_given')) {
        caseCount = 5;
        localStorage.setItem('case_count_free', String(caseCount));
        localStorage.setItem('case_free_given', 'true');
    }
    let history = JSON.parse(localStorage.getItem('case_history')) || [];

    const balanceDisplay = document.getElementById('balanceDisplay');
    const caseCountDisplay = document.getElementById('caseCount');
    const historyListVert = document.getElementById('historyVertical');

    function updateUI() {
        balanceDisplay.textContent = balance.toLocaleString();
        caseCountDisplay.textContent = caseCount;
        renderHistoryVertical();
        localStorage.setItem('case_count_free', caseCount);
        localStorage.setItem('case_history', JSON.stringify(history));
    }

    // ============================================================
    // 3. HTTP-ЗАПРОСЫ (как в краше)
    // ============================================================
    const userId = new URLSearchParams(window.location.search).get('userId') || '';

    async function requestBalance() {
        if (!userId) return;
        try {
            const response = await fetch(`/balance/${userId}`);
            const data = await response.json();
            if (data.balance !== undefined) {
                balance = data.balance;
                updateUI();
            }
        } catch (e) {
            console.error('Ошибка получения баланса:', e);
            // fallback для теста (можно убрать)
            balance = 1000000;
            updateUI();
        }
    }

    async function sendGameResult(result, bet, win) {
        try {
            const response = await fetch('/game_result', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    userId: userId,
                    game: 'case',
                    result: result,
                    bet: bet,
                    win: win
                })
            });
            const data = await response.json();
            if (data.new_balance !== undefined) {
                balance = data.new_balance;
                updateUI();
            }
            return data;
        } catch (e) {
            console.error('Ошибка отправки результата:', e);
            return null;
        }
    }

    // ============================================================
    // 4. ВСПОМОГАТЕЛЬНЫЕ
    // ============================================================
    function getRandomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function rollItem() {
        const r = Math.random();
        let cum = 0;
        for (const item of CASE_ITEMS) {
            cum += itemProbabilities[item.id] || 0;
            if (r <= cum) {
                const result = { ...item };
                if (item.id === 'money_legend') {
                    result.value = getRandomInt(250000, 750000);
                    result.name = `💰 ${result.value.toLocaleString()} ₽`;
                } else if (item.id === 'money_rare') {
                    result.value = getRandomInt(25000, 250000);
                    result.name = `💰 ${result.value.toLocaleString()} ₽`;
                } else if (item.id === 'money_common') {
                    result.value = getRandomInt(100, 25000);
                    result.name = `💰 ${result.value.toLocaleString()} ₽`;
                }
                return result;
            }
        }
        // fallback
        const fallback = { ...CASE_ITEMS[CASE_ITEMS.length-1] };
        fallback.value = getRandomInt(100, 25000);
        fallback.name = `💰 ${fallback.value.toLocaleString()} ₽`;
        return fallback;
    }

    // ============================================================
    // 5. ОТКРЫТИЕ КЕЙСА (клик по карточке)
    // ============================================================
    const caseCard = document.getElementById('caseCard');
    const overlay = document.getElementById('overlay');
    const animContainer = document.getElementById('animationContainer');
    const closeBtn = document.getElementById('closeOverlayBtn');

    let isOpening = false;
    let currentWin = null;

    caseCard.addEventListener('click', () => {
        if (isOpening) return;
        if (caseCount <= 0) {
            alert('❌ У вас нет кейсов!');
            return;
        }
        // Уменьшаем количество кейсов
        caseCount -= 1;
        updateUI();

        currentWin = rollItem();
        startCaseOpening(currentWin);
    });

    // ============================================================
    // 6. АНИМАЦИЯ ОТКРЫТИЯ (ускоренная тряска, уменьшенный кейс)
    // ============================================================
    function startCaseOpening(winItem) {
        isOpening = true;
        overlay.classList.add('active');
        animContainer.innerHTML = '';

        // Этап 1: Кейс падает (быстрее)
        const stage1 = document.createElement('div');
        stage1.className = 'case-animation-stage';
        stage1.innerHTML = `
            <div class="case-image-wrap case-falling" id="caseAnim">
                <img src="case/case.PNG" alt="Case">
            </div>
            <div style="margin-top:12px; color:var(--text-muted); font-size:14px;">Открытие...</div>
        `;
        animContainer.appendChild(stage1);

        const caseElem = document.getElementById('caseAnim');

        // После падения → подпрыгивание (быстрее)
        caseElem.addEventListener('animationend', function onFallEnd() {
            caseElem.removeEventListener('animationend', onFallEnd);
            caseElem.className = 'case-image-wrap case-bounce';
            setTimeout(() => {
                // Свечение и автоматическое открытие через 0.8 сек (или по клику)
                caseElem.className = 'case-image-wrap case-glow';
                caseElem.style.cursor = 'pointer';
                // Добавляем обработчик клика для ускорения
                caseElem.addEventListener('click', function onClickCase() {
                    caseElem.removeEventListener('click', onClickCase);
                    openCaseNow(caseElem);
                });
                // Автоматическое открытие через 1.2 секунды
                setTimeout(() => {
                    // Удаляем обработчик, чтобы не было двойного вызова
                    caseElem.removeEventListener('click', onClickCase);
                    openCaseNow(caseElem);
                }, 1200);
            }, 600);
        }, { once: true });
    }

    function openCaseNow(caseElem) {
        caseElem.className = 'case-image-wrap case-open-flash';
        document.body.style.animation = 'shake 0.3s';
        setTimeout(() => { document.body.style.animation = ''; }, 300);
        setTimeout(() => {
            animContainer.innerHTML = '';
            startSlotMachine(currentWin);
        }, 400);
    }

    // ============================================================
    // 7. РУЛЕТКА (движение ВПРАВО – трек смещается влево)
    // ============================================================
    function startSlotMachine(winItem) {
        const container = document.createElement('div');
        container.style.width = '100%';
        container.innerHTML = `
            <div class="slot-container" id="slotContainer">
                <div class="slot-pointer"></div>
                <div class="slot-track" id="slotTrack"></div>
            </div>
            <div class="result-display" id="resultDisplay"></div>
        `;
        animContainer.appendChild(container);

        const slotTrack = document.getElementById('slotTrack');
        const resultDisplay = document.getElementById('resultDisplay');

        // Строим трек
        const trackItems = [];
        const count = 40;
        for (let i = 0; i < count; i++) {
            const r = Math.random();
            let cum = 0;
            let chosen = CASE_ITEMS[0];
            for (const item of CASE_ITEMS) {
                cum += itemProbabilities[item.id] || 0;
                if (r <= cum) { chosen = item; break; }
            }
            trackItems.push({ ...chosen });
        }
        // Вставляем winItem в центр
        const insertPos = Math.floor(trackItems.length * 0.5) + getRandomInt(-3, 3);
        trackItems.splice(insertPos, 0, winItem);
        trackItems.splice(insertPos+1, 0, winItem);
        trackItems.splice(insertPos+2, 0, winItem);

        // Рендерим
        slotTrack.innerHTML = '';
        trackItems.forEach(item => {
            const div = document.createElement('div');
            div.className = 'slot-item';
            const img = document.createElement('img');
            img.src = item.image;
            img.alt = item.name;
            img.loading = 'lazy';
            div.appendChild(img);
            const nameSpan = document.createElement('div');
            nameSpan.className = 'item-name';
            nameSpan.textContent = item.name;
            div.appendChild(nameSpan);
            const raritySpan = document.createElement('div');
            raritySpan.className = 'item-rarity';
            raritySpan.textContent = item.rarity;
            raritySpan.style.color = item.rarityColor;
            div.appendChild(raritySpan);
            slotTrack.appendChild(div);
        });

        // Определяем целевое смещение (чтобы winItem оказался под указателем)
        const containerWidth = document.getElementById('slotContainer').offsetWidth;
        const itemWidth = 150;
        const centerOffset = containerWidth / 2 - itemWidth / 2;
        const totalWidth = trackItems.length * itemWidth;
        const winIndex = trackItems.findIndex(item => item.id === winItem.id);
        let targetOffset = (winIndex * itemWidth) - centerOffset;
        targetOffset = Math.max(0, Math.min(totalWidth - containerWidth, targetOffset));
        targetOffset += getRandomInt(-10, 10);

        // Начальное смещение: 0 (трек смещается влево, элементы двигаются вправо)
        let currentOffset = 0;

        // Анимация с замедлением
        const startTime = performance.now();
        const duration = 4000 + Math.random() * 1500;

        function animateStep(time) {
            const elapsed = time - startTime;
            const progress = Math.min(elapsed / duration, 1);
            const eased = 1 - Math.pow(1 - progress, 3);
            const pos = currentOffset + (targetOffset - currentOffset) * eased;
            slotTrack.style.transform = `translateX(-${pos}px)`;
            if (progress < 1) {
                requestAnimationFrame(animateStep);
            } else {
                slotTrack.style.transform = `translateX(-${targetOffset}px)`;
                showResult(winItem);
            }
        }
        requestAnimationFrame(animateStep);
    }

    // ============================================================
    // 8. ПОКАЗ РЕЗУЛЬТАТА (с правильным призом)
    // ============================================================
    function showResult(winItem) {
        const resultDisplay = document.getElementById('resultDisplay');
        resultDisplay.innerHTML = '';

        const container = document.createElement('div');
        container.className = 'result-item';
        const img = document.createElement('img');
        img.src = winItem.image;
        img.alt = winItem.name;
        container.appendChild(img);
        const name = document.createElement('div');
        name.className = 'result-name';
        name.textContent = winItem.name;
        name.style.color = winItem.rarityColor;
        container.appendChild(name);
        const rarity = document.createElement('div');
        rarity.className = 'result-rarity';
        rarity.textContent = winItem.rarity.toUpperCase();
        rarity.style.color = winItem.rarityColor;
        container.appendChild(rarity);

        const claimBtn = document.createElement('button');
        claimBtn.className = 'btn-claim';
        claimBtn.textContent = 'ЗАБРАТЬ';
        claimBtn.addEventListener('click', async () => {
            // Отправляем результат на сервер
            if (winItem.value && winItem.value > 0) {
                const result = await sendGameResult('win', 45000, winItem.value);
                if (result && result.new_balance !== undefined) {
                    balance = result.new_balance;
                    updateUI();
                } else {
                    balance += winItem.value;
                    updateUI();
                }
            } else {
                // Для предметов – просто добавляем в историю
            }

            // Добавляем в историю
            history.unshift({
                name: winItem.name,
                rarity: winItem.rarity,
                rarityColor: winItem.rarityColor,
                image: winItem.image,
                time: Date.now()
            });
            if (history.length > 50) history.pop();
            localStorage.setItem('case_history', JSON.stringify(history));
            renderHistoryVertical();

            overlay.classList.remove('active');
            isOpening = false;
            animContainer.innerHTML = '';
            resultDisplay.innerHTML = '';
            spawnCelebration(winItem.rarity);
            if (window.Telegram?.WebApp?.HapticFeedback) {
                window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
            }
        });

        container.appendChild(claimBtn);
        resultDisplay.appendChild(container);

        spawnCelebration(winItem.rarity);
        if (window.Telegram?.WebApp?.HapticFeedback) {
            window.Telegram.WebApp.HapticFeedback.impactOccurred('heavy');
        }
    }

    // ============================================================
    // 9. PARTICLE EFFECTS
    // ============================================================
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let particleRunning = false;

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function spawnCelebration(rarity) {
        const count = rarity === 'мифическая' ? 150 : rarity === 'легендарная' ? 100 : 50;
        const colors = ['#FFD34E', '#f39c12', '#e74c3c', '#2a7fff', '#9b59b6', '#2ecc71', '#ffffff'];
        for (let i = 0; i < count; i++) {
            const angle = Math.random() * 2 * Math.PI;
            const speed = 3 + Math.random() * 8;
            const size = 4 + Math.random() * 10;
            particles.push({
                x: canvas.width / 2,
                y: canvas.height / 2 - 20,
                vx: Math.cos(angle) * speed * (0.5 + Math.random()),
                vy: Math.sin(angle) * speed * (0.5 + Math.random()) - 2,
                size: size,
                color: colors[Math.floor(Math.random() * colors.length)],
                life: 1,
                decay: 0.006 + Math.random() * 0.012,
                rotation: Math.random() * 360,
                rotSpeed: (Math.random() - 0.5) * 10,
                shape: Math.random() > 0.5 ? 'circle' : 'rect'
            });
        }
        if (!particleRunning) {
            particleRunning = true;
            canvas.style.display = 'block';
            animateParticles();
        }
    }

    function animateParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let alive = false;
        for (let i = particles.length-1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.05;
            p.life -= p.decay;
            p.rotation += p.rotSpeed;
            if (p.life <= 0) { particles.splice(i, 1); continue; }
            alive = true;
            ctx.save();
            ctx.globalAlpha = p.life * 0.9;
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rotation * Math.PI / 180);
            ctx.fillStyle = p.color;
            ctx.shadowColor = p.color;
            ctx.shadowBlur = 14;
            if (p.shape === 'circle') {
                ctx.beginPath();
                ctx.arc(0, 0, p.size / 2, 0, 2 * Math.PI);
                ctx.fill();
            } else {
                ctx.fillRect(-p.size/2, -p.size/4, p.size, p.size/2);
            }
            ctx.restore();
        }
        if (alive) {
            requestAnimationFrame(animateParticles);
        } else {
            particleRunning = false;
            canvas.style.display = 'none';
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
    }

    // ============================================================
    // 10. ИСТОРИЯ (вертикальная)
    // ============================================================
    function renderHistoryVertical() {
        historyListVert.innerHTML = '';
        if (history.length === 0) {
            const empty = document.createElement('div');
            empty.style.cssText = 'color:#6a7a8e; text-align:center; padding:12px; font-size:14px;';
            empty.textContent = 'История пуста';
            historyListVert.appendChild(empty);
            return;
        }
        history.slice(0, 20).forEach(h => {
            const div = document.createElement('div');
            div.className = 'history-item-vert';
            div.style.borderLeftColor = h.rarityColor;
            const icon = document.createElement('div');
            icon.className = 'h-icon';
            const img = document.createElement('img');
            img.src = h.image;
            img.alt = h.name;
            img.loading = 'lazy';
            icon.appendChild(img);
            div.appendChild(icon);
            const name = document.createElement('span');
            name.className = 'h-name';
            name.textContent = h.name;
            div.appendChild(name);
            const rarity = document.createElement('span');
            rarity.className = 'h-rarity';
            rarity.textContent = h.rarity;
            rarity.style.color = h.rarityColor;
            div.appendChild(rarity);
            const date = document.createElement('span');
            date.className = 'h-date';
            date.textContent = new Date(h.time).toLocaleTimeString();
            div.appendChild(date);
            historyListVert.appendChild(div);
        });
    }

    // ============================================================
    // 11. КАРУСЕЛЬ НАГРАД (плавный переход)
    // ============================================================
    let carouselIndex = 0;
    const carouselImage = document.getElementById('carouselImage');
    const carouselName = document.getElementById('carouselName');
    const carouselRarity = document.getElementById('carouselRarity');
    const carouselDot = document.querySelector('.reward-dot');

    function updateCarousel() {
        const item = CASE_ITEMS[carouselIndex];
        carouselImage.style.opacity = '0';
        setTimeout(() => {
            carouselImage.src = item.image;
            carouselImage.style.opacity = '1';
        }, 200);
        carouselName.textContent = item.name;
        carouselRarity.textContent = item.rarity;
        carouselRarity.style.color = item.rarityColor;
        carouselDot.style.background = item.rarityColor;
        carouselDot.style.color = item.rarityColor;
        carouselIndex = (carouselIndex + 1) % CASE_ITEMS.length;
    }

    setInterval(updateCarousel, 2500);
    updateCarousel();

    // ============================================================
    // 12. КНОПКА НАЗАД
    // ============================================================
    document.getElementById('backBtn').addEventListener('click', () => {
        window.location.href = 'casino.html?userId=' + userId;
    });

    // ============================================================
    // 13. ЗАКРЫТИЕ ОВЕРЛЕЯ
    // ============================================================
    closeBtn.addEventListener('click', () => {
        overlay.classList.remove('active');
        isOpening = false;
        animContainer.innerHTML = '';
        particles = [];
        particleRunning = false;
        canvas.style.display = 'none';
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    });

    // ============================================================
    // 14. ИНИЦИАЛИЗАЦИЯ
    // ============================================================
    requestBalance();

    // Добавляем shake ключевые кадры
    const style = document.createElement('style');
    style.textContent = `
        @keyframes shake {
            0%, 100% { transform: translate(0); }
            25% { transform: translate(-6px, 4px); }
            50% { transform: translate(6px, -4px); }
            75% { transform: translate(-4px, 2px); }
        }
    `;
    document.head.appendChild(style);

    if (window.Telegram?.WebApp) {
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
        window.Telegram.WebApp.enableClosingConfirmation();
    }

    console.log('✅ R-GAME Case Opening (final fixed) loaded');
})();
</script>
