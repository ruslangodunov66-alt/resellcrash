<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🎁 CASE | R-GAME</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,600;0,800;1,800&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
    <style>
        /* ===== ОСНОВНЫЕ СТИЛИ ===== */
        :root {
            --bg-dark: #05080d;
            --container-bg: #0d121a;
            --panel-bg: #151d29;
            --accent-blue: #1882ff;
            --accent-green: #1bd15d;
            --text-main: #e2e8f0;
            --text-muted: #8c9eb5;
            --gold: #FFD34E;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            display: flex; justify-content: center;
        }
        .game-container {
            width: 100%; max-width: 800px;
            min-height: 100vh;
            background-color: var(--container-bg);
            display: flex; flex-direction: column;
            padding: 10px 10px calc(20px + var(--tg-viewport-safe-area-inset-bottom, 0px)) 10px;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 5px; margin-bottom: 10px; flex-shrink: 0;
        }
        .brand {
            font-weight: 800; font-size: 22px; text-transform: uppercase;
            letter-spacing: -0.5px; font-style: italic;
        }
        .brand span { color: var(--accent-blue); }

        .header-actions { display: flex; gap: 8px; align-items: center; }
        .info-card {
            background: var(--panel-bg);
            padding: 8px 14px;
            border-radius: 12px;
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            font-size: 15px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; gap: 6px;
        }
        .balance-value {
            font-family: 'Montserrat', sans-serif;
            font-size: 15px; font-weight: 800;
            color: var(--accent-green);
            text-shadow: 0 0 12px rgba(27, 209, 93, 0.2);
        }
        .case-icon-header {
            width: 28px; height: 28px;
            background: url('case/case.PNG') center/contain no-repeat;
            filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.3));
            display: inline-block; margin-left: 4px;
        }
        .case-count { font-weight: 700; color: var(--gold); }

        .back-btn {
            background: var(--panel-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; padding: 8px 12px;
            font-weight: 700; font-size: 18px; color: var(--text-main);
            cursor: pointer; transition: all 0.2s;
        }
        .back-btn:active { transform: scale(0.95); background: var(--accent-blue); }

        /* ===== КАРТОЧКА КЕЙСА (Увеличенная) ===== */
        .case-card {
            background: var(--panel-bg); border-radius: 16px;
            padding: 20px 15px; margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center; cursor: pointer; transition: 0.2s;
        }
        .case-card:active { transform: scale(0.97); }
        .case-card .case-image-wrap {
            width: 300px; height: 300px; /* Увеличен размер */
            margin: 0 auto 12px;
            animation: float 4s ease-in-out infinite;
        }
        .case-card .case-image-wrap img {
            width: 100%; height: 100%; object-fit: contain;
            filter: drop-shadow(0 0 30px rgba(78, 163, 255, 0.2));
            pointer-events: none;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        .case-title { font-size: 20px; font-weight: 800; margin-bottom: 2px; }
        .case-price { font-size: 16px; color: var(--gold); font-weight: 700; margin-bottom: 4px; }
        .case-hint { font-size: 13px; color: var(--text-muted); }
        .case-hint span { color: var(--gold); font-weight: 700; }

        /* ===== ОВЕРЛЕЙ ОТКРЫТИЯ ===== */
        .overlay {
            position: fixed; inset: 0; z-index: 1000;
            background: rgba(4, 8, 16, 0.92); backdrop-filter: blur(24px);
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .overlay.active { display: flex; }
        .overlay-content { width: 100%; max-width: 540px; display: flex; flex-direction: column; align-items: center; }

        /* Анимации кейса (Увеличенный размер и кликабельность) */
        .case-animation-stage {
            display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%;
        }
        .case-animation-stage .case-image-wrap {
            width: 250px; height: 250px; /* Увеличен размер */
            margin: 0 auto 12px; cursor: pointer; /* Показывает, что можно кликать */
        }
        .case-animation-stage .case-image-wrap img { width: 100%; height: 100%; object-fit: contain; }
        
        .case-falling { animation: caseFall 0.8s cubic-bezier(0.22, 0.68, 0.35, 1.2) forwards; }
        @keyframes caseFall {
            0% { transform: translateY(-200px) scale(0.6) rotate(-10deg); opacity: 0; }
            60% { transform: translateY(15px) scale(1.05) rotate(2deg); opacity: 1; }
            100% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
        }
        .case-bounce { animation: caseBounce 0.4s ease 2; }
        @keyframes caseBounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        .case-glow { animation: caseGlow 0.6s ease-in-out infinite alternate; }
        @keyframes caseGlow {
            0% { filter: drop-shadow(0 0 20px rgba(78, 163, 255, 0.2)); }
            100% { filter: drop-shadow(0 0 60px rgba(78, 163, 255, 0.7)); }
        }

        /* Быстрая тряска при клике */
        .case-fast-shake {
            animation: fastShake 0.2s linear infinite !important;
            filter: drop-shadow(0 0 40px rgba(255, 50, 50, 0.8)) !important;
        }
        @keyframes fastShake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            25% { transform: translate(-3px, -2px) rotate(-3deg); }
            50% { transform: translate(0px, 2px) rotate(3deg); }
            75% { transform: translate(3px, -1px) rotate(-1deg); }
            100% { transform: translate(-1px, 2px) rotate(2deg); }
        }

        /* Рулетка */
        .slot-container {
            width: 100%; overflow: hidden; border-radius: 24px;
            background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.06);
            box-shadow: inset 0 0 60px rgba(0,0,0,0.8);
            position: relative; height: 190px; margin-bottom: 20px;
        }
        .slot-track { display: flex; height: 100%; will-change: transform; }
        .slot-item {
            flex: 0 0 150px; height: 100%; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 8px;
            background: rgba(16,24,40,0.3); border-right: 1px solid rgba(255,255,255,0.03);
            text-align: center;
        }
        .slot-item img {
            width: 80px; height: 80px; object-fit: contain;
            border-radius: 12px; background: rgba(0,0,0,0.3); margin-bottom: 6px;
        }
        .slot-item .item-name { font-size: 12px; font-weight: 700; }
        .slot-item .item-rarity { font-size: 10px; text-transform: uppercase; }

        .slot-pointer {
            position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
            border-left: 18px solid transparent; border-right: 18px solid transparent;
            border-top: 28px solid #FFD34E; filter: drop-shadow(0 0 16px #FFD34E);
            z-index: 10;
        }

        /* Результат */
        .result-display { width: 100%; text-align: center; padding: 12px; }
        .result-item {
            display: flex; flex-direction: column; align-items: center;
            animation: resultAppear 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        .result-item img {
            width: 120px; height: 120px; object-fit: contain; border-radius: 16px;
            background: rgba(0,0,0,0.3); border: 2px solid rgba(255,215,0,0.3);
            box-shadow: 0 0 60px rgba(255,215,0,0.25); margin-bottom: 10px;
        }
        .result-item .result-name { font-size: 24px; font-weight: 700; }
        .result-item .result-rarity { font-size: 16px; margin-bottom: 12px; }
        @keyframes resultAppear {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .btn-claim {
            background: linear-gradient(180deg, #34d399, #10b981);
            border: none; color: #fff; font-weight: 700;
            font-size: 18px; padding: 16px 50px; border-radius: 60px;
            cursor: pointer; box-shadow: 0 8px 30px rgba(16, 185, 129, 0.4);
        }
        .btn-claim:active { transform: scale(0.94); }
    </style>
</head>
<body>

<div class="game-container">
    <!-- HEADER -->
    <div class="header">
        <div class="brand">R-<span>GAME</span></div>
        <div class="header-actions">
            <div class="info-card">
                <span style="font-weight:900; margin-right:2px;">₽</span>
                <span class="balance-value" id="balanceDisplay">0</span>
                <span class="case-icon-header"></span>
                <span class="case-count" id="caseCount">0</span>
            </div>
            <button class="back-btn" id="backBtn">←</button>
        </div>
    </div>

    <!-- Карточка кейса -->
    <div class="case-card" id="caseCard">
        <div class="case-image-wrap">
            <img src="case/case.PNG" alt="Case">
        </div>
        <div class="case-title">Редкий кейс</div>
        <div class="case-price">₽ 45 000</div>
        <div class="case-hint">👆 <span>Жми на кейс</span> чтобы открыть</div>
    </div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
    <div class="overlay-content" id="animationContainer"></div>
</div>

<script>
(function() {
    'use strict';

    // ============================================================
    // 1. ДАННЫЕ КЕЙСА
    // ============================================================
    const CASE_ITEMS = [
        { id: 'skin_henri', name: 'Анри Жерар', rarity: 'мифическая', rarityColor: '#e74c3c', image: 'case/photo_2026-07-20_19-21-45.jpg', value: 0 },
        { id: 'brabus', name: 'Гелик Мансури', rarity: 'мифическая', rarityColor: '#e74c3c', image: 'case/photo_2026-07-20_19-22-03.jpg', value: 0 },
        { id: 'money_legend', name: 'Деньги (легенд.)', rarity: 'легендарная', rarityColor: '#f39c12', image: 'case/photo_2026-07-20_19-22-10.jpg', value: 0 },
        { id: 'money_rare', name: 'Деньги (редкие)', rarity: 'редкая', rarityColor: '#2980b9', image: 'case/photo_2026-07-20_19-22-14.jpg', value: 0 },
        { id: 'money_common', name: 'Деньги (обычные)', rarity: 'обычная', rarityColor: '#95a5a6', image: 'case/photo_2026-07-20_19-22-17.jpg', value: 0 }
    ];

    const itemProbabilities = {
        'skin_henri': 0.01,
        'brabus': 0.01,
        'money_legend': 0.08,
        'money_rare': 0.25,
        'money_common': 0.65
    };

    // ============================================================
    // 2. СОСТОЯНИЕ И БАЛАНС (СИНХРОНИЗАЦИЯ С КРАШЕМ)
    // ============================================================
    // Получаем userId из URL
    const userId = new URLSearchParams(window.location.search).get('userId') || '';
    
    // Баланс берём из localStorage (casinoBalance) – его обновляет crash.html через HTTP
    let balance = parseInt(localStorage.getItem('casinoBalance')) || 0;
    
    // Кейсы: строго 5 при первом запуске
    let caseCount = parseInt(localStorage.getItem('case_count_free'));
    if (isNaN(caseCount)) {
        if (localStorage.getItem('case_free_given') === 'true') {
            caseCount = 0;
        } else {
            caseCount = 5;
            localStorage.setItem('case_free_given', 'true');
        }
    }

    const balanceDisplay = document.getElementById('balanceDisplay');
    const caseCountDisplay = document.getElementById('caseCount');

    function updateUI() {
        balanceDisplay.textContent = balance.toLocaleString();
        caseCountDisplay.textContent = caseCount;
        localStorage.setItem('case_count_free', caseCount);
        localStorage.setItem('casinoBalance', balance); // синхронизация с крашем
    }
    updateUI();

    // ============================================================
    // 3. HTTP-СИНХРОНИЗАЦИЯ (как в краше)
    // ============================================================
    async function requestBalance() {
        if (!userId) return;
        try {
            const response = await fetch(`/balance/${userId}`);
            const data = await response.json();
            if (data.balance !== undefined) {
                balance = data.balance;
                localStorage.setItem('casinoBalance', balance);
                updateUI();
            }
        } catch (e) {
            console.error('Ошибка получения баланса:', e);
        }
    }

    async function sendGameResult(result, bet, win) {
        try {
            const response = await fetch('/game_result', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    userId: userId,
                    game: 'case',
                    result: result,
                    bet: bet,
                    win: win
                })
            });
            const data = await response.json();
            if (data.new_balance !== undefined) {
                balance = data.new_balance;
                localStorage.setItem('casinoBalance', balance);
                updateUI();
            }
            return data;
        } catch (e) {
            console.error('Ошибка отправки результата:', e);
            return null;
        }
    }

    // Запрашиваем баланс при загрузке
    requestBalance();

    // ============================================================
    // 4. ЛОГИКА ОТКРЫТИЯ КЕЙСА
    // ============================================================
    function getRandomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function rollItem() {
        const r = Math.random();
        let cum = 0;
        for (const item of CASE_ITEMS) {
            cum += itemProbabilities[item.id] || 0;
            if (r <= cum) {
                const result = { ...item };
                if (item.id === 'money_legend') {
                    result.value = getRandomInt(250000, 750000);
                    result.name = `💰 ${result.value.toLocaleString()} ₽`;
                } else if (item.id === 'money_rare') {
                    result.value = getRandomInt(25000, 250000);
                    result.name = `💰 ${result.value.toLocaleString()} ₽`;
                } else if (item.id === 'money_common') {
                    result.value = getRandomInt(100, 25000);
                    result.name = `💰 ${result.value.toLocaleString()} ₽`;
                }
                return result;
            }
        }
        // fallback
        const fallback = { ...CASE_ITEMS[CASE_ITEMS.length-1] };
        fallback.value = getRandomInt(100, 25000);
        fallback.name = `💰 ${fallback.value.toLocaleString()} ₽`;
        return fallback;
    }

    // ============================================================
    // 5. ОТКРЫТИЕ КЕЙСА (клик по карточке)
    // ============================================================
    const caseCard = document.getElementById('caseCard');
    const overlay = document.getElementById('overlay');
    const animContainer = document.getElementById('animationContainer');
    let isOpening = false;

    caseCard.addEventListener('click', () => {
        if (isOpening) return;
        if (caseCount <= 0) {
            alert('❌ У вас нет кейсов!');
            return;
        }
        caseCount -= 1;
        updateUI();

        const winItem = rollItem();
        startCaseOpening(winItem);
    });

    // ============================================================
    // 6. АНИМАЦИИ (ТРЯСКА И РУЛЕТКА)
    // ============================================================
    function startCaseOpening(winItem) {
        isOpening = true;
        overlay.classList.add('active');
        animContainer.innerHTML = `
            <div class="case-animation-stage">
                <div class="case-image-wrap case-falling" id="caseAnim">
                    <img src="case/case.PNG" alt="Case">
                </div>
                <div style="margin-top:12px; color:var(--text-muted); font-size:14px;">Открытие... (кликни для ускорения)</div>
            </div>
        `;

        const caseElem = document.getElementById('caseAnim');
        let isFast = false;
        let timeout1, timeout2;

        // Клик для быстрой анимации
        caseElem.addEventListener('click', () => {
            if (isFast) return;
            isFast = true;
            clearTimeout(timeout1);
            clearTimeout(timeout2);
            
            caseElem.classList.add('case-fast-shake');
            setTimeout(() => showRoulette(winItem, true), 400); // Быстрый запуск
        });

        // Стандартная анимация
        timeout1 = setTimeout(() => {
            caseElem.classList.remove('case-falling');
            caseElem.classList.add('case-bounce', 'case-glow');
        }, 800);

        timeout2 = setTimeout(() => {
            showRoulette(winItem, false);
        }, 2000);
    }

    function showRoulette(winItem, isFast) {
        animContainer.innerHTML = `
            <div class="slot-container" id="slotContainer">
                <div class="slot-pointer"></div>
                <div class="slot-track" id="slotTrack"></div>
            </div>
        `;
        
        const track = document.getElementById('slotTrack');
        const itemsToGenerate = 40;
        const winningIndex = 35;
        const itemWidth = 150;

        // Генерация ленты
        for(let i = 0; i < itemsToGenerate; i++) {
            let item = (i === winningIndex) ? winItem : CASE_ITEMS[getRandomInt(0, CASE_ITEMS.length - 1)];
            const el = document.createElement('div');
            el.className = 'slot-item';
            el.innerHTML = `
                <img src="${item.image}" alt="">
                <div class="item-name">${item.name}</div>
                <div class="item-rarity" style="color:${item.rarityColor}">${item.rarity}</div>
            `;
            track.appendChild(el);
        }

        // Анимация прокрутки рулетки
        requestAnimationFrame(() => {
            const containerWidth = document.getElementById('slotContainer').clientWidth;
            // Вычисляем смещение так, чтобы выигрышный предмет был по центру
            const offset = (winningIndex * itemWidth) - (containerWidth / 2) + (itemWidth / 2) + getRandomInt(-15, 15);
            
            // Если игрок кликнул - анимация 1 секунда, иначе 5 секунд
            const duration = isFast ? 1 : 5; 
            
            track.style.transition = `transform ${duration}s cubic-bezier(0.15, 0.85, 0.1, 1)`;
            track.style.transform = `translateX(-${offset}px)`;

            setTimeout(() => {
                showResult(winItem);
            }, duration * 1000 + 200);
        });
    }

    // ============================================================
    // 7. ПОКАЗ РЕЗУЛЬТАТА
    // ============================================================
    function showResult(winItem) {
        // Если деньги – добавляем к балансу и отправляем на сервер
        if (winItem.value && winItem.value > 0) {
            balance += winItem.value;
            updateUI();
            // Отправляем результат на сервер
            sendGameResult('win', 45000, winItem.value);
        } else {
            // Для предметов – просто показываем, в будущем можно отправить на сервер для выдачи
        }

        animContainer.innerHTML = `
            <div class="result-display">
                <div class="result-item">
                    <img src="${winItem.image}" alt="">
                    <div class="result-name">${winItem.name}</div>
                    <div class="result-rarity" style="color:${winItem.rarityColor}">${winItem.rarity}</div>
                </div>
                <button class="btn-claim" id="closeBtn">ЗАБРАТЬ</button>
            </div>
        `;

        document.getElementById('closeBtn').addEventListener('click', () => {
            overlay.classList.remove('active');
            isOpening = false;
        });
    }

    // ============================================================
    // 8. КНОПКА НАЗАД
    // ============================================================
    document.getElementById('backBtn').addEventListener('click', () => {
        window.location.href = 'casino.html?userId=' + userId;
    });

    // ============================================================
    // 9. ЗАПУСК TELEGRAM WEB APP
    // ============================================================
    if (window.Telegram?.WebApp) {
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
        window.Telegram.WebApp.enableClosingConfirmation();
    }

    console.log('✅ R-GAME Case Opening (Gemini + crash sync) loaded');
})();
</script>
</body>
</html>
