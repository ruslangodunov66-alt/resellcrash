<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Resell Tycoon CASINO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1122 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 16px;
        }
        .menu {
            background: rgba(18, 25, 45, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 {
            font-size: 28px;
            margin-bottom: 20px;
            color: #f5b042;
        }
        .game-btn {
            display: block;
            width: 100%;
            background: #1e2a44;
            border: none;
            border-radius: 60px;
            padding: 14px;
            margin: 12px 0;
            font-weight: 700;
            font-size: 18px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .game-btn:active { transform: scale(0.96); }
    </style>
</head>
<body>
<div class="menu">
    <h1>🎰 КАЗИНО</h1>
    <button class="game-btn" id="crashBtn">💥 КРАШ</button>
</div>
<script src="https://telegram.org/js/telegram-web-app.js?56"></script>
<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    tg.enableClosingConfirmation();

    let userId = null;
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('userId')) {
        userId = urlParams.get('userId');
    } else if (tg.initDataUnsafe?.user?.id) {
        userId = tg.initDataUnsafe.user.id;
    }

    document.getElementById('crashBtn').onclick = () => {
        if (!userId) return;
        window.location.href = `crash.html?userId=${userId}`;
    };
</script>
</body>
</html>
