<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Казино | Resell Tycoon</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: radial-gradient(circle at 30% 10%, #0c1120, #020408); min-height: 100vh; padding: 20px; color: white; }
        .container { max-width: 600px; margin: 0 auto; }
        .glass-card { background: rgba(20,30,45,0.7); backdrop-filter: blur(12px); border-radius: 48px; padding: 24px; border: 1px solid rgba(0,255,255,0.3); margin-bottom: 20px; }
        h2 { font-size: 32px; background: linear-gradient(135deg, #ffcc44, #ff6644); background-clip: text; -webkit-background-clip: text; color: transparent; text-align: center; margin-bottom: 24px; }
        .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 16px; }
        .game-card { background: rgba(0,0,0,0.6); border-radius: 32px; padding: 20px 10px; text-align: center; cursor: pointer; transition: transform 0.2s, border-color 0.2s; border: 1px solid rgba(255,170,68,0.5); }
        .game-card:hover { transform: translateY(-6px); border-color: #ffaa44; background: rgba(0,0,0,0.8); }
        .game-emoji { font-size: 56px; margin-bottom: 12px; }
        .game-name { font-size: 18px; font-weight: bold; }
        .back-btn { background: #555; width: 100%; padding: 14px; border-radius: 40px; border: none; color: white; font-weight: bold; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <div class="glass-card">
        <h2>🎰 ВЫБЕРИ ИГРУ</h2>
        <div class="games-grid">
            <div class="game-card" onclick="location.href='slots.html'"><div class="game-emoji">🎰</div><div class="game-name">СЛОТЫ</div></div>
            <div class="game-card" onclick="location.href='roulette.html'"><div class="game-emoji">🎡</div><div class="game-name">РУЛЕТКА</div></div>
            <div class="game-card" onclick="location.href='blackjack.html'"><div class="game-emoji">🃏</div><div class="game-name">БЛЭКДЖЕК</div></div>
            <div class="game-card" onclick="location.href='mines.html'"><div class="game-emoji">💣</div><div class="game-name">МАЙНЁР</div></div>
            <div class="game-card" id="crashGame"><div class="game-emoji">🚀</div><div class="game-name">КРАШ</div></div>
        </div>
        <button class="back-btn" onclick="location.href='index.html'">🔙 НА ГЛАВНУЮ</button>
    </div>
</div>
<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    const userId = tg.initDataUnsafe?.user?.id;
    document.getElementById('crashGame').addEventListener('click', () => {
        if (userId) location.href = `crash.html?userId=${userId}`;
        else alert('❌ Не удалось определить ID. Запустите через Telegram.');
    });
</script>
</body>
</html>
