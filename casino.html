<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Resell Tycoon CASINO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1122 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 16px;
        }
        .menu {
            background: rgba(18, 25, 45, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 {
            font-size: 28px;
            margin-bottom: 20px;
            color: #f5b042;
        }
        .game-btn {
            display: block;
            width: 100%;
            background: #1e2a44;
            border: none;
            border-radius: 60px;
            padding: 14px;
            margin: 12px 0;
            font-weight: 700;
            font-size: 18px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .game-btn:active { transform: scale(0.96); }
        .balance {
            background: #0b0f1c;
            border-radius: 60px;
            padding: 8px 20px;
            margin-bottom: 20px;
            color: #f5b042;
            font-size: 20px;
            font-weight: 700;
        }
    </style>
</head>
<body>
<div class="menu">
    <div class="balance" id="balance">💰 Баланс: 0 ₽</div>
    <h1>🎰 КАЗИНО</h1>
    <button class="game-btn" id="slotsBtn">🍒 СЛОТЫ</button>
    <button class="game-btn" id="blackjackBtn">🃏 БЛЭКДЖЕК</button>
    <button class="game-btn" id="rouletteBtn">🎡 РУЛЕТКА</button>
    <button class="game-btn" id="crashBtn">💥 КРАШ</button>
</div>
<script src="https://telegram.org/js/telegram-web-app.js?56"></script>
<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    tg.enableClosingConfirmation();

    let userId = null;
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('userId')) {
        userId = urlParams.get('userId');
    } else if (tg.initDataUnsafe?.user?.id) {
        userId = tg.initDataUnsafe.user.id;
    }

    async function fetchBalance() {
        if (!userId) return;
        try {
            const res = await fetch(`/casino/balance/${userId}`);
            const data = await res.json();
            document.getElementById('balance').innerText = `💰 Баланс: ${data.balance} ₽`;
        } catch(e) { console.error(e); }
    }

    // Простая отправка команд боту (для слотов, блэкджека, рулетки)
    function sendGameAction(action) {
        if (!tg || !tg.sendData) return;
        tg.sendData(JSON.stringify({ action: action }));
    }

    document.getElementById('slotsBtn').onclick = () => sendGameAction('slots');
    document.getElementById('blackjackBtn').onclick = () => sendGameAction('blackjack');
    document.getElementById('rouletteBtn').onclick = () => sendGameAction('roulette');
    
    // Для краша – открываем crash.html в этом же окне (как работало ранее)
    document.getElementById('crashBtn').onclick = () => {
        if (!userId) return;
        // Заменяем текущий URL на crash.html с передачей userId
        window.location.href = `https://ruslangodunov66-alt.github.io/resellcrash/crash.html?userId=${userId}`;
    };

    if (userId) {
        fetchBalance();
        setInterval(fetchBalance, 5000);
    }
</script>
</body>
</html>
