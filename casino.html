<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>1WIN STYLE CASINO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f2a, #030617);
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #fff;
        }

        /* Неоновое свечение */
        .glow {
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3), 0 0 5px rgba(0, 255, 255, 0.5);
        }

        .menu-container {
            max-width: 550px;
            width: 100%;
            background: rgba(10, 15, 35, 0.65);
            backdrop-filter: blur(16px);
            border-radius: 56px;
            padding: 28px 24px 32px;
            text-align: center;
            border: 1px solid rgba(0, 255, 255, 0.25);
            transition: all 0.3s ease;
        }

        h1 {
            font-size: 42px;
            font-weight: 800;
            background: linear-gradient(135deg, #FFE6A3, #FFB347, #FF8C00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px #ffb34766;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .sub {
            color: #aab3d0;
            font-size: 14px;
            letter-spacing: 2px;
            margin-bottom: 20px;
            border-bottom: 1px dashed rgba(0, 255, 255, 0.3);
            display: inline-block;
            padding-bottom: 6px;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
            margin: 30px 0 20px;
        }

        .game-card {
            background: rgba(18, 25, 55, 0.8);
            border-radius: 32px;
            padding: 24px 12px;
            cursor: pointer;
            transition: all 0.25s ease;
            border: 1px solid rgba(0, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            position: relative;
            overflow: hidden;
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .game-card:hover::before {
            left: 100%;
        }

        .game-card:hover {
            transform: translateY(-5px);
            border-color: #0ff;
            box-shadow: 0 10px 25px rgba(0, 255, 255, 0.3);
            background: #121b3a;
        }

        .game-card:active {
            transform: scale(0.96);
        }

        .game-icon {
            font-size: 58px;
            margin-bottom: 12px;
            filter: drop-shadow(0 0 8px rgba(0, 255, 255, 0.5));
        }

        .game-name {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #ffe0a3);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }

        .game-desc {
            font-size: 13px;
            color: #8e9dc0;
            margin-top: 6px;
        }

        .back-btn {
            background: linear-gradient(95deg, #1e2a4a, #0f172f);
            border: none;
            border-radius: 50px;
            padding: 14px 20px;
            font-weight: 700;
            font-size: 16px;
            color: #ccd6f0;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            margin-top: 12px;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        .back-btn:active {
            transform: scale(0.97);
            background: #2a3a60;
        }

        /* Панель ошибки / ручной ввод ID */
        .error-box {
            background: rgba(30, 20, 50, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 28px 20px;
            margin-top: 20px;
            border: 1px solid #ff7b5c;
        }

        .error-box div:first-child {
            font-size: 18px;
            font-weight: bold;
            color: #ffaa88;
        }

        .id-input {
            width: 100%;
            padding: 16px;
            background: #0c1025;
            border: 1px solid #3a4a7a;
            border-radius: 60px;
            color: white;
            text-align: center;
            font-size: 18px;
            margin-top: 16px;
            outline: none;
            font-weight: 500;
        }

        .id-input:focus {
            border-color: #0ff;
            box-shadow: 0 0 10px #0ff;
        }

        .confirm-btn {
            background: linear-gradient(95deg, #f0a34e, #ff6a2e);
            border: none;
            border-radius: 60px;
            padding: 14px;
            font-weight: bold;
            font-size: 18px;
            margin-top: 16px;
            color: white;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }

        .confirm-btn:active {
            transform: scale(0.97);
        }

        footer {
            font-size: 11px;
            margin-top: 24px;
            color: #556;
        }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
</head>
<body>
<div class="menu-container" id="menuContainer">
    <h1>🎲 1WIN STYLE</h1>
    <div class="sub">CASINO • SLOTS • CRASH</div>

    <!-- Панель с играми (скрыта изначально) -->
    <div id="gamesPanel" style="display: none;">
        <div class="games-grid">
            <div class="game-card" data-game="slots">
                <div class="game-icon">🎰</div>
                <div class="game-name">СЛОТЫ</div>
                <div class="game-desc">Джекпот 777</div>
            </div>
            <div class="game-card" data-game="roulette">
                <div class="game-icon">🎡</div>
                <div class="game-name">РУЛЕТКА</div>
                <div class="game-desc">Красное / Чёрное</div>
            </div>
            <div class="game-card" data-game="blackjack">
                <div class="game-icon">🃏</div>
                <div class="game-name">БЛЭКДЖЕК</div>
                <div class="game-desc">21 очко</div>
            </div>
            <div class="game-card" data-game="mines">
                <div class="game-icon">💣</div>
                <div class="game-name">МАЙНЕР</div>
                <div class="game-desc">Minesweeper</div>
            </div>
            <div class="game-card" data-game="crash">
                <div class="game-icon">🚀</div>
                <div class="game-name">КРАШ</div>
                <div class="game-desc">Ракета</div>
            </div>
        </div>
        <button class="back-btn" id="backToMainBtn">🏠 ЗАКРЫТЬ МЕНЮ</button>
    </div>

    <!-- Панель ошибки / ввода ID -->
    <div id="errorPanel" class="error-box">
        <div>⚠️ ID НЕ ОПРЕДЕЛЁН</div>
        <div style="font-size:14px; margin-top:12px;">Введите ваш Telegram ID, чтобы продолжить:</div>
        <input type="number" id="manualUserId" class="id-input" placeholder="Например, 123456789">
        <button id="confirmIdBtn" class="confirm-btn">💎 ВОЙТИ В КАЗИНО</button>
        <footer>💡 ID можно узнать у бота командой /id</footer>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.enableClosingConfirmation();

    let userId = null;

    // 1. Пытаемся получить userId из URL (передаётся ботом)
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('userId')) {
        const parsed = parseInt(urlParams.get('userId'));
        if (!isNaN(parsed)) userId = parsed;
    }
    // 2. Если не получилось – берём из Telegram WebApp
    if (!userId && tg.initDataUnsafe?.user?.id) {
        userId = tg.initDataUnsafe.user.id;
    }

    const gamesPanel = document.getElementById('gamesPanel');
    const errorPanel = document.getElementById('errorPanel');
    const manualInput = document.getElementById('manualUserId');
    const confirmBtn = document.getElementById('confirmIdBtn');

    function showGames() {
        gamesPanel.style.display = 'block';
        errorPanel.style.display = 'none';
    }

    function showError() {
        gamesPanel.style.display = 'none';
        errorPanel.style.display = 'block';
    }

    // Ручной ввод ID
    confirmBtn.addEventListener('click', () => {
        const val = manualInput.value.trim();
        if (val && !isNaN(parseInt(val))) {
            userId = parseInt(val);
            showGames();
        } else {
            alert('❌ Введите корректный числовой Telegram ID');
        }
    });

    // Открытие выбранной игры с передачей userId
    function openGame(gameName) {
        if (!userId) return;
        let gameUrl = '';
        const baseUrl = 'https://ruslangodunov66-alt.github.io/resellcrash/';   // <- замени на свой реальный URL
        switch (gameName) {
            case 'slots': gameUrl = baseUrl + 'slots.html'; break;
            case 'roulette': gameUrl = baseUrl + 'roulette.html'; break;
            case 'blackjack': gameUrl = baseUrl + 'blackjack.html'; break;
            case 'mines': gameUrl = baseUrl + 'mines.html'; break;
            case 'crash': gameUrl = baseUrl + 'crash.html'; break;
            default: return;
        }
        gameUrl += `?userId=${userId}`;
        tg.openWebApp(gameUrl);
    }

    // Привязываем обработчики на карточки игр
    document.querySelectorAll('.game-card').forEach(card => {
        card.addEventListener('click', (e) => {
            const game = card.getAttribute('data-game');
            openGame(game);
        });
    });

    // Кнопка закрыть
    document.getElementById('backToMainBtn').addEventListener('click', () => {
        tg.close();
    });

    // Инициализация
    if (userId) {
        showGames();
    } else {
        showError();
    }

    tg.setBackgroundColor("#030617");
    tg.setHeaderColor("bg_color");
</script>
</body>
</html>
