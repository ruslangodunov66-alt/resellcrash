<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LOBBY | R-GAME</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,600;0,800;1,800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0f16;
            --container-bg: #111822;
            --panel-bg: #1a2332;
            --accent-blue: #1882ff;
            --accent-blue-hover: #3b95ff;
            --accent-green: #1bd15d;
            --accent-red: #f03043;
            --accent-orange: #ff9800;
            --accent-purple: #8b5cf6;
            --text-main: #e2e8f0;
            --text-muted: #8c9eb5;
            --card-glow: rgba(24, 130, 255, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Nunito', system-ui, sans-serif;
            min-height: 100vh;
            padding: 16px 16px 100px;
            color: var(--text-main);
            overflow-x: hidden;
            position: relative;
            background: var(--bg-dark);
        }

        /* Плиточный фон с эффектом наложения фирменного свечения */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://raw.githubusercontent.com/ruslangodunov66-alt/resellcrash/main/photo_2026-06-15_21-29-44.jpg');
            background-repeat: repeat;
            background-size: auto;
            background-position: top left;
            opacity: 0.18;
            pointer-events: none;
            z-index: -2;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 50% 0%, rgba(24, 130, 255, 0.18), transparent 60%),
                radial-gradient(circle at 50% 100%, rgba(139, 92, 246, 0.1), transparent 60%);
            pointer-events: none;
            z-index: -1;
        }

        #animatedCanvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 2;
            max-width: 500px;
            margin: 0 auto;
        }

        /* Glassmorphism Карточки */
        .glass-card {
            background: rgba(17, 24, 34, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(255,255,255,0.05);
        }

        /* Хедер */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding: 14px 20px;
            border: 1px solid rgba(24, 130, 255, 0.2);
            box-shadow: 0 8px 32px rgba(24, 130, 255, 0.1);
        }

        .logo-wrapper {
            flex-shrink: 0;
            animation: logoAppear 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards;
        }

        .logo-img {
            height: 44px;
            width: auto;
            max-width: 160px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
            border-radius: 12px;
            transition: transform 0.2s;
        }

        .logo-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 24px;
            font-weight: 800;
            font-style: italic;
            background: linear-gradient(135deg, #ffffff, #a0c4ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        @keyframes logoAppear {
            0% { opacity: 0; transform: scale(0.9) translateY(-10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Блок Баланса */
        .balance-block {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-dark);
            padding: 6px 6px 6px 16px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
        }

        .balance-label {
            font-family: 'Montserrat', sans-serif;
            font-size: 11px;
            font-weight: 800;
            color: var(--text-muted);
            letter-spacing: 0.8px;
        }

        .balance-value {
            font-family: 'Montserrat', sans-serif;
            font-size: 18px;
            font-weight: 800;
            color: var(--accent-green);
            text-shadow: 0 0 12px rgba(27, 209, 93, 0.3);
        }

        .deposit-btn {
            background: var(--accent-blue);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 20px;
            font-weight: 800;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 12px rgba(24, 130, 255, 0.4);
        }

        .deposit-btn:active {
            transform: scale(0.85);
            background: var(--accent-blue-hover);
        }

        /* Сетка игр */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin: 24px 0;
        }

        .game-card {
            background: linear-gradient(135deg, rgba(26, 35, 50, 0.7), rgba(17, 24, 34, 0.85));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 24px 14px;
            text-align: center;
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.04);
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            opacity: 0;
            transform: translateY(20px);
            animation: cardAppear 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards;
            position: relative;
            overflow: hidden;
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.05), transparent 70%);
            pointer-events: none;
        }

        @keyframes cardAppear {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Персональные задержки для появления карточек */
        .game-card:nth-child(1) { animation-delay: 0.05s; }
        .game-card:nth-child(2) { animation-delay: 0.1s; }
        .game-card:nth-child(3) { animation-delay: 0.15s; }
        .game-card:nth-child(4) { animation-delay: 0.2s; }
        .game-card:nth-child(5) { animation-delay: 0.25s; }

        .game-card:active {
            transform: scale(0.95) translateY(2px);
            background: linear-gradient(135deg, rgba(24, 130, 255, 0.15), rgba(17, 24, 34, 0.95));
            border-color: rgba(24, 130, 255, 0.4);
            box-shadow: 0 4px 10px rgba(24, 130, 255, 0.1), 0 0 15px rgba(24, 130, 255, 0.15);
        }

        .game-icon {
            font-size: 48px;
            margin-bottom: 12px;
            display: inline-block;
            filter: drop-shadow(0 6px 10px rgba(0,0,0,0.4));
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .game-card:hover .game-icon {
            transform: scale(1.12) rotate(4deg);
        }

        .game-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 16px;
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.2px;
            text-transform: uppercase;
        }

        .game-sub {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 6px;
            line-height: 1.3;
        }

        /* Промо-баннер */
        .promo-banner {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.15), rgba(24, 130, 255, 0.05));
            border-radius: 20px;
            padding: 16px 20px;
            margin: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(139, 92, 246, 0.3);
            box-shadow: 0 8px 24px rgba(139,92,246,0.15), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .promo-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            font-weight: 800;
            color: #fff;
            letter-spacing: 0.5px;
        }

        .promo-highlight {
            font-family: 'Montserrat', sans-serif;
            color: var(--accent-orange);
            font-size: 18px;
            font-weight: 800;
            text-shadow: 0 0 12px rgba(255, 152, 0, 0.4);
        }

        /* Нижняя навигация */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(10, 15, 22, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 10px 10px 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 100;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            transition: all 0.2s ease;
            cursor: pointer;
            padding: 8px 14px;
            border-radius: 16px;
        }

        .nav-item.active {
            color: var(--accent-blue);
            background: rgba(24, 130, 255, 0.1);
        }

        .nav-item:active {
            transform: scale(0.9);
        }

        .nav-icon {
            font-size: 22px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
            transition: transform 0.2s;
        }
        
        .nav-item.active .nav-icon {
            transform: translateY(-2px);
            filter: drop-shadow(0 0 8px rgba(24, 130, 255, 0.5));
        }

        @media (max-width: 400px) {
            .games-grid { gap: 10px; }
            .game-card { padding: 18px 8px; border-radius: 20px; }
            .game-icon { font-size: 40px; }
            .game-title { font-size: 14px; }
            .balance-value { font-size: 16px; }
            .logo-img { height: 36px; }
        }
    </style>
</head>
<body>
    <canvas id="animatedCanvas"></canvas>
    <div class="content">
        <!-- Шапка приложения -->
        <div class="header glass-card">
            <div class="logo-wrapper">
                <img src="https://raw.githubusercontent.com/ruslangodunov66-alt/resellcrash/main/photo_2026-06-15_20-35-21.jpg" 
                     alt="R-GAME" 
                     class="logo-img" 
                     onerror="this.onerror=null; this.parentElement.innerHTML='<span class=\'logo-text\'>R-<span>GAME</span></span>';">
            </div>
            <div class="balance-block">
                <span class="balance-label">БАЛАНС</span>
                <span class="balance-value" id="balanceDisplay">0 ₽</span>
                <button class="deposit-btn" id="depositMockBtn">+</button>
            </div>
        </div>

        <!-- Сетка игровых автоматов/режимов -->
        <div class="games-grid" id="gamesGrid">
            <div class="game-card" data-game="crash">
                <div class="game-icon">💥</div>
                <div class="game-title">CRASH</div>
                <div class="game-sub">Ракета, иксы, быстрый куш</div>
            </div>
            <div class="game-card" data-game="blackjack">
                <div class="game-icon">🃏</div>
                <div class="game-title">БЛЭКДЖЕК</div>
                <div class="game-sub">Классический стол и тактика</div>
            </div>
            <div class="game-card" data-game="mines">
                <div class="game-icon">💣</div>
                <div class="game-title">MINES</div>
                <div class="game-sub">Ищи кристаллы, обходи мины</div>
            </div>
            <div class="game-card" data-game="slots">
                <div class="game-icon">🎰</div>
                <div class="game-title">СЛОТЫ</div>
                <div class="game-sub">Линии заноса, мега джекпот</div>
            </div>
            <div class="game-card" data-game="roulette">
                <div class="game-icon">🎡</div>
                <div class="game-title">РУЛЕТКА</div>
                <div class="game-sub">Европейская, live-ставки</div>
            </div>
        </div>

        <!-- Бонусная плашка -->
        <div class="promo-banner">
            <div class="promo-text">🔥 ЕЖЕДНЕВНЫЙ БОНУС</div>
            <div class="promo-highlight">+100% до 5000₽</div>
        </div>

        <!-- Меню переключения внизу -->
        <div class="bottom-nav">
            <div class="nav-item active" data-nav="home"><div class="nav-icon">🏠</div><div>Главная</div></div>
            <div class="nav-item" data-nav="history"><div class="nav-icon">📜</div><div>История</div></div>
            <div class="nav-item" data-nav="profile"><div class="nav-icon">👤</div><div>Профиль</div></div>
            <div class="nav-item" data-nav="support"><div class="nav-icon">💬</div><div>Поддержка</div></div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        let userId = null;
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('userId')) userId = urlParams.get('userId');
        else if (tg.initDataUnsafe?.user?.id) userId = tg.initDataUnsafe.user.id;

        const balanceSpan = document.getElementById('balanceDisplay');
        const gameCards = document.querySelectorAll('.game-card');
        const navItems = document.querySelectorAll('.nav-item');
        const depositBtn = document.getElementById('depositMockBtn');

        // Анимация фонового Canvas (падающие монеты и деньги)
        const canvas = document.getElementById('animatedCanvas');
        const ctx = canvas.getContext('2d');
        let width = window.innerWidth, height = window.innerHeight;
        let particles = [];

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        class FlyingObject {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = 20 + Math.random() * 18;
                this.speedX = (Math.random() - 0.5) * 0.6;
                this.speedY = 0.5 + Math.random() * 1.2;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.02;
                this.type = Math.random() > 0.6 ? 'coin' : 'money';
                this.opacity = 0.25 + Math.random() * 0.4; // Чуть приглушил, чтобы не мешать контенту
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.rotation += this.rotSpeed;
                if (this.y > height + 100) { this.y = -80; this.x = Math.random() * width; }
                if (this.x < -100) this.x = width + 50;
                if (this.x > width + 100) this.x = -50;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = this.opacity;
                if (this.type === 'coin') {
                    ctx.fillStyle = '#ffcc44';
                    ctx.shadowBlur = 12;
                    ctx.shadowColor = '#ffaa33';
                    ctx.beginPath();
                    ctx.ellipse(0, 0, this.size/2, this.size/2, 0, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = '#e6a822';
                    ctx.beginPath();
                    ctx.ellipse(0, 0, this.size/3, this.size/3, 0, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = '#ffdd88';
                    ctx.font = `${this.size-6}px "Segoe UI"`;
                    ctx.fillText('💰', -this.size/3, this.size/4);
                } else {
                    ctx.fillStyle = '#2ecc71';
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = '#27ae60';
                    ctx.fillRect(-this.size/2, -this.size/3, this.size, this.size*0.7);
                    ctx.fillStyle = '#f1c40f';
                    ctx.font = `${this.size-6}px "Segoe UI"`;
                    ctx.fillText('💵', -this.size/3, this.size/4);
                }
                ctx.restore();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 35; i++) particles.push(new FlyingObject());
        }

        function animateBackground() {
            ctx.clearRect(0, 0, width, height);
            for (let p of particles) { p.update(); p.draw(); }
            requestAnimationFrame(animateBackground);
        }

        window.addEventListener('resize', () => { resizeCanvas(); initParticles(); });
        resizeCanvas();
        initParticles();
        animateBackground();

        async function fetchBalance() {
            if (!userId) return;
            try {
                const res = await fetch(`/balance/${userId}`);
                const data = await res.json();
                if (data.balance !== undefined) balanceSpan.innerText = `${data.balance.toLocaleString()} ₽`;
            } catch (e) { console.log("Баланс доступен в чате с ботом"); }
        }

        function goToGame(game) {
            if (!userId) return;
            if (game === 'crash') window.location.href = `crash.html?userId=${userId}`;
            else if (game === 'blackjack') window.location.href = `blackjack.html?userId=${userId}`;
            else if (game === 'mines') window.location.href = `mines.html?userId=${userId}`;
            else if (game === 'slots') tg.sendData(JSON.stringify({ action: "slots" }));
            else if (game === 'roulette') tg.sendData(JSON.stringify({ action: "roulette" }));
        }

        gameCards.forEach(card => {
            card.addEventListener('click', () => {
                const game = card.getAttribute('data-game');
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                goToGame(game);
            });
        });

        navItems.forEach(item => {
            item.addEventListener('click', () => {
                navItems.forEach(nav => nav.classList.remove('active'));
                item.classList.add('active');
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                const navType = item.getAttribute('data-nav');
                if (navType === 'history') tg.sendData(JSON.stringify({ action: "get_history" }));
                else if (navType === 'profile') tg.sendData(JSON.stringify({ action: "profile" }));
                else if (navType === 'support') tg.sendData(JSON.stringify({ action: "support" }));
            });
        });

        depositBtn.onclick = () => { 
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            tg.sendData(JSON.stringify({ action: "deposit" })); 
        };

        if (userId) {
            fetchBalance();
            setInterval(fetchBalance, 15000);
        }
    </script>
</body>
</html>
