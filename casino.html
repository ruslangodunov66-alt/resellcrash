<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LOBBY | R-GAME</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,600;0,800;1,800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* ... ваш стиль ... */
        /* (оставляем без изменений) */
    </style>
</head>
<body>
    <canvas id="animatedCanvas"></canvas>
    
    <div class="content">
        <div class="header">
            <div class="brand">R-<span>GAME</span></div>
            <div class="balance-block">
                <div class="balance-info">
                    <span class="balance-label">БАЛАНС</span>
                    <span class="balance-value" id="balanceDisplay">0 ₽</span>
                </div>
                <div class="action-buttons">
                    <button class="action-btn deposit" id="depositBtn">+</button>
                    <button class="action-btn withdraw" id="withdrawBtn">-</button>
                </div>
            </div>
        </div>

        <div class="promo-banner">
            <div class="promo-text">🔥 БОНУС НА ДЕПОЗИТ</div>
            <div class="promo-highlight">+100% до 5000₽</div>
        </div>

        <div class="games-grid" id="gamesGrid">
            <div class="game-card" data-game="crash">
                <div class="game-icon">🚀</div>
                <div class="game-title">CRASH</div>
                <div class="game-sub">Космический рейс, лови иксы</div>
            </div>
            <div class="game-card" data-game="mines">
                <div class="game-icon">💎</div>
                <div class="game-title">MINES</div>
                <div class="game-sub">Обходи мины, ищи гемы</div>
            </div>
            <div class="game-card" data-game="blackjack">
                <div class="game-icon">🃏</div>
                <div class="game-title">БЛЭКДЖЕК</div>
                <div class="game-sub">Классика, 21 очко и дилер</div>
            </div>
            <div class="game-card" data-game="slots">
                <div class="game-icon">🎰</div>
                <div class="game-title">СЛОТЫ</div>
                <div class="game-sub">Линии заноса, мега джекпот</div>
            </div>
            <div class="game-card" data-game="roulette">
                <div class="game-icon">🎡</div>
                <div class="game-info">
                    <div class="game-title">РУЛЕТКА</div>
                    <div class="game-sub">Европейская рулетка, красное или черное</div>
                </div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" data-nav="home">
                <div class="nav-icon">🏠</div>
                <div>Главная</div>
            </div>
            <div class="nav-item" data-nav="history">
                <div class="nav-icon">📜</div>
                <div>История</div>
            </div>
            <div class="nav-item" data-nav="profile">
                <div class="nav-icon">👤</div>
                <div>Профиль</div>
            </div>
            <div class="nav-item" data-nav="support">
                <div class="nav-icon">💬</div>
                <div>Саппорт</div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        let userId = null;
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('userId')) userId = urlParams.get('userId');
        else if (tg.initDataUnsafe?.user?.id) userId = tg.initDataUnsafe.user.id;

        // ===== КОНСТАНТЫ =====
        const URL_SLOTS = "https://ruslangodunov66-alt.github.io/resellcrash/slots.html";
        const URL_ROULETTE = "https://ruslangodunov66-alt.github.io/resellcrash/roulette.html";
        const URL_CRASH = "https://ruslangodunov66-alt.github.io/resellcrash/crash.html";
        const URL_MINES = "https://ruslangodunov66-alt.github.io/resellcrash/mines.html";
        const URL_BLACKJACK = "https://ruslangodunov66-alt.github.io/resellcrash/blackjack.html";

        const balanceSpan = document.getElementById('balanceDisplay');
        const depositBtn = document.getElementById('depositBtn');
        const withdrawBtn = document.getElementById('withdrawBtn');

        // ===== БАЛАНС =====
        let casinoBalance = parseInt(localStorage.getItem('casinoBalance')) || 0;
        balanceSpan.innerText = casinoBalance.toLocaleString() + ' ₽';

        // ===== ОБРАБОТЧИК ОТВЕТОВ ОТ БОТА =====
        tg.onEvent('web_app_data', function(data) {
            try {
                const response = JSON.parse(data);
                console.log('Ответ от бота:', response);
                if (response.error) {
                    alert('❌ Ошибка: ' + response.error);
                    return;
                }
                if (response.action === 'deposit_success' || response.action === 'withdraw_success') {
                    if (response.new_casino_balance !== undefined) {
                        casinoBalance = response.new_casino_balance;
                        localStorage.setItem('casinoBalance', String(casinoBalance));
                        balanceSpan.innerText = casinoBalance.toLocaleString() + ' ₽';
                        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                        alert('✅ Операция выполнена!\nНовый баланс казино: ' + casinoBalance.toLocaleString() + ' ₽');
                    }
                }
            } catch (e) {
                console.error('Ошибка обработки ответа:', e);
            }
        });

        // ===== ПОПОЛНЕНИЕ =====
        depositBtn.onclick = () => {
            if (!userId) return;
            let amount = prompt('💰 Введите сумму пополнения:');
            if (amount && !isNaN(amount) && parseInt(amount) > 0) {
                tg.sendData(JSON.stringify({ action: 'deposit', amount: parseInt(amount) }));
            }
        };

        // ===== ВЫВОД =====
        withdrawBtn.onclick = () => {
            if (!userId) return;
            let amount = prompt('💸 Введите сумму вывода:');
            if (amount && !isNaN(amount) && parseInt(amount) > 0) {
                if (parseInt(amount) > casinoBalance) {
                    alert('❌ Недостаточно средств в казино!');
                    return;
                }
                tg.sendData(JSON.stringify({ action: 'withdraw', amount: parseInt(amount) }));
            }
        };

        // ===== ПЕРЕХОД В ИГРЫ =====
        function goToGame(game) {
            if (!userId) return;
            if (game === 'crash') window.location.href = URL_CRASH + '?userId=' + userId;
            else if (game === 'blackjack') window.location.href = URL_BLACKJACK + '?userId=' + userId;
            else if (game === 'mines') window.location.href = URL_MINES + '?userId=' + userId;
            else if (game === 'slots') window.location.href = URL_SLOTS + '?userId=' + userId;
            else if (game === 'roulette') window.location.href = URL_ROULETTE + '?userId=' + userId;
        }

        document.querySelectorAll('.game-card').forEach(card => {
            card.addEventListener('click', () => {
                const game = card.getAttribute('data-game');
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
                goToGame(game);
            });
        });

        // ===== НАВИГАЦИЯ =====
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                item.classList.add('active');
                const navType = item.getAttribute('data-nav');
                if (navType === 'history') tg.sendData(JSON.stringify({ action: "get_history" }));
                else if (navType === 'profile') tg.sendData(JSON.stringify({ action: "profile" }));
                else if (navType === 'support') tg.sendData(JSON.stringify({ action: "support" }));
            });
        });

        // ===== ФОНОВАЯ АНИМАЦИЯ =====
        // (без изменений)
        const canvas = document.getElementById('animatedCanvas');
        const ctx = canvas.getContext('2d');
        let width = window.innerWidth, height = window.innerHeight;
        let particles = [];

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        class FlyingObject {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = 15 + Math.random() * 15;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = 0.3 + Math.random() * 0.8;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.02;
                this.type = Math.random() > 0.6 ? 'coin' : 'money';
                this.opacity = 0.1 + Math.random() * 0.15;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.rotation += this.rotSpeed;
                if (this.y > height + 50) { this.y = -50; this.x = Math.random() * width; }
                if (this.x < -50) this.x = width + 50;
                if (this.x > width + 50) this.x = -50;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = this.opacity;
                if (this.type === 'coin') {
                    ctx.fillStyle = '#ffb74d';
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#ffb74d';
                    ctx.beginPath();
                    ctx.ellipse(0, 0, this.size/2, this.size/2, 0, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = '#ffdd88';
                    ctx.font = `${this.size-5}px "Nunito"`;
                    ctx.fillText('₽', -this.size/4, this.size/3);
                } else {
                    ctx.fillStyle = '#1bd15d';
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = '#1bd15d';
                    ctx.fillRect(-this.size/2, -this.size/3, this.size, this.size*0.6);
                    ctx.fillStyle = '#aaffcc';
                    ctx.font = `${this.size-6}px "Nunito"`;
                    ctx.fillText('$', -this.size/4, this.size/4);
                }
                ctx.restore();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 25; i++) particles.push(new FlyingObject());
        }

        function animateBackground() {
            ctx.clearRect(0, 0, width, height);
            for (let p of particles) { p.update(); p.draw(); }
            requestAnimationFrame(animateBackground);
        }

        window.addEventListener('resize', () => { resizeCanvas(); initParticles(); });
        resizeCanvas();
        initParticles();
        animateBackground();
    </script>
</body>
</html>
