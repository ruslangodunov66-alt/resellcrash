<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>R-GAME | Премиум казино</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #03060c;
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            padding: 16px 16px 80px;
            color: #fff;
            overflow-x: hidden;
            position: relative;
        }

        /* Анимированный фон с летающими объектами (canvas) */
        #animatedCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* Основной контент поверх канваса */
        .content {
            position: relative;
            z-index: 2;
        }

        /* Glassmorphism + градиенты */
        .glass-card {
            background: rgba(18, 25, 45, 0.55);
            backdrop-filter: blur(14px);
            border-radius: 32px;
            border: 1px solid rgba(255, 215, 0, 0.25);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .glass-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.6);
            border-color: rgba(245, 176, 66, 0.6);
        }

        /* Верхняя панель */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding: 12px 20px;
            background: rgba(10, 14, 23, 0.7);
            backdrop-filter: blur(16px);
            border-radius: 60px;
            border: 1px solid rgba(245, 176, 66, 0.3);
        }
        .logo {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, #f5b042, #ffdd88, #f5b042);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shimmer 3s infinite linear;
            letter-spacing: -0.5px;
        }
        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }
        .balance-block {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.6);
            padding: 6px 18px;
            border-radius: 40px;
            border: 1px solid rgba(245, 176, 66, 0.4);
        }
        .balance-label {
            font-size: 13px;
            font-weight: 600;
            color: #aac8ff;
            letter-spacing: 0.5px;
        }
        .balance-value {
            font-size: 22px;
            font-weight: 800;
            color: #f5b042;
            text-shadow: 0 0 6px #f5b04266;
        }
        .deposit-btn {
            background: linear-gradient(135deg, #f5b042, #e67e22);
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 40px;
            font-size: 22px;
            font-weight: bold;
            color: #0a0e17;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 2px 12px rgba(245,176,66,0.5);
        }
        .deposit-btn:active { transform: scale(0.92); }

        /* Сетка игр с анимацией появления */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
            margin: 30px 0 32px;
        }
        .game-card {
            background: linear-gradient(145deg, rgba(30, 40, 60, 0.75), rgba(15, 20, 35, 0.85));
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 22px 12px;
            text-align: center;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(255, 215, 0, 0.25);
            cursor: pointer;
            box-shadow: 0 12px 20px -8px rgba(0,0,0,0.4);
            opacity: 0;
            transform: translateY(20px);
            animation: cardAppear 0.4s ease forwards;
        }
        @keyframes cardAppear {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .game-card:nth-child(1) { animation-delay: 0.05s; }
        .game-card:nth-child(2) { animation-delay: 0.1s; }
        .game-card:nth-child(3) { animation-delay: 0.15s; }
        .game-card:nth-child(4) { animation-delay: 0.2s; }

        .game-card:active {
            transform: scale(0.96);
            background: linear-gradient(145deg, rgba(245,176,66,0.25), rgba(200,130,30,0.35));
            border-color: #f5b042;
        }
        .game-icon {
            font-size: 62px;
            margin-bottom: 12px;
            display: inline-block;
            filter: drop-shadow(0 6px 8px rgba(0,0,0,0.4));
            transition: transform 0.2s;
        }
        .game-card:hover .game-icon {
            transform: scale(1.05);
        }
        .game-title {
            font-size: 20px;
            font-weight: 800;
            color: #ffecb3;
            letter-spacing: -0.3px;
        }
        .game-sub {
            font-size: 12px;
            color: #b0c4ff;
            margin-top: 8px;
            opacity: 0.8;
        }

        /* Промо-баннер с градиентом */
        .promo-banner {
            background: linear-gradient(95deg, #2a1f3a, #1a2a3a);
            border-radius: 28px;
            padding: 16px 20px;
            margin: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #8b5cf6;
            box-shadow: 0 0 12px rgba(139,92,246,0.3);
            transition: all 0.2s;
        }
        .promo-text {
            font-size: 15px;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #ffdd99);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .promo-highlight {
            color: #f5b042;
            font-size: 22px;
            font-weight: 800;
            text-shadow: 0 0 6px #f5b042;
        }

        /* Нижняя навигация */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(8, 12, 20, 0.9);
            backdrop-filter: blur(24px);
            display: flex;
            justify-content: space-around;
            padding: 8px 20px 22px;
            border-top: 1px solid rgba(245,176,66,0.3);
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            font-weight: 500;
            color: #8e9ab0;
            transition: 0.2s;
            cursor: pointer;
            padding: 6px 16px;
            border-radius: 40px;
        }
        .nav-item.active {
            color: #f5b042;
            background: rgba(245,176,66,0.2);
            text-shadow: 0 0 4px #f5b042;
        }
        .nav-item:active { transform: scale(0.94); }
        .nav-icon { font-size: 24px; }

        @media (max-width: 480px) {
            .games-grid { gap: 14px; }
            .game-card { padding: 18px 8px; }
            .game-icon { font-size: 48px; }
            .balance-value { font-size: 18px; }
        }
    </style>
</head>
<body>
    <canvas id="animatedCanvas"></canvas>
    <div class="content">
        <!-- Верхняя панель -->
        <div class="header glass-card">
            <div class="logo">🎰 R‑GAME</div>
            <div class="balance-block">
                <span class="balance-label">БАЛАНС</span>
                <span class="balance-value" id="balanceDisplay">0 ₽</span>
                <button class="deposit-btn" id="depositMockBtn">+</button>
            </div>
        </div>

        <!-- Сетка игр -->
        <div class="games-grid" id="gamesGrid">
            <div class="game-card" data-game="crash">
                <div class="game-icon">💥</div>
                <div class="game-title">CRASH</div>
                <div class="game-sub">Ракета, множитель, риск</div>
            </div>
            <div class="game-card" data-game="blackjack">
                <div class="game-icon">🃏</div>
                <div class="game-title">БЛЭКДЖЕК</div>
                <div class="game-sub">3D дилер, карты, стратегия</div>
            </div>
            <div class="game-card" data-game="slots">
                <div class="game-icon">🎰</div>
                <div class="game-title">СЛОТЫ</div>
                <div class="game-sub">Джекпот, бонусы</div>
            </div>
            <div class="game-card" data-game="roulette">
                <div class="game-icon">🎡</div>
                <div class="game-title">РУЛЕТКА</div>
                <div class="game-sub">Европейская, live‑ставки</div>
            </div>
        </div>

        <!-- Промо-баннер -->
        <div class="promo-banner">
            <div class="promo-text">🔥 ЕЖЕДНЕВНЫЙ БОНУС</div>
            <div class="promo-highlight">+100% до 5000₽</div>
        </div>

        <!-- Нижняя навигация -->
        <div class="bottom-nav">
            <div class="nav-item active" data-nav="home">
                <div class="nav-icon">🏠</div>
                <div>Главная</div>
            </div>
            <div class="nav-item" data-nav="history">
                <div class="nav-icon">📜</div>
                <div>История</div>
            </div>
            <div class="nav-item" data-nav="profile">
                <div class="nav-icon">👤</div>
                <div>Профиль</div>
            </div>
            <div class="nav-item" data-nav="support">
                <div class="nav-icon">💬</div>
                <div>Поддержка</div>
            </div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        let userId = null;
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('userId')) userId = urlParams.get('userId');
        else if (tg.initDataUnsafe?.user?.id) userId = tg.initDataUnsafe.user.id;

        // Элементы
        const balanceSpan = document.getElementById('balanceDisplay');
        const gameCards = document.querySelectorAll('.game-card');
        const navItems = document.querySelectorAll('.nav-item');
        const depositBtn = document.getElementById('depositMockBtn');

        // ---------- Анимация фона (летающие деньги и монеты) ----------
        const canvas = document.getElementById('animatedCanvas');
        const ctx = canvas.getContext('2d');
        let width = window.innerWidth;
        let height = window.innerHeight;
        let particles = [];

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        class FlyingObject {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = 20 + Math.random() * 18;
                this.speedX = (Math.random() - 0.5) * 0.6;
                this.speedY = 0.5 + Math.random() * 1.2;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.02;
                this.type = Math.random() > 0.6 ? 'coin' : 'money';
                this.opacity = 0.4 + Math.random() * 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.rotation += this.rotSpeed;
                if (this.y > height + 100) {
                    this.y = -80;
                    this.x = Math.random() * width;
                }
                if (this.x < -100) this.x = width + 50;
                if (this.x > width + 100) this.x = -50;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = this.opacity;
                if (this.type === 'coin') {
                    ctx.fillStyle = '#ffcc44';
                    ctx.shadowBlur = 12;
                    ctx.shadowColor = '#ffaa33';
                    ctx.beginPath();
                    ctx.ellipse(0, 0, this.size/2, this.size/2, 0, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = '#e6a822';
                    ctx.beginPath();
                    ctx.ellipse(0, 0, this.size/3, this.size/3, 0, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = '#ffdd88';
                    ctx.font = `${this.size-6}px "Segoe UI"`;
                    ctx.fillText('💰', -this.size/3, this.size/4);
                } else {
                    // Деньги (доллар/рубль)
                    ctx.fillStyle = '#2ecc71';
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = '#27ae60';
                    ctx.fillRect(-this.size/2, -this.size/3, this.size, this.size*0.7);
                    ctx.fillStyle = '#f1c40f';
                    ctx.font = `${this.size-6}px "Segoe UI"`;
                    ctx.fillText('💵', -this.size/3, this.size/4);
                }
                ctx.restore();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 35; i++) {
                particles.push(new FlyingObject());
            }
        }

        function animateBackground() {
            ctx.clearRect(0, 0, width, height);
            for (let p of particles) {
                p.update();
                p.draw();
            }
            requestAnimationFrame(animateBackground);
        }

        window.addEventListener('resize', () => {
            resizeCanvas();
            initParticles();
        });
        resizeCanvas();
        initParticles();
        animateBackground();

        // ---------- Работа с балансом (имитация, через API при наличии) ----------
        async function fetchBalance() {
            if (!userId) return;
            try {
                const res = await fetch(`/balance/${userId}`);
                const data = await res.json();
                if (data.balance !== undefined) balanceSpan.innerText = `${data.balance.toLocaleString()} ₽`;
            } catch (e) {
                // Если API нет, игнорируем
                console.log("Баланс доступен в чате с ботом");
            }
        }

        function goToGame(game) {
            if (!userId) return;
            let url = '';
            if (game === 'crash') url = `crash.html?userId=${userId}`;
            else if (game === 'blackjack') url = `blackjack.html?userId=${userId}`;
            else if (game === 'slots') {
                tg.sendData(JSON.stringify({ action: "slots" }));
                return;
            } else if (game === 'roulette') {
                tg.sendData(JSON.stringify({ action: "roulette" }));
                return;
            }
            if (url) window.location.href = url;
        }

        // Карточки игр
        gameCards.forEach(card => {
            card.addEventListener('click', () => {
                const game = card.getAttribute('data-game');
                goToGame(game);
            });
        });

        // Нижняя навигация
        navItems.forEach(item => {
            item.addEventListener('click', () => {
                navItems.forEach(nav => nav.classList.remove('active'));
                item.classList.add('active');
                const navType = item.getAttribute('data-nav');
                if (navType === 'history') tg.sendData(JSON.stringify({ action: "get_history" }));
                else if (navType === 'profile') tg.sendData(JSON.stringify({ action: "profile" }));
                else if (navType === 'support') tg.sendData(JSON.stringify({ action: "support" }));
            });
        });

        // Депозит (mock)
        depositBtn.onclick = () => {
            tg.sendData(JSON.stringify({ action: "deposit" }));
        };

        if (userId) {
            fetchBalance();
            setInterval(fetchBalance, 15000);
        }
    </script>
</body>
</html>
