<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CRASH | R-Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: radial-gradient(circle at 30% 20%, #0a0e1a, #010101);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 16px;
        }
        .game-container {
            max-width: 500px;
            width: 100%;
            background: rgba(18, 25, 45, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
            border: 1px solid rgba(0,255,255,0.3);
        }
        .rocket-area {
            background: #030617;
            border-radius: 40px;
            padding: 30px 20px 20px;
            margin-bottom: 20px;
            position: relative;
            border: 1px solid #2a3455;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.5);
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: radial-gradient(ellipse at 30% 40%, #111a2e, #020513);
            border-radius: 28px;
        }
        .multiplier-badge {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 8px 24px;
            border-radius: 60px;
            font-size: 36px;
            font-weight: 800;
            color: #ffcc44;
            text-shadow: 0 0 12px #ffaa44;
            border: 1px solid rgba(255,180,70,0.5);
            white-space: nowrap;
        }
        .multiplier-badge span { font-size: 20px; color: #f5b042; }
        .bet-area {
            background: #0f1424;
            border-radius: 36px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .bet-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            color: #b9c3dd;
            font-size: 14px;
        }
        .bet-input-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }
        .bet-input {
            flex: 2;
            min-width: 120px;
            background: #01010c;
            border: 1px solid #2a3455;
            border-radius: 40px;
            padding: 14px 20px;
            color: white;
            font-size: 20px;
            font-weight: 600;
            text-align: center;
            outline: none;
        }
        .bet-input:focus { border-color: #f5b042; }
        .action-buttons {
            display: flex;
            gap: 12px;
            flex: 1;
            justify-content: center;
        }
        button {
            background: #1e2a44;
            border: none;
            border-radius: 60px;
            padding: 12px 24px;
            font-weight: 700;
            font-size: 18px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            flex: 1;
            min-width: 120px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        button:active { transform: scale(0.96); }
        .btn-bet {
            background: linear-gradient(95deg, #f0b35e, #f57c00);
            color: #1f1f1f;
            font-weight: 800;
        }
        .btn-cashout {
            background: linear-gradient(95deg, #2dd4bf, #14b8a6);
            font-weight: 800;
        }
        .btn-cashout:disabled { opacity: 0.5; transform: none; cursor: not-allowed; }
        .history {
            background: #0a0f1cbb;
            border-radius: 28px;
            padding: 14px;
        }
        .history-title { font-size: 12px; color: #8e9ab0; margin-bottom: 8px; }
        .history-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .history-item {
            background: #1a1f30;
            padding: 6px 14px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 16px;
            font-family: monospace;
            color: #ffb347;
        }
        .status {
            text-align: center;
            font-size: 12px;
            margin-top: 12px;
            color: #ffbf69;
        }
        @media (max-width: 480px) {
            .bet-input-wrapper { flex-direction: column; }
            .action-buttons { flex-direction: row; }
            button { min-width: auto; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="rocket-area">
        <div class="multiplier-badge" id="multiplierDisplay">1.00<span>x</span></div>
        <canvas id="crashCanvas" width="600" height="300" style="width:100%; height:auto;"></canvas>
    </div>
    <div class="bet-area">
        <div class="bet-label">
            <span>💎 СУММА СТАВКИ</span>
            <span>от 10 до 5000₽</span>
        </div>
        <div class="bet-input-wrapper">
            <input type="number" id="betAmount" class="bet-input" value="100" step="10">
            <div class="action-buttons">
                <button id="betButton" class="btn-bet">🚀 СТАВКА</button>
                <button id="cashoutButton" class="btn-cashout" disabled>💎 ЗАБРАТЬ</button>
            </div>
        </div>
    </div>
    <div class="history">
        <div class="history-title">📋 ИСТОРИЯ КРАШЕЙ</div>
        <div class="history-list" id="historyList">—</div>
    </div>
    <div class="status" id="statusMsg">💎 Введи ставку и нажми СТАВКА</div>
</div>
<script src="https://telegram.org/js/telegram-web-app.js?56"></script>
<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    let userId = null;
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('userId')) {
        userId = urlParams.get('userId');
    } else if (tg.initDataUnsafe?.user?.id) {
        userId = tg.initDataUnsafe.user.id;
    }

    const betAmountInput = document.getElementById('betAmount');
    const betBtn = document.getElementById('betButton');
    const cashoutBtn = document.getElementById('cashoutButton');
    const multiplierDisplay = document.getElementById('multiplierDisplay');
    const historyList = document.getElementById('historyList');
    const statusSpan = document.getElementById('statusMsg');
    const canvas = document.getElementById('crashCanvas');
    const ctx = canvas.getContext('2d');

    let currentBet = 0;
    let hasBet = false;
    let hasCashedOut = false;
    let currentMultiplier = 1.0;
    let crashPoint = 1.10;
    let animationInterval = null;

    function generateCrashPoint() {
        const r = Math.random();
        if (r < 0.50) return 1.10 + Math.random() * 0.90;
        else if (r < 0.80) return 2.00 + Math.random() * 3.00;
        else if (r < 0.95) return 5.00 + Math.random() * 5.00;
        else return 10.00;
    }

    function drawRocket(multiplier) {
        if (!ctx) return;
        const w = canvas.width, h = canvas.height;
        ctx.clearRect(0, 0, w, h);
        ctx.fillStyle = '#030617';
        ctx.fillRect(0, 0, w, h);
        for(let i=0;i<100;i++) {
            ctx.fillStyle = `rgba(255,255,200,${Math.random()*0.5})`;
            ctx.fillRect(Math.random()*w, Math.random()*h, 2, 2);
        }
        const maxMult = Math.min(10, crashPoint * 1.2);
        ctx.beginPath();
        ctx.moveTo(0, h-10);
        for(let x=0; x<=w; x+=5) {
            let t = x / w;
            let mult = 1 + t * (maxMult-1);
            let y = h - 20 - (mult / maxMult) * (h-40);
            ctx.lineTo(x, y);
        }
        ctx.strokeStyle = '#ffaa44';
        ctx.lineWidth = 3;
        ctx.stroke();
        let rocketX = (multiplier-1) / (maxMult-1) * w;
        rocketX = Math.min(w-40, Math.max(20, rocketX));
        let rocketY = h - 25 - (multiplier / maxMult) * (h-50);
        ctx.fillStyle = '#f57c00';
        ctx.beginPath();
        ctx.moveTo(rocketX, rocketY-12);
        ctx.lineTo(rocketX+12, rocketY);
        ctx.lineTo(rocketX, rocketY+12);
        ctx.lineTo(rocketX-12, rocketY);
        ctx.fill();
        ctx.fillStyle = '#ffd966';
        ctx.beginPath();
        ctx.arc(rocketX, rocketY, 6, 0, 2*Math.PI);
        ctx.fill();
        ctx.fillStyle = '#ff3300';
        ctx.beginPath();
        ctx.moveTo(rocketX-6, rocketY);
        ctx.lineTo(rocketX-18, rocketY-6);
        ctx.lineTo(rocketX-18, rocketY+6);
        ctx.fill();
    }

    function addToHistory(crashValue) {
        const item = document.createElement('div');
        item.className = 'history-item';
        item.innerText = crashValue.toFixed(2) + 'x';
        historyList.prepend(item);
        if (historyList.children.length > 12) historyList.removeChild(historyList.lastChild);
    }

    function sendToBot(action, data) {
        if (!tg || !tg.sendData) {
            console.warn("Telegram WebApp not ready");
            return;
        }
        const payload = JSON.stringify({ action: action, ...data });
        tg.sendData(payload);
        console.log("Sent to bot:", payload);
    }

    function endGame(isCrash, finalMultiplier = null) {
        if (animationInterval) clearInterval(animationInterval);
        animationInterval = null;
        if (isCrash) {
            statusSpan.innerText = `💥 КРАШ! Множитель достиг ${crashPoint.toFixed(2)}x. Вы проиграли ${currentBet}₽`;
            addToHistory(crashPoint);
        } else {
            const winAmount = Math.floor(currentBet * finalMultiplier);
            sendToBot("crash_cashout", { multiplier: finalMultiplier });
            statusSpan.innerText = `🎉 ВЫ ЗАБРАЛИ! x${finalMultiplier.toFixed(2)} → +${winAmount}₽`;
            addToHistory(finalMultiplier);
        }
        hasBet = false;
        hasCashedOut = false;
        betBtn.disabled = false;
        cashoutBtn.disabled = true;
        betAmountInput.disabled = false;
    }

    function startAnimation() {
        if (animationInterval) clearInterval(animationInterval);
        currentMultiplier = 1.0;
        multiplierDisplay.innerText = currentMultiplier.toFixed(2) + "x";
        drawRocket(currentMultiplier);
        animationInterval = setInterval(() => {
            if (!hasBet || hasCashedOut) return;
            currentMultiplier += 0.025;
            multiplierDisplay.innerText = currentMultiplier.toFixed(2) + "x";
            drawRocket(currentMultiplier);
            if (currentMultiplier >= crashPoint) {
                clearInterval(animationInterval);
                animationInterval = null;
                hasCashedOut = true;
                endGame(true);
            }
        }, 40);
    }

    betBtn.onclick = () => {
        if (hasBet) {
            statusSpan.innerText = "⚠️ Уже есть активная ставка!";
            return;
        }
        let amount = parseInt(betAmountInput.value);
        if (isNaN(amount)) amount = 100;
        amount = Math.min(5000, Math.max(10, amount));
        betAmountInput.value = amount;
        currentBet = amount;

        crashPoint = generateCrashPoint();
        sendToBot("crash_bet", { amount: amount });

        hasBet = true;
        hasCashedOut = false;
        betBtn.disabled = true;
        cashoutBtn.disabled = false;
        betAmountInput.disabled = true;
        statusSpan.innerText = `🚀 Ставка ${amount}₽ принята! Множитель растёт...`;
        startAnimation();
    };

    cashoutBtn.onclick = () => {
        if (!hasBet || hasCashedOut) return;
        if (currentMultiplier >= crashPoint) {
            statusSpan.innerText = "❌ Уже краш, нельзя забрать!";
            return;
        }
        hasCashedOut = true;
        cashoutBtn.disabled = true;
        clearInterval(animationInterval);
        animationInterval = null;
        endGame(false, currentMultiplier);
    };
</script>
</body>
</html>
