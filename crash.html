<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>R-Game CRASH</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1122 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            padding: 16px;
        }

        /* Фоновая надпись R-Game */
        body::before {
            content: "R-GAME";
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 70px;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.03);
            pointer-events: none;
            z-index: 0;
            font-family: 'Arial Black', sans-serif;
            letter-spacing: 5px;
        }

        .game-container {
            max-width: 500px;
            width: 100%;
            background: rgba(18, 25, 45, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.4), inset 0 1px 1px rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            position: relative;
            z-index: 2;
        }

        /* баланс */
        .balance-panel {
            background: #0b0f1c;
            border-radius: 60px;
            padding: 8px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3), 0 2px 4px rgba(0,0,0,0.2);
        }
        .balance-label {
            color: #8e9ab0;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 1px;
        }
        .balance-value {
            color: #f5b042;
            font-size: 24px;
            font-weight: 800;
            text-shadow: 0 0 6px #f5b04266;
        }
        .balance-value span {
            font-size: 14px;
            font-weight: 400;
            color: #aaa;
        }

        /* ракетная зона */
        .rocket-area {
            background: #030617;
            border-radius: 40px;
            padding: 30px 20px 20px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            border: 1px solid #2a3455;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.5), 0 8px 20px rgba(0,0,0,0.3);
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: radial-gradient(ellipse at 30% 40%, #111a2e, #020513);
            border-radius: 28px;
            cursor: pointer;
        }

        .multiplier-badge {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 8px 24px;
            border-radius: 60px;
            font-size: 32px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 12px #f0b35e;
            letter-spacing: 2px;
            border: 1px solid rgba(255,180,70,0.5);
            z-index: 5;
        }
        .multiplier-badge span {
            font-size: 20px;
            color: #f5b042;
        }

        /* ставка */
        .bet-area {
            background: #0f1424;
            border-radius: 36px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .bet-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            color: #b9c3dd;
            font-size: 14px;
        }
        .bet-input-wrapper {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .bet-input {
            flex: 1;
            background: #01010c;
            border: 1px solid #2a3455;
            border-radius: 40px;
            padding: 14px 20px;
            color: white;
            font-size: 20px;
            font-weight: 600;
            text-align: center;
            outline: none;
        }
        .bet-input:focus {
            border-color: #f5b042;
            box-shadow: 0 0 8px #f5b042;
        }
        .action-buttons {
            display: flex;
            gap: 12px;
        }
        button {
            background: #1e2a44;
            border: none;
            border-radius: 60px;
            padding: 12px 24px;
            font-weight: 700;
            font-size: 18px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            flex: 1;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        button:active { transform: scale(0.96); }
        .btn-bet {
            background: linear-gradient(95deg, #f0b35e, #f57c00);
            color: #1f1f1f;
            font-weight: 800;
            text-shadow: 0 1px 0 #ffd58c;
        }
        .btn-cashout {
            background: linear-gradient(95deg, #2dd4bf, #14b8a6);
            color: #ffffff;
            font-weight: 800;
            letter-spacing: 1px;
        }
        .btn-cashout:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }

        /* история крашей */
        .history {
            background: #0a0f1cbb;
            border-radius: 28px;
            padding: 14px;
            margin-top: 8px;
        }
        .history-title {
            font-size: 12px;
            color: #8e9ab0;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .history-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .history-item {
            background: #1a1f30;
            padding: 6px 14px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 16px;
            font-family: monospace;
            color: #ffb347;
            box-shadow: inset 0 1px 2px #2a3455, 0 1px 0 #00000033;
        }

        .status {
            text-align: center;
            font-size: 12px;
            margin-top: 12px;
            color: #ffbf69;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="balance-panel">
        <div class="balance-label">БАЛАНС</div>
        <div class="balance-value" id="balance">0 <span>₽</span></div>
    </div>

    <div class="rocket-area">
        <div class="multiplier-badge" id="multiplierDisplay">1.00<span>x</span></div>
        <canvas id="crashCanvas" width="600" height="300" style="width:100%; height:auto; max-width:600px; aspect-ratio:600/300"></canvas>
    </div>

    <div class="bet-area">
        <div class="bet-label">
            <span>💎 СУММА СТАВКИ</span>
            <span id="minMaxLabel">от 10 до 5000₽</span>
        </div>
        <div class="bet-input-wrapper">
            <input type="number" id="betAmount" class="bet-input" placeholder="1000" value="100" step="10">
            <div class="action-buttons">
                <button id="betButton" class="btn-bet">🚀 СТАВКА</button>
                <button id="cashoutButton" class="btn-cashout" disabled>💎 ЗАБРАТЬ</button>
            </div>
        </div>
    </div>

    <div class="history">
        <div class="history-title">📋 ИСТОРИЯ КРАШЕЙ</div>
        <div class="history-list" id="historyList">—</div>
    </div>
    <div class="status" id="statusMsg">⚡ Ожидание раунда...</div>
</div>

<script src="https://telegram.org/js/telegram-web-app.js?56"></script>
<script>
    // ---------- НАСТРОЙКИ ----------
    const BOT_WEBHOOK = ''; // не требуется, используем Telegram.WebApp
    let tg = window.Telegram.WebApp;
    tg.expand();
    tg.enableClosingConfirmation();

    let balance = 0;
    let currentBet = 0;
    let hasBet = false;
    let hasCashedOut = false;
    let roundActive = false;
    let currentMultiplier = 1.0;

    let crashPoint = 0;         // будет приходить с сервера
    let roundStartTime = 0;
    let intervalId = null;

    // элементы
    const balanceSpan = document.getElementById('balance');
    const betAmountInput = document.getElementById('betAmount');
    const betBtn = document.getElementById('betButton');
    const cashoutBtn = document.getElementById('cashoutButton');
    const multiplierDisplay = document.getElementById('multiplierDisplay');
    const historyList = document.getElementById('historyList');
    const statusSpan = document.getElementById('statusMsg');

    // canvas анимация ракеты
    const canvas = document.getElementById('crashCanvas');
    const ctx = canvas.getContext('2d');
    let animationFrame = null;

    // ---------- ВСПОМОГАТЕЛЬНЫЕ ----------
    function formatNumber(num) {
        return num.toLocaleString('ru-RU');
    }

    function updateBalanceUI() {
        balanceSpan.innerText = formatNumber(Math.floor(balance));
    }

    function addToHistory(crashValue) {
        const item = document.createElement('div');
        item.className = 'history-item';
        item.innerText = crashValue.toFixed(2) + 'x';
        historyList.prepend(item);
        if (historyList.children.length > 12) historyList.removeChild(historyList.lastChild);
    }

    // отрисовка ракеты и графика (простая, но стильная)
    function drawRocket(multiplier) {
        if (!ctx) return;
        const w = canvas.width, h = canvas.height;
        ctx.clearRect(0, 0, w, h);
        // фон - звёзды
        ctx.fillStyle = '#030617';
        ctx.fillRect(0, 0, w, h);
        for(let i=0;i<100;i++) {
            if(i%2 === 0) continue;
            ctx.fillStyle = `rgba(255,255,200,${Math.random()*0.5})`;
            ctx.fillRect(Math.random()*w, Math.random()*h, 2, 2);
        }
        // линия графика (экспонента)
        const maxMult = Math.min(10, multiplier * 1.2);
        ctx.beginPath();
        ctx.moveTo(0, h-10);
        for(let x=0; x<=w; x+=5) {
            let t = x / w; // 0..1
            let mult = 1 + t * (maxMult-1);
            let y = h - 20 - (mult / maxMult) * (h-40);
            ctx.lineTo(x, y);
        }
        ctx.strokeStyle = '#ffaa44';
        ctx.lineWidth = 3;
        ctx.stroke();

        // ракета
        let rocketX = (multiplier-1) / (maxMult-1) * w;
        rocketX = Math.min(w-40, Math.max(20, rocketX));
        let rocketY = h - 25 - (multiplier / maxMult) * (h-50);
        ctx.fillStyle = '#f57c00';
        ctx.beginPath();
        ctx.moveTo(rocketX, rocketY-12);
        ctx.lineTo(rocketX+12, rocketY);
        ctx.lineTo(rocketX, rocketY+12);
        ctx.lineTo(rocketX-12, rocketY);
        ctx.fill();
        ctx.fillStyle = '#ffd966';
        ctx.beginPath();
        ctx.arc(rocketX, rocketY, 6, 0, 2*Math.PI);
        ctx.fill();
        // огонь
        ctx.fillStyle = '#ff3300';
        ctx.beginPath();
        ctx.moveTo(rocketX-6, rocketY);
        ctx.lineTo(rocketX-18, rocketY-6);
        ctx.lineTo(rocketX-18, rocketY+6);
        ctx.fill();
    }

    // запрос состояния с сервера (бота)
    async function fetchState() {
        try {
            const response = await fetch(`/crash_state`);  // условный эндпоинт, реально будем использовать sendData
            // но т.к. у нас нет сервера, используем прямой обмен с ботом через WebApp.sendData
            // сделаем через отправку команды "crash_state" и получение ответа через onEvent
        } catch(e) {}
    }

    // Отправка данных в бот (используем стандартный метод Telegram)
    function sendToBot(action, data) {
        tg.sendData(JSON.stringify({ action, ...data }));
    }

    // Обработка сообщений от бота
    tg.onEvent('mainButtonClicked', () => {});
    tg.onEvent('popupClosed', () => {});

    // Получение данных от бота происходит через глобальную функцию, которую бот вызывает при отправке сообщения
    window.handleBotResponse = function(response) {
        const data = typeof response === 'string' ? JSON.parse(response) : response;
        if (data.type === 'balance') {
            balance = data.balance;
            updateBalanceUI();
        }
        else if (data.type === 'crash_state') {
            // обновляем состояние раунда
            crashPoint = data.crashPoint;
            roundStartTime = data.startTime;
            roundActive = data.active;
            currentMultiplier = data.currentMultiplier || 1.0;
            multiplierDisplay.innerText = currentMultiplier.toFixed(2);
            drawRocket(currentMultiplier);
            if (!roundActive && hasBet && !hasCashedOut) {
                // проигрыш
                hasBet = false;
                hasCashedOut = false;
                currentBet = 0;
                betBtn.disabled = false;
                cashoutBtn.disabled = true;
                statusSpan.innerText = '❌ КРАШ! Ставка сгорела.';
                setTimeout(() => statusSpan.innerText = '⚡ Новый раунд скоро', 2000);
            }
            if (roundActive && hasBet && !hasCashedOut && currentMultiplier >= crashPoint) {
                // авто-краш
                hasBet = false;
                hasCashedOut = false;
                currentBet = 0;
                betBtn.disabled = false;
                cashoutBtn.disabled = true;
                statusSpan.innerText = '💥 КРАШ! Вы не успели забрать.';
            }
        }
        else if (data.type === 'bet_result') {
            if (data.success) {
                hasBet = true;
                hasCashedOut = false;
                currentBet = data.bet;
                betBtn.disabled = true;
                cashoutBtn.disabled = false;
                statusSpan.innerText = `✅ Ставка ${currentBet}₽ принята. Ждите полёт!`;
                // обновить баланс
                balance = data.balance;
                updateBalanceUI();
            } else {
                statusSpan.innerText = `❌ ${data.message}`;
            }
        }
        else if (data.type === 'cashout_result') {
            if (data.success) {
                hasBet = false;
                hasCashedOut = true;
                const win = data.winAmount;
                betBtn.disabled = false;
                cashoutBtn.disabled = true;
                statusSpan.innerText = `💰 ЗАБРАЛИ ${win}₽ (x${data.multiplier})`;
                balance = data.balance;
                updateBalanceUI();
            } else {
                statusSpan.innerText = `❌ ${data.message}`;
            }
        }
        else if (data.type === 'history_update') {
            historyList.innerHTML = '';
            data.history.forEach(v => addToHistory(v));
        }
        else if (data.type === 'round_start') {
            roundActive = true;
            crashPoint = data.crashPoint;
            roundStartTime = Date.now() / 1000;
            statusSpan.innerText = '🚀 РАУНД НАЧАЛСЯ! Следите за множителем';
            multiplierDisplay.innerText = '1.00';
            currentMultiplier = 1.0;
            drawRocket(1);
            if(hasBet && !hasCashedOut) cashoutBtn.disabled = false;
        }
        else if (data.type === 'round_end') {
            roundActive = false;
            if (hasBet && !hasCashedOut) {
                // проигрыш
                hasBet = false;
                currentBet = 0;
                betBtn.disabled = false;
                cashoutBtn.disabled = true;
            }
            addToHistory(data.crashPoint);
            statusSpan.innerText = `💥 КРАШ на x${data.crashPoint.toFixed(2)}! Сделайте новую ставку.`;
        }
    };

    // периодический опрос состояния (каждые 0.3 сек)
    setInterval(() => {
        if (tg.initDataUnsafe?.user) {
            sendToBot('get_crash_state', {});
        }
    }, 300);

    // кнопки
    betBtn.onclick = () => {
        let amount = parseInt(betAmountInput.value);
        if (isNaN(amount)) amount = 100;
        if (amount < 10) amount = 10;
        if (amount > 5000) amount = 5000;
        betAmountInput.value = amount;
        sendToBot('make_bet', { amount });
    };

    cashoutBtn.onclick = () => {
        if (hasBet && roundActive && !hasCashedOut) {
            sendToBot('cashout', {});
        }
    };

    // первичная загрузка баланса
    sendToBot('get_balance', {});
    sendToBot('get_crash_state', {});

    // анимация ракеты (будет вызываться при обновлении множителя)
    function animate() {
        if (roundActive && !hasCashedOut && hasBet) {
            // здесь можно плавно увеличивать множитель от сервера, но сервер отдаёт текущий – достаточно перерисовки при каждом обновлении
        }
        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
