<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>⚡ CRASH | R-GAME</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,600;0,800;1,800&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #05080d;
            --container-bg: #0d121a;
            --panel-bg: #151d29;
            --accent-blue: #1882ff;
            --accent-blue-hover: #3b95ff;
            --accent-green: #1bd15d;
            --accent-green-hover: #15b04c;
            --accent-red: #f03043;
            --accent-orange: #ff9800;
            --text-main: #e2e8f0;
            --text-muted: #8c9eb5;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            display: flex; justify-content: center;
        }

        .game-container {
            width: 100%; max-width: 800px;
            min-height: 100vh;
            background-color: var(--container-bg);
            display: flex; flex-direction: column;
            padding: 10px 10px calc(20px + var(--tg-viewport-safe-area-inset-bottom, 0px)) 10px;
        }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 5px; margin-bottom: 10px; flex-shrink: 0;
        }
        .brand { font-weight: 800; font-size: 22px; text-transform: uppercase; letter-spacing: -0.5px; font-style: italic; }
        .brand span { color: var(--accent-blue); }
        .header-actions { display: flex; gap: 8px; align-items: center; }
        .info-card {
            background: var(--panel-bg); padding: 8px 14px; border-radius: 12px;
            font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .menu-btn {
            background: var(--panel-bg); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; padding: 8px 16px; font-weight: 700;
            font-size: 14px; color: var(--text-main); cursor: pointer;
            transition: all 0.2s; font-family: 'Montserrat', sans-serif;
        }
        .menu-btn:active { transform: scale(0.95); background: var(--accent-blue); }

        .rocket-area {
            position: relative; overflow: hidden;
            border-radius: 16px; margin-bottom: 10px;
            background: #020407; height: 320px; flex-shrink: 0;
            border: 2px solid rgba(140, 158, 181, 0.15);
            box-shadow: inset 0 0 40px rgba(0,0,0,0.9);
        }
        #crashCanvas { width: 100%; height: 100%; display: block; }
        
        .center-display {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 10; width: 100%; pointer-events: none;
        }
        .multiplier-badge {
            font-size: 56px; font-weight: 800; font-style: italic;
            text-shadow: 0 0 30px rgba(255,255,255,0.3), 0 4px 20px rgba(0,0,0,0.9);
            transition: color 0.1s ease; margin-bottom: 5px;
        }
        .status-badge {
            font-size: 14px; font-weight: 700; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 2px;
            background: rgba(0,0,0,0.6); padding: 6px 16px; border-radius: 30px;
            display: inline-block; backdrop-filter: blur(6px);
        }

        .history-list {
            display: flex; gap: 6px; overflow-x: auto; padding-bottom: 5px; margin-bottom: 10px;
            scrollbar-width: none; flex-shrink: 0;
        }
        .history-list::-webkit-scrollbar { display: none; }
        .history-item {
            font-size: 13px; font-weight: 800; padding: 6px 14px; border-radius: 8px;
            font-family: 'Nunito', sans-serif; font-style: italic; flex-shrink: 0;
        }
        .history-item.low { color: #f03043; background: rgba(240, 48, 67, 0.1); border: 1px solid rgba(240, 48, 67, 0.2); }
        .history-item.medium { color: #3b95ff; background: rgba(59, 149, 255, 0.1); border: 1px solid rgba(59, 149, 255, 0.2); }
        .history-item.high { color: #ff9800; background: rgba(255, 152, 0, 0.1); border: 1px solid rgba(255, 152, 0, 0.2); }
        .history-item.epic { color: #1bd15d; background: rgba(27, 209, 93, 0.15); border: 1px solid rgba(27, 209, 93, 0.4); box-shadow: 0 0 12px rgba(27, 209, 93, 0.3); }

        .controls-area {
            background: var(--panel-bg); padding: 15px; border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.02); margin-bottom: 15px; flex-shrink: 0;
        }
        .inputs-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            align-items: flex-end;
        }
        .input-group { flex: 1; display: flex; flex-direction: column; gap: 5px; }
        .input-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        
        .styled-input-wrapper { position: relative; }
        .styled-input {
            width: 100%; padding: 16px; padding-left: 35px;
            background: var(--container-bg); border: 2px solid #263345; border-radius: 12px;
            color: #fff; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 18px;
            transition: border-color 0.2s; appearance: none;
        }
        .styled-input:focus { outline: none; border-color: var(--accent-blue); box-shadow: 0 0 20px rgba(24,130,255,0.15); }
        .styled-input-wrapper::before {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            color: var(--text-muted); font-weight: 800; font-size: 18px;
        }
        .wrapper-rub::before { content: '₽'; }
        .wrapper-x::before { content: 'x'; }

        /* Чекбокс авто-вывода */
        .auto-checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 4px 4px 0;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            padding: 6px 12px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .auto-checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--accent-blue);
            cursor: pointer;
            filter: drop-shadow(0 0 6px rgba(24,130,255,0.3));
        }
        .auto-checkbox-group label {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            user-select: none;
        }

        .action-btn {
            width: 100%; padding: 18px 12px; border: none; border-radius: 14px;
            font-weight: 800; font-size: 18px; text-transform: uppercase; cursor: pointer;
            transition: all 0.1s ease; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center; gap: 12px;
            font-family: 'Montserrat', sans-serif;
            position: relative;
            overflow: hidden;
        }
        .action-btn::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 60%);
            pointer-events: none;
        }
        .action-btn:active { transform: translateY(2px); }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .btn-bet { background: var(--accent-blue); box-shadow: 0 6px 0 #0f5bb8, 0 8px 24px rgba(24, 130, 255, 0.3); }
        .btn-bet:hover:not(:disabled) { background: var(--accent-blue-hover); }
        .btn-cancel { background: var(--accent-red); box-shadow: 0 6px 0 #a8222f, 0 8px 24px rgba(240, 48, 67, 0.3); }
        .btn-cashout {
            background: var(--accent-green);
            box-shadow: 0 6px 0 #139642, 0 8px 24px rgba(27, 209, 93, 0.3);
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            letter-spacing: 0.5px;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }
        .btn-cashout:hover:not(:disabled) { background: var(--accent-green-hover); }
        .btn-icon { font-size: 28px; line-height: 1; }
        .btn-text { display: flex; flex-direction: column; align-items: center; }
        .btn-main {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 0.5px;
            line-height: 1.2;
        }
        .btn-sub {
            font-size: 14px;
            font-weight: 700;
            opacity: 0.9;
            text-transform: none;
            font-family: 'Montserrat', sans-serif;
            letter-spacing: 0.3px;
        }
        .btn-sub .win-amount {
            color: #fff;
            font-weight: 800;
            background: rgba(0,0,0,0.25);
            padding: 0 12px;
            border-radius: 8px;
            font-size: 22px;
        }

        .sound-btn {
            width: 100%; padding: 14px; border: none; border-radius: 14px;
            background: var(--panel-bg);
            border: 1px solid rgba(255,255,255,0.08);
            color: var(--text-muted);
            font-family: 'Montserrat', sans-serif;
            font-weight: 700; font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            margin-top: 12px;
        }
        .sound-btn:active { transform: scale(0.97); background: var(--accent-blue); border-color: var(--accent-blue); color: #fff; }
        .sound-btn .icon { font-size: 22px; }
        .sound-btn .label { text-transform: uppercase; letter-spacing: 0.5px; }
        .sound-btn.muted { opacity: 0.6; }

        .live-bets-section { flex-grow: 1; display: flex; flex-direction: column; background: var(--panel-bg); border-radius: 16px; padding: 15px; border: 1px solid rgba(255,255,255,0.02); }
        .section-title { font-size: 14px; font-weight: 800; color: var(--text-main); margin-bottom: 10px; display: flex; justify-content: space-between; }
        .online-count {
            color: var(--accent-green);
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
        }
        .online-count::before {
            content: '';
            display: block;
            width: 6px; height: 6px;
            background: var(--accent-green);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-green);
            flex-shrink: 0;
        }
        
        .table-container { overflow-y: auto; max-height: 250px; scrollbar-width: thin; scrollbar-color: #263345 transparent; }
        .table-container::-webkit-scrollbar { width: 4px; }
        .table-container::-webkit-scrollbar-thumb { background: #263345; border-radius: 4px; }
        
        .bets-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 13px; font-weight: 600; }
        .bets-table th { color: var(--text-muted); padding-bottom: 10px; position: sticky; top: 0; background: var(--panel-bg); z-index: 2; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid #263345; }
        .bets-table td { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .bets-table tr:last-child td { border-bottom: none; }
        .col-user { width: 35%; color: #fff; }
        .col-bet { width: 25%; font-family: 'Nunito', sans-serif; }
        .col-multi { width: 20%; font-family: 'Nunito', sans-serif; text-align: right; }
        .col-profit { width: 20%; font-family: 'Nunito', sans-serif; text-align: right; font-weight: 800; }
        
        .row-cashed { background: rgba(27, 209, 93, 0.05); }
        .row-cashed .col-multi { color: var(--accent-green); }
        .row-cashed .col-profit { color: var(--accent-green); }
        .row-crashed { opacity: 0.4; }
        .row-crashed .col-multi { color: var(--accent-red); }
        
        .my-bet-row { background: rgba(24, 130, 255, 0.15) !important; border-left: 2px solid var(--accent-blue); }

        .balance-value {
            font-family: 'Montserrat', sans-serif;
            font-size: 15px;
            font-weight: 800;
            color: var(--accent-green);
            text-shadow: 0 0 12px rgba(27, 209, 93, 0.2);
            line-height: 1.2;
            cursor: pointer;
            border-radius: 8px;
            padding: 2px 8px;
            transition: all 0.2s;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 2px;
        }

        @media (max-width: 480px) {
            .sound-btn { padding: 12px; font-size: 14px; }
            .action-btn { padding: 14px 10px; font-size: 16px; }
            .btn-icon { font-size: 22px; }
            .btn-main { font-size: 17px; }
            .btn-sub { font-size: 12px; }
            .inputs-row { flex-wrap: wrap; }
            .auto-checkbox-group { margin-top: 6px; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="header">
        <div class="brand">R-<span>GAME</span></div>
        <div class="header-actions">
            <div class="info-card">Баланс: <span class="balance-value" id="balanceDisplay">0 ₽</span></div>
            <button class="menu-btn" id="menuBtn">МЕНЮ</button>
        </div>
    </div>

    <div class="history-list" id="historyList"></div>

    <div class="rocket-area">
        <div class="center-display">
            <div class="multiplier-badge" id="multiplierDisplay">1.00x</div>
            <div class="status-badge" id="statusMsg">ОЖИДАНИЕ СТАРТА</div>
        </div>
        <canvas id="crashCanvas" width="800" height="400"></canvas>
    </div>

    <div class="controls-area">
        <div class="inputs-row">
            <div class="input-group">
                <div class="input-label">Сумма ставки</div>
                <div class="styled-input-wrapper wrapper-rub">
                    <input type="text" id="betAmount" class="styled-input" inputmode="numeric" value="100">
                </div>
            </div>
            <div class="input-group">
                <div class="input-label">Авто-вывод</div>
                <div class="styled-input-wrapper wrapper-x">
                    <input type="number" id="autoTarget" class="styled-input" step="0.1" min="1.01" max="100" value="2.00">
                </div>
            </div>
            <div class="auto-checkbox-group">
                <input type="checkbox" id="autoEnableCheck" checked>
                <label for="autoEnableCheck">Вкл</label>
            </div>
        </div>

        <button id="actionBtn" class="action-btn btn-bet">
            <span class="btn-icon">🚀</span>
            <span class="btn-text">
                <span class="btn-main" id="actionMain">СДЕЛАТЬ СТАВКУ</span>
                <span class="btn-sub" id="actionSubtext">На следующий раунд</span>
            </span>
        </button>

        <button id="soundBtn" class="sound-btn">
            <span class="icon">🔇</span>
            <span class="label" id="soundLabel">ВКЛЮЧИТЬ ЗВУК</span>
        </button>
    </div>

    <div class="live-bets-section">
        <div class="section-title">
            <span>Все ставки</span>
            <span class="online-count" id="onlineCount">142 онлайн</span>
        </div>
        <div class="table-container">
            <table class="bets-table">
                <thead>
                    <tr>
                        <th class="col-user">Игрок</th>
                        <th class="col-bet">Ставка</th>
                        <th class="col-multi">Коэфф.</th>
                        <th class="col-profit">Выплата</th>
                    </tr>
                </thead>
                <tbody id="betsBody"></tbody>
            </table>
        </div>
    </div>
</div>

<audio id="bgMusic" loop preload="auto">
    <source src="Evgeny_Bardyuzha_-_Ant_77516793.mp3" type="audio/mpeg">
    Ваш браузер не поддерживает аудио.
</audio>

<script>
(function(){
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    if (tg.HapticFeedback) tg.enableClosingConfirmation();

    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('userId') || '';

    // DOM
    const balanceSpan = document.getElementById('balanceDisplay');
    const multiplierDisplay = document.getElementById('multiplierDisplay');
    const statusMsg = document.getElementById('statusMsg');
    const historyList = document.getElementById('historyList');
    const betInput = document.getElementById('betAmount');
    const autoInput = document.getElementById('autoTarget');
    const autoEnableCheck = document.getElementById('autoEnableCheck');
    const actionBtn = document.getElementById('actionBtn');
    const actionMain = document.getElementById('actionMain');
    const actionSubtext = document.getElementById('actionSubtext');
    const betsBody = document.getElementById('betsBody');
    const onlineCount = document.getElementById('onlineCount');
    const menuBtn = document.getElementById('menuBtn');
    const canvas = document.getElementById('crashCanvas');
    const ctx = canvas.getContext('2d');
    const soundBtn = document.getElementById('soundBtn');
    const soundLabel = document.getElementById('soundLabel');
    const soundIcon = soundBtn.querySelector('.icon');
    const bgAudio = document.getElementById('bgMusic');

    // === ФОРМАТИРОВАНИЕ СТАВКИ ===
    function formatNumber(num) {
        return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
    }

    function parseNumber(str) {
        return parseInt(str.replace(/\./g, '')) || 0;
    }

    betInput.addEventListener('input', function(e) {
        let raw = this.value.replace(/\./g, '');
        let num = parseInt(raw) || 0;
        if (num < 0) num = 0;
        if (num > 1000000) num = 1000000;
        this.value = formatNumber(num);
        this.dataset.value = num;
    });

    betInput.addEventListener('blur', function() {
        let num = parseInt(this.dataset.value) || 0;
        if (num < 10) num = 10;
        if (num > 50000) num = 50000;
        this.value = formatNumber(num);
        this.dataset.value = num;
    });

    betInput.dataset.value = 100;
    betInput.value = formatNumber(100);

    function getBetValue() {
        return parseInt(betInput.dataset.value) || 100;
    }

    // === БАЛАНС (синхронизация с ботом) ===
    let casinoBalance = 0;

    function updateBalanceDisplay(newBalance) {
        casinoBalance = newBalance;
        localStorage.setItem('casinoBalance', String(casinoBalance));
        balanceSpan.innerText = casinoBalance.toLocaleString() + ' ₽';
    }

    function requestBalance() {
        tg.sendData(JSON.stringify({ action: 'get_balance' }));
    }

    // === ОБРАБОТЧИК ОТВЕТОВ ОТ БОТА ===
    tg.onEvent('web_app_data', function(data) {
        try {
            const response = JSON.parse(data);
            console.log('📩 Ответ от бота:', response);

            if (response.error) {
                console.error('Ошибка от бота:', response.error);
                return;
            }

            // Обновление баланса
            if (response.balance !== undefined) {
                updateBalanceDisplay(response.balance);
                return;
            }

            // Результат ставки (краш)
            if (response.action === 'crash_result' || response.action === 'crash_cashout') {
                if (response.new_balance !== undefined) {
                    updateBalanceDisplay(response.new_balance);
                }
                if (response.message) {
                    statusMsg.innerText = response.message;
                }
                // Перезапрос баланса для синхронизации
                setTimeout(requestBalance, 100);
                return;
            }

            // Профиль и другие – игнорируем
        } catch (e) {
            console.error('❌ Ошибка обработки ответа:', e);
        }
    });

    // === ИСТОРИЯ ===
    let history = JSON.parse(localStorage.getItem('crash_history')) || [1.2, 4.5, 1.05, 2.3, 15.0];
    function renderHistory() {
        historyList.innerHTML = '';
        history.slice(0, 15).forEach(val => {
            const el = document.createElement('div');
            el.className = 'history-item';
            el.innerText = val.toFixed(2) + 'x';
            if (val < 1.5) el.classList.add('low');
            else if (val < 3.0) el.classList.add('medium');
            else if (val < 10.0) el.classList.add('high');
            else el.classList.add('epic');
            historyList.appendChild(el);
        });
    }
    function addHistory(val) {
        history.unshift(val);
        if (history.length > 20) history.pop();
        localStorage.setItem('crash_history', JSON.stringify(history));
        renderHistory();
    }
    renderHistory();

    // === БОТЫ (ЧАСТИЧНОЕ ОБНОВЛЕНИЕ) ===
    const prefixes = ['Alex', 'Crypto', 'Lucky', 'Pro', 'Max', 'Ivan', 'Shadow', 'Luna', 'Star', 'Sniper', 'Rich', 'Whale', 'Noob', 'Trader', 'Kira', 'Viper', 'Phoenix', 'Rocket', 'Nebula', 'Cosmos', 'Omega', 'Zen', 'Vortex', 'Fury', 'Blaze', 'Storm', 'Ghost', 'Titan', 'Apex', 'Nova', 'Eclipse', 'Falcon', 'Hawk', 'Wolf', 'Panther', 'Dragon', 'Knight', 'Wizard', 'Ranger', 'Guardian'];
    const suffixes = ['_99', '_King', '_Lord', '_Pro', '_X', '_Z', '_7', '_42', '_1337', '_Hero', '_God', '_Star', '_Fire', '_Ice', '_Thunder'];

    function generateBotName() {
        const p = prefixes[Math.floor(Math.random() * prefixes.length)];
        const s = suffixes[Math.floor(Math.random() * suffixes.length)];
        return p + s + (Math.random() > 0.3 ? '' : '') + (Math.random() > 0.7 ? Math.floor(Math.random()*100) : '');
    }

    let bots = [];
    let currentOnline = 142;
    let targetOnline = 142;
    let onlineSpeed = 0.2;

    function generateInitialBots(count) {
        const newBots = [];
        for(let i=0; i<count; i++) {
            const betOptions = [50, 75, 100, 150, 200, 250, 300, 400, 500, 700, 1000, 1500, 2000, 3000, 5000, 10000];
            const bet = betOptions[Math.floor(Math.random() * betOptions.length)];
            let target;
            const r = Math.random();
            if(r < 0.3) target = 1.05 + Math.random() * 0.3;
            else if(r < 0.6) target = 1.4 + Math.random() * 0.8;
            else if(r < 0.85) target = 2.2 + Math.random() * 3.0;
            else if(r < 0.97) target = 5.0 + Math.random() * 8.0;
            else target = 15.0 + Math.random() * 40.0;
            newBots.push({
                id: 'bot_' + i,
                name: generateBotName(),
                bet: bet,
                target: target,
                cashed: false,
                crashed: false
            });
        }
        newBots.sort((a,b) => b.bet - a.bet);
        return newBots;
    }

    bots = generateInitialBots(15);

    function updateBotsPartially() {
        const removeCount = Math.floor(Math.random() * 3) + 1;
        for (let i = 0; i < removeCount && bots.length > 3; i++) {
            const idx = Math.floor(Math.random() * bots.length);
            bots.splice(idx, 1);
        }
        const addCount = Math.floor(Math.random() * 4) + 2;
        const newBots = [];
        for (let i = 0; i < addCount; i++) {
            const betOptions = [50, 75, 100, 150, 200, 250, 300, 400, 500, 700, 1000, 1500, 2000, 3000, 5000, 10000];
            const bet = betOptions[Math.floor(Math.random() * betOptions.length)];
            let target;
            const r = Math.random();
            if(r < 0.3) target = 1.05 + Math.random() * 0.3;
            else if(r < 0.6) target = 1.4 + Math.random() * 0.8;
            else if(r < 0.85) target = 2.2 + Math.random() * 3.0;
            else if(r < 0.97) target = 5.0 + Math.random() * 8.0;
            else target = 15.0 + Math.random() * 40.0;
            newBots.push({
                id: 'bot_' + Date.now() + i,
                name: generateBotName(),
                bet: bet,
                target: target,
                cashed: false,
                crashed: false
            });
        }
        bots = bots.concat(newBots);
        bots.sort((a,b) => b.bet - a.bet);
        targetOnline = bots.length + Math.floor(Math.random() * 150) + 50;
    }

    function updateOnlineSmoothly() {
        if (currentOnline !== targetOnline) {
            let diff = targetOnline - currentOnline;
            let step = Math.sign(diff) * onlineSpeed * 0.02;
            if (Math.abs(step) > Math.abs(diff)) {
                currentOnline = targetOnline;
            } else {
                currentOnline += step;
            }
            currentOnline += (Math.random() - 0.5) * 0.3 * 0.02;
            currentOnline = Math.max(10, currentOnline);
        } else {
            currentOnline += (Math.random() - 0.5) * 0.2 * 0.02;
            currentOnline = Math.max(10, currentOnline);
        }
        onlineCount.innerText = Math.round(currentOnline) + ' онлайн';
    }

    function renderBetsTable() {
        betsBody.innerHTML = '';
        if (userBetQueued || userBetActive) {
            let statusHtml = '<td class="col-multi">—</td><td class="col-profit">—</td>';
            let trClass = 'my-bet-row';
            if (userBetActive && !userBetQueued) {
                const win = Math.floor(userBetAmount * currentMulti);
                statusHtml = `<td class="col-multi">${currentMulti.toFixed(2)}x</td><td class="col-profit">${win}₽</td>`;
            }
            betsBody.innerHTML += `
                <tr class="${trClass}">
                    <td class="col-user">👤 Вы</td>
                    <td class="col-bet">${userBetAmount}₽</td>
                    ${statusHtml}
                </tr>
            `;
        }
        const shownBots = bots.slice(0, 10);
        shownBots.forEach(bot => {
            let statusHtml = '<td class="col-multi">—</td><td class="col-profit">—</td>';
            let rowClass = '';
            if (bot.cashed) {
                rowClass = 'row-cashed';
                statusHtml = `<td class="col-multi">${bot.target.toFixed(2)}x</td><td class="col-profit">${(bot.bet * bot.target).toFixed(0)}₽</td>`;
            } else if (bot.crashed) {
                rowClass = 'row-crashed';
                statusHtml = `<td class="col-multi">💥</td><td class="col-profit">-${bot.bet}₽</td>`;
            } else if (gameState === 'FLYING') {
                statusHtml = `<td class="col-multi" style="color:var(--text-muted)">Летит...</td><td class="col-profit" style="color:var(--text-muted)">${(bot.bet * currentMulti).toFixed(0)}₽</td>`;
            }
            betsBody.innerHTML += `
                <tr class="${rowClass}">
                    <td class="col-user">${bot.name}</td>
                    <td class="col-bet">${bot.bet}₽</td>
                    ${statusHtml}
                </tr>
            `;
        });
    }

    // === СОСТОЯНИЕ ИГРЫ ===
    let gameState = 'WAITING'; // WAITING, FLYING, CRASHED
    let countdown = 10.0;
    let currentMulti = 1.0;
    let crashPoint = 1.0;
    
    let userBetQueued = false;
    let userBetActive = false;
    let userBetAmount = 0;
    let userAutoCashout = 2.0;
    let autoEnabled = true;

    // Параметры покачивания ракеты
    let rocketTilt = 0;
    let rocketBob = 0;
    let rocketShakeX = 0;
    let rocketShakeY = 0;

    // === УПРАВЛЕНИЕ КНОПКОЙ И ПОЛЯМИ ===
    function updateControls() {
        // Поля ввода доступны, если нет ожидающей или активной ставки
        const inputsDisabled = userBetQueued || userBetActive;
        betInput.disabled = inputsDisabled;
        autoInput.disabled = inputsDisabled;
        autoEnableCheck.disabled = inputsDisabled;

        if (userBetActive) {
            // Активная ставка – только кнопка "ЗАБРАТЬ" (только в FLYING)
            actionBtn.className = 'action-btn btn-cashout';
            const win = Math.floor(userBetAmount * currentMulti);
            actionMain.textContent = win.toLocaleString() + ' ₽';
            actionSubtext.innerHTML = 'ЗАБРАТЬ';
            actionBtn.disabled = (gameState !== 'FLYING'); // только во время полёта можно забрать
        } else if (userBetQueued) {
            // Ожидающая ставка – кнопка "ОТМЕНИТЬ" только в WAITING
            if (gameState === 'WAITING') {
                actionBtn.className = 'action-btn btn-cancel';
                actionMain.textContent = 'ОТМЕНИТЬ';
                actionSubtext.textContent = `Ставка ${userBetAmount}₽`;
                actionBtn.disabled = false;
            } else {
                // Во время полёта отмена недоступна
                actionBtn.className = 'action-btn btn-bet';
                actionMain.textContent = 'ОЖИДАЙТЕ';
                actionSubtext.textContent = 'Ставка на след. раунд';
                actionBtn.disabled = true;
            }
        } else {
            // Нет ставок – кнопка "СДЕЛАТЬ СТАВКУ" всегда активна (и в WAITING, и в FLYING)
            actionBtn.className = 'action-btn btn-bet';
            actionMain.textContent = 'СДЕЛАТЬ СТАВКУ';
            if (gameState === 'WAITING') {
                actionSubtext.textContent = 'На следующий раунд';
            } else {
                actionSubtext.textContent = 'Будет поставлена после раунда';
            }
            const amt = getBetValue();
            actionBtn.disabled = (casinoBalance < amt || amt < 10);
        }
    }

    actionBtn.onclick = () => {
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        if (userBetActive && gameState === 'FLYING') {
            // Отправляем запрос на вывод
            tg.sendData(JSON.stringify({ 
                action: 'crash_cashout', 
                multiplier: currentMulti 
            }));
            // Ждём ответа от бота (обработчик обновит баланс)
            return;
        }
        if (userBetQueued && gameState === 'WAITING') {
            // Отмена ставки – возврат через бота?
            // Просто снимаем локально и запрашиваем баланс
            userBetQueued = false;
            updateBalance(casinoBalance + userBetAmount); // локальный возврат (потом синхронизируем)
            requestBalance();
            updateControls();
            renderBetsTable();
            return;
        }
        if (!userBetQueued && !userBetActive) {
            // Ставка
            let amt = getBetValue();
            if (isNaN(amt) || amt < 10) return;
            if (amt > casinoBalance) return;
            userBetAmount = amt;
            userAutoCashout = parseFloat(autoInput.value) || 2.0;
            autoEnabled = autoEnableCheck.checked;
            userBetQueued = true;
            // Отправляем запрос на ставку
            tg.sendData(JSON.stringify({ 
                action: 'crash_bet', 
                amount: amt 
            }));
            // Ждём ответа от бота для обновления баланса
            // Локально показываем уменьшение
            updateBalance(casinoBalance - amt);
            updateControls();
            renderBetsTable();
        }
    };

    function cashoutUser() {
        if (!userBetActive) return;
        userBetActive = false;
        let winAmount = Math.floor(userBetAmount * currentMulti);
        // Отправляем запрос на вывод (вместо прямого обновления)
        tg.sendData(JSON.stringify({ 
            action: 'crash_cashout', 
            multiplier: currentMulti 
        }));
        // Ждём ответа от бота
        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        updateControls();
        renderBetsTable();
    }

    function generateCrash() {
        const r = Math.random();
        if (r < 0.05) return 1.00;
        if (r < 0.40) return 1.01 + Math.random() * 0.99;
        if (r < 0.70) return 2.00 + Math.random() * 3.00;
        if (r < 0.90) return 5.00 + Math.random() * 5.00;
        return 10.0 + Math.random() * 40.0;
    }

    let lastTime = performance.now();
    
    function setWaitingPhase() {
        gameState = 'WAITING';
        countdown = 10.0;
        currentMulti = 1.0;
        multiplierDisplay.innerText = countdown.toFixed(1) + 's';
        multiplierDisplay.style.color = 'var(--text-main)';
        statusMsg.innerText = 'Прием ставок';
        statusMsg.style.color = 'var(--text-muted)';
        // Сбрасываем наклон ракеты
        rocketTilt = 0;
        rocketBob = 0;
        rocketShakeX = 0;
        rocketShakeY = 0;
        // Частичное обновление ботов
        updateBotsPartially();
        renderBetsTable();
        updateControls();
        rocketY = 300;
        explosionAlpha = 0;
        particles = [];
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        // Запрашиваем баланс при старте нового раунда
        requestBalance();
    }

    function startFlight() {
        gameState = 'FLYING';
        crashPoint = generateCrash();
        currentMulti = 1.0;
        statusMsg.innerText = 'Ракета в полете';
        statusMsg.style.color = 'var(--accent-blue)';
        if (userBetQueued) {
            userBetActive = true;
            userBetQueued = false;
        }
        updateControls();
    }

    function handleCrash() {
        gameState = 'CRASHED';
        multiplierDisplay.style.color = 'var(--accent-red)';
        statusMsg.innerText = 'ВЗОРВАЛАСЬ НА ' + currentMulti.toFixed(2) + 'x';
        statusMsg.style.color = 'var(--accent-red)';
        if (userBetActive) {
            userBetActive = false;
            // Отправляем результат проигрыша
            tg.sendData(JSON.stringify({ 
                action: 'crash_result', 
                win: false, 
                bet: userBetAmount 
            }));
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
        }
        bots.forEach(b => { if (!b.cashed) b.crashed = true; });
        addHistory(currentMulti);
        triggerExplosion();
        updateControls();
        renderBetsTable();
        setTimeout(setWaitingPhase, 3000);
    }

    function gameLoop(now) {
        let dt = Math.min((now - lastTime) / 1000, 0.05);
        lastTime = now;

        updateOnlineSmoothly();

        if (gameState === 'WAITING') {
            countdown -= dt;
            multiplierDisplay.innerText = Math.max(0, countdown).toFixed(1) + 's';
            if (countdown <= 0) startFlight();
        } 
        else if (gameState === 'FLYING') {
            let increment = dt * (0.1 + (currentMulti - 1) * 0.15);
            currentMulti += increment;
            let tableNeedsUpdate = false;
            bots.forEach(b => {
                if (!b.cashed && !b.crashed && currentMulti >= b.target) {
                    b.cashed = true;
                    tableNeedsUpdate = true;
                }
            });
            if (autoEnabled && userBetActive && currentMulti >= userAutoCashout) {
                cashoutUser();
                tableNeedsUpdate = true;
            }
            multiplierDisplay.innerText = currentMulti.toFixed(2) + 'x';
            if (currentMulti < 2) multiplierDisplay.style.color = '#fff';
            else if (currentMulti < 5) multiplierDisplay.style.color = 'var(--accent-blue)';
            else if (currentMulti < 10) multiplierDisplay.style.color = 'var(--accent-orange)';
            else multiplierDisplay.style.color = 'var(--accent-green)';
            if (tableNeedsUpdate) renderBetsTable();
            updateControls(); // обновляем кнопку (сумма выигрыша)
            if (currentMulti >= crashPoint) {
                currentMulti = crashPoint;
                multiplierDisplay.innerText = currentMulti.toFixed(2) + 'x';
                handleCrash();
            }

            // Обновляем покачивание ракеты
            rocketTilt = Math.sin(now / 300) * 0.08 + (Math.random() - 0.5) * 0.02;
            rocketBob = Math.sin(now / 400) * 8 + (Math.random() - 0.5) * 3;
            rocketShakeX = (Math.random() - 0.5) * 2;
            rocketShakeY = (Math.random() - 0.5) * 2;
        }
        drawFrame(dt);
        requestAnimationFrame(gameLoop);
    }

    // ===== ГРАФИКА (НОВАЯ РАКЕТА) =====
    let stars = Array.from({length: 120}, () => ({
        x: Math.random() * 800, y: Math.random() * 400,
        s: Math.random() * 2 + 0.5, spd: Math.random() * 2 + 0.5
    }));
    let particles = [];
    let rocketY = 300;
    let explosionAlpha = 0;
    let bgOffset = 0;

    function triggerExplosion() {
        explosionAlpha = 1.0;
        for(let i=0; i<300; i++) {
            let a = Math.random() * Math.PI * 2;
            let v = Math.random() * 40 + 20;
            let size = Math.random() * 30 + 5;
            let colors = ['#f03043', '#ff9800', '#ffeb3b', '#ff5722', '#ff6f00', '#ff4d4d', '#ffaa00', '#ffcc00'];
            particles.push({
                x: canvas.width/2, y: rocketY,
                vx: Math.cos(a)*v, vy: Math.sin(a)*v - 5,
                life: 1.0, color: colors[Math.floor(Math.random()*colors.length)],
                size: size, decay: 0.005 + Math.random() * 0.015
            });
        }
        for(let i=0; i<150; i++) {
            let a = Math.random() * Math.PI * 2;
            let v = Math.random() * 70 + 30;
            particles.push({
                x: canvas.width/2, y: rocketY,
                vx: Math.cos(a)*v, vy: Math.sin(a)*v - 20,
                life: 0.8, color: '#ffffff',
                size: 4 + Math.random() * 10, decay: 0.04 + Math.random() * 0.04
            });
        }
    }

    // СУПЕР-ДЕТАЛИЗИРОВАННАЯ РАКЕТА
    function drawRocket(ctx, x, y, tilt, scale) {
        const s = scale || 1.3;
        const w = 80 * s;
        const h = 150 * s;

        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(tilt || 0);

        // --- СОПЛА (EXHAUST NOZZLES) ---
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#1882ff';
        ctx.fillStyle = '#0a0f18';
        ctx.beginPath();
        ctx.moveTo(-w/3.5, h/2 - 5*s);
        ctx.lineTo(-w/4.5, h/2 + 15*s);
        ctx.lineTo(w/4.5, h/2 + 15*s);
        ctx.lineTo(w/3.5, h/2 - 5*s);
        ctx.fill();

        ctx.fillStyle = '#1882ff';
        ctx.beginPath();
        ctx.moveTo(-w/5, h/2 + 15*s);
        ctx.lineTo(-w/6, h/2 + 20*s);
        ctx.lineTo(w/6, h/2 + 20*s);
        ctx.lineTo(w/5, h/2 + 15*s);
        ctx.fill();

        // --- КРЫЛЬЯ (Аэродинамические стреловидные) ---
        ctx.shadowBlur = 20;
        ctx.shadowColor = 'rgba(24, 130, 255, 0.5)';
        const finGrad = ctx.createLinearGradient(-w, 0, w, 0);
        finGrad.addColorStop(0, '#0d1627');
        finGrad.addColorStop(0.5, '#1e293b');
        finGrad.addColorStop(1, '#0d1627');
        ctx.fillStyle = finGrad;
        
        ctx.beginPath();
        ctx.moveTo(-w/4, h/5);
        ctx.quadraticCurveTo(-w*1.1, h/3, -w*1.3, h/1.7);
        ctx.lineTo(-w/2.5, h/2.1);
        ctx.lineTo(-w/3, h/2 - 10*s);
        ctx.closePath();
        ctx.fill();
        
        ctx.beginPath();
        ctx.moveTo(w/4, h/5);
        ctx.quadraticCurveTo(w*1.1, h/3, w*1.3, h/1.7);
        ctx.lineTo(w/2.5, h/2.1);
        ctx.lineTo(w/3, h/2 - 10*s);
        ctx.closePath();
        ctx.fill();

        // Светящиеся края крыльев
        ctx.strokeStyle = '#38bdf8';
        ctx.lineWidth = 1.5 * s;
        ctx.beginPath();
        ctx.moveTo(-w*1.3, h/1.7);
        ctx.lineTo(-w/2.5, h/2.1);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(w*1.3, h/1.7);
        ctx.lineTo(w/2.5, h/2.1);
        ctx.stroke();

        // --- ГЛАВНЫЙ КОРПУС (Темный металлический фюзеляж) ---
        ctx.shadowBlur = 25;
        ctx.shadowColor = 'rgba(0, 0, 0, 0.9)';
        const hullGrad = ctx.createLinearGradient(-w/2, 0, w/2, 0);
        hullGrad.addColorStop(0, '#0f172a');
        hullGrad.addColorStop(0.2, '#1e293b');
        hullGrad.addColorStop(0.5, '#64748b'); // Блик в центре
        hullGrad.addColorStop(0.8, '#1e293b');
        hullGrad.addColorStop(1, '#0f172a');
        ctx.fillStyle = hullGrad;

        ctx.beginPath();
        ctx.moveTo(0, -h/2); // Нос
        ctx.bezierCurveTo(w/2.2, -h/4, w/2, h/4, w/3.2, h/2); // Правая сторона
        ctx.lineTo(-w/3.2, h/2); // Низ
        ctx.bezierCurveTo(-w/2, h/4, -w/2.2, -h/4, 0, -h/2); // Левая сторона
        ctx.closePath();
        ctx.fill();

        // --- НЕОНОВЫЕ ЛИНИИ НА КОРПУСЕ ---
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#1882ff';
        ctx.strokeStyle = '#1882ff';
        ctx.lineWidth = 2 * s;
        ctx.beginPath();
        ctx.moveTo(-w/6, -h/5);
        ctx.quadraticCurveTo(-w/3.5, h/4, -w/4.5, h/2.2);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(w/6, -h/5);
        ctx.quadraticCurveTo(w/3.5, h/4, w/4.5, h/2.2);
        ctx.stroke();

        // --- КАБИНА / CORE WINDOW (Футуристическое окно) ---
        ctx.shadowBlur = 20;
        ctx.shadowColor = '#0ea5e9';
        ctx.fillStyle = '#020617';
        ctx.beginPath();
        ctx.moveTo(0, -h/3.5);
        ctx.lineTo(w/6, -h/7);
        ctx.lineTo(w/8, 0);
        ctx.lineTo(0, h/12);
        ctx.lineTo(-w/8, 0);
        ctx.lineTo(-w/6, -h/7);
        ctx.closePath();
        ctx.fill();

        const glassGrad = ctx.createLinearGradient(0, -h/3.5, 0, h/12);
        glassGrad.addColorStop(0, '#7dd3fc');
        glassGrad.addColorStop(0.4, '#0284c7');
        glassGrad.addColorStop(1, '#082f49');
        ctx.fillStyle = glassGrad;
        ctx.fill();

        // Блик на стекле
        ctx.shadowBlur = 0;
        ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
        ctx.beginPath();
        ctx.moveTo(0, -h/3.5 + 4*s);
        ctx.lineTo(w/6 - 4*s, -h/7);
        ctx.lineTo(0, -h/7 + 10*s);
        ctx.closePath();
        ctx.fill();

        // --- НОСОВОЙ ОБТЕКАТЕЛЬ ---
        ctx.fillStyle = '#0f172a';
        ctx.beginPath();
        ctx.moveTo(0, -h/2);
        ctx.bezierCurveTo(w/8, -h/2.2, w/6, -h/2.4, 0, -h/2.8);
        ctx.bezierCurveTo(-w/6, -h/2.4, -w/8, -h/2.2, 0, -h/2);
        ctx.closePath();
        ctx.fill();
        
        ctx.fillStyle = '#7dd3fc';
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#7dd3fc';
        ctx.beginPath();
        ctx.arc(0, -h/2 + 2*s, 2*s, 0, Math.PI*2);
        ctx.fill();

        // --- НАДПИСЬ "R-GAME" ---
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        ctx.font = `italic 900 ${20*s}px 'Montserrat', sans-serif`;
        
        const rText = "R-";
        const gameText = "GAME";
        const rWidth = ctx.measureText(rText).width;
        const gameWidth = ctx.measureText(gameText).width;
        const startX = -(rWidth + gameWidth) / 2;
        const textY = h/4.5;

        // "R-" (Белый)
        ctx.shadowBlur = 12;
        ctx.shadowColor = 'rgba(255,255,255,0.8)';
        ctx.fillStyle = '#ffffff';
        ctx.fillText(rText, startX, textY);

        // "GAME" (Синий)
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#1882ff';
        ctx.fillStyle = '#1882ff';
        ctx.fillText(gameText, startX + rWidth, textY);

        ctx.restore();
    }

    function drawFrame(dt) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        let speed = gameState === 'FLYING' ? (1 + currentMulti * 0.5) : 0.2;
        bgOffset += speed * 60 * dt;
        
        let grad = ctx.createRadialGradient(400, 200, 100, 400, 200, 500);
        grad.addColorStop(0, '#0a1420');
        grad.addColorStop(1, '#020407');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 800, 400);

        ctx.strokeStyle = 'rgba(255,255,255,0.03)';
        ctx.lineWidth = 1;
        for(let i=0; i<800; i+=80) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,400); ctx.stroke(); }
        for(let i=(bgOffset%80)-80; i<400; i+=80) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(800,i); ctx.stroke(); }
        
        ctx.strokeStyle = 'rgba(255,255,255,0.08)';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(0, 380); ctx.lineTo(800, 380); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(50, 0); ctx.lineTo(50, 400); ctx.stroke();

        ctx.fillStyle = '#fff';
        stars.forEach(s => {
            s.y += s.spd * speed * 60 * dt;
            if(s.y > 400) { s.y = -10; s.x = Math.random()*800; }
            ctx.globalAlpha = Math.random() * 0.6 + 0.2;
            ctx.fillRect(s.x, s.y, s.s, s.s);
        });
        ctx.globalAlpha = 1.0;

        // График
        if (gameState === 'FLYING') {
            let progress = (currentMulti - 1) / 10;
            ctx.strokeStyle = 'var(--accent-blue)';
            ctx.lineWidth = 4;
            ctx.shadowBlur = 25;
            ctx.shadowColor = 'rgba(24,130,255,0.5)';
            ctx.beginPath();
            ctx.moveTo(50, 380);
            for(let t=0; t<=progress; t+=0.01) {
                let px = 50 + t * 700;
                let py = 380 - t * 300;
                ctx.lineTo(px, py);
            }
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        // Частицы (взрыв)
        for(let i=particles.length-1; i>=0; i--) {
            let p = particles[i];
            p.x += p.vx * dt * 1.5;
            p.y += p.vy * dt * 1.5;
            p.life -= p.decay || 0.01;
            p.size *= 0.98;
            if(p.life <= 0 || p.size < 0.5) particles.splice(i, 1);
            else {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 25;
                ctx.shadowColor = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, Math.max(p.size, 0.5), 0, Math.PI*2);
                ctx.fill();
            }
        }
        ctx.globalAlpha = 1.0;
        ctx.shadowBlur = 0;

        // === ОТРИСОВКА РАКЕТЫ (всегда, даже при CRASHED, но без наклона) ===
        if (gameState !== 'CRASHED') {
            const cx = canvas.width/2;
            const cy = rocketY;

            const tilt = rocketTilt || 0;
            const bobY = rocketBob || 0;
            const shakeX = rocketShakeX || 0;
            const shakeY = rocketShakeY || 0;

            // Огонь (только в FLYING)
            if (gameState === 'FLYING') {
                ctx.save();
                ctx.translate(cx + shakeX, cy + bobY + shakeY);
                ctx.rotate(tilt);

                ctx.shadowBlur = 50;
                ctx.shadowColor = '#0ea5e9';
                const flameLen = 70 + Math.random() * 50 + currentMulti * 18;
                const baseY = (150 / 2 + 15) * 1.3; // Совпадает с высотой сопла
                
                const gradFire = ctx.createRadialGradient(0, baseY, 10, 0, baseY + flameLen, flameLen);
                gradFire.addColorStop(0, '#ffffff');
                gradFire.addColorStop(0.2, '#38bdf8');
                gradFire.addColorStop(0.6, '#0284c7');
                gradFire.addColorStop(1, 'rgba(2, 132, 199, 0)');
                ctx.fillStyle = gradFire;
                
                ctx.beginPath();
                ctx.moveTo(-18, baseY);
                ctx.quadraticCurveTo(-35, baseY + flameLen * 0.6, 0, baseY + flameLen);
                ctx.quadraticCurveTo(35, baseY + flameLen * 0.6, 18, baseY);
                ctx.fill();

                const innerLen = flameLen * 0.6 + Math.random() * 20;
                ctx.shadowBlur = 40;
                ctx.shadowColor = '#bae6fd';
                ctx.fillStyle = 'rgba(186, 230, 253, 0.8)';
                ctx.beginPath();
                ctx.moveTo(-10, baseY);
                ctx.quadraticCurveTo(-15, baseY + innerLen * 0.5, 0, baseY + innerLen);
                ctx.quadraticCurveTo(15, baseY + innerLen * 0.5, 10, baseY);
                ctx.fill();

                // Искры от двигателя
                if (Math.random() < 0.5) {
                    for (let i=0; i<6; i++) {
                        let angle = -Math.PI/2 + (Math.random()-0.5)*1.2;
                        let speed = 4 + Math.random() * 12;
                        particles.push({
                            x: cx + shakeX + (Math.random()-0.5)*20,
                            y: cy + bobY + shakeY + baseY + 10,
                            vx: Math.cos(angle) * speed,
                            vy: Math.sin(angle) * speed - 6,
                            life: 1.0,
                            color: '#7dd3fc',
                            size: 3 + Math.random() * 8,
                            decay: 0.02 + Math.random() * 0.02
                        });
                    }
                }
                ctx.restore();
            }

            // Рисуем ракету с покачиванием
            drawRocket(ctx, cx + shakeX, cy + bobY + shakeY, tilt, 1.3);
        }

        // Взрывная вспышка
        if (explosionAlpha > 0) {
            ctx.fillStyle = `rgba(240, 48, 67, ${explosionAlpha * 0.4})`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.shadowBlur = 120;
            ctx.shadowColor = 'var(--accent-red)';
            ctx.strokeStyle = `rgba(240, 48, 67, ${explosionAlpha})`;
            ctx.lineWidth = 20 * explosionAlpha;
            ctx.beginPath();
            ctx.arc(canvas.width/2, rocketY, (1-explosionAlpha)*350 + 120, 0, Math.PI*2);
            ctx.stroke();
            explosionAlpha -= dt * 0.7;
            if(explosionAlpha < 0) explosionAlpha = 0;
            ctx.shadowBlur = 0;
        }
    }

    // === КНОПКА МЕНЮ ===
    menuBtn.onclick = () => {
        window.location.href = 'casino.html?userId=' + userId;
    };

    // === УПРАВЛЕНИЕ ЗВУКОМ ===
    let isSoundOn = false;

    function updateSoundButton() {
        if (isSoundOn) {
            soundIcon.textContent = '🔊';
            soundLabel.textContent = 'ВЫКЛЮЧИТЬ ЗВУК';
            soundBtn.classList.remove('muted');
        } else {
            soundIcon.textContent = '🔇';
            soundLabel.textContent = 'ВКЛЮЧИТЬ ЗВУК';
            soundBtn.classList.add('muted');
        }
    }

    function toggleSound() {
        if (isSoundOn) {
            bgAudio.pause();
            isSoundOn = false;
        } else {
            bgAudio.volume = 0.3;
            bgAudio.play().then(() => {
                isSoundOn = true;
                updateSoundButton();
            }).catch(() => {
                alert('⚠️ Не удалось включить звук. Попробуйте ещё раз.');
            });
        }
        updateSoundButton();
    }

    soundBtn.addEventListener('click', toggleSound);

    function tryAutoPlay() {
        if (!isSoundOn) {
            bgAudio.volume = 0.3;
            bgAudio.play().then(() => {
                isSoundOn = true;
                updateSoundButton();
            }).catch(() => {});
        }
        document.removeEventListener('click', tryAutoPlay);
        document.removeEventListener('touchstart', tryAutoPlay);
    }
    document.addEventListener('click', tryAutoPlay);
    document.addEventListener('touchstart', tryAutoPlay);

    // Запрос баланса при запуске
    requestBalance();

    // Запуск игрового цикла
    setWaitingPhase();
    requestAnimationFrame(gameLoop);
})();
</script>
</body>
