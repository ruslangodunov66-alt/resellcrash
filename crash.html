<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CRASH | R-Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 20%, #0a0e1a, #010101);
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .game-container {
            width: 100%;
            max-width: 550px;
            margin: 0 auto;
        }
        .game-card {
            background: linear-gradient(145deg, rgba(20,28,40,0.95), rgba(10,15,25,0.98));
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 30px 20px 40px;
            text-align: center;
            border: 1px solid rgba(0,255,255,0.5);
            box-shadow: 0 0 30px rgba(0,255,255,0.2);
            transition: 0.2s;
        }
        h1 {
            font-size: 36px;
            background: linear-gradient(135deg, #ffcc44, #ff6644);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        .rocket {
            font-size: 80px;
            animation: float 0.8s infinite ease-in-out;
            margin: 10px 0;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-12px); }
        }
        .multiplier {
            font-size: 80px;
            font-weight: 900;
            margin: 20px 0;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px #2ecc71;
            letter-spacing: 4px;
        }
        .crash .multiplier {
            background: linear-gradient(135deg, #ff3366, #c0392b);
            text-shadow: 0 0 15px #ff3366;
        }
        .win .multiplier {
            background: linear-gradient(135deg, #ffcc44, #ff8844);
            text-shadow: 0 0 15px #ffaa44;
        }
        .bet-slider {
            margin: 20px 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .bet-input {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            background: rgba(0,0,0,0.5);
            border-radius: 50px;
            padding: 8px 20px;
            width: 100%;
        }
        .bet-input label {
            color: #aac8ff;
            font-weight: bold;
        }
        .bet-input input {
            padding: 12px 15px;
            font-size: 20px;
            width: 150px;
            background: rgba(0,0,0,0.7);
            border: 2px solid #ffaa44;
            color: #ffcc44;
            border-radius: 50px;
            text-align: center;
            font-weight: bold;
        }
        .bet-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .bet-buttons button {
            background: #2c3e50;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s;
        }
        .bet-buttons button:active {
            transform: scale(0.95);
        }
        button {
            border: none;
            padding: 14px 25px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            width: 80%;
            margin: 8px auto;
            transition: 0.1s;
        }
        .btn-cashout {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            box-shadow: 0 0 15px #2ecc71;
        }
        .btn-cashout:active {
            transform: scale(0.96);
        }
        .btn-repeat {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
        }
        .auto-container {
            margin: 15px 0;
            display: flex;
            justify-content: center;
            gap: 10px;
            align-items: center;
            background: rgba(0,0,0,0.5);
            border-radius: 50px;
            padding: 8px 20px;
        }
        .auto-container label {
            color: #aac8ff;
        }
        .auto-container input {
            padding: 8px;
            width: 90px;
            background: rgba(0,0,0,0.7);
            border: 1px solid #ffaa44;
            color: #ffcc44;
            border-radius: 30px;
            text-align: center;
        }
        .status {
            margin-top: 25px;
            padding: 14px;
            background: rgba(0,0,0,0.6);
            border-radius: 50px;
            font-weight: bold;
            color: #ffdd99;
            font-size: 16px;
        }
        .hidden {
            display: none;
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }
        @keyframes shake {
            0% { transform: translate(0,0); }
            25% { transform: translate(-3px,0); }
            75% { transform: translate(3px,0); }
            100% { transform: translate(0,0); }
        }
        .shake {
            animation: shake 0.1s infinite;
        }
        /* График */
        .chart-container {
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            margin: 20px 0;
            padding: 10px;
        }
        canvas#crashCanvas {
            width: 100%;
            height: 120px;
            background: #0a0e1a;
            border-radius: 16px;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-card" id="gameCard">
        <h1>💥 CRASH GAME</h1>
        <div class="rocket">🚀</div>
        <div class="multiplier" id="multiplierText">x1.00</div>
        
        <div class="bet-slider">
            <div class="bet-input">
                <label>💰 СТАВКА</label>
                <input type="number" id="betAmount" min="100" max="100000" step="100" value="1000">
            </div>
            <div class="bet-buttons">
                <button data-mult="0.5">1/2</button>
                <button data-mult="1">x2</button>
                <button data-mult="2">x3</button>
                <button data-mult="5">x5</button>
                <button data-mult="10">x10</button>
            </div>
        </div>

        <div class="auto-container">
            <label>🎯 АВТО-ЗАБОР при x</label>
            <input type="number" id="autoTarget" placeholder="2.0" step="0.1" min="1.1" max="50" value="2.0">
        </div>

        <button id="cashoutBtn" class="btn-cashout">💎 ЗАБРАТЬ</button>
        <button id="repeatBtn" class="btn-repeat hidden">🔄 ИГРАТЬ СНОВА</button>
        
        <div class="status" id="statusMsg">💎 Введите ставку и нажмите "ИГРАТЬ"</div>
    </div>
</div>
<canvas id="particleCanvas"></canvas>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    
    // ---------- DOM элементы ----------
    const betInput = document.getElementById('betAmount');
    const cashoutBtn = document.getElementById('cashoutBtn');
    const repeatBtn = document.getElementById('repeatBtn');
    const multiplierSpan = document.getElementById('multiplierText');
    const statusDiv = document.getElementById('statusMsg');
    const gameCard = document.getElementById('gameCard');
    const autoTargetInput = document.getElementById('autoTarget');
    
    // ---------- Игровые переменные ----------
    let currentBet = 1000;
    let crashPoint = 1.10;
    let currentMultiplier = 1.0;
    let gameActive = false;
    let intervalId = null;
    let pendingCashout = false;
    let autoTarget = 2.0;
    
    // ---------- Звуки (Web Audio) ----------
    let audioCtx = null;
    let rocketSound = null;
    
    function initAudio() {
        if (!audioCtx && window.AudioContext) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const unlock = () => {
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                document.body.removeEventListener('touchstart', unlock);
                document.body.removeEventListener('click', unlock);
            };
            document.body.addEventListener('touchstart', unlock);
            document.body.addEventListener('click', unlock);
        }
    }
    
    function playBeep(freq, duration, volume = 0.2) {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(volume, now);
        gain.gain.exponentialRampToValueAtTime(0.00001, now + duration);
        osc.start();
        osc.stop(now + duration);
    }
    
    function playCashoutSound() {
        playBeep(880, 0.2, 0.15);
        playBeep(1320, 0.3, 0.15);
    }
    
    function playCrashSound() {
        playBeep(150, 0.6, 0.3);
        playBeep(90, 0.8, 0.25);
    }
    
    function playStartSound() {
        playBeep(440, 0.1, 0.1);
    }
    
    // ---------- Генерация краш-точки ----------
    function generateCrashPoint() {
        // Распределение: 50% от 1.1 до 2.0, 30% от 2.0 до 5.0, 15% от 5.0 до 20.0, 5% выше 20
        const r = Math.random();
        if (r < 0.50) {
            return 1.10 + Math.random() * 0.90;
        } else if (r < 0.80) {
            return 2.0 + Math.random() * 3.0;
        } else if (r < 0.95) {
            return 5.0 + Math.random() * 15.0;
        } else {
            return 20.0 + Math.random() * 80.0;
        }
    }
    
    // ---------- Обновление ставки ----------
    betInput.addEventListener('change', () => {
        let val = parseFloat(betInput.value);
        if (isNaN(val) || val < 100) val = 100;
        if (val > 100000) val = 100000;
        currentBet = val;
        betInput.value = currentBet;
        statusDiv.innerHTML = `💰 Ставка ${currentBet}₽. Нажмите "ИГРАТЬ"`;
    });
    
    document.querySelectorAll('[data-mult]').forEach(btn => {
        btn.addEventListener('click', () => {
            let mult = parseFloat(btn.getAttribute('data-mult'));
            let newBet = currentBet * mult;
            if (newBet < 100) newBet = 100;
            if (newBet > 100000) newBet = 100000;
            currentBet = Math.floor(newBet);
            betInput.value = currentBet;
            statusDiv.innerHTML = `💰 Ставка ${currentBet}₽`;
        });
    });
    
    autoTargetInput.addEventListener('change', () => {
        let val = parseFloat(autoTargetInput.value);
        if (!isNaN(val) && val >= 1.1 && val <= 100) autoTarget = val;
        else autoTarget = null;
    });
    
    // ---------- Запуск игры ----------
    function startGame() {
        if (currentBet < 100) {
            statusDiv.innerHTML = '❌ Минимальная ставка 100₽';
            return;
        }
        if (intervalId) clearInterval(intervalId);
        crashPoint = generateCrashPoint();
        currentMultiplier = 1.0;
        gameActive = true;
        pendingCashout = false;
        cashoutBtn.disabled = false;
        repeatBtn.classList.add('hidden');
        cashoutBtn.classList.remove('hidden');
        gameCard.classList.remove('crash', 'win');
        multiplierSpan.innerHTML = 'x1.00';
        statusDiv.innerHTML = '📈 МНОЖИТЕЛЬ РАСТЁТ!';
        
        // Партиклы запуска
        startParticles();
        
        // Звук старта
        initAudio();
        playStartSound();
        
        intervalId = setInterval(() => {
            if (!gameActive) return;
            currentMultiplier += 0.025;
            multiplierSpan.innerHTML = `x${currentMultiplier.toFixed(2)}`;
            // Авто-кэшаут
            if (autoTarget && currentMultiplier >= autoTarget && !pendingCashout) {
                cashout();
                return;
            }
            if (currentMultiplier >= crashPoint) {
                clearInterval(intervalId);
                intervalId = null;
                gameActive = false;
                gameCard.classList.add('crash');
                multiplierSpan.innerHTML = `💥 x${crashPoint.toFixed(2)}`;
                cashoutBtn.disabled = true;
                statusDiv.innerHTML = `💥 КРАШ! ВЫ ПРОИГРАЛИ ${currentBet}₽`;
                playCrashSound();
                // Отправляем проигрыш
                tg.sendData(JSON.stringify({ 
                    action: 'lose', 
                    game: 'crash', 
                    bet: currentBet,
                    crashPoint: crashPoint
                }));
                cashoutBtn.classList.add('hidden');
                repeatBtn.classList.remove('hidden');
            }
        }, 95);
    }
    
    // ---------- Забрать выигрыш ----------
    function cashout() {
        if (!gameActive || pendingCashout) return;
        pendingCashout = true;
        clearInterval(intervalId);
        intervalId = null;
        gameActive = false;
        cashoutBtn.disabled = true;
        const winAmount = Math.floor(currentBet * currentMultiplier);
        gameCard.classList.add('win');
        multiplierSpan.innerHTML = `✅ x${currentMultiplier.toFixed(2)} → ${winAmount}₽`;
        playCashoutSound();
        statusDiv.innerHTML = `🎉 ВЫИГРЫШ! +${winAmount}₽`;
        tg.sendData(JSON.stringify({ 
            action: 'win', 
            game: 'crash', 
            win: winAmount, 
            bet: currentBet,
            multiplier: currentMultiplier
        }));
        cashoutBtn.classList.add('hidden');
        repeatBtn.classList.remove('hidden');
    }
    
    // ---------- Обработчики кнопок ----------
    cashoutBtn.onclick = cashout;
    repeatBtn.onclick = () => {
        startGame();
    };
    
    // ---------- Эффекты частиц (простой canvas) ----------
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let animFrame;
    
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    
    function startParticles() {
        particles = [];
        for (let i = 0; i < 60; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 3,
                vy: (Math.random() - 0.5) * 3 - 1,
                life: 1,
                size: Math.random() * 4 + 2,
                color: `hsl(${Math.random() * 60 + 30}, 100%, 60%)`
            });
        }
        if (animFrame) cancelAnimationFrame(animFrame);
        animateParticles();
    }
    
    function animateParticles() {
        if (!gameActive) {
            if (animFrame) cancelAnimationFrame(animFrame);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            return;
        }
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let allDead = true;
        for (let i = 0; i < particles.length; i++) {
            const p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.life -= 0.02;
            if (p.life <= 0) continue;
            allDead = false;
            ctx.globalAlpha = p.life * 0.7;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
        }
        if (!allDead) {
            animFrame = requestAnimationFrame(animateParticles);
        } else {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
    }
    
    // Первый запуск (автоматически игра не начинается, ждём кнопку ИГРАТЬ)
    // Но кнопки "ИГРАТЬ" нет! Сделаем так: при загрузке автоматически стартуем? 
    // Лучше добавить кнопку "СТАРТ" или сделать repeatBtn видимым изначально как "ИГРАТЬ".
    // Изменим: repeatBtn изначально видна с текстом "🚀 СТАРТ", а cashoutBtn скрыта.
    repeatBtn.classList.remove('hidden');
    repeatBtn.innerText = "🚀 СТАРТ";
    cashoutBtn.classList.add('hidden');
    repeatBtn.onclick = () => {
        startGame();
        repeatBtn.classList.add('hidden');
        cashoutBtn.classList.remove('hidden');
    };
    statusDiv.innerHTML = "💎 Введите ставку и нажмите СТАРТ";
</script>
</body>
</html>
