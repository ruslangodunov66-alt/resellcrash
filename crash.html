<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CRASH GAME</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; min-height: 100vh; background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%); font-family: 'Segoe UI', system-ui, sans-serif; display: flex; justify-content: center; align-items: center; padding: 16px; color: #fff; }
        .game-container { max-width: 500px; width: 100%; background: rgba(18,25,45,0.7); backdrop-filter: blur(8px); border-radius: 48px; padding: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); }
        .rocket-area { position: relative; height: 200px; margin-bottom: 20px; background: rgba(0,0,0,0.3); border-radius: 40px; overflow: hidden; }
        #rocketCanvas { width: 100%; height: 100%; display: block; }
        .multiplier-area { text-align: center; margin-bottom: 20px; }
        .multiplier { font-size: 56px; font-weight: 900; font-family: monospace; letter-spacing: 4px; color: #FFE484; text-shadow: 0 0 12px #FFB347; }
        .status { font-size: 14px; margin-top: 8px; color: #b9c2d4; }
        .bet-panel { background: #0b1020; border-radius: 40px; padding: 16px; margin-bottom: 20px; }
        .amount-input { width: 100%; padding: 14px 20px; font-size: 20px; background: #1a2340; border: none; border-radius: 60px; color: white; text-align: center; font-weight: bold; margin-bottom: 16px; outline: none; }
        .button-group { display: flex; gap: 12px; }
        button { flex: 1; padding: 14px 0; font-size: 18px; font-weight: bold; border: none; border-radius: 60px; cursor: pointer; transition: 0.2s; background: #2a3655; color: white; box-shadow: 0 2px 6px rgba(0,0,0,0.3); }
        button:active { transform: scale(0.97); }
        .btn-bet { background: linear-gradient(95deg, #00b4db, #0083b0); }
        .btn-cashout { background: linear-gradient(95deg, #f09819, #ff6a00); }
        .btn-bet:disabled, .btn-cashout:disabled { opacity: 0.5; transform: none; cursor: not-allowed; }
        .error-msg { color: #ff8a7a; text-align: center; font-size: 13px; margin-top: 12px; }
        .refresh-btn { background: #2a3655; margin-top: 12px; padding: 10px; font-size: 14px; }
        footer { font-size: 11px; text-align: center; margin-top: 20px; color: #4a5570; }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
</head>
<body>
<div class="game-container">
    <div class="rocket-area">
        <canvas id="rocketCanvas" width="500" height="200"></canvas>
    </div>
    <div class="multiplier-area">
        <div class="multiplier" id="multiplierDisplay">1.00</div>
        <div class="status" id="gameStatus">⚡ Ожидание раунда</div>
    </div>
    <div class="bet-panel">
        <input type="number" id="betAmount" class="amount-input" placeholder="Сумма ставки" value="100" step="100">
        <div class="button-group">
            <button id="betBtn" class="btn-bet">🚀 СДЕЛАТЬ СТАВКУ</button>
            <button id="cashoutBtn" class="btn-cashout" disabled>💎 ЗАБРАТЬ</button>
        </div>
        <button id="refreshBalanceBtn" class="refresh-btn">🔄 УЗНАТЬ БАЛАНС</button>
        <div id="errorMsg" class="error-msg"></div>
    </div>
    <footer>🔁 Множитель растёт – успей забрать до краша!<br>💰 Баланс и результат придут в чат</footer>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.enableClosingConfirmation();

    let userId = null;

    // Получаем userId из URL параметра
    const urlParams = new URLSearchParams(window.location.search);
    const urlUserId = urlParams.get('userId');
    if (urlUserId && !isNaN(parseInt(urlUserId))) {
        userId = parseInt(urlUserId);
    }
    // Если не нашли, пробуем из Telegram WebApp
    if (!userId && tg.initDataUnsafe?.user?.id) {
        userId = tg.initDataUnsafe.user.id;
    }

    // Если всё равно нет – показываем сообщение об ошибке и блокируем игру
    if (!userId) {
        document.getElementById('gameStatus').innerHTML = '❌ Ошибка: не удалось определить ID пользователя. Закройте и откройте игру через меню бота.';
        document.getElementById('betBtn').disabled = true;
        document.getElementById('cashoutBtn').disabled = true;
        throw new Error('No userId');
    }

    // --- DOM элементы ---
    const multiplierSpan = document.getElementById('multiplierDisplay');
    const betInput = document.getElementById('betAmount');
    const betBtn = document.getElementById('betBtn');
    const cashoutBtn = document.getElementById('cashoutBtn');
    const errorDiv = document.getElementById('errorMsg');
    const gameStatusSpan = document.getElementById('gameStatus');
    const refreshBalanceBtn = document.getElementById('refreshBalanceBtn');

    let currentMultiplier = 1.00;
    let roundActive = false;
    let betPlaced = false;
    let myBetAmount = 0;
    let cashedOut = false;
    let animationId = null;
    let startTime = 0;

    // Ракета (canvas)
    const canvas = document.getElementById('rocketCanvas');
    const ctx = canvas.getContext('2d');
    let rocketY = 180;

    function resizeCanvas() {
        const container = canvas.parentElement;
        const width = container.clientWidth;
        canvas.width = width;
        canvas.height = 200;
        drawRocket();
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function drawRocket() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#0a0f1e';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < 50; i++) {
            ctx.fillStyle = `rgba(255,255,200,${Math.random() * 0.5})`;
            ctx.fillRect(Math.random() * canvas.width, Math.random() * canvas.height, 1, 1);
        }
        let y = rocketY;
        let x = canvas.width / 2;
        ctx.save();
        ctx.translate(x, y);
        ctx.fillStyle = '#ff6600';
        ctx.beginPath();
        ctx.moveTo(0, -20);
        ctx.lineTo(10, 0);
        ctx.lineTo(6, 10);
        ctx.lineTo(-6, 10);
        ctx.lineTo(-10, 0);
        ctx.fill();
        ctx.fillStyle = '#ffcc00';
        ctx.beginPath();
        ctx.moveTo(0, -20);
        ctx.lineTo(6, -10);
        ctx.lineTo(-6, -10);
        ctx.fill();
        ctx.fillStyle = '#ff3300';
        ctx.beginPath();
        ctx.moveTo(-4, 12);
        ctx.lineTo(0, 24);
        ctx.lineTo(4, 12);
        ctx.fill();
        ctx.restore();
    }

    function updateRocketPosition(multiplier) {
        let progress = (multiplier - 1) / 9;
        if (progress > 1) progress = 1;
        if (progress < 0) progress = 0;
        rocketY = 180 - progress * 160;
        drawRocket();
    }

    function showError(msg) {
        errorDiv.innerText = msg;
        setTimeout(() => { if (errorDiv.innerText === msg) errorDiv.innerText = ''; }, 3000);
    }

    function updateUI() {
        multiplierSpan.innerText = currentMultiplier.toFixed(2);
        updateRocketPosition(currentMultiplier);
        cashoutBtn.disabled = !(betPlaced && roundActive && !cashedOut);
        betBtn.disabled = (roundActive && betPlaced);
    }

    function startAnimation() {
        if (animationId) cancelAnimationFrame(animationId);
        startTime = performance.now() / 1000;
        function step() {
            const now = performance.now() / 1000;
            const elapsed = now - startTime;
            let mult = 1 + elapsed / 5;
            if (mult > 10) mult = 10;
            currentMultiplier = mult;
            updateUI();
            if (roundActive && !cashedOut && currentMultiplier >= 10.0) {
                gameStatusSpan.innerHTML = "💥 КРАШ! Множитель превысил 10x";
                roundActive = false;
                betPlaced = false;
                cashedOut = false;
                updateUI();
                tg.sendData(JSON.stringify({ action: "crash_cashout", multiplier: currentMultiplier }));
                cancelAnimationFrame(animationId);
                animationId = null;
                return;
            }
            if (roundActive && !cashedOut) {
                animationId = requestAnimationFrame(step);
            } else {
                animationId = null;
            }
        }
        animationId = requestAnimationFrame(step);
    }

    function stopAnimation() {
        if (animationId) {
            cancelAnimationFrame(animationId);
            animationId = null;
        }
    }

    function placeBet() {
        if (roundActive && betPlaced) {
            showError("Ставка уже сделана в этом раунде");
            return;
        }
        let amount = parseInt(betInput.value);
        if (isNaN(amount) || amount <= 0) {
            showError("Введите положительную сумму");
            return;
        }
        if (amount < 50) {
            showError("Минимальная ставка 50₽");
            return;
        }
        tg.sendData(JSON.stringify({ action: "crash_bet", amount: amount }));
        betPlaced = true;
        myBetAmount = amount;
        roundActive = true;
        cashedOut = false;
        currentMultiplier = 1.00;
        gameStatusSpan.innerHTML = `⭐ Ставка ${amount}₽ принята. Жми ЗАБРАТЬ!`;
        startAnimation();
        updateUI();
    }

    function cashout() {
        if (!roundActive) {
            showError("Раунд не активен");
            return;
        }
        if (!betPlaced || cashedOut) {
            showError("Нет активной ставки или вы уже забрали");
            return;
        }
        cashedOut = true;
        stopAnimation();
        tg.sendData(JSON.stringify({ action: "crash_cashout", multiplier: currentMultiplier }));
        gameStatusSpan.innerHTML = `⏳ Отправлено... Результат в чате.`;
        roundActive = false;
        betPlaced = false;
        updateUI();
    }

    function refreshBalance() {
        tg.sendData(JSON.stringify({ action: "get_balance" }));
        showError("📨 Запрос баланса отправлен. Ответ придёт в чат.");
    }

    betBtn.addEventListener('click', placeBet);
    cashoutBtn.addEventListener('click', cashout);
    refreshBalanceBtn.addEventListener('click', refreshBalance);
    tg.setBackgroundColor("#0a0f1e");
    tg.setHeaderColor("bg_color");
    gameStatusSpan.innerHTML = "✅ Готов к игре! Нажми СДЕЛАТЬ СТАВКУ";
</script>
</body>
</html>
