<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CRASH | R-Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 20%, #0a0e1a, #010101);
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .game-container { width: 100%; max-width: 480px; }
        .game-card {
            background: linear-gradient(145deg, rgba(20,28,40,0.95), rgba(10,15,25,0.98));
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 30px 20px;
            text-align: center;
            border: 1px solid rgba(0,255,255,0.5);
            box-shadow: 0 0 20px rgba(0,255,255,0.2);
        }
        .rocket { font-size: 80px; animation: float 0.8s infinite ease-in-out; margin-bottom: 10px; }
        @keyframes float { 0% { transform: translateY(0px); } 100% { transform: translateY(-12px); } }
        h2 { font-size: 32px; background: linear-gradient(135deg, #ffcc44, #ff6644); background-clip: text; -webkit-background-clip: text; color: transparent; margin: 10px 0; }
        .multiplier { font-size: 72px; font-weight: 900; margin: 20px 0; background: linear-gradient(135deg, #2ecc71, #27ae60); background-clip: text; -webkit-background-clip: text; color: transparent; text-shadow: 0 0 10px #2ecc71; }
        .crash .multiplier { background: linear-gradient(135deg, #ff3366, #c0392b); text-shadow: 0 0 10px #ff3366; }
        .win .multiplier { background: linear-gradient(135deg, #ffcc44, #ff8844); text-shadow: 0 0 10px #ffaa44; }
        .bet-input { margin: 15px 0; display: flex; justify-content: center; gap: 10px; align-items: center; }
        .bet-input input { padding: 12px 20px; font-size: 20px; width: 160px; background: rgba(0,0,0,0.7); border: 2px solid #ffaa44; color: #ffcc44; border-radius: 50px; text-align: center; font-weight: bold; }
        button { border: none; padding: 14px 25px; font-size: 18px; font-weight: bold; border-radius: 50px; cursor: pointer; width: 80%; margin: 10px auto; transition: 0.1s; }
        .btn-cashout { background: linear-gradient(135deg, #2ecc71, #27ae60); color: white; box-shadow: 0 0 10px #2ecc71; }
        .btn-repeat { background: linear-gradient(135deg, #f39c12, #e67e22); color: white; }
        .auto-input { margin: 15px 0; }
        .auto-input label { color: #aac8ff; font-size: 14px; }
        .auto-input input { padding: 8px; width: 100px; text-align: center; background: rgba(0,0,0,0.7); border: 1px solid #ffaa44; color: #ffcc44; border-radius: 30px; }
        .status { margin-top: 20px; padding: 12px; background: rgba(0,0,0,0.6); border-radius: 40px; font-weight: bold; color: #ffdd99; }
        .hidden { display: none; }
        button:active { transform: scale(0.96); }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-card" id="gameCard">
        <div class="rocket">🚀</div>
        <h2>R-Game CRASH</h2>
        <div class="bet-input">
            <input type="number" id="betInput" min="100" max="100000" step="100" value="1000">
        </div>
        <div class="multiplier" id="counter">x1.00</div>
        <button id="cashoutBtn" class="btn-cashout">💰 ЗАБРАТЬ</button>
        <div class="auto-input">
            <label>🎯 АВТО-ЗАБОР при x</label>
            <input type="number" id="autoMultiplier" placeholder="2.0" step="0.1" min="1.1" max="10" value="2.0">
        </div>
        <button id="repeatBtn" class="btn-repeat">🔄 ИГРАТЬ СНОВА</button>
        <div class="status" id="status">💎 Нажмите "ИГРАТЬ СНОВА"</div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    
    let currentBet = 1000;
    let crashPoint = 1.10;
    let currentMultiplier = 1.0;
    let gameActive = false;
    let intervalId = null;
    let pendingCashout = false;
    let autoTarget = 2.0;
    
    const betInput = document.getElementById('betInput');
    const cashoutBtn = document.getElementById('cashoutBtn');
    const repeatBtn = document.getElementById('repeatBtn');
    const counterDiv = document.getElementById('counter');
    const statusDiv = document.getElementById('status');
    const gameCard = document.getElementById('gameCard');
    const autoMultiplierInput = document.getElementById('autoMultiplier');
    
    function generateCrashPoint() {
        const r = Math.random();
        return 1.10 + (8.90 * Math.pow(r, 2.5));
    }
    
    betInput.addEventListener('change', () => {
        let val = parseInt(betInput.value);
        if (isNaN(val) || val < 100) val = 100;
        if (val > 100000) val = 100000;
        currentBet = val;
        betInput.value = currentBet;
        statusDiv.innerHTML = `💰 Ставка ${currentBet}₽. Нажмите "ИГРАТЬ СНОВА"`;
    });
    
    function startGame() {
        if (currentBet < 100) {
            statusDiv.innerHTML = '❌ Минимальная ставка 100₽';
            return;
        }
        if (intervalId) clearInterval(intervalId);
        crashPoint = generateCrashPoint();
        currentMultiplier = 1.0;
        gameActive = true;
        pendingCashout = false;
        cashoutBtn.disabled = false;
        gameCard.classList.remove('crash', 'win');
        counterDiv.innerHTML = 'x1.00';
        statusDiv.innerHTML = '📈 МНОЖИТЕЛЬ РАСТЁТ!';
        
        intervalId = setInterval(() => {
            if (!gameActive) return;
            currentMultiplier += 0.025;
            counterDiv.innerHTML = `x${currentMultiplier.toFixed(2)}`;
            if (autoTarget && currentMultiplier >= autoTarget && !pendingCashout) cashout();
            if (currentMultiplier >= crashPoint) {
                clearInterval(intervalId);
                intervalId = null;
                gameActive = false;
                gameCard.classList.add('crash');
                counterDiv.innerHTML = `💥 x${crashPoint.toFixed(2)}`;
                cashoutBtn.disabled = true;
                statusDiv.innerHTML = `💔 КРАШ! ВЫ ПРОИГРАЛИ ${currentBet}₽`;
                tg.sendData(JSON.stringify({ action: 'lose', game: 'crash', bet: currentBet }));
            }
        }, 95);
    }
    
    function cashout() {
        if (!gameActive || pendingCashout) return;
        pendingCashout = true;
        clearInterval(intervalId);
        intervalId = null;
        gameActive = false;
        cashoutBtn.disabled = true;
        const winAmount = Math.floor(currentBet * currentMultiplier);
        gameCard.classList.add('win');
        counterDiv.innerHTML = `✅ x${currentMultiplier.toFixed(2)} → ${winAmount}₽`;
        tg.sendData(JSON.stringify({ action: 'win', game: 'crash', win: winAmount, bet: currentBet }));
        statusDiv.innerHTML = `🎉 ВЫИГРЫШ! +${winAmount}₽`;
        pendingCashout = false;
    }
    
    cashoutBtn.onclick = cashout;
    repeatBtn.onclick = () => {
        startGame();
    };
    
    autoMultiplierInput.addEventListener('change', () => {
        let val = parseFloat(autoMultiplierInput.value);
        if (!isNaN(val) && val >= 1.1 && val <= 10) autoTarget = val;
        else autoTarget = null;
    });
    
    // Стартуем игру при загрузке
    startGame();
</script>
</body>
</html>
