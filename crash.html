<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CRASH | R-Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 20%, #0a0e1a, #020408);
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .game-container {
            width: 100%;
            max-width: 450px;
        }
        .game-card {
            background: linear-gradient(145deg, rgba(20,28,40,0.95), rgba(10,15,25,0.98));
            backdrop-filter: blur(8px);
            border-radius: 50px;
            padding: 30px 20px;
            text-align: center;
            border: 2px solid rgba(0,255,255,0.4);
        }
        .rocket {
            font-size: 70px;
            animation: float 1s infinite ease-in-out;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-10px); }
        }
        h2 {
            font-size: 28px;
            background: linear-gradient(135deg, #ffcc44, #ff6644);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin: 10px 0;
        }
        .multiplier {
            font-size: 70px;
            font-weight: 900;
            margin: 20px 0;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .crash .multiplier {
            background: linear-gradient(135deg, #ff3366, #c0392b);
        }
        .win .multiplier {
            background: linear-gradient(135deg, #ffcc44, #ff8844);
        }
        button {
            border: none;
            padding: 15px 25px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            width: 80%;
            margin: 10px auto;
            transition: 0.1s;
        }
        button:active {
            transform: scale(0.96);
        }
        button:disabled {
            opacity: 0.5;
        }
        .btn-cashout {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
        }
        .btn-repeat {
            background: linear-gradient(135deg, #f39c12, #e67e22);
        }
        .auto-input {
            margin: 15px 0;
        }
        .auto-input input {
            padding: 10px;
            width: 100px;
            text-align: center;
            background: rgba(0,0,0,0.7);
            border: 1px solid #ffcc44;
            color: #ffcc44;
            border-radius: 30px;
        }
        .status {
            margin-top: 20px;
            padding: 10px;
            background: rgba(0,0,0,0.5);
            border-radius: 30px;
            font-size: 14px;
        }
        .hidden {
            display: none;
        }
        .bet-info {
            font-size: 18px;
            margin: 15px 0;
            color: #ddd;
        }
        .bet-info span {
            color: #ffcc44;
            font-size: 24px;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-card" id="gameCard">
        <div class="rocket">🚀</div>
        <h2>R-Game CRASH</h2>
        <div class="bet-info">💰 СТАВКА: <span id="betDisplay">0</span> ₽</div>
        <div class="multiplier" id="counter">x1.00</div>
        
        <button id="cashoutBtn" class="btn-cashout">💰 ЗАБРАТЬ</button>
        
        <div class="auto-input">
            <label>🎯 АВТО-ЗАБОР при x</label>
            <input type="number" id="autoMultiplier" placeholder="2.0" step="0.1" min="1.1" max="10" value="2.0">
        </div>
        
        <button id="repeatBtn" class="btn-repeat hidden">🔄 ИГРАТЬ СНОВА</button>
        
        <div class="status" id="status">💎 Загрузка...</div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    
    const urlParams = new URLSearchParams(window.location.search);
    let currentBet = parseInt(urlParams.get('bet')) || 0;
    let crashPoint = parseFloat(urlParams.get('crash')) || 1.10;
    
    const cashoutBtn = document.getElementById('cashoutBtn');
    const repeatBtn = document.getElementById('repeatBtn');
    const betDisplay = document.getElementById('betDisplay');
    const counterDiv = document.getElementById('counter');
    const statusDiv = document.getElementById('status');
    const gameCard = document.getElementById('gameCard');
    const autoMultiplierInput = document.getElementById('autoMultiplier');
    
    let currentMultiplier = 1.0;
    let gameActive = false;
    let intervalId = null;
    let pendingCashout = false;
    let autoTarget = 2.0;
    
    betDisplay.innerText = currentBet;
    
    if (currentBet === 0) {
        statusDiv.innerHTML = '❌ Введите ставку в боте и откройте игру заново';
    } else {
        startGame();
    }
    
    function startGame() {
        if (intervalId) clearInterval(intervalId);
        currentMultiplier = 1.0;
        gameActive = true;
        pendingCashout = false;
        cashoutBtn.disabled = false;
        repeatBtn.classList.add('hidden');
        gameCard.classList.remove('crash', 'win');
        updateCounterDisplay();
        statusDiv.innerHTML = '📈 МНОЖИТЕЛЬ РАСТЁТ!';
        
        intervalId = setInterval(() => {
            if (!gameActive) return;
            currentMultiplier += 0.025;
            updateCounterDisplay();
            
            if (autoTarget && currentMultiplier >= autoTarget && !pendingCashout) {
                cashout();
            }
            
            if (currentMultiplier >= crashPoint) {
                clearInterval(intervalId);
                intervalId = null;
                gameActive = false;
                gameCard.classList.add('crash');
                counterDiv.innerHTML = `💥 x${crashPoint.toFixed(2)}`;
                cashoutBtn.disabled = true;
                repeatBtn.classList.remove('hidden');
                statusDiv.innerHTML = `💔 КРАШ! ВЫ ПРОИГРАЛИ ${currentBet}₽`;
                tg.sendData(JSON.stringify({ action: 'crash', bet: currentBet }));
            }
        }, 95);
    }
    
    function updateCounterDisplay() {
        counterDiv.innerHTML = `x${currentMultiplier.toFixed(2)}`;
    }
    
    function cashout() {
        if (!gameActive || pendingCashout) return;
        pendingCashout = true;
        clearInterval(intervalId);
        intervalId = null;
        gameActive = false;
        cashoutBtn.disabled = true;
        tg.sendData(JSON.stringify({
            action: 'cashout',
            bet: currentBet,
            multiplier: currentMultiplier
        }));
        statusDiv.innerHTML = '⏳ ОЖИДАНИЕ...';
    }
    
    cashoutBtn.onclick = cashout;
    
    repeatBtn.onclick = () => {
        if (pendingCashout) return;
        repeatBtn.disabled = true;
        statusDiv.innerHTML = '⏳ ЗАПУСКАЕМ НОВЫЙ РАУНД...';
        tg.sendData(JSON.stringify({ action: 'repeat', bet: currentBet }));
    };
    
    autoMultiplierInput.addEventListener('change', () => {
        let val = parseFloat(autoMultiplierInput.value);
        if (!isNaN(val) && val >= 1.1 && val <= 10) {
            autoTarget = val;
            statusDiv.innerHTML = `🎯 АВТО-ЗАБОР НА x${val.toFixed(2)}`;
        } else {
            autoTarget = null;
            statusDiv.innerHTML = '🎯 АВТО-ЗАБОР ОТКЛЮЧЁН';
        }
    });
    
    tg.onEvent('web_app_data', (event) => {
        try {
            const response = JSON.parse(event.data);
            if (response.action === 'repeat_ready') {
                currentBet = response.bet;
                crashPoint = response.crash_point;
                betDisplay.innerText = currentBet;
                repeatBtn.disabled = false;
                startGame();
                statusDiv.innerHTML = `🎲 НОВЫЙ РАУНД! СТАВКА ${currentBet}₽`;
            }
            else if (response.action === 'cashout_ok') {
                const winAmount = response.win;
                gameCard.classList.add('win');
                counterDiv.innerHTML = `✅ x${currentMultiplier.toFixed(2)} → ${winAmount}₽`;
                repeatBtn.classList.remove('hidden');
                statusDiv.innerHTML = `🎉 ВЫИГРЫШ! +${winAmount}₽`;
                pendingCashout = false;
            }
            else if (response.action === 'crash_ok') {
                repeatBtn.classList.remove('hidden');
                pendingCashout = false;
            }
            else if (response.status === 'error') {
                statusDiv.innerHTML = `❌ ${response.message}`;
                repeatBtn.disabled = false;
                pendingCashout = false;
            }
        } catch(e) {
            statusDiv.innerHTML = '❌ ОШИБКА СВЯЗИ';
        }
    });
</script>
</body>
</html>
