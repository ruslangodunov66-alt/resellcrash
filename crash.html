<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CRASH GAME - Resell Tycoon</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%);
            font-family: 'Segoe UI', system-ui, -apple-system, 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            color: #fff;
        }
        .game-container {
            max-width: 500px;
            width: 100%;
            background: rgba(18, 25, 45, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .balance-card {
            background: #0f1629;
            border-radius: 32px;
            padding: 12px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.3), 0 4px 8px rgba(0,0,0,0.2);
        }
        .balance-label {
            font-size: 14px;
            color: #8e9aaf;
            letter-spacing: 1px;
        }
        .balance-value {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #FFD166, #F4A261);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .multiplier-area {
            background: #00000044;
            border-radius: 60px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid rgba(255,215,0,0.3);
        }
        .multiplier {
            font-size: 64px;
            font-weight: 900;
            font-family: monospace;
            letter-spacing: 4px;
            color: #FFE484;
            text-shadow: 0 0 12px #FFB347;
        }
        .status {
            font-size: 14px;
            margin-top: 8px;
            color: #b9c2d4;
        }
        .bet-panel {
            background: #0b1020;
            border-radius: 40px;
            padding: 16px;
            margin-bottom: 20px;
        }
        .amount-input {
            width: 100%;
            padding: 14px 20px;
            font-size: 20px;
            background: #1a2340;
            border: none;
            border-radius: 60px;
            color: white;
            text-align: center;
            font-weight: bold;
            margin-bottom: 16px;
            outline: none;
        }
        .button-group {
            display: flex;
            gap: 12px;
        }
        button {
            flex: 1;
            padding: 14px 0;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            background: #2a3655;
            color: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        button:active {
            transform: scale(0.97);
        }
        .btn-bet {
            background: linear-gradient(95deg, #00b4db, #0083b0);
        }
        .btn-cashout {
            background: linear-gradient(95deg, #f09819, #ff6a00);
        }
        .btn-bet:disabled, .btn-cashout:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }
        .history-area {
            margin-top: 20px;
            background: #0a0f1c;
            border-radius: 28px;
            padding: 12px;
        }
        .history-title {
            font-size: 14px;
            margin-bottom: 10px;
            color: #8e9aaf;
            padding-left: 8px;
        }
        .history-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            max-height: 120px;
            overflow-y: auto;
        }
        .crash-point {
            background: #1e2a3e;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            color: #ffaa66;
        }
        footer {
            font-size: 11px;
            text-align: center;
            margin-top: 20px;
            color: #4a5570;
        }
        .error-msg {
            color: #ff8a7a;
            text-align: center;
            font-size: 13px;
            margin-top: 12px;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="balance-card">
        <span class="balance-label">💰 БАЛАНС</span>
        <span class="balance-value" id="balanceValue">0 ₽</span>
    </div>

    <div class="multiplier-area">
        <div class="multiplier" id="multiplierDisplay">1.00</div>
        <div class="status" id="gameStatus">⚡ Ожидание раунда</div>
    </div>

    <div class="bet-panel">
        <input type="number" id="betAmount" class="amount-input" placeholder="Сумма ставки" value="100" step="100">
        <div class="button-group">
            <button id="betBtn" class="btn-bet">📈 СДЕЛАТЬ СТАВКУ</button>
            <button id="cashoutBtn" class="btn-cashout" disabled>💸 ЗАБРАТЬ</button>
        </div>
        <div id="errorMsg" class="error-msg"></div>
    </div>

    <div class="history-area">
        <div class="history-title">📜 ИСТОРИЯ КРАШЕЙ</div>
        <div class="history-list" id="historyList">
            <div style="color:#5a6680;">— пока пусто —</div>
        </div>
    </div>
    <footer>🔁 Множитель растёт – успей забрать до краша!</footer>
</div>

<script src="https://telegram.org/js/telegram-web-app.js?56"></script>
<script>
    // --------------------------------------------------------------
    // 1. НАСТРОЙКИ ПОДКЛЮЧЕНИЯ (ПОМЕНЯЙТЕ ТОЛЬКО ЭТУ СТРОКУ)
    // --------------------------------------------------------------
    const SERVER_BASE = "https://твой-сервер.ru";   // <--- ЗАМЕНИ НА РЕАЛЬНЫЙ АДРЕС
    // --------------------------------------------------------------

    function getWebSocketUrl(userId) {
        let wsUrl = SERVER_BASE.replace(/^http/, 'ws');
        return `${wsUrl}/ws/${userId}`;
    }

    async function fetchBalance(userId) {
        try {
            const resp = await fetch(`${SERVER_BASE}/crash/balance/${userId}`);
            const data = await resp.json();
            return data.balance || 0;
        } catch (e) {
            console.warn("Ошибка загрузки баланса", e);
            return 0;
        }
    }

    // --- Telegram WebApp ---
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.enableClosingConfirmation();
    const userId = tg.initDataUnsafe?.user?.id;
    if (!userId) {
        document.getElementById('gameStatus').innerText = '❌ Ошибка: пользователь не определён';
        document.getElementById('gameStatus').style.color = "#ff8a7a";
    }

    // --- DOM элементы ---
    const balanceSpan = document.getElementById('balanceValue');
    const multiplierSpan = document.getElementById('multiplierDisplay');
    const betInput = document.getElementById('betAmount');
    const betBtn = document.getElementById('betBtn');
    const cashoutBtn = document.getElementById('cashoutBtn');
    const errorDiv = document.getElementById('errorMsg');
    const historyList = document.getElementById('historyList');

    // --- Игровые переменные ---
    let ws = null;
    let currentBalance = 0;
    let currentMultiplier = 1.00;
    let roundActive = false;      // идёт ли раунд (множитель растёт)
    let betPlaced = false;
    let myBetAmount = 0;
    let cashedOut = false;
    let currentRoundId = null;    // для отладки

    // --- Вспомогательные функции ---
    function showError(msg) {
        errorDiv.innerText = msg;
        setTimeout(() => { if (errorDiv.innerText === msg) errorDiv.innerText = ''; }, 3000);
    }

    function updateUI() {
        balanceSpan.innerText = currentBalance.toLocaleString() + ' ₽';
        multiplierSpan.innerText = currentMultiplier.toFixed(2);
        if (betPlaced && roundActive && !cashedOut) {
            cashoutBtn.disabled = false;
        } else {
            cashoutBtn.disabled = true;
        }
        if (!roundActive) {
            betBtn.disabled = false;
        } else {
            if (betPlaced) betBtn.disabled = true;
            else betBtn.disabled = false;
        }
    }

    function addCrashToHistory(point) {
        const historyDiv = document.getElementById('historyList');
        if (historyDiv.querySelector('.placeholder')) historyDiv.innerHTML = '';
        const chip = document.createElement('div');
        chip.className = 'crash-point';
        chip.innerText = `${point.toFixed(2)}x`;
        historyDiv.prepend(chip);
        while (historyDiv.children.length > 12) historyDiv.removeChild(historyDiv.lastChild);
    }

    function resetRound() {
        roundActive = false;
        betPlaced = false;
        cashedOut = false;
        myBetAmount = 0;
        currentMultiplier = 1.00;
        updateUI();
        document.getElementById('gameStatus').innerHTML = '⚡ Новый раунд скоро начнётся';
    }

    // --- WebSocket обработчики ---
    function connectWebSocket() {
        if (!userId) return;
        const wsUrl = getWebSocketUrl(userId);
        ws = new WebSocket(wsUrl);
        ws.onopen = () => {
            console.log("✅ WebSocket подключён");
            document.getElementById('gameStatus').innerHTML = '🟢 Ожидание раунда...';
            fetchBalance(userId).then(b => { currentBalance = b; updateUI(); });
        };
        ws.onmessage = (event) => {
            try {
                const msg = JSON.parse(event.data);
                switch (msg.type) {
                    case "multiplier":
                        currentMultiplier = msg.data;
                        if (roundActive === false) {
                            roundActive = true;
                            document.getElementById('gameStatus').innerHTML = '🔥 МНОЖИТЕЛЬ РАСТЁТ!';
                        }
                        updateUI();
                        break;
                    case "round_end":
                        const crashPoint = msg.crash_point;
                        addCrashToHistory(crashPoint);
                        if (betPlaced && !cashedOut) {
                            showError(`💥 КРАШ на ${crashPoint}x! Ставка ${myBetAmount}₽ проиграна.`);
                        }
                        resetRound();
                        // обновляем баланс после раунда
                        fetchBalance(userId).then(b => { currentBalance = b; updateUI(); });
                        break;
                    case "bet_placed":
                        betPlaced = true;
                        myBetAmount = msg.amount;
                        currentBalance -= myBetAmount;
                        updateUI();
                        document.getElementById('gameStatus').innerHTML = `⭐ Ставка ${myBetAmount}₽ принята. Жми ЗАБРАТЬ вовремя!`;
                        showError("");
                        break;
                    case "cashout_success":
                        const win = msg.amount;
                        cashedOut = true;
                        currentBalance = win; // сервер уже обновил баланс, но подтянем свежий
                        fetchBalance(userId).then(b => { currentBalance = b; updateUI(); });
                        document.getElementById('gameStatus').innerHTML = `🎉 ВЫ ЗАБРАЛИ ${win.toLocaleString()}₽ (x${msg.multiplier})!`;
                        betPlaced = false;
                        updateUI();
                        break;
                    case "history":
                        if (msg.data && msg.data.length) {
                            const historyDiv = document.getElementById('historyList');
                            historyDiv.innerHTML = '';
                            msg.data.slice().reverse().forEach(p => {
                                const chip = document.createElement('div');
                                chip.className = 'crash-point';
                                chip.innerText = `${p.toFixed(2)}x`;
                                historyDiv.appendChild(chip);
                            });
                        }
                        break;
                    case "error":
                        showError(msg.message || "Ошибка сервера");
                        fetchBalance(userId).then(b => { currentBalance = b; updateUI(); });
                        break;
                    default:
                        console.log("Unknown message:", msg);
                }
            } catch(e) { console.error("Ошибка парсинга WebSocket", e); }
        };
        ws.onclose = () => {
            console.log("⚠️ WebSocket закрыт, переподключение через 3 сек");
            document.getElementById('gameStatus').innerHTML = '🔴 Потеря связи, переподключение...';
            setTimeout(connectWebSocket, 3000);
        };
        ws.onerror = (err) => {
            console.error("WebSocket ошибка", err);
            showError("Ошибка соединения с сервером");
        };
    }

    // --- Действия игрока ---
    function placeBet() {
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            showError("Нет соединения с сервером. Подождите...");
            return;
        }
        if (roundActive && betPlaced) {
            showError("Ставка уже сделана в этом раунде");
            return;
        }
        if (!roundActive && betPlaced) {
            // старый флаг сброшен, но на всякий случай
            betPlaced = false;
        }
        let amount = parseInt(betInput.value);
        if (isNaN(amount) || amount <= 0) {
            showError("Введите положительную сумму");
            return;
        }
        if (amount < 50) {
            showError("Минимальная ставка 50₽");
            return;
        }
        if (amount > currentBalance) {
            showError(`Недостаточно средств! Баланс: ${currentBalance}₽`);
            return;
        }
        ws.send(JSON.stringify({ type: "place_bet", amount: amount }));
    }

    function cashout() {
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            showError("Нет соединения");
            return;
        }
        if (!roundActive) {
            showError("Раунд не активен");
            return;
        }
        if (!betPlaced || cashedOut) {
            showError("Нет активной ставки или вы уже забрали");
            return;
        }
        ws.send(JSON.stringify({ type: "cashout" }));
        // кнопка блокируется сразу, чтобы не спамить
        cashoutBtn.disabled = true;
    }

    // --- Обновление баланса по таймеру (для надёжности) ---
    async function refreshBalance() {
        if (!userId) return;
        const newBalance = await fetchBalance(userId);
        if (newBalance !== currentBalance) {
            currentBalance = newBalance;
            updateUI();
        }
    }

    // --- Инициализация ---
    function init() {
        if (!userId) {
            document.getElementById('gameStatus').innerHTML = "❌ Не удалось получить ID пользователя. Запустите через Telegram.";
            return;
        }
        connectWebSocket();
        setInterval(refreshBalance, 5000);
        betBtn.addEventListener('click', placeBet);
        cashoutBtn.addEventListener('click', cashout);
        // Telegram тема
        tg.setBackgroundColor("#0a0f1e");
        tg.setHeaderColor("bg_color");
    }

    init();
</script>
</body>
</html>
