<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>⚡ CRASH | R-GAME</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,600;0,800;1,800&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #05080d;
            --container-bg: #0d121a;
            --panel-bg: #151d29;
            --accent-blue: #1882ff;
            --accent-blue-hover: #3b95ff;
            --accent-green: #1bd15d;
            --accent-green-hover: #15b04c;
            --accent-red: #f03043;
            --accent-orange: #ff9800;
            --text-main: #e2e8f0;
            --text-muted: #8c9eb5;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            display: flex; justify-content: center;
        }

        .game-container {
            width: 100%; max-width: 800px;
            min-height: 100vh;
            background-color: var(--container-bg);
            display: flex; flex-direction: column;
            padding: 10px 10px calc(20px + var(--tg-viewport-safe-area-inset-bottom, 0px)) 10px;
        }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 5px; margin-bottom: 10px; flex-shrink: 0;
        }
        .brand { font-weight: 800; font-size: 22px; text-transform: uppercase; letter-spacing: -0.5px; font-style: italic; }
        .brand span { color: var(--accent-blue); }
        .header-actions { display: flex; gap: 8px; align-items: center; }
        .info-card {
            background: var(--panel-bg); padding: 8px 14px; border-radius: 12px;
            font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .menu-btn {
            background: var(--panel-bg); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; padding: 8px 16px; font-weight: 700;
            font-size: 14px; color: var(--text-main); cursor: pointer;
            transition: all 0.2s; font-family: 'Montserrat', sans-serif;
        }
        .menu-btn:active { transform: scale(0.95); background: var(--accent-blue); }

        .rocket-area {
            position: relative; overflow: hidden;
            border-radius: 16px; margin-bottom: 10px;
            background: #020407; height: 320px; flex-shrink: 0;
            border: 2px solid rgba(140, 158, 181, 0.15);
            box-shadow: inset 0 0 40px rgba(0,0,0,0.9);
        }
        #crashCanvas { width: 100%; height: 100%; display: block; }
        
        .center-display {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 10; width: 100%; pointer-events: none;
        }
        .multiplier-badge {
            font-size: 56px; font-weight: 800; font-style: italic;
            text-shadow: 0 0 30px rgba(255,255,255,0.3), 0 4px 20px rgba(0,0,0,0.9);
            transition: color 0.1s ease; margin-bottom: 5px;
        }
        .status-badge {
            font-size: 14px; font-weight: 700; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 2px;
            background: rgba(0,0,0,0.6); padding: 6px 16px; border-radius: 30px;
            display: inline-block; backdrop-filter: blur(6px);
        }

        .history-list {
            display: flex; gap: 6px; overflow-x: auto; padding-bottom: 5px; margin-bottom: 10px;
            scrollbar-width: none; flex-shrink: 0;
        }
        .history-list::-webkit-scrollbar { display: none; }
        .history-item {
            font-size: 13px; font-weight: 800; padding: 6px 14px; border-radius: 8px;
            font-family: 'Nunito', sans-serif; font-style: italic; flex-shrink: 0;
        }
        .history-item.low { color: #f03043; background: rgba(240, 48, 67, 0.1); border: 1px solid rgba(240, 48, 67, 0.2); }
        .history-item.medium { color: #3b95ff; background: rgba(59, 149, 255, 0.1); border: 1px solid rgba(59, 149, 255, 0.2); }
        .history-item.high { color: #ff9800; background: rgba(255, 152, 0, 0.1); border: 1px solid rgba(255, 152, 0, 0.2); }
        .history-item.epic { color: #1bd15d; background: rgba(27, 209, 93, 0.15); border: 1px solid rgba(27, 209, 93, 0.4); box-shadow: 0 0 12px rgba(27, 209, 93, 0.3); }

        .controls-area {
            background: var(--panel-bg); padding: 15px; border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.02); margin-bottom: 15px; flex-shrink: 0;
        }
        .inputs-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .input-group { flex: 1; display: flex; flex-direction: column; gap: 5px; }
        .input-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        
        .styled-input-wrapper { position: relative; }
        .styled-input {
            width: 100%; padding: 16px; padding-left: 35px;
            background: var(--container-bg); border: 2px solid #263345; border-radius: 12px;
            color: #fff; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 18px;
            transition: border-color 0.2s; appearance: none;
        }
        .styled-input:focus { outline: none; border-color: var(--accent-blue); box-shadow: 0 0 20px rgba(24,130,255,0.15); }
        .styled-input-wrapper::before {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            color: var(--text-muted); font-weight: 800; font-size: 18px;
        }
        .wrapper-rub::before { content: '₽'; }
        .wrapper-x::before { content: 'x'; }

        .action-btn {
            width: 100%; padding: 20px; border: none; border-radius: 14px;
            font-weight: 800; font-size: 20px; text-transform: uppercase; cursor: pointer;
            transition: all 0.1s ease; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
            font-family: 'Montserrat', sans-serif;
        }
        .action-btn:active { transform: translateY(2px); }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .btn-bet { background: var(--accent-blue); border-bottom: 5px solid #1066cc; box-shadow: 0 4px 20px rgba(24, 130, 255, 0.4); }
        .btn-bet:hover:not(:disabled) { background: var(--accent-blue-hover); }
        
        .btn-cancel { background: var(--accent-red); border-bottom: 5px solid #b81d2d; box-shadow: 0 4px 20px rgba(240, 48, 67, 0.4); }
        
        .btn-cashout { background: var(--accent-green); border-bottom: 5px solid #149c45; box-shadow: 0 4px 20px rgba(27, 209, 93, 0.4); }
        .btn-cashout:hover:not(:disabled) { background: var(--accent-green-hover); }
        
        .btn-subtext { font-size: 12px; font-weight: 600; opacity: 0.8; text-transform: none; font-family: 'Nunito', sans-serif; }

        .live-bets-section { flex-grow: 1; display: flex; flex-direction: column; background: var(--panel-bg); border-radius: 16px; padding: 15px; border: 1px solid rgba(255,255,255,0.02); }
        .section-title { font-size: 14px; font-weight: 800; color: var(--text-main); margin-bottom: 10px; display: flex; justify-content: space-between; }
        .online-count { color: var(--accent-green); font-size: 12px; display: flex; align-items: center; gap: 5px; }
        .online-count::before { content: ''; display: block; width: 6px; height: 6px; background: var(--accent-green); border-radius: 50%; box-shadow: 0 0 8px var(--accent-green); }
        
        .table-container { overflow-y: auto; max-height: 250px; scrollbar-width: thin; scrollbar-color: #263345 transparent; }
        .table-container::-webkit-scrollbar { width: 4px; }
        .table-container::-webkit-scrollbar-thumb { background: #263345; border-radius: 4px; }
        
        .bets-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 13px; font-weight: 600; }
        .bets-table th { color: var(--text-muted); padding-bottom: 10px; position: sticky; top: 0; background: var(--panel-bg); z-index: 2; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid #263345; }
        .bets-table td { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .bets-table tr:last-child td { border-bottom: none; }
        .col-user { width: 35%; color: #fff; }
        .col-bet { width: 25%; font-family: 'Nunito', sans-serif; }
        .col-multi { width: 20%; font-family: 'Nunito', sans-serif; text-align: right; }
        .col-profit { width: 20%; font-family: 'Nunito', sans-serif; text-align: right; font-weight: 800; }
        
        .row-cashed { background: rgba(27, 209, 93, 0.05); }
        .row-cashed .col-multi { color: var(--accent-green); }
        .row-cashed .col-profit { color: var(--accent-green); }
        .row-crashed { opacity: 0.4; }
        .row-crashed .col-multi { color: var(--accent-red); }
        
        .my-bet-row { background: rgba(24, 130, 255, 0.15) !important; border-left: 2px solid var(--accent-blue); }
    </style>
</head>
<body>
<div class="game-container">
    <div class="header">
        <div class="brand">R-<span>GAME</span></div>
        <div class="header-actions">
            <div class="info-card">Баланс: <span id="balanceDisplay" style="color: var(--accent-green);">0₽</span></div>
            <button class="menu-btn" id="menuBtn">МЕНЮ</button>
        </div>
    </div>

    <div class="history-list" id="historyList"></div>

    <div class="rocket-area">
        <div class="center-display">
            <div class="multiplier-badge" id="multiplierDisplay">1.00x</div>
            <div class="status-badge" id="statusMsg">ОЖИДАНИЕ СТАРТА</div>
        </div>
        <canvas id="crashCanvas" width="800" height="400"></canvas>
    </div>

    <div class="controls-area">
        <div class="inputs-row">
            <div class="input-group">
                <div class="input-label">Сумма ставки</div>
                <div class="styled-input-wrapper wrapper-rub">
                    <input type="number" id="betAmount" class="styled-input" min="10" max="50000" step="10" value="100">
                </div>
            </div>
            <div class="input-group">
                <div class="input-label">Авто-вывод</div>
                <div class="styled-input-wrapper wrapper-x">
                    <input type="number" id="autoTarget" class="styled-input" step="0.1" min="1.01" max="100" value="2.00">
                </div>
            </div>
        </div>
        <button id="actionBtn" class="action-btn btn-bet">
            <span>СДЕЛАТЬ СТАВКУ</span>
            <span class="btn-subtext" id="actionSubtext">На следующий раунд</span>
        </button>
    </div>

    <div class="live-bets-section">
        <div class="section-title">
            <span>Все ставки</span>
            <span class="online-count" id="onlineCount">142 онлайн</span>
        </div>
        <div class="table-container">
            <table class="bets-table">
                <thead>
                    <tr>
                        <th class="col-user">Игрок</th>
                        <th class="col-bet">Ставка</th>
                        <th class="col-multi">Коэфф.</th>
                        <th class="col-profit">Выплата</th>
                    </tr>
                </thead>
                <tbody id="betsBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    (function(){
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        if (tg.HapticFeedback) tg.enableClosingConfirmation();

        // Получаем userId из URL (если есть)
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('userId') || '';

        // DOM
        const balanceSpan = document.getElementById('balanceDisplay');
        const multiplierDisplay = document.getElementById('multiplierDisplay');
        const statusMsg = document.getElementById('statusMsg');
        const historyList = document.getElementById('historyList');
        const betInput = document.getElementById('betAmount');
        const autoInput = document.getElementById('autoTarget');
        const actionBtn = document.getElementById('actionBtn');
        const actionSubtext = document.getElementById('actionSubtext');
        const betsBody = document.getElementById('betsBody');
        const onlineCount = document.getElementById('onlineCount');
        const menuBtn = document.getElementById('menuBtn');
        const canvas = document.getElementById('crashCanvas');
        const ctx = canvas.getContext('2d');

        // === БАЛАНС ===
        let casinoBalance = parseInt(localStorage.getItem('casinoBalance'));
        if (isNaN(casinoBalance) || casinoBalance < 10) casinoBalance = 10000;
        
        function updateBalance(amount) {
            casinoBalance += amount;
            localStorage.setItem('casinoBalance', String(casinoBalance));
            balanceSpan.innerText = casinoBalance.toLocaleString() + ' ₽';
        }
        // Инициализация отображения
        updateBalance(0);

        // === ИСТОРИЯ ===
        let history = JSON.parse(localStorage.getItem('crash_history')) || [1.2, 4.5, 1.05, 2.3, 15.0];
        function renderHistory() {
            historyList.innerHTML = '';
            history.slice(0, 15).forEach(val => {
                const el = document.createElement('div');
                el.className = 'history-item';
                el.innerText = val.toFixed(2) + 'x';
                if (val < 1.5) el.classList.add('low');
                else if (val < 3.0) el.classList.add('medium');
                else if (val < 10.0) el.classList.add('high');
                else el.classList.add('epic');
                historyList.appendChild(el);
            });
        }
        function addHistory(val) {
            history.unshift(val);
            if (history.length > 20) history.pop();
            localStorage.setItem('crash_history', JSON.stringify(history));
            renderHistory();
        }
        renderHistory();

        // === БОТЫ ===
        const botNames = ["Alex_99", "CryptoKing", "LuckyStrike", "ProGamer", "MaxBet", "Ivan_1337", "Shadow", "Luna", "Star_Lord", "xX_Sniper_Xx", "RichGuy", "Whale", "NoobMaster", "Trader_Joe", "Kira", "Viper", "Phoenix", "Rocket", "Nebula", "Cosmos"];

        function generateBots() {
            const count = Math.floor(Math.random() * 15) + 12;
            onlineCount.innerText = (count + Math.floor(Math.random() * 200) + 50) + ' онлайн';
            const newBots = [];
            for(let i=0; i<count; i++) {
                const betOptions = [50, 75, 100, 150, 200, 250, 300, 400, 500, 700, 1000, 1500, 2000, 3000, 5000, 10000];
                const bet = betOptions[Math.floor(Math.random() * betOptions.length)];
                let target;
                const r = Math.random();
                if(r < 0.3) target = 1.05 + Math.random() * 0.3;
                else if(r < 0.6) target = 1.4 + Math.random() * 0.8;
                else if(r < 0.85) target = 2.2 + Math.random() * 3.0;
                else if(r < 0.97) target = 5.0 + Math.random() * 8.0;
                else target = 15.0 + Math.random() * 40.0;
                const name = botNames[Math.floor(Math.random() * botNames.length)] + Math.floor(Math.random()*100);
                newBots.push({ id: 'bot_' + i, name, bet, target, cashed: false, crashed: false });
            }
            newBots.sort((a,b) => b.bet - a.bet);
            return newBots;
        }

        let bots = [];

        function renderBetsTable() {
            betsBody.innerHTML = '';
            if (userBetQueued || userBetActive) {
                let statusHtml = '<td class="col-multi">—</td><td class="col-profit">—</td>';
                let trClass = 'my-bet-row';
                if (userBetActive && !userBetQueued) {
                    statusHtml = `<td class="col-multi">${currentMulti.toFixed(2)}x</td><td class="col-profit">${(userBetAmount * currentMulti).toFixed(0)}₽</td>`;
                }
                betsBody.innerHTML += `
                    <tr class="${trClass}">
                        <td class="col-user">👤 Вы</td>
                        <td class="col-bet">${userBetAmount}₽</td>
                        ${statusHtml}
                    </tr>
                `;
            }
            bots.forEach(bot => {
                let statusHtml = '<td class="col-multi">—</td><td class="col-profit">—</td>';
                let rowClass = '';
                if (bot.cashed) {
                    rowClass = 'row-cashed';
                    statusHtml = `<td class="col-multi">${bot.target.toFixed(2)}x</td><td class="col-profit">${(bot.bet * bot.target).toFixed(0)}₽</td>`;
                } else if (bot.crashed) {
                    rowClass = 'row-crashed';
                    statusHtml = `<td class="col-multi">💥</td><td class="col-profit">-${bot.bet}₽</td>`;
                } else if (gameState === 'FLYING') {
                    statusHtml = `<td class="col-multi" style="color:var(--text-muted)">Летит...</td><td class="col-profit" style="color:var(--text-muted)">${(bot.bet * currentMulti).toFixed(0)}₽</td>`;
                }
                betsBody.innerHTML += `
                    <tr class="${rowClass}">
                        <td class="col-user">${bot.name}</td>
                        <td class="col-bet">${bot.bet}₽</td>
                        ${statusHtml}
                    </tr>
                `;
            });
        }

        // === СОСТОЯНИЕ ИГРЫ ===
        let gameState = 'WAITING'; // WAITING, FLYING, CRASHED
        let countdown = 10.0;
        let currentMulti = 1.0;
        let crashPoint = 1.0;
        
        let userBetQueued = false;
        let userBetActive = false;
        let userBetAmount = 0;
        let userAutoCashout = 2.0;

        function updateControls() {
            if (gameState === 'WAITING') {
                betInput.disabled = false;
                if (userBetQueued) {
                    actionBtn.className = 'action-btn btn-cancel';
                    actionBtn.innerHTML = `<span>ОТМЕНИТЬ</span><span class="btn-subtext">Ставка ${userBetAmount}₽ принята</span>`;
                    actionBtn.disabled = false;
                } else {
                    actionBtn.className = 'action-btn btn-bet';
                    actionBtn.innerHTML = `<span>СДЕЛАТЬ СТАВКУ</span><span class="btn-subtext">На следующий раунд</span>`;
                    const amt = parseInt(betInput.value || 0);
                    actionBtn.disabled = (casinoBalance < amt || amt < 10);
                }
            } else if (gameState === 'FLYING') {
                betInput.disabled = true;
                if (userBetActive) {
                    actionBtn.className = 'action-btn btn-cashout';
                    let currentWin = Math.floor(userBetAmount * currentMulti);
                    actionBtn.innerHTML = `<span>ЗАБРАТЬ</span><span class="btn-subtext">${currentWin}₽</span>`;
                    actionBtn.disabled = false;
                } else {
                    actionBtn.className = 'action-btn btn-bet';
                    actionBtn.innerHTML = `<span>ОЖИДАЙТЕ</span><span class="btn-subtext">Идет полет</span>`;
                    actionBtn.disabled = true;
                }
            } else if (gameState === 'CRASHED') {
                actionBtn.disabled = true;
                if (userBetQueued) {
                    actionBtn.className = 'action-btn btn-cancel';
                    actionBtn.innerHTML = `<span>ОЖИДАЙТЕ</span><span class="btn-subtext">Подготовка...</span>`;
                } else {
                    actionBtn.className = 'action-btn btn-bet';
                    actionBtn.innerHTML = `<span>КРАШ</span><span class="btn-subtext">Ожидайте след. раунд</span>`;
                }
            }
        }

        actionBtn.onclick = () => {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            if (gameState === 'WAITING') {
                if (userBetQueued) {
                    // Отмена
                    userBetQueued = false;
                    updateBalance(userBetAmount); // Возврат
                    updateControls();
                    renderBetsTable();
                } else {
                    // Постановка
                    let amt = parseInt(betInput.value);
                    if (isNaN(amt) || amt < 10) return;
                    if (amt > casinoBalance) return;
                    userBetAmount = amt;
                    userAutoCashout = parseFloat(autoInput.value) || 2.0;
                    userBetQueued = true;
                    updateBalance(-userBetAmount); // Списание
                    updateControls();
                    renderBetsTable();
                }
            } else if (gameState === 'FLYING' && userBetActive) {
                cashoutUser();
            }
        };

        function cashoutUser() {
            if (!userBetActive) return;
            userBetActive = false;
            let winAmount = Math.floor(userBetAmount * currentMulti);
            updateBalance(winAmount);
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            updateControls();
            renderBetsTable();
        }

        function generateCrash() {
            const r = Math.random();
            if (r < 0.05) return 1.00;
            if (r < 0.40) return 1.01 + Math.random() * 0.99;
            if (r < 0.70) return 2.00 + Math.random() * 3.00;
            if (r < 0.90) return 5.00 + Math.random() * 5.00;
            return 10.0 + Math.random() * 40.0;
        }

        let lastTime = performance.now();
        
        function setWaitingPhase() {
            gameState = 'WAITING';
            countdown = 10.0;
            currentMulti = 1.0;
            multiplierDisplay.innerText = countdown.toFixed(1) + 's';
            multiplierDisplay.style.color = 'var(--text-main)';
            statusMsg.innerText = 'Прием ставок';
            statusMsg.style.color = 'var(--text-muted)';
            bots = generateBots();
            renderBetsTable();
            updateControls();
            rocketY = 350;
            explosionAlpha = 0;
            particles = [];
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        function startFlight() {
            gameState = 'FLYING';
            crashPoint = generateCrash();
            currentMulti = 1.0;
            statusMsg.innerText = 'Ракета в полете';
            statusMsg.style.color = 'var(--accent-blue)';
            if (userBetQueued) {
                userBetActive = true;
                userBetQueued = false;
            }
            updateControls();
        }

        function handleCrash() {
            gameState = 'CRASHED';
            multiplierDisplay.style.color = 'var(--accent-red)';
            statusMsg.innerText = 'ВЗОРВАЛАСЬ НА ' + currentMulti.toFixed(2) + 'x';
            statusMsg.style.color = 'var(--accent-red)';
            if (userBetActive) {
                userBetActive = false;
                // При краше ставка уже списана, ничего не возвращаем
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
            }
            bots.forEach(b => { if (!b.cashed) b.crashed = true; });
            addHistory(currentMulti);
            triggerExplosion();
            updateControls();
            renderBetsTable();
            setTimeout(setWaitingPhase, 3000);
        }

        function gameLoop(now) {
            let dt = Math.min((now - lastTime) / 1000, 0.05);
            lastTime = now;
            if (gameState === 'WAITING') {
                countdown -= dt;
                multiplierDisplay.innerText = Math.max(0, countdown).toFixed(1) + 's';
                if (countdown <= 0) startFlight();
            } 
            else if (gameState === 'FLYING') {
                let increment = dt * (0.1 + (currentMulti - 1) * 0.15);
                currentMulti += increment;
                let tableNeedsUpdate = false;
                bots.forEach(b => {
                    if (!b.cashed && !b.crashed && currentMulti >= b.target) {
                        b.cashed = true;
                        tableNeedsUpdate = true;
                    }
                });
                if (userBetActive && currentMulti >= userAutoCashout) {
                    cashoutUser();
                    tableNeedsUpdate = true;
                }
                multiplierDisplay.innerText = currentMulti.toFixed(2) + 'x';
                if (currentMulti < 2) multiplierDisplay.style.color = '#fff';
                else if (currentMulti < 5) multiplierDisplay.style.color = 'var(--accent-blue)';
                else if (currentMulti < 10) multiplierDisplay.style.color = 'var(--accent-orange)';
                else multiplierDisplay.style.color = 'var(--accent-green)';
                if (tableNeedsUpdate) renderBetsTable();
                updateControls();
                if (currentMulti >= crashPoint) {
                    currentMulti = crashPoint;
                    multiplierDisplay.innerText = currentMulti.toFixed(2) + 'x';
                    handleCrash();
                }
            }
            drawFrame(dt);
            requestAnimationFrame(gameLoop);
        }

        // ===== ГРАФИКА =====
        let stars = Array.from({length: 120}, () => ({
            x: Math.random() * 800, y: Math.random() * 400,
            s: Math.random() * 2 + 0.5, spd: Math.random() * 2 + 0.5
        }));
        let particles = [];
        let rocketY = 350;
        let explosionAlpha = 0;
        let bgOffset = 0;

        function triggerExplosion() {
            explosionAlpha = 1.0;
            for(let i=0; i<100; i++) {
                let a = Math.random() * Math.PI * 2;
                let v = Math.random() * 20 + 10;
                particles.push({
                    x: canvas.width/2, y: rocketY,
                    vx: Math.cos(a)*v, vy: Math.sin(a)*v,
                    life: 1.0, color: Math.random()>0.5?'#f03043':'#ff9800', size: Math.random()*12+4
                });
            }
        }

        function drawFrame(dt) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            let speed = gameState === 'FLYING' ? (1 + currentMulti * 0.5) : 0.2;
            bgOffset += speed * 60 * dt;
            
            let grad = ctx.createRadialGradient(400, 200, 100, 400, 200, 500);
            grad.addColorStop(0, '#0a1420');
            grad.addColorStop(1, '#020407');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 800, 400);

            ctx.strokeStyle = 'rgba(255,255,255,0.03)';
            ctx.lineWidth = 1;
            for(let i=0; i<800; i+=80) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,400); ctx.stroke(); }
            for(let i=(bgOffset%80)-80; i<400; i+=80) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(800,i); ctx.stroke(); }
            
            ctx.strokeStyle = 'rgba(255,255,255,0.08)';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(0, 380); ctx.lineTo(800, 380); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(50, 0); ctx.lineTo(50, 400); ctx.stroke();

            ctx.fillStyle = '#fff';
            stars.forEach(s => {
                s.y += s.spd * speed * 60 * dt;
                if(s.y > 400) { s.y = -10; s.x = Math.random()*800; }
                ctx.globalAlpha = Math.random() * 0.6 + 0.2;
                ctx.fillRect(s.x, s.y, s.s, s.s);
            });
            ctx.globalAlpha = 1.0;

            // График (только линия, без точки)
            if (gameState === 'FLYING') {
                let progress = (currentMulti - 1) / 10;
                ctx.strokeStyle = 'var(--accent-blue)';
                ctx.lineWidth = 4;
                ctx.shadowBlur = 20;
                ctx.shadowColor = 'var(--accent-blue)';
                ctx.beginPath();
                ctx.moveTo(50, 380);
                for(let t=0; t<=progress; t+=0.01) {
                    let px = 50 + t * 700;
                    let py = 380 - t * 300;
                    ctx.lineTo(px, py);
                }
                ctx.stroke();
                ctx.shadowBlur = 0;
            }

            // Частицы
            for(let i=particles.length-1; i>=0; i--) {
                let p = particles[i];
                p.x += p.vx * dt * 1.5;
                p.y += p.vy * dt * 1.5;
                p.life -= dt * 1.5;
                p.size *= 0.98;
                if(p.life <= 0) particles.splice(i, 1);
                else {
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, Math.max(p.size, 0.5), 0, Math.PI*2);
                    ctx.fill();
                }
            }
            ctx.globalAlpha = 1.0;
            ctx.shadowBlur = 0;

            // ===== РАКЕТА (улучшенная, без белой точки) =====
            if (gameState !== 'CRASHED') {
                ctx.save();
                ctx.translate(canvas.width/2, rocketY);
                if (gameState === 'FLYING' && currentMulti > 2) {
                    ctx.translate((Math.random()-0.5)*3, (Math.random()-0.5)*3);
                }
                ctx.scale(1.6, 1.6);
                ctx.rotate(-Math.PI/2);

                ctx.shadowBlur = 30;
                ctx.shadowColor = 'var(--accent-blue)';

                // Крылья
                ctx.fillStyle = '#111822';
                ctx.strokeStyle = '#263345';
                ctx.lineWidth = 1.5;
                // Нижнее крыло
                ctx.beginPath();
                ctx.moveTo(-18, 12);
                ctx.lineTo(-12, 26);
                ctx.lineTo(6, 26);
                ctx.lineTo(0, 12);
                ctx.closePath();
                ctx.fill(); ctx.stroke();
                // Верхнее крыло
                ctx.beginPath();
                ctx.moveTo(-18, -12);
                ctx.lineTo(-12, -26);
                ctx.lineTo(6, -26);
                ctx.lineTo(0, -12);
                ctx.closePath();
                ctx.fill(); ctx.stroke();

                // Корпус (градиент)
                let grad2 = ctx.createLinearGradient(-30, 0, 40, 0);
                grad2.addColorStop(0, '#8c9eb5');
                grad2.addColorStop(0.3, '#ffffff');
                grad2.addColorStop(0.7, '#ffffff');
                grad2.addColorStop(1, '#8c9eb5');
                ctx.fillStyle = grad2;
                ctx.shadowBlur = 20;
                ctx.shadowColor = 'rgba(255,255,255,0.3)';
                ctx.beginPath();
                ctx.moveTo(-30, -10);
                ctx.lineTo(18, -10);
                ctx.lineTo(45, 0);
                ctx.lineTo(18, 10);
                ctx.lineTo(-30, 10);
                ctx.closePath();
                ctx.fill();

                // Синяя полоса
                ctx.fillStyle = 'var(--accent-blue)';
                ctx.shadowBlur = 15;
                ctx.shadowColor = 'var(--accent-blue)';
                ctx.fillRect(-6, -10, 10, 20);

                // Иллюминатор
                ctx.fillStyle = '#d6e6f2';
                ctx.shadowBlur = 20;
                ctx.shadowColor = 'rgba(255,255,255,0.5)';
                ctx.beginPath();
                ctx.arc(14, 0, 6, 0, Math.PI*2);
                ctx.fill();
                ctx.strokeStyle = '#2d3e50';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(13, -2, 2, 0, Math.PI*2);
                ctx.fill();

                // Сопло
                ctx.fillStyle = '#151d29';
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.moveTo(-30, -6);
                ctx.lineTo(-38, -9);
                ctx.lineTo(-38, 9);
                ctx.lineTo(-30, 6);
                ctx.closePath();
                ctx.fill();

                // Огонь
                if (gameState === 'FLYING') {
                    ctx.fillStyle = 'var(--accent-orange)';
                    ctx.shadowBlur = 40;
                    ctx.shadowColor = 'var(--accent-orange)';
                    ctx.beginPath();
                    ctx.moveTo(-38, -8);
                    ctx.lineTo(-38 - (25+Math.random()*20), 0);
                    ctx.lineTo(-38, 8);
                    ctx.fill();
                    ctx.fillStyle = '#fff9c4';
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = '#fff9c4';
                    ctx.beginPath();
                    ctx.moveTo(-38, -4);
                    ctx.lineTo(-38 - (15+Math.random()*15), 0);
                    ctx.lineTo(-38, 4);
                    ctx.fill();
                }

                ctx.restore();
            }

            // Вспышка взрыва
            if (explosionAlpha > 0) {
                ctx.fillStyle = `rgba(240, 48, 67, ${explosionAlpha * 0.4})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.shadowBlur = 100;
                ctx.shadowColor = 'var(--accent-red)';
                ctx.strokeStyle = `rgba(240, 48, 67, ${explosionAlpha})`;
                ctx.lineWidth = 15 * explosionAlpha;
                ctx.beginPath();
                ctx.arc(canvas.width/2, rocketY, (1-explosionAlpha)*300, 0, Math.PI*2);
                ctx.stroke();
                explosionAlpha -= dt * 0.8;
                if(explosionAlpha < 0) explosionAlpha = 0;
                ctx.shadowBlur = 0;
            }
        }

        // === КНОПКА МЕНЮ ===
        menuBtn.onclick = () => {
            // Переходим в лобби с текущим балансом
            window.location.href = 'casino.html?userId=' + userId + '&balance=' + casinoBalance;
        };

        // Запуск
        setWaitingPhase();
        requestAnimationFrame(gameLoop);
    })();
</script>
</body>
</html>
