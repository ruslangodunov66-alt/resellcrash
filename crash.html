<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>⚡ CRASH | R-GAME</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,600;0,800;1,800&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0f16;
            --container-bg: #111822;
            --panel-bg: #1a2332;
            --accent-blue: #1882ff;
            --accent-blue-hover: #3b95ff;
            --accent-green: #1bd15d;
            --accent-red: #f03043;
            --accent-orange: #ff9800;
            --text-main: #e2e8f0;
            --text-muted: #8c9eb5;
            --cell-bg: #212c3d;
            --cell-shadow: #141b26;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; padding: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
            display: flex; justify-content: center;
        }

        .game-container {
            width: 100%; max-width: 800px;
            height: 100vh; height: -webkit-fill-available;
            background-color: var(--container-bg);
            display: flex; flex-direction: column;
            padding: 10px 10px calc(10px + var(--tg-viewport-safe-area-inset-bottom, 0px)) 10px;
        }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 5px; margin-bottom: 10px;
        }
        .brand { font-weight: 800; font-size: 20px; text-transform: uppercase; letter-spacing: -0.5px; }
        .brand span { color: var(--accent-blue); }
        .info-card {
            background: var(--panel-bg);
            padding: 8px 14px; border-radius: 12px;
            font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .rocket-area {
            flex-grow: 1; min-height: 200px; max-height: 450px;
            position: relative; overflow: hidden;
            border-radius: 16px; margin-bottom: 10px;
            background: #060b13;
            border: 2px solid rgba(140, 158, 181, 0.1);
        }
        #crashCanvas { width: 100%; height: 100%; display: block; }
        .multiplier-badge {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            font-size: 40px; font-weight: 800; text-align: center; font-style: italic;
            text-shadow: 0 0 10px rgba(255,255,255,0.6), 0 4px 10px rgba(0,0,0,0.5);
            transition: color 0.1s ease, transform 0.05s linear;
        }
        .best-score {
            position: absolute; bottom: 8px; right: 12px;
            background: rgba(26, 35, 50, 0.8);
            padding: 4px 8px; border-radius: 8px;
            font-size: 11px; font-weight: 700; color: var(--text-muted);
            backdrop-filter: blur(2px);
        }

        .dashboard-panel {
            background: var(--panel-bg); border-radius: 14px;
            display: flex; gap: 10px; padding: 12px; margin-bottom: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .dash-item { flex: 1; }
        .dash-label { font-size: 10px; font-weight: 600; text-transform: uppercase; color: var(--text-muted); margin-bottom: 3px; }
        .dash-val { font-size: 16px; font-weight: 800; font-family: 'Nunito', sans-serif; word-break: break-all; }

        .controls-area { margin-bottom: 10px; background: var(--panel-bg); padding: 15px; border-radius: 16px; }
        .bet-control-row { display: flex; gap: 10px; margin-bottom: 12px; }
        .bet-input-wrapper { flex-grow: 1; position: relative; }
        #betAmount {
            width: 100%; padding: 14px; padding-left: 30px;
            background: var(--bg-dark); border: 1.5px solid #263345; border-radius: 12px;
            color: #fff; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 18px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
            appearance: none; -moz-appearance: textfield;
        }
        #betAmount::-webkit-inner-spin-button, #betAmount::-webkit-outer-spin-button { appearance: none; margin: 0; }
        .bet-input-wrapper::before { content: '₽'; position: absolute; left: 12px; top: 16px; color: var(--text-muted); font-weight: 600; }
        .btn-main {
            padding: 14px 24px; border: none; border-radius: 12px;
            font-weight: 800; font-size: 16px; text-transform: uppercase; cursor: pointer;
            transition: 0.1s transform ease, 0.1s box-shadow ease; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }
        .btn-main:active { transform: translateY(1.5px); box-shadow: 0 1px 2px rgba(0,0,0,0.2) !important; }
        .btn-main:disabled { background: #3d4957 !important; border-color: #3d4957 !important; cursor: not-allowed; opacity: 0.6; pointer-events: none;}
        .btn-start { background: var(--accent-blue); border-bottom: 4px solid #1066cc; box-shadow: 0 4px 0 #1066cc, 0 5px 10px rgba(0,0,0,0.2); }
        .btn-start:hover:not(:disabled) { background: var(--accent-blue-hover); }
        .btn-cashout { background: var(--accent-green); border-bottom: 4px solid #149c45; box-shadow: 0 4px 0 #149c45, 0 5px 10px rgba(0,0,0,0.2); }
        .auto-panel { display: flex; align-items: center; justify-content: space-between; font-size: 13px; color: var(--text-muted); font-weight: 600; }
        .auto-input {
            width: 80px; padding: 6px 10px;
            background: var(--bg-dark); border: 1px solid #263345; border-radius: 8px;
            color: var(--accent-blue); font-weight: 800; font-family: 'Nunito', sans-serif; font-size: 14px; text-align: center; margin-left: 8px;
        }

        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn-exit {
            width: 100%; margin-bottom: 12px; padding: 14px;
            background: #212c3d; border: none; border-bottom: 3px solid rgba(0,0,0,0.2); border-radius: 12px;
            color: #fff; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.1s opacity;
        }
        .btn-exit:hover { opacity: 0.8; }
        .btn-exit:active { transform: translateY(1px); border-bottom: 2px solid rgba(0,0,0,0.2); }

        .history { padding: 0 5px; margin-bottom: 10px; }
        .history-title { font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
        .history-list {
            display: flex; gap: 6px; flex-wrap: wrap;
            max-height: 40px; overflow-y: hidden; transition: max-height 0.3s;
        }
        .history-item {
            font-size: 12px; font-weight: 800; padding: 4px 8px; border-radius: 6px;
            font-family: 'Nunito', sans-serif; font-style: italic;
        }
        .history-item.low { color: #f03043; background: rgba(240, 48, 67, 0.12); }
        .history-item.medium { color: #3b95ff; background: rgba(59, 149, 255, 0.15); }
        .history-item.high { color: #ff9800; background: rgba(255, 152, 0, 0.15); }
        .history-item.epic { color: #1bd15d; background: rgba(27, 209, 93, 0.15); box-shadow: 0 0 4px rgba(27, 209, 93, 0.4); }

        .status {
            text-align: center; font-size: 13px; font-weight: 600; color: var(--text-muted);
            min-height: 1.2em;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="header">
        <div class="brand">R-<span>GAME</span></div>
        <div class="info-card">Баланс: <span id="balanceDisplay" style="color: var(--accent-green);">0₽</span></div>
    </div>

    <div class="rocket-area">
        <div class="multiplier-badge" id="multiplierDisplay">1.00x</div>
        <canvas id="crashCanvas" width="800" height="450"></canvas>
        <div class="best-score" id="bestMultiplier">🏆 РЕКОРД: 1.00x</div>
    </div>

    <div class="dashboard-panel">
        <div class="dash-item">
            <div class="dash-label">Последний результат</div>
            <div class="dash-val" id="lastGameResult">—</div>
        </div>
        <div class="dash-item" style="text-align: right;">
            <div class="dash-label">Статус соединения</div>
            <div class="dash-val" style="color: var(--accent-blue); font-size:14px;">📡 ОНЛАЙН</div>
        </div>
    </div>

    <div class="controls-area">
        <div class="bet-control-row">
            <div class="bet-input-wrapper">
                <input type="number" id="betAmount" min="10" max="5000" step="10" value="100">
            </div>
            <button id="betButton" class="btn-main btn-start">СТАРТ</button>
            <button id="cashoutButton" class="btn-main btn-cashout" disabled>ЗАБРАТЬ</button>
        </div>
        <div class="auto-panel">
            <label for="autoTarget">🎯 Авто-вывод при коэффициенте:</label>
            <input type="number" id="autoTarget" class="auto-input" step="0.1" min="1.01" max="100" value="2.0">
        </div>
    </div>

    <div class="btn-group">
        <button id="menuButton" class="btn-exit">МЕНЮ</button>
        <button id="exitButton" class="btn-exit">ВЫЙТИ</button>
    </div>

    <div class="history">
        <div class="history-title">📡 История крайних полетов</div>
        <div class="history-list" id="historyList">—</div>
    </div>

    <div class="status" id="statusMsg">Готовы к запуску шаттла. Сделайте ставку.</div>
</div>

<script>
    (function(){
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        if (tg.HapticFeedback) tg.enableClosingConfirmation();

        let userId = null;
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('userId')) userId = urlParams.get('userId');
        else if (tg.initDataUnsafe?.user?.id) userId = tg.initDataUnsafe.user.id;

        // DOM
        const betInput = document.getElementById('betAmount');
        const startBtn = document.getElementById('betButton');
        const cashoutBtn = document.getElementById('cashoutButton');
        const exitBtn = document.getElementById('exitButton');
        const menuBtn = document.getElementById('menuButton');
        const multiplierSpan = document.getElementById('multiplierDisplay');
        const historyDiv = document.getElementById('historyList');
        const statusSpan = document.getElementById('statusMsg');
        const bestSpan = document.getElementById('bestMultiplier');
        const autoTargetInput = document.getElementById('autoTarget');
        const lastGameResultSpan = document.getElementById('lastGameResult');
        const balanceSpan = document.getElementById('balanceDisplay');
        const canvas = document.getElementById('crashCanvas');
        const ctx = canvas.getContext('2d');

        // ===== БАЛАНС ИЗ localStorage =====
        let casinoBalance = parseInt(localStorage.getItem('casinoBalance')) || 0;
        balanceSpan.innerText = casinoBalance.toLocaleString() + ' ₽';

        function updateBalanceDisplay(newBalance) {
            casinoBalance = newBalance;
            localStorage.setItem('casinoBalance', String(casinoBalance));
            balanceSpan.innerText = casinoBalance.toLocaleString() + ' ₽';
        }

        // ===== НАСТРОЙКИ ИГРЫ =====
        let autoTarget = 2.0;
        autoTargetInput.addEventListener('change', () => {
            let val = parseFloat(autoTargetInput.value);
            if (!isNaN(val) && val >= 1.01) autoTarget = val;
            else autoTarget = null;
        });

        let bestMulti = parseFloat(localStorage.getItem('crash_best_rg')) || 1.0;
        bestSpan.innerText = `🏆 РЕКОРД: ${bestMulti.toFixed(2)}x`;

        // Переменные состояния
        let currentBet = 0;
        let hasBet = false;
        let hasCashedOut = false;
        let currentMulti = 1.0;
        let crashPoint = 1.01;
        let animFrame = null;
        let multiplierInterval = null;
        let gameActive = false;
        let explosionActive = false;
        let flashAlpha = 0;
        let shake = 0;
        let lastTime = 0;

        // Графика
        let stars = [];
        let planets = [];
        let particles = [];
        let graphPoints = [];
        let rocket = { x: 80, y: 390, targetX: 80, targetY: 390, angle: 0 };

        // Звуки
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx && window.AudioContext) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                document.body.addEventListener('touchstart', () => audioCtx?.resume(), { once: true });
                document.body.addEventListener('click', () => audioCtx?.resume(), { once: true });
            }
        }
        function playTone(freq, duration, vol = 0.08, type = 'sine') {
            if (!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }
        function soundClick() { playTone(500, 0.05, 0.05); }
        function soundStart() { playTone(440, 0.15, 0.08); setTimeout(() => playTone(554, 0.15, 0.08), 80); setTimeout(() => playTone(659, 0.25, 0.1), 160); }
        function soundCashout() { playTone(880, 0.1, 0.08); setTimeout(() => playTone(1320, 0.15, 0.08), 80); }
        function soundCrash() { playTone(180, 0.4, 0.2, 'sawtooth'); playTone(90, 0.5, 0.15); }
        function soundError() { playTone(280, 0.25, 0.12, 'sawtooth'); }

        function vibrate(style = 'light') {
            if (tg.HapticFeedback) {
                if (style === 'light') tg.HapticFeedback.impactOccurred('light');
                else if (style === 'medium') tg.HapticFeedback.impactOccurred('medium');
                else if (style === 'success') tg.HapticFeedback.notificationOccurred('success');
                else if (style === 'error) tg.HapticFeedback.notificationOccurred('error');
            }
        }

        // Инициализация фона
        function initBackground() {
            stars = [];
            for (let i = 0; i < 80; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: 1 + Math.random() * 2,
                    speed: 0.5 + Math.random() * 1.5
                });
            }
            planets = [
                { x: 700, y: 100, radius: 25, color: '#3b95ff', speed: 0.1 },
                { x: 300, y: -50, radius: 45, color: '#1a2332', speed: 0.05 }
            ];
        }

        function updateFlight(deltaTime) {
            let speedMod = 1 + (currentMulti - 1) * 0.4;
            let step = (deltaTime / 16) * speedMod;
            for (let s of stars) {
                s.x -= s.speed * step * 0.8;
                s.y += s.speed * step * 0.5;
                if (s.x < 0) s.x = canvas.width;
                if (s.y > canvas.height) s.y = 0;
            }
            for (let p of planets) {
                p.x -= p.speed * step;
                if (p.x + p.radius < 0) {
                    p.x = canvas.width + p.radius;
                    p.y = Math.random() * (canvas.height - 100);
                }
            }
            if (gameActive && !explosionActive) {
                let progress = Math.min(1, (currentMulti - 1) / 4);
                rocket.targetX = 80 + (canvas.width - 200) * Math.min(progress * 1.3, 0.9);
                rocket.targetY = 390 - (canvas.height - 160) * Math.pow(progress, 0.7);
                rocket.x += (rocket.targetX - rocket.x) * 0.1;
                rocket.y += (rocket.targetY - rocket.y) * 0.1;
                rocket.y += Math.sin(Date.now() / 100) * 0.8;
                if (graphPoints.length > 0) {
                    let lastP = graphPoints[graphPoints.length - 1];
                    let dx = rocket.x - lastP.x;
                    let dy = rocket.y - lastP.y;
                    if(Math.abs(dx) > 0.1) rocket.angle = Math.atan2(dy, dx);
                }
                graphPoints.push({ x: rocket.x, y: rocket.y });
                if (Math.random() < 0.4) {
                    particles.push({
                        x: rocket.x - Math.cos(rocket.angle) * 20,
                        y: rocket.y - Math.sin(rocket.angle) * 20,
                        vx: -Math.cos(rocket.angle) * (1 + Math.random() * 3) - (Math.random() - 0.5),
                        vy: -Math.sin(rocket.angle) * (1 + Math.random() * 3) - (Math.random() - 0.5),
                        life: 1.0,
                        size: 3 + Math.random() * 5,
                        color: Math.random() > 0.5 ? 'var(--accent-orange)' : 'var(--accent-red)'
                    });
                }
            }
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                if (p.life <= 0) particles.splice(i, 1);
            }
            if (shake > 0) shake -= 0.2;
            if (flashAlpha > 0) flashAlpha -= 0.04;
        }

        function triggerExplosion(x, y) {
            explosionActive = true;
            flashAlpha = 0.7;
            shake = 8;
            particles = [];
            for (let i = 0; i < 70; i++) {
                let ang = Math.random() * Math.PI * 2;
                let spd = 2 + Math.random() * 7;
                particles.push({
                    x: x, y: y,
                    vx: Math.cos(ang) * spd,
                    vy: Math.sin(ang) * spd,
                    life: 1.0,
                    size: 4 + Math.random() * 8,
                    color: `hsl(${15 + Math.random() * 30}, 100%, ${50 + Math.random() * 20}%)`
                });
            }
            vibrate('error');
        }

        function draw() {
            ctx.save();
            if (shake > 0) ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#060b13';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            for (let p of planets) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
            }
            for (let s of stars) {
                ctx.fillStyle = `rgba(255, 255, 255, ${0.3 + Math.random() * 0.4})`;
                ctx.fillRect(s.x, s.y, s.size, s.size);
            }
            ctx.strokeStyle = 'rgba(140, 158, 181, 0.08)';
            ctx.lineWidth = 1;
            for(let g = 50; g < canvas.width; g += 80) {
                ctx.beginPath(); ctx.moveTo(g, 0); ctx.lineTo(g, 390); ctx.stroke();
            }
            for(let g = 50; g < canvas.height; g += 60) {
                ctx.beginPath(); ctx.moveTo(80, g); ctx.lineTo(canvas.width, g); ctx.stroke();
            }
            ctx.strokeStyle = 'rgba(140, 158, 181, 0.2)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(80, 20);
            ctx.lineTo(80, 390);
            ctx.lineTo(canvas.width - 20, 390);
            ctx.stroke();
            if (graphPoints.length > 1) {
                ctx.save();
                ctx.beginPath();
                ctx.moveTo(80, 390);
                for (let p of graphPoints) ctx.lineTo(p.x, p.y);
                ctx.lineTo(rocket.x, 390);
                ctx.closePath();
                let fillGrad = ctx.createLinearGradient(80, 150, 80, 390);
                fillGrad.addColorStop(0, 'rgba(24, 130, 255, 0.25)');
                fillGrad.addColorStop(1, 'rgba(24, 130, 255, 0.0)');
                ctx.fillStyle = fillGrad;
                ctx.fill();
                ctx.restore();
                ctx.strokeStyle = 'var(--accent-blue)';
                ctx.lineWidth = 4;
                ctx.shadowBlur = 10;
                ctx.shadowColor = 'var(--accent-blue)';
                ctx.beginPath();
                ctx.moveTo(80, 390);
                for (let p of graphPoints) ctx.lineTo(p.x, p.y);
                ctx.stroke();
                ctx.shadowBlur = 0;
            }
            for (let p of particles) {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1.0;

            // ===== ОБНОВЛЕННАЯ РАКЕТА (ДЕТАЛИЗИРОВАННАЯ) =====
            if (!explosionActive) {
                ctx.save();
                ctx.translate(rocket.x, rocket.y);
                ctx.rotate(rocket.angle);

                // Свечение вокруг ракеты
                ctx.shadowBlur = 15;
                ctx.shadowColor = 'var(--accent-blue)';

                // --- 1. Боковые ускорители (крылья/стабилизаторы) ---
                // Отрисовываем их первыми, чтобы они были "за" корпусом
                ctx.fillStyle = '#111822'; // var(--container-bg) для основы
                ctx.strokeStyle = '#263345';
                ctx.lineWidth = 1;
                
                // Нижний ускоритель
                ctx.beginPath();
                ctx.moveTo(-15, 6);
                ctx.lineTo(-10, 15);
                ctx.lineTo(0, 15);
                ctx.lineTo(-5, 6);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                // Верхний ускоритель
                ctx.beginPath();
                ctx.moveTo(-15, -6);
                ctx.lineTo(-10, -15);
                ctx.lineTo(0, -15);
                ctx.lineTo(-5, -6);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                // Детали ускорителей (турбины)
                ctx.fillStyle = '#0a0f16';
                ctx.beginPath();
                ctx.ellipse(-12, 11, 4, 2, Math.PI/2, 0, Math.PI*2);
                ctx.ellipse(-12, -11, 4, 2, Math.PI/2, 0, Math.PI*2);
                ctx.fill();

                // --- 2. Основной корпус ракеты ---
                // Создаем градиент для корпуса, чтобы он казался объемным
                let bodyGrad = ctx.createLinearGradient(-20, 0, 25, 0);
                bodyGrad.addColorStop(0, '#8c9eb5');  // Хвост
                bodyGrad.addColorStop(0.5, '#ffffff'); // Середина (блеск)
                bodyGrad.addColorStop(1, '#8c9eb5');  // Нос

                ctx.fillStyle = bodyGrad;
                ctx.beginPath();
                // Задняя часть
                ctx.moveTo(-20, -6);
                // Корпус к носу
                ctx.lineTo(15, -6);
                // Заостренный нос
                ctx.lineTo(25, 0);
                ctx.lineTo(15, 6);
                // Корпус к хвосту
                ctx.lineTo(-20, 6);
                ctx.closePath();
                ctx.fill();

                // Полоска на корпусе
                ctx.fillStyle = 'var(--accent-blue)';
                ctx.fillRect(0, -6, 5, 12);

                // --- 3. Иллюминатор (окно) ---
                ctx.fillStyle = '#d6e6f2'; // Светлое стекло
                ctx.beginPath();
                ctx.arc(6, 0, 3.5, 0, Math.PI * 2);
                ctx.fill();
                
                // Ободок иллюминатора
                ctx.strokeStyle = '#2d3e50';
                ctx.lineWidth = 1;
                ctx.stroke();

                // Блик на стекле
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(5, -1, 1, 0, Math.PI * 2);
                ctx.fill();

                // --- 4. Сопло двигателя (Турбина) ---
                ctx.fillStyle = '#1a2332'; // var(--panel-bg)
                ctx.beginPath();
                ctx.moveTo(-20, -3);
                ctx.lineTo(-24, -5);
                ctx.lineTo(-24, 5);
                ctx.lineTo(-20, 3);
                ctx.closePath();
                ctx.fill();

                // Жар внутри сопла
                ctx.fillStyle = 'var(--accent-red)';
                ctx.beginPath();
                ctx.ellipse(-23, 0, 2, 4, 0, 0, Math.PI*2);
                ctx.fill();

                ctx.restore();
            }
            // ===============================================

            if (flashAlpha > 0) {
                ctx.fillStyle = `rgba(240, 48, 67, ${flashAlpha})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
            ctx.restore();
        }

        function updateMultiplierColor(val) {
            if (val < 2.0) multiplierSpan.style.color = '#ffffff';
            else if (val < 5.0) multiplierSpan.style.color = 'var(--accent-blue)';
            else if (val < 10.0) multiplierSpan.style.color = 'var(--accent-orange)';
            else multiplierSpan.style.color = 'var(--accent-green)';
        }

        function addToHistory(val) {
            const el = document.createElement('div');
            el.className = 'history-item';
            el.innerText = val.toFixed(2) + 'x';
            if (val < 1.5) el.classList.add('low');
            else if (val < 3.0) el.classList.add('medium');
            else if (val < 10.0) el.classList.add('high');
            else el.classList.add('epic');
            historyDiv.prepend(el);
            if (historyDiv.children.length > 12) historyDiv.removeChild(historyDiv.lastChild);
            if (val > bestMulti) {
                bestMulti = val;
                localStorage.setItem('crash_best_rg', bestMulti);
                bestSpan.innerText = `🏆 РЕКОРД: ${bestMulti.toFixed(2)}x`;
            }
        }

        function generateCrashPoint() {
            const r = Math.random();
            if (r < 0.10) return 1.00;
            if (r < 0.50) return 1.01 + Math.random() * 0.8;
            if (r < 0.82) return 1.80 + Math.random() * 2.5;
            if (r < 0.95) return 4.30 + Math.random() * 8.0;
            return 12.0 + Math.random() * 40.0;
        }

        function finishGame(win, finalMultiplier) {
            if (hasCashedOut) return;
            hasCashedOut = true;
            gameActive = false;
            clearInterval(multiplierInterval);

            let profitChange = 0;
            if (win) {
                let winAmount = Math.floor(currentBet * finalMultiplier);
                profitChange = winAmount - currentBet;
                updateBalanceDisplay(casinoBalance + profitChange);
                addToHistory(finalMultiplier);
                statusSpan.innerHTML = `<span style="color:var(--accent-green)">💰 ВЫ УСПЕШНО ЗАБРАЛИ СТАВКУ! +${profitChange}₽</span>`;
                soundCashout();
                vibrate('success');
                lastGameResultSpan.innerHTML = `<span style="color:var(--accent-green);">+${winAmount}₽ (x${finalMultiplier.toFixed(2)})</span>`;
            } else {
                profitChange = -currentBet;
                updateBalanceDisplay(casinoBalance + profitChange);
                addToHistory(finalMultiplier);
                statusSpan.innerHTML = `<span style="color:var(--accent-red)">💥 КРАШ! Ракета взорвалась на x${finalMultiplier.toFixed(2)}</span>`;
                triggerExplosion(rocket.x, rocket.y);
                soundCrash();
                lastGameResultSpan.innerHTML = `<span style="color:var(--accent-red);">-${currentBet}₽ (x${finalMultiplier.toFixed(2)})</span>`;
            }

            hasBet = false;
            startBtn.disabled = false;
            cashoutBtn.disabled = true;
            betInput.disabled = false;
            startBtn.innerText = 'СТАРТ';
        }

        function cashout() {
            if (!hasBet || hasCashedOut) return;
            if (currentMulti >= crashPoint) return;
            finishGame(true, currentMulti);
        }

        function startMultiplierGrowth() {
            if (multiplierInterval) clearInterval(multiplierInterval);
            currentMulti = 1.0;
            multiplierSpan.textContent = "1.00x";
            updateMultiplierColor(1.0);
            multiplierSpan.style.transform = 'translateX(-50%) scale(1.15)';
            setTimeout(() => multiplierSpan.style.transform = 'translateX(-50%) scale(1)', 120);
            multiplierInterval = setInterval(() => {
                if (!hasBet || hasCashedOut) return;
                let increment = 0.01 * (1 + (currentMulti - 1) * 0.15);
                currentMulti += increment;
                multiplierSpan.textContent = currentMulti.toFixed(2) + "x";
                updateMultiplierColor(currentMulti);
                if (autoTarget && currentMulti >= autoTarget && !hasCashedOut && hasBet) cashout();
                if (currentMulti >= crashPoint && !hasCashedOut) finishGame(false, crashPoint);
            }, 40);
        }

        function startGame() {
            if (hasBet) return;
            initAudio();

            // Считываем текущее значение ставки из поля
            let amount = parseInt(betInput.value);
            if (isNaN(amount)) amount = 100;
            amount = Math.min(5000, Math.max(10, amount));
            betInput.value = amount;
            currentBet = amount;

            // Проверка баланса
            if (casinoBalance < currentBet) {
                statusSpan.innerHTML = `<span style="color:var(--accent-red)">❌ Недостаточно средств! Баланс: ${casinoBalance}₽</span>`;
                soundError();
                vibrate('error');
                return;
            }

            crashPoint = generateCrashPoint();
            hasBet = true;
            hasCashedOut = false;
            gameActive = true;
            explosionActive = false;
            flashAlpha = 0;
            shake = 0;
            rocket.x = 80;
            rocket.y = 390;
            rocket.angle = 0;
            graphPoints = [];
            particles = [];
            startBtn.disabled = true;
            cashoutBtn.disabled = false;
            betInput.disabled = true;
            soundStart();
            startMultiplierGrowth();
            statusSpan.innerHTML = `<span style="color:var(--accent-blue)">🚀 Полет нормальный. Панель катапультирования активна!</span>`;
            vibrate('medium');
        }

        function exitAndCollect() {
            soundClick();
            tg.close();
        }

        function goToMenu() {
            // Переходим в лобби с текущим балансом
            window.location.href = 'casino.html?userId=' + userId + '&balance=' + casinoBalance;
        }

        function animate(now) {
            let delta = Math.min(32, now - (lastTime || now));
            lastTime = now;
            updateFlight(delta);
            draw();
            animFrame = requestAnimationFrame(animate);
        }

        // Привязка событий
        startBtn.onclick = () => { soundClick(); startGame(); };
        cashoutBtn.onclick = () => { soundClick(); cashout(); };
        exitBtn.onclick = exitAndCollect;
        menuBtn.onclick = goToMenu;

        // Обработчик изменения ставки (чтобы всегда было число в пределах)
        betInput.addEventListener('change', function() {
            let val = parseInt(this.value);
            if (isNaN(val)) val = 100;
            val = Math.min(5000, Math.max(10, val));
            this.value = val;
        });

        // Принудительно разблокируем поле ввода (на случай, если оно заблокировано)
        betInput.disabled = false;

        // Старт
        initBackground();
        animFrame = requestAnimationFrame(animate);
    })();
</script>
</body>
