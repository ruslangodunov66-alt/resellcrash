<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>CRASH | R-Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* (весь ваш стиль остаётся без изменений) */
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { min-height: 100vh; background: radial-gradient(circle at 30% 20%, #0a0e1a, #010101); font-family: 'Segoe UI', system-ui, sans-serif; padding: 12px; display: flex; justify-content: center; align-items: center; }
        .game-container { width: 100%; max-width: 500px; }
        .game-card { background: linear-gradient(145deg, rgba(20,28,40,0.95), rgba(10,15,25,0.98)); backdrop-filter: blur(12px); border-radius: 48px; padding: 20px 16px 25px; text-align: center; border: 1px solid rgba(0,255,255,0.5); box-shadow: 0 0 25px rgba(0,255,255,0.2); }
        h1 { font-size: 28px; background: linear-gradient(135deg, #ffcc44, #ff6644); background-clip: text; -webkit-background-clip: text; color: transparent; margin-bottom: 5px; }
        .rocket { font-size: 60px; animation: float 0.8s infinite ease-in-out; margin: 5px 0; }
        @keyframes float { 0% { transform: translateY(0px); } 100% { transform: translateY(-8px); } }
        .multiplier { font-size: 64px; font-weight: 800; margin: 10px 0; background: linear-gradient(135deg, #2ecc71, #27ae60); background-clip: text; -webkit-background-clip: text; color: transparent; text-shadow: 0 0 12px #2ecc71; }
        .crash .multiplier { background: linear-gradient(135deg, #ff3366, #c0392b); text-shadow: 0 0 15px #ff3366; }
        .win .multiplier { background: linear-gradient(135deg, #ffcc44, #ff8844); text-shadow: 0 0 12px #ffaa44; }
        .bet-panel { background: rgba(0,0,0,0.4); border-radius: 60px; padding: 12px 12px; margin: 12px 0; }
        .bet-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        .bet-row label { font-size: 15px; font-weight: bold; color: #aac8ff; }
        .bet-input { flex: 2; background: rgba(0,0,0,0.6); border: 1px solid #ffaa44; border-radius: 60px; padding: 8px 12px; font-size: 16px; color: #ffcc44; text-align: center; font-weight: bold; min-width: 120px; }
        .bet-buttons { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .bet-buttons button { background: #2c3e50; border: none; padding: 6px 14px; border-radius: 40px; color: white; font-weight: bold; font-size: 14px; cursor: pointer; transition: 0.1s; }
        .bet-buttons button:active { transform: scale(0.96); background: #ffaa44; color: black; }
        .auto-container { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.4); border-radius: 50px; padding: 8px 16px; margin: 12px 0; gap: 8px; }
        .auto-container label { font-size: 13px; color: #aac8ff; }
        .auto-container input { background: rgba(0,0,0,0.7); border: 1px solid #ffaa44; color: #ffcc44; border-radius: 30px; padding: 6px 10px; width: 80px; text-align: center; }
        button { border: none; padding: 12px 16px; font-size: 17px; font-weight: bold; border-radius: 60px; cursor: pointer; width: 100%; margin: 6px 0; transition: 0.1s; }
        .btn-cashout { background: linear-gradient(135deg, #2ecc71, #27ae60); color: white; box-shadow: 0 0 12px #2ecc71; }
        .btn-start { background: linear-gradient(135deg, #3498db, #2980b9); color: white; }
        .btn-repeat { background: linear-gradient(135deg, #f39c12, #e67e22); color: white; }
        .status { margin-top: 15px; padding: 10px; background: rgba(0,0,0,0.6); border-radius: 50px; font-weight: bold; color: #ffdd99; font-size: 13px; }
        .hidden { display: none; }
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-card" id="gameCard">
        <h1>💥 CRASH</h1>
        <div class="rocket">🚀</div>
        <div class="multiplier" id="multiplierText">x1.00</div>

        <div class="bet-panel">
            <div class="bet-row">
                <label>💰 СТАВКА</label>
                <input type="number" id="betAmount" class="bet-input" min="100" max="100000" step="100" value="1000">
            </div>
            <div class="bet-buttons">
                <button data-change="100">+100</button>
                <button data-change="500">+500</button>
                <button data-change="1000">+1000</button>
                <button data-change="half">½</button>
                <button data-change="double">x2</button>
            </div>
        </div>

        <div class="auto-container">
            <label>🎯 АВТО-ЗАБОР при x</label>
            <input type="number" id="autoTarget" step="0.1" min="1.1" max="50" value="2.0">
        </div>

        <button id="startBtn" class="btn-start">🚀 СТАРТ</button>
        <button id="cashoutBtn" class="btn-cashout hidden">💎 ЗАБРАТЬ</button>
        <button id="repeatBtn" class="btn-repeat hidden">🔄 НОВАЯ ИГРА</button>

        <div class="status" id="statusMsg">💎 Введите ставку и нажмите СТАРТ</div>
    </div>
</div>
<canvas id="particleCanvas"></canvas>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    // Получаем user_id из данных Telegram
    const userId = tg.initDataUnsafe?.user?.id;
    if (!userId) {
        alert("Ошибка: не удалось определить пользователя. Перезапустите бота.");
    }

    // Секретный ключ (должен совпадать с тем, что в боте)
    const API_SECRET = "mySuperSecretKey2025";
    const API_URL = "/api/casino/result";  // относительный путь, будет работать на том же домене

    // DOM
    const betInput = document.getElementById('betAmount');
    const startBtn = document.getElementById('startBtn');
    const cashoutBtn = document.getElementById('cashoutBtn');
    const repeatBtn = document.getElementById('repeatBtn');
    const multiplierSpan = document.getElementById('multiplierText');
    const statusDiv = document.getElementById('statusMsg');
    const gameCard = document.getElementById('gameCard');
    const autoTargetInput = document.getElementById('autoTarget');

    let currentBet = 1000;
    let crashPoint = 1.10;
    let currentMultiplier = 1.0;
    let gameActive = false;
    let intervalId = null;
    let pendingCashout = false;
    let autoTarget = 2.0;

    function updateBet(newVal) {
        let val = Math.floor(newVal);
        if (isNaN(val)) val = 100;
        if (val < 100) val = 100;
        if (val > 100000) val = 100000;
        currentBet = val;
        betInput.value = currentBet;
        statusDiv.innerHTML = `💰 Ставка ${currentBet}₽. Нажмите СТАРТ`;
    }

    betInput.addEventListener('change', () => updateBet(parseFloat(betInput.value)));
    document.querySelectorAll('[data-change]').forEach(btn => {
        btn.addEventListener('click', () => {
            let change = btn.getAttribute('data-change');
            if (change === 'half') updateBet(currentBet / 2);
            else if (change === 'double') updateBet(currentBet * 2);
            else updateBet(currentBet + parseInt(change));
        });
    });

    autoTargetInput.addEventListener('change', () => {
        let val = parseFloat(autoTargetInput.value);
        if (!isNaN(val) && val >= 1.1) autoTarget = val;
        else autoTarget = null;
    });

    function generateCrashPoint() {
        const r = Math.random();
        if (r < 0.50) return 1.10 + Math.random() * 0.90;
        else if (r < 0.80) return 2.00 + Math.random() * 3.00;
        else if (r < 0.95) return 5.00 + Math.random() * 15.0;
        else return 20.00 + Math.random() * 80.0;
    }

    // Звуки (оставляем как есть)
    let audioCtx = null;
    function initAudio() {
        if (!audioCtx && window.AudioContext) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const unlock = () => {
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                document.body.removeEventListener('touchstart', unlock);
                document.body.removeEventListener('click', unlock);
            };
            document.body.addEventListener('touchstart', unlock);
            document.body.addEventListener('click', unlock);
        }
    }
    function playBeep(freq, duration, vol = 0.15) {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(vol, now);
        gain.gain.exponentialRampToValueAtTime(0.00001, now + duration);
        osc.start();
        osc.stop(now + duration);
    }
    function playCashoutSound() { playBeep(880, 0.15); playBeep(1320, 0.2); }
    function playCrashSound() { playBeep(150, 0.5, 0.2); playBeep(90, 0.7, 0.15); }
    function playStartSound() { playBeep(440, 0.1, 0.1); }

    // Функция отправки результата на сервер
    async function sendResult(action, winAmount = 0) {
        if (!userId) return;
        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    user_id: userId,
                    action: action,
                    game: "crash",
                    bet: currentBet,
                    win: winAmount,
                    secret: API_SECRET
                })
            });
            const data = await response.json();
            if (response.ok) {
                console.log("Результат отправлен:", data);
                // Можно обновить отображение баланса, если нужно
            } else {
                console.error("Ошибка сервера:", data);
                alert("Ошибка при отправке результата. Попробуйте ещё раз.");
            }
        } catch (err) {
            console.error("Ошибка сети:", err);
            alert("Не удалось связаться с сервером. Попробуйте позже.");
        }
    }

    function startGame() {
        if (currentBet < 100) {
            statusDiv.innerHTML = '❌ Минимальная ставка 100₽';
            return;
        }
        if (intervalId) clearInterval(intervalId);
        crashPoint = generateCrashPoint();
        currentMultiplier = 1.0;
        gameActive = true;
        pendingCashout = false;
        cashoutBtn.disabled = false;
        startBtn.classList.add('hidden');
        cashoutBtn.classList.remove('hidden');
        repeatBtn.classList.add('hidden');
        gameCard.classList.remove('crash', 'win');
        multiplierSpan.innerHTML = 'x1.00';
        statusDiv.innerHTML = '📈 МНОЖИТЕЛЬ РАСТЁТ!';
        initAudio();
        playStartSound();
        startParticles();

        intervalId = setInterval(() => {
            if (!gameActive) return;
            currentMultiplier += 0.025;
            multiplierSpan.innerHTML = `x${currentMultiplier.toFixed(2)}`;
            if (autoTarget && currentMultiplier >= autoTarget && !pendingCashout) {
                cashout();
                return;
            }
            if (currentMultiplier >= crashPoint) {
                clearInterval(intervalId);
                intervalId = null;
                gameActive = false;
                gameCard.classList.add('crash');
                multiplierSpan.innerHTML = `💥 x${crashPoint.toFixed(2)}`;
                cashoutBtn.disabled = true;
                statusDiv.innerHTML = `💥 КРАШ! ВЫ ПРОИГРАЛИ ${currentBet}₽`;
                playCrashSound();
                // Отправляем проигрыш на сервер
                sendResult("lose");
                cashoutBtn.classList.add('hidden');
                startBtn.classList.add('hidden');
                repeatBtn.classList.remove('hidden');
            }
        }, 95);
    }

    function cashout() {
        if (!gameActive || pendingCashout) return;
        pendingCashout = true;
        clearInterval(intervalId);
        intervalId = null;
        gameActive = false;
        cashoutBtn.disabled = true;
        const winAmount = Math.floor(currentBet * currentMultiplier);
        gameCard.classList.add('win');
        multiplierSpan.innerHTML = `✅ x${currentMultiplier.toFixed(2)} → ${winAmount}₽`;
        playCashoutSound();
        statusDiv.innerHTML = `🎉 ВЫИГРЫШ! +${winAmount}₽`;
        // Отправляем выигрыш на сервер
        sendResult("win", winAmount);
        cashoutBtn.classList.add('hidden');
        startBtn.classList.add('hidden');
        repeatBtn.classList.remove('hidden');
    }

    repeatBtn.onclick = () => {
        startBtn.classList.remove('hidden');
        repeatBtn.classList.add('hidden');
        cashoutBtn.classList.add('hidden');
        gameCard.classList.remove('crash', 'win');
        multiplierSpan.innerHTML = 'x1.00';
        statusDiv.innerHTML = `💎 Ставка ${currentBet}₽. Нажмите СТАРТ`;
    };
    startBtn.onclick = startGame;
    cashoutBtn.onclick = cashout;

    // Частицы (без изменений)
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [], animFrame;
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    function startParticles() {
        particles = [];
        for (let i = 0; i < 30; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 2,
                vy: (Math.random() - 0.5) * 2 - 0.5,
                life: 1,
                size: Math.random() * 3 + 2,
                color: `hsl(${Math.random() * 60 + 30}, 100%, 60%)`
            });
        }
        if (animFrame) cancelAnimationFrame(animFrame);
        animateParticles();
    }
    function animateParticles() {
        if (!gameActive) {
            if (animFrame) cancelAnimationFrame(animFrame);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            return;
        }
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let any = false;
        for (let i = 0; i < particles.length; i++) {
            const p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.life -= 0.02;
            if (p.life <= 0) continue;
            any = true;
            ctx.globalAlpha = p.life * 0.6;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
        }
        if (any) animFrame = requestAnimationFrame(animateParticles);
        else ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
    updateBet(1000);
</script>
</body>
</html>
