<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>⚡ CRASH · Космический рейс</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Exo+2:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: radial-gradient(ellipse at 30% 20%, #03050f, #000001);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Exo 2', 'Orbitron', system-ui, sans-serif;
            padding: 16px;
        }
        .game-container {
            max-width: 580px;
            width: 100%;
            background: rgba(3, 8, 20, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 56px;
            padding: 20px;
            box-shadow: 0 30px 40px rgba(0,0,0,0.6), 0 0 0 2px rgba(0,255,255,0.2), inset 0 1px 1px rgba(255,255,255,0.1);
            border: 1px solid rgba(0,255,255,0.4);
        }
        .rocket-area {
            position: relative;
            margin-bottom: 20px;
            border-radius: 40px;
            overflow: hidden;
            background: #00020a;
            box-shadow: 0 0 0 2px #0a1a3a, inset 0 0 60px rgba(0,0,0,0.9);
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: radial-gradient(ellipse at 30% 30%, #0c1445, #010108);
            border-radius: 36px;
            cursor: pointer;
        }
        .multiplier-badge {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(16px);
            padding: 8px 24px;
            border-radius: 80px;
            font-size: 42px;
            font-weight: 900;
            font-family: 'Orbitron', monospace;
            letter-spacing: 3px;
            color: #fff3cf;
            text-shadow: 0 0 20px #ffaa44, 0 0 5px #ff6600;
            border: 1px solid rgba(255,200,100,0.8);
            white-space: nowrap;
            z-index: 20;
            box-shadow: 0 0 20px rgba(255,170,0,0.3);
        }
        .multiplier-badge span { font-size: 24px; color: #ffcc66; }
        .bet-area {
            background: rgba(8, 16, 32, 0.8);
            border-radius: 48px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid #2a4a7a;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.6), 0 5px 10px rgba(0,0,0,0.3);
        }
        .bet-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            color: #bbddff;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .bet-input-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            align-items: center;
        }
        .bet-input {
            flex: 1;
            min-width: 130px;
            background: #010a1a;
            border: 1px solid #3a6a9a;
            border-radius: 60px;
            padding: 14px 20px;
            color: #ffeaac;
            font-size: 22px;
            font-weight: 800;
            text-align: center;
            outline: none;
            font-family: 'Orbitron', monospace;
        }
        .bet-input:focus { border-color: #ffaa44; box-shadow: 0 0 12px #ffaa44; }
        .action-buttons {
            display: flex;
            gap: 12px;
            flex: 1;
            justify-content: center;
        }
        button {
            background: #1e2a4a;
            border: none;
            border-radius: 60px;
            padding: 12px 24px;
            font-weight: 800;
            font-size: 18px;
            font-family: 'Exo 2', sans-serif;
            color: white;
            cursor: pointer;
            transition: 0.1s linear;
            flex: 1;
            min-width: 120px;
            box-shadow: 0 6px 0 #0a0f1e;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #0a0f1e; }
        .btn-bet {
            background: linear-gradient(135deg, #f0b35e, #f57c00);
            color: #1f1a0a;
            text-shadow: 0 1px 0 #ffdd99;
        }
        .btn-cashout {
            background: linear-gradient(135deg, #2dd4bf, #14b8a6);
        }
        .btn-cashout:disabled, .btn-bet:disabled { opacity: 0.4; transform: none; cursor: not-allowed; }
        .history {
            background: rgba(0,0,0,0.6);
            border-radius: 32px;
            padding: 12px;
            backdrop-filter: blur(4px);
        }
        .history-title {
            font-size: 11px;
            color: #8e9ab0;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }
        .history-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .history-item {
            background: #121a2c;
            padding: 4px 12px;
            border-radius: 40px;
            font-weight: 800;
            font-size: 14px;
            font-family: monospace;
            color: #ffdd88;
            border-left: 3px solid #ffaa44;
            box-shadow: 0 0 5px rgba(255,170,0,0.3);
        }
        .status {
            text-align: center;
            font-size: 12px;
            margin-top: 12px;
            color: #aacdff;
            font-weight: 500;
            text-shadow: 0 0 5px #0066aa;
        }
        .best-score {
            position: absolute;
            bottom: 12px;
            right: 16px;
            background: rgba(0,0,0,0.5);
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 11px;
            font-family: 'Orbitron';
            color: #ffcc88;
            backdrop-filter: blur(4px);
            z-index: 15;
        }
        @media (max-width: 550px) {
            .bet-input-wrapper {
                flex-direction: column;
                align-items: stretch;
            }
            .action-buttons {
                flex-direction: row;
                justify-content: center;
            }
            button {
                min-width: auto;
                padding: 10px 16px;
                font-size: 16px;
            }
            .bet-input {
                width: 100%;
                text-align: center;
            }
            .multiplier-badge {
                font-size: 28px;
                padding: 4px 16px;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="rocket-area">
        <div class="multiplier-badge" id="multiplierDisplay">1.00<span>x</span></div>
        <canvas id="crashCanvas" width="800" height="450" style="width:100%; height:auto;"></canvas>
        <div class="best-score" id="bestMultiplier">🏆 РЕКОРД: 0.00x</div>
    </div>
    <div class="bet-area">
        <div class="bet-label">
            <span>🚀 СТАВКА (₽)</span>
            <span>⚡ 10 – 5000</span>
        </div>
        <div class="bet-input-wrapper">
            <input type="number" id="betAmount" class="bet-input" value="100" step="10">
            <div class="action-buttons">
                <button id="betButton" class="btn-bet">🛸 СТАРТ</button>
                <button id="cashoutButton" class="btn-cashout" disabled>💎 ЗАБРАТЬ</button>
            </div>
        </div>
    </div>
    <div class="history">
        <div class="history-title">📡 ПОСЛЕДНИЕ КРАШИ</div>
        <div class="history-list" id="historyList">—</div>
    </div>
    <div class="status" id="statusMsg">✨ ГОТОВ К ВЗЛЁТУ ✨</div>
</div>
<script src="https://telegram.org/js/telegram-web-app.js?56"></script>
<script>
    (function(){
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let userId = null;
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('userId')) userId = urlParams.get('userId');
        else if (tg.initDataUnsafe?.user?.id) userId = tg.initDataUnsafe.user.id;

        // ----- Элементы DOM -----
        const betInput = document.getElementById('betAmount');
        const startBtn = document.getElementById('betButton');
        const cashoutBtn = document.getElementById('cashoutButton');
        const multiplierSpan = document.getElementById('multiplierDisplay');
        const historyDiv = document.getElementById('historyList');
        const statusSpan = document.getElementById('statusMsg');
        const bestSpan = document.getElementById('bestMultiplier');
        const canvas = document.getElementById('crashCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = 800;
        canvas.height = 450;

        // ----- Лучший множитель (localStorage) -----
        let bestMulti = parseFloat(localStorage.getItem('crash_best')) || 1.0;
        bestSpan.innerText = `🏆 РЕКОРД: ${bestMulti.toFixed(2)}x`;

        // ----- Игровые переменные -----
        let currentBet = 0;
        let hasBet = false;
        let hasCashedOut = false;
        let currentMulti = 1.0;
        let crashPoint = 1.1;
        let animFrame = null;
        let multiplierInterval = null;
        let progress = 0;            // 0..1
        const START_X = 70;
        const END_X = canvas.width - 90;
        const PATH_AMP = 35;
        let rocket = { x: START_X, y: canvas.height/2, angle: 0 };
        let trail = [];
        let meteors = [];
        let explosionParticles = [];
        let explosionActive = false;
        let gameActive = false;
        let flashAlpha = 0;
        let planets = [];

        // ----- Генерация планет -----
        function initPlanets() {
            planets = [
                { x: 120, y: 70, radius: 35, color1: '#8844aa', color2: '#aa66cc', rings: true },
                { x: 650, y: 380, radius: 45, color1: '#44aa88', color2: '#66ccaa', rings: false },
                { x: 500, y: 50, radius: 25, color1: '#aa6644', color2: '#cc8866', rings: false },
                { x: 720, y: 100, radius: 30, color1: '#3366cc', color2: '#5588ee', rings: true }
            ];
        }

        // ----- Метеориты -----
        function initMeteors() {
            meteors = [];
            for (let i = 0; i < 12; i++) {
                meteors.push({
                    x: canvas.width + 80 + Math.random() * 250,
                    y: 40 + Math.random() * (canvas.height - 80),
                    size: 14 + Math.random() * 24,
                    speed: 1.3 + Math.random() * 2.5,
                    rotation: Math.random() * Math.PI * 2,
                    rotSpeed: (Math.random() - 0.5) * 0.04,
                    glow: 0.4 + Math.random() * 0.7,
                    color1: `hsl(${25 + Math.random() * 35}, 70%, 52%)`,
                    color2: `hsl(${15 + Math.random() * 25}, 80%, 38%)`,
                    cracks: Math.random() > 0.6
                });
            }
        }

        function updateRocketPosition(prog) {
            const t = Math.min(1, Math.max(0, prog));
            const x = START_X + t * (END_X - START_X);
            const phase = Math.sin(t * Math.PI * 2) * PATH_AMP;
            let y = canvas.height/2 + phase;
            y = Math.min(canvas.height - 50, Math.max(50, y));
            rocket.x = x;
            rocket.y = y;
            const angleDeriv = Math.cos(t * Math.PI * 2) * PATH_AMP * (Math.PI * 2 / (END_X - START_X));
            rocket.angle = Math.atan2(angleDeriv, 1);
            trail.unshift({ x: rocket.x, y: rocket.y });
            if (trail.length > 22) trail.pop();
        }

        function updateMeteors() {
            for (let m of meteors) {
                m.x -= m.speed;
                m.rotation += m.rotSpeed;
                if (m.x + m.size < 0) {
                    m.x = canvas.width + 60 + Math.random() * 200;
                    m.y = 35 + Math.random() * (canvas.height - 70);
                    m.size = 14 + Math.random() * 24;
                    m.speed = 1.3 + Math.random() * 2.5;
                    m.glow = 0.4 + Math.random() * 0.7;
                }
            }
        }

        function addExplosion(x, y) {
            explosionParticles = [];
            for (let i = 0; i < 80; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 2.5 + Math.random() * 6;
                const vx = Math.cos(angle) * speed;
                const vy = Math.sin(angle) * speed;
                explosionParticles.push({
                    x: x, y: y, vx: vx, vy: vy,
                    life: 1.0, size: 3 + Math.random() * 10,
                    color: `hsl(${30 + Math.random() * 40}, 100%, 60%)`
                });
            }
            explosionActive = true;
            flashAlpha = 0.8;
        }

        function updateExplosion() {
            if (!explosionActive) return;
            let any = false;
            for (let p of explosionParticles) {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                if (p.life > 0) any = true;
            }
            if (!any) explosionActive = false;
            if (flashAlpha > 0) flashAlpha -= 0.04;
        }

        // ----- Отрисовка -----
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#010208';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // звёзды
            for (let i = 0; i < 500; i++) {
                let bright = 0.2 + Math.sin(Date.now() * 0.002 + i) * 0.3;
                ctx.fillStyle = `rgba(255,240,200,${bright * 0.6})`;
                ctx.fillRect((i * 173) % canvas.width, (i * 311) % canvas.height, 1.5, 1.5);
            }
            
            // планеты
            for (let p of planets) {
                ctx.save();
                ctx.shadowBlur = 8;
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2);
                ctx.fillStyle = p.color1;
                ctx.fill();
                ctx.beginPath();
                ctx.arc(p.x - 3, p.y - 2, p.radius * 0.3, 0, Math.PI*2);
                ctx.fillStyle = p.color2;
                ctx.fill();
                if (p.rings) {
                    ctx.beginPath();
                    ctx.ellipse(p.x, p.y, p.radius + 8, p.radius + 3, 0.3, 0, Math.PI*2);
                    ctx.strokeStyle = '#ffcc88';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
                ctx.restore();
            }
            
            // метеориты
            for (let m of meteors) {
                ctx.save();
                ctx.translate(m.x, m.y);
                ctx.rotate(m.rotation);
                ctx.shadowBlur = 12;
                ctx.shadowColor = `rgba(255,80,40,${m.glow})`;
                ctx.beginPath();
                ctx.moveTo(0, -m.size/1.6);
                ctx.lineTo(m.size/1.7, m.size/2.2);
                ctx.lineTo(0, m.size/2.4);
                ctx.lineTo(-m.size/1.7, m.size/2.2);
                ctx.fillStyle = m.color1;
                ctx.fill();
                ctx.fillStyle = m.color2;
                ctx.beginPath();
                ctx.ellipse(-m.size/4, -m.size/5, m.size/5, m.size/7, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(m.size/3, m.size/6, m.size/6, m.size/8, 0, 0, Math.PI*2);
                ctx.fill();
                if (m.cracks) {
                    ctx.beginPath();
                    ctx.moveTo(-m.size/5, m.size/4);
                    ctx.lineTo(0, m.size/2.2);
                    ctx.lineTo(m.size/5, m.size/3.5);
                    ctx.fillStyle = '#553322';
                    ctx.fill();
                }
                ctx.restore();
            }
            
            // след
            for (let i=0; i<trail.length; i++) {
                let alpha = 1 - i / trail.length;
                ctx.fillStyle = `rgba(255,120,40,${alpha*0.45})`;
                ctx.beginPath();
                ctx.arc(trail[i].x, trail[i].y, 6 * alpha, 0, Math.PI*2);
                ctx.fill();
            }
            
            // взрыв
            if (explosionActive) {
                for (let p of explosionParticles) {
                    if (p.life <= 0) continue;
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
            }
            
            // ракета (увеличенная)
            ctx.save();
            ctx.translate(rocket.x, rocket.y);
            ctx.rotate(rocket.angle);
            ctx.shadowBlur = 16;
            ctx.shadowColor = '#ffaa44';
            ctx.fillStyle = '#dd6644';
            ctx.beginPath();
            ctx.moveTo(0, -24);
            ctx.lineTo(16, 7);
            ctx.lineTo(8, 18);
            ctx.lineTo(0, 12);
            ctx.lineTo(-8, 18);
            ctx.lineTo(-16, 7);
            ctx.fill();
            ctx.fillStyle = '#ffaa77';
            ctx.beginPath();
            ctx.moveTo(0, -16);
            ctx.lineTo(10, 3);
            ctx.lineTo(-10, 3);
            ctx.fill();
            ctx.fillStyle = '#aaffff';
            ctx.beginPath();
            ctx.arc(0, -4, 4.5, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#2266aa';
            ctx.beginPath();
            ctx.arc(0, -4, 2.2, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#aa4422';
            ctx.beginPath();
            ctx.moveTo(-12, 7);
            ctx.lineTo(-22, 16);
            ctx.lineTo(-10, 12);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(12, 7);
            ctx.lineTo(22, 16);
            ctx.lineTo(10, 12);
            ctx.fill();
            ctx.fillStyle = '#882222';
            ctx.beginPath();
            ctx.rect(-8, 12, 16, 8);
            ctx.fill();
            ctx.fillStyle = '#ff4400';
            ctx.beginPath();
            ctx.moveTo(-7, 18);
            ctx.lineTo(0, 32);
            ctx.lineTo(7, 18);
            ctx.fill();
            ctx.fillStyle = '#ffaa33';
            ctx.beginPath();
            ctx.moveTo(-4, 18);
            ctx.lineTo(0, 26);
            ctx.lineTo(4, 18);
            ctx.fill();
            ctx.restore();

            // траектория
            ctx.beginPath();
            ctx.setLineDash([6, 12]);
            ctx.strokeStyle = '#44ccff';
            ctx.lineWidth = 2.5;
            ctx.shadowBlur = 8;
            ctx.shadowColor = '#00aaff';
            for (let t=0; t<=1; t+=0.02) {
                let x = START_X + t * (END_X - START_X);
                let off = Math.sin(t * Math.PI * 2) * PATH_AMP;
                let y = canvas.height/2 + off;
                if (t===0) ctx.moveTo(x,y);
                else ctx.lineTo(x,y);
            }
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.shadowBlur = 0;

            if (flashAlpha > 0) {
                ctx.fillStyle = `rgba(255,100,30,${flashAlpha*0.6})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
        }

        function crashEnd() {
            if (hasCashedOut) return;
            hasCashedOut = true;
            gameActive = false;
            clearMultiplierUpdate();
            addExplosion(rocket.x, rocket.y);
            sendGameResult(false);
            addToHistory(crashPoint);
            statusSpan.innerText = `💥 КРАШ! ПРОИГРЫШ ${currentBet}₽ (x${crashPoint.toFixed(2)})`;
            enableRestart();
        }

        function winEnd() {
            if (hasCashedOut) return;
            hasCashedOut = true;
            gameActive = false;
            clearMultiplierUpdate();
            sendGameResult(true);
            addToHistory(currentMulti);
            statusSpan.innerText = `🎉 ЗАБРАЛИ! x${currentMulti.toFixed(2)} → +${Math.floor(currentBet * currentMulti)}₽`;
            enableRestart();
        }

        function enableRestart() {
            startBtn.disabled = false;
            cashoutBtn.disabled = true;
            betInput.disabled = false;
            startBtn.innerText = '🛸 СТАРТ';
        }

        function resetRound() {
            clearMultiplierUpdate();
            hasBet = false;
            hasCashedOut = false;
            gameActive = false;
            explosionActive = false;
            progress = 0;
            currentMulti = 1.0;
            multiplierSpan.innerHTML = "1.00<span>x</span>";
            rocket.x = START_X;
            rocket.y = canvas.height/2;
            rocket.angle = 0;
            trail = [];
            explosionParticles = [];
            updateRocketPosition(0);
            initMeteors();
            draw();
            startBtn.disabled = false;
            cashoutBtn.disabled = true;
            betInput.disabled = false;
            statusSpan.innerHTML = "🛸 ГОТОВ К СТАРТУ";
        }

        function animateGame() {
            if (gameActive && hasBet && !hasCashedOut) {
                let delta = 0.009 * (1 + currentMulti / 3.5);
                progress += delta;
                if (progress >= 1.0) {
                    crashEnd();
                } else {
                    updateRocketPosition(progress);
                    updateMeteors();
                    if (currentMulti >= crashPoint && !hasCashedOut) {
                        crashEnd();
                    }
                }
            }
            updateExplosion();
            draw();
            animFrame = requestAnimationFrame(animateGame);
        }

        function startMultiplierGrowth() {
            if (multiplierInterval) clearInterval(multiplierInterval);
            currentMulti = 1.0;
            multiplierSpan.innerHTML = currentMulti.toFixed(2) + "<span>x</span>";
            multiplierInterval = setInterval(() => {
                if (!hasBet || hasCashedOut) return;
                currentMulti += 0.025;
                multiplierSpan.innerHTML = currentMulti.toFixed(2) + "<span>x</span>";
            }, 40);
        }

        function clearMultiplierUpdate() {
            if (multiplierInterval) clearInterval(multiplierInterval);
            multiplierInterval = null;
        }

        function sendGameResult(isWin) {
            if (!tg.sendData) return;
            const payload = JSON.stringify({
                action: "crash_result",
                win: isWin,
                bet: currentBet,
                multiplier: isWin ? currentMulti : crashPoint
            });
            tg.sendData(payload);
        }

        function addToHistory(val) {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerText = val.toFixed(2) + 'x';
            historyDiv.prepend(div);
            if (historyDiv.children.length > 10) historyDiv.removeChild(historyDiv.lastChild);
            if (val > bestMulti) {
                bestMulti = val;
                localStorage.setItem('crash_best', bestMulti);
                bestSpan.innerText = `🏆 РЕКОРД: ${bestMulti.toFixed(2)}x`;
            }
        }

        function startGame() {
            let amount = parseInt(betInput.value);
            if (isNaN(amount)) amount = 100;
            amount = Math.min(5000, Math.max(10, amount));
            betInput.value = amount;
            currentBet = amount;
            crashPoint = generateCrashPoint();
            hasBet = true;
            hasCashedOut = false;
            gameActive = true;
            progress = 0;
            updateRocketPosition(0);
            initMeteors();
            trail = [];
            explosionActive = false;
            flashAlpha = 0;
            startBtn.disabled = true;
            cashoutBtn.disabled = false;
            betInput.disabled = true;
            startMultiplierGrowth();
            statusSpan.innerHTML = `🚀 СТАВКА ${amount}₽! МНОЖИТЕЛЬ РАСТЁТ...`;
        }

        function cashout() {
            if (!hasBet || hasCashedOut) return;
            if (currentMulti >= crashPoint) {
                statusSpan.innerText = "❌ УЖЕ КРАШ! НЕЛЬЗЯ ЗАБРАТЬ";
                return;
            }
            winEnd();
        }

        function generateCrashPoint() {
            const r = Math.random();
            if (r < 0.48) return 1.10 + Math.random() * 0.90;
            else if (r < 0.78) return 2.00 + Math.random() * 3.00;
            else if (r < 0.94) return 5.00 + Math.random() * 5.00;
            else return 10.00;
        }

        startBtn.onclick = () => { if (!hasBet) startGame(); };
        cashoutBtn.onclick = cashout;

        initPlanets();
        initMeteors();
        updateRocketPosition(0);
        draw();
        animFrame = requestAnimationFrame(animateGame);
    })();
</script>
</body>
</html>
