<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CRASH | Космическая гонка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: radial-gradient(circle at 30% 20%, #03050b, #000000);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Orbitron', system-ui, sans-serif;
            padding: 16px;
        }
        .game-container {
            max-width: 550px;
            width: 100%;
            background: rgba(5, 10, 25, 0.75);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,255,255,0.2);
            border: 1px solid rgba(0,255,255,0.3);
        }
        .rocket-area {
            position: relative;
            margin-bottom: 20px;
            border-radius: 32px;
            overflow: hidden;
            background: #00020a;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: radial-gradient(ellipse at 30% 40%, #0a1030, #010108);
            border-radius: 28px;
            cursor: pointer;
        }
        .multiplier-badge {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(12px);
            padding: 6px 20px;
            border-radius: 60px;
            font-size: 32px;
            font-weight: 800;
            font-family: monospace;
            letter-spacing: 2px;
            color: #ffdd77;
            text-shadow: 0 0 12px #ffaa33;
            border: 1px solid rgba(255,200,100,0.6);
            white-space: nowrap;
            z-index: 10;
        }
        .multiplier-badge span {
            font-size: 20px;
            color: #ffaa55;
        }
        .bet-area {
            background: rgba(10, 20, 35, 0.8);
            border-radius: 36px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid #2a3a66;
        }
        .bet-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            color: #bbddff;
            font-size: 14px;
            font-weight: 600;
        }
        .bet-input-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }
        .bet-input {
            flex: 2;
            min-width: 120px;
            background: #010614;
            border: 1px solid #3a4a7a;
            border-radius: 60px;
            padding: 14px 20px;
            color: #ffdd99;
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            outline: none;
            font-family: monospace;
        }
        .bet-input:focus { border-color: #ffaa44; box-shadow: 0 0 8px #ffaa44; }
        .action-buttons {
            display: flex;
            gap: 12px;
            flex: 1;
            justify-content: center;
        }
        button {
            background: #1e2a44;
            border: none;
            border-radius: 60px;
            padding: 12px 24px;
            font-weight: 700;
            font-size: 18px;
            color: white;
            cursor: pointer;
            transition: 0.15s;
            flex: 1;
            min-width: 120px;
            box-shadow: 0 5px 0 #0a0f1a;
            font-family: inherit;
        }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #0a0f1a; }
        .btn-bet {
            background: linear-gradient(135deg, #f0a34e, #f57c00);
            color: #1f1f1f;
            font-weight: 800;
            text-shadow: 0 1px 0 #ffcc88;
        }
        .btn-cashout {
            background: linear-gradient(135deg, #2dd4bf, #14b8a6);
            font-weight: 800;
        }
        .btn-cashout:disabled { opacity: 0.5; transform: none; cursor: not-allowed; }
        .history {
            background: rgba(0,0,0,0.5);
            border-radius: 28px;
            padding: 12px;
        }
        .history-title {
            font-size: 12px;
            color: #8e9ab0;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }
        .history-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .history-item {
            background: #1a1f30;
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 15px;
            font-family: monospace;
            color: #ffcc77;
            box-shadow: inset 0 0 2px #ffaa33;
        }
        .status {
            text-align: center;
            font-size: 12px;
            margin-top: 12px;
            color: #aaccff;
            font-weight: 500;
            text-shadow: 0 0 4px #0066aa;
        }
        @media (max-width: 480px) {
            .bet-input-wrapper { flex-direction: column; }
            .action-buttons { flex-direction: row; }
            button { min-width: auto; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="rocket-area">
        <div class="multiplier-badge" id="multiplierDisplay">1.00<span>x</span></div>
        <canvas id="crashCanvas" width="700" height="400" style="width:100%; height:auto;"></canvas>
    </div>
    <div class="bet-area">
        <div class="bet-label">
            <span>🚀 СТАВКА (₽)</span>
            <span>⚡ 10 – 5000</span>
        </div>
        <div class="bet-input-wrapper">
            <input type="number" id="betAmount" class="bet-input" value="100" step="10">
            <div class="action-buttons">
                <button id="betButton" class="btn-bet">🛸 СТАРТ</button>
                <button id="cashoutButton" class="btn-cashout" disabled>💎 ЗАБРАТЬ</button>
            </div>
        </div>
    </div>
    <div class="history">
        <div class="history-title">📡 ИСТОРИЯ КАТАСТРОФ</div>
        <div class="history-list" id="historyList">—</div>
    </div>
    <div class="status" id="statusMsg">✨ ГОТОВ К СТАРТУ ✨</div>
</div>
<script src="https://telegram.org/js/telegram-web-app.js?56"></script>
<script>
    (function(){
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let userId = null;
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('userId')) userId = urlParams.get('userId');
        else if (tg.initDataUnsafe?.user?.id) userId = tg.initDataUnsafe.user.id;

        // DOM элементы
        const betAmountInput = document.getElementById('betAmount');
        const betBtn = document.getElementById('betButton');
        const cashoutBtn = document.getElementById('cashoutButton');
        const multiplierSpan = document.getElementById('multiplierDisplay');
        const historyDiv = document.getElementById('historyList');
        const statusSpan = document.getElementById('statusMsg');
        const canvas = document.getElementById('crashCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = 700;
        canvas.height = 400;

        // Игровые переменные
        let currentBet = 0;
        let hasBet = false;
        let hasCashedOut = false;
        let currentMultiplier = 1.0;
        let crashPoint = 1.1;
        let animFrame = null;
        let multiplierInterval = null;
        
        // Параметры полёта
        let progress = 0;          // 0..1
        const START_X = 50;
        const END_X = canvas.width - 70;
        const PATH_AMP = 28;       // амплитуда синусоиды
        let rocket = { x: START_X, y: canvas.height/2, angle: 0 };
        let trail = [];
        let meteors = [];
        let explosionParticles = [];
        let explosionActive = false;
        let gameActive = false;

        // Инициализация метеоритов
        function initMeteors() {
            meteors = [];
            for (let i = 0; i < 10; i++) {
                meteors.push({
                    x: canvas.width + 50 + Math.random() * 200,
                    y: 30 + Math.random() * (canvas.height - 60),
                    size: 12 + Math.random() * 20,
                    speed: 1.2 + Math.random() * 2.2,
                    rotation: Math.random() * Math.PI * 2,
                    rotSpeed: (Math.random() - 0.5) * 0.03,
                    glow: 0.4 + Math.random() * 0.6,
                    color1: `hsl(${20 + Math.random() * 30}, 70%, 55%)`,
                    color2: `hsl(${10 + Math.random() * 20}, 80%, 40%)`
                });
            }
        }

        // Обновление позиции ракеты по прогрессу
        function updateRocketPosition(prog) {
            const x = START_X + prog * (END_X - START_X);
            const t = (x - START_X) / (END_X - START_X);
            const offsetY = Math.sin(t * Math.PI * 2) * PATH_AMP;
            let y = canvas.height/2 + offsetY;
            y = Math.min(canvas.height - 40, Math.max(40, y));
            rocket.x = x;
            rocket.y = y;
            // угол наклона по производной синуса
            const angleRad = Math.atan2(Math.cos(t * Math.PI * 2) * PATH_AMP * (Math.PI * 2 / (END_X - START_X)), 1);
            rocket.angle = angleRad;
            // след
            trail.unshift({ x: rocket.x, y: rocket.y });
            if (trail.length > 20) trail.pop();
        }

        // Обновление метеоритов
        function updateMeteors() {
            for (let m of meteors) {
                m.x -= m.speed;
                m.rotation += m.rotSpeed;
                if (m.x + m.size < 0) {
                    m.x = canvas.width + 50 + Math.random() * 200;
                    m.y = 30 + Math.random() * (canvas.height - 60);
                    m.size = 12 + Math.random() * 20;
                    m.speed = 1.2 + Math.random() * 2.2;
                    m.glow = 0.4 + Math.random() * 0.6;
                }
            }
        }

        // Добавление взрыва
        function addExplosion(x, y) {
            explosionParticles = [];
            for (let i = 0; i < 60; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 2 + Math.random() * 5;
                const vx = Math.cos(angle) * speed;
                const vy = Math.sin(angle) * speed;
                explosionParticles.push({
                    x: x, y: y, vx: vx, vy: vy,
                    life: 1.0, size: 3 + Math.random() * 8,
                    color: `hsl(${20 + Math.random() * 40}, 100%, 60%)`
                });
            }
            explosionActive = true;
        }

        function updateExplosion() {
            if (!explosionActive) return;
            let anyAlive = false;
            for (let p of explosionParticles) {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                if (p.life > 0) anyAlive = true;
            }
            if (!anyAlive) explosionActive = false;
        }

        // Отрисовка всего
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // звёзды
            ctx.fillStyle = '#010208';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < 300; i++) {
                ctx.fillStyle = `rgba(255,240,200,${0.2 + Math.random() * 0.5})`;
                ctx.fillRect((i*131)%canvas.width, (i*253)%canvas.height, 1.5, 1.5);
            }
            // метеориты
            for (let m of meteors) {
                ctx.save();
                ctx.translate(m.x, m.y);
                ctx.rotate(m.rotation);
                ctx.shadowBlur = 10;
                ctx.shadowColor = `rgba(255,80,40,${m.glow})`;
                // основной камень
                ctx.beginPath();
                ctx.moveTo(0, -m.size/1.5);
                ctx.lineTo(m.size/1.8, m.size/2.2);
                ctx.lineTo(0, m.size/2.5);
                ctx.lineTo(-m.size/1.8, m.size/2.2);
                ctx.fillStyle = m.color1;
                ctx.fill();
                // внутренние трещины
                ctx.fillStyle = m.color2;
                ctx.beginPath();
                ctx.moveTo(-m.size/4, -m.size/3);
                ctx.lineTo(m.size/5, -m.size/5);
                ctx.lineTo(0, m.size/6);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(m.size/3, m.size/4);
                ctx.lineTo(m.size/5, m.size/2);
                ctx.lineTo(-m.size/6, m.size/3);
                ctx.fill();
                ctx.restore();
            }
            // след ракеты
            for (let i=0; i<trail.length; i++) {
                let alpha = 1 - i / trail.length;
                ctx.fillStyle = `rgba(255,140,60,${alpha*0.4})`;
                ctx.beginPath();
                ctx.arc(trail[i].x, trail[i].y, 5 * alpha, 0, Math.PI*2);
                ctx.fill();
            }
            // взрыв
            if (explosionActive) {
                for (let p of explosionParticles) {
                    if (p.life <= 0) continue;
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
            }
            // ракета (качественная)
            ctx.save();
            ctx.translate(rocket.x, rocket.y);
            ctx.rotate(rocket.angle);
            ctx.shadowBlur = 12;
            ctx.shadowColor = '#ffaa44';
            // корпус
            ctx.fillStyle = '#dd6644';
            ctx.beginPath();
            ctx.moveTo(0, -16);
            ctx.lineTo(10, 5);
            ctx.lineTo(5, 12);
            ctx.lineTo(0, 8);
            ctx.lineTo(-5, 12);
            ctx.lineTo(-10, 5);
            ctx.fill();
            ctx.fillStyle = '#ff9966';
            ctx.beginPath();
            ctx.moveTo(0, -10);
            ctx.lineTo(6, 2);
            ctx.lineTo(-6, 2);
            ctx.fill();
            // иллюминатор
            ctx.fillStyle = '#88ccff';
            ctx.beginPath();
            ctx.arc(0, -3, 3, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#2266aa';
            ctx.beginPath();
            ctx.arc(0, -3, 1.5, 0, Math.PI*2);
            ctx.fill();
            // крылья
            ctx.fillStyle = '#aa4422';
            ctx.beginPath();
            ctx.moveTo(-8, 4);
            ctx.lineTo(-14, 10);
            ctx.lineTo(-6, 8);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(8, 4);
            ctx.lineTo(14, 10);
            ctx.lineTo(6, 8);
            ctx.fill();
            // пламя
            ctx.fillStyle = '#ff3300';
            ctx.beginPath();
            ctx.moveTo(-4, 10);
            ctx.lineTo(0, 18);
            ctx.lineTo(4, 10);
            ctx.fill();
            ctx.fillStyle = '#ffaa33';
            ctx.beginPath();
            ctx.moveTo(-2, 10);
            ctx.lineTo(0, 14);
            ctx.lineTo(2, 10);
            ctx.fill();
            ctx.restore();

            // трасса
            ctx.beginPath();
            ctx.setLineDash([8, 12]);
            ctx.strokeStyle = '#44ccff';
            ctx.lineWidth = 1.5;
            for (let t=0; t<=1; t+=0.02) {
                let x = START_X + t * (END_X - START_X);
                let off = Math.sin(t * Math.PI * 2) * PATH_AMP;
                let y = canvas.height/2 + off;
                if (t===0) ctx.moveTo(x,y);
                else ctx.lineTo(x,y);
            }
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function animate() {
            if (gameActive && hasBet && !hasCashedOut) {
                let deltaProgress = 0.008 * (1 + currentMultiplier/4);
                progress += deltaProgress;
                if (progress >= 1) progress = 1;
                updateRocketPosition(progress);
                updateMeteors();
                // проверка краша
                if (currentMultiplier >= crashPoint && !hasCashedOut) {
                    hasCashedOut = true;
                    gameActive = false;
                    addExplosion(rocket.x, rocket.y);
                    sendGameResult(false);
                    statusSpan.innerText = `💥 КРАШ! ВЫ ПРОИГРАЛИ ${currentBet}₽ (x${crashPoint.toFixed(2)})`;
                    addToHistory(crashPoint);
                    clearMultiplierUpdate();
                }
            }
            updateExplosion();
            draw();
            animFrame = requestAnimationFrame(animate);
        }

        function startMultiplierGrowth() {
            if (multiplierInterval) clearInterval(multiplierInterval);
            currentMultiplier = 1.0;
            multiplierSpan.innerHTML = currentMultiplier.toFixed(2) + "<span>x</span>";
            multiplierInterval = setInterval(() => {
                if (!hasBet || hasCashedOut) return;
                currentMultiplier += 0.025;
                multiplierSpan.innerHTML = currentMultiplier.toFixed(2) + "<span>x</span>";
            }, 40);
        }

        function clearMultiplierUpdate() {
            if (multiplierInterval) clearInterval(multiplierInterval);
            multiplierInterval = null;
        }

        function sendGameResult(isWin) {
            if (!tg.sendData) return;
            const payload = JSON.stringify({
                action: "crash_result",
                win: isWin,
                bet: currentBet,
                multiplier: isWin ? currentMultiplier : crashPoint
            });
            tg.sendData(payload);
        }

        function addToHistory(val) {
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerText = val.toFixed(2) + 'x';
            historyDiv.prepend(item);
            if (historyDiv.children.length > 12) historyDiv.removeChild(historyDiv.lastChild);
        }

        function resetRound() {
            clearMultiplierUpdate();
            hasBet = false;
            hasCashedOut = false;
            gameActive = false;
            explosionActive = false;
            progress = 0;
            currentMultiplier = 1.0;
            multiplierSpan.innerHTML = "1.00<span>x</span>";
            rocket.x = START_X;
            rocket.y = canvas.height/2;
            rocket.angle = 0;
            trail = [];
            explosionParticles = [];
            updateRocketPosition(0);
            initMeteors();
            draw();
            betBtn.disabled = false;
            cashoutBtn.disabled = true;
            betAmountInput.disabled = false;
            statusSpan.innerHTML = "🛸 ГОТОВ К СТАРТУ";
        }

        function startGame() {
            let amount = parseInt(betAmountInput.value);
            if (isNaN(amount)) amount = 100;
            amount = Math.min(5000, Math.max(10, amount));
            betAmountInput.value = amount;
            currentBet = amount;
            crashPoint = generateCrashPoint();
            hasBet = true;
            hasCashedOut = false;
            gameActive = true;
            progress = 0;
            updateRocketPosition(0);
            initMeteors();
            trail = [];
            explosionActive = false;
            betBtn.disabled = true;
            cashoutBtn.disabled = false;
            betAmountInput.disabled = true;
            startMultiplierGrowth();
            statusSpan.innerHTML = `🚀 СТАВКА ${amount}₽! МНОЖИТЕЛЬ РАСТЁТ...`;
        }

        function cashout() {
            if (!hasBet || hasCashedOut) return;
            if (currentMultiplier >= crashPoint) {
                statusSpan.innerText = "❌ УЖЕ КРАШ! НЕЛЬЗЯ ЗАБРАТЬ";
                return;
            }
            hasCashedOut = true;
            gameActive = false;
            clearMultiplierUpdate();
            sendGameResult(true);
            statusSpan.innerText = `🎉 ЗАБРАЛИ! x${currentMultiplier.toFixed(2)} → +${Math.floor(currentBet * currentMultiplier)}₽`;
            addToHistory(currentMultiplier);
            cashoutBtn.disabled = true;
            betBtn.disabled = false;
            betAmountInput.disabled = false;
        }

        function generateCrashPoint() {
            const r = Math.random();
            if (r < 0.50) return 1.10 + Math.random() * 0.90;
            else if (r < 0.80) return 2.00 + Math.random() * 3.00;
            else if (r < 0.95) return 5.00 + Math.random() * 5.00;
            else return 10.00;
        }

        betBtn.onclick = startGame;
        cashoutBtn.onclick = cashout;

        // Инициализация
        initMeteors();
        updateRocketPosition(0);
        draw();
        animFrame = requestAnimationFrame(animate);
    })();
</script>
</body>
</html>
