<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CRASH | Космическая гонка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: radial-gradient(circle at 30% 20%, #03050b, #000000);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Orbitron', system-ui, sans-serif;
            padding: 16px;
        }
        .game-container {
            max-width: 550px;
            width: 100%;
            background: rgba(5, 10, 25, 0.75);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,255,255,0.2);
            border: 1px solid rgba(0,255,255,0.3);
        }
        .rocket-area {
            position: relative;
            margin-bottom: 20px;
            border-radius: 32px;
            overflow: hidden;
            background: #00020a;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: radial-gradient(ellipse at 30% 40%, #0a1030, #010108);
            border-radius: 28px;
            cursor: pointer;
        }
        .multiplier-badge {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(12px);
            padding: 6px 20px;
            border-radius: 60px;
            font-size: 32px;
            font-weight: 800;
            font-family: monospace;
            letter-spacing: 2px;
            color: #ffdd77;
            text-shadow: 0 0 12px #ffaa33;
            border: 1px solid rgba(255,200,100,0.6);
            white-space: nowrap;
            z-index: 10;
        }
        .multiplier-badge span {
            font-size: 20px;
            color: #ffaa55;
        }
        .bet-area {
            background: rgba(10, 20, 35, 0.8);
            border-radius: 36px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid #2a3a66;
        }
        .bet-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            color: #bbddff;
            font-size: 14px;
            font-weight: 600;
        }
        .bet-input-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }
        .bet-input {
            flex: 2;
            min-width: 120px;
            background: #010614;
            border: 1px solid #3a4a7a;
            border-radius: 60px;
            padding: 14px 20px;
            color: #ffdd99;
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            outline: none;
            font-family: monospace;
        }
        .bet-input:focus { border-color: #ffaa44; box-shadow: 0 0 8px #ffaa44; }
        .action-buttons {
            display: flex;
            gap: 12px;
            flex: 1;
            justify-content: center;
        }
        button {
            background: #1e2a44;
            border: none;
            border-radius: 60px;
            padding: 12px 24px;
            font-weight: 700;
            font-size: 18px;
            color: white;
            cursor: pointer;
            transition: 0.15s;
            flex: 1;
            min-width: 120px;
            box-shadow: 0 5px 0 #0a0f1a;
            font-family: inherit;
        }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #0a0f1a; }
        .btn-bet {
            background: linear-gradient(135deg, #f0a34e, #f57c00);
            color: #1f1f1f;
            font-weight: 800;
            text-shadow: 0 1px 0 #ffcc88;
        }
        .btn-cashout {
            background: linear-gradient(135deg, #2dd4bf, #14b8a6);
            font-weight: 800;
        }
        .btn-cashout:disabled { opacity: 0.5; transform: none; cursor: not-allowed; }
        .history {
            background: rgba(0,0,0,0.5);
            border-radius: 28px;
            padding: 12px;
        }
        .history-title {
            font-size: 12px;
            color: #8e9ab0;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }
        .history-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .history-item {
            background: #1a1f30;
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 15px;
            font-family: monospace;
            color: #ffcc77;
            box-shadow: inset 0 0 2px #ffaa33;
        }
        .status {
            text-align: center;
            font-size: 12px;
            margin-top: 12px;
            color: #aaccff;
            font-weight: 500;
            text-shadow: 0 0 4px #0066aa;
        }
        @media (max-width: 480px) {
            .bet-input-wrapper { flex-direction: column; }
            .action-buttons { flex-direction: row; }
            button { min-width: auto; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="rocket-area">
        <div class="multiplier-badge" id="multiplierDisplay">1.00<span>x</span></div>
        <canvas id="crashCanvas" width="700" height="400" style="width:100%; height:auto;"></canvas>
    </div>
    <div class="bet-area">
        <div class="bet-label">
            <span>🚀 СТАВКА (₽)</span>
            <span>⚡ 10 – 5000</span>
        </div>
        <div class="bet-input-wrapper">
            <input type="number" id="betAmount" class="bet-input" value="100" step="10">
            <div class="action-buttons">
                <button id="betButton" class="btn-bet">🛸 СТАРТ</button>
                <button id="cashoutButton" class="btn-cashout" disabled>💎 ЗАБРАТЬ</button>
            </div>
        </div>
    </div>
    <div class="history">
        <div class="history-title">📡 ИСТОРИЯ КАТАСТРОФ</div>
        <div class="history-list" id="historyList">—</div>
    </div>
    <div class="status" id="statusMsg">✨ ГОТОВ К СТАРТУ ✨</div>
</div>
<script src="https://telegram.org/js/telegram-web-app.js?56"></script>
<script>
    (function(){
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let userId = null;
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('userId')) userId = urlParams.get('userId');
        else if (tg.initDataUnsafe?.user?.id) userId = tg.initDataUnsafe.user.id;

        // DOM элементы
        const betAmountInput = document.getElementById('betAmount');
        const betBtn = document.getElementById('betButton');
        const cashoutBtn = document.getElementById('cashoutButton');
        const multiplierSpan = document.getElementById('multiplierDisplay');
        const historyDiv = document.getElementById('historyList');
        const statusSpan = document.getElementById('statusMsg');
        const canvas = document.getElementById('crashCanvas');
        const ctx = canvas.getContext('2d');

        // Размеры canvas (фикс)
        canvas.width = 700;
        canvas.height = 400;

        // Игровые переменные
        let currentBet = 0;
        let hasBet = false;
        let hasCashedOut = false;
        let currentMultiplier = 1.0;
        let crashPoint = 1.1;
        let animFrame = null;
        let lastTimestamp = 0;

        // === Анимационные объекты ===
        let rocket = { x: 60, y: 200, angle: 0 };         // начальная позиция
        let meteors = [];
        let trail = [];        // след ракеты (массив {x,y})
        let particles = [];    // частицы взрыва
        let explosionActive = false;
        let explosionTime = 0;
        let gameActive = false;   // флаг анимации (полёт)
        let progress = 0;         // 0..1 по x
        const START_X = 50;
        const END_X = canvas.width - 70;
        const PATH_AMP = 25;      // амплитуда синусоиды

        // Генерация метеоритов
        function initMeteors() {
            meteors = [];
            const count = 12;
            for (let i = 0; i < count; i++) {
                meteors.push({
                    x: canvas.width + 30 + Math.random() * 200,
                    y: 40 + Math.random() * (canvas.height - 80),
                    size: 8 + Math.random() * 18,
                    speed: 1.2 + Math.random() * 2.5,
                    rotation: Math.random() * Math.PI * 2,
                    rotSpeed: (Math.random() - 0.5) * 0.05,
                    glow: Math.random() * 0.5
                });
            }
        }

        // Добавление частиц взрыва
        function addExplosion(px, py) {
            particles = [];
            for (let i = 0; i < 45; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 1.5 + Math.random() * 4;
                const vx = Math.cos(angle) * speed;
                const vy = Math.sin(angle) * speed;
                particles.push({
                    x: px, y: py, vx: vx, vy: vy,
                    life: 1.0, size: 3 + Math.random() * 6,
                    color: `hsl(${20 + Math.random() * 40}, 100%, 60%)`
                });
            }
            explosionActive = true;
            explosionTime = 0;
        }

        // Обновление метеоритов (движение)
        function updateMeteors() {
            for (let i = 0; i < meteors.length; i++) {
                let m = meteors[i];
                m.x -= m.speed;
                m.rotation += m.rotSpeed;
                if (m.x + m.size < 0) {
                    // переиспользуем: появляем справа с новыми параметрами
                    m.x = canvas.width + 30 + Math.random() * 150;
                    m.y = 40 + Math.random() * (canvas.height - 80);
                    m.size = 8 + Math.random() * 18;
                    m.speed = 1.2 + Math.random() * 2.5;
                    m.glow = Math.random() * 0.5;
                }
            }
        }

        // Обновление позиции ракеты по прогрессу (0..1)
        function updateRocketPosition(prog) {
            const x = START_X + prog * (END_X - START_X);
            // синусоидальная траектория: y = центр + sin(частота * x) * амплитуда
            const t = (x - START_X) / (END_X - START_X);
            const offsetY = Math.sin(t * Math.PI * 2) * PATH_AMP;
            let y = canvas.height/2 + offsetY;
            y = Math.min(canvas.height - 35, Math.max(35, y));
            rocket.x = x;
            rocket.y = y;
            // угол наклона по касательной (производная sin)
            const angleRad = Math.atan2(Math.cos(t * Math.PI * 2) * PATH_AMP * (Math.PI * 2 / (END_X - START_X)), 1);
            rocket.angle = angleRad;
            // добавление следа
            trail.unshift({ x: rocket.x, y: rocket.y });
            if (trail.length > 25) trail.pop();
        }

        // Отрисовка всего
        function drawScene() {
            if (!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // звёздный фон
            ctx.fillStyle = '#010208';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < 200; i++) {
                if (i%2 === 0) continue; // динамические звёзды
                ctx.fillStyle = `rgba(255,240,200,${0.3+Math.random()*0.4})`;
                ctx.fillRect((i*131)%canvas.width, (i*253)%canvas.height, 1.5, 1.5);
            }
            // рисуем метеориты
            for (let m of meteors) {
                ctx.save();
                ctx.translate(m.x, m.y);
                ctx.rotate(m.rotation);
                ctx.shadowBlur = 8;
                ctx.shadowColor = `rgba(255,80,40,${m.glow})`;
                ctx.fillStyle = '#aa5533';
                ctx.beginPath();
                ctx.moveTo(0, -m.size/1.5);
                ctx.lineTo(m.size/1.8, m.size/2);
                ctx.lineTo(0, m.size/2.5);
                ctx.lineTo(-m.size/1.8, m.size/2);
                ctx.fill();
                ctx.fillStyle = '#ff8844';
                ctx.beginPath();
                ctx.moveTo(0, -m.size/2.2);
                ctx.lineTo(m.size/3, m.size/3);
                ctx.lineTo(0, m.size/4);
                ctx.lineTo(-m.size/3, m.size/3);
                ctx.fill();
                ctx.restore();
            }
            // след ракеты (дымок)
            for (let i=0; i<trail.length; i++) {
                let alpha = 1 - i / trail.length;
                ctx.fillStyle = `rgba(255,120,50,${alpha*0.5})`;
                ctx.beginPath();
                ctx.arc(trail[i].x, trail[i].y, 4 * alpha, 0, Math.PI*2);
                ctx.fill();
            }
            // взрывные частицы
            if (explosionActive) {
                for (let p of particles) {
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
            }
            // ракета
            ctx.save();
            ctx.translate(rocket.x, rocket.y);
            ctx.rotate(rocket.angle);
            ctx.shadowBlur = 12;
            ctx.shadowColor = '#ffaa44';
            // корпус
            ctx.fillStyle = '#dd6644';
            ctx.beginPath();
            ctx.moveTo(0, -12);
            ctx.lineTo(8, 4);
            ctx.lineTo(4, 8);
            ctx.lineTo(0, 5);
            ctx.lineTo(-4, 8);
            ctx.lineTo(-8, 4);
            ctx.fill();
            ctx.fillStyle = '#ffaa66';
            ctx.beginPath();
            ctx.moveTo(0, -8);
            ctx.lineTo(5, 2);
            ctx.lineTo(-5, 2);
            ctx.fill();
            // пламя
            ctx.fillStyle = '#ff3300';
            ctx.beginPath();
            ctx.moveTo(-3, 8);
            ctx.lineTo(0, 14);
            ctx.lineTo(3, 8);
            ctx.fill();
            ctx.fillStyle = '#ffaa33';
            ctx.beginPath();
            ctx.moveTo(-2, 8);
            ctx.lineTo(0, 12);
            ctx.lineTo(2, 8);
            ctx.fill();
            ctx.restore();

            // линия трассы (пунктир)
            ctx.beginPath();
            ctx.setLineDash([8, 12]);
            ctx.strokeStyle = '#44ccff';
            ctx.lineWidth = 1.5;
            for (let t=0; t<=1; t+=0.02) {
                let x = START_X + t * (END_X - START_X);
                let yOff = Math.sin(t * Math.PI * 2) * PATH_AMP;
                let y = canvas.height/2 + yOff;
                if (t===0) ctx.moveTo(x,y);
                else ctx.lineTo(x,y);
            }
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // Анимационный цикл
        function animateGame(now) {
            if (!gameActive && !explosionActive) {
                if (animFrame) cancelAnimationFrame(animFrame);
                animFrame = null;
                return;
            }
            if (gameActive && hasBet && !hasCashedOut) {
                // увеличиваем прогресс в зависимости от множителя (скорость)
                let delta = 0.008 * (1 + currentMultiplier/5);
                progress += delta;
                if (progress >= 1) progress = 1;
                updateRocketPosition(progress);
                updateMeteors();
                // проверка столкновения с метеоритами, если множитель достиг краш-точки
                if (currentMultiplier >= crashPoint && !hasCashedOut) {
                    // КРАШ! Ракета врезается в ближайший метеорит
                    hasCashedOut = true;
                    gameActive = false;
                    addExplosion(rocket.x, rocket.y);
                    // уведомляем бота о проигрыше
                    sendGameResult(false);
                    statusSpan.innerText = `💥 КРАШ! ВЫ ПРОИГРАЛИ ${currentBet}₽ (x${crashPoint.toFixed(2)})`;
                    addToHistory(crashPoint);
                    // остановим множитель
                    clearMultiplierUpdate();
                }
            }
            drawScene();
            animFrame = requestAnimationFrame(animateGame);
        }

        let multiplierInterval = null;
        function startMultiplierGrowth() {
            if (multiplierInterval) clearInterval(multiplierInterval);
            currentMultiplier = 1.0;
            updateMultiplierUI();
            multiplierInterval = setInterval(() => {
                if (!hasBet || hasCashedOut) return;
                currentMultiplier += 0.025;
                updateMultiplierUI();
                if (currentMultiplier >= crashPoint && !hasCashedOut) {
                    // краш обработается в animate через коллизию
                }
            }, 40);
        }
        function clearMultiplierUpdate() {
            if (multiplierInterval) clearInterval(multiplierInterval);
            multiplierInterval = null;
        }
        function updateMultiplierUI() {
            multiplierSpan.innerHTML = currentMultiplier.toFixed(2) + "<span>x</span>";
        }

        function sendGameResult(isWin) {
            if (!tg.sendData) return;
            const payload = JSON.stringify({
                action: "crash_result",
                win: isWin,
                bet: currentBet,
                multiplier: isWin ? currentMultiplier : crashPoint
            });
            tg.sendData(payload);
            console.log("result sent", payload);
        }

        function addToHistory(val) {
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerText = val.toFixed(2) + 'x';
            historyDiv.prepend(item);
            if (historyDiv.children.length > 12) historyDiv.removeChild(historyDiv.lastChild);
        }

        function resetGame() {
            clearMultiplierUpdate();
            if (animFrame) cancelAnimationFrame(animFrame);
            gameActive = false;
            explosionActive = false;
            hasBet = false;
            hasCashedOut = false;
            progress = 0;
            currentMultiplier = 1.0;
            updateMultiplierUI();
            rocket.x = START_X;
            rocket.y = canvas.height/2;
            rocket.angle = 0;
            trail = [];
            particles = [];
            updateRocketPosition(0);
            initMeteors();
            drawScene();
            betBtn.disabled = false;
            cashoutBtn.disabled = true;
            betAmountInput.disabled = false;
            statusSpan.innerHTML = "🛸 ГОТОВ К СТАРТУ";
        }

        // Старт игры
        function startGame() {
            let amount = parseInt(betAmountInput.value);
            if (isNaN(amount)) amount = 100;
            amount = Math.min(5000, Math.max(10, amount));
            betAmountInput.value = amount;
            currentBet = amount;
            crashPoint = generateCrashPoint();  // случайная точка краша
            hasBet = true;
            hasCashedOut = false;
            betBtn.disabled = true;
            cashoutBtn.disabled = false;
            betAmountInput.disabled = true;
            progress = 0;
            updateRocketPosition(0);
            initMeteors();
            trail = [];
            explosionActive = false;
            particles = [];
            gameActive = true;
            startMultiplierGrowth();
            if (animFrame) cancelAnimationFrame(animFrame);
            animFrame = requestAnimationFrame(animateGame);
            statusSpan.innerHTML = `🚀 СТАВКА ${amount}₽! МНОЖИТЕЛЬ РАСТЁТ...`;
        }

        function generateCrashPoint() {
            const r = Math.random();
            if (r < 0.50) return 1.10 + Math.random() * 0.90;
            else if (r < 0.80) return 2.00 + Math.random() * 3.00;
            else if (r < 0.95) return 5.00 + Math.random() * 5.00;
            else return 10.00;
        }

        // Кешаут
        function cashout() {
            if (!hasBet || hasCashedOut) return;
            if (currentMultiplier >= crashPoint) {
                statusSpan.innerText = "❌ УЖЕ КРАШ! НЕЛЬЗЯ ЗАБРАТЬ";
                return;
            }
            hasCashedOut = true;
            gameActive = false;
            clearMultiplierUpdate();
            sendGameResult(true);
            statusSpan.innerText = `🎉 ЗАБРАЛИ! x${currentMultiplier.toFixed(2)} → +${Math.floor(currentBet * currentMultiplier)}₽`;
            addToHistory(currentMultiplier);
            cashoutBtn.disabled = true;
            betBtn.disabled = false;
            betAmountInput.disabled = false;
            // через 2 секунды можно начать новую игру, но оставим кнопку СТАРТ доступной
        }

        // Обработчики кнопок
        betBtn.onclick = () => {
            if (hasBet) {
                statusSpan.innerText = "⚠️ ИГРА УЖЕ ИДЁТ!";
                return;
            }
            startGame();
        };
        cashoutBtn.onclick = () => {
            if (!hasBet || hasCashedOut) return;
            cashout();
        };

        // Инициализация
        function init() {
            resetGame();
        }
        init();
    })();
</script>
</body>
</html>
