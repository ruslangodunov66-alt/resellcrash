<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>⚡ CRASH | R-GAME</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,600;0,800;1,800&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #05080d;
            --container-bg: #0d121a;
            --panel-bg: #151d29;
            --accent-blue: #1882ff;
            --accent-blue-hover: #3b95ff;
            --accent-green: #1bd15d;
            --accent-red: #f03043;
            --accent-orange: #ff9800;
            --text-main: #e2e8f0;
            --text-muted: #8c9eb5;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; padding: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
            display: flex; justify-content: center;
        }

        .game-container {
            width: 100%; max-width: 800px;
            height: 100vh; height: -webkit-fill-available;
            background-color: var(--container-bg);
            display: flex; flex-direction: column;
            padding: 10px 10px calc(10px + var(--tg-viewport-safe-area-inset-bottom, 0px)) 10px;
        }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 5px; margin-bottom: 10px;
        }
        /* Курсив для R-GAME */
        .brand { font-weight: 800; font-size: 22px; text-transform: uppercase; letter-spacing: -0.5px; font-style: italic; }
        .brand span { color: var(--accent-blue); }
        .info-card {
            background: var(--panel-bg);
            padding: 8px 14px; border-radius: 12px;
            font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .rocket-area {
            flex-grow: 1; min-height: 200px; max-height: 450px;
            position: relative; overflow: hidden;
            border-radius: 16px; margin-bottom: 10px;
            background: #020407;
            border: 2px solid rgba(140, 158, 181, 0.15);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
        }
        #crashCanvas { width: 100%; height: 100%; display: block; }
        .multiplier-badge {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            font-size: 44px; font-weight: 800; text-align: center; font-style: italic;
            text-shadow: 0 0 15px rgba(255,255,255,0.4), 0 4px 10px rgba(0,0,0,0.8);
            transition: color 0.1s ease, transform 0.05s linear;
            z-index: 10;
        }
        .best-score {
            position: absolute; bottom: 8px; right: 12px;
            background: rgba(21, 29, 41, 0.85);
            padding: 6px 10px; border-radius: 8px;
            font-size: 11px; font-weight: 700; color: var(--text-muted);
            backdrop-filter: blur(4px); z-index: 10;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .dashboard-panel {
            background: var(--panel-bg); border-radius: 14px;
            display: flex; gap: 10px; padding: 12px; margin-bottom: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.02);
        }
        .dash-item { flex: 1; }
        .dash-label { font-size: 10px; font-weight: 600; text-transform: uppercase; color: var(--text-muted); margin-bottom: 3px; }
        .dash-val { font-size: 16px; font-weight: 800; font-family: 'Nunito', sans-serif; word-break: break-all; }

        .controls-area { margin-bottom: 10px; background: var(--panel-bg); padding: 15px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.02); }
        .bet-control-row { display: flex; gap: 10px; margin-bottom: 12px; }
        .bet-input-wrapper { flex-grow: 1; position: relative; }
        #betAmount {
            width: 100%; padding: 14px; padding-left: 30px;
            background: var(--container-bg); border: 1.5px solid #263345; border-radius: 12px;
            color: #fff; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 18px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
            appearance: none; -moz-appearance: textfield;
            transition: border-color 0.2s;
        }
        #betAmount:focus { outline: none; border-color: var(--accent-blue); }
        #betAmount::-webkit-inner-spin-button, #betAmount::-webkit-outer-spin-button { appearance: none; margin: 0; }
        .bet-input-wrapper::before { content: '₽'; position: absolute; left: 12px; top: 16px; color: var(--text-muted); font-weight: 600; }
        .btn-main {
            padding: 14px 24px; border: none; border-radius: 12px;
            font-weight: 800; font-size: 16px; text-transform: uppercase; cursor: pointer;
            transition: 0.1s transform ease, 0.1s box-shadow ease, 0.2s background; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }
        .btn-main:active { transform: translateY(1.5px); box-shadow: 0 1px 2px rgba(0,0,0,0.2) !important; }
        .btn-main:disabled { background: #2a374a !important; border-color: #2a374a !important; cursor: not-allowed; opacity: 0.5; pointer-events: none;}
        .btn-start { background: var(--accent-blue); border-bottom: 4px solid #1066cc; box-shadow: 0 4px 0 #1066cc, 0 5px 15px rgba(24, 130, 255, 0.3); }
        .btn-start:hover:not(:disabled) { background: var(--accent-blue-hover); }
        .btn-cashout { background: var(--accent-green); border-bottom: 4px solid #149c45; box-shadow: 0 4px 0 #149c45, 0 5px 15px rgba(27, 209, 93, 0.3); }
        .auto-panel { display: flex; align-items: center; justify-content: space-between; font-size: 13px; color: var(--text-muted); font-weight: 600; }
        .auto-input {
            width: 80px; padding: 6px 10px;
            background: var(--container-bg); border: 1px solid #263345; border-radius: 8px;
            color: var(--accent-blue); font-weight: 800; font-family: 'Nunito', sans-serif; font-size: 14px; text-align: center; margin-left: 8px;
        }

        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn-exit {
            width: 100%; margin-bottom: 12px; padding: 14px;
            background: var(--panel-bg); border: 1px solid rgba(255,255,255,0.05); border-bottom: 3px solid rgba(0,0,0,0.3); border-radius: 12px;
            color: var(--text-main); font-weight: 800; font-size: 14px; cursor: pointer; transition: 0.1s opacity; letter-spacing: 0.5px;
        }
        .btn-exit:hover { opacity: 0.8; background: #1c2738; }
        .btn-exit:active { transform: translateY(1px); border-bottom: 2px solid rgba(0,0,0,0.3); }

        .history { padding: 0 5px; margin-bottom: 10px; }
        .history-title { font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; letter-spacing: 0.5px; }
        .history-list {
            display: flex; gap: 6px; flex-wrap: wrap;
            max-height: 40px; overflow-y: hidden; transition: max-height 0.3s;
        }
        .history-item {
            font-size: 12px; font-weight: 800; padding: 5px 9px; border-radius: 6px;
            font-family: 'Nunito', sans-serif; font-style: italic; border: 1px solid transparent;
        }
        .history-item.low { color: #f03043; background: rgba(240, 48, 67, 0.1); border-color: rgba(240, 48, 67, 0.2); }
        .history-item.medium { color: #3b95ff; background: rgba(59, 149, 255, 0.1); border-color: rgba(59, 149, 255, 0.2); }
        .history-item.high { color: #ff9800; background: rgba(255, 152, 0, 0.1); border-color: rgba(255, 152, 0, 0.2); }
        .history-item.epic { color: #1bd15d; background: rgba(27, 209, 93, 0.15); border-color: rgba(27, 209, 93, 0.4); box-shadow: 0 0 8px rgba(27, 209, 93, 0.3); }

        .status {
            text-align: center; font-size: 13px; font-weight: 600; color: var(--text-muted);
            min-height: 1.2em; padding: 5px; background: rgba(0,0,0,0.2); border-radius: 8px;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="header">
        <div class="brand">R-<span>GAME</span></div>
        <div class="info-card">Баланс: <span id="balanceDisplay" style="color: var(--accent-green);">0₽</span></div>
    </div>

    <div class="rocket-area">
        <div class="multiplier-badge" id="multiplierDisplay">1.00x</div>
        <canvas id="crashCanvas" width="800" height="450"></canvas>
        <div class="best-score" id="bestMultiplier">🏆 РЕКОРД: 1.00x</div>
    </div>

    <div class="dashboard-panel">
        <div class="dash-item">
            <div class="dash-label">Последний результат</div>
            <div class="dash-val" id="lastGameResult">—</div>
        </div>
        <div class="dash-item" style="text-align: right;">
            <div class="dash-label">Статус соединения</div>
            <div class="dash-val" style="color: var(--accent-blue); font-size:14px;">📡 ОНЛАЙН</div>
        </div>
    </div>

    <div class="controls-area">
        <div class="bet-control-row">
            <div class="bet-input-wrapper">
                <input type="number" id="betAmount" min="10" max="5000" step="10" value="100">
            </div>
            <button id="betButton" class="btn-main btn-start">СТАРТ</button>
            <button id="cashoutButton" class="btn-main btn-cashout" disabled>ЗАБРАТЬ</button>
        </div>
        <div class="auto-panel">
            <label for="autoTarget">🎯 Авто-вывод при коэффициенте:</label>
            <input type="number" id="autoTarget" class="auto-input" step="0.1" min="1.01" max="100" value="2.0">
        </div>
    </div>

    <div class="btn-group">
        <button id="menuButton" class="btn-exit">МЕНЮ</button>
        <button id="exitButton" class="btn-exit">ВЫЙТИ</button>
    </div>

    <div class="history">
        <div class="history-title">📡 История крайних полетов</div>
        <div class="history-list" id="historyList">—</div>
    </div>

    <div class="status" id="statusMsg">Готовы к запуску шаттла. Сделайте ставку.</div>
</div>

<script>
    (function(){
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        if (tg.HapticFeedback) tg.enableClosingConfirmation();

        let userId = null;
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('userId')) userId = urlParams.get('userId');
        else if (tg.initDataUnsafe?.user?.id) userId = tg.initDataUnsafe.user.id;

        // DOM
        const betInput = document.getElementById('betAmount');
        const startBtn = document.getElementById('betButton');
        const cashoutBtn = document.getElementById('cashoutButton');
        const exitBtn = document.getElementById('exitButton');
        const menuBtn = document.getElementById('menuButton');
        const multiplierSpan = document.getElementById('multiplierDisplay');
        const historyDiv = document.getElementById('historyList');
        const statusSpan = document.getElementById('statusMsg');
        const bestSpan = document.getElementById('bestMultiplier');
        const autoTargetInput = document.getElementById('autoTarget');
        const lastGameResultSpan = document.getElementById('lastGameResult');
        const balanceSpan = document.getElementById('balanceDisplay');
        const canvas = document.getElementById('crashCanvas');
        const ctx = canvas.getContext('2d');

        // ===== ИСПРАВЛЕНИЕ БАЛАНСА (ВЫДАЕМ БОНУС, ЕСЛИ ПУСТО) =====
        let casinoBalance = parseInt(localStorage.getItem('casinoBalance'));
        if (isNaN(casinoBalance) || casinoBalance === 0) {
            casinoBalance = 10000; // Стартовый баланс, чтобы кнопка СТАРТ работала!
        }
        balanceSpan.innerText = casinoBalance.toLocaleString() + ' ₽';

        function updateBalanceDisplay(newBalance) {
            casinoBalance = newBalance;
            localStorage.setItem('casinoBalance', String(casinoBalance));
            balanceSpan.innerText = casinoBalance.toLocaleString() + ' ₽';
        }

        // ===== НАСТРОЙКИ ИГРЫ =====
        let autoTarget = 2.0;
        autoTargetInput.addEventListener('change', () => {
            let val = parseFloat(autoTargetInput.value);
            if (!isNaN(val) && val >= 1.01) autoTarget = val;
            else autoTarget = null;
        });

        let bestMulti = parseFloat(localStorage.getItem('crash_best_rg')) || 1.0;
        bestSpan.innerText = `🏆 РЕКОРД: ${bestMulti.toFixed(2)}x`;

        // Переменные состояния
        let currentBet = 0;
        let hasBet = false;
        let hasCashedOut = false;
        let currentMulti = 1.0;
        let crashPoint = 1.01;
        let animFrame = null;
        let multiplierInterval = null;
        let gameActive = false;
        let explosionActive = false;
        let flashAlpha = 0;
        let shake = 0;
        let lastTime = 0;

        // Графика
        let stars = [];
        let planets = [];
        let debris = [];
        let particles = [];
        let engineFlames = [];
        let rocket = { x: canvas.width / 2, y: 380, targetY: 380, angle: -Math.PI/2 }; // Угол ровно вверх
        let gridOffsetY = 0;

        // Звуки
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx && window.AudioContext) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                document.body.addEventListener('touchstart', () => audioCtx?.resume(), { once: true });
                document.body.addEventListener('click', () => audioCtx?.resume(), { once: true });
            }
        }
        function playTone(freq, duration, vol = 0.08, type = 'sine') {
            if (!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }
        function soundClick() { playTone(500, 0.05, 0.05); }
        function soundStart() { playTone(440, 0.15, 0.08); setTimeout(() => playTone(554, 0.15, 0.08), 80); setTimeout(() => playTone(659, 0.25, 0.1), 160); }
        function soundCashout() { playTone(880, 0.1, 0.08); setTimeout(() => playTone(1320, 0.15, 0.08), 80); }
        function soundCrash() { playTone(180, 0.4, 0.2, 'sawtooth'); playTone(90, 0.5, 0.15); }
        function soundError() { playTone(280, 0.25, 0.12, 'sawtooth'); }

        function vibrate(style = 'light') {
            if (tg.HapticFeedback) {
                if (style === 'light') tg.HapticFeedback.impactOccurred('light');
                else if (style === 'medium') tg.HapticFeedback.impactOccurred('medium');
                else if (style === 'success') tg.HapticFeedback.notificationOccurred('success');
                else if (style === 'error') tg.HapticFeedback.notificationOccurred('error');
            }
        }

        function initBackground() {
            stars = [];
            for (let i = 0; i < 120; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2.5,
                    speed: 0.2 + Math.random() * 2.5,
                    color: Math.random() > 0.8 ? '#8c9eb5' : '#ffffff'
                });
            }
            planets = [
                { x: 150, y: 50, radius: 35, color: '#1882ff', speed: 0.4 },
                { x: 650, y: 300, radius: 80, color: '#1a2332', speed: 0.15 },
                { x: 700, y: -50, radius: 20, color: '#ff9800', speed: 0.6 }
            ];
            debris = [];
            for (let i = 0; i < 8; i++) {
                debris.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: 2 + Math.random() * 6,
                    speed: 1 + Math.random() * 3,
                    angle: Math.random() * Math.PI * 2,
                    rotSpeed: (Math.random() - 0.5) * 0.2
                });
            }
            rocket.x = canvas.width / 2;
        }

        function updateFlight(deltaTime) {
            let speedMod = gameActive ? (1 + (currentMulti - 1) * 0.8) : 0.2;
            let step = (deltaTime / 16) * speedMod;
            
            // Движение фона вниз
            for (let s of stars) {
                s.y += s.speed * step * 2;
                if (s.y > canvas.height) { s.y = -10; s.x = Math.random() * canvas.width; }
            }
            for (let p of planets) {
                p.y += p.speed * step * 1.5;
                if (p.y - p.radius > canvas.height) { p.y = -p.radius - 20; p.x = Math.random() * canvas.width; }
            }
            for (let d of debris) {
                d.y += d.speed * step * 3;
                d.angle += d.rotSpeed;
                if (d.y > canvas.height + 10) { d.y = -10; d.x = Math.random() * canvas.width; }
            }

            // Движение сетки
            gridOffsetY += step * 1.5;
            if (gridOffsetY > 60) gridOffsetY -= 60;

            if (gameActive && !explosionActive) {
                // Ракета поднимается чуть выше при разгоне
                let progress = Math.min(1, (currentMulti - 1) / 5);
                rocket.targetY = 380 - (canvas.height - 200) * Math.pow(progress, 0.5);
                rocket.y += (rocket.targetY - rocket.y) * 0.05;
                
                // Легкая тряска и смещение по оси X для живости
                rocket.x = (canvas.width / 2) + Math.sin(Date.now() / 150) * (3 + progress * 8);
                rocket.angle = -Math.PI/2 + Math.sin(Date.now() / 200) * 0.05; // Легкий наклон влево-вправо

                // Генерация частиц дыма/огня от двигателя
                if (Math.random() < 0.6 + progress * 0.4) {
                    particles.push({
                        x: rocket.x + (Math.random() - 0.5) * 10,
                        y: rocket.y + 20,
                        vx: (Math.random() - 0.5) * 1.5,
                        vy: 2 + Math.random() * 4 + step * 2, // Летят вниз
                        life: 1.0,
                        size: 4 + Math.random() * 8,
                        color: Math.random() > 0.4 ? 'rgba(255, 152, 0, 0.8)' : 'rgba(240, 48, 67, 0.8)'
                    });
                }
            }

            // Обновление частиц
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.size *= 0.96;
                p.life -= 0.02;
                if (p.life <= 0 || p.size < 0.5) particles.splice(i, 1);
            }

            if (shake > 0) shake -= 0.3;
            if (flashAlpha > 0) flashAlpha -= 0.02; // Медленнее затухает для крутого эффекта
        }

        function triggerExplosion(x, y) {
            explosionActive = true;
            flashAlpha = 0.8;
            shake = 15; // Сильная тряска
            particles = [];
            // Взрыв во все стороны
            for (let i = 0; i < 100; i++) {
                let ang = Math.random() * Math.PI * 2;
                let spd = 3 + Math.random() * 12;
                particles.push({
                    x: x, y: y,
                    vx: Math.cos(ang) * spd,
                    vy: Math.sin(ang) * spd,
                    life: 1.0,
                    size: 5 + Math.random() * 12,
                    color: `hsl(${10 + Math.random() * 40}, 100%, ${50 + Math.random() * 30}%)`
                });
            }
            vibrate('error');
        }

        function draw() {
            ctx.save();
            if (shake > 0) ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
            
            // Глубокий космический фон (туманность)
            let bgGrad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 50, canvas.width/2, canvas.height/2, canvas.width);
            bgGrad.addColorStop(0, '#0a101d');
            bgGrad.addColorStop(1, '#020407');
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Отрисовка планет
            for (let p of planets) {
                let pGrad = ctx.createRadialGradient(p.x - p.radius/3, p.y - p.radius/3, p.radius/4, p.x, p.y, p.radius);
                pGrad.addColorStop(0, p.color);
                pGrad.addColorStop(1, '#000000');
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = pGrad;
                ctx.fill();
            }

            // Отрисовка звезд
            for (let s of stars) {
                ctx.fillStyle = s.color;
                ctx.globalAlpha = 0.4 + Math.random() * 0.6; // Мерцание
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
                ctx.fill();
            }
            ctx.globalAlpha = 1.0;

            // Отрисовка космического мусора
            ctx.fillStyle = '#4a5b70';
            for (let d of debris) {
                ctx.save();
                ctx.translate(d.x, d.y);
                ctx.rotate(d.angle);
                ctx.fillRect(-d.size/2, -d.size/2, d.size, d.size);
                ctx.restore();
            }

            // Отрисовка движущейся сетки (эффект скорости)
            ctx.strokeStyle = 'rgba(140, 158, 181, 0.05)';
            ctx.lineWidth = 1;
            // Вертикальные линии (стоят на месте)
            for(let g = 40; g < canvas.width; g += 80) {
                ctx.beginPath(); ctx.moveTo(g, 0); ctx.lineTo(g, canvas.height); ctx.stroke();
            }
            // Горизонтальные линии (движутся вниз)
            for(let g = (gridOffsetY % 60) - 60; g < canvas.height; g += 60) {
                ctx.beginPath(); ctx.moveTo(0, g); ctx.lineTo(canvas.width, g); ctx.stroke();
            }

            // Отрисовка неонового следа от ракеты (трассировка вниз)
            if (gameActive && !explosionActive) {
                let trailGrad = ctx.createLinearGradient(0, rocket.y, 0, canvas.height);
                trailGrad.addColorStop(0, 'rgba(24, 130, 255, 0.8)');
                trailGrad.addColorStop(1, 'rgba(24, 130, 255, 0.0)');
                
                ctx.beginPath();
                ctx.moveTo(rocket.x, rocket.y);
                ctx.lineTo(rocket.x - 3, canvas.height);
                ctx.lineTo(rocket.x + 3, canvas.height);
                ctx.closePath();
                ctx.fillStyle = trailGrad;
                ctx.fill();
            }

            // Частицы
            for (let p of particles) {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
            ctx.globalAlpha = 1.0;

            // ===== РАКЕТА (ДЕТАЛИЗИРОВАННАЯ, НАПРАВЛЕНА ВВЕРХ) =====
            if (!explosionActive) {
                ctx.save();
                ctx.translate(rocket.x, rocket.y);
                ctx.rotate(rocket.angle); // Повернута носом вверх

                // Свечение вокруг ракеты
                ctx.shadowBlur = 15;
                ctx.shadowColor = 'var(--accent-blue)';

                // 1. Боковые ускорители
                ctx.fillStyle = '#111822'; 
                ctx.strokeStyle = '#263345';
                ctx.lineWidth = 1;
                
                // Нижний
                ctx.beginPath(); ctx.moveTo(-15, 8); ctx.lineTo(-10, 18); ctx.lineTo(5, 18); ctx.lineTo(0, 8); ctx.closePath(); ctx.fill(); ctx.stroke();
                // Верхний (по оси Y при повороте - это левый/правый)
                ctx.beginPath(); ctx.moveTo(-15, -8); ctx.lineTo(-10, -18); ctx.lineTo(5, -18); ctx.lineTo(0, -8); ctx.closePath(); ctx.fill(); ctx.stroke();

                // 2. Основной корпус ракеты
                let bodyGrad = ctx.createLinearGradient(-25, 0, 30, 0);
                bodyGrad.addColorStop(0, '#8c9eb5');  
                bodyGrad.addColorStop(0.5, '#ffffff'); 
                bodyGrad.addColorStop(1, '#8c9eb5');  

                ctx.fillStyle = bodyGrad;
                ctx.beginPath();
                ctx.moveTo(-25, -7); // Хвост верх
                ctx.lineTo(15, -7);  // Корпус
                ctx.lineTo(35, 0);   // Нос острее
                ctx.lineTo(15, 7);   // Корпус
                ctx.lineTo(-25, 7);  // Хвост низ
                ctx.closePath();
                ctx.fill();

                // Полоска на корпусе
                ctx.fillStyle = 'var(--accent-blue)';
                ctx.fillRect(-5, -7, 6, 14);

                // 3. Иллюминатор (окно)
                ctx.fillStyle = '#d6e6f2';
                ctx.beginPath(); ctx.arc(10, 0, 4, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = '#2d3e50'; ctx.lineWidth = 1.5; ctx.stroke();
                // Блик на стекле
                ctx.fillStyle = 'white';
                ctx.beginPath(); ctx.arc(9, -1, 1.5, 0, Math.PI * 2); ctx.fill();

                // 4. Сопло двигателя
                ctx.fillStyle = '#151d29';
                ctx.beginPath(); ctx.moveTo(-25, -4); ctx.lineTo(-30, -6); ctx.lineTo(-30, 6); ctx.lineTo(-25, 4); ctx.closePath(); ctx.fill();

                // 5. Динамическое пламя из сопла (если активна)
                if (gameActive) {
                    let flameLength = 15 + Math.random() * 20;
                    let flameCore = 5 + Math.random() * 10;
                    
                    // Внешнее пламя (оранжевое)
                    ctx.fillStyle = 'var(--accent-orange)';
                    ctx.beginPath(); ctx.moveTo(-30, -4); ctx.lineTo(-30 - flameLength, 0); ctx.lineTo(-30, 4); ctx.fill();
                    
                    // Внутреннее ядро (желтое/белое)
                    ctx.fillStyle = '#fff9c4';
                    ctx.beginPath(); ctx.moveTo(-30, -2); ctx.lineTo(-30 - flameCore, 0); ctx.lineTo(-30, 2); ctx.fill();
                }

                ctx.restore();
            }

            // ===== ЭФФЕКТ ВЗРЫВА (SHOCKWAVE) =====
            if (explosionActive) {
                // Красная вспышка экрана
                ctx.fillStyle = `rgba(240, 48, 67, ${flashAlpha * 0.5})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Круговая ударная волна
                let waveRadius = (1 - flashAlpha) * 300; // Расширяется от 0 до 300
                if (waveRadius > 0 && flashAlpha > 0) {
                    ctx.beginPath();
                    ctx.arc(rocket.x, rocket.y, waveRadius, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(240, 48, 67, ${flashAlpha})`;
                    ctx.lineWidth = 15 * flashAlpha; // Сужается по мере исчезновения
                    ctx.stroke();
                    
                    // Вторая внутренняя волна
                    ctx.beginPath();
                    ctx.arc(rocket.x, rocket.y, waveRadius * 0.7, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(255, 152, 0, ${flashAlpha})`;
                    ctx.lineWidth = 5 * flashAlpha;
                    ctx.stroke();
                }
            }

            ctx.restore();
        }

        function updateMultiplierColor(val) {
            if (val < 2.0) multiplierSpan.style.color = '#ffffff';
            else if (val < 5.0) multiplierSpan.style.color = 'var(--accent-blue)';
            else if (val < 10.0) multiplierSpan.style.color = 'var(--accent-orange)';
            else multiplierSpan.style.color = 'var(--accent-green)';
        }

        function addToHistory(val) {
            const el = document.createElement('div');
            el.className = 'history-item';
            el.innerText = val.toFixed(2) + 'x';
            if (val < 1.5) el.classList.add('low');
            else if (val < 3.0) el.classList.add('medium');
            else if (val < 10.0) el.classList.add('high');
            else el.classList.add('epic');
            historyDiv.prepend(el);
            if (historyDiv.children.length > 12) historyDiv.removeChild(historyDiv.lastChild);
            if (val > bestMulti) {
                bestMulti = val;
                localStorage.setItem('crash_best_rg', bestMulti);
                bestSpan.innerText = `🏆 РЕКОРД: ${bestMulti.toFixed(2)}x`;
            }
        }

        function generateCrashPoint() {
            const r = Math.random();
            if (r < 0.10) return 1.00;
            if (r < 0.50) return 1.01 + Math.random() * 0.8;
            if (r < 0.82) return 1.80 + Math.random() * 2.5;
            if (r < 0.95) return 4.30 + Math.random() * 8.0;
            return 12.0 + Math.random() * 40.0;
        }

        function finishGame(win, finalMultiplier) {
            if (hasCashedOut) return;
            hasCashedOut = true;
            gameActive = false;
            clearInterval(multiplierInterval);

            let profitChange = 0;
            if (win) {
                let winAmount = Math.floor(currentBet * finalMultiplier);
                profitChange = winAmount - currentBet;
                updateBalanceDisplay(casinoBalance + profitChange);
                addToHistory(finalMultiplier);
                statusSpan.innerHTML = `<span style="color:var(--accent-green)">💰 ВЫ УСПЕШНО ЗАБРАЛИ СТАВКУ! +${profitChange}₽</span>`;
                soundCashout();
                vibrate('success');
                lastGameResultSpan.innerHTML = `<span style="color:var(--accent-green);">+${winAmount}₽ (x${finalMultiplier.toFixed(2)})</span>`;
            } else {
                profitChange = -currentBet;
                updateBalanceDisplay(casinoBalance + profitChange);
                addToHistory(finalMultiplier);
                statusSpan.innerHTML = `<span style="color:var(--accent-red)">💥 КРАШ! Ракета взорвалась на x${finalMultiplier.toFixed(2)}</span>`;
                triggerExplosion(rocket.x, rocket.y);
                soundCrash();
                lastGameResultSpan.innerHTML = `<span style="color:var(--accent-red);">-${currentBet}₽ (x${finalMultiplier.toFixed(2)})</span>`;
            }

            hasBet = false;
            startBtn.disabled = false;
            cashoutBtn.disabled = true;
            betInput.disabled = false;
            startBtn.innerText = 'СТАРТ';
        }

        function cashout() {
            if (!hasBet || hasCashedOut) return;
            if (currentMulti >= crashPoint) return;
            finishGame(true, currentMulti);
        }

        function startMultiplierGrowth() {
            if (multiplierInterval) clearInterval(multiplierInterval);
            currentMulti = 1.0;
            multiplierSpan.textContent = "1.00x";
            updateMultiplierColor(1.0);
            multiplierSpan.style.transform = 'translateX(-50%) scale(1.15)';
            setTimeout(() => multiplierSpan.style.transform = 'translateX(-50%) scale(1)', 120);
            multiplierInterval = setInterval(() => {
                if (!hasBet || hasCashedOut) return;
                let increment = 0.01 * (1 + (currentMulti - 1) * 0.15);
                currentMulti += increment;
                multiplierSpan.textContent = currentMulti.toFixed(2) + "x";
                updateMultiplierColor(currentMulti);
                if (autoTarget && currentMulti >= autoTarget && !hasCashedOut && hasBet) cashout();
                if (currentMulti >= crashPoint && !hasCashedOut) finishGame(false, crashPoint);
            }, 40);
        }

        function startGame() {
            if (hasBet) return;
            initAudio();

            let amount = parseInt(betInput.value);
            if (isNaN(amount)) amount = 100;
            amount = Math.min(5000, Math.max(10, amount));
            betInput.value = amount;
            currentBet = amount;

            // Проверка баланса
            if (casinoBalance < currentBet) {
                statusSpan.innerHTML = `<span style="color:var(--accent-red)">❌ Недостаточно средств! Пополните баланс.</span>`;
                soundError();
                vibrate('error');
                return;
            }

            crashPoint = generateCrashPoint();
            hasBet = true;
            hasCashedOut = false;
            gameActive = true;
            explosionActive = false;
            flashAlpha = 0;
            shake = 0;
            
            // Сброс позиции ракеты
            rocket.x = canvas.width / 2;
            rocket.y = 380;
            rocket.angle = -Math.PI/2;
            particles = [];
            gridOffsetY = 0;

            startBtn.disabled = true;
            cashoutBtn.disabled = false;
            betInput.disabled = true;
            soundStart();
            startMultiplierGrowth();
            statusSpan.innerHTML = `<span style="color:var(--accent-blue)">🚀 Полет нормальный. Панель катапультирования активна!</span>`;
            vibrate('medium');
        }

        function exitAndCollect() {
            soundClick();
            tg.close();
        }

        function goToMenu() {
            window.location.href = 'casino.html?userId=' + userId + '&balance=' + casinoBalance;
        }

        function animate(now) {
            let delta = Math.min(32, now - (lastTime || now));
            lastTime = now;
            updateFlight(delta);
            draw();
            animFrame = requestAnimationFrame(animate);
        }

        // Привязка событий
        startBtn.onclick = () => { soundClick(); startGame(); };
        cashoutBtn.onclick = () => { soundClick(); cashout(); };
        exitBtn.onclick = exitAndCollect;
        menuBtn.onclick = goToMenu;

        betInput.addEventListener('change', function() {
            let val = parseInt(this.value);
            if (isNaN(val)) val = 100;
            val = Math.min(5000, Math.max(10, val));
            this.value = val;
        });

        betInput.disabled = false;

        // Старт
        initBackground();
        animFrame = requestAnimationFrame(animate);
    })();
</script>
</body>
