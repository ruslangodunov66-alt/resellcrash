<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CASINO MENU</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .menu-container {
            max-width: 500px;
            width: 100%;
            background: rgba(18,25,45,0.7);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        h1 {
            font-size: 28px;
            margin: 0 0 10px;
            background: linear-gradient(135deg, #FFD166, #F4A261);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .sub {
            color: #8e9aaf;
            margin-bottom: 30px;
        }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 30px;
        }
        .game-card {
            background: #0f1629;
            border-radius: 28px;
            padding: 20px 12px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .game-card:active { transform: scale(0.96); background: #1a2340; }
        .game-icon { font-size: 48px; margin-bottom: 8px; }
        .game-name { font-size: 18px; font-weight: bold; margin-bottom: 4px; }
        .game-desc { font-size: 12px; color: #8e9aaf; }
        .error-box {
            background: rgba(255,80,80,0.2);
            border-radius: 32px;
            padding: 20px;
            margin-top: 20px;
        }
        .id-input {
            width: 100%;
            padding: 14px;
            background: #1a2340;
            border: none;
            border-radius: 60px;
            color: white;
            text-align: center;
            font-size: 16px;
            margin-top: 12px;
        }
        button {
            background: #2a3655;
            border: none;
            border-radius: 60px;
            padding: 12px 20px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 12px;
            width: 100%;
        }
        button:active { transform: scale(0.97); }
        .back-btn {
            background: #1e2a3e;
            margin-top: 16px;
        }
        footer {
            font-size: 11px;
            color: #4a5570;
            margin-top: 20px;
        }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
</head>
<body>
<div class="menu-container" id="menuContainer">
    <h1>🎰 R-Game</h1>
    <div class="sub">мини-приложение</div>
    <div class="sub" style="font-size:14px;">🎲 ВЫБЕРИ ИГРУ</div>

    <div id="gamesPanel" style="display: none;">
        <div class="games-grid">
            <div class="game-card" data-game="slots">
                <div class="game-icon">🎰</div>
                <div class="game-name">СЛОТЫ</div>
                <div class="game-desc">777</div>
            </div>
            <div class="game-card" data-game="roulette">
                <div class="game-icon">🎡</div>
                <div class="game-name">РУЛЕТКА</div>
                <div class="game-desc">777</div>
            </div>
            <div class="game-card" data-game="blackjack">
                <div class="game-icon">🃏</div>
                <div class="game-name">БЛЭКДЖЕК</div>
                <div class="game-desc">21</div>
            </div>
            <div class="game-card" data-game="mines">
                <div class="game-icon">💣</div>
                <div class="game-name">МАЙНЕР</div>
                <div class="game-desc">Mines</div>
            </div>
            <div class="game-card" data-game="crash">
                <div class="game-icon">🚀</div>
                <div class="game-name">КРАШ</div>
                <div class="game-desc">Crash</div>
            </div>
        </div>
        <button class="back-btn" id="backToMainBtn">🏠 НА ГЛАВНУЮ</button>
    </div>

    <div id="errorPanel" class="error-box">
        <div>⚠️ Не удалось определить ID.</div>
        <div style="font-size:14px; margin-top:8px;">Запустите через Telegram или введите ID вручную:</div>
        <input type="number" id="manualUserId" class="id-input" placeholder="Ваш Telegram ID (число)">
        <button id="confirmIdBtn">✅ ВОЙТИ</button>
        <footer>💡 ID можно узнать у бота командой /id</footer>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.enableClosingConfirmation();

    let userId = null;

    // --- ПОЛУЧЕНИЕ ID ---
    // 1. Из Telegram WebApp
    if (tg.initDataUnsafe?.user?.id) {
        userId = tg.initDataUnsafe.user.id;
    }
    // 2. Из URL параметра
    if (!userId) {
        const urlParams = new URLSearchParams(window.location.search);
        const urlUserId = urlParams.get('userId');
        if (urlUserId && !isNaN(parseInt(urlUserId))) {
            userId = parseInt(urlUserId);
        }
    }

    const gamesPanel = document.getElementById('gamesPanel');
    const errorPanel = document.getElementById('errorPanel');
    const manualUserIdInput = document.getElementById('manualUserId');
    const confirmBtn = document.getElementById('confirmIdBtn');

    function showGames() {
        gamesPanel.style.display = 'block';
        errorPanel.style.display = 'none';
    }

    function showError() {
        gamesPanel.style.display = 'none';
        errorPanel.style.display = 'block';
    }

    // Обработка ручного ввода
    confirmBtn.addEventListener('click', () => {
        const val = manualUserIdInput.value.trim();
        if (val && !isNaN(parseInt(val))) {
            userId = parseInt(val);
            showGames();
        } else {
            alert('Введите корректный числовой ID');
        }
    });

    // Открытие игры с передачей userId через URL
    function openGame(gameName) {
        if (!userId) return;
        let gameUrl = '';
        const baseUrl = 'https://ruslangodunov66-alt.github.io/resellcrash/';
        switch (gameName) {
            case 'slots':
                gameUrl = baseUrl + 'slots.html';
                break;
            case 'roulette':
                gameUrl = baseUrl + 'roulette.html';
                break;
            case 'blackjack':
                gameUrl = baseUrl + 'blackjack.html';
                break;
            case 'mines':
                gameUrl = baseUrl + 'mines.html';
                break;
            case 'crash':
                gameUrl = baseUrl + 'crash.html';
                break;
            default:
                return;
        }
        // Добавляем userId в URL
        gameUrl += `?userId=${userId}`;
        tg.openWebApp(gameUrl);
    }

    // Навешиваем обработчики на карточки игр
    document.querySelectorAll('.game-card').forEach(card => {
        card.addEventListener('click', () => {
            const game = card.getAttribute('data-game');
            openGame(game);
        });
    });

    // Кнопка "На главную" (закрывает WebApp или возвращает в меню)
    document.getElementById('backToMainBtn').addEventListener('click', () => {
        tg.close();
    });

    // Инициализация
    if (userId) {
        showGames();
    } else {
        showError();
    }

    tg.setBackgroundColor("#0a0f1e");
    tg.setHeaderColor("bg_color");
</script>
</body>
</html>
