<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>R-GAME | Казино премиум</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0e1a, #03060c);
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            padding: 16px 16px 80px;
            color: #fff;
            overflow-x: hidden;
            position: relative;
        }

        /* Летающие деньги и монеты (фон) */
        .floating-assets {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .asset {
            position: absolute;
            font-size: 24px;
            opacity: 0.15;
            animation: floatAsset linear infinite;
            filter: drop-shadow(0 0 4px gold);
        }
        @keyframes floatAsset {
            0% {
                transform: translateY(110vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.4;
            }
            90% {
                opacity: 0.4;
            }
            100% {
                transform: translateY(-10vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Glassmorphism + тёмная тема */
        .glass-card {
            background: rgba(18, 25, 45, 0.65);
            backdrop-filter: blur(14px);
            border-radius: 32px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
        }

        /* Верхняя панель */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding: 12px 20px;
            background: rgba(10, 14, 23, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            position: relative;
            z-index: 2;
        }
        .logo {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, #f5b042, #ffdd88, #f5b042);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shimmer 3s linear infinite;
        }
        @keyframes shimmer {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }
        .balance-block {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.5);
            padding: 6px 16px;
            border-radius: 40px;
        }
        .balance-label {
            font-size: 13px;
            font-weight: 500;
            color: #aac8ff;
        }
        .balance-value {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #f5b042, #ffcc66);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .deposit-btn {
            background: linear-gradient(135deg, #f5b042, #ff8c00);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 40px;
            font-size: 22px;
            font-weight: bold;
            color: #0a0e17;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 4px 12px rgba(245,176,66,0.5);
        }
        .deposit-btn:active { transform: scale(0.92); }

        /* Сетка игр с 3D-эффектом */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 30px 0 35px;
            position: relative;
            z-index: 2;
        }
        .game-card {
            background: linear-gradient(145deg, rgba(30, 40, 65, 0.8), rgba(15, 20, 40, 0.9));
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 24px 12px;
            text-align: center;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(255, 215, 0, 0.2);
            cursor: pointer;
            box-shadow: 0 12px 25px rgba(0,0,0,0.4);
            transform: translateY(0);
        }
        .game-card:hover {
            transform: translateY(-6px);
            border-color: #f5b042;
            box-shadow: 0 20px 30px rgba(245,176,66,0.2);
        }
        .game-card:active {
            transform: scale(0.96);
        }
        .game-icon {
            font-size: 62px;
            margin-bottom: 12px;
            display: inline-block;
            filter: drop-shadow(0 6px 8px rgba(0,0,0,0.5));
            transition: 0.2s;
        }
        .game-card:hover .game-icon {
            transform: scale(1.05);
        }
        .game-title {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffecb3, #f5b042);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .game-sub {
            font-size: 12px;
            color: #b0c4ff;
            margin-top: 8px;
        }

        /* Промо-баннер с анимацией */
        .promo-banner {
            background: linear-gradient(95deg, #2a1a3a, #1a2a3a);
            border-radius: 32px;
            padding: 16px 24px;
            margin: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #f5b042;
            position: relative;
            z-index: 2;
            animation: borderPulse 2s infinite;
        }
        @keyframes borderPulse {
            0% { border-color: #f5b042; box-shadow: 0 0 0 0 rgba(245,176,66,0.4); }
            50% { border-color: #ffcc66; box-shadow: 0 0 0 4px rgba(245,176,66,0.2); }
            100% { border-color: #f5b042; box-shadow: 0 0 0 0 rgba(245,176,66,0); }
        }
        .promo-text {
            font-size: 15px;
            font-weight: 600;
        }
        .promo-highlight {
            background: linear-gradient(135deg, #f5b042, #ffcc66);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 22px;
            font-weight: 800;
        }

        /* Нижняя навигация */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 14, 23, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 10px 20px 22px;
            border-top: 1px solid rgba(245,176,66,0.4);
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: #8e9ab0;
            transition: 0.1s;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 40px;
        }
        .nav-item.active {
            color: #f5b042;
            background: rgba(245,176,66,0.2);
            text-shadow: 0 0 4px #f5b042;
        }
        .nav-item:active { transform: scale(0.94); }
        .nav-icon { font-size: 26px; }

        /* Адаптив */
        @media (max-width: 480px) {
            .games-grid { gap: 14px; }
            .game-card { padding: 18px 8px; }
            .game-icon { font-size: 48px; }
            .balance-value { font-size: 16px; }
        }
    </style>
</head>
<body>

    <!-- Летающие деньги и монеты -->
    <div class="floating-assets" id="floatingAssets"></div>

    <div class="header glass-card">
        <div class="logo">🎰 R‑GAME</div>
        <div class="balance-block">
            <span class="balance-label">БАЛАНС</span>
            <span class="balance-value" id="balanceDisplay">0 ₽</span>
            <button class="deposit-btn" id="depositMockBtn">+</button>
        </div>
    </div>

    <div class="games-grid" id="gamesGrid">
        <div class="game-card" data-game="crash">
            <div class="game-icon">💥</div>
            <div class="game-title">CRASH</div>
            <div class="game-sub">Ракета, множитель, риск</div>
        </div>
        <div class="game-card" data-game="blackjack">
            <div class="game-icon">🃏</div>
            <div class="game-title">БЛЭКДЖЕК 3D</div>
            <div class="game-sub">Живой дилер, стратегия</div>
        </div>
        <div class="game-card" data-game="slots">
            <div class="game-icon">🎰</div>
            <div class="game-title">СЛОТЫ</div>
            <div class="game-sub">Джекпот, бонусы</div>
        </div>
        <div class="game-card" data-game="roulette">
            <div class="game-icon">🎡</div>
            <div class="game-title">РУЛЕТКА</div>
            <div class="game-sub">Европейская, live‑ставки</div>
        </div>
    </div>

    <div class="promo-banner">
        <div class="promo-text">🔥 ЕЖЕДНЕВНЫЙ БОНУС</div>
        <div class="promo-highlight">+100% до 5000₽</div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" data-nav="home">
            <div class="nav-icon">🏠</div>
            <div>Главная</div>
        </div>
        <div class="nav-item" data-nav="history">
            <div class="nav-icon">📜</div>
            <div>История</div>
        </div>
        <div class="nav-item" data-nav="profile">
            <div class="nav-icon">👤</div>
            <div>Профиль</div>
        </div>
        <div class="nav-item" data-nav="support">
            <div class="nav-icon">💬</div>
            <div>Поддержка</div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <script>
        // Генерация летающих денег и монет
        function createFloatingAssets() {
            const container = document.getElementById('floatingAssets');
            const symbols = ['💰', '💵', '🪙', '💎', '💸'];
            for (let i = 0; i < 45; i++) {
                const asset = document.createElement('div');
                asset.className = 'asset';
                const symbol = symbols[Math.floor(Math.random() * symbols.length)];
                asset.innerText = symbol;
                const size = 20 + Math.random() * 30;
                asset.style.fontSize = size + 'px';
                asset.style.left = Math.random() * 100 + '%';
                asset.style.animationDuration = 8 + Math.random() * 12 + 's';
                asset.style.animationDelay = Math.random() * 15 + 's';
                asset.style.opacity = 0.1 + Math.random() * 0.3;
                container.appendChild(asset);
            }
        }
        createFloatingAssets();

        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        let userId = null;
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('userId')) {
            userId = urlParams.get('userId');
        } else if (tg.initDataUnsafe?.user?.id) {
            userId = tg.initDataUnsafe.user.id;
        }

        const balanceSpan = document.getElementById('balanceDisplay');
        const gameCards = document.querySelectorAll('.game-card');
        const navItems = document.querySelectorAll('.nav-item');
        const depositBtn = document.getElementById('depositMockBtn');

        async function fetchBalance() {
            if (!userId) return;
            try {
                const res = await fetch(`/balance/${userId}`);
                const data = await res.json();
                if (data.balance !== undefined) balanceSpan.innerText = `${data.balance.toLocaleString()} ₽`;
            } catch (e) {
                console.log("Баланс можно посмотреть в чате с ботом");
            }
        }

        function goToGame(game) {
            if (!userId) return;
            if (game === 'crash') window.location.href = `crash.html?userId=${userId}`;
            else if (game === 'blackjack') window.location.href = `blackjack.html?userId=${userId}`;
            else if (game === 'slots') tg.sendData(JSON.stringify({ action: "slots" }));
            else if (game === 'roulette') tg.sendData(JSON.stringify({ action: "roulette" }));
        }

        gameCards.forEach(card => {
            card.addEventListener('click', () => {
                const game = card.getAttribute('data-game');
                goToGame(game);
            });
        });

        navItems.forEach(item => {
            item.addEventListener('click', () => {
                navItems.forEach(nav => nav.classList.remove('active'));
                item.classList.add('active');
                const navType = item.getAttribute('data-nav');
                if (navType === 'history') tg.sendData(JSON.stringify({ action: "get_history" }));
                else if (navType === 'profile') tg.sendData(JSON.stringify({ action: "profile" }));
                else if (navType === 'support') tg.sendData(JSON.stringify({ action: "support" }));
            });
        });

        depositBtn.onclick = () => {
            tg.sendData(JSON.stringify({ action: "deposit" }));
        };

        if (userId) {
            fetchBalance();
            setInterval(fetchBalance, 15000);
        }
    </script>
</body>
</html>
