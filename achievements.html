<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Достижения | Resell Tycoon</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: radial-gradient(circle at 30% 10%, #0c1120, #020408); color: #ddd; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .glass-card { background: rgba(20,30,45,0.7); backdrop-filter: blur(12px); border-radius: 48px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(0,255,255,0.3); }
        h2, h3 { font-size: 28px; background: linear-gradient(135deg, #ffcc44, #ff6644); background-clip: text; -webkit-background-clip: text; color: transparent; margin-bottom: 15px; }
        .achieve-item, .quest-item { background: rgba(0,0,0,0.6); border-radius: 32px; padding: 12px 16px; margin-bottom: 12px; }
        .progress-bar { background: #2a3e55; border-radius: 20px; height: 8px; margin: 8px 0; overflow: hidden; }
        .progress-fill { background: #ffaa44; height: 100%; width: 0%; border-radius: 20px; }
        .reward { color: #88ff88; font-size: 12px; }
        .back-btn { background: #555; width: 100%; margin-top: 15px; }
    </style>
</head>
<body>
<div class="container">
    <div class="glass-card">
        <h2>🎯 ДОСТИЖЕНИЯ</h2>
        <div id="achievementsList">Загрузка...</div>
        <h3>📅 ЕЖЕДНЕВНЫЕ ЗАДАНИЯ</h3>
        <div id="questsList">Загрузка...</div>
    </div>
    <button class="back-btn" onclick="window.location.href='index.html'">🔙 На главную</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    const API_BASE = "https://nl12.bothost.ru";
    const USE_REAL_API = false;
    const userId = tg.initDataUnsafe?.user?.id || 1475910449;

    const mockAchievements = {
        "millionaire": { name: "💰 Миллионер", progress: 1200000, target: 1000000, completed: true, reward: 100000 },
        "seller": { name: "📦 Торговый поток", progress: 45, target: 100, completed: false, reward: 75000 },
        "car_lover": { name: "🏎 Автолюбитель", progress: 2, target: 5, completed: false, reward: 50000 }
    };
    const mockQuests = {
        "sell_3": { name: "📦 Продавец дня", progress: 2, target: 3, completed: false, reward: 5000 },
        "earn_50k": { name: "💰 Прибыльный день", progress: 27000, target: 50000, completed: false, reward: 10000 }
    };

    async function fetchAPI(endpoint) {
        if (!USE_REAL_API) return null;
        try {
            const resp = await fetch(`${API_BASE}${endpoint}&tg_id=${userId}`);
            if (!resp.ok) throw new Error();
            return await resp.json();
        } catch(e) { return null; }
    }

    async function loadAchievements() {
        if (!USE_REAL_API) {
            renderAchievements(mockAchievements);
            renderQuests(mockQuests);
            return;
        }
        const data = await fetchAPI(`/api/achievements`);
        if (data) {
            renderAchievements(data.achievements);
            renderQuests(data.quests);
        }
    }

    function renderAchievements(ach) {
        const container = document.getElementById('achievementsList');
        let html = '';
        for (let [id, a] of Object.entries(ach)) {
            let percent = Math.min(100, (a.progress / a.target) * 100);
            html += `
                <div class="achieve-item">
                    <div><b>${a.name}</b> ${a.completed ? '✅' : '⏳'}</div>
                    <div class="progress-bar"><div class="progress-fill" style="width: ${percent}%;"></div></div>
                    <div>${a.progress.toLocaleString()} / ${a.target.toLocaleString()}</div>
                    <div class="reward">🎁 Награда: +${a.reward.toLocaleString()}₽</div>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    function renderQuests(quests) {
        const container = document.getElementById('questsList');
        let html = '';
        for (let [id, q] of Object.entries(quests)) {
            let percent = Math.min(100, (q.progress / q.target) * 100);
            html += `
                <div class="quest-item">
                    <div><b>${q.name}</b> ${q.completed ? '✅' : '⏳'}</div>
                    <div class="progress-bar"><div class="progress-fill" style="width: ${percent}%;"></div></div>
                    <div>${q.progress.toLocaleString()} / ${q.target.toLocaleString()}</div>
                    <div class="reward">🎁 Награда: +${q.reward.toLocaleString()}₽</div>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    loadAchievements();
</script>
</body>
</html>
