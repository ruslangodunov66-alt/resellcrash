<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Магазины | Resell Tycoon</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: radial-gradient(circle at 30% 10%, #0c1120, #020408); color: #ddd; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: rgba(12,20,35,0.8); backdrop-filter: blur(12px); border-radius: 32px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(0,255,255,0.3); }
        h2 { font-size: 28px; margin-bottom: 15px; background: linear-gradient(135deg, #ffcc44, #ff6644); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .balance { font-size: 18px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 30px; margin-bottom: 20px; text-align: center; }
        .shop-item { background: rgba(0,0,0,0.5); border-radius: 24px; padding: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .shop-name { font-size: 18px; font-weight: bold; }
        .shop-price { color: #ffaa44; }
        .shop-income { font-size: 12px; color: #88ff88; }
        button { background: #2ecc71; border: none; padding: 8px 16px; border-radius: 40px; font-weight: bold; cursor: pointer; }
        .owned-badge { background: #1e5631; padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        .back-btn { background: #555; margin-top: 20px; width: 100%; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h2>🏪 Магазины (до 2 каждого типа)</h2>
        <div class="balance" id="balance">💰 Баланс: загрузка...</div>
    </div>
    <div class="card" id="shopsList">Загрузка...</div>
    <button class="back-btn" onclick="window.location.href='index.html'">🔙 На главную</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    const API_BASE = "https://nl12.bothost.ru";
    const USE_REAL_API = false;
    const userId = tg.initDataUnsafe?.user?.id || 1475910449;

    let balance = 0;
    let myShops = []; // массив id купленных магазинов (с повторениями)

    const mockShops = [
        {"id": "stall", "name": "🛍 Лавка на рынке", "price": 5000, "income_per_hour": 100},
        {"id": "container", "name": "📦 Контейнер на Садоводе", "price": 15000, "income_per_hour": 300},
        {"id": "small_shop", "name": "🏬 Маленький магазин одежды", "price": 50000, "income_per_hour": 800},
        {"id": "store", "name": "🏪 Магазин в ТЦ", "price": 150000, "income_per_hour": 2000},
        {"id": "brand_shop", "name": "👔 Брендовый магазин одежды", "price": 500000, "income_per_hour": 5000},
        {"id": "boutique", "name": "👑 Бутик в центре", "price": 1500000, "income_per_hour": 15000}
    ];

    async function fetchAPI(endpoint) {
        if (!USE_REAL_API) return null;
        try {
            const resp = await fetch(`${API_BASE}${endpoint}&tg_id=${userId}`);
            if (!resp.ok) throw new Error();
            return await resp.json();
        } catch(e) { return null; }
    }

    async function loadBalance() {
        if (!USE_REAL_API) { balance = 2000000; document.getElementById('balance').innerHTML = `💰 Баланс: ${balance.toLocaleString()}₽`; return; }
        const data = await fetchAPI(`/api/me`);
        balance = data?.balance || 0;
        document.getElementById('balance').innerHTML = `💰 Баланс: ${balance.toLocaleString()}₽`;
    }

    async function loadMyShops() {
        if (!USE_REAL_API) { myShops = ["stall","container"]; renderShops(); return; }
        const data = await fetchAPI(`/api/my_shops`);
        if (data?.shops) myShops = data.shops.map(s => s.shop_id);
        renderShops();
    }

    async function buyShop(shopId, price) {
        if (balance < price) { tg.showAlert(`❌ Не хватает денег! Нужно ${price.toLocaleString()}₽`); return; }
        let count = myShops.filter(id => id === shopId).length;
        if (count >= 2) { tg.showAlert(`❌ Нельзя купить больше 2 магазинов типа "${mockShops.find(s=>s.id===shopId).name}"`); return; }
        if (!USE_REAL_API) {
            myShops.push(shopId);
            balance -= price;
            document.getElementById('balance').innerHTML = `💰 Баланс: ${balance.toLocaleString()}₽`;
            tg.showAlert(`✅ (МОК) ${mockShops.find(s=>s.id===shopId).name} куплен!`);
            renderShops();
            return;
        }
        const res = await fetch(`${API_BASE}/api/buy_shop?tg_id=${userId}&shop_id=${shopId}`, { method: 'POST' });
        const data = await res.json();
        if (data.balance !== undefined) {
            balance = data.balance;
            document.getElementById('balance').innerHTML = `💰 Баланс: ${balance.toLocaleString()}₽`;
            tg.showAlert(data.message);
            await loadMyShops();
        } else { tg.showAlert(`❌ ${data.message}`); }
    }

    function renderShops() {
        const container = document.getElementById('shopsList');
        let html = '';
        for (let shop of mockShops) {
            let ownedCount = myShops.filter(id => id === shop.id).length;
            let ownedText = ownedCount > 0 ? `<span class="owned-badge">✅ Куплено: ${ownedCount}</span>` : '';
            html += `
                <div class="shop-item">
                    <div>
                        <div class="shop-name">${shop.name}</div>
                        <div class="shop-price">💰 ${shop.price.toLocaleString()}₽</div>
                        <div class="shop-income">📈 +${shop.income_per_hour}₽/час</div>
                        ${ownedText}
                    </div>
                    <div>
                        ${ownedCount < 2 ? `<button onclick="buyShop('${shop.id}', ${shop.price})">🛒 Купить</button>` : '<span style="color:#aaa;">Максимум 2</span>'}
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    loadBalance();
    loadMyShops();
</script>
</body>
</html>
