<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Инвентарь | Resell Tycoon</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: radial-gradient(circle at 30% 10%, #0c1120, #020408); color: #ddd; padding: 20px; min-height: 100vh; }
        .container { max-width: 650px; margin: 0 auto; }
        .glass-card { background: rgba(20,30,45,0.7); backdrop-filter: blur(12px); border-radius: 48px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(0,255,255,0.3); transition: 0.2s; }
        h2 { font-size: 28px; background: linear-gradient(135deg, #ffcc44, #ff6644); background-clip: text; -webkit-background-clip: text; color: transparent; margin-bottom: 15px; }
        .balance { font-size: 18px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 40px; text-align: center; margin-bottom: 20px; }
        .item-card { background: rgba(0,0,0,0.55); border-radius: 32px; padding: 16px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; transition: 0.2s; }
        .item-card:hover { transform: translateY(-3px); border-left: 3px solid #ffaa44; }
        .item-name { font-size: 16px; font-weight: bold; }
        .item-price { color: #ffaa44; }
        .item-details { font-size: 12px; color: #aaa; }
        button { background: #2ecc71; border: none; padding: 8px 18px; border-radius: 40px; font-weight: bold; cursor: pointer; transition: 0.1s; }
        button:active { transform: scale(0.96); }
        .sell-input { width: 90px; padding: 6px; border-radius: 30px; border: none; text-align: center; background: #1e2a3a; color: white; margin-right: 8px; }
        .back-btn { background: #555; width: 100%; margin-top: 15px; }
        .empty { text-align: center; padding: 30px; color: #aaa; }
    </style>
</head>
<body>
<div class="container">
    <div class="glass-card">
        <h2>📦 ИНВЕНТАРЬ</h2>
        <div class="balance" id="balance">💰 Баланс: загрузка...</div>
    </div>
    <div class="glass-card" id="inventoryList">Загрузка...</div>
    <button class="back-btn" onclick="window.location.href='index.html'">🔙 На главную</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    const API_BASE = "https://nl12.bothost.ru";
    const USE_REAL_API = false;
    const userId = tg.initDataUnsafe?.user?.id || 1475910449;

    let balance = 0;
    let inventory = [];

    // Мок-данные для инвентаря
    const mockInventory = [
        { name: "👖 Levi's 501 Vintage", cat: "Джинсы", buy_price: 1800, market_price: 2400 },
        { name: "👕 Adidas Originals Hoodie", cat: "Худи", buy_price: 2200, market_price: 3100 },
        { name: "🧥 The North Face Nuptse", cat: "Куртки", buy_price: 4500, market_price: 5900 }
    ];

    async function fetchAPI(endpoint) {
        if (!USE_REAL_API) return null;
        try {
            const resp = await fetch(`${API_BASE}${endpoint}&tg_id=${userId}`);
            if (!resp.ok) throw new Error();
            return await resp.json();
        } catch(e) { return null; }
    }

    async function loadBalance() {
        if (!USE_REAL_API) { balance = 35000; document.getElementById('balance').innerHTML = `💰 Баланс: ${balance.toLocaleString()}₽`; return; }
        const data = await fetchAPI(`/api/me`);
        balance = data?.balance || 0;
        document.getElementById('balance').innerHTML = `💰 Баланс: ${balance.toLocaleString()}₽`;
    }

    async function loadInventory() {
        if (!USE_REAL_API) { inventory = mockInventory; renderInventory(); return; }
        const data = await fetchAPI(`/api/inventory`);
        inventory = data?.inventory || [];
        renderInventory();
    }

    async function sellItem(index, price) {
        if (price <= 0) { tg.showAlert("❌ Цена должна быть больше 0"); return; }
        if (!USE_REAL_API) {
            const item = inventory[index];
            inventory.splice(index,1);
            balance += price;
            document.getElementById('balance').innerHTML = `💰 Баланс: ${balance.toLocaleString()}₽`;
            tg.showAlert(`✅ (МОК) Продано за ${price}₽`);
            renderInventory();
            return;
        }
        const res = await fetch(`${API_BASE}/api/sell?tg_id=${userId}&item_index=${index}&price=${price}`, { method: 'POST' });
        const data = await res.json();
        if (data.balance !== undefined) {
            balance = data.balance;
            document.getElementById('balance').innerHTML = `💰 Баланс: ${balance.toLocaleString()}₽`;
            tg.showAlert(`✅ Продано! +${data.profit}₽`);
            await loadInventory();
        } else tg.showAlert(`❌ ${data.message}`);
    }

    function renderInventory() {
        const container = document.getElementById('inventoryList');
        if (!inventory.length) {
            container.innerHTML = `<div class="empty">📭 Инвентарь пуст. Купите товары у поставщиков!</div>`;
            return;
        }
        let html = '';
        inventory.forEach((item, idx) => {
            const market = item.market_price || item.price || 0;
            html += `
                <div class="item-card">
                    <div>
                        <div class="item-name">${item.name}</div>
                        <div class="item-price">💰 Рыночная цена: ${market.toLocaleString()}₽</div>
                        <div class="item-details">Закуп: ${(item.buy_price || 0).toLocaleString()}₽</div>
                    </div>
                    <div>
                        <input type="number" id="price_${idx}" class="sell-input" placeholder="Цена" value="${market}">
                        <button onclick="sellItem(${idx}, parseInt(document.getElementById('price_${idx}').value))">💸 Продать</button>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    loadBalance();
    loadInventory();
</script>
</body>
</html>
