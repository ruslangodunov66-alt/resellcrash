<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>🍒 FRUIT 777 · PREMIUM SLOTS</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,600;0,800;0,900;1,800&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ============================================================
           FRUIT 777 — НЕОНОВЫЙ ФРУКТОВЫЙ СЛОТ
           ============================================================ */
        :root {
            --bg-dark: #0a0612;
            --panel-glass: rgba(20, 10, 30, 0.85);
            --neon-purple: #b44dff;
            --neon-pink: #ff4db8;
            --neon-green: #39ff7a;
            --neon-yellow: #ffd93d;
            --neon-orange: #ff8c42;
            --neon-red: #ff3b6f;
            --neon-cyan: #4df0ff;
            --shadow-deep: rgba(0, 0, 0, 0.85);
            --glow-purple: rgba(180, 77, 255, 0.5);
            --glow-pink: rgba(255, 77, 184, 0.4);
            --gold-gradient: linear-gradient(135deg, #FFD93D 0%, #FF8C42 50%, #FF3B6F 100%);
            --font-display: 'Montserrat', sans-serif;
            --font-ui: 'Nunito', sans-serif;
            --ease-bounce: cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --ease-premium: cubic-bezier(0.22, 1, 0.36, 1);
            --z-ui: 5;
            --z-overlay: 100;
            --z-bigwin: 180;
            --z-popup: 200;
            --z-info: 300;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: var(--font-ui);
            color: #fff;
            background: var(--bg-dark);
            background-image: url('777/photo_2026-07-03_15-04-11.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: fixed;
            top: 0;
            left: 0;
        }

        #app {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: rgba(10, 6, 18, 0.6);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 3;
            overflow: hidden;
            transform: translateZ(0);
        }

        /* Частицы и молнии */
        #particleCanvas, #lightningCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 2;
        }
        #lightningCanvas { z-index: 98; }

        .flash-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(180deg, #fff 0%, #ffd93d 40%, #ff4db8 100%);
            opacity: 0;
            pointer-events: none;
            z-index: var(--z-overlay);
            transition: opacity 0.05s ease-out;
            mix-blend-mode: screen;
        }
        .flash-overlay.active { opacity: 0.45; transition: opacity 0.4s ease-out; }

        /* ===== HEADER ===== */
        .header {
            position: relative;
            z-index: var(--z-ui);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            background: var(--panel-glass);
            border-bottom: 2px solid rgba(180, 77, 255, 0.5);
            box-shadow: 0 8px 40px var(--shadow-deep), inset 0 1px 0 rgba(255, 255, 255, 0.08);
            flex-shrink: 0;
            min-height: 56px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transform: translateZ(0);
            gap: 6px;
        }
        .header::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 5%;
            right: 5%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--neon-purple), var(--neon-pink), transparent);
            opacity: 0.6;
        }
        .btn-back {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(145deg, rgba(180,77,255,0.15), rgba(10,6,18,0.8));
            border: 2px solid rgba(180,77,255,0.4);
            color: var(--neon-purple);
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.25s var(--ease-bounce);
            flex-shrink: 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
        }
        .btn-back:active { transform: scale(0.88); background: rgba(180,77,255,0.3); }

        .brand {
            flex: 1;
            text-align: center;
            font-family: var(--font-display);
            font-size: 24px;
            font-weight: 900;
            font-style: italic;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 30px rgba(255, 217, 61, 0.3);
        }
        .brand span { color: var(--neon-pink); -webkit-text-fill-color: var(--neon-pink); }

        .balance-box {
            background: linear-gradient(145deg, rgba(180,77,255,0.2), rgba(10,6,18,0.9));
            border: 2px solid rgba(180,77,255,0.4);
            padding: 4px 12px;
            border-radius: 50px;
            text-align: right;
            box-shadow: inset 0 0 40px rgba(180,77,255,0.06), 0 6px 30px rgba(0,0,0,0.6);
            flex-shrink: 0;
            min-width: 80px;
            max-width: 180px;
            position: relative;
            overflow: hidden;
        }
        .balance-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            animation: balanceShine 4s ease-in-out infinite;
        }
        @keyframes balanceShine {
            0%,100% { left: -100%; }
            50% { left: 150%; }
        }
        .balance-label {
            font-size: 7px;
            color: var(--neon-purple);
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 2px;
            opacity: 0.6;
        }
        .balance-val {
            font-family: var(--font-display);
            font-size: clamp(16px, 3.2vw, 24px);
            font-weight: 900;
            color: #fff;
            letter-spacing: 0.5px;
            line-height: 1.15;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 150px;
        }
        .balance-val.added {
            color: var(--neon-green);
            text-shadow: 0 0 30px rgba(57, 255, 122, 0.5);
            animation: balancePop 0.5s var(--ease-bounce);
        }
        @keyframes balancePop {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        .btn-settings {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(145deg, rgba(180,77,255,0.15), rgba(10,6,18,0.8));
            border: 2px solid rgba(180,77,255,0.4);
            color: var(--neon-purple);
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.25s var(--ease-bounce);
            flex-shrink: 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
        }
        .btn-settings:active { transform: scale(0.88); }

        /* ===== STATUS BAR ===== */
        .status-bar {
            position: relative;
            z-index: calc(var(--z-ui) + 1);
            text-align: center;
            padding: 6px 12px;
            min-height: 36px;
            font-size: clamp(12px, 2.2vw, 16px);
            font-weight: 900;
            color: var(--neon-cyan);
            text-shadow: 0 0 30px rgba(77, 240, 255, 0.2);
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(180deg, rgba(180,77,255,0.15), rgba(10,6,18,0.5));
            border-bottom: 1px solid rgba(180,77,255,0.1);
            flex-shrink: 0;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .status-bar.bonus { color: var(--neon-yellow); text-shadow: 0 0 40px rgba(255, 217, 61, 0.5); }
        .status-bar.win { color: var(--neon-green); text-shadow: 0 0 40px rgba(57, 255, 122, 0.4); }
        .status-bar.lose { color: var(--neon-red); text-shadow: 0 0 30px rgba(255, 59, 111, 0.3); }

        /* ===== SLOT ===== */
        .slot-wrapper {
            position: relative;
            z-index: var(--z-ui);
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            transform: translateZ(0);
        }
        .slot-frame {
            position: relative;
            background: linear-gradient(180deg, rgba(180,77,255,0.08) 0%, transparent 15%),
                        linear-gradient(145deg, rgba(20,10,30,0.8), rgba(10,6,18,0.95));
            border: 3px solid transparent;
            border-radius: 20px;
            padding: 6px;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0;
            max-width: 95vw;
            max-height: 55vh;
            box-shadow: 0 0 80px rgba(180,77,255,0.15), 0 20px 60px rgba(0,0,0,0.7),
                        inset 0 0 60px rgba(0,0,0,0.5), inset 0 2px 0 rgba(255,255,255,0.05);
            background-clip: padding-box;
        }
        .slot-frame::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 24px;
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink), var(--neon-orange));
            z-index: -1;
            opacity: 0.6;
        }
        .slot-frame .grid-bg {
            position: absolute;
            inset: 0;
            border-radius: 14px;
            overflow: hidden;
            opacity: 0.05;
            background-image:
                repeating-linear-gradient(45deg, rgba(255,255,255,0.08) 0px, rgba(255,255,255,0.08) 2px, transparent 2px, transparent 10px),
                repeating-linear-gradient(-45deg, rgba(255,255,255,0.08) 0px, rgba(255,255,255,0.08) 2px, transparent 2px, transparent 10px);
            background-size: 20px 20px;
        }

        #reelsCanvas {
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 14px;
            background: rgba(0,0,0,0.4);
            box-shadow: inset 0 4px 30px rgba(0,0,0,0.8);
            image-rendering: auto;
            position: relative;
            z-index: 1;
            min-height: 0;
            min-width: 0;
        }

        /* ===== BOTTOM PANEL ===== */
        .bottom-panel {
            position: relative;
            z-index: var(--z-ui);
            background: linear-gradient(0deg, rgba(10,6,18,0.9), rgba(180,77,255,0.1));
            border-top: 2px solid rgba(180,77,255,0.2);
            padding: 8px 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex-shrink: 0;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .stats {
            display: flex;
            gap: 6px;
        }
        .stat-box {
            flex: 1;
            background: rgba(10,6,18,0.5);
            border: 1.5px solid rgba(180,77,255,0.15);
            border-radius: 10px;
            padding: 4px 3px;
            text-align: center;
            box-shadow: inset 0 2px 20px rgba(0,0,0,0.4);
        }
        .stat-title {
            font-size: 7px;
            color: var(--neon-purple);
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 2px;
            opacity: 0.5;
        }
        .stat-value {
            font-family: var(--font-display);
            font-size: clamp(14px, 2.8vw, 20px);
            font-weight: 900;
            color: #fff;
            letter-spacing: 0.5px;
            line-height: 1.15;
        }
        .stat-value.win-text { color: var(--neon-green); text-shadow: 0 0 30px rgba(57,255,122,0.35); }
        .stat-value.fs-text { color: var(--neon-yellow); }
        .stat-value.fs-text .fs-count { color: var(--neon-pink); }

        .bet-presets {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .bet-preset-btn {
            background: rgba(10,6,18,0.7);
            border: 2px solid rgba(180,77,255,0.15);
            border-radius: 8px;
            padding: 4px 10px;
            font-family: var(--font-ui);
            font-weight: 900;
            font-size: 11px;
            color: rgba(255,255,255,0.35);
            cursor: pointer;
            transition: all 0.2s var(--ease-bounce);
            min-width: 34px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
        }
        .bet-preset-btn:active { transform: scale(0.92); }
        .bet-preset-btn.active {
            background: rgba(180,77,255,0.2);
            border-color: var(--neon-purple);
            color: var(--neon-purple);
            box-shadow: 0 0 25px rgba(180,77,255,0.15);
        }

        .controls {
            display: flex;
            gap: 6px;
            align-items: center;
            justify-content: center;
        }
        .bet-input-wrap {
            flex: 0 1 70px;
            min-width: 50px;
            background: rgba(10,6,18,0.7);
            border: 2px solid rgba(180,77,255,0.15);
            border-radius: 10px;
            display: flex;
            align-items: center;
            padding: 0 6px;
            height: 40px;
            box-shadow: inset 0 2px 15px rgba(0,0,0,0.4);
        }
        .bet-input-wrap input {
            width: 100%;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 16px;
            font-weight: 900;
            font-family: var(--font-display);
            text-align: center;
            outline: none;
            padding: 6px 0;
        }
        .btn {
            border: none;
            border-radius: 10px;
            font-family: var(--font-ui);
            font-weight: 900;
            font-size: 11px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s var(--ease-bounce);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 30px rgba(0,0,0,0.45), inset 0 -4px 0 rgba(0,0,0,0.15);
            padding: 6px 10px;
            min-height: 40px;
            min-width: 40px;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }
        .btn:active { transform: scale(0.93); }
        .btn:disabled { opacity: 0.25; cursor: not-allowed; transform: none !important; }

        .btn-spin {
            flex: 0 0 auto;
            width: 64px;
            height: 64px;
            min-width: 64px;
            min-height: 64px;
            border-radius: 50%;
            background: var(--gold-gradient);
            color: #0a0612;
            font-size: 11px;
            font-weight: 900;
            font-family: var(--font-display);
            box-shadow: 0 0 40px rgba(255, 217, 61, 0.35), 0 12px 40px rgba(0,0,0,0.5),
                        inset 0 -4px 0 rgba(0,0,0,0.15), inset 0 2px 0 rgba(255,255,255,0.4);
            text-shadow: 0 1px 0 rgba(255,255,255,0.3);
            letter-spacing: 2px;
            padding: 0;
            animation: spinIdlePulse 2.5s ease-in-out infinite;
            border: 3px solid rgba(255,217,61,0.5);
        }
        .btn-spin:active:not(:disabled) {
            animation: none;
            transform: scale(0.92);
            box-shadow: 0 0 25px rgba(255,217,61,0.4), inset 0 2px 8px rgba(0,0,0,0.2);
        }
        @keyframes spinIdlePulse {
            0%,100% { box-shadow: 0 0 30px rgba(255,217,61,0.3), 0 12px 40px rgba(0,0,0,0.5), inset 0 -4px 0 rgba(0,0,0,0.15); transform: scale(1); }
            50% { box-shadow: 0 0 55px rgba(255,217,61,0.5), 0 12px 40px rgba(0,0,0,0.5), inset 0 -4px 0 rgba(0,0,0,0.15); transform: scale(1.04); }
        }
        .btn-spin.spinning-state { animation: spinActiveRotate 0.8s linear infinite; }
        @keyframes spinActiveRotate {
            from { filter: hue-rotate(0deg); }
            to { filter: hue-rotate(20deg); }
        }

        .btn-auto {
            flex: 0 1 56px;
            background: rgba(10,6,18,0.7);
            color: var(--neon-purple);
            font-size: 11px;
            border: 2px solid rgba(180,77,255,0.3);
            min-height: 44px;
            min-width: 44px;
            border-radius: 12px;
            font-family: var(--font-display);
            letter-spacing: 1px;
            box-shadow: inset 0 0 20px rgba(180,77,255,0.05);
        }
        .btn-auto.active {
            background: rgba(255, 59, 111, 0.2);
            border-color: var(--neon-red);
            color: var(--neon-red);
        }

        .auto-controls {
            display: none;
            gap: 6px;
            align-items: center;
            justify-content: center;
            padding: 4px 8px;
            background: rgba(180,77,255,0.04);
            border-radius: 8px;
            border: 1.5px solid rgba(180,77,255,0.1);
            flex-wrap: wrap;
        }
        .auto-controls label {
            font-size: 9px;
            font-weight: 900;
            color: var(--neon-purple);
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.5;
        }
        .auto-controls select {
            background: rgba(10,6,18,0.8);
            border: 1.5px solid rgba(180,77,255,0.15);
            border-radius: 8px;
            color: #fff;
            font-family: var(--font-ui);
            font-weight: 800;
            font-size: 11px;
            padding: 4px 8px;
            outline: none;
            cursor: pointer;
            min-height: 28px;
        }
        .auto-stop-btn {
            background: var(--gold-gradient);
            color: #0a0612;
            font-weight: 900;
            padding: 4px 12px;
            font-size: 10px;
            min-height: 28px;
            border-radius: 8px;
            border: none;
            box-shadow: 0 4px 20px rgba(255,217,61,0.15);
            cursor: pointer;
            font-family: var(--font-ui);
            text-transform: uppercase;
        }
        .auto-stop-btn:active { transform: scale(0.93); }
        .auto-total {
            font-size: 11px;
            font-weight: 900;
            color: var(--neon-yellow);
            text-align: center;
            min-height: 20px;
            font-family: var(--font-display);
        }

        /* ===== BIG WIN OVERLAY ===== */
        .big-win-overlay {
            position: fixed;
            inset: 0;
            z-index: var(--z-bigwin);
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(10,6,18,0.75);
            pointer-events: none;
        }
        .big-win-overlay.active { display: flex; animation: bigWinFadeIn 0.4s var(--ease-premium); }
        @keyframes bigWinFadeIn { from { opacity: 0; } to { opacity: 1; } }
        #bigWinCanvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .big-win-content {
            position: relative;
            z-index: 2;
            text-align: center;
            animation: bigWinScaleIn 0.6s var(--ease-bounce);
        }
        @keyframes bigWinScaleIn {
            0% { transform: scale(0.3); opacity: 0; }
            60% { transform: scale(1.08); }
            100% { transform: scale(1); opacity: 1; }
        }
        .big-win-label {
            font-family: var(--font-display);
            font-size: clamp(24px, 7vw, 48px);
            font-weight: 900;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 6px;
            text-transform: uppercase;
            filter: drop-shadow(0 4px 20px rgba(255,217,61,0.5));
            animation: bigWinLabelPulse 0.8s ease-in-out infinite alternate;
        }
        @keyframes bigWinLabelPulse {
            0% { filter: drop-shadow(0 4px 20px rgba(255,217,61,0.4)); transform: scale(1); }
            100% { filter: drop-shadow(0 8px 40px rgba(255,217,61,0.8)); transform: scale(1.03); }
        }
        .big-win-amount {
            font-family: var(--font-display);
            font-size: clamp(32px, 10vw, 60px);
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 40px rgba(255,217,61,0.5), 0 4px 0 rgba(0,0,0,0.3);
            margin-top: 10px;
            letter-spacing: 2px;
        }

        /* ===== BONUS POPUP ===== */
        .bonus-popup {
            position: fixed;
            inset: 0;
            z-index: var(--z-popup);
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(10,6,18,0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            animation: fadePopup 0.5s var(--ease-bounce);
        }
        .bonus-popup.show { display: flex; }
        @keyframes fadePopup { from { opacity: 0; } to { opacity: 1; } }
        .bonus-popup-content {
            background: linear-gradient(160deg, rgba(180,77,255,0.2), rgba(10,6,18,0.98));
            border: 3px solid transparent;
            border-radius: 28px;
            padding: 30px 20px 20px;
            max-width: 380px;
            width: 92%;
            text-align: center;
            box-shadow: 0 0 120px rgba(180,77,255,0.12), 0 24px 80px rgba(0,0,0,0.9);
            position: relative;
            overflow: hidden;
            animation: popupSlide 0.55s var(--ease-bounce);
        }
        .bonus-popup-content::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 30px;
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink), var(--neon-orange));
            z-index: -1;
        }
        .bonus-popup-content .close-btn {
            position: absolute;
            top: 10px;
            right: 14px;
            font-size: 22px;
            color: rgba(255,255,255,0.3);
            cursor: pointer;

<script>
    (function() {
        'use strict';

        // =============================================================
        // 1. TELEGRAM
        // =============================================================
        const tg = window.Telegram.WebApp;
        if (tg) {
            tg.expand();
            tg.enableClosingConfirmation();
        }
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('userId') || (tg?.initDataUnsafe?.user?.id) || '';

        // =============================================================
        // 2. НАСТРОЙКИ
        // =============================================================
        let settings = {
            graphics: 'max',
            sound: true,
            music: true
        };
        try {
            const saved = localStorage.getItem('fruit_settings');
            if (saved) {
                const parsed = JSON.parse(saved);
                settings = { ...settings, ...parsed };
            }
        } catch (e) {}

        function applySettings() {
            document.body.classList.toggle('balanced-mode', settings.graphics === 'balanced');
            updateAudio();
        }

        function saveSettings() {
            try {
                localStorage.setItem('fruit_settings', JSON.stringify(settings));
            } catch (e) {}
            applySettings();
        }

        function updateAudio() {
            window._soundEnabled = settings.sound;
            if (bgMusic) {
                if (settings.music) {
                    bgMusic.play().catch(() => {});
                } else {
                    bgMusic.pause();
                }
            }
        }

        // =============================================================
        // 3. СИМВОЛЫ И ПЛАТЁЖНАЯ ТАБЛИЦА
        // =============================================================
        const SYMBOLS = [
            '777/IMG_0413.PNG', // 7 (Wild)
            '777/IMG_0414.PNG', // сливы
            '777/IMG_0415.PNG', // арбуз
            '777/IMG_0416.PNG', // виноград
            '777/IMG_0417.PNG', // яблоко
            '777/IMG_0418.PNG', // апельсин
            '777/IMG_0419.PNG', // лимон
            '777/IMG_0420.PNG', // вишня
            '777/IMG_0409.PNG', // колокольчик (Scatter)
            '777/IMG_0410.PNG'  // BAR
        ];
        const WILD_INDEX = 0;
        const SCATTER_INDEX = 8;

        // Множители для 3,4,5 совпадений (индекс символа -> [3,4,5])
        const PAYTABLE = {
            0: [15, 40, 100],  // 7 (Wild)
            1: [8, 20, 50],    // сливы
            2: [12, 30, 70],   // арбуз
            3: [10, 25, 60],   // виноград
            4: [6, 15, 35],    // яблоко
            5: [5, 12, 30],    // апельсин
            6: [4, 10, 25],    // лимон
            7: [3, 8, 18],     // вишня
            8: [0, 0, 0],      // скаттер – отдельно
            9: [5, 12, 25]     // BAR
        };

        // Линии: 5 горизонтальных (каждая из 5 ячеек по индексам 0-24)
        // Индексы: row*5 + col
        const LINES = [
            [0,1,2,3,4],   // верхняя
            [5,6,7,8,9],   // средняя
            [10,11,12,13,14], // нижняя
            [0,6,12,18,24], // диагональ \
            [4,8,12,16,20]  // диагональ /
        ];

        // Баланс
        let balance = parseInt(localStorage.getItem('casinoBalance'));
        if (isNaN(balance) || balance < 0) balance = 0;

        // =============================================================
        // 4. DOM REFS
        // =============================================================
        const balanceDisplay = document.getElementById('balanceDisplay');
        const balanceBox = document.getElementById('balanceBox');
        const betInput = document.getElementById('betInput');
        const totalBetDisplay = document.getElementById('totalBetDisplay');
        const winDisplay = document.getElementById('winDisplay');
        const fsDisplay = document.getElementById('fsDisplay');
        const btnSpin = document.getElementById('btnSpin');
        const btnAuto = document.getElementById('btnAuto');
        const autoStopBtn = document.getElementById('autoStopBtn');
        const autoControls = document.getElementById('autoControls');
        const autoSpinsCount = document.getElementById('autoSpinsCount');
        const autoTotalDisplay = document.getElementById('autoTotalDisplay');
        const statusBar = document.getElementById('statusBar');
        const flashOverlay = document.getElementById('flashOverlay');
        const btnBack = document.getElementById('btnBack');
        const bgMusic = document.getElementById('bgMusic');
        const thunderSound = document.getElementById('thunderSound');
        const bonusPopup = document.getElementById('bonusPopup');
        const bonusPopupClose = document.getElementById('bonusPopupClose');
        const bonusPopupIcon = document.getElementById('bonusPopupIcon');
        const bonusPopupTitle = document.getElementById('bonusPopupTitle');
        const bonusPopupSub = document.getElementById('bonusPopupSub');
        const bonusPopupDetail = document.getElementById('bonusPopupDetail');
        const betPresets = document.querySelectorAll('.bet-preset-btn');
        const coinContainer = document.getElementById('coinContainer');
        const particleCanvas = document.getElementById('particleCanvas');
        const lightningCanvas = document.getElementById('lightningCanvas');
        const bigWinOverlay = document.getElementById('bigWinOverlay');
        const bigWinCanvas = document.getElementById('bigWinCanvas');
        const bigWinContent = document.getElementById('bigWinContent');
        const bigWinLabel = document.getElementById('bigWinLabel');
        const bigWinAmount = document.getElementById('bigWinAmount');
        const appEl = document.getElementById('app');
        const reelsCanvas = document.getElementById('reelsCanvas');

        // =============================================================
        // 5. ЗВУКИ
        // =============================================================
        let audioCtx = null;
        function canPlaySound() { return settings.sound; }

        function initAudio() {
            if (!audioCtx) {
                try {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    const resumeFn = function() { if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); };
                    document.addEventListener('click', resumeFn, { once: true });
                    document.addEventListener('touchstart', resumeFn, { once: true });
                } catch (e) {}
            }
        }

        function playTone(freq, dur, type = 'sine', vol = 0.07, delay = 0) {
            if (!canPlaySound() || !audioCtx) return;
            try {
                setTimeout(() => {
                    if (audioCtx.state === 'suspended') audioCtx.resume();
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start();
                    osc.stop(audioCtx.currentTime + dur);
                }, delay);
            } catch (e) {}
        }

        function playSpin() { playTone(200, 0.08, 'sawtooth', 0.04);
            playTone(300, 0.06, 'sine', 0.03, 40); }

        function playStop() { playTone(180, 0.1, 'square', 0.05);
            setTimeout(() => playTone(120, 0.08, 'sine', 0.04), 60); }

        function playWin() { [523, 659, 784, 1047].forEach((f, i) => playTone(f, 0.13, 'sine', 0.065, i * 90)); if (tg?.HapticFeedback)
                tg.HapticFeedback.notificationOccurred('success'); }

        function playLose() { playTone(280, 0.18, 'sawtooth', 0.035);
            setTimeout(() => playTone(220, 0.14, 'sawtooth', 0.025), 130); }

        function playCoin() { playTone(760, 0.055, 'sine', 0.08);
            setTimeout(() => playTone(1080, 0.045, 'sine', 0.06), 35); }

        function playBonus() { [440, 554, 659, 880, 1108].forEach((f, i) => playTone(f, 0.13, 'sine', 0.065, i * 70)); if (tg
                ?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success'); }

        function playClick() { playTone(580, 0.03, 'sine', 0.03); }

        function playThunder() { if (!canPlaySound()) return; try { thunderSound.currentTime = 0;
                thunderSound.volume = 0.6;
                thunderSound.play().catch(() => {}); } catch (e) {}
            playTone(65, 1.2, 'sawtooth', 0.20);
            for (let i = 0; i < 10; i++) { setTimeout(() => playTone(160 + Math.random() * 280, 0.05, 'square', 0.025), i *
                    55 + 180); } if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy'); }

        // =============================================================
        // 6. ЧАСТИЦЫ
        // =============================================================
        let particles = [],
            burstParticles = [];
        let pCtx = null,
            pW = 0,
            pH = 0,
            particleAnimId = null;

        function spawnBurst(x, y, count, type) {
            for (let i = 0; i < Math.min(count, 25); i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 1 + Math.random() * 3.5;
                burstParticles.push({
                    x,
                    y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 1,
                    r: type === 'coin' ? 3 + Math.random() * 5 : 1 + Math.random() * 2.5,
                    life: 1,
                    decay: 0.015 + Math.random() * 0.025,
                    type: type || 'gold'
                });
            }
        }

        function initParticles() {
            const count = settings.graphics === 'balanced' ? 15 : 30;
            pW = particleCanvas.width = window.innerWidth;
            pH = particleCanvas.height = window.innerHeight;
            pCtx = particleCanvas.getContext('2d');
            particles = [];
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: Math.random() * pW,
                    y: Math.random() * pH,
                    vx: (Math.random() - 0.5) * 0.12,
                    vy: (Math.random() - 0.5) * 0.12 - 0.02,
                    r: 0.5 + Math.random() * 2,
                    a: 0.06 + Math.random() * 0.2,
                    phase: Math.random() * Math.PI * 2,
                    speed: 0.3 + Math.random() * 0.6
                });
            }
            if (particleAnimId) cancelAnimationFrame(particleAnimId);
            drawParticles();
        }

        function drawParticles() {
            if (!pCtx) return;
            pCtx.clearRect(0, 0, pW, pH);
            const time = Date.now() * 0.0004;
            particles.forEach(p => {
                p.x += p.vx + Math.sin(time * p.speed + p.phase) * 0.03;
                p.y += p.vy + Math.cos(time * p.speed * 0.7 + p.phase) * 0.03;
                if (p.x < 0) p.x = pW;
                if (p.x > pW) p.x = 0;
                if (p.y < 0) p.y = pH;
                if (p.y > pH) p.y = 0;
                const alpha = p.a * (0.4 + 0.6 * Math.sin(time * 0.5 + p.phase));
                pCtx.beginPath();
                pCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                pCtx.fillStyle = `rgba(180, 77, 255, ${alpha * 0.6})`;
                pCtx.shadowColor = `rgba(180, 77, 255, ${alpha * 0.5})`;
                pCtx.shadowBlur = settings.graphics === 'balanced' ? 4 : 8;
                pCtx.fill();
                pCtx.shadowBlur = 0;
            });
            burstParticles = burstParticles.filter(bp => {
                bp.x += bp.vx;
                bp.y += bp.vy;
                bp.vy += 0.06;
                bp.life -= bp.decay;
                if (bp.life <= 0) return false;
                pCtx.save();
                pCtx.globalAlpha = bp.life;
                pCtx.fillStyle = bp.type === 'coin' ? '#FFD93D' : '#FF4DB8';
                pCtx.beginPath();
                pCtx.arc(bp.x, bp.y, bp.r, 0, Math.PI * 2);
                pCtx.fill();
                pCtx.restore();
                return true;
            });
            particleAnimId = requestAnimationFrame(drawParticles);
        }

        // =============================================================
        // 7. ОСНОВНАЯ ЛОГИКА
        // =============================================================
        const REEL_ROWS = 3;
        const REEL_COLS = 5;
        const GRID_SIZE = REEL_ROWS * REEL_COLS;

        let isSpinning = false;
        let currentWin = 0;
        let freeSpins = 0;
        let isBonusActive = false;
        let bonusMultiplier = 1;
        let bonusTotalWin = 0;
        let autoSpinActive = false;
        let autoSpinRemaining = 0;
        let autoSpinTotal = 0;
        let isAutoStopping = false;
        let currentGrid = [];
        let reelOffsets = [0, 0, 0, 0, 0]; // для анимации
        let reelStrips = []; // каждая колонка – массив символов (индексы)
        const REEL_STRIP_LENGTH = 12;

        // Строим полоски для каждого барабана
        function buildReelStrips() {
            const strips = [];
            for (let col = 0; col < 5; col++) {
                const strip = [];
                for (let i = 0; i < REEL_STRIP_LENGTH; i++) {
                    // Случайный символ, избегая повторов подряд
                    let sym;
                    do {
                        sym = Math.floor(Math.random() * SYMBOLS.length);
                    } while (i > 0 && strip[i - 1] === sym && Math.random() < 0.4);
                    strip.push(sym);
                }
                strips.push(strip);
            }
            return strips;
        }

        // Получить сетку из текущих смещений
        function getGridFromOffsets(offsets, strips) {
            const grid = [];
            for (let row = 0; row < 3; row++) {
                for (let col = 0; col < 5; col++) {
                    const strip = strips[col];
                    const idx = (offsets[col] + row) % strip.length;
                    grid.push(strip[idx]);
                }
            }
            return grid;
        }

        // Отрисовка (статическая)
        function drawReels(offsets, strips) {
            const canvas = reelsCanvas;
            const rect = canvas.parentElement.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
            const ctx = canvas.getContext('2d');
            ctx.scale(dpr, dpr);

            const pad = 4;
            const cellW = (rect.width - pad * 2) / 5;
            const cellH = (rect.height - pad * 2) / 3;
            const imgSize = Math.min(cellW - 4, cellH - 4) * 0.85;

            ctx.clearRect(0, 0, rect.width, rect.height);

            // Фон клеток
            for (let row = 0; row < 3; row++) {
                for (let col = 0; col < 5; col++) {
                    const x = pad + col * cellW;
                    const y = pad + row * cellH;
                    ctx.fillStyle = 'rgba(0,0,0,0.3)';
                    ctx.fillRect(x, y, cellW, cellH);
                    ctx.strokeStyle = 'rgba(180,77,255,0.1)';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(x, y, cellW, cellH);
                }
            }

            // Символы
            for (let col = 0; col < 5; col++) {
                const strip = strips[col];
                const offset = offsets[col];
                for (let row = 0; row < 3; row++) {
                    const idx = (offset + row) % strip.length;
                    const symIdx = strip[idx];
                    const x = pad + col * cellW + (cellW - imgSize) / 2;
                    const y = pad + row * cellH + (cellH - imgSize) / 2;

                    const img = new Image();
                    img.src = SYMBOLS[symIdx];
                    if (img.complete && img.naturalWidth) {
                        ctx.drawImage(img, x, y, imgSize, imgSize);
                    } else {
                        img.onload = () => ctx.drawImage(img, x, y, imgSize, imgSize);
                        img.onerror = () => {
                            ctx.fillStyle = 'rgba(255,255,255,0.05)';
                            ctx.fillRect(x, y, imgSize, imgSize);
                        };
                    }
                }
            }
        }

        // Отрисовка с анимацией (blur)
        function drawReelsFloat(offsets, strips) {
            const canvas = reelsCanvas;
            const rect = canvas.parentElement.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
            const ctx = canvas.getContext('2d');
            ctx.scale(dpr, dpr);

            const pad = 4;
            const cellW = (rect.width - pad * 2) / 5;
            const cellH = (rect.height - pad * 2) / 3;
            const imgSize = Math.min(cellW - 4, cellH - 4) * 0.85;

            ctx.clearRect(0, 0, rect.width, rect.height);

            const isMoving = Math.abs(offsets[0] - reelOffsets[0]) > 0.1;
            if (isMoving && settings.graphics !== 'balanced') {
                ctx.filter = 'blur(2px)';
            }

            for (let col = 0; col < 5; col++) {
                const strip = strips[col];
                const len = strip.length;
                const offset = offsets[col];
                const baseIdx = Math.floor(offset) % len;
                const frac = offset - Math.floor(offset);

                for (let row = -1; row < 4; row++) {
                    const idx = (baseIdx + row) % len;
                    const symIdx = strip[idx];
                    const x = pad + col * cellW + (cellW - imgSize) / 2;
                    const y = pad + (row - frac) * cellH + (cellH - imgSize) / 2;
                    if (y + imgSize < pad || y > pad + 3 * cellH) continue;

                    const img = new Image();
                    img.src = SYMBOLS[symIdx];
                    if (img.complete && img.naturalWidth) {
                        ctx.drawImage(img, x, y, imgSize, imgSize);
                    } else {
                        img.onload = () => ctx.drawImage(img, x, y, imgSize, imgSize);
                        img.onerror = () => {
                            ctx.fillStyle = 'rgba(255,255,255,0.04)';
                            ctx.fillRect(x, y, imgSize, imgSize);
                        };
                    }
                }
            }
            ctx.filter = 'none';
        }

        // Проверка выигрыша
        function checkWins(grid) {
            let totalMultiplier = 0;
            const winningIndices = new Set();
            let scatterCount = 0;

            // Скаттеры
            for (let i = 0; i < grid.length; i++) {
                if (grid[i] === SCATTER_INDEX) scatterCount++;
            }

            // Линии
            LINES.forEach(line => {
                const first = grid[line[0]];
                // Если первый символ – скаттер, пропускаем (обрабатывается отдельно)
                if (first === SCATTER_INDEX) return;
                let matchCount = 1;
                for (let i = 1; i < 5; i++) {
                    const sym = grid[line[i]];
                    // Wild заменяет любой, кроме скаттера
                    if (sym === WILD_INDEX || sym === first) {
                        matchCount++;
                    } else {
                        break;
                    }
                }
                if (matchCount >= 3) {
                    // Множитель для основного символа (если это wild, то множитель для wild)
                    let baseSym = first;
                    // Если первый символ – wild, используем множитель wild
                    const mult = PAYTABLE[baseSym] && PAYTABLE[baseSym][matchCount - 3];
                    if (mult) {
                        // Если есть wild в линии, умножаем на 2
                        let wildCount = 0;
                        for (let i = 0; i < matchCount; i++) {
                            if (grid[line[i]] === WILD_INDEX) wildCount++;
                        }
                        let finalMult = mult * (wildCount > 0 ? 2 : 1);
                        totalMultiplier += finalMult;
                        for (let i = 0; i < matchCount; i++) {
                            winningIndices.add(line[i]);
                        }
                    }
                }
            });

            // Скаттер бонус
            if (scatterCount >= 3) {
                const scatterMult = (scatterCount === 5 ? 4 : scatterCount === 4 ? 1.5 : 0.4);
                totalMultiplier += scatterMult;
                // Добавляем индексы скаттеров
                for (let i = 0; i < grid.length; i++) {
                    if (grid[i] === SCATTER_INDEX) winningIndices.add(i);
                }
            }

            return { totalMultiplier, winningIndices, scatterCount };
        }

        // Каскад: удаляем выигравшие индексы и заполняем сверху новыми
        function performCascade(grid, winningIndices) {
            const newGrid = [...grid];
            let anyChanged = false;
            for (let col = 0; col < 5; col++) {
                // Собираем символы в колонке снизу вверх, исключая выигравшие
                const colSymbols = [];
                for (let row = 2; row >= 0; row--) {
                    const idx = row * 5 + col;
                    if (!winningIndices.has(idx)) {
                        colSymbols.push(grid[idx]);
                    }
                }
                // Дозаполняем новыми случайными
                while (colSymbols.length < 3) {
                    colSymbols.push(Math.floor(Math.random() * SYMBOLS.length));
                    anyChanged = true;
                }
                // Записываем обратно снизу вверх
                for (let row = 0; row < 3; row++) {
                    const idx = row * 5 + col;
                    newGrid[idx] = colSymbols[2 - row];
                }
            }
            return { newGrid, anyChanged };
        }

        // Анимация вращения
        let animationId = null;

        function animateReels(targetOffsets, duration, callback) {
            const startOffsets = [...reelOffsets];
            const startTime = performance.now();
            if (animationId) cancelAnimationFrame(animationId);

            function step(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 3);

                const currentOffsets = [];
                for (let col = 0; col < 5; col++) {
                    const start = startOffsets[col];
                    const target = targetOffsets[col];
                    let offset = start + (target - start) * eased;
                    if (progress > 0.85) {
                        const bounce = Math.sin((progress - 0.85) / 0.15 * Math.PI) * 0.3;
                        offset += bounce * (target - start) * 0.08;
                    }
                    currentOffsets.push(offset);
                }
                drawReelsFloat(currentOffsets, reelStrips);

                if (progress < 1) {
                    animationId = requestAnimationFrame(step);
                } else {
                    for (let col = 0; col < 5; col++) {
                        const target = targetOffsets[col];
                        const len = reelStrips[col].length;
                        reelOffsets[col] = ((Math.round(target) % len) + len) % len;
                    }
                    drawReels(reelOffsets, reelStrips);
                    currentGrid = getGridFromOffsets(reelOffsets, reelStrips);
                    animationId = null;
                    if (callback) callback();
                }
            }
            animationId = requestAnimationFrame(step);
        }

        function generateTargetOffsets() {
            const targets = [];
            for (let col = 0; col < 5; col++) {
                const extraSpins = 1 + Math.floor(Math.random() * 3);
                const randomOffset = Math.floor(Math.random() * REEL_STRIP_LENGTH);
                targets.push(reelOffsets[col] + extraSpins * REEL_STRIP_LENGTH + randomOffset);
            }
            return targets;
        }

        // Основной спин
        function spinReels(bet, isFreeSpin = false, callback) {
            if (isSpinning) return;
            if (balance < bet) {
                setStatus('❌ Недостаточно средств!', 'lose');
                return;
            }
            isSpinning = true;
            btnSpin.disabled = true;
            btnAuto.disabled = true;
            betInput.disabled = true;
            betPresets.forEach(b => b.style.pointerEvents = 'none');
            winDisplay.innerText = '0';

            const statusEl = statusBar.querySelector('span') || statusBar;
            statusEl.textContent = isBonusActive ? `⚡ ФРИСПИН ${freeSpins}` : '🎰 ВРАЩЕНИЕ...';
            if (isBonusActive) statusBar.classList.add('bonus');
            else statusBar.classList.remove('bonus');

            // Обновляем полоски для каждого барабана
            for (let col = 0; col < 5; col++) {
                const strip = reelStrips[col];
                for (let i = 0; i < strip.length; i++) {
                    strip[i] = Math.floor(Math.random() * SYMBOLS.length);
                }
            }

            playSpin();
            btnSpin.classList.add('spinning-state');

            const targets = generateTargetOffsets();
            const duration = 1800 + Math.random() * 500;

            animateReels(targets, duration, function() {
                btnSpin.classList.remove('spinning-state');
                playStop();

                const finalGrid = getGridFromOffsets(reelOffsets, reelStrips);
                currentGrid = finalGrid;

                if (settings.graphics === 'max') {
                    flashOverlay.classList.add('active');
                    setTimeout(() => flashOverlay.classList.remove('active'), 250);
                }

                setTimeout(() => {
                    processCascades(bet, isFreeSpin, callback);
                }, 400);
            });
        }

        async function processCascades(bet, isFreeSpin, callback) {
            let grid = [...currentGrid];
            let totalWin = 0;
            let cascadeCount = 0;
            let hasWin = false;

            while (true) {
                const result = checkWins(grid);
                const { totalMultiplier, winningIndices, scatterCount } = result;

                if (totalMultiplier > 0 || scatterCount >= 3) {
                    hasWin = true;
                    cascadeCount++;
                    const winAmount = Math.floor(bet * totalMultiplier);
                    totalWin += winAmount;

                    const statusEl = statusBar.querySelector('span') || statusBar;
                    statusEl.textContent = `💰 ВЫИГРЫШ: ${formatNumber(winAmount)} ₽`;
                    statusBar.classList.add('win');

                    // Визуализация: вспышки и частицы
                    winningIndices.forEach(idx => {
                        const col = idx % 5;
                        const row = Math.floor(idx / 5);
                        const rect = reelsCanvas.getBoundingClientRect();
                        const pad = 4;
                        const cellW = (rect.width - pad * 2) / 5;
                        const cellH = (rect.height - pad * 2) / 3;
                        const x = pad + col * cellW + cellW / 2;
                        const y = pad + row * cellH + cellH / 2;
                        spawnBurst(x, y, 10, 'gold');
                    });

                    if (cascadeCount === 1) playWin();
                    else playCoin();

                    // Анимация задержки
                    await new Promise(resolve => setTimeout(resolve, 500));

                    // Каскад
                    const cascadeResult = performCascade(grid, winningIndices);
                    grid = cascadeResult.newGrid;
                    if (cascadeResult.anyChanged) {
                        // Обновляем отображение
                        setGridToReels(grid, reelStrips, reelOffsets);
                        await new Promise(resolve => setTimeout(resolve, 300));
                        currentGrid = grid;
                    } else {
                        break;
                    }

                    // Если есть скаттеры – запускаем бонус
                    if (scatterCount >= 3 && !isBonusActive) {
                        const fsReward = scatterCount >= 5 ? 10 : 5;
                        playBonus();
                        triggerBonus(fsReward, `✨ ${scatterCount} скаттеров!`, '🍒', 'ФРИСПИНЫ!',
                            `${fsReward} бесплатных вращений!`, 'x2 множитель на все выигрыши');
                        // Бонус активируется, прерываем каскад
                        break;
                    }
                } else {
                    break;
                }
            }

            if (hasWin && !isBonusActive) {
                // Обычный выигрыш
                animateCoinsToBalance(totalWin);
                updateBalance(balance + totalWin, true);
                const statusEl = statusBar.querySelector('span') || statusBar;
                statusEl.textContent = `🎉 ВЫИГРЫШ: ${formatNumber(totalWin)} ₽`;
                winDisplay.innerText = formatNumber(totalWin);
                winDisplay.classList.add('win-text');
                if (totalWin > bet * 10) {
                    showBigWinCinematic(totalWin, bet);
                }
                // Обновляем статистику
                updateProfileStats(bet, totalWin);
            } else if (!hasWin && !isBonusActive) {
                const statusEl = statusBar.querySelector('span') || statusBar;
                statusEl.textContent = '❌ ПОПРОБУЙТЕ СНОВА!';
                statusBar.classList.add('lose');
                playLose();
                setTimeout(() => statusBar.classList.remove('lose'), 800);
                updateProfileStats(bet, 0);
            }

            finishSpin(bet, isFreeSpin, callback);
        }

        function finishSpin(bet, isFreeSpin, callback) {
            isSpinning = false;

            if (isBonusActive) {
                freeSpins--;
                updateFSDisplay();
                if (freeSpins > 0) {
                    const statusEl = statusBar.querySelector('span') || statusBar;
                    statusEl.textContent = `⚡ ФРИСПИН ${freeSpins}`;
                    statusBar.classList.add('bonus');
                    setTimeout(() => {
                        if (!isSpinning && !isAutoStopping) {
                            spinReels(bet, true);
                        }
                    }, 800);
                } else {
                    setTimeout(() => endBonus(), 1200);
                }
            } else {
                if (!isFreeSpin && !autoSpinActive) {
                    btnSpin.disabled = false;
                    btnAuto.disabled = false;
                    betInput.disabled = false;
                    betPresets.forEach(b => b.style.pointerEvents = 'auto');
                } else if (!isFreeSpin && autoSpinActive && !isAutoStopping) {
                    autoSpinRemaining--;
                    updateAutoTotal();
                    if (autoSpinRemaining > 0 && balance >= getBet()) {
                        setTimeout(() => {
                            if (!isSpinning && autoSpinActive) {
                                const nextBet = getBet();
                                if (balance >= nextBet) {
                                    updateBalance(balance - nextBet, false);
                                    spinReels(nextBet, false);
                                } else {
                                    stopAutoSpin('Недостаточно средств');
                                }
                            }
                        }, 800);
                    } else {
                        stopAutoSpin('Авто-спин завершён');
                    }
                }
            }

            if (callback) callback();
        }

        function startSpin(bet, isFreeSpin = false, callback) {
            if (balance < bet) {
                setStatus('❌ Недостаточно средств!', 'lose');
                return;
            }
            // Обновляем полоски (для разнообразия)
            for (let col = 0; col < 5; col++) {
                const strip = reelStrips[col];
                for (let i = 0; i < strip.length; i++) {
                    strip[i] = Math.floor(Math.random() * SYMBOLS.length);
                }
            }
            currentGrid = getGridFromOffsets(reelOffsets, reelStrips);
            spinReels(bet, isFreeSpin, callback);
        }

        // =============================================================
        // 8. БОНУС
        // =============================================================
        function triggerBonus(spins, triggerText, icon, title, sub, detail) {
            if (isBonusActive && freeSpins > 0) {
                freeSpins += spins;
                updateFSDisplay();
                showBonusPopup(icon, title, `+${spins} фриспинов! (всего ${freeSpins})`, detail);
                const statusEl = statusBar.querySelector('span') || statusBar;
                statusEl.textContent = `⚡ БОНУС! +${spins} ФРИСПИНОВ`;
                statusBar.classList.add('bonus');
                return;
            }
            isBonusActive = true;
            bonusMultiplier = 2;
            freeSpins = spins;
            bonusTotalWin = 0;
            showBonusPopup(icon, title, sub, detail);
            statusBar.classList.add('bonus');
            const statusEl = statusBar.querySelector('span') || statusBar;
            statusEl.textContent = `⚡ ${triggerText} ⚡ ${freeSpins} ФРИСПИНОВ!`;
            updateFSDisplay();
            setTimeout(() => {
                if (!isSpinning) {
                    const bet = getBet();
                    startSpin(bet, true);
                }
            }, 1200);
        }

        function endBonus() {
            isBonusActive = false;
            freeSpins = 0;
            bonusMultiplier = 1;
            updateFSDisplay();
            statusBar.classList.remove('bonus', 'win');
            const statusEl = statusBar.querySelector('span') || statusBar;
            statusEl.textContent = `🍒 БОНУС ЗАВЕРШЕН: +${formatNumber(bonusTotalWin)} ₽`;
            if (bonusTotalWin > 0) {
                animateCoinsToBalance(bonusTotalWin);
                updateBalance(balance + bonusTotalWin, true);
                statusEl.textContent = `🎉 БОНУС ЗАВЕРШЕН! Выигрыш ${formatNumber(bonusTotalWin)} ₽ зачислен!`;
            } else {
                statusEl.textContent = '🍒 БОНУС ЗАВЕРШЕН без выигрышей';
            }
            btnSpin.disabled = false;
            btnAuto.disabled = false;
            betInput.disabled = false;
            betPresets.forEach(b => b.style.pointerEvents = 'auto');
            if (autoSpinActive && !isAutoStopping) {
                autoSpinRemaining--;
                updateAutoTotal();
                if (autoSpinRemaining > 0 && balance >= getBet()) {
                    setTimeout(() => {
                        if (!isSpinning && autoSpinActive) {
                            const nextBet = getBet();
                            if (balance >= nextBet) {
                                updateBalance(balance - nextBet, false);
                                startSpin(nextBet, false);
                            } else {
                                stopAutoSpin('Недостаточно средств');
                            }
                        }
                    }, 1200);
                } else {
                    stopAutoSpin('Авто-спин завершён');
                }
            }
            if (bonusPopup.classList.contains('show')) {
                setTimeout(() => bonusPopup.classList.remove('show'), 400);
            }
        }

        // =============================================================
        // 9. АВТОСПИН
        // =============================================================
        function toggleAutoSpin() {
            if (autoSpinActive) { stopAutoSpin('Остановлено пользователем'); return; }
            if (isSpinning) return;
            const bet = getBet();
            if (balance < bet) {
                setStatus('❌ Недостаточно средств!', 'lose');
                return;
            }
            autoSpinTotal = parseInt(autoSpinsCount.value) || 10;
            autoSpinRemaining = autoSpinTotal;
            autoSpinActive = true;
            isAutoStopping = false;
            updateAutoTotal();
            btnAuto.textContent = 'СТОП';
            btnAuto.classList.add('active');
            autoControls.style.display = 'flex';
            autoSpinsCount.disabled = true;
            btnSpin.disabled = true;
            betInput.disabled = true;
            betPresets.forEach(b => b.style.pointerEvents = 'none');
            const statusEl = statusBar.querySelector('span') || statusBar;
            statusEl.textContent = `🔁 АВТО-СПИН ${autoSpinRemaining}/${autoSpinTotal}`;
            updateBalance(balance - bet, false);
            startSpin(bet, false);
        }

        function stopAutoSpin(reason) {
            if (!autoSpinActive) return;
            autoSpinActive = false;
            isAutoStopping = false;
            btnAuto.textContent = 'АВТО';
            btnAuto.classList.remove('active');
            autoControls.style.display = 'none';
            autoSpinsCount.disabled = false;
            btnSpin.disabled = false;
            betInput.disabled = false;
            betPresets.forEach(b => b.style.pointerEvents = 'auto');
            if (reason) {
                const statusEl = statusBar.querySelector('span') || statusBar;
                statusEl.textContent = `⏹ ${reason}`;
            }
            autoTotalDisplay.textContent = '';
        }

        function updateAutoTotal() {
            if (autoSpinActive && autoSpinRemaining > 0) {
                autoTotalDisplay.textContent = `Осталось: ${autoSpinRemaining}`;
            } else {
                autoTotalDisplay.textContent = '';
            }
        }

        // =============================================================
        // 10. UI HELPERS
        // =============================================================
        function formatNumber(num) { return Math.floor(num).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' '); }

        function parseNumber(str) { return parseInt(str.replace(/\s/g, '')) || 0; }

        function updateBalance(amount, animate = false) {
            balance = Math.floor(amount);
            localStorage.setItem('casinoBalance', String(balance));
            balanceDisplay.innerText = formatNumber(balance) + ' ₽';
            if (animate) {
                balanceBox.classList.remove('pop');
                void balanceBox.offsetWidth;
                balanceBox.classList.add('pop');
                balanceDisplay.classList.add('added');
                setTimeout(() => balanceDisplay.classList.remove('added'), 500);
            }
        }

        function updateFSDisplay() {
            fsDisplay.innerHTML = `<span class="fs-count">${freeSpins}</span>`;
        }

        function getBet() {
            let val = parseNumber(betInput.value);
            if (isNaN(val) || val < 10) val = 10;
            if (val > 100000) val = 100000;
            if (val > balance && balance > 0) val = Math.min(balance, 100000);
            return val;
        }

        function applyBetPreset(amount) {
            let val;
            if (amount === 'max') {
                val = Math.min(balance, 100000);
                if (val < 10) val = 10;
            } else {
                val = parseInt(amount);
            }
            val = Math.max(10, Math.min(val, 100000, balance));
            betInput.value = formatNumber(val);
            totalBetDisplay.innerText = formatNumber(val);
            betPresets.forEach(b => b.classList.remove('active'));
            betPresets.forEach(b => {
                if (b.dataset.amount === String(amount) || (amount === 'max' && b.dataset.amount === 'max'))
                    b.classList.add('active');
            });
        }

        function setStatus(text, type = '') {
            const statusEl = statusBar.querySelector('span') || statusBar;
            statusEl.textContent = text;
            statusBar.className = 'status-bar' + (type ? ' ' + type : '');
        }

        function animateCoinsToBalance(amount) {
            if (amount <= 0) return;
            const rect = balanceBox.getBoundingClientRect();
            const startX = window.innerWidth / 2 - 40;
            const startY = window.innerHeight / 2 - 40;
            const targetX = rect.left + rect.width / 2 - 16;
            const targetY = rect.top + 6;
            const count = Math.min(Math.floor(amount / 35) + 5, 25);
            for (let i = 0; i < count; i++) {
                const coin = document.createElement('div');
                coin.className = 'coin';
                const delay = Math.random() * 300;
                const offX = (Math.random() - 0.5) * 120;
                const offY = (Math.random() - 0.5) * 80 - 20;
                const tx = targetX - startX + offX;
                const ty = targetY - startY + offY;
                coin.style.setProperty('--tx', tx + 'px');
                coin.style.setProperty('--ty', ty + 'px');
                coin.style.left = startX + 'px';
                coin.style.top = startY + 'px';
                coin.style.animationDuration = (800 + Math.random() * 200) + 'ms';
                coin.style.animationDelay = delay + 'ms';
                coin.style.width = (24 + Math.random() * 16) + 'px';
                coin.style.height = (24 + Math.random() * 16) + 'px';
                coinContainer.appendChild(coin);
                playCoin();
                setTimeout(() => coin.remove(), 800 + delay + 150);
            }
        }

        function showBonusPopup(icon, title, sub, detail) {
            bonusPopupIcon.textContent = icon || '🍒';
            bonusPopupTitle.textContent = title || 'ФРИСПИНЫ!';
            bonusPopupSub.textContent = sub || 'Вы получили 5 бесплатных вращений!';
            bonusPopupDetail.textContent = detail || 'x2 множитель на все выигрыши';
            bonusPopup.classList.add('show');
            playBonus();
            // Вспышка
            flashOverlay.classList.add('active');
            setTimeout(() => flashOverlay.classList.remove('active'), 400);
        }

        bonusPopupClose.addEventListener('click', function() { bonusPopup.classList.remove('show'); });
        bonusPopup.addEventListener('click', function(e) { if (e.target === this) bonusPopup.classList.remove('show'); });

        // =============================================================
        // 11. BIG WIN CINEMATIC
        // =============================================================
        let bigWinAnimId = null;
        const BIG_WIN_TIERS = [
            { threshold: 8, label: 'BIG WIN', shake: 'shake-light' },
            { threshold: 15, label: 'MEGA WIN', shake: 'shake-medium' },
            { threshold: 25, label: 'SUPER WIN', shake: 'shake-medium' },
            { threshold: 45, label: 'EPIC WIN', shake: 'shake-heavy' },
            { threshold: 80, label: 'LEGENDARY WIN', shake: 'shake-heavy' }
        ];

        function showBigWinCinematic(amount, bet) {
            const ratio = amount / bet;
            let tier = null;
            for (let i = BIG_WIN_TIERS.length - 1; i >= 0; i--) {
                if (ratio >= BIG_WIN_TIERS[i].threshold) { tier = BIG_WIN_TIERS[i]; break; }
            }
            if (!tier) return;
            bigWinLabel.textContent = tier.label;
            bigWinAmount.textContent = '0 ₽';
            bigWinOverlay.classList.add('active');
            appEl.classList.add(tier.shake);
            spawnBurst(window.innerWidth / 2, window.innerHeight / 2, 30, 'coin');
            spawnBurst(window.innerWidth / 2, window.innerHeight / 2, 20, 'gold');
            playThunder();
            const duration = 2500 + tier.threshold * 30;
            const startTime = Date.now();

            function animateCounter() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 3);
                bigWinAmount.textContent = formatNumber(Math.floor(amount * eased)) + ' ₽';
                if (progress < 1) {
                    bigWinAnimId = requestAnimationFrame(animateCounter);
                } else {
                    setTimeout(hideBigWinCinematic, 1200);
                }
            }
            if (bigWinAnimId) cancelAnimationFrame(bigWinAnimId);
            animateCounter();
        }

        function hideBigWinCinematic() {
            bigWinOverlay.classList.remove('active');
            appEl.classList.remove('shake-light', 'shake-medium', 'shake-heavy');
            if (bigWinAnimId) cancelAnimationFrame(bigWinAnimId);
        }

        // =============================================================
        // 12. СТАТИСТИКА ПРОФИЛЯ
        // =============================================================
        function updateProfileStats(bet, win) {
            try {
                let played = parseInt(localStorage.getItem('profile_games_played')) || 0;
                let totalBet = parseInt(localStorage.getItem('profile_total_bet')) || 0;
                let totalWin = parseInt(localStorage.getItem('profile_total_win')) || 0;
                let wins = parseInt(localStorage.getItem('profile_wins')) || 0;
                let losses = parseInt(localStorage.getItem('profile_losses')) || 0;
                played++;
                totalBet += bet;
                if (win > 0) { wins++;
                    totalWin += win; } else { losses++; }
                localStorage.setItem('profile_games_played', String(played));
                localStorage.setItem('profile_total_bet', String(totalBet));
                localStorage.setItem('profile_total_win', String(totalWin));
                localStorage.setItem('profile_wins', String(wins));
                localStorage.setItem('profile_losses', String(losses));
            } catch (e) {}
        }

        // =============================================================
        // 13. ИНИЦИАЛИЗАЦИЯ
        // =============================================================
        function init() {
            initAudio();

            reelStrips = buildReelStrips();
            reelOffsets = [0, 0, 0, 0, 0];
            currentGrid = getGridFromOffsets(reelOffsets, reelStrips);

            const render = () => {
                drawReels(reelOffsets, reelStrips);
            };
            requestAnimationFrame(() => {
                requestAnimationFrame(render);
            });

            const resizeObserver = new ResizeObserver(() => { render(); });
            resizeObserver.observe(reelsCanvas.parentElement);

            updateBalance(balance, false);
            const initialBet = Math.min(1000, balance);
            betInput.value = formatNumber(initialBet);
            totalBetDisplay.innerText = formatNumber(initialBet);
            updateFSDisplay();

            applySettings();

            if (settings.music) {
                bgMusic.volume = 0.2;
                bgMusic.play().catch(() => {});
            }

            // Presets
            betPresets.forEach(btn => {
                btn.addEventListener('click', function() {
                    playClick();
                    applyBetPreset(this.dataset.amount);
                });
            });

            // Spin
            btnSpin.addEventListener('click', function(e) {
                if (!isSpinning) {
                    const rect = btnSpin.getBoundingClientRect();
                    const ripple = document.createElement('span');
                    ripple.className = 'ripple';
                    const size = Math.max(rect.width, rect.height);
                    ripple.style.width = ripple.style.height = size + 'px';
                    ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
                    ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
                    btnSpin.appendChild(ripple);
                    setTimeout(() => ripple.remove(), 600);
                }
                if (isSpinning) return;
                if (isBonusActive && freeSpins > 0) return;
                const bet = getBet();
                if (isNaN(bet) || bet < 10 || bet > 100000) {
                    setStatus('❌ Ставка от 10 до 100 000 ₽', 'lose');
                    return;
                }
                if (balance < bet) {
                    setStatus(`❌ Недостаточно средств! Баланс: ${formatNumber(balance)}`, 'lose');
                    return;
                }
                playClick();
                if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
                updateBalance(balance - bet, false);
                startSpin(bet, false);
            });

            // Auto
            btnAuto.addEventListener('click', toggleAutoSpin);
            autoStopBtn.addEventListener('click', function() { stopAutoSpin('Остановлено пользователем'); });

            // Back
            btnBack.addEventListener('click', function() {
                if (autoSpinActive) stopAutoSpin('Выход в меню');
                window.location.href = 'casino.html?userId=' + userId;
            });

            // Settings (упрощённо)
            document.getElementById('btnSettings').addEventListener('click', function() {
                // Просто переключение звука для демо
                settings.sound = !settings.sound;
                saveSettings();
                setStatus(settings.sound ? '🔊 Звук включён' : '🔇 Звук выключен', '');
            });

            // Particles
            initParticles();

            // Keyboard
            document.addEventListener('keydown', function(e) {
                if (e.code === 'Space' && !e.repeat) {
                    e.preventDefault();
                    if (!btnSpin.disabled) btnSpin.click();
                }
            });

            console.log('🍒 FRUIT 777 загружен, баланс:', balance);
        }

        // =============================================================
        // 14. ЗАПУСК
        // =============================================================
        init();

        window.__fruit = {
            balance,
            isSpinning,
            autoSpinActive,
            freeSpins,
            isBonusActive,
            currentGrid,
            settings,
            reelOffsets,
            reelStrips
        };

    })();
</script>
</body>
