<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🍒 FRUIT 777 · R-GAME</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,600;0,800;1,800&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0b0710;
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            color: #fff;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 0%, rgba(155, 77, 255, 0.25), transparent 60%),
                              radial-gradient(circle at 50% 100%, rgba(108, 43, 217, 0.15), transparent 50%);
        }
        .game-container {
            max-width: 550px;
            width: 100%;
            background: rgba(17, 11, 26, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 32px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.8), inset 0 1px 1px rgba(255,255,255,0.08);
            padding: 20px;
            border: 1px solid rgba(155, 77, 255, 0.3);
            position: relative;
        }
        .game-container::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 34px;
            background: linear-gradient(135deg, #9B4DFF, #6C2BD9, #9B4DFF);
            z-index: -1;
            opacity: 0.5;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .brand {
            font-family: 'Montserrat', sans-serif;
            font-size: 26px;
            font-weight: 800;
            font-style: italic;
            background: linear-gradient(135deg, #ffffff, #c9a0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .brand span {
            color: #9B4DFF;
            -webkit-text-fill-color: #9B4DFF;
        }
        .balance-box {
            background: rgba(108, 43, 217, 0.25);
            border: 1px solid rgba(155, 77, 255, 0.4);
            border-radius: 50px;
            padding: 6px 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 0 20px rgba(155, 77, 255, 0.2);
        }
        .balance-label {
            font-size: 10px;
            font-weight: 800;
            color: #a77bff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .balance-value {
            font-family: 'Montserrat', sans-serif;
            font-size: 18px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 10px rgba(155, 77, 255, 0.5);
        }
        .slot-wrapper {
            position: relative;
            margin: 12px 0;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: inset 0 0 60px rgba(108, 43, 217, 0.3), 0 12px 40px rgba(0,0,0,0.7);
            border: 2px solid rgba(155, 77, 255, 0.2);
        }
        #reelsCanvas {
            width: 100%;
            display: block;
            background: rgba(0,0,0,0.6);
            aspect-ratio: 5 / 3;
            image-rendering: auto;
        }
        .status-bar {
            text-align: center;
            padding: 8px 0;
            font-size: 14px;
            font-weight: 800;
            color: #a77bff;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(108, 43, 217, 0.15);
            border-radius: 12px;
            margin: 8px 0 12px;
            border: 1px solid rgba(155, 77, 255, 0.1);
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        .status-bar.win {
            color: #b3ff9b;
            text-shadow: 0 0 20px rgba(179, 255, 155, 0.5);
            border-color: #b3ff9b;
        }
        .status-bar.lose {
            color: #ff6b8a;
            text-shadow: 0 0 20px rgba(255, 107, 138, 0.5);
            border-color: #ff6b8a;
        }
        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
        }
        .bet-input-wrap {
            flex: 1;
            position: relative;
        }
        .bet-input-wrap::before {
            content: '₽';
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #a77bff;
            font-weight: 800;
            font-size: 18px;
        }
        .bet-input {
            width: 100%;
            height: 50px;
            background: rgba(0,0,0,0.5);
            border: 2px solid rgba(155, 77, 255, 0.3);
            border-radius: 14px;
            padding: 0 16px 0 40px;
            color: #fff;
            font-weight: 800;
            font-size: 18px;
            font-family: 'Nunito', sans-serif;
            transition: all 0.2s;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.5);
        }
        .bet-input:focus {
            outline: none;
            border-color: #9B4DFF;
            box-shadow: 0 0 20px rgba(155, 77, 255, 0.3);
        }
        .btn {
            border: none;
            border-radius: 14px;
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            color: #fff;
            cursor: pointer;
            transition: all 0.1s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            height: 50px;
            padding: 0 20px;
            box-shadow: 0 6px 0 rgba(0,0,0,0.3);
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.3);
        }
        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }
        .btn-spin {
            background: linear-gradient(135deg, #9B4DFF, #6C2BD9);
            min-width: 110px;
            font-size: 18px;
            box-shadow: 0 6px 0 #4a1a8a, 0 8px 20px rgba(155, 77, 255, 0.4);
        }
        .btn-spin:hover:not(:disabled) {
            filter: brightness(1.1);
        }
        .btn-auto {
            background: rgba(155, 77, 255, 0.15);
            border: 2px solid rgba(155, 77, 255, 0.3);
            min-width: 70px;
            font-size: 14px;
            color: #a77bff;
        }
        .btn-auto.active {
            background: rgba(255, 107, 138, 0.2);
            border-color: #ff6b8a;
            color: #ff6b8a;
        }
        .footer {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }
        .btn-menu {
            flex: 1;
            background: rgba(155, 77, 255, 0.2);
            border: 1px solid rgba(155, 77, 255, 0.3);
            height: 44px;
            font-size: 14px;
            color: #a77bff;
            box-shadow: none;
        }
        .btn-menu:active {
            background: rgba(155, 77, 255, 0.4);
        }
        .btn-exit {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            height: 44px;
            font-size: 14px;
            color: #8c8c8c;
            box-shadow: none;
        }
        .btn-exit:active {
            background: rgba(255, 255, 255, 0.1);
        }
        .history {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding: 6px 0;
            margin-bottom: 6px;
            scrollbar-width: none;
        }
        .history::-webkit-scrollbar {
            display: none;
        }
        .history-item {
            font-size: 12px;
            font-weight: 800;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(155, 77, 255, 0.15);
            border: 1px solid rgba(155, 77, 255, 0.2);
            color: #a77bff;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .history-item.win {
            color: #b3ff9b;
            border-color: #b3ff9b;
        }
        .history-item.lose {
            color: #ff6b8a;
            border-color: #ff6b8a;
        }
        @media (max-width: 480px) {
            .brand { font-size: 20px; }
            .balance-value { font-size: 16px; }
            .bet-input { font-size: 16px; height: 44px; }
            .btn { height: 44px; padding: 0 14px; font-size: 14px; }
            .btn-spin { min-width: 90px; font-size: 16px; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="header">
        <div class="brand">R-<span>GAME</span></div>
        <div class="balance-box">
            <span class="balance-label">Баланс</span>
            <span class="balance-value" id="balanceDisplay">0₽</span>
        </div>
    </div>

    <div class="slot-wrapper">
        <canvas id="reelsCanvas" width="500" height="300"></canvas>
    </div>

    <div class="status-bar" id="statusMsg">⚡ Нажмите SPIN</div>

    <div class="history" id="historyList"></div>

    <div class="controls">
        <div class="bet-input-wrap">
            <input type="number" id="betInput" class="bet-input" min="10" max="50000" step="10" value="100">
        </div>
        <button class="btn btn-spin" id="spinBtn">SPIN</button>
        <button class="btn btn-auto" id="autoBtn">АВТО</button>
    </div>

    <div class="footer">
        <button class="btn btn-menu" id="menuBtn">В МЕНЮ</button>
        <button class="btn btn-exit" id="exitBtn">ВЫЙТИ</button>
    </div>
</div>

<script>
    // ==================== TELEGRAM ====================
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    if (tg.HapticFeedback) tg.enableClosingConfirmation();

    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('userId') || tg.initDataUnsafe?.user?.id || '';

    // ==================== БАЛАНС ====================
    let casinoBalance = parseInt(localStorage.getItem('casinoBalance')) || 10000;
    const balanceSpan = document.getElementById('balanceDisplay');
    balanceSpan.innerText = casinoBalance.toLocaleString() + '₽';

    function updateBalance(amount) {
        casinoBalance += amount;
        localStorage.setItem('casinoBalance', String(casinoBalance));
        balanceSpan.innerText = casinoBalance.toLocaleString() + '₽';
    }

    // ==================== СИМВОЛЫ ====================
    const SYMBOLS = [
        '777/IMG_0400.PNG', // 7
        '777/IMG_0401.PNG', // сливы
        '777/IMG_0402.PNG', // яблоко
        '777/IMG_0403.PNG', // арбуз
        '777/IMG_0404.PNG', // виноград
        '777/IMG_0405.PNG', // апельсин
        '777/IMG_0406.PNG', // лимон
        '777/IMG_0407.PNG', // вишни
        '777/IMG_0409.PNG', // колокольчик
        '777/IMG_0410.PNG'  // BAR
    ];

    // Названия для отображения (опционально)
    const SYM_NAMES = ['7', 'Сливы', 'Яблоко', 'Арбуз', 'Виноград', 'Апельсин', 'Лимон', 'Вишни', 'Колокольчик', 'BAR'];

    // Множители [3,4,5]
    const PAYTABLE = {
        0: [20, 50, 100], // 7
        1: [8, 18, 40],   // сливы
        2: [6, 14, 30],   // яблоко
        3: [15, 30, 60],  // арбуз
        4: [10, 25, 50],  // виноград
        5: [5, 12, 25],   // апельсин
        6: [4, 10, 20],   // лимон
        7: [3, 8, 15],    // вишни
        8: [7, 16, 35],   // колокольчик
        9: [5, 12, 25]    // BAR
    };

    // ==================== DOM ====================
    const canvas = document.getElementById('reelsCanvas');
    const ctx = canvas.getContext('2d');
    const spinBtn = document.getElementById('spinBtn');
    const autoBtn = document.getElementById('autoBtn');
    const betInput = document.getElementById('betInput');
    const statusMsg = document.getElementById('statusMsg');
    const historyList = document.getElementById('historyList');
    const menuBtn = document.getElementById('menuBtn');
    const exitBtn = document.getElementById('exitBtn');

    // ==================== СОСТОЯНИЕ ====================
    let isSpinning = false;
    let autoSpin = false;
    let autoSpinCount = 0;
    let bet = 100;
    let currentGrid = []; // 5x3 массив (индексы символов)

    // Анимация вращения
    let spinAnimationId = null;
    let spinProgress = 0;
    let spinDuration = 1500; // мс
    let spinStartTime = 0;
    let targetGrid = []; // индексы, к которым придём

    // История (последние 10 результатов)
    let history = [];

    // ==================== ЗВУКИ (Web Audio) ====================
    let audioCtx = null;
    function initAudio() {
        if (!audioCtx && window.AudioContext) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.addEventListener('click', () => audioCtx?.resume(), { once: true });
            document.addEventListener('touchstart', () => audioCtx?.resume(), { once: true });
        }
    }
    function playTone(freq, dur, vol = 0.08, type = 'sine') {
        if (!audioCtx) return;
        try {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + dur);
        } catch(e) {}
    }
    function soundClick() { playTone(600, 0.05, 0.05); }
    function soundTick() { playTone(800, 0.03, 0.03, 'triangle'); }
    function soundWin() {
        playTone(523, 0.1, 0.1);
        setTimeout(() => playTone(659, 0.1, 0.1), 100);
        setTimeout(() => playTone(783, 0.2, 0.1), 200);
    }
    function soundLose() { playTone(200, 0.3, 0.1, 'sawtooth'); }

    // ==================== ВИБРАЦИЯ ====================
    function vibrate(style = 'light') {
        if (tg.HapticFeedback) {
            if (style === 'light') tg.HapticFeedback.impactOccurred('light');
            else if (style === 'medium') tg.HapticFeedback.impactOccurred('medium');
            else if (style === 'success') tg.HapticFeedback.notificationOccurred('success');
            else if (style === 'error') tg.HapticFeedback.notificationOccurred('error');
        }
    }

    // ==================== ОТРИСОВКА ====================
    function drawGrid(grid, progress = 0) {
        const w = canvas.width;
        const h = canvas.height;
        ctx.clearRect(0, 0, w, h);
        // Рисуем фон с сеткой (неоновые линии)
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(0, 0, w, h);

        // Вертикальные разделители
        ctx.strokeStyle = 'rgba(155, 77, 255, 0.15)';
        ctx.lineWidth = 2;
        for (let col = 0; col <= 5; col++) {
            ctx.beginPath();
            ctx.moveTo(col * w/5, 0);
            ctx.lineTo(col * w/5, h);
            ctx.stroke();
        }
        // Горизонтальные
        for (let row = 0; row <= 3; row++) {
            ctx.beginPath();
            ctx.moveTo(0, row * h/3);
            ctx.lineTo(w, row * h/3);
            ctx.stroke();
        }

        // Отрисовка символов
        const cellW = w / 5;
        const cellH = h / 3;
        const imgSize = Math.min(cellW, cellH) * 0.85;

        for (let col = 0; col < 5; col++) {
            for (let row = 0; row < 3; row++) {
                let idx;
                if (progress < 1 && grid.length > 0) {
                    // Во время анимации – интерполяция (можно просто показывать текущие)
                    idx = grid[row][col];
                } else {
                    idx = grid[row][col];
                }
                const x = col * cellW + (cellW - imgSize)/2;
                const y = row * cellH + (cellH - imgSize)/2;

                const img = new Image();
                img.src = SYMBOLS[idx];
                if (img.complete && img.naturalWidth) {
                    ctx.drawImage(img, x, y, imgSize, imgSize);
                } else {
                    img.onload = () => ctx.drawImage(img, x, y, imgSize, imgSize);
                    img.onerror = () => {
                        ctx.fillStyle = 'rgba(255,255,255,0.05)';
                        ctx.fillRect(x, y, imgSize, imgSize);
                    };
                }
            }
        }

        // Неоновое свечение рамки (поверх)
        ctx.shadowBlur = 20;
        ctx.shadowColor = '#9B4DFF';
        ctx.strokeStyle = 'rgba(155, 77, 255, 0.2)';
        ctx.lineWidth = 2;
        ctx.strokeRect(0, 0, w, h);
        ctx.shadowBlur = 0;
    }

    // ==================== ГЕНЕРАЦИЯ СЛУЧАЙНОЙ СЕТКИ ====================
    function randomGrid() {
        const grid = [];
        for (let row = 0; row < 3; row++) {
            const r = [];
            for (let col = 0; col < 5; col++) {
                r.push(Math.floor(Math.random() * SYMBOLS.length));
            }
            grid.push(r);
        }
        return grid;
    }

    // ==================== ПРОВЕРКА ВЫИГРЫША ====================
    function checkWin(grid) {
        let totalWin = 0;
        let winLines = [];

        // Проверяем 3 горизонтальные линии
        for (let row = 0; row < 3; row++) {
            const line = grid[row];
            // Проверяем комбинации длины 3, 4, 5 (подряд)
            for (let start = 0; start <= 2; start++) {
                const sym = line[start];
                let count = 1;
                for (let i = start+1; i < 5; i++) {
                    if (line[i] === sym) count++;
                    else break;
                }
                if (count >= 3) {
                    const mult = PAYTABLE[sym][count-3];
                    if (mult) {
                        totalWin += bet * mult;
                        winLines.push({ row, start, count, sym, mult });
                    }
                }
            }
        }
        // Можно добавить диагонали, но пока оставим так.
        return { totalWin, winLines };
    }

    // ==================== ОБНОВЛЕНИЕ ИСТОРИИ ====================
    function addHistory(win, amount) {
        history.unshift({ win, amount });
        if (history.length > 10) history.pop();
        renderHistory();
    }

    function renderHistory() {
        historyList.innerHTML = '';
        history.forEach(h => {
            const el = document.createElement('div');
            el.className = 'history-item' + (h.win ? ' win' : ' lose');
            el.textContent = h.win ? `+${h.amount}₽` : '—';
            historyList.appendChild(el);
        });
    }

    // ==================== СПИН ====================
    function spin() {
        if (isSpinning) return;
        initAudio();

        let amount = parseInt(betInput.value);
        if (isNaN(amount) || amount < 10) amount = 10;
        if (amount > 50000) amount = 50000;
        bet = amount;
        betInput.value = bet;

        if (casinoBalance < bet) {
            statusMsg.textContent = '❌ Недостаточно средств!';
            statusMsg.className = 'status-bar lose';
            vibrate('error');
            return;
        }

        // Списываем ставку
        updateBalance(-bet);

        isSpinning = true;
        spinBtn.disabled = true;
        autoBtn.disabled = true;
        betInput.disabled = true;

        statusMsg.textContent = '🎰 Вращение...';
        statusMsg.className = 'status-bar';

        // Генерируем целевую сетку
        targetGrid = randomGrid();
        // Стартуем с текущей сетки (или с пустой)
        if (currentGrid.length === 0) {
            currentGrid = randomGrid();
        }
        // Анимация вращения
        spinStartTime = performance.now();
        spinProgress = 0;

        if (spinAnimationId) cancelAnimationFrame(spinAnimationId);
        animateSpin();

        // Звук начала
        soundClick();
        vibrate('medium');
    }

    function animateSpin() {
        const now = performance.now();
        const elapsed = now - spinStartTime;
        spinProgress = Math.min(elapsed / spinDuration, 1);
        // Easing
        const eased = 1 - Math.pow(1 - spinProgress, 3);

        // Интерполяция: показываем случайные символы
        if (eased < 1) {
            // Показываем случайную сетку для эффекта мелькания
            const tempGrid = randomGrid();
            drawGrid(tempGrid, eased);
            if (Math.random() < 0.1) soundTick();
            spinAnimationId = requestAnimationFrame(animateSpin);
        } else {
            // Останавливаем на целевой сетке
            currentGrid = targetGrid;
            drawGrid(currentGrid, 1);
            // Проверяем выигрыш
            const result = checkWin(currentGrid);
            const winAmount = result.totalWin;

            if (winAmount > 0) {
                updateBalance(winAmount);
                statusMsg.textContent = `🎉 ВЫИГРЫШ: +${winAmount}₽`;
                statusMsg.className = 'status-bar win';
                soundWin();
                vibrate('success');
                addHistory(true, winAmount);
            } else {
                statusMsg.textContent = '❌ ПРОИГРЫШ';
                statusMsg.className = 'status-bar lose';
                soundLose();
                vibrate('error');
                addHistory(false, 0);
            }

            isSpinning = false;
            spinBtn.disabled = false;
            autoBtn.disabled = false;
            betInput.disabled = false;

            // Автоспин
            if (autoSpin) {
                autoSpinCount--;
                if (autoSpinCount > 0 && casinoBalance >= bet) {
                    setTimeout(() => spin(), 600);
                } else {
                    autoSpin = false;
                    autoBtn.textContent = 'АВТО';
                    autoBtn.classList.remove('active');
                }
            }
        }
    }

    // ==================== АВТОСПИН ====================
    function toggleAuto() {
        if (isSpinning) return;
        if (autoSpin) {
            autoSpin = false;
            autoBtn.textContent = 'АВТО';
            autoBtn.classList.remove('active');
            return;
        }
        // Запрашиваем количество
        const count = prompt('Введите количество авто-спинов (1-50):', '10');
        if (count === null) return;
        const num = parseInt(count);
        if (isNaN(num) || num < 1 || num > 50) {
            alert('Введите число от 1 до 50');
            return;
        }
        autoSpin = true;
        autoSpinCount = num;
        autoBtn.textContent = `АВТО ${num}`;
        autoBtn.classList.add('active');
        // Запускаем первый спин
        spin();
    }

    // ==================== КНОПКИ ====================
    spinBtn.addEventListener('click', () => { if (!isSpinning) spin(); });
    autoBtn.addEventListener('click', toggleAuto);

    menuBtn.addEventListener('click', () => {

    function updateProfileStats(result, bet, win) {
        let games = parseInt(localStorage.getItem('profile_games_played')) || 0;
        let wins = parseInt(localStorage.getItem('profile_wins')) || 0;
        let losses = parseInt(localStorage.getItem('profile_losses')) || 0;
        let total_bet = parseInt(localStorage.getItem('profile_total_bet')) || 0;
        let total_win = parseInt(localStorage.getItem('profile_total_win')) || 0;

        games++;
        total_bet += bet;
        if (result === 'win') {
            wins++;
            total_win += win;
        } else {
            losses++;
        }
        localStorage.setItem('profile_games_played', String(games));
        localStorage.setItem('profile_wins', String(wins));
        localStorage.setItem('profile_losses', String(losses));
        localStorage.setItem('profile_total_bet', String(total_bet));
        localStorage.setItem('profile_total_win', String(total_win));
    }
