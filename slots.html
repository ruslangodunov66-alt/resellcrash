<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>СЛОТЫ | R-Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 20%, #0a0e1a, #020408);
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .game-container { width: 100%; max-width: 450px; }
        .game-card {
            background: linear-gradient(145deg, rgba(20,28,40,0.95), rgba(10,15,25,0.98));
            backdrop-filter: blur(8px);
            border-radius: 50px;
            padding: 30px 20px;
            text-align: center;
            border: 2px solid rgba(0,255,255,0.4);
        }
        h2 {
            font-size: 32px;
            background: linear-gradient(135deg, #ffcc44, #ff6644);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 20px;
        }
        .reels {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
        }
        .reel {
            width: 80px;
            height: 80px;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            border: 2px solid rgba(0,255,255,0.3);
        }
        .bet-info { font-size: 18px; margin: 15px 0; color: #ddd; }
        .bet-info span { color: #ffcc44; font-size: 24px; }
        button {
            border: none;
            padding: 15px 25px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            width: 80%;
            margin: 10px auto;
        }
        button:active { transform: scale(0.96); }
        .btn-spin { background: linear-gradient(135deg, #9b59b6, #8e44ad); }
        .btn-repeat { background: linear-gradient(135deg, #f39c12, #e67e22); }
        .status {
            margin-top: 20px;
            padding: 10px;
            background: rgba(0,0,0,0.5);
            border-radius: 30px;
            font-size: 14px;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-card">
        <h2>🎰 СЛОТЫ</h2>
        <div class="bet-info">💰 СТАВКА: <span id="betDisplay">0</span> ₽</div>
        <div class="reels">
            <div class="reel" id="reel1">🍒</div>
            <div class="reel" id="reel2">🍒</div>
            <div class="reel" id="reel3">🍒</div>
        </div>
        <button id="spinBtn" class="btn-spin">🎰 КРУТИТЬ</button>
        <button id="repeatBtn" class="btn-repeat hidden">🔄 ИГРАТЬ СНОВА</button>
        <div class="status" id="status">💎 Загрузка...</div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    
    const symbols = ["🍒", "🍋", "🍊", "🍉", "🔔", "💎", "7️⃣", "🎰"];
    const multipliers = { "7️⃣": 20, "💎": 15, "🎰": 10 };
    
    const urlParams = new URLSearchParams(window.location.search);
    let currentBet = parseInt(urlParams.get('bet')) || 0;
    
    const betDisplay = document.getElementById('betDisplay');
    const reel1 = document.getElementById('reel1');
    const reel2 = document.getElementById('reel2');
    const reel3 = document.getElementById('reel3');
    const spinBtn = document.getElementById('spinBtn');
    const repeatBtn = document.getElementById('repeatBtn');
    const statusDiv = document.getElementById('status');
    
    betDisplay.innerText = currentBet;
    
    function spin() {
        spinBtn.disabled = true;
        const results = [
            symbols[Math.floor(Math.random() * symbols.length)],
            symbols[Math.floor(Math.random() * symbols.length)],
            symbols[Math.floor(Math.random() * symbols.length)]
        ];
        
        reel1.innerText = results[0];
        reel2.innerText = results[1];
        reel3.innerText = results[2];
        
        let win = 0;
        if (results[0] === results[1] && results[1] === results[2]) {
            win = currentBet * (multipliers[results[0]] || 5);
        } else if (results[0] === results[1] || results[1] === results[2] || results[0] === results[2]) {
            win = currentBet * 2;
        }
        
        setTimeout(() => {
            if (win > 0) {
                statusDiv.innerHTML = `🎉 ВЫИГРЫШ! +${win}₽`;
                tg.sendData(JSON.stringify({ action: 'win', game: 'slots', win: win, bet: currentBet }));
                spinBtn.classList.add('hidden');
                repeatBtn.classList.remove('hidden');
            } else {
                statusDiv.innerHTML = `❌ ПРОИГРЫШ! -${currentBet}₽`;
                spinBtn.classList.add('hidden');
                repeatBtn.classList.remove('hidden');
            }
            spinBtn.disabled = false;
        }, 200);
    }
    
    spinBtn.onclick = () => {
        tg.sendData(JSON.stringify({ action: 'spin', game: 'slots', bet: currentBet }));
        spin();
    };
    
    repeatBtn.onclick = () => {
        spinBtn.classList.remove('hidden');
        repeatBtn.classList.add('hidden');
        statusDiv.innerHTML = '🎰 ГОТОВ К ИГРЕ!';
        tg.sendData(JSON.stringify({ action: 'repeat', game: 'slots', bet: currentBet }));
    };
    
    if (currentBet === 0) {
        statusDiv.innerHTML = '❌ Введите ставку в боте';
    } else {
        statusDiv.innerHTML = '🎰 НАЖМИТЕ КРУТИТЬ';
    }
</script>
</body>
</html>
