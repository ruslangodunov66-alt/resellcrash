<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>СЛОТЫ | R-Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 20%, #0a0e1a, #010101);
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .game-container { width: 100%; max-width: 480px; }
        .game-card {
            background: linear-gradient(145deg, rgba(20,28,40,0.95), rgba(10,15,25,0.98));
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 30px 20px;
            text-align: center;
            border: 1px solid rgba(0,255,255,0.5);
            box-shadow: 0 0 20px rgba(0,255,255,0.2);
        }
        h2 { font-size: 36px; background: linear-gradient(135deg, #ffcc44, #ff6644); background-clip: text; -webkit-background-clip: text; color: transparent; margin-bottom: 20px; }
        .reels { display: flex; justify-content: center; gap: 20px; margin: 30px 0; }
        .reel { width: 90px; height: 90px; background: rgba(0,0,0,0.6); border-radius: 25px; display: flex; align-items: center; justify-content: center; font-size: 54px; border: 2px solid rgba(0,255,255,0.5); box-shadow: 0 0 10px cyan; }
        .bet-input { margin: 20px 0; display: flex; justify-content: center; gap: 10px; align-items: center; }
        .bet-input input { padding: 12px 20px; font-size: 20px; width: 160px; background: rgba(0,0,0,0.7); border: 2px solid #ffaa44; color: #ffcc44; border-radius: 50px; text-align: center; font-weight: bold; }
        button { border: none; padding: 15px 25px; font-size: 20px; font-weight: bold; border-radius: 50px; cursor: pointer; width: 80%; margin: 10px auto; transition: 0.1s; }
        .btn-spin { background: linear-gradient(135deg, #9b59b6, #8e44ad); box-shadow: 0 0 10px #9b59b6; color: white; }
        .btn-repeat { background: linear-gradient(135deg, #f39c12, #e67e22); color: white; }
        .status { margin-top: 25px; padding: 12px; background: rgba(0,0,0,0.6); border-radius: 40px; font-size: 16px; font-weight: bold; color: #ffdd99; }
        .hidden { display: none; }
        button:active { transform: scale(0.96); }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-card">
        <h2>🎰 СЛОТЫ</h2>
        <div class="bet-input">
            <input type="number" id="betInput" min="100" max="100000" step="100" value="1000">
        </div>
        <div class="reels">
            <div class="reel" id="reel1">🍒</div>
            <div class="reel" id="reel2">🍒</div>
            <div class="reel" id="reel3">🍒</div>
        </div>
        <button id="spinBtn" class="btn-spin">🎰 КРУТИТЬ</button>
        <button id="repeatBtn" class="btn-repeat hidden">🔄 ИГРАТЬ СНОВА</button>
        <div class="status" id="status">💎 Введите ставку и нажмите КРУТИТЬ</div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    
    const symbols = ["🍒","🍋","🍊","🍉","🔔","💎","7️⃣","🎰"];
    const multipliers = {"7️⃣":20,"💎":15,"🎰":10};
    let currentBet = 1000;
    
    const betInput = document.getElementById('betInput');
    const reel1 = document.getElementById('reel1');
    const reel2 = document.getElementById('reel2');
    const reel3 = document.getElementById('reel3');
    const spinBtn = document.getElementById('spinBtn');
    const repeatBtn = document.getElementById('repeatBtn');
    const statusDiv = document.getElementById('status');
    
    betInput.addEventListener('change', () => {
        let v = parseInt(betInput.value);
        if (isNaN(v) || v < 100) v = 100;
        if (v > 100000) v = 100000;
        currentBet = v;
        betInput.value = currentBet;
        statusDiv.innerHTML = `🎰 Ставка: ${currentBet}₽. Нажми КРУТИТЬ`;
    });
    
    function spin() {
        if (currentBet < 100) {
            statusDiv.innerHTML = '❌ Минимальная ставка 100₽';
            return;
        }
        spinBtn.disabled = true;
        const results = [
            symbols[Math.floor(Math.random() * symbols.length)],
            symbols[Math.floor(Math.random() * symbols.length)],
            symbols[Math.floor(Math.random() * symbols.length)]
        ];
        reel1.innerText = results[0];
        reel2.innerText = results[1];
        reel3.innerText = results[2];
        
        let win = 0;
        if (results[0] === results[1] && results[1] === results[2]) {
            win = currentBet * (multipliers[results[0]] || 5);
        } else if (results[0] === results[1] || results[1] === results[2] || results[0] === results[2]) {
            win = currentBet * 2;
        }
        
        setTimeout(() => {
            if (win > 0) {
                statusDiv.innerHTML = `🎉 ВЫИГРЫШ! +${win}₽`;
                tg.sendData(JSON.stringify({ action: 'win', game: 'slots', win: win, bet: currentBet }));
                spinBtn.classList.add('hidden');
                repeatBtn.classList.remove('hidden');
            } else {
                statusDiv.innerHTML = `❌ ПРОИГРЫШ! -${currentBet}₽`;
                tg.sendData(JSON.stringify({ action: 'lose', game: 'slots', bet: currentBet }));
                spinBtn.classList.add('hidden');
                repeatBtn.classList.remove('hidden');
            }
            spinBtn.disabled = false;
        }, 300);
    }
    
    spinBtn.onclick = spin;
    repeatBtn.onclick = () => {
        spinBtn.classList.remove('hidden');
        repeatBtn.classList.add('hidden');
        statusDiv.innerHTML = `🎰 ГОТОВ К ИГРЕ! Ставка ${currentBet}₽`;
    };
    
    statusDiv.innerHTML = `🎰 Ставка ${currentBet}₽. Крути!`;
</script>
</body>
</html>
