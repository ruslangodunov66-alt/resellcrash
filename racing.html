<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Гонки | Resell Tycoon</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; font-family: 'Segoe UI', system-ui, sans-serif; }
        body {
            background: radial-gradient(circle at 30% 10%, #0c1120, #020408);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }
        .race-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 1000px;
        }
        canvas {
            width: 100%;
            height: auto;
            background: #1a2a2f;
            border-radius: 32px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            cursor: none;
            touch-action: none;
        }
        .info-panel {
            display: flex;
            justify-content: space-between;
            margin-top: 16px;
            gap: 12px;
            flex-wrap: wrap;
            width: 100%;
        }
        .info-card {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 6px 16px;
            text-align: center;
            flex: 1;
            color: white;
            font-weight: bold;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            width: 100%;
            flex-wrap: wrap;
        }
        .ctrl-btn {
            background: rgba(30,40,60,0.9);
            border: 2px solid #ffaa44;
            border-radius: 60px;
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            cursor: pointer;
            transition: 0.05s linear;
            touch-action: manipulation;
        }
        .ctrl-btn:active { transform: scale(0.92); background: #ffaa44; color: black; }
        @media (max-width: 600px) {
            .ctrl-btn { width: 60px; height: 60px; font-size: 28px; }
        }
        .lobby {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            width: 100%;
        }
        .lobby input, .lobby button {
            padding: 10px 20px;
            border-radius: 40px;
            border: none;
            background: #1e2a3a;
            color: white;
            font-weight: bold;
        }
        .lobby button { background: #2ecc71; cursor: pointer; }
        .status { text-align: center; margin-top: 12px; color: #ffcc88; font-size: 14px; }
        .back-btn { background: #555; width: 100%; margin-top: 20px; border: none; padding: 12px; border-radius: 40px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div class="race-wrapper">
    <div class="lobby" id="lobby">
        <input type="text" id="raceIdInput" placeholder="ID гонки">
        <button id="joinBtn">🔗 ПРИСОЕДИНИТЬСЯ</button>
        <button id="createBtn">🏁 СОЗДАТЬ НОВУЮ</button>
    </div>
    <canvas id="raceCanvas"></canvas>
    <div class="info-panel" id="infoPanel" style="display: none;">
        <div class="info-card">🏁 КРУГ: <span id="laps">0</span> / 3</div>
        <div class="info-card">🏎️ СКОРОСТЬ: <span id="speed">0</span> km/h</div>
        <div class="info-card">🥇 ЛИДЕР: <span id="leader">—</span></div>
    </div>
    <div class="controls" id="controls" style="display: none;">
        <div class="ctrl-btn" id="btnLeft">⬅️</div>
        <div class="ctrl-btn" id="btnUp">⬆️</div>
        <div class="ctrl-btn" id="btnDown">⬇️</div>
        <div class="ctrl-btn" id="btnRight">➡️</div>
    </div>
    <div class="status" id="status">⚡ Введите ID гонки или создайте новую</div>
    <button class="back-btn" id="exitBtn">🔙 Выход</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    tg.enableClosingConfirmation();

    // НАСТРОЙКИ
    const API_BASE = "https://nl12.bothost.ru";
    const USE_REAL_API = false;
    const userId = tg.initDataUnsafe?.user?.id || 1475910449;
    let raceId = null;

    // DOM элементы
    const lobbyDiv = document.getElementById('lobby');
    const canvas = document.getElementById('raceCanvas');
    const ctx = canvas.getContext('2d');
    const infoPanel = document.getElementById('infoPanel');
    const controlsDiv = document.getElementById('controls');
    const statusDiv = document.getElementById('status');

    // Параметры трассы (абсолютные, потом масштабируются)
    const trackPointsRaw = [
        {x: 300, y: 200}, {x: 500, y: 200}, {x: 650, y: 300}, {x: 650, y: 450},
        {x: 500, y: 550}, {x: 300, y: 550}, {x: 150, y: 450}, {x: 150, y: 300}
    ];
    let trackPoints = [];
    let trackSegments = [];
    let worldBounds = { minX: 0, minY: 0, maxX: 800, maxY: 600 };
    let canvasWidth = 800, canvasHeight = 600;
    let scale = 1, offsetX = 0, offsetY = 0;

    // Машины
    let playerCar = { x: 400, y: 500, angle: -90, speed: 0, lap: 0, checkpoint: 0, finished: false };
    let opponentCar = { x: 400, y: 480, angle: -90, speed: 0, lap: 0, checkpoint: 0, finished: false };
    let throttle = 0, steering = 0;

    // Управление
    const keyState = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };

    // Инициализация трассы
    function initTrack() {
        trackPoints = trackPointsRaw.map(p => ({x: p.x, y: p.y}));
        trackSegments = [];
        for (let i = 0; i < trackPoints.length; i++) {
            const p1 = trackPoints[i];
            const p2 = trackPoints[(i+1)%trackPoints.length];
            trackSegments.push({p1, p2});
        }
        // границы мира
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        trackPoints.forEach(p => {
            if (p.x < minX) minX = p.x;
            if (p.y < minY) minY = p.y;
            if (p.x > maxX) maxX = p.x;
            if (p.y > maxY) maxY = p.y;
        });
        worldBounds = { minX, minY, maxX, maxY };
        resizeCanvas();
    }

    // Адаптивный размер холста
    function resizeCanvas() {
        const container = canvas.parentElement;
        const maxWidth = Math.min(800, window.innerWidth - 40);
        canvasWidth = maxWidth;
        canvasHeight = maxWidth * 0.75;
        canvas.width = canvasWidth;
        canvas.height = canvasHeight;
        scale = canvasWidth / 800;
        offsetX = 0;
        offsetY = 0;
        // пересчитываем точки трассы под новый масштаб
        trackPoints = trackPointsRaw.map(p => ({x: p.x * scale, y: p.y * scale}));
        trackSegments = [];
        for (let i = 0; i < trackPoints.length; i++) {
            const p1 = trackPoints[i];
            const p2 = trackPoints[(i+1)%trackPoints.length];
            trackSegments.push({p1, p2});
        }
    }
    window.addEventListener('resize', () => { resizeCanvas(); });

    // Физика удержания на трассе
    function clampToTrack(car) {
        let minDist = 1000;
        let closest = {x: car.x, y: car.y};
        for (let seg of trackSegments) {
            const p1 = seg.p1, p2 = seg.p2;
            const dx = p2.x - p1.x;
            const dy = p2.y - p1.y;
            const len = Math.hypot(dx, dy);
            if (len === 0) continue;
            const t = ((car.x - p1.x)*dx + (car.y - p1.y)*dy) / (len*len);
            const tClamped = Math.max(0, Math.min(1, t));
            const projX = p1.x + tClamped * dx;
            const projY = p1.y + tClamped * dy;
            const dist = Math.hypot(car.x - projX, car.y - projY);
            if (dist < minDist) {
                minDist = dist;
                closest = {x: projX, y: projY};
            }
        }
        if (minDist > 20) {
            car.x = closest.x;
            car.y = closest.y;
        }
    }

    // Обновление круга и контрольных точек
    function updateLap(car, isPlayer) {
        let cpIndex = -1;
        let minDist = 30;
        for (let i = 0; i < trackPoints.length; i++) {
            const p = trackPoints[i];
            const dist = Math.hypot(car.x - p.x, car.y - p.y);
            if (dist < minDist) {
                minDist = dist;
                cpIndex = i;
            }
        }
        if (cpIndex !== -1 && cpIndex !== car.checkpoint) {
            if (cpIndex === 0 && car.checkpoint === trackPoints.length-1) {
                car.lap++;
                if (car.lap >= 3) car.finished = true;
                if (isPlayer && car.lap === 3) tg.showAlert("🏆 ВЫ ЗАКОНЧИЛИ ГОНКУ!");
            }
            car.checkpoint = cpIndex;
        }
    }

    // Физика автомобиля
    function updateCar(car, throttleVal, steerVal, dt) {
        if (car.finished) return;
        const maxSpeed = 350;
        const acceleration = throttleVal * 350;
        const brake = throttleVal < 0 ? 200 : 0;
        car.speed += (acceleration - brake) * dt;
        car.speed *= (1 - dt * 0.3);
        car.speed = Math.min(maxSpeed, Math.max(-maxSpeed*0.6, car.speed));
        if (Math.abs(car.speed) < 0.5 && throttleVal === 0) car.speed = 0;
        const turnSpeed = (Math.abs(car.speed) / maxSpeed) * 180 * dt;
        car.angle += steerVal * turnSpeed;
        car.angle = (car.angle + 360) % 360;
        const rad = car.angle * Math.PI / 180;
        car.x += Math.cos(rad) * car.speed * dt;
        car.y += Math.sin(rad) * car.speed * dt;
        clampToTrack(car);
    }

    // Управление с клавиатуры
    function updateFromKeys() {
        let thr = 0;
        if (keyState.ArrowUp) thr = 1;
        if (keyState.ArrowDown) thr = -0.7;
        throttle = thr;
        let str = 0;
        if (keyState.ArrowLeft) str = -1;
        if (keyState.ArrowRight) str = 1;
        steering = str;
    }

    // Отрисовка машины (красивая)
    function drawCar(car, color, name) {
        ctx.save();
        ctx.translate(car.x, car.y);
        ctx.rotate(car.angle * Math.PI / 180);
        // кузов
        ctx.beginPath();
        ctx.rect(-18, -10, 36, 20);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 2;
        ctx.stroke();
        // окна
        ctx.fillStyle = "#aaddff";
        ctx.fillRect(-10, -6, 20, 12);
        // колёса
        ctx.fillStyle = "#111";
        ctx.fillRect(-22, -12, 8, 6);
        ctx.fillRect(14, -12, 8, 6);
        ctx.fillRect(-22, 6, 8, 6);
        ctx.fillRect(14, 6, 8, 6);
        // фары
        ctx.fillStyle = "#ffcc44";
        ctx.fillRect(16, -4, 4, 4);
        ctx.fillStyle = "#ff6644";
        ctx.fillRect(-20, -4, 4, 4);
        // имя
        ctx.fillStyle = "white";
        ctx.font = "bold 12px sans-serif";
        ctx.fillText(name, -12, -14);
        ctx.restore();
    }

    // Отрисовка трассы
    function drawTrack() {
        ctx.beginPath();
        for (let i = 0; i < trackPoints.length; i++) {
            const p = trackPoints[i];
            if (i === 0) ctx.moveTo(p.x, p.y);
            else ctx.lineTo(p.x, p.y);
        }
        ctx.closePath();
        ctx.strokeStyle = "#ffaa44";
        ctx.lineWidth = 8;
        ctx.stroke();
        ctx.fillStyle = "rgba(0,0,0,0.3)";
        ctx.fill();
        for (let i = 0; i < trackPoints.length; i++) {
            ctx.beginPath();
            ctx.arc(trackPoints[i].x, trackPoints[i].y, 6, 0, Math.PI*2);
            ctx.fillStyle = i === playerCar.checkpoint ? "#2ecc71" : "#888";
            ctx.fill();
        }
    }

    function updateUI() {
        document.getElementById('laps').innerText = `${playerCar.lap}/3`;
        document.getElementById('speed').innerText = Math.floor(Math.abs(playerCar.speed));
        let leaderText = "Вы";
        if (opponentCar.lap > playerCar.lap) leaderText = "Соперник";
        else if (opponentCar.lap === playerCar.lap && opponentCar.checkpoint > playerCar.checkpoint) leaderText = "Соперник";
        document.getElementById('leader').innerText = leaderText;
    }

    let lastTimestamp = 0;
    let animationId = null;
    function gameLoop(now) {
        let dt = Math.min(0.033, (now - lastTimestamp) / 1000);
        if (dt <= 0) { lastTimestamp = now; animationId = requestAnimationFrame(gameLoop); return; }
        updateFromKeys();
        updateCar(playerCar, throttle, steering, dt);
        updateLap(playerCar, true);
        // ИИ соперника (простой)
        if (!USE_REAL_API) {
            let aiThrottle = 0.8;
            let aiSteer = 0;
            // простой AI: поворачивает в сторону следующей точки трассы
            const nextIdx = (playerCar.checkpoint + 1) % trackPoints.length;
            const target = trackPoints[nextIdx];
            const dx = target.x - opponentCar.x;
            const dy = target.y - opponentCar.y;
            const angleToTarget = Math.atan2(dy, dx) * 180 / Math.PI;
            let angleDiff = angleToTarget - opponentCar.angle;
            if (angleDiff > 180) angleDiff -= 360;
            if (angleDiff < -180) angleDiff += 360;
            aiSteer = Math.min(1, Math.max(-1, angleDiff / 45));
            updateCar(opponentCar, aiThrottle, aiSteer, dt);
            updateLap(opponentCar, false);
        }
        // Рендер
        ctx.clearRect(0, 0, canvasWidth, canvasHeight);
        drawTrack();
        drawCar(opponentCar, "#e74c3c", "СОПЕРНИК");
        drawCar(playerCar, "#2ecc71", "ВЫ");
        updateUI();
        lastTimestamp = now;
        animationId = requestAnimationFrame(gameLoop);
    }

    function startRace() {
        lobbyDiv.style.display = 'none';
        infoPanel.style.display = 'flex';
        controlsDiv.style.display = 'flex';
        statusDiv.innerText = "🏎️ ГОНКА НАЧАЛАСЬ! Управляй стрелками или кнопками";
        playerCar = { x: 400*scale, y: 500*scale, angle: -90, speed: 0, lap: 0, checkpoint: 0, finished: false };
        opponentCar = { x: 400*scale, y: 480*scale, angle: -90, speed: 0, lap: 0, checkpoint: 0, finished: false };
        resizeCanvas(); // чтобы пересчитать точки под текущий масштаб
        lastTimestamp = performance.now();
        if (animationId) cancelAnimationFrame(animationId);
        animationId = requestAnimationFrame(gameLoop);
        attachTouchControls();
    }

    function attachTouchControls() {
        const btnUp = document.getElementById('btnUp');
        const btnDown = document.getElementById('btnDown');
        const btnLeft = document.getElementById('btnLeft');
        const btnRight = document.getElementById('btnRight');
        const setKey = (key, val) => { keyState[key] = val; };
        btnUp.addEventListener('touchstart', (e) => { e.preventDefault(); setKey('ArrowUp', true); });
        btnUp.addEventListener('touchend', () => setKey('ArrowUp', false));
        btnDown.addEventListener('touchstart', (e) => { e.preventDefault(); setKey('ArrowDown', true); });
        btnDown.addEventListener('touchend', () => setKey('ArrowDown', false));
        btnLeft.addEventListener('touchstart', (e) => { e.preventDefault(); setKey('ArrowLeft', true); });
        btnLeft.addEventListener('touchend', () => setKey('ArrowLeft', false));
        btnRight.addEventListener('touchstart', (e) => { e.preventDefault(); setKey('ArrowRight', true); });
        btnRight.addEventListener('touchend', () => setKey('ArrowRight', false));
        // мышь
        btnUp.onmousedown = () => setKey('ArrowUp', true);
        btnUp.onmouseup = () => setKey('ArrowUp', false);
        btnDown.onmousedown = () => setKey('ArrowDown', true);
        btnDown.onmouseup = () => setKey('ArrowDown', false);
        btnLeft.onmousedown = () => setKey('ArrowLeft', true);
        btnLeft.onmouseup = () => setKey('ArrowLeft', false);
        btnRight.onmousedown = () => setKey('ArrowRight', true);
        btnRight.onmouseup = () => setKey('ArrowRight', false);
    }

    async function createRace() {
        if (!USE_REAL_API) {
            raceId = "demo_" + Date.now();
            statusDiv.innerText = `✅ (ДЕМО) Гонка создана! ID: ${raceId}`;
            startRace();
            return;
        }
        // Здесь будет вызов API
        startRace(); // временно для демо
    }
    async function joinRace() {
        const inputId = document.getElementById('raceIdInput').value.trim();
        if (!inputId) { tg.showAlert("Введите ID гонки"); return; }
        if (!USE_REAL_API) {
            raceId = inputId;
            statusDiv.innerText = `✅ (ДЕМО) Присоединились к гонке ${raceId}`;
            startRace();
            return;
        }
        startRace(); // временно
    }

    document.getElementById('createBtn').onclick = createRace;
    document.getElementById('joinBtn').onclick = joinRace;
    document.getElementById('exitBtn').onclick = () => window.location.href = 'index.html';

    // Инициализация
    initTrack();
    resizeCanvas();
    window.addEventListener('resize', () => resizeCanvas());
</script>
</body>
</html>
