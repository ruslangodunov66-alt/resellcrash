<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Гонки | Resell Tycoon</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', system-ui; }
        #mode-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            gap: 30px;
        }
        .mode-btn {
            background: linear-gradient(145deg, #2a3a55, #101826);
            border: 2px solid #ffaa44;
            border-radius: 60px;
            padding: 16px 40px;
            font-size: 24px;
            font-weight: bold;
            color: #ffdd99;
            cursor: pointer;
            transition: 0.2s;
            width: 280px;
            text-align: center;
        }
        .mode-btn:hover { transform: scale(1.05); background: #ffaa44; color: #0a0f1a; }
        #info, #score, #km {
            position: absolute;
            top: 20px;
            background: rgba(0,0,0,0.7);
            padding: 8px 18px;
            border-radius: 30px;
            color: white;
            z-index: 10;
            backdrop-filter: blur(4px);
            font-weight: bold;
        }
        #info { left: 20px; }
        #score { right: 20px; color: #ffaa44; }
        #km { left: 20px; top: 80px; background: rgba(0,0,0,0.5); font-size: 14px; }
        #controls {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 40px;
            z-index: 20;
        }
        .ctrl-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(30,40,60,0.9);
            backdrop-filter: blur(8px);
            border: 2px solid #ffaa44;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            cursor: pointer;
            transition: 0.05s linear;
            user-select: none;
        }
        .ctrl-btn:active { transform: scale(0.92); background: #ffaa44; color: black; }
        @media (max-width: 600px) { .ctrl-btn { width: 70px; height: 70px; font-size: 36px; } }
        #status {
            position: absolute;
            bottom: 120px;
            left: 0;
            right: 0;
            text-align: center;
            color: #ffdd99;
            background: rgba(0,0,0,0.6);
            padding: 10px;
            border-radius: 30px;
            width: 80%;
            margin: 0 auto;
            font-weight: bold;
            backdrop-filter: blur(4px);
        }
        .back-btn {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: #555;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            z-index: 20;
            font-weight: bold;
        }
        #music-toggle {
            position: absolute;
            top: 20px;
            left: 120px;
            width: 48px;
            height: 48px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            z-index: 30;
            border: 1px solid #ffaa44;
        }
        #music-toggle:hover { background: #ffaa44; color: black; }
        #music-panel {
            position: absolute;
            top: 80px;
            left: 20px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 30;
            border: 1px solid #ffaa44;
            width: 240px;
        }
        #music-panel.hidden { display: none; }
        #music-panel input, #music-panel button {
            background: #2a3a55;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 8px 12px;
            cursor: pointer;
        }
        #music-panel button:hover { background: #ffaa44; color: black; }
        #volumeSlider { width: 100%; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="mode-menu">
        <div class="mode-btn" id="singleplayer-btn">🚗 ОДИНОЧНАЯ (ИИ)</div>
        <div class="mode-btn" id="multiplayer-btn">🌐 МНОГОПОЛЬЗОВАТЕЛЬСКАЯ</div>
    </div>
    <div id="info" class="hidden">🏎️ 3D RACE</div>
    <div id="score" class="hidden">🏆 0</div>
    <div id="km" class="hidden">📏 0.0 км</div>
    <div id="controls" class="hidden">
        <div class="ctrl-btn" id="btnLeft">◀</div>
        <div class="ctrl-btn" id="btnRight">▶</div>
    </div>
    <div id="status" class="hidden">⚡ Игра загружается...</div>
    <button class="back-btn hidden" id="exitBtn">🔙 Выход</button>
    
    <div id="music-toggle" class="hidden">🎵</div>
    <div id="music-panel" class="hidden">
        <input type="file" id="musicFileInput" accept="audio/*">
        <input type="text" id="musicUrlInput" placeholder="Ссылка на MP3">
        <div style="display: flex; gap: 8px;">
            <button id="playMusicBtn">▶️</button>
            <button id="stopMusicBtn">⏹️</button>
        </div>
        <input type="range" id="volumeSlider" min="0" max="100" value="50">
        <span style="font-size: 11px; text-align: center;">Громкость</span>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // ---------- ОБЩИЕ ПАРАМЕТРЫ ----------
        let gameActive = false;
        let score = 0;
        let currentMode = null;
        let socket = null;
        let raceId = null;
        let userId = tg.initDataUnsafe?.user?.id || Math.floor(Math.random() * 100000);
        
        const modeMenu = document.getElementById('mode-menu');
        const infoDiv = document.getElementById('info');
        const scoreDiv = document.getElementById('score');
        const kmDiv = document.getElementById('km');
        const controlsDiv = document.getElementById('controls');
        const statusDiv = document.getElementById('status');
        const exitBtn = document.getElementById('exitBtn');
        const musicToggle = document.getElementById('music-toggle');
        const musicPanel = document.getElementById('music-panel');

        // ---------- ЗВУКИ ----------
        let audioCtx = null;
        let engineOsc = null;
        let engineGain = null;
        let engineRunning = false;
        
        function initAudio() {
            if (!audioCtx && window.AudioContext) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const unlock = () => {
                    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                    document.body.removeEventListener('touchstart', unlock);
                    document.body.removeEventListener('click', unlock);
                };
                document.body.addEventListener('touchstart', unlock);
                document.body.addEventListener('click', unlock);
            }
        }
        
        function startEngineSound() {
            if (!audioCtx) return;
            if (engineOsc) {
                engineOsc.stop();
                engineOsc.disconnect();
            }
            engineOsc = audioCtx.createOscillator();
            engineGain = audioCtx.createGain();
            engineOsc.connect(engineGain);
            engineGain.connect(audioCtx.destination);
            engineOsc.type = 'sine';
            engineOsc.frequency.value = 70;
            engineGain.gain.value = 0.1;
            engineOsc.start();
            engineRunning = true;
        }
        
        function updateEngineSound(speedVal) {
            if (!engineRunning || !engineOsc) return;
            const freq = 70 + Math.min(100, speedVal * 6);
            engineOsc.frequency.value = freq;
            engineGain.gain.value = 0.08 + Math.min(0.12, speedVal * 0.01);
        }
        
        function stopEngineSound() {
            if (engineOsc) {
                engineOsc.stop();
                engineOsc = null;
                engineGain = null;
            }
            engineRunning = false;
        }
        
        function playBeep(frequency, duration, volume = 0.15) {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = frequency;
            gain.gain.setValueAtTime(volume, now);
            gain.gain.exponentialRampToValueAtTime(0.00001, now + duration);
            osc.start();
            osc.stop(now + duration);
        }
        function playCrashSound() { playBeep(90, 0.6, 0.25); }
        function playPointSound() { playBeep(1100, 0.1, 0.12); }

        // ---------- МУЗЫКА ----------
        let backgroundMusic = null;
        let musicPlaying = false;
        let hidePanelTimeout = null;
        
        function showMusicPanel() {
            musicPanel.classList.remove('hidden');
            if (hidePanelTimeout) clearTimeout(hidePanelTimeout);
            hidePanelTimeout = setTimeout(() => musicPanel.classList.add('hidden'), 5000);
        }
        musicToggle.addEventListener('click', () => {
            if (musicPanel.classList.contains('hidden')) showMusicPanel();
            else musicPanel.classList.add('hidden');
        });
        
        function startBackgroundMusic() {
            if (backgroundMusic) return;
            backgroundMusic = new Audio('MACAN_-_Veselyashhijj_gaz_64741091.mp3');
            backgroundMusic.loop = true;
            backgroundMusic.volume = document.getElementById('volumeSlider').value / 100;
            backgroundMusic.play().catch(e => console.log("Автозапуск заблокирован"));
            musicPlaying = true;
            document.getElementById('playMusicBtn').textContent = '⏸️';
        }
        
        function loadMusicFromFile(file) {
            if (backgroundMusic) backgroundMusic.pause();
            const url = URL.createObjectURL(file);
            backgroundMusic = new Audio(url);
            backgroundMusic.loop = true;
            backgroundMusic.volume = document.getElementById('volumeSlider').value / 100;
            backgroundMusic.play();
            musicPlaying = true;
            document.getElementById('playMusicBtn').textContent = '⏸️';
        }
        
        function loadMusicFromUrl(url) {
            if (backgroundMusic) backgroundMusic.pause();
            backgroundMusic = new Audio(url);
            backgroundMusic.loop = true;
            backgroundMusic.volume = document.getElementById('volumeSlider').value / 100;
            backgroundMusic.play();
            musicPlaying = true;
            document.getElementById('playMusicBtn').textContent = '⏸️';
        }
        
        function toggleMusic() {
            if (!backgroundMusic) {
                const url = document.getElementById('musicUrlInput').value;
                if (url) loadMusicFromUrl(url);
                else alert("Выберите файл или вставьте ссылку");
                return;
            }
            if (musicPlaying) {
                backgroundMusic.pause();
                musicPlaying = false;
                document.getElementById('playMusicBtn').textContent = '▶️';
            } else {
                backgroundMusic.play();
                musicPlaying = true;
                document.getElementById('playMusicBtn').textContent = '⏸️';
            }
        }
        
        function stopMusic() {
            if (backgroundMusic) {
                backgroundMusic.pause();
                backgroundMusic.currentTime = 0;
                musicPlaying = false;
                document.getElementById('playMusicBtn').textContent = '▶️';
            }
        }

        // ----- 3D СЦЕНА -----
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.002);
        
        // Камера
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.3, 1000);
        camera.position.set(0, 4.2, -6.5);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);
        
        // Солнце
        const sunLight = new THREE.DirectionalLight(0xffeedd, 1.2);
        sunLight.position.set(15, 20, 5);
        sunLight.castShadow = true;
        scene.add(sunLight);
        
        const ambient = new THREE.AmbientLight(0x404060);
        scene.add(ambient);
        const fillLight = new THREE.PointLight(0x88aaff, 0.5);
        fillLight.position.set(-2, 5, 4);
        scene.add(fillLight);
        
        // ---- Облака ----
        const cloudMat = new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.85 });
        const clouds = [];
        const cloudPositions = [
            [-30, 22, -40], [-15, 24, -35], [0, 23, -50], [20, 25, -45], [35, 21, -55],
            [-40, 26, -20], [-10, 27, -60], [15, 20, -70], [40, 24, -30]
        ];
        cloudPositions.forEach(pos => {
            const group = new THREE.Group();
            [0.8, 1.1, 0.9, 0.7].forEach(size => {
                const part = new THREE.Mesh(new THREE.SphereGeometry(size, 7, 7), cloudMat);
                part.position.set((Math.random() - 0.5) * 1.5, (Math.random() - 0.5) * 0.7, (Math.random() - 0.5) * 1.2);
                group.add(part);
            });
            group.position.set(pos[0], pos[1], pos[2]);
            scene.add(group);
            clouds.push(group);
        });
        
        // ---- Дорога (основа) ----
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x2c3e50, roughness: 0.6 });
        const road = new THREE.Mesh(new THREE.PlaneGeometry(6, 200), roadMat);
        road.rotation.x = -Math.PI / 2;
        road.position.y = -0.5;
        road.receiveShadow = true;
        scene.add(road);
        
        const edgeMat = new THREE.MeshStandardMaterial({ color: 0x556677 });
        const leftEdge = new THREE.Mesh(new THREE.PlaneGeometry(1.2, 200), edgeMat);
        leftEdge.rotation.x = -Math.PI / 2;
        leftEdge.position.set(-3.5, -0.5, 0);
        scene.add(leftEdge);
        const rightEdge = new THREE.Mesh(new THREE.PlaneGeometry(1.2, 200), edgeMat);
        rightEdge.rotation.x = -Math.PI / 2;
        rightEdge.position.set(3.5, -0.5, 0);
        scene.add(rightEdge);
        
        // ---- Динамические объекты ----
        let roadLines = [];
        let curbs = [];
        let trees = [];
        let trafficSigns = [];
        let buildings = []; // дома, заправки
        
        function createRoadLine(z) {
            const lineMat = new THREE.MeshStandardMaterial({ color: 0xffdd99 });
            const line = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.1, 1.5), lineMat);
            line.position.set(0, -0.4, z);
            line.castShadow = false;
            scene.add(line);
            return line;
        }
        
        function createCurb(z) {
            const curbMat = new THREE.MeshStandardMaterial({ color: 0xaa8866 });
            const left = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.2, 1.8), curbMat);
            left.position.set(-2.9, -0.3, z);
            left.castShadow = true;
            scene.add(left);
            const right = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.2, 1.8), curbMat);
            right.position.set(2.9, -0.3, z);
            right.castShadow = true;
            scene.add(right);
            return [left, right];
        }
        
        function createTree(z, side) {
            const group = new THREE.Group();
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B });
            const leavesMat = new THREE.MeshStandardMaterial({ color: 0x5A9E4E });
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 1.2, 6), trunkMat);
            trunk.position.y = 0.6;
            group.add(trunk);
            const leaves = new THREE.Mesh(new THREE.ConeGeometry(0.7, 1.0, 8), leavesMat);
            leaves.position.y = 1.2;
            group.add(leaves);
            group.position.set(side * 4.5, -0.5, z);
            group.castShadow = true;
            scene.add(group);
            return group;
        }
        
        function createTrafficSign(z, side) {
            const group = new THREE.Group();
            const poleMat = new THREE.MeshStandardMaterial({ color: 0x888888 });
            const signMat = new THREE.MeshStandardMaterial({ color: 0xff6644 });
            const pole = new THREE.Mesh(new THREE.BoxGeometry(0.2, 1.2, 0.2), poleMat);
            pole.position.y = 0.6;
            group.add(pole);
            const sign = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.05), signMat);
            sign.position.y = 1.2;
            group.add(sign);
            group.position.set(side * 3.8, -0.2, z);
            group.castShadow = true;
            scene.add(group);
            return group;
        }
        
        function createHouse(z, side, type = 'house') {
            const group = new THREE.Group();
            if (type === 'house') {
                const wallMat = new THREE.MeshStandardMaterial({ color: 0xc9b6a0 });
                const roofMat = new THREE.MeshStandardMaterial({ color: 0xaa6644 });
                const base = new THREE.Mesh(new THREE.BoxGeometry(2.0, 1.8, 2.0), wallMat);
                base.position.y = 0.9;
                base.castShadow = true;
                group.add(base);
                const roof = new THREE.Mesh(new THREE.ConeGeometry(1.3, 1.2, 4), roofMat);
                roof.position.y = 1.8;
                roof.castShadow = true;
                group.add(roof);
                // дверь
                const door = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.0, 0.1), new THREE.MeshStandardMaterial({ color: 0x8B5A2B }));
                door.position.set(0, 0.5, 1.01);
                group.add(door);
                // окна
                const windowMat = new THREE.MeshStandardMaterial({ color: 0x88aaff });
                const win = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.1), windowMat);
                win.position.set(-0.7, 1.2, 1.01);
                group.add(win);
                const win2 = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.1), windowMat);
                win2.position.set(0.7, 1.2, 1.01);
                group.add(win2);
            } else if (type === 'gas') {
                // Заправка
                const baseMat = new THREE.MeshStandardMaterial({ color: 0xaa8866 });
                const roofMat = new THREE.MeshStandardMaterial({ color: 0xccaa77 });
                const base = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.6, 2.2), baseMat);
                base.position.y = 0.3;
                group.add(base);
                const canopy = new THREE.Mesh(new THREE.BoxGeometry(3.0, 0.2, 3.0), roofMat);
                canopy.position.y = 1.2;
                group.add(canopy);
                // колонка
                const pump = new THREE.Mesh(new THREE.BoxGeometry(0.5, 1.0, 0.5), new THREE.MeshStandardMaterial({ color: 0xdd6644 }));
                pump.position.set(1.0, 0.5, 0.8);
                group.add(pump);
                // знак R-Game
                const canvas = document.createElement('canvas');
                canvas.width = 256;
                canvas.height = 128;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#ffaa44';
                ctx.font = 'Bold 36px "Segoe UI"';
                ctx.fillText('R-GAME', 60, 60);
                const texture = new THREE.CanvasTexture(canvas);
                const signBoard = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.6, 0.05), new THREE.MeshStandardMaterial({ map: texture }));
                signBoard.position.set(0, 1.4, -1.2);
                group.add(signBoard);
            }
            group.position.set(side * 5.2, -0.5, z);
            group.castShadow = true;
            scene.add(group);
            return group;
        }
        
        // Инициализация объектов в диапазоне от -60 до 60
        for (let z = -58; z <= 60; z += 3) {
            roadLines.push(createRoadLine(z));
        }
        for (let z = -60; z <= 60; z += 2.5) {
            curbs.push(...createCurb(z));
        }
        // Деревья (постоянно, каждые 5 метров)
        for (let z = -55; z <= 60; z += 5) {
            trees.push(createTree(z, -1));
            trees.push(createTree(z, 1));
        }
        // Дорожные знаки (каждые 12 метров)
        for (let z = -50; z <= 60; z += 12) {
            trafficSigns.push(createTrafficSign(z, -1));
            trafficSigns.push(createTrafficSign(z, 1));
        }
        // Разнообразные здания: дома и заправки
        let buildingTypes = ['house', 'house', 'gas', 'house']; // чередуем
        let idx = 0;
        for (let z = -45; z <= 60; z += 14) {
            const type = buildingTypes[idx % buildingTypes.length];
            buildings.push(createHouse(z, -1, type));
            buildings.push(createHouse(z, 1, type));
            idx++;
        }
        
        // ---- МАШИНА ИГРОКА (реалистичная) ----
        const playerCar = new THREE.Group();
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff6600, metalness: 0.85, roughness: 0.25 });
        const carBody = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.4, 1.9), bodyMat);
        carBody.castShadow = true;
        playerCar.add(carBody);
        // стёкла
        const glassMat = new THREE.MeshStandardMaterial({ color: 0x88aaff, metalness: 0.9 });
        const frontGlass = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.25, 0.3), glassMat);
        frontGlass.position.set(0, 0.25, 0.85);
        playerCar.add(frontGlass);
        const backGlass = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.25, 0.3), glassMat);
        backGlass.position.set(0, 0.25, -0.85);
        playerCar.add(backGlass);
        // фары
        const lightMat = new THREE.MeshStandardMaterial({ color: 0xffaa66, emissive: 0xff4400 });
        const leftLight = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), lightMat);
        leftLight.position.set(-0.45, 0.15, 0.98);
        playerCar.add(leftLight);
        const rightLight = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), lightMat);
        rightLight.position.set(0.45, 0.15, 0.98);
        playerCar.add(rightLight);
        // колёса
        const wheelGeo = new THREE.CylinderGeometry(0.28, 0.28, 0.12, 24);
        const tireMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
        const rimMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, metalness: 0.95 });
        const wheelPos = [[-0.7, -0.18, 0.75], [0.7, -0.18, 0.75], [-0.7, -0.18, -0.75], [0.7, -0.18, -0.75]];
        wheelPos.forEach(pos => {
            const tire = new THREE.Mesh(wheelGeo, tireMat);
            tire.rotation.z = Math.PI / 2;
            tire.position.set(pos[0], pos[1], pos[2]);
            tire.castShadow = true;
            playerCar.add(tire);
            const rim = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.13, 8), rimMat);
            rim.rotation.z = Math.PI / 2;
            rim.position.set(pos[0], pos[1], pos[2]);
            playerCar.add(rim);
        });
        scene.add(playerCar);
        playerCar.position.y = 0;
        playerCar.position.z = 0;
        
        // ---- Препятствия ----
        let obstacles = [];
        let opponents = new Map();
        
        let targetX = 0;
        let currentX = 0;
        let baseSpeed = 13;
        let currentSpeed = baseSpeed;
        
        function moveLeft() { targetX = Math.max(-2.5, targetX - 0.9); }
        function moveRight() { targetX = Math.min(2.5, targetX + 0.9); }
        
        function spawnObstacle() {
            const r = Math.random();
            let mesh;
            if (r < 0.35) {
                const holeGeo = new THREE.CylinderGeometry(0.55, 0.55, 0.05, 16);
                const holeMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e });
                mesh = new THREE.Mesh(holeGeo, holeMat);
                mesh.rotation.x = Math.PI / 2;
                mesh.position.y = -0.48;
            } else if (r < 0.7) {
                const coneGeo = new THREE.ConeGeometry(0.42, 0.85, 8);
                const coneMat = new THREE.MeshStandardMaterial({ color: 0xff8844 });
                mesh = new THREE.Mesh(coneGeo, coneMat);
                mesh.position.y = 0;
            } else {
                const barrelGeo = new THREE.CylinderGeometry(0.42, 0.42, 0.75, 10);
                const barrelMat = new THREE.MeshStandardMaterial({ color: 0xaa5533 });
                mesh = new THREE.Mesh(barrelGeo, barrelMat);
                mesh.position.y = 0;
            }
            const xPos = (Math.random() - 0.5) * 4.2;
            mesh.position.set(xPos, 0, 35);
            mesh.castShadow = true;
            scene.add(mesh);
            obstacles.push({ mesh, x: xPos, z: 35 });
        }
        
        function updateObstacles(deltaTime) {
            const moveZ = -currentSpeed * deltaTime;
            for (let i = 0; i < obstacles.length; i++) {
                const obs = obstacles[i];
                obs.z += moveZ;
                obs.mesh.position.z = obs.z;
                if (obs.z < -10) {
                    scene.remove(obs.mesh);
                    obstacles.splice(i, 1);
                    i--;
                    score++;
                    scoreDiv.innerText = `🏆 ${score}`;
                    // обновляем километры (1 км = 10 очков)
                    kmDiv.innerText = `📏 ${(score / 10).toFixed(1)} км`;
                    playPointSound();
                    currentSpeed = baseSpeed + Math.floor(score / 8) * 1.2;
                } else {
                    if (Math.abs(currentX - obs.x) < 0.7 && Math.abs(obs.z - 1.8) < 1.0) {
                        gameActive = false;
                        statusDiv.innerHTML = '💥 КРАШ! Игра окончена. Нажмите "Выход".';
                        playCrashSound();
                        stopEngineSound();
                        if (window.obstacleInterval) clearInterval(window.obstacleInterval);
                        if (currentMode === 'multi' && socket && socket.readyState === WebSocket.OPEN) {
                            socket.send(JSON.stringify({ type: 'crash', raceId, userId, score }));
                        }
                    }
                }
            }
        }
        
        function updateDynamicObjects(deltaTime) {
            const moveZ = -currentSpeed * deltaTime;
            roadLines.forEach(line => {
                line.position.z += moveZ;
                if (line.position.z < -60) line.position.z = 60;
            });
            curbs.forEach(curb => {
                curb.position.z += moveZ;
                if (curb.position.z < -60) curb.position.z = 60;
            });
            trees.forEach(tree => {
                tree.position.z += moveZ;
                if (tree.position.z < -60) tree.position.z = 60;
            });
            trafficSigns.forEach(sign => {
                sign.position.z += moveZ;
                if (sign.position.z < -60) sign.position.z = 60;
            });
            buildings.forEach(building => {
                building.position.z += moveZ;
                if (building.position.z < -60) building.position.z = 60;
            });
            clouds.forEach(cloud => {
                cloud.position.z += moveZ * 0.4;
                if (cloud.position.z < -70) cloud.position.z = 60;
            });
        }
        
        function clearObstacles() {
            for (let obs of obstacles) scene.remove(obs.mesh);
            obstacles = [];
        }
        
        function startRace() {
            gameActive = true;
            score = 0;
            currentSpeed = baseSpeed;
            scoreDiv.innerText = `🏆 0`;
            kmDiv.innerText = `📏 0.0 км`;
            clearObstacles();
            currentX = 0;
            targetX = 0;
            playerCar.position.x = 0;
            statusDiv.innerHTML = currentMode === 'single' ? '🚗 ОДИНОЧНАЯ! Уклоняйтесь!' : '🌐 МНОГОПОЛЬЗОВАТЕЛЬСКАЯ!';
            initAudio();
            startEngineSound();
            if (window.obstacleInterval) clearInterval(window.obstacleInterval);
            window.obstacleInterval = setInterval(() => {
                if (gameActive && Math.random() < 0.45) spawnObstacle();
            }, 680);
        }
        
        // ---- Режимы ----
        function initSingleMode() {
            currentMode = 'single';
            modeMenu.classList.add('hidden');
            infoDiv.classList.remove('hidden');
            scoreDiv.classList.remove('hidden');
            kmDiv.classList.remove('hidden');
            controlsDiv.classList.remove('hidden');
            statusDiv.classList.remove('hidden');
            exitBtn.classList.remove('hidden');
            musicToggle.classList.remove('hidden');
            startRace();
            startBackgroundMusic();
        }
        
        function initMultiMode() {
            currentMode = 'multi';
            modeMenu.classList.add('hidden');
            infoDiv.classList.remove('hidden');
            scoreDiv.classList.remove('hidden');
            kmDiv.classList.remove('hidden');
            controlsDiv.classList.remove('hidden');
            statusDiv.classList.remove('hidden');
            exitBtn.classList.remove('hidden');
            musicToggle.classList.remove('hidden');
            statusDiv.innerHTML = '🔄 Подключение к серверу...';
            const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${wsProtocol}//${window.location.host}/ws/race`;
            socket = new WebSocket(wsUrl);
            socket.onopen = () => {
                statusDiv.innerHTML = '✅ Подключено. Поиск игроков...';
                socket.send(JSON.stringify({ type: 'join', userId }));
            };
            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'race_start') {
                    raceId = data.raceId;
                    startRace();
                    startBackgroundMusic();
                } else if (data.type === 'opponents') {
                    for (let [id, opp] of opponents) {
                        if (!data.players.find(p => p.id == id)) {
                            scene.remove(opp.mesh);
                            opponents.delete(id);
                        }
                    }
                    for (let p of data.players) {
                        if (p.id == userId) continue;
                        let opp = opponents.get(p.id);
                        if (!opp) {
                            const carGroup = new THREE.Group();
                            const body2 = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.4, 1.8), new THREE.MeshStandardMaterial({ color: 0xdd6644 }));
                            body2.castShadow = true;
                            carGroup.add(body2);
                            const wheelGeo2 = new THREE.CylinderGeometry(0.26, 0.26, 0.1, 16);
                            const wheelMat2 = new THREE.MeshStandardMaterial({ color: 0x111111 });
                            const wPos = [[-0.65, -0.18, 0.7], [0.65, -0.18, 0.7], [-0.65, -0.18, -0.7], [0.65, -0.18, -0.7]];
                            wPos.forEach(pos => {
                                const wheel = new THREE.Mesh(wheelGeo2, wheelMat2);
                                wheel.rotation.z = Math.PI / 2;
                                wheel.position.set(pos[0], pos[1], pos[2]);
                                carGroup.add(wheel);
                            });
                            scene.add(carGroup);
                            opp = { mesh: carGroup, x: 0 };
                            opponents.set(p.id, opp);
                        }
                        opp.x = p.x;
                        opp.mesh.position.x = p.x;
                        opp.mesh.position.z = 1.8;
                    }
                } else if (data.type === 'race_end') {
                    gameActive = false;
                    stopEngineSound();
                    statusDiv.innerHTML = `🏁 ГОНКА ЗАВЕРШЕНА! Счёт: ${score}`;
                    if (window.obstacleInterval) clearInterval(window.obstacleInterval);
                }
            };
            socket.onerror = () => {
                statusDiv.innerHTML = '❌ Ошибка WebSocket. Переход в одиночный режим...';
                setTimeout(() => {
                    if (socket) socket.close();
                    initSingleMode();
                }, 2000);
            };
            setInterval(() => {
                if (socket && socket.readyState === WebSocket.OPEN && gameActive && currentMode === 'multi') {
                    socket.send(JSON.stringify({ type: 'move', userId, x: currentX, raceId, score }));
                }
            }, 50);
        }
        
        // Привязка кнопок
        document.getElementById('singleplayer-btn').addEventListener('click', initSingleMode);
        document.getElementById('multiplayer-btn').addEventListener('click', initMultiMode);
        document.getElementById('btnLeft').addEventListener('click', moveLeft);
        document.getElementById('btnRight').addEventListener('click', moveRight);
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') moveLeft();
            if (e.key === 'ArrowRight') moveRight();
        });
        exitBtn.addEventListener('click', () => {
            if (window.obstacleInterval) clearInterval(window.obstacleInterval);
            if (socket && socket.readyState === WebSocket.OPEN) socket.close();
            stopEngineSound();
            if (backgroundMusic) backgroundMusic.pause();
            window.location.href = 'index.html';
        });
        
        // Музыкальные элементы
        document.getElementById('musicFileInput').addEventListener('change', (e) => {
            if (e.target.files.length > 0) loadMusicFromFile(e.target.files[0]);
        });
        document.getElementById('playMusicBtn').addEventListener('click', toggleMusic);
        document.getElementById('stopMusicBtn').addEventListener('click', stopMusic);
        document.getElementById('volumeSlider').addEventListener('input', (e) => {
            if (backgroundMusic) backgroundMusic.volume = e.target.value / 100;
        });
        
        // Анимация
        let lastTime = performance.now();
        function animate() {
            const now = performance.now();
            let dt = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            if (gameActive) {
                currentX += (targetX - currentX) * 0.25;
                playerCar.position.x = currentX;
                camera.position.x += (currentX * 0.8 - camera.position.x) * 0.1;
                camera.lookAt(playerCar.position.x, 0.5, playerCar.position.z + 10);
                updateObstacles(dt);
                updateDynamicObjects(dt);
                updateEngineSound(currentSpeed);
            }
            // Вращение солнца
            const time = Date.now() * 0.0003;
            sunLight.position.x = 15 + Math.sin(time) * 3;
            sunLight.position.y = 20 + Math.cos(time * 0.7) * 2;
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
