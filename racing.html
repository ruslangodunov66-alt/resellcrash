<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Гонки | Resell Tycoon</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui;
        }
        /* Меню выбора режима */
        #mode-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            gap: 30px;
        }
        .mode-btn {
            background: linear-gradient(145deg, #2a3a55, #101826);
            border: 2px solid #ffaa44;
            border-radius: 60px;
            padding: 16px 40px;
            font-size: 24px;
            font-weight: bold;
            color: #ffdd99;
            cursor: pointer;
            transition: 0.2s;
            width: 260px;
            text-align: center;
        }
        .mode-btn:hover {
            transform: scale(1.05);
            background: #ffaa44;
            color: #0a0f1a;
            border-color: white;
        }
        #info, #score {
            position: absolute;
            top: 20px;
            background: rgba(0,0,0,0.6);
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            z-index: 10;
            pointer-events: none;
            backdrop-filter: blur(4px);
        }
        #info { left: 20px; }
        #score { right: 20px; color: #ffaa44; font-weight: bold; }
        #controls {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 40px;
            z-index: 20;
            pointer-events: none;
        }
        .ctrl-btn {
            pointer-events: auto;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(30,40,60,0.9);
            backdrop-filter: blur(8px);
            border: 2px solid #ffaa44;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            cursor: pointer;
            transition: 0.05s linear;
            touch-action: manipulation;
        }
        .ctrl-btn:active { transform: scale(0.92); background: #ffaa44; color: black; }
        @media (max-width: 600px) {
            .ctrl-btn { width: 60px; height: 60px; font-size: 30px; }
        }
        #status {
            position: absolute;
            bottom: 120px;
            left: 0;
            right: 0;
            text-align: center;
            color: #ffdd99;
            background: rgba(0,0,0,0.5);
            padding: 8px;
            border-radius: 20px;
            width: 80%;
            margin: 0 auto;
            font-weight: bold;
            pointer-events: none;
        }
        .back-btn {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: #555;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            z-index: 20;
            font-weight: bold;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="mode-menu">
        <div class="mode-btn" id="singleplayer-btn">🚗 ОДИНОЧНАЯ (ИИ)</div>
        <div class="mode-btn" id="multiplayer-btn">🌐 МНОГОПОЛЬЗОВАТЕЛЬСКАЯ</div>
    </div>

    <div id="info" class="hidden">🏎️ 3D RACE</div>
    <div id="score" class="hidden">🏆 0</div>
    <div id="controls" class="hidden">
        <div class="ctrl-btn" id="btnLeft">◀</div>
        <div class="ctrl-btn" id="btnRight">▶</div>
    </div>
    <div id="status" class="hidden">⚡ Игра загружается...</div>
    <button class="back-btn hidden" id="exitBtn">🔙 Выход</button>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // ---------- ОБЩИЕ ПАРАМЕТРЫ ----------
        let gameActive = false;
        let score = 0;
        let currentMode = null; // 'single' или 'multi'
        let socket = null;
        let raceId = null;
        let userId = tg.initDataUnsafe?.user?.id || Math.floor(Math.random() * 100000);
        
        // Элементы DOM
        const modeMenu = document.getElementById('mode-menu');
        const infoDiv = document.getElementById('info');
        const scoreDiv = document.getElementById('score');
        const controlsDiv = document.getElementById('controls');
        const statusDiv = document.getElementById('status');
        const exitBtn = document.getElementById('exitBtn');

        // ----- ТРЁХМЕРНАЯ СЦЕНА (общая для обоих режимов) -----
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a1030);
        scene.fog = new THREE.FogExp2(0x0a1030, 0.008);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 4, 8);
        camera.lookAt(0, 0, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Освещение
        const ambient = new THREE.AmbientLight(0x404060);
        scene.add(ambient);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        scene.add(dirLight);
        const fillLight = new THREE.PointLight(0x4488ff, 0.5);
        fillLight.position.set(-2, 3, 4);
        scene.add(fillLight);

        // Дорога
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x2c3e50, roughness: 0.7 });
        const road = new THREE.Mesh(new THREE.PlaneGeometry(6, 200), roadMat);
        road.rotation.x = -Math.PI / 2;
        road.position.y = -0.5;
        road.receiveShadow = true;
        scene.add(road);

        // Разметка
        const lineMat = new THREE.MeshStandardMaterial({ color: 0xffaa44 });
        for (let z = -50; z <= 50; z += 2) {
            const line = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.1, 1.5), lineMat);
            line.position.set(0, -0.4, z);
            line.castShadow = false;
            scene.add(line);
        }

        // Модель игрока
        const playerCar = new THREE.Group();
        const bodyGeo = new THREE.BoxGeometry(0.9, 0.4, 1.8);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x33aa44, metalness: 0.6 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.castShadow = true;
        playerCar.add(body);
        const wheelGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.1, 16);
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
        const positions = [[-0.5, -0.2, 0.7], [0.5, -0.2, 0.7], [-0.5, -0.2, -0.7], [0.5, -0.2, -0.7]];
        positions.forEach(pos => {
            const wheel = new THREE.Mesh(wheelGeo, wheelMat);
            wheel.rotation.z = Math.PI / 2;
            wheel.position.set(pos[0], pos[1], pos[2]);
            wheel.castShadow = true;
            playerCar.add(wheel);
        });
        scene.add(playerCar);
        playerCar.position.y = 0;
        playerCar.position.x = 0;

        // Препятствия и соперники (общие)
        let obstacles = [];
        let opponents = new Map(); // для мультиплеера

        // Управление
        let targetX = 0;
        let currentX = 0;
        const speed = 8;

        function moveLeft() { targetX = Math.max(-2.5, targetX - 1.2); }
        function moveRight() { targetX = Math.min(2.5, targetX + 1.2); }

        // Генерация препятствий
        function spawnObstacle() {
            const type = Math.random() > 0.6 ? 'cone' : 'barrier';
            let mesh;
            if (type === 'cone') {
                const coneGeo = new THREE.ConeGeometry(0.3, 0.6, 8);
                const mat = new THREE.MeshStandardMaterial({ color: 0xff6644 });
                mesh = new THREE.Mesh(coneGeo, mat);
                mesh.position.y = 0;
            } else {
                const boxGeo = new THREE.BoxGeometry(0.8, 0.4, 0.8);
                const mat = new THREE.MeshStandardMaterial({ color: 0xaa4444 });
                mesh = new THREE.Mesh(boxGeo, mat);
                mesh.position.y = 0;
            }
            const xPos = (Math.random() - 0.5) * 4.5;
            mesh.position.set(xPos, 0, 25);
            mesh.castShadow = true;
            scene.add(mesh);
            obstacles.push({ mesh, x: xPos, z: 25 });
        }

        function updateObstacles(deltaTime) {
            const moveZ = -speed * deltaTime;
            for (let i = 0; i < obstacles.length; i++) {
                const obs = obstacles[i];
                obs.z += moveZ;
                obs.mesh.position.z = obs.z;
                if (obs.z < -10) {
                    scene.remove(obs.mesh);
                    obstacles.splice(i, 1);
                    i--;
                    score++;
                    scoreDiv.innerText = `🏆 ${score}`;
                } else {
                    const carX = currentX;
                    if (Math.abs(carX - obs.x) < 0.7 && Math.abs(obs.z - 1.5) < 1.0) {
                        gameActive = false;
                        statusDiv.innerHTML = '💥 КРАШ! Игра окончена. Нажмите "Выход", чтобы выбрать режим.';
                        if (currentMode === 'multi' && socket && socket.readyState === WebSocket.OPEN) {
                            socket.send(JSON.stringify({ type: 'crash', raceId, userId, score }));
                        }
                    }
                }
            }
        }

        // Очистка препятствий
        function clearObstacles() {
            for (let obs of obstacles) {
                scene.remove(obs.mesh);
            }
            obstacles = [];
        }

        // Перезапуск игры (начало новой гонки)
        function startRace() {
            gameActive = true;
            score = 0;
            scoreDiv.innerText = `🏆 0`;
            clearObstacles();
            currentX = 0;
            targetX = 0;
            playerCar.position.x = 0;
            statusDiv.innerHTML = currentMode === 'single' ? '🚗 ОДИНОЧНАЯ ГОНКА! Уклоняйтесь!' : '🌐 МНОГОПОЛЬЗОВАТЕЛЬСКАЯ ГОНКА!';
            // Генерация препятствий с интервалом
            if (window.obstacleInterval) clearInterval(window.obstacleInterval);
            window.obstacleInterval = setInterval(() => {
                if (gameActive && Math.random() < 0.4) spawnObstacle();
            }, 800);
        }

        // ========== ОДИНОЧНЫЙ РЕЖИМ (против ИИ) ==========
        // ИИ-машина: просто стоит на месте или имитирует движение? Сделаем для простоты соревнование по очкам.
        // В одиночном режиме ИИ не рисуем, просто уклоняемся. Можно добавить простую машину соперника, но для упрощения – только игрок.
        function initSingleMode() {
            currentMode = 'single';
            modeMenu.classList.add('hidden');
            infoDiv.classList.remove('hidden');
            scoreDiv.classList.remove('hidden');
            controlsDiv.classList.remove('hidden');
            statusDiv.classList.remove('hidden');
            exitBtn.classList.remove('hidden');
            startRace();
        }

        // ========== МНОГОПОЛЬЗОВАТЕЛЬСКИЙ РЕЖИМ (WebSocket) ==========
        function initMultiMode() {
            currentMode = 'multi';
            modeMenu.classList.add('hidden');
            infoDiv.classList.remove('hidden');
            scoreDiv.classList.remove('hidden');
            controlsDiv.classList.remove('hidden');
            statusDiv.classList.remove('hidden');
            exitBtn.classList.remove('hidden');
            
            statusDiv.innerHTML = '🔄 Подключение к серверу...';
            const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${wsProtocol}//${window.location.host}/ws/race`;
            socket = new WebSocket(wsUrl);
            
            socket.onopen = () => {
                statusDiv.innerHTML = '✅ Подключено. Ищем гонку...';
                socket.send(JSON.stringify({ type: 'join', userId }));
            };
            
            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'race_start') {
                    raceId = data.raceId;
                    startRace();
                } else if (data.type === 'opponents') {
                    // обновляем позиции соперников
                    for (let [id, opp] of opponents) {
                        if (!data.players.find(p => p.id == id)) {
                            scene.remove(opp.mesh);
                            opponents.delete(id);
                        }
                    }
                    for (let p of data.players) {
                        if (p.id == userId) continue;
                        let opp = opponents.get(p.id);
                        if (!opp) {
                            const carGroup = new THREE.Group();
                            const body2 = new THREE.Mesh(bodyGeo, new THREE.MeshStandardMaterial({ color: 0xdd6644 }));
                            body2.castShadow = true;
                            carGroup.add(body2);
                            positions.forEach(pos => {
                                const wheel = new THREE.Mesh(wheelGeo, wheelMat);
                                wheel.rotation.z = Math.PI / 2;
                                wheel.position.set(pos[0], pos[1], pos[2]);
                                carGroup.add(wheel);
                            });
                            scene.add(carGroup);
                            opp = { mesh: carGroup, x: 0 };
                            opponents.set(p.id, opp);
                        }
                        opp.x = p.x;
                        opp.mesh.position.x = p.x;
                        opp.mesh.position.z = 1.5;
                    }
                } else if (data.type === 'race_end') {
                    gameActive = false;
                    statusDiv.innerHTML = `🏁 ГОНКА ЗАВЕРШЕНА! Ваш счёт: ${score}`;
                    if (window.obstacleInterval) clearInterval(window.obstacleInterval);
                }
            };
            
            socket.onerror = (err) => {
                console.error(err);
                statusDiv.innerHTML = '❌ Ошибка WebSocket. Переключение в одиночный режим...';
                setTimeout(() => {
                    if (socket) socket.close();
                    initSingleMode();
                }, 2000);
            };
            
            // Отправка позиции
            setInterval(() => {
                if (socket && socket.readyState === WebSocket.OPEN && gameActive && currentMode === 'multi') {
                    socket.send(JSON.stringify({ type: 'move', userId, x: currentX, raceId, score }));
                }
            }, 50);
        }

        // Обработчики кнопок выбора режима
        document.getElementById('singleplayer-btn').addEventListener('click', initSingleMode);
        document.getElementById('multiplayer-btn').addEventListener('click', initMultiMode);
        
        // Кнопки управления
        document.getElementById('btnLeft').addEventListener('click', moveLeft);
        document.getElementById('btnRight').addEventListener('click', moveRight);
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') moveLeft();
            if (e.key === 'ArrowRight') moveRight();
        });
        
        // Выход на главную
        exitBtn.addEventListener('click', () => {
            if (window.obstacleInterval) clearInterval(window.obstacleInterval);
            if (socket && socket.readyState === WebSocket.OPEN) socket.close();
            window.location.href = 'index.html';
        });
        
        // Анимационный цикл
        let lastTime = performance.now();
        function animate() {
            const now = performance.now();
            let dt = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            
            if (gameActive) {
                currentX += (targetX - currentX) * 0.2;
                playerCar.position.x = currentX;
                camera.position.x += (currentX - camera.position.x) * 0.1;
                camera.lookAt(currentX, 0, 10);
                updateObstacles(dt);
            }
            
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
