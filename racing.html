<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Гонки | Resell Tycoon</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', system-ui; }
        #mode-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            gap: 30px;
        }
        .mode-btn {
            background: linear-gradient(145deg, #2a3a55, #101826);
            border: 2px solid #ffaa44;
            border-radius: 60px;
            padding: 16px 40px;
            font-size: 24px;
            font-weight: bold;
            color: #ffdd99;
            cursor: pointer;
            transition: 0.2s;
            width: 280px;
            text-align: center;
        }
        .mode-btn:hover { transform: scale(1.05); background: #ffaa44; color: #0a0f1a; }
        #info, #score {
            position: absolute;
            top: 20px;
            background: rgba(0,0,0,0.7);
            padding: 8px 18px;
            border-radius: 30px;
            color: white;
            z-index: 10;
            backdrop-filter: blur(4px);
            font-weight: bold;
        }
        #info { left: 20px; }
        #score { right: 20px; color: #ffaa44; }
        #controls {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 40px;
            z-index: 20;
        }
        .ctrl-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(30,40,60,0.9);
            backdrop-filter: blur(8px);
            border: 2px solid #ffaa44;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            cursor: pointer;
            transition: 0.05s linear;
            user-select: none;
        }
        .ctrl-btn:active { transform: scale(0.92); background: #ffaa44; color: black; }
        @media (max-width: 600px) { .ctrl-btn { width: 70px; height: 70px; font-size: 36px; } }
        #status {
            position: absolute;
            bottom: 120px;
            left: 0;
            right: 0;
            text-align: center;
            color: #ffdd99;
            background: rgba(0,0,0,0.6);
            padding: 10px;
            border-radius: 30px;
            width: 80%;
            margin: 0 auto;
            font-weight: bold;
            backdrop-filter: blur(4px);
        }
        .back-btn {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: #555;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            z-index: 20;
            font-weight: bold;
        }
        #music-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            z-index: 30;
            border: 1px solid #ffaa44;
        }
        #music-toggle:hover { background: #ffaa44; color: black; }
        #music-panel {
            position: absolute;
            top: 80px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 30;
            border: 1px solid #ffaa44;
            width: 240px;
        }
        #music-panel.hidden { display: none; }
        #music-panel input, #music-panel button {
            background: #2a3a55;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 8px 12px;
            cursor: pointer;
        }
        #music-panel button:hover { background: #ffaa44; color: black; }
        #volumeSlider { width: 100%; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="mode-menu">
        <div class="mode-btn" id="singleplayer-btn">🚗 ОДИНОЧНАЯ (ИИ)</div>
        <div class="mode-btn" id="multiplayer-btn">🌐 МНОГОПОЛЬЗОВАТЕЛЬСКАЯ</div>
    </div>
    <div id="info" class="hidden">🏎️ 3D RACE</div>
    <div id="score" class="hidden">🏆 0</div>
    <div id="controls" class="hidden">
        <div class="ctrl-btn" id="btnLeft">◀</div>
        <div class="ctrl-btn" id="btnRight">▶</div>
    </div>
    <div id="status" class="hidden">⚡ Игра загружается...</div>
    <button class="back-btn hidden" id="exitBtn">🔙 Выход</button>
    
    <div id="music-toggle" class="hidden">🎵</div>
    <div id="music-panel" class="hidden">
        <input type="file" id="musicFileInput" accept="audio/*">
        <input type="text" id="musicUrlInput" placeholder="Ссылка на MP3">
        <div style="display: flex; gap: 8px;">
            <button id="playMusicBtn">▶️</button>
            <button id="stopMusicBtn">⏹️</button>
        </div>
        <input type="range" id="volumeSlider" min="0" max="100" value="50">
        <span style="font-size: 11px; text-align: center;">Громкость</span>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let gameActive = false;
        let score = 0;
        let currentMode = null;
        let socket = null;
        let raceId = null;
        let userId = tg.initDataUnsafe?.user?.id || Math.floor(Math.random() * 100000);
        
        const modeMenu = document.getElementById('mode-menu');
        const infoDiv = document.getElementById('info');
        const scoreDiv = document.getElementById('score');
        const controlsDiv = document.getElementById('controls');
        const statusDiv = document.getElementById('status');
        const exitBtn = document.getElementById('exitBtn');
        const musicToggle = document.getElementById('music-toggle');
        const musicPanel = document.getElementById('music-panel');

        // ----- ЗВУКИ (короткие сигналы) -----
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx && window.AudioContext) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const unlock = () => {
                    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                    document.body.removeEventListener('touchstart', unlock);
                    document.body.removeEventListener('click', unlock);
                };
                document.body.addEventListener('touchstart', unlock);
                document.body.addEventListener('click', unlock);
            }
        }
        function playBeep(freq, dur, vol = 0.12) {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(vol, now);
            gain.gain.exponentialRampToValueAtTime(0.00001, now + dur);
            osc.start();
            osc.stop(now + dur);
        }
        function playCrash() { playBeep(100, 0.6, 0.2); }
        function playPoint() { playBeep(1100, 0.1, 0.12); }

        // ----- МУЗЫКА -----
        let backgroundMusic = null;
        let musicPlaying = false;
        let hidePanelTimeout = null;
        function showMusicPanel() {
            musicPanel.classList.remove('hidden');
            if (hidePanelTimeout) clearTimeout(hidePanelTimeout);
            hidePanelTimeout = setTimeout(() => musicPanel.classList.add('hidden'), 5000);
        }
        musicToggle.addEventListener('click', () => {
            if (musicPanel.classList.contains('hidden')) showMusicPanel();
            else musicPanel.classList.add('hidden');
        });
        function startBackgroundMusic() {
            if (backgroundMusic) return;
            backgroundMusic = new Audio('MACAN_-_Veselyashhijj_gaz_64741091.mp3');
            backgroundMusic.loop = true;
            backgroundMusic.volume = document.getElementById('volumeSlider').value / 100;
            backgroundMusic.play().catch(e => console.log("Автозапуск заблокирован"));
            musicPlaying = true;
            document.getElementById('playMusicBtn').textContent = '⏸️';
        }
        function loadMusicFromFile(file) {
            if (backgroundMusic) backgroundMusic.pause();
            const url = URL.createObjectURL(file);
            backgroundMusic = new Audio(url);
            backgroundMusic.loop = true;
            backgroundMusic.volume = document.getElementById('volumeSlider').value / 100;
            backgroundMusic.play();
            musicPlaying = true;
            document.getElementById('playMusicBtn').textContent = '⏸️';
        }
        function loadMusicFromUrl(url) {
            if (backgroundMusic) backgroundMusic.pause();
            backgroundMusic = new Audio(url);
            backgroundMusic.loop = true;
            backgroundMusic.volume = document.getElementById('volumeSlider').value / 100;
            backgroundMusic.play();
            musicPlaying = true;
            document.getElementById('playMusicBtn').textContent = '⏸️';
        }
        function toggleMusic() {
            if (!backgroundMusic) {
                const url = document.getElementById('musicUrlInput').value;
                if (url) loadMusicFromUrl(url);
                else alert("Выберите файл или вставьте ссылку");
                return;
            }
            if (musicPlaying) {
                backgroundMusic.pause();
                musicPlaying = false;
                document.getElementById('playMusicBtn').textContent = '▶️';
            } else {
                backgroundMusic.play();
                musicPlaying = true;
                document.getElementById('playMusicBtn').textContent = '⏸️';
            }
        }
        function stopMusic() {
            if (backgroundMusic) {
                backgroundMusic.pause();
                backgroundMusic.currentTime = 0;
                musicPlaying = false;
                document.getElementById('playMusicBtn').textContent = '▶️';
            }
        }

        // ----- 3D СЦЕНА (БЕСКОНЕЧНАЯ ДОРОГА) -----
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a1030);
        scene.fog = new THREE.FogExp2(0x0a1030, 0.002);
        
        const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.3, 1000);
        camera.position.set(0, 3.5, 6);
        camera.lookAt(0, 0.8, 8);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        // Освещение
        const ambient = new THREE.AmbientLight(0x404060);
        scene.add(ambient);
        const sunLight = new THREE.DirectionalLight(0xffeedd, 1.2);
        sunLight.position.set(10, 20, 5);
        sunLight.castShadow = true;
        scene.add(sunLight);
        const fillLight = new THREE.PointLight(0x4488ff, 0.5);
        fillLight.position.set(-2, 3, 4);
        scene.add(fillLight);
        
        // Статичная дорога (основание)
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x2c3e50, roughness: 0.6 });
        const road = new THREE.Mesh(new THREE.PlaneGeometry(6, 200), roadMat);
        road.rotation.x = -Math.PI / 2;
        road.position.y = -0.5;
        road.receiveShadow = true;
        scene.add(road);
        
        // Обочины статичные
        const edgeMat = new THREE.MeshStandardMaterial({ color: 0x556677 });
        const leftEdge = new THREE.Mesh(new THREE.PlaneGeometry(1.2, 200), edgeMat);
        leftEdge.rotation.x = -Math.PI / 2;
        leftEdge.position.set(-3.5, -0.5, 0);
        leftEdge.receiveShadow = true;
        scene.add(leftEdge);
        const rightEdge = new THREE.Mesh(new THREE.PlaneGeometry(1.2, 200), edgeMat);
        rightEdge.rotation.x = -Math.PI / 2;
        rightEdge.position.set(3.5, -0.5, 0);
        rightEdge.receiveShadow = true;
        scene.add(rightEdge);
        
        // Динамические объекты: разметка, бордюры, деревья, препятствия
        let movingObjects = []; // { mesh, z, type, x }
        const SPEED = 12; // скорость движения навстречу
        const ROAD_WIDTH = 2.5;
        
        // Функция создания полосы разметки
        function createLine(z) {
            const lineMat = new THREE.MeshStandardMaterial({ color: 0xffdd99 });
            const line = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.1, 1.5), lineMat);
            line.position.set(0, -0.4, z);
            line.castShadow = false;
            return line;
        }
        
        // Создание бордюра
        function createCurb(x, z) {
            const curbMat = new THREE.MeshStandardMaterial({ color: 0xaa8866 });
            const curb = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.2, 1.8), curbMat);
            curb.position.set(x, -0.3, z);
            curb.castShadow = true;
            return curb;
        }
        
        // Создание дерева
        function createTree(x, z) {
            const group = new THREE.Group();
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B });
            const leavesMat = new THREE.MeshStandardMaterial({ color: 0x5A9E4E });
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 1.2, 6), trunkMat);
            trunk.position.y = 0.6;
            group.add(trunk);
            const leaves = new THREE.Mesh(new THREE.ConeGeometry(0.7, 1.0, 8), leavesMat);
            leaves.position.y = 1.2;
            group.add(leaves);
            group.position.set(x, -0.5, z);
            group.castShadow = true;
            return group;
        }
        
        // Создание препятствия (случайный тип)
        function createObstacle(x, z) {
            const r = Math.random();
            let mesh;
            if (r < 0.35) {
                const holeGeo = new THREE.CylinderGeometry(0.6, 0.6, 0.05, 16);
                const holeMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e });
                mesh = new THREE.Mesh(holeGeo, holeMat);
                mesh.rotation.x = Math.PI / 2;
                mesh.position.y = -0.48;
            } else if (r < 0.7) {
                const coneGeo = new THREE.ConeGeometry(0.45, 0.9, 8);
                const coneMat = new THREE.MeshStandardMaterial({ color: 0xff8844 });
                mesh = new THREE.Mesh(coneGeo, coneMat);
                mesh.position.y = 0;
            } else {
                const barrelGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.8, 10);
                const barrelMat = new THREE.MeshStandardMaterial({ color: 0xaa5533 });
                mesh = new THREE.Mesh(barrelGeo, barrelMat);
                mesh.position.y = 0;
            }
            mesh.position.set(x, 0, z);
            mesh.castShadow = true;
            return mesh;
        }
        
        // Инициализация движущихся объектов (полосы, бордюры, деревья)
        function initMovingObjects() {
            // Полосы разметки от -40 до 40 с шагом 3
            for (let z = -40; z <= 40; z += 3) {
                const line = createLine(z);
                scene.add(line);
                movingObjects.push({ mesh: line, z: z, type: 'line', x: 0 });
            }
            // Бордюры
            for (let z = -40; z <= 40; z += 2.5) {
                const leftCurb = createCurb(-2.9, z);
                const rightCurb = createCurb(2.9, z);
                scene.add(leftCurb);
                scene.add(rightCurb);
                movingObjects.push({ mesh: leftCurb, z: z, type: 'curb', x: -2.9 });
                movingObjects.push({ mesh: rightCurb, z: z, type: 'curb', x: 2.9 });
            }
            // Деревья
            for (let z = -40; z <= 40; z += 5) {
                const treeL = createTree(-4.5, z);
                const treeR = createTree(4.5, z);
                scene.add(treeL);
                scene.add(treeR);
                movingObjects.push({ mesh: treeL, z: z, type: 'tree', x: -4.5 });
                movingObjects.push({ mesh: treeR, z: z, type: 'tree', x: 4.5 });
            }
        }
        
        // Машина игрока (увеличенная, яркая)
        const playerCar = new THREE.Group();
        const bodyGeo = new THREE.BoxGeometry(1.3, 0.55, 2.4);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff5500, metalness: 0.8, roughness: 0.2 });
        const carBody = new THREE.Mesh(bodyGeo, bodyMat);
        carBody.castShadow = true;
        playerCar.add(carBody);
        const roofMatCar = new THREE.MeshStandardMaterial({ color: 0x88aaff, metalness: 0.9 });
        const roof = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.4, 1.3), roofMatCar);
        roof.position.set(0, 0.48, -0.3);
        roof.castShadow = true;
        playerCar.add(roof);
        const lightMatCar = new THREE.MeshStandardMaterial({ color: 0xffaa66, emissive: 0xff4400 });
        const leftLight = new THREE.Mesh(new THREE.SphereGeometry(0.2, 16, 16), lightMatCar);
        leftLight.position.set(-0.55, 0.25, 1.2);
        playerCar.add(leftLight);
        const rightLight = new THREE.Mesh(new THREE.SphereGeometry(0.2, 16, 16), lightMatCar);
        rightLight.position.set(0.55, 0.25, 1.2);
        playerCar.add(rightLight);
        const wheelGeoCar = new THREE.CylinderGeometry(0.35, 0.35, 0.15, 24);
        const wheelMatCar = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.8 });
        const wheelPos = [[-0.85, -0.25, 0.95], [0.85, -0.25, 0.95], [-0.85, -0.25, -0.95], [0.85, -0.25, -0.95]];
        wheelPos.forEach(pos => {
            const wheel = new THREE.Mesh(wheelGeoCar, wheelMatCar);
            wheel.rotation.z = Math.PI / 2;
            wheel.position.set(pos[0], pos[1], pos[2]);
            wheel.castShadow = true;
            playerCar.add(wheel);
        });
        scene.add(playerCar);
        playerCar.position.y = 0;
        playerCar.position.z = 0;
        
        // Массив препятствий
        let obstacles = [];
        let obstacleTimer = null;
        
        let targetX = 0;
        let currentX = 0;
        let lastTimestamp = 0;
        
        function moveLeft() { targetX = Math.max(-2.3, targetX - 0.9); }
        function moveRight() { targetX = Math.min(2.3, targetX + 0.9); }
        
        // Обновление движущихся объектов
        function updateMovingObjects(deltaTime) {
            const step = SPEED * deltaTime;
            for (let i = 0; i < movingObjects.length; i++) {
                const obj = movingObjects[i];
                obj.z -= step;
                obj.mesh.position.z = obj.z;
                if (obj.z < -45) {
                    // Перемещаем вперёд
                    const newZ = 45;
                    obj.z = newZ;
                    obj.mesh.position.z = newZ;
                }
            }
        }
        
        // Обновление препятствий
        function updateObstacles(deltaTime) {
            const step = SPEED * deltaTime;
            for (let i = 0; i < obstacles.length; i++) {
                const obs = obstacles[i];
                obs.z -= step;
                obs.mesh.position.z = obs.z;
                if (obs.z < -10) {
                    scene.remove(obs.mesh);
                    obstacles.splice(i, 1);
                    i--;
                    score++;
                    scoreDiv.innerText = `🏆 ${score}`;
                    playPoint();
                } else {
                    // Столкновение
                    if (Math.abs(currentX - obs.x) < 0.8 && Math.abs(obs.z - 0.5) < 1.0) {
                        gameActive = false;
                        statusDiv.innerHTML = '💥 КРАШ! Игра окончена. Нажмите "Выход".';
                        playCrash();
                        if (obstacleTimer) clearInterval(obstacleTimer);
                        if (currentMode === 'multi' && socket && socket.readyState === WebSocket.OPEN) {
                            socket.send(JSON.stringify({ type: 'crash', raceId, userId, score }));
                        }
                    }
                }
            }
        }
        
        // Генерация препятствий
        function spawnObstacle() {
            if (!gameActive) return;
            const xPos = (Math.random() - 0.5) * 4.2;
            const obstacle = createObstacle(xPos, 30);
            scene.add(obstacle);
            obstacles.push({ mesh: obstacle, x: xPos, z: 30 });
        }
        
        function startRace() {
            gameActive = true;
            score = 0;
            scoreDiv.innerText = `🏆 0`;
            // Очищаем старые препятствия
            for (let obs of obstacles) scene.remove(obs.mesh);
            obstacles = [];
            currentX = 0;
            targetX = 0;
            playerCar.position.x = 0;
            statusDiv.innerHTML = currentMode === 'single' ? '🚗 ОДИНОЧНАЯ! Уклоняйтесь!' : '🌐 МНОГОПОЛЬЗОВАТЕЛЬСКАЯ!';
            initAudio();
            if (obstacleTimer) clearInterval(obstacleTimer);
            obstacleTimer = setInterval(() => {
                if (gameActive && Math.random() < 0.55) spawnObstacle();
            }, 650);
        }
        
        // Инициализация сцены
        initMovingObjects();
        
        // Режимы
        function initSingleMode() {
            currentMode = 'single';
            modeMenu.classList.add('hidden');
            infoDiv.classList.remove('hidden');
            scoreDiv.classList.remove('hidden');
            controlsDiv.classList.remove('hidden');
            statusDiv.classList.remove('hidden');
            exitBtn.classList.remove('hidden');
            musicToggle.classList.remove('hidden');
            startRace();
            startBackgroundMusic();
        }
        
        function initMultiMode() {
            currentMode = 'multi';
            modeMenu.classList.add('hidden');
            infoDiv.classList.remove('hidden');
            scoreDiv.classList.remove('hidden');
            controlsDiv.classList.remove('hidden');
            statusDiv.classList.remove('hidden');
            exitBtn.classList.remove('hidden');
            musicToggle.classList.remove('hidden');
            statusDiv.innerHTML = '🔄 Подключение...';
            const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${wsProtocol}//${window.location.host}/ws/race`;
            socket = new WebSocket(wsUrl);
            socket.onopen = () => {
                statusDiv.innerHTML = '✅ Подключено. Поиск игроков...';
                socket.send(JSON.stringify({ type: 'join', userId }));
            };
            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'race_start') {
                    raceId = data.raceId;
                    startRace();
                    startBackgroundMusic();
                } else if (data.type === 'opponents') {
                    // Здесь можно добавить отображение соперников, но для простоты опустим
                } else if (data.type === 'race_end') {
                    gameActive = false;
                    statusDiv.innerHTML = `🏁 ГОНКА ЗАВЕРШЕНА! Счёт: ${score}`;
                    if (obstacleTimer) clearInterval(obstacleTimer);
                }
            };
            socket.onerror = () => {
                statusDiv.innerHTML = '❌ Ошибка WebSocket. Переход в одиночный режим...';
                setTimeout(() => {
                    if (socket) socket.close();
                    initSingleMode();
                }, 2000);
            };
            setInterval(() => {
                if (socket && socket.readyState === WebSocket.OPEN && gameActive && currentMode === 'multi') {
                    socket.send(JSON.stringify({ type: 'move', userId, x: currentX, raceId, score }));
                }
            }, 50);
        }
        
        // Кнопки
        document.getElementById('singleplayer-btn').addEventListener('click', initSingleMode);
        document.getElementById('multiplayer-btn').addEventListener('click', initMultiMode);
        document.getElementById('btnLeft').addEventListener('click', moveLeft);
        document.getElementById('btnRight').addEventListener('click', moveRight);
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') moveLeft();
            if (e.key === 'ArrowRight') moveRight();
        });
        exitBtn.addEventListener('click', () => {
            if (obstacleTimer) clearInterval(obstacleTimer);
            if (socket && socket.readyState === WebSocket.OPEN) socket.close();
            if (backgroundMusic) backgroundMusic.pause();
            window.location.href = 'index.html';
        });
        
        document.getElementById('musicFileInput').addEventListener('change', (e) => {
            if (e.target.files.length > 0) loadMusicFromFile(e.target.files[0]);
        });
        document.getElementById('playMusicBtn').addEventListener('click', toggleMusic);
        document.getElementById('stopMusicBtn').addEventListener('click', stopMusic);
        document.getElementById('volumeSlider').addEventListener('input', (e) => {
            if (backgroundMusic) backgroundMusic.volume = e.target.value / 100;
        });
        
        // Анимация
        let lastTime = performance.now();
        function animate() {
            const now = performance.now();
            let dt = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            if (gameActive) {
                currentX += (targetX - currentX) * 0.25;
                playerCar.position.x = currentX;
                // Камера слегка следит за машиной
                const targetCamX = currentX * 0.2;
                camera.position.x += (targetCamX - camera.position.x) * 0.1;
                camera.lookAt(currentX, 0.8, 8);
                updateMovingObjects(dt);
                updateObstacles(dt);
            }
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
