<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Гонки | Resell Tycoon</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', system-ui; }
        #mode-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            gap: 30px;
        }
        .mode-btn {
            background: linear-gradient(145deg, #2a3a55, #101826);
            border: 2px solid #ffaa44;
            border-radius: 60px;
            padding: 16px 40px;
            font-size: 24px;
            font-weight: bold;
            color: #ffdd99;
            cursor: pointer;
            transition: 0.2s;
            width: 280px;
            text-align: center;
        }
        .mode-btn:hover { transform: scale(1.05); background: #ffaa44; color: #0a0f1a; }
        #info, #score {
            position: absolute;
            top: 20px;
            background: rgba(0,0,0,0.7);
            padding: 8px 18px;
            border-radius: 30px;
            color: white;
            z-index: 10;
            backdrop-filter: blur(4px);
            font-weight: bold;
        }
        #info { left: 20px; }
        #score { right: 20px; color: #ffaa44; }
        #controls {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 40px;
            z-index: 20;
        }
        .ctrl-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(30,40,60,0.9);
            backdrop-filter: blur(8px);
            border: 2px solid #ffaa44;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            cursor: pointer;
            transition: 0.05s linear;
            user-select: none;
        }
        .ctrl-btn:active { transform: scale(0.92); background: #ffaa44; color: black; }
        @media (max-width: 600px) { .ctrl-btn { width: 70px; height: 70px; font-size: 36px; } }
        #status {
            position: absolute;
            bottom: 120px;
            left: 0;
            right: 0;
            text-align: center;
            color: #ffdd99;
            background: rgba(0,0,0,0.6);
            padding: 10px;
            border-radius: 30px;
            width: 80%;
            margin: 0 auto;
            font-weight: bold;
            backdrop-filter: blur(4px);
        }
        .back-btn {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: #555;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            z-index: 20;
            font-weight: bold;
        }
        #music-controls {
            position: absolute;
            bottom: 200px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 12px;
            border-radius: 30px;
            backdrop-filter: blur(8px);
            z-index: 25;
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 12px;
        }
        #music-controls input, #music-controls button {
            background: #2a3a55;
            color: white;
            border-radius: 20px;
            padding: 6px 8px;
            border: none;
            cursor: pointer;
        }
        #music-controls button:hover { background: #ffaa44; color: black; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="mode-menu">
        <div class="mode-btn" id="singleplayer-btn">🚗 ОДИНОЧНАЯ (ИИ)</div>
        <div class="mode-btn" id="multiplayer-btn">🌐 МНОГОПОЛЬЗОВАТЕЛЬСКАЯ</div>
    </div>
    <div id="info" class="hidden">🏎️ 3D RACE</div>
    <div id="score" class="hidden">🏆 0</div>
    <div id="controls" class="hidden">
        <div class="ctrl-btn" id="btnLeft">◀</div>
        <div class="ctrl-btn" id="btnRight">▶</div>
    </div>
    <div id="status" class="hidden">⚡ Игра загружается...</div>
    <button class="back-btn hidden" id="exitBtn">🔙 Выход</button>
    <div id="music-controls" class="hidden">
        <input type="file" id="musicFileInput" accept="audio/*">
        <input type="text" id="musicUrlInput" placeholder="Или вставьте ссылку на MP3">
        <div style="display: flex; gap: 10px;">
            <button id="playMusicBtn">▶️ Играть</button>
            <button id="stopMusicBtn">⏹️ Стоп</button>
        </div>
        <div style="display: flex; gap: 10px; align-items: center;">
            <span>🔊</span>
            <input type="range" id="volumeSlider" min="0" max="100" value="50">
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // ---------- ОБЩИЕ ПАРАМЕТРЫ ----------
        let gameActive = false;
        let score = 0;
        let currentMode = null;
        let socket = null;
        let raceId = null;
        let userId = tg.initDataUnsafe?.user?.id || Math.floor(Math.random() * 100000);
        
        const modeMenu = document.getElementById('mode-menu');
        const infoDiv = document.getElementById('info');
        const scoreDiv = document.getElementById('score');
        const controlsDiv = document.getElementById('controls');
        const statusDiv = document.getElementById('status');
        const exitBtn = document.getElementById('exitBtn');
        const musicControls = document.getElementById('music-controls');

        // ---------- ЗВУК МОТОРА (непрерывный) ----------
        let engineCtx = null;
        let engineOsc = null;
        let engineGain = null;
        let engineRunning = false;
        
        function startEngineSound() {
            if (!engineCtx && window.AudioContext) {
                engineCtx = new (window.AudioContext || window.webkitAudioContext)();
                // разблокируем по первому касанию
                const unlock = () => {
                    if (engineCtx && engineCtx.state === 'suspended') engineCtx.resume();
                    document.body.removeEventListener('touchstart', unlock);
                    document.body.removeEventListener('click', unlock);
                };
                document.body.addEventListener('touchstart', unlock);
                document.body.addEventListener('click', unlock);
            }
            if (!engineCtx) return;
            
            if (engineOsc) {
                engineOsc.stop();
                engineOsc.disconnect();
            }
            engineOsc = engineCtx.createOscillator();
            engineGain = engineCtx.createGain();
            engineOsc.connect(engineGain);
            engineGain.connect(engineCtx.destination);
            engineOsc.type = 'sawtooth';
            engineOsc.frequency.value = 80;
            engineGain.gain.value = 0.15;
            engineOsc.start();
            engineRunning = true;
        }
        
        function updateEngineSound(speed) {
            if (!engineRunning || !engineOsc) return;
            // частота мотора зависит от скорости (от 80 до 300 Гц)
            const freq = 80 + Math.min(220, speed * 12);
            engineOsc.frequency.value = freq;
            // громкость тоже растёт со скоростью
            if (engineGain) engineGain.gain.value = 0.1 + Math.min(0.3, speed * 0.02);
        }
        
        function stopEngineSound() {
            if (engineOsc) {
                engineOsc.stop();
                engineOsc = null;
                engineGain = null;
            }
            engineRunning = false;
        }
        
        // Короткие звуки (столкновение, очки)
        function playBeep(frequency, duration, volume = 0.2) {
            if (!engineCtx) return;
            const now = engineCtx.currentTime;
            const osc = engineCtx.createOscillator();
            const gain = engineCtx.createGain();
            osc.connect(gain);
            gain.connect(engineCtx.destination);
            osc.frequency.value = frequency;
            gain.gain.setValueAtTime(volume, now);
            gain.gain.exponentialRampToValueAtTime(0.00001, now + duration);
            osc.start();
            osc.stop(now + duration);
        }
        function playCrashSound() { playBeep(120, 0.8, 0.4); }
        function playPointSound() { playBeep(1200, 0.12, 0.2); }

        // ---------- МУЗЫКА ----------
        let backgroundMusic = null;
        let musicPlaying = false;
        function startBackgroundMusic() {
            if (backgroundMusic) return;
            backgroundMusic = new Audio('MACAN_-_Veselyashhijj_gaz_64741091.mp3');
            backgroundMusic.loop = true;
            backgroundMusic.volume = document.getElementById('volumeSlider').value / 100;
            backgroundMusic.play().catch(e => console.log("Музыка заблокирована"));
            musicPlaying = true;
            if(document.getElementById('playMusicBtn')) document.getElementById('playMusicBtn').textContent = '⏸️ Пауза';
        }
        function loadMusicFromFile(file) {
            if (backgroundMusic) backgroundMusic.pause();
            const url = URL.createObjectURL(file);
            backgroundMusic = new Audio(url);
            backgroundMusic.loop = true;
            backgroundMusic.volume = document.getElementById('volumeSlider').value / 100;
            backgroundMusic.play();
            musicPlaying = true;
            document.getElementById('playMusicBtn').textContent = '⏸️ Пауза';
        }
        function loadMusicFromUrl(url) {
            if (backgroundMusic) backgroundMusic.pause();
            backgroundMusic = new Audio(url);
            backgroundMusic.loop = true;
            backgroundMusic.volume = document.getElementById('volumeSlider').value / 100;
            backgroundMusic.play();
            musicPlaying = true;
            document.getElementById('playMusicBtn').textContent = '⏸️ Пауза';
        }
        function toggleMusic() {
            if (!backgroundMusic) {
                const url = document.getElementById('musicUrlInput').value;
                if (url) loadMusicFromUrl(url);
                else alert("Сначала выберите файл или вставьте ссылку");
                return;
            }
            if (musicPlaying) {
                backgroundMusic.pause();
                musicPlaying = false;
                document.getElementById('playMusicBtn').textContent = '▶️ Играть';
            } else {
                backgroundMusic.play();
                musicPlaying = true;
                document.getElementById('playMusicBtn').textContent = '⏸️ Пауза';
            }
        }
        function stopMusic() {
            if (backgroundMusic) {
                backgroundMusic.pause();
                backgroundMusic.currentTime = 0;
                musicPlaying = false;
                document.getElementById('playMusicBtn').textContent = '▶️ Играть';
            }
        }

        // ----- 3D СЦЕНА (машина теперь в кадре) -----
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a1030);
        scene.fog = new THREE.FogExp2(0x0a1030, 0.002);

        // Камера смотрит на машину спереди-сверху
        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2.2, 4.5);
        camera.lookAt(0, 0.5, 3);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // Освещение
        const ambient = new THREE.AmbientLight(0x404060);
        scene.add(ambient);
        const sunLight = new THREE.DirectionalLight(0xffeedd, 1.2);
        sunLight.position.set(10, 20, 5);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 1024;
        sunLight.shadow.mapSize.height = 1024;
        scene.add(sunLight);
        const fillLight = new THREE.PointLight(0x4488ff, 0.5);
        fillLight.position.set(-2, 3, 4);
        scene.add(fillLight);
        const backLight = new THREE.PointLight(0xffaa66, 0.3);
        backLight.position.set(0, 2, -5);
        scene.add(backLight);

        // Дорога
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x2c3e50, roughness: 0.6 });
        const road = new THREE.Mesh(new THREE.PlaneGeometry(6, 200), roadMat);
        road.rotation.x = -Math.PI / 2;
        road.position.y = -0.5;
        road.receiveShadow = true;
        scene.add(road);

        // Обочины и бордюры (как раньше, для краткости оставим без изменений, но важно для атмосферы)
        const edgeMat = new THREE.MeshStandardMaterial({ color: 0x556677 });
        const leftEdge = new THREE.Mesh(new THREE.PlaneGeometry(1.2, 200), edgeMat);
        leftEdge.rotation.x = -Math.PI / 2;
        leftEdge.position.set(-3.5, -0.5, 0);
        leftEdge.receiveShadow = true;
        scene.add(leftEdge);
        const rightEdge = new THREE.Mesh(new THREE.PlaneGeometry(1.2, 200), edgeMat);
        rightEdge.rotation.x = -Math.PI / 2;
        rightEdge.position.set(3.5, -0.5, 0);
        rightEdge.receiveShadow = true;
        scene.add(rightEdge);

        const curbMat = new THREE.MeshStandardMaterial({ color: 0xaa8866 });
        for (let z = -50; z <= 50; z += 2.5) {
            const leftCurb = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.2, 1.8), curbMat);
            leftCurb.position.set(-2.9, -0.3, z);
            leftCurb.castShadow = true;
            scene.add(leftCurb);
            const rightCurb = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.2, 1.8), curbMat);
            rightCurb.position.set(2.9, -0.3, z);
            rightCurb.castShadow = true;
            scene.add(rightCurb);
        }
        
        // Разметка
        const lineMat = new THREE.MeshStandardMaterial({ color: 0xffdd99 });
        for (let z = -48; z <= 50; z += 3) {
            const line = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.1, 1.5), lineMat);
            line.position.set(0, -0.4, z);
            line.castShadow = false;
            scene.add(line);
        }

        // Деревья и знаки (упрощённо)
        const treeTrunk = new THREE.MeshStandardMaterial({ color: 0x8B5A2B });
        const treeLeaves = new THREE.MeshStandardMaterial({ color: 0x5A9E4E });
        for (let z = -45; z <= 45; z += 5) {
            const treeL = new THREE.Group();
            const trunkL = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 1.2, 6), treeTrunk);
            trunkL.position.y = 0.6;
            treeL.add(trunkL);
            const leavesL = new THREE.Mesh(new THREE.ConeGeometry(0.7, 1.0, 8), treeLeaves);
            leavesL.position.y = 1.2;
            treeL.add(leavesL);
            treeL.position.set(-4.5, -0.5, z);
            treeL.castShadow = true;
            scene.add(treeL);
            
            const treeR = new THREE.Group();
            const trunkR = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 1.2, 6), treeTrunk);
            trunkR.position.y = 0.6;
            treeR.add(trunkR);
            const leavesR = new THREE.Mesh(new THREE.ConeGeometry(0.7, 1.0, 8), treeLeaves);
            leavesR.position.y = 1.2;
            treeR.add(leavesR);
            treeR.position.set(4.5, -0.5, z);
            treeR.castShadow = true;
            scene.add(treeR);
        }

        // ========= МАШИНА ИГРОКА (увеличенная, яркая, в центре) =========
        const playerCar = new THREE.Group();
        // Кузов
        const bodyGeoCar = new THREE.BoxGeometry(1.2, 0.5, 2.2);
        const bodyMatCar = new THREE.MeshStandardMaterial({ color: 0xff6600, metalness: 0.8, roughness: 0.2, emissive: 0x442200 });
        const carBody = new THREE.Mesh(bodyGeoCar, bodyMatCar);
        carBody.castShadow = true;
        carBody.receiveShadow = true;
        playerCar.add(carBody);
        // Крыша (стекло)
        const roofMat = new THREE.MeshStandardMaterial({ color: 0x88aaff, metalness: 0.9 });
        const roof = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.35, 1.2), roofMat);
        roof.position.set(0, 0.45, -0.3);
        roof.castShadow = true;
        playerCar.add(roof);
        // Фары
        const lightMat = new THREE.MeshStandardMaterial({ color: 0xffaa66, emissive: 0xff4400 });
        const leftLight = new THREE.Mesh(new THREE.SphereGeometry(0.18, 16, 16), lightMat);
        leftLight.position.set(-0.55, 0.2, 1.15);
        playerCar.add(leftLight);
        const rightLight = new THREE.Mesh(new THREE.SphereGeometry(0.18, 16, 16), lightMat);
        rightLight.position.set(0.55, 0.2, 1.15);
        playerCar.add(rightLight);
        // Колёса
        const wheelGeoCar = new THREE.CylinderGeometry(0.32, 0.32, 0.15, 24);
        const wheelMatCar = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.9 });
        const wheelPos = [[-0.75, -0.25, 0.85], [0.75, -0.25, 0.85], [-0.75, -0.25, -0.85], [0.75, -0.25, -0.85]];
        wheelPos.forEach(pos => {
            const wheel = new THREE.Mesh(wheelGeoCar, wheelMatCar);
            wheel.rotation.z = Math.PI / 2;
            wheel.position.set(pos[0], pos[1], pos[2]);
            wheel.castShadow = true;
            playerCar.add(wheel);
        });
        scene.add(playerCar);
        playerCar.position.y = 0;
        playerCar.position.x = 0;
        playerCar.position.z = 1.5; // чтобы была перед камерой

        // Препятствия
        let obstacles = [];
        let opponents = new Map();

        // Управление (исправлено: влево -> отрицательное смещение)
        let targetX = 0;
        let currentX = 0;
        const baseSpeed = 12; // увеличена скорость для экшена
        let currentSpeed = baseSpeed;

        function moveLeft() { targetX = Math.max(-2.8, targetX - 1.1); }
        function moveRight() { targetX = Math.min(2.8, targetX + 1.1); }

        function spawnObstacle() {
            const r = Math.random();
            let mesh;
            if (r < 0.35) {
                // Яма
                const holeGeo = new THREE.CylinderGeometry(0.6, 0.6, 0.05, 16);
                const holeMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.9 });
                mesh = new THREE.Mesh(holeGeo, holeMat);
                mesh.rotation.x = Math.PI / 2;
                mesh.position.y = -0.48;
            } else if (r < 0.65) {
                // Конус
                const coneGeo = new THREE.ConeGeometry(0.45, 0.9, 8);
                const coneMat = new THREE.MeshStandardMaterial({ color: 0xff8844 });
                mesh = new THREE.Mesh(coneGeo, coneMat);
                mesh.position.y = 0;
            } else {
                // Бочка
                const barrelGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.8, 10);
                const barrelMat = new THREE.MeshStandardMaterial({ color: 0xaa5533 });
                mesh = new THREE.Mesh(barrelGeo, barrelMat);
                mesh.position.y = 0;
            }
            const xPos = (Math.random() - 0.5) * 4.5;
            mesh.position.set(xPos, 0, 32);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
            obstacles.push({ mesh, x: xPos, z: 32 });
        }

        function updateObstacles(deltaTime) {
            const moveZ = -currentSpeed * deltaTime;
            for (let i = 0; i < obstacles.length; i++) {
                const obs = obstacles[i];
                obs.z += moveZ;
                obs.mesh.position.z = obs.z;
                if (obs.z < -8) {
                    scene.remove(obs.mesh);
                    obstacles.splice(i, 1);
                    i--;
                    score++;
                    scoreDiv.innerText = `🏆 ${score}`;
                    playPointSound();
                    // увеличиваем скорость каждые 10 очков
                    currentSpeed = baseSpeed + Math.floor(score / 10) * 1.5;
                } else {
                    const carX = currentX;
                    if (Math.abs(carX - obs.x) < 0.85 && Math.abs(obs.z - 2.2) < 1.2) {
                        gameActive = false;
                        statusDiv.innerHTML = '💥 КРАШ! Игра окончена. Нажмите "Выход".';
                        playCrashSound();
                        stopEngineSound();
                        if (currentMode === 'multi' && socket && socket.readyState === WebSocket.OPEN) {
                            socket.send(JSON.stringify({ type: 'crash', raceId, userId, score }));
                        }
                        if (window.obstacleInterval) clearInterval(window.obstacleInterval);
                    }
                }
            }
        }

        function clearObstacles() {
            for (let obs of obstacles) scene.remove(obs.mesh);
            obstacles = [];
        }

        function startRace() {
            gameActive = true;
            score = 0;
            currentSpeed = baseSpeed;
            scoreDiv.innerText = `🏆 0`;
            clearObstacles();
            currentX = 0;
            targetX = 0;
            playerCar.position.x = 0;
            camera.position.x = 0;
            statusDiv.innerHTML = currentMode === 'single' ? '🚗 ОДИНОЧНАЯ! Уклоняйтесь!' : '🌐 МНОГОПОЛЬЗОВАТЕЛЬСКАЯ!';
            startEngineSound();
            if (window.obstacleInterval) clearInterval(window.obstacleInterval);
            window.obstacleInterval = setInterval(() => {
                if (gameActive && Math.random() < 0.5) spawnObstacle();
            }, 650);
        }

        // Одиночный режим
        function initSingleMode() {
            currentMode = 'single';
            modeMenu.classList.add('hidden');
            infoDiv.classList.remove('hidden');
            scoreDiv.classList.remove('hidden');
            controlsDiv.classList.remove('hidden');
            statusDiv.classList.remove('hidden');
            exitBtn.classList.remove('hidden');
            musicControls.classList.remove('hidden');
            startRace();
            startBackgroundMusic();
        }

        // Многопользовательский режим (упрощённо, без изменений управления)
        function initMultiMode() {
            currentMode = 'multi';
            modeMenu.classList.add('hidden');
            infoDiv.classList.remove('hidden');
            scoreDiv.classList.remove('hidden');
            controlsDiv.classList.remove('hidden');
            statusDiv.classList.remove('hidden');
            exitBtn.classList.remove('hidden');
            musicControls.classList.remove('hidden');
            statusDiv.innerHTML = '🔄 Подключение к серверу...';
            const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${wsProtocol}//${window.location.host}/ws/race`;
            socket = new WebSocket(wsUrl);
            socket.onopen = () => {
                statusDiv.innerHTML = '✅ Подключено. Поиск игроков...';
                socket.send(JSON.stringify({ type: 'join', userId }));
            };
            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'race_start') {
                    raceId = data.raceId;
                    startRace();
                    startBackgroundMusic();
                } else if (data.type === 'opponents') {
                    for (let [id, opp] of opponents) {
                        if (!data.players.find(p => p.id == id)) {
                            scene.remove(opp.mesh);
                            opponents.delete(id);
                        }
                    }
                    for (let p of data.players) {
                        if (p.id == userId) continue;
                        let opp = opponents.get(p.id);
                        if (!opp) {
                            const carGroup = new THREE.Group();
                            const body2 = new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.45, 2.0), new THREE.MeshStandardMaterial({ color: 0xdd6644 }));
                            body2.castShadow = true;
                            carGroup.add(body2);
                            const wheelGeo2 = new THREE.CylinderGeometry(0.28, 0.28, 0.12, 16);
                            const wheelMat2 = new THREE.MeshStandardMaterial({ color: 0x111111 });
                            const wPos = [[-0.7, -0.2, 0.8], [0.7, -0.2, 0.8], [-0.7, -0.2, -0.8], [0.7, -0.2, -0.8]];
                            wPos.forEach(pos => {
                                const wheel = new THREE.Mesh(wheelGeo2, wheelMat2);
                                wheel.rotation.z = Math.PI / 2;
                                wheel.position.set(pos[0], pos[1], pos[2]);
                                carGroup.add(wheel);
                            });
                            scene.add(carGroup);
                            opp = { mesh: carGroup, x: 0 };
                            opponents.set(p.id, opp);
                        }
                        opp.x = p.x;
                        opp.mesh.position.x = p.x;
                        opp.mesh.position.z = 2.0;
                    }
                } else if (data.type === 'race_end') {
                    gameActive = false;
                    stopEngineSound();
                    statusDiv.innerHTML = `🏁 ГОНКА ЗАВЕРШЕНА! Счёт: ${score}`;
                    if (window.obstacleInterval) clearInterval(window.obstacleInterval);
                }
            };
            socket.onerror = () => {
                statusDiv.innerHTML = '❌ Ошибка WebSocket. Переход в одиночный режим...';
                setTimeout(() => {
                    if (socket) socket.close();
                    initSingleMode();
                }, 2000);
            };
            setInterval(() => {
                if (socket && socket.readyState === WebSocket.OPEN && gameActive && currentMode === 'multi') {
                    socket.send(JSON.stringify({ type: 'move', userId, x: currentX, raceId, score }));
                }
            }, 50);
        }

        // Привязка кнопок
        document.getElementById('singleplayer-btn').addEventListener('click', initSingleMode);
        document.getElementById('multiplayer-btn').addEventListener('click', initMultiMode);
        document.getElementById('btnLeft').addEventListener('click', moveLeft);
        document.getElementById('btnRight').addEventListener('click', moveRight);
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') moveLeft();
            if (e.key === 'ArrowRight') moveRight();
        });
        exitBtn.addEventListener('click', () => {
            if (window.obstacleInterval) clearInterval(window.obstacleInterval);
            if (socket && socket.readyState === WebSocket.OPEN) socket.close();
            stopEngineSound();
            if (backgroundMusic) backgroundMusic.pause();
            window.location.href = 'index.html';
        });

        // Музыка
        document.getElementById('musicFileInput').addEventListener('change', (e) => {
            if (e.target.files.length > 0) loadMusicFromFile(e.target.files[0]);
        });
        document.getElementById('playMusicBtn').addEventListener('click', toggleMusic);
        document.getElementById('stopMusicBtn').addEventListener('click', stopMusic);
        document.getElementById('volumeSlider').addEventListener('input', (e) => {
            if (backgroundMusic) backgroundMusic.volume = e.target.value / 100;
        });

        // Анимация
        let lastTime = performance.now();
        function animate() {
            const now = performance.now();
            let dt = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            if (gameActive) {
                currentX += (targetX - currentX) * 0.25;
                playerCar.position.x = currentX;
                camera.position.x += (currentX - camera.position.x) * 0.15;
                camera.lookAt(currentX, 0.6, playerCar.position.z + 3);
                updateObstacles(dt);
                updateEngineSound(currentSpeed);
            }
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
