<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Гонки | Resell Tycoon</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', system-ui; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            z-index: 10;
            pointer-events: none;
            backdrop-filter: blur(4px);
        }
        #score {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            padding: 8px 16px;
            border-radius: 20px;
            color: #ffaa44;
            font-weight: bold;
            z-index: 10;
            pointer-events: none;
        }
        #controls {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 40px;
            z-index: 20;
            pointer-events: none;
        }
        .ctrl-btn {
            pointer-events: auto;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(30,40,60,0.9);
            backdrop-filter: blur(8px);
            border: 2px solid #ffaa44;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            cursor: pointer;
            transition: 0.05s linear;
            touch-action: manipulation;
        }
        .ctrl-btn:active { transform: scale(0.92); background: #ffaa44; color: black; }
        @media (max-width: 600px) {
            .ctrl-btn { width: 60px; height: 60px; font-size: 30px; }
        }
        #status {
            position: absolute;
            bottom: 120px;
            left: 0;
            right: 0;
            text-align: center;
            color: #ffdd99;
            background: rgba(0,0,0,0.5);
            padding: 8px;
            border-radius: 20px;
            width: 80%;
            margin: 0 auto;
            font-weight: bold;
            pointer-events: none;
        }
        .back-btn {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: #555;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            z-index: 20;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="info">🏎️ 3D RACE</div>
    <div id="score">🏆 0</div>
    <div id="controls">
        <div class="ctrl-btn" id="btnLeft">◀</div>
        <div class="ctrl-btn" id="btnRight">▶</div>
    </div>
    <div id="status">⚡ Подключение к серверу...</div>
    <button class="back-btn" onclick="location.href='index.html'">🔙 Выход</button>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // ---------- НАСТРОЙКИ ----------
        const userId = tg.initDataUnsafe?.user?.id || Math.floor(Math.random() * 100000);
        let socket;
        let raceId = null;
        let gameActive = false;
        let score = 0;

        // ----- ТРЁХМЕРНАЯ СЦЕНА -----
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a1030);
        scene.fog = new THREE.FogExp2(0x0a1030, 0.008);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 4, 8);
        camera.lookAt(0, 0, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Освещение
        const ambient = new THREE.AmbientLight(0x404060);
        scene.add(ambient);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        scene.add(dirLight);
        const fillLight = new THREE.PointLight(0x4488ff, 0.5);
        fillLight.position.set(-2, 3, 4);
        scene.add(fillLight);

        // Дорога – простая полоса
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x2c3e50, roughness: 0.7 });
        const road = new THREE.Mesh(new THREE.PlaneGeometry(6, 200), roadMat);
        road.rotation.x = -Math.PI / 2;
        road.position.y = -0.5;
        road.receiveShadow = true;
        scene.add(road);

        // Разметка (полосы)
        const lineMat = new THREE.MeshStandardMaterial({ color: 0xffaa44 });
        for (let z = -50; z <= 50; z += 2) {
            const line = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.1, 1.5), lineMat);
            line.position.set(0, -0.4, z);
            line.castShadow = false;
            scene.add(line);
        }

        // Модель игрока (куб с колесами)
        const playerCar = new THREE.Group();
        const bodyGeo = new THREE.BoxGeometry(0.9, 0.4, 1.8);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x33aa44, metalness: 0.6 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.castShadow = true;
        body.receiveShadow = true;
        playerCar.add(body);
        const wheelGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.1, 16);
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
        const positions = [[-0.5, -0.2, 0.7], [0.5, -0.2, 0.7], [-0.5, -0.2, -0.7], [0.5, -0.2, -0.7]];
        positions.forEach(pos => {
            const wheel = new THREE.Mesh(wheelGeo, wheelMat);
            wheel.rotation.z = Math.PI / 2;
            wheel.position.set(pos[0], pos[1], pos[2]);
            wheel.castShadow = true;
            playerCar.add(wheel);
        });
        scene.add(playerCar);
        playerCar.position.y = 0;
        playerCar.position.x = 0;

        // Машины соперников (будем добавлять/удалять)
        const opponents = new Map(); // key: playerId, value: { mesh, x, z }

        // Препятствия (динамические)
        let obstacles = [];

        // --- УПРАВЛЕНИЕ ---
        let targetX = 0;
        let currentX = 0;
        const speed = 8; // скорость движения камеры (условно)
        let lastTimestamp = 0;

        function moveLeft() { targetX = Math.max(-2.5, targetX - 1.2); }
        function moveRight() { targetX = Math.min(2.5, targetX + 1.2); }

        document.getElementById('btnLeft').addEventListener('click', moveLeft);
        document.getElementById('btnRight').addEventListener('click', moveRight);
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') moveLeft();
            if (e.key === 'ArrowRight') moveRight();
        });

        // Генерация препятствий
        function spawnObstacle() {
            const type = Math.random() > 0.6 ? 'cone' : 'barrier';
            let mesh;
            if (type === 'cone') {
                const coneGeo = new THREE.ConeGeometry(0.3, 0.6, 8);
                const mat = new THREE.MeshStandardMaterial({ color: 0xff6644 });
                mesh = new THREE.Mesh(coneGeo, mat);
                mesh.position.y = 0;
            } else {
                const boxGeo = new THREE.BoxGeometry(0.8, 0.4, 0.8);
                const mat = new THREE.MeshStandardMaterial({ color: 0xaa4444 });
                mesh = new THREE.Mesh(boxGeo, mat);
                mesh.position.y = 0;
            }
            const xPos = (Math.random() - 0.5) * 4.5;
            mesh.position.set(xPos, 0, 25);
            mesh.castShadow = true;
            scene.add(mesh);
            obstacles.push({ mesh, x: xPos, z: 25 });
        }

        // Обновление препятствий (движение к игроку)
        function updateObstacles(deltaTime) {
            const moveZ = -speed * deltaTime;
            for (let i = 0; i < obstacles.length; i++) {
                const obs = obstacles[i];
                obs.z += moveZ;
                obs.mesh.position.z = obs.z;
                if (obs.z < -10) {
                    scene.remove(obs.mesh);
                    obstacles.splice(i, 1);
                    i--;
                    score++;
                    document.getElementById('score').innerText = `🏆 ${score}`;
                } else {
                    // проверка столкновения с игроком
                    const carX = currentX;
                    if (Math.abs(carX - obs.x) < 0.7 && Math.abs(obs.z - 1.5) < 1.0) {
                        gameActive = false;
                        document.getElementById('status').innerHTML = '💥 КРАШ! Игра окончена. Обновите страницу для новой гонки.';
                        if (socket && socket.readyState === WebSocket.OPEN) {
                            socket.send(JSON.stringify({ type: 'crash', raceId, userId, score }));
                        }
                    }
                }
            }
        }

        // Синхронизация соперников через WebSocket
        function updateOpponents(playersData) {
            // playersData: массив { id, x }
            for (let [id, data] of opponents) {
                if (!playersData.find(p => p.id == id)) {
                    scene.remove(data.mesh);
                    opponents.delete(id);
                }
            }
            for (let p of playersData) {
                if (p.id == userId) continue;
                let opp = opponents.get(p.id);
                if (!opp) {
                    const carGroup = new THREE.Group();
                    const body2 = new THREE.Mesh(bodyGeo, new THREE.MeshStandardMaterial({ color: 0xdd6644 }));
                    body2.castShadow = true;
                    carGroup.add(body2);
                    positions.forEach(pos => {
                        const wheel = new THREE.Mesh(wheelGeo, wheelMat);
                        wheel.rotation.z = Math.PI / 2;
                        wheel.position.set(pos[0], pos[1], pos[2]);
                        carGroup.add(wheel);
                    });
                    scene.add(carGroup);
                    opp = { mesh: carGroup, x: 0 };
                    opponents.set(p.id, opp);
                }
                opp.x = p.x;
                opp.mesh.position.x = p.x;
                opp.mesh.position.z = 1.5;
            }
        }

        // ========== WEBSOCKET ==========
        const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${wsProtocol}//${window.location.host}/ws/race`;
        socket = new WebSocket(wsUrl);

        socket.onopen = () => {
            document.getElementById('status').innerHTML = '✅ Подключено. Ищем гонку...';
            socket.send(JSON.stringify({ type: 'join', userId }));
        };

        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.type === 'race_start') {
                raceId = data.raceId;
                gameActive = true;
                document.getElementById('status').innerHTML = '🏁 ГОНКА НАЧАЛАСЬ! Уклоняйтесь!';
                // запускаем генерацию препятствий
                setInterval(() => {
                    if (gameActive && Math.random() < 0.4) spawnObstacle();
                }, 800);
            } else if (data.type === 'opponents') {
                updateOpponents(data.players);
            } else if (data.type === 'race_end') {
                gameActive = false;
                document.getElementById('status').innerHTML = `🏆 ГОНКА ЗАВЕРШЕНА! Ваш счёт: ${score}`;
            }
        };

        socket.onerror = (err) => {
            console.error(err);
            document.getElementById('status').innerHTML = '❌ Ошибка WebSocket. Играем в одиночку.';
        };

        // Отправляем свою позицию каждые 50 мс
        setInterval(() => {
            if (socket && socket.readyState === WebSocket.OPEN && gameActive) {
                socket.send(JSON.stringify({ type: 'move', userId, x: currentX, raceId, score }));
            }
        }, 50);

        // ----- АНИМАЦИОННЫЙ ЦИКЛ -----
        let lastTime = performance.now();
        function animate() {
            const now = performance.now();
            let dt = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;

            if (gameActive) {
                // плавное перемещение машины
                currentX += (targetX - currentX) * 0.2;
                playerCar.position.x = currentX;
                // камера слегка следует
                camera.position.x += (currentX - camera.position.x) * 0.1;
                camera.lookAt(currentX, 0, 10);

                updateObstacles(dt);
            }

            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        animate();

        // Адаптация размера окна
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
