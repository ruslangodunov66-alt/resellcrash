<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Гонки | Resell Tycoon</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; font-family: 'Segoe UI', system-ui, sans-serif; }
        body {
            background: radial-gradient(circle at 30% 10%, #0c1120, #020408);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }
        .race-container {
            background: rgba(20,30,45,0.7);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 20px;
            border: 2px solid rgba(0,255,255,0.4);
            box-shadow: 0 0 30px rgba(0,255,255,0.2);
            max-width: 100%;
        }
        canvas {
            display: block;
            margin: 0 auto;
            background: #1a2a2f;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            cursor: none;
        }
        .info-panel {
            display: flex;
            justify-content: space-between;
            margin-top: 16px;
            gap: 16px;
            flex-wrap: wrap;
            color: white;
            font-weight: bold;
        }
        .info-card {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 8px 20px;
            text-align: center;
            flex: 1;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        .ctrl-btn {
            background: rgba(30,40,60,0.9);
            border: 1px solid #ffaa44;
            border-radius: 60px;
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            cursor: pointer;
            transition: 0.05s linear;
        }
        .ctrl-btn:active { transform: scale(0.92); background: #ffaa44; color: black; }
        .lobby {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .lobby input, .lobby button {
            padding: 10px 20px;
            border-radius: 40px;
            border: none;
            background: #1e2a3a;
            color: white;
            font-weight: bold;
        }
        .lobby button {
            background: #2ecc71;
            cursor: pointer;
        }
        .status {
            text-align: center;
            margin-top: 12px;
            color: #ffcc88;
            font-size: 14px;
        }
        .back-btn {
            background: #555;
            width: 100%;
            margin-top: 20px;
            border: none;
            padding: 10px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        @media (max-width: 600px) {
            .ctrl-btn { width: 60px; height: 60px; font-size: 28px; }
        }
    </style>
</head>
<body>
<div>
    <div class="race-container">
        <div class="lobby" id="lobby">
            <input type="text" id="raceIdInput" placeholder="ID гонки">
            <button id="joinBtn">🔗 ПРИСОЕДИНИТЬСЯ</button>
            <button id="createBtn">🏁 СОЗДАТЬ НОВУЮ</button>
        </div>
        <canvas id="raceCanvas" width="800" height="600" style="display: none;"></canvas>
        <div class="info-panel" id="infoPanel" style="display: none;">
            <div class="info-card">🏁 КРУГ: <span id="laps">0</span> / 3</div>
            <div class="info-card">🏎️ СКОРОСТЬ: <span id="speed">0</span> km/h</div>
            <div class="info-card">🥇 ЛИДЕР: <span id="leader">—</span></div>
        </div>
        <div class="controls" id="controls" style="display: none;">
            <div class="ctrl-btn" id="btnUp">⬆️</div>
            <div class="ctrl-btn" id="btnLeft">⬅️</div>
            <div class="ctrl-btn" id="btnDown">⬇️</div>
            <div class="ctrl-btn" id="btnRight">➡️</div>
        </div>
        <div class="status" id="status">⚡ Введите ID гонки или создайте новую</div>
        <button class="back-btn" id="exitBtn">🔙 Выход</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    tg.enableClosingConfirmation();

    // ---------- НАСТРОЙКИ ----------
    const API_BASE = "https://nl12.bothost.ru";   // замените на api.resgame.ru позже
    const USE_REAL_API = false;                   // после подключения API сменить на true
    const userId = tg.initDataUnsafe?.user?.id || 1475910449;
    let raceId = null;
    let raceActive = false;

    // Элементы интерфейса
    const lobbyDiv = document.getElementById('lobby');
    const canvas = document.getElementById('raceCanvas');
    const ctx = canvas.getContext('2d');
    const infoPanel = document.getElementById('infoPanel');
    const controlsDiv = document.getElementById('controls');
    const statusDiv = document.getElementById('status');

    // Параметры игры
    let width = 800, height = 600;
    canvas.width = width; canvas.height = height;

    let playerCar = {
        x: 400, y: 500,
        angle: -90,
        speed: 0,
        lap: 0,
        checkpoint: 0,
        finished: false
    };
    let opponentCar = {
        x: 400, y: 480,
        angle: -90,
        speed: 0,
        lap: 0,
        checkpoint: 0,
        finished: false
    };
    let leader = "—";

    // Трасса и контрольные точки
    const trackPoints = [
        {x: 300, y: 200}, {x: 500, y: 200}, {x: 600, y: 300}, {x: 600, y: 450},
        {x: 500, y: 550}, {x: 300, y: 550}, {x: 200, y: 450}, {x: 200, y: 300}
    ];
    const checkpoints = [0,2,4,6];
    let trackSegments = [];

    function buildTrackSegments() {
        trackSegments = [];
        for (let i = 0; i < trackPoints.length; i++) {
            const p1 = trackPoints[i];
            const p2 = trackPoints[(i+1)%trackPoints.length];
            trackSegments.push({p1, p2});
        }
    }
    buildTrackSegments();

    function clampToTrack(car) {
        let minDist = 1000;
        let closest = {x: car.x, y: car.y};
        for (let seg of trackSegments) {
            const p1 = seg.p1, p2 = seg.p2;
            const dx = p2.x - p1.x;
            const dy = p2.y - p1.y;
            const len = Math.hypot(dx, dy);
            if (len === 0) continue;
            const t = ((car.x - p1.x)*dx + (car.y - p1.y)*dy) / (len*len);
            const tClamped = Math.max(0, Math.min(1, t));
            const projX = p1.x + tClamped * dx;
            const projY = p1.y + tClamped * dy;
            const dist = Math.hypot(car.x - projX, car.y - projY);
            if (dist < minDist) {
                minDist = dist;
                closest = {x: projX, y: projY};
            }
        }
        if (minDist > 25) {
            car.x = closest.x;
            car.y = closest.y;
        }
    }

    function updateLap(car, isPlayer) {
        let cpIndex = -1;
        let minDist = 40;
        for (let i = 0; i < trackPoints.length; i++) {
            const p = trackPoints[i];
            const dist = Math.hypot(car.x - p.x, car.y - p.y);
            if (dist < minDist) {
                minDist = dist;
                cpIndex = i;
            }
        }
        if (cpIndex !== -1 && cpIndex !== car.checkpoint) {
            if (cpIndex === 0 && car.checkpoint === trackPoints.length-1) {
                car.lap++;
                if (car.lap >= 3) car.finished = true;
                if (isPlayer && car.lap === 3) tg.showAlert("🏆 ВЫ ЗАКОНЧИЛИ ГОНКУ!");
            }
            car.checkpoint = cpIndex;
        }
    }

    function updateCar(car, throttle, steer, dt) {
        if (car.finished) return;
        const maxSpeed = 300;
        const acc = throttle * 200;
        const brake = throttle < 0 ? 150 : 0;
        car.speed += (acc - brake) * dt;
        car.speed *= (1 - dt * 0.5);
        car.speed = Math.min(maxSpeed, Math.max(-maxSpeed*0.5, car.speed));
        if (Math.abs(car.speed) < 1 && throttle === 0) car.speed = 0;
        const turnSpeed = (Math.abs(car.speed) / maxSpeed) * 120 * dt;
        car.angle += steer * turnSpeed;
        car.angle = (car.angle + 360) % 360;
        const rad = car.angle * Math.PI / 180;
        car.x += Math.cos(rad) * car.speed * dt;
        car.y += Math.sin(rad) * car.speed * dt;
        clampToTrack(car);
    }

    let throttle = 0, steering = 0;
    function handleControls(dt) {
        updateCar(playerCar, throttle, steering, dt);
        updateLap(playerCar, true);
    }

    // Рендер
    function drawTrack() {
        ctx.beginPath();
        for (let i = 0; i < trackPoints.length; i++) {
            if (i===0) ctx.moveTo(trackPoints[i].x, trackPoints[i].y);
            else ctx.lineTo(trackPoints[i].x, trackPoints[i].y);
        }
        ctx.closePath();
        ctx.strokeStyle = "#ffaa44";
        ctx.lineWidth = 8;
        ctx.stroke();
        ctx.fillStyle = "rgba(0,0,0,0.3)";
        ctx.fill();

        for (let i = 0; i < trackPoints.length; i++) {
            ctx.beginPath();
            ctx.arc(trackPoints[i].x, trackPoints[i].y, 6, 0, Math.PI*2);
            ctx.fillStyle = i === playerCar.checkpoint ? "#2ecc71" : "#888";
            ctx.fill();
        }
    }

    function drawCar(car, color, name) {
        ctx.save();
        ctx.translate(car.x, car.y);
        ctx.rotate(car.angle * Math.PI / 180);
        ctx.beginPath();
        ctx.rect(-15, -8, 30, 16);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.fillStyle = "white";
        ctx.font = "bold 14px sans-serif";
        ctx.fillText(name, -12, -12);
        ctx.restore();
    }

    function updateUI() {
        document.getElementById('laps').innerText = `${playerCar.lap}/3`;
        document.getElementById('speed').innerText = Math.floor(Math.abs(playerCar.speed));
        let lead = "Вы";
        if (opponentCar.lap > playerCar.lap) lead = "Соперник";
        else if (opponentCar.lap === playerCar.lap && opponentCar.checkpoint > playerCar.checkpoint) lead = "Соперник";
        document.getElementById('leader').innerText = lead;
    }

    function render() {
        ctx.clearRect(0,0,width,height);
        drawTrack();
        drawCar(playerCar, "#2ecc71", "ВЫ");
        drawCar(opponentCar, "#e74c3c", "СОПЕРНИК");
        updateUI();
    }

    // ---------- СЕТЕВОЕ ВЗАИМОДЕЙСТВИЕ ----------
    let lastSendTime = 0;
    async function sendControl() {
        if (!USE_REAL_API || !raceId) return;
        const now = Date.now();
        if (now - lastSendTime < 100) return;
        lastSendTime = now;
        try {
            await fetch(`${API_BASE}/api/race/control?tg_id=${userId}&race_id=${raceId}&throttle=${throttle}&steer=${steering}`, { method: 'POST' });
        } catch(e) {}
    }

    async function fetchOpponentState() {
        if (!USE_REAL_API || !raceId) return;
        try {
            const resp = await fetch(`${API_BASE}/api/race/state?tg_id=${userId}&race_id=${raceId}`);
            const data = await resp.json();
            if (data.opponent) {
                opponentCar.x = data.opponent.x;
                opponentCar.y = data.opponent.y;
                opponentCar.angle = data.opponent.angle;
                opponentCar.speed = data.opponent.speed;
                opponentCar.lap = data.opponent.lap;
                opponentCar.checkpoint = data.opponent.checkpoint;
                opponentCar.finished = data.opponent.finished;
            }
        } catch(e) {}
    }

    // Управление с клавиатуры и кнопок
    const keyState = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
    function updateFromKeys() {
        let thr = 0;
        if (keyState.ArrowUp) thr = 1;
        if (keyState.ArrowDown) thr = -0.6;
        throttle = thr;
        let str = 0;
        if (keyState.ArrowLeft) str = -1;
        if (keyState.ArrowRight) str = 1;
        steering = str;
    }

    window.addEventListener('keydown', (e) => {
        if (e.key in keyState) {
            keyState[e.key] = true;
            e.preventDefault();
        }
    });
    window.addEventListener('keyup', (e) => {
        if (e.key in keyState) {
            keyState[e.key] = false;
            e.preventDefault();
        }
    });

    function attachTouchControls() {
        const btnUp = document.getElementById('btnUp');
        const btnDown = document.getElementById('btnDown');
        const btnLeft = document.getElementById('btnLeft');
        const btnRight = document.getElementById('btnRight');
        const setKey = (key, value) => { keyState[key] = value; };
        btnUp.addEventListener('touchstart', (e) => { e.preventDefault(); setKey('ArrowUp', true); });
        btnUp.addEventListener('touchend', () => setKey('ArrowUp', false));
        btnDown.addEventListener('touchstart', (e) => { e.preventDefault(); setKey('ArrowDown', true); });
        btnDown.addEventListener('touchend', () => setKey('ArrowDown', false));
        btnLeft.addEventListener('touchstart', (e) => { e.preventDefault(); setKey('ArrowLeft', true); });
        btnLeft.addEventListener('touchend', () => setKey('ArrowLeft', false));
        btnRight.addEventListener('touchstart', (e) => { e.preventDefault(); setKey('ArrowRight', true); });
        btnRight.addEventListener('touchend', () => setKey('ArrowRight', false));
        // мышь
        btnUp.onmousedown = () => setKey('ArrowUp', true);
        btnUp.onmouseup = () => setKey('ArrowUp', false);
        btnDown.onmousedown = () => setKey('ArrowDown', true);
        btnDown.onmouseup = () => setKey('ArrowDown', false);
        btnLeft.onmousedown = () => setKey('ArrowLeft', true);
        btnLeft.onmouseup = () => setKey('ArrowLeft', false);
        btnRight.onmousedown = () => setKey('ArrowRight', true);
        btnRight.onmouseup = () => setKey('ArrowRight', false);
    }

    // Игровой цикл
    let lastTimestamp = 0;
    let animationId = null;
    function gameLoop(now) {
        let dt = Math.min(0.033, (now - lastTimestamp) / 1000);
        if (dt <= 0) { lastTimestamp = now; animationId = requestAnimationFrame(gameLoop); return; }
        updateFromKeys();
        handleControls(dt);
        sendControl();
        if (!USE_REAL_API) {
            // симуляция соперника-бота
            opponentCar.speed += (Math.random() - 0.5) * 20;
            opponentCar.speed = Math.min(200, Math.max(0, opponentCar.speed));
            updateCar(opponentCar, opponentCar.speed > 50 ? 1 : 0, (Math.random()-0.5)*2, dt);
            updateLap(opponentCar, false);
        } else {
            fetchOpponentState();
        }
        render();
        lastTimestamp = now;
        animationId = requestAnimationFrame(gameLoop);
    }

    function startRace() {
        raceActive = true;
        lobbyDiv.style.display = 'none';
        canvas.style.display = 'block';
        infoPanel.style.display = 'flex';
        controlsDiv.style.display = 'flex';
        statusDiv.innerText = "🏎️ ГОНКА НАЧАЛАСЬ! Управляй стрелками или кнопками";
        // сброс состояния машин
        playerCar = { x: 400, y: 500, angle: -90, speed: 0, lap: 0, checkpoint: 0, finished: false };
        opponentCar = { x: 400, y: 480, angle: -90, speed: 0, lap: 0, checkpoint: 0, finished: false };
        lastTimestamp = performance.now();
        if (animationId) cancelAnimationFrame(animationId);
        animationId = requestAnimationFrame(gameLoop);
        attachTouchControls();
    }

    // Создание гонки
    async function createRace() {
        if (!USE_REAL_API) {
            raceId = "demo_" + Date.now();
            statusDiv.innerText = `✅ (ДЕМО) Гонка создана! ID: ${raceId}. Присоединяйтесь по нему.`;
            startRace();
            return;
        }
        try {
            const resp = await fetch(`${API_BASE}/api/race/create?tg_id=${userId}&bet=5000`, { method: 'POST' });
            const data = await resp.json();
            if (data.race_id) {
                raceId = data.race_id;
                statusDiv.innerText = `✅ Гонка создана! ID: ${raceId}. Ожидаем соперника...`;
                // Периодически проверяем, присоединился ли кто-то
                const interval = setInterval(async () => {
                    const stateResp = await fetch(`${API_BASE}/api/race/state?tg_id=${userId}&race_id=${raceId}`);
                    const stateData = await stateResp.json();
                    if (stateData.opponent) {
                        clearInterval(interval);
                        startRace();
                    }
                }, 2000);
            } else {
                statusDiv.innerText = `❌ Ошибка: ${data.message}`;
            }
        } catch(e) {
            statusDiv.innerText = `❌ Ошибка: ${e.message}`;
        }
    }

    async function joinRace() {
        const inputRaceId = document.getElementById('raceIdInput').value.trim();
        if (!inputRaceId) { tg.showAlert("Введите ID гонки"); return; }
        if (!USE_REAL_API) {
            raceId = inputRaceId;
            statusDiv.innerText = `✅ (ДЕМО) Присоединились к гонке ${raceId}`;
            startRace();
            return;
        }
        try {
            const resp = await fetch(`${API_BASE}/api/race/join?tg_id=${userId}&race_id=${inputRaceId}`, { method: 'POST' });
            const data = await resp.json();
            if (data.message) {
                raceId = inputRaceId;
                startRace();
            } else {
                statusDiv.innerText = `❌ ${data.message}`;
            }
        } catch(e) {
            statusDiv.innerText = `❌ Ошибка: ${e.message}`;
        }
    }

    document.getElementById('createBtn').onclick = createRace;
    document.getElementById('joinBtn').onclick = joinRace;
    document.getElementById('exitBtn').onclick = () => window.location.href = 'index.html';

    // Для демо: если есть параметр race_id в URL, можно сразу присоединиться
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('race_id')) {
        document.getElementById('raceIdInput').value = urlParams.get('race_id');
        joinRace();
    }
</script>
</body>
</html>
